name: Flutter CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create dummy secret files
        shell: bash
        run: |
          cat > lib/api/nies_api_keys.dart << 'DART'
          class NiesApiKeys {
            static const _niesApiKey = 'dummy';
            static const _atptOfcdcScCode = 'dummy';
            static const _sdSchulCode = 'dummy';
            static String get niesApiKey => _niesApiKey;
            static String get atptOfcdcScCode => _atptOfcdcScCode;
            static String get sdSchulCode => _sdSchulCode;
          }
          DART
          cat > lib/firebase_options.dart << 'DART'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
              apiKey: 'dummy', appId: 'dummy', messagingSenderId: 'dummy', projectId: 'dummy',
            );
          }
          DART
          cat > lib/api/kakao_keys.dart << 'DART'
          class KakaoKeys {
            static const nativeAppKey = 'dummy';
          }
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed . || echo "::warning::Formatting issues found (non-fatal)"
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          flags: unittests
          name: hansol-flutter-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/lcov.info
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create dummy secret files
        shell: bash
        run: |
          cat > lib/api/nies_api_keys.dart << 'DART'
          class NiesApiKeys {
            static const _niesApiKey = 'dummy';
            static const _atptOfcdcScCode = 'dummy';
            static const _sdSchulCode = 'dummy';
            static String get niesApiKey => _niesApiKey;
            static String get atptOfcdcScCode => _atptOfcdcScCode;
            static String get sdSchulCode => _sdSchulCode;
          }
          DART
          cat > lib/firebase_options.dart << 'DART'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
              apiKey: 'dummy', appId: 'dummy', messagingSenderId: 'dummy', projectId: 'dummy',
            );
          }
          DART
          cat > lib/api/kakao_keys.dart << 'DART'
          class KakaoKeys {
            static const nativeAppKey = 'dummy';
          }
          DART
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.monkshark.hansol_high_school"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "dummy" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
