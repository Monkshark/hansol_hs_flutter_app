name: Firestore Rules Tests

on:
  push:
    branches: [master]
    paths:
      - 'firestore.rules'
      - 'tests/firestore-rules/**'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    branches: [master]
    paths:
      - 'firestore.rules'
      - 'tests/firestore-rules/**'
      - '.github/workflows/firestore-rules.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rules-test:
    name: Firestore Rules Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (Firebase emulator 요구)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install test dependencies
        working-directory: tests/firestore-rules
        run: npm install

      - name: Run rules tests via emulator
        working-directory: tests/firestore-rules
        run: firebase emulators:exec --only firestore,auth --project hansol-test "npm test"
