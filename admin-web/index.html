<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한솔고 관리자</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>한솔고 관리자</h1>
      <p>관리자 또는 매니저 계정으로 로그인하세요</p>
      <input type="email" id="email" placeholder="이메일">
      <input type="password" id="password" placeholder="비밀번호">
      <button id="loginBtn">이메일 로그인</button>
      <div style="text-align:center;margin:12px 0;color:#888;font-size:13px;">또는</div>
      <button id="googleBtn" style="background:#fff;color:#333;border:1px solid #ddd;">Google 로그인 (매니저)</button>
      <div class="login-error" id="error"></div>
    </div>
  </div>

  <script type="module">
    import { auth, db, signInWithEmailAndPassword, signInWithPopup, googleProvider, doc, getDoc } from './js/firebase-init.js';

    // 이메일 로그인 (admin)
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        errorEl.textContent = '로그인 실패: 이메일 또는 비밀번호를 확인하세요';
      }
    });

    // Google 로그인 (매니저)
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const errorEl = document.getElementById('error');
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const uid = result.user.uid;

        // role 체크
        const userDoc = await getDoc(doc(db, 'users', uid));
        if (!userDoc.exists()) {
          errorEl.textContent = '등록된 사용자가 아닙니다';
          await auth.signOut();
          return;
        }
        const role = userDoc.data().role || 'user';
        if (role !== 'manager' && role !== 'admin') {
          errorEl.textContent = '관리자 또는 매니저 권한이 필요합니다';
          await auth.signOut();
          return;
        }
        window.location.href = 'dashboard.html';
      } catch (e) {
        errorEl.textContent = 'Google 로그인 실패';
      }
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
