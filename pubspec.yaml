name: hansol_high_school
description: app for hansol high school students & teachers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 기본 유틸
  path: ^1.8.3
  http: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.2.2
  io: ^1.0.4

  # 상태관리 및 서비스
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  get_it: ^8.0.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.0.3
  firebase_auth: ^5.1.0
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3
  kakao_flutter_sdk_user: ^1.9.0

  # 알림 / 로컬 저장 / 시간
  flutter_local_notifications: ^17.2.1+1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  timezone: ^0.9.2

  # UI / 기능
  cupertino_icons: ^1.0.6
  table_calendar: ^3.0.9
  path_provider: ^2.1.3
  screenshot: ^3.0.0
  share_plus: ^11.0.0
  numberpicker: ^2.1.2
  permission_handler: ^12.0.0+1
  connectivity_plus: ^6.1.4
  firebase_storage: ^12.1.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.2.0
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  cached_network_image: ^3.3.1
  firebase_crashlytics: ^4.3.10
  firebase_performance: ^0.10.0+8
  firebase_app_check: ^0.3.1+5
  shimmer: ^3.0.0
  flutter_svg: ^2.2.4
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1

dependency_overrides:
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
