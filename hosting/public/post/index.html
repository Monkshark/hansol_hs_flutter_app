<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>한솔고등학교 앱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F2F3F5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 24px;
      overflow: hidden;
    }
    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #3F72AF;
      color: white;
    }
    .btn-secondary {
      background: #F2F3F5;
      color: #333;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #17191E;
        color: #EEEEEE;
      }
      .card {
        background: #1E2028;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }
      .subtitle {
        color: #8B8F99;
      }
      .btn-primary {
        background: #3D5A80;
      }
      .btn-secondary {
        background: #2A2D35;
        color: #EEEEEE;
      }
      .footer {
        color: #555;
      }
    }
  </style>
</head>
