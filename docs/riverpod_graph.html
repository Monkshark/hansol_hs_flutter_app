<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Riverpod Graph</title>
  <script src="https://unpkg.com/cytoscape@3.24.0/dist/cytoscape.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


  <style>
    :root{--bg:#ffffff;--panel-bg:rgba(255,255,255,0.95);--panel-border:#ccc;--panel-text:#1f2328;--panel-shadow:rgba(0,0,0,0.2);--btn-bg:#ffffff;--btn-border:#d0d7de;--btn-text:#1f2328;--btn-hover-bg:#f6f8fa;color-scheme:light}
    html[data-theme="dark"]{--bg:#0d1117;--panel-bg:rgba(28,33,40,0.95);--panel-border:#30363d;--panel-text:#e6edf3;--panel-shadow:rgba(0,0,0,0.5);--btn-bg:#1c2128;--btn-border:#30363d;--btn-text:#e6edf3;--btn-hover-bg:#262c34;color-scheme:dark}
    html, body, #container { margin:0; padding:0; width:100%; height:100%; overflow:hidden }
    body { background: var(--bg); transition: background .2s }
    #cy { width:100%; height:100%; position:absolute; top:0; left:0 }
    #edge-info {
      position: absolute; top: 20px; right: 20px;
      background: var(--panel-bg); border: 1px solid var(--panel-border); color: var(--panel-text);
      padding: 10px; border-radius: 8px; box-shadow: 0 2px 10px var(--panel-shadow);
      z-index: 10; display: none; max-width: 300px; font-family: sans-serif;
      overflow-wrap: break-word; word-break: break-word; white-space: normal;
    }
    #themeToggle {
      position: absolute; top: 12px; left: 12px; z-index: 20;
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--btn-text);
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px var(--panel-shadow);
      transition: background .15s, border-color .15s;
    }
    #themeToggle:hover { background: var(--btn-hover-bg) }
    #themeToggle svg { width: 18px; height: 18px; display: block }
    #themeToggle .icon-sun { display: none }
    #themeToggle .icon-moon { display: block }
    html[data-theme="dark"] #themeToggle .icon-sun { display: block }
    html[data-theme="dark"] #themeToggle .icon-moon { display: none }
  </style>
  <script>
    // Apply stored theme ASAP.
    (function(){
      try {
        var t = localStorage.getItem('docsViewerTheme');
        if(t !== 'light' && t !== 'dark') t = 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e){}
    })();
  </script>
</head>

<body>
<button id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="6.9" y2="6.9"/><line x1="17.1" y1="17.1" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="6.9" y2="17.1"/><line x1="17.1" y1="6.9" x2="19.1" y2="4.9"/></svg>
</button>
<div id="container">
  <div id="cy"></div>
  <div id="edge-info"></div>
</div>
  <script>
    const graphData = [{"data":{"id":"themeProvider","label":"themeProvider"}},{"data":{"id":"_HansolHighSchoolState","label":"_HansolHighSchoolState"}},{"data":{"id":"_onTokenRefresh","label":"_onTokenRefresh"}},{"data":{"id":"FcmService","label":"FcmService"}},{"data":{"id":"_onForegroundMessage","label":"_onForegroundMessage"}},{"data":{"id":"_onMessageOpenedApp","label":"_onMessageOpenedApp"}},{"data":{"id":"authStateProvider","label":"authStateProvider"}},{"data":{"id":"UserProfileNotifier","label":"UserProfileNotifier"}},{"data":{"id":"isLoggedInProvider","label":"isLoggedInProvider"}},{"data":{"id":"userProfileProvider","label":"userProfileProvider"}},{"data":{"id":"isManagerProvider","label":"isManagerProvider"}},{"data":{"id":"isAdminProvider","label":"isAdminProvider"}},{"data":{"id":"isSuspendedProvider","label":"isSuspendedProvider"}},{"data":{"id":"examsProvider","label":"examsProvider"}},{"data":{"id":"examsByTypeProvider","label":"examsByTypeProvider"}},{"data":{"id":"_GradeScreenState","label":"_GradeScreenState"}},{"data":{"id":"goalsProvider","label":"goalsProvider"}},{"data":{"id":"jeongsiGoalsProvider","label":"jeongsiGoalsProvider"}},{"data":{"source":"_HansolHighSchoolState","target":"themeProvider","label":"read","trace":"lib\\main.dart:277"},"classes":"read"},{"data":{"source":"_HansolHighSchoolState","target":"themeProvider","label":"watch","trace":"lib\\main.dart:288"},"classes":"watch"},{"data":{"source":"FcmService","target":"_onTokenRefresh","label":"listen","trace":"lib\\notification\\fcm_service.dart:48"},"classes":"listen"},{"data":{"source":"FcmService","target":"_onForegroundMessage","label":"listen","trace":"lib\\notification\\fcm_service.dart:52"},"classes":"listen"},{"data":{"source":"FcmService","target":"_onMessageOpenedApp","label":"listen","trace":"lib\\notification\\fcm_service.dart:54"},"classes":"listen"},{"data":{"source":"UserProfileNotifier","target":"authStateProvider","label":"watch","trace":"lib\\providers\\auth_provider.dart:24"},"classes":"watch"},{"data":{"source":"isLoggedInProvider","target":"authStateProvider","label":"watch","trace":"lib\\providers\\auth_provider.dart:60"},"classes":"watch"},{"data":{"source":"isManagerProvider","target":"userProfileProvider","label":"watch","trace":"lib\\providers\\auth_provider.dart:65"},"classes":"watch"},{"data":{"source":"isAdminProvider","target":"userProfileProvider","label":"watch","trace":"lib\\providers\\auth_provider.dart:73"},"classes":"watch"},{"data":{"source":"isSuspendedProvider","target":"userProfileProvider","label":"watch","trace":"lib\\providers\\auth_provider.dart:81"},"classes":"watch"},{"data":{"source":"examsByTypeProvider","target":"examsProvider","label":"watch","trace":"lib\\providers\\grade_provider.dart:54"},"classes":"watch"},{"data":{"source":"_GradeScreenState","target":"examsProvider","label":"read","trace":"lib\\screens\\sub\\grade_screen.dart:94"},"classes":"read"},{"data":{"source":"_GradeScreenState","target":"examsProvider","label":"read","trace":"lib\\screens\\sub\\grade_screen.dart:99"},"classes":"read"},{"data":{"source":"_GradeScreenState","target":"goalsProvider","label":"read","trace":"lib\\screens\\sub\\grade_screen.dart:102"},"classes":"read"},{"data":{"source":"_GradeScreenState","target":"jeongsiGoalsProvider","label":"read","trace":"lib\\screens\\sub\\grade_screen.dart:103"},"classes":"read"},{"data":{"source":"_GradeScreenState","target":"jeongsiGoalsProvider","label":"read","trace":"lib\\screens\\sub\\grade_screen.dart:355"},"classes":"read"},{"data":{"source":"_GradeScreenState","target":"goalsProvider","label":"read","trace":"lib\\screens\\sub\\grade_screen.dart:357"},"classes":"read"},{"data":{"source":"_GradeScreenState","target":"examsProvider","label":"watch","trace":"lib\\screens\\sub\\grade_screen.dart:499"},"classes":"watch"},{"data":{"source":"_GradeScreenState","target":"goalsProvider","label":"watch","trace":"lib\\screens\\sub\\grade_screen.dart:524"},"classes":"watch"},{"data":{"source":"_GradeScreenState","target":"jeongsiGoalsProvider","label":"watch","trace":"lib\\screens\\sub\\grade_screen.dart:525"},"classes":"watch"}];

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: graphData,
      layout: { name: 'breadthfirst' },
      style: [
        {
          selector: 'node',
          style: {
            'shape': 'roundrectangle',
            'label': 'data(label)',
            'text-valign': 'center',
            'padding': '10px',
            'color': '#fff',
            'background-color': '#007acc',
            'width': 'label',
            'height': 'label',
          }
        },
    {
  selector: 'edge',
  style: {
    'width': 2,
    'target-arrow-shape': 'triangle',
    'curve-style': 'bezier',
  }
},
        {
          selector: 'edge.watch',
          style: {
            'line-color': '#007acc',
            'target-arrow-color': '#007acc',
            'line-style': 'solid',
          }
        },
        {
          selector: 'edge.read',
          style: {
            'line-color': '#00b894',
            'target-arrow-color': '#00b894',
            'line-style': 'dashed',
          }
        },
        {
          selector: 'edge.listen',
          style: {
            'line-color': '#0D920F',
            'target-arrow-color': '#0D920F',
            'line-style': 'dotted',
          }
        },
        {
          selector: 'edge.highlighted',
          style: {
            'background-color': '#ff5e28',
            'line-color': '#ff5e28',
            'target-arrow-color': '#ff5e28',
            'width': 2,
            'z-index': 9999,
            'transition-property': 'background-color, line-color, target-arrow-color',
            'transition-duration': '300ms'
          }
        },
        {
          selector: 'edge.suppressed',
          style: {
            'line-color': '#ccc',
            'target-arrow-color': '#ccc',

            'width': 1,
            'transition-property': 'background-color, line-color, target-arrow-color',
            'transition-duration': '300ms'
          }
        },
        {
          selector: 'node.highlighted',
          style: {
            'background-color': '#ff5e28',
            'line-color': '#ff5e28',
            'target-arrow-color': '#ff5e28',
            'z-index': 9999,
            'transition-property': 'background-color, line-color, target-arrow-color',
            'transition-duration': '300ms'
          }
        },
        {
          selector: 'node.suppressed',
          style: {
            'line-color': '#ccc',
            'transition-property': 'background-color, line-color, target-arrow-color',
            'transition-duration': '300ms'
          }
        }
      ]
    });

    // Optional: highlight on click
    cy.on('tap', 'edge', function (evt) {
      const edge = evt.target;
      cy.edges().addClass('suppressed');
      edge.addClass('highlighted');
      edge.removeClass('suppressed');

      const type = edge.data('label') || '';
      const source = edge.data('source');
      const target = edge.data('target');
      const trace = edge.data('trace') || '';
const edgeInfoDiv = document.getElementById('edge-info');
      edgeInfoDiv.innerHTML = `
    <strong>Edge Selected</strong><br>
    <strong>From:</strong> ${source}<br>
    <strong>To:</strong> ${target}<br>
    <strong>Type:</strong> ${type}<br>
    <strong>Trace:</strong> <pre style="white-space:pre-wrap">${trace}</pre>
  `;
  edgeInfoDiv.style.display = 'block';
    });

    cy.on('select', 'node', function (evt) {
      const node = evt.target;

      // Clear previous highlights
      cy.elements().removeClass('highlighted');
      cy.elements().addClass('suppressed');
      
      node.connectedEdges().addClass('highlighted');
      node.connectedEdges().removeClass('suppressed');

      // Highlight the node, its connected edges, and neighboring nodes
      const neighborhood = node.closedNeighborhood();
      neighborhood.addClass('highlighted');
    });

    cy.on('unselect', 'node', function () {
      cy.elements().removeClass('highlighted');
      cy.elements().removeClass('suppressed');
    });
    cy.on('unselect', 'edge', function () {
      cy.edges().removeClass('highlighted');
      cy.edges().removeClass('suppressed');
       const edgeInfoDiv = document.getElementById('edge-info');
       edgeInfoDiv.style.display = 'none';
    });

    // Theme toggle wiring — swap node color + suppressed edge/node color for readability on each bg.
    function applyCyTheme(theme){
      const isDark = theme === 'dark';
      cy.style()
        .selector('node').style({
          'background-color': isDark ? '#3b82f6' : '#007acc',
          'color': '#fff',
        })
        .selector('edge.suppressed').style({
          'line-color': isDark ? '#4a525c' : '#ccc',
          'target-arrow-color': isDark ? '#4a525c' : '#ccc',
        })
        .selector('node.suppressed').style({
          'background-color': isDark ? '#4a525c' : '#b0b6bd',
        })
        .update();
    }
    function getStoredTheme(){
      const t = localStorage.getItem('docsViewerTheme');
      return t === 'dark' ? 'dark' : 'light';
    }
    function setTheme(theme){
      theme = theme === 'dark' ? 'dark' : 'light';
      localStorage.setItem('docsViewerTheme', theme);
      document.documentElement.setAttribute('data-theme', theme);
      applyCyTheme(theme);
    }
    applyCyTheme(getStoredTheme());
    document.getElementById('themeToggle').addEventListener('click', function(){
      setTheme(getStoredTheme() === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>

</html>
