rver-triggered, so clients can't toggle categories on/off locally.\r\n\r\n**Fix:** Store `notiComment`, `notiReply`, `notiChat`, вҖҰ booleans on `users/{uid}`. Cloud Functions check them before sending; skip if `false`.\r\n\r\n**Related:** `functions/index.js`, `lib/screens/sub/notification_setting_screen.dart`\r\n\r\n---\r\n\r\n## 8. Auto-expiring suspensions (scheduler trigger)\r\n\r\n**Problem:** Even after `suspendedUntil` expired, the field lingered and `onUserUpdated` didn't fire, so no unsuspension push.\r\n\r\n**Fix:** Hourly Cloud Functions scheduler queries `suspendedUntil <= now` and deletes the field вҶ’ `onUserUpdated` triggers вҶ’ unsuspension push.\r\n\r\n**Related:** `functions/index.js` (`checkSuspensionExpiry`)\r\n\r\n---\r\n\r\n## 9. Admin screen Firestore read overload (Stream вҶ’ Future transition)\r\n\r\n**Problem:** Admin screen watched users/reports/logs live via `StreamBuilder`, so opening it alone produced 130+ reads; every data change re-queried everything.\r\n\r\n**Fix:** Switched to `FutureBuilder` вҖ” one read on open + manual `_refresh()` after actions (approve/delete). `ExpansionTile` children render only when expanded; collapsed tabs do 0 reads.\r\n\r\n**Outcome:** **130 вҶ’ 20вҖ“30 reads**.\r\n\r\n**Related:** `lib/screens/board/admin_screen.dart`, `admin/users_tab.dart`\r\n\r\n---\r\n\r\n## 10. Account deletion ordering (Auth вҶ’ Firestore permission loss)\r\n\r\n**Problem:** Calling `user.delete()` signs out Firebase Auth immediately вҖ” any subsequent Firestore deletes fail with PERMISSION_DENIED.\r\n\r\n**Fix:** Delete Firestore docs first (while still authed), then Auth. Save `uid` in a local variable to keep the reference after auth is gone.\r\n\r\n**Related:** `lib/screens/sub/setting_screen.dart`, `lib/screens/auth/profile_edit_screen.dart`\r\n\r\n---\r\n\r\n## 11. Riverpod AsyncNotifier race condition (invalidateSelf)\r\n\r\n**Problem:** `ExamsNotifier.add()` / `delete()` called `ref.invalidateSelf()` to reload вҖ” provider tests flaked intermittently. Invalidate is async, so a following `read()` returned the *old* state.\r\n\r\n**Fix:** Inside mutators, `final current = await future;` вҶ’ mutate store вҶ’ `state = AsyncData([...current, exam])`. Removed `invalidateSelf`. Applied the same pattern to `GoalsNotifier` / `JeongsiGoalsNotifier`.\r\n\r\n**Related:** `lib/providers/grade_provider.dart`, `test/grade_provider_test.dart`\r\n\r\n---\r\n\r\n## 12. Non-deterministic widget test timer leak\r\n\r\n**Problem:** `_LoadingExamsNotifier` mocked eternal loading with `await Future.delayed(Duration(seconds: 30))` вҖ” `flutter test` failed \"A Timer is still pending even after the widget tree was disposed\".\r\n\r\n**Fix:** `Completer<List<Exam>>` pattern вҖ” the Future can be externally completed, so tests explicitly `complete()` at teardown. Provider tests use `addTearDown(container.dispose)` to plug container leaks.\r\n\r\n**Related:** `test/grade_screen_widget_test.dart`, `test/helpers/`\r\n\r\n---\r\n\r\n## 13. StatefulWidget 1,400+ lines вҶ’ Stateless composition (refactoring)\r\n\r\n**Problem:** `post_detail_screen.dart` (1,442), `admin_screen.dart` (1,071), `write_post_screen.dart` (1,119), `timetable_view_screen.dart` (943) вҖ” all sub-widgets were private classes / `_buildXxx` methods in one file. Readability, reusability, testability all suffered; even `grep` for reuse points was hard.\r\n\r\n**Fix:** Two patterns:\r\n1. **Private class вҶ’ public StatelessWidget** вҖ” extracted `_PollCard` / `_VoteButton` / `_CommentItem` / `_EventAttachCard` from `post_detail_screen`, 5 tab classes from `admin_screen`, dialogs / Painters from `timetable_view`, etc. Moved to separate files, dropped `_` prefix.\r\n2. **State-dependent builder methods вҶ’ callback-parameter widgets** вҖ” `write_post_screen`'s `_buildEventForm` / `_buildPollForm` / `_buildImageSection` accessed state directly; converted to Stateless widgets that accept explicit callbacks (`onPickDate`, `onAddOption`, `onReorder`, вҖҰ).\r\n\r\n**Outcome:** 4 screens **4,575 вҶ’ 1,919 lines (-58%)** вҖ” `post_detail` 545, `write_post` 700, `timetable_view` 588, `admin_screen` 86 (+ `admin/` 5 files, 1,123 total). Split into 16 widget modules (`widgets/` 9 + `write_widgets/` 7); all 563 Flutter tests still passing (zero regression).\r\n\r\n**Related:** `lib/screens/board/widgets/`, `lib/screens/board/write_widgets/`, `lib/screens/board/admin/`, `lib/screens/sub/timetable_widgets/`\r\n\r\n---\r\n\r\n## 14. Repository + GetIt gradual migration\r\n\r\n**Problem:** `AuthService` / `GradeManager` were static methods scattered across 25+ call sites вҖ” switching to DI in one shot meant editing everything at once, regression risk high.\r\n\r\n**Fix:** Introduced abstract `AuthRepository` / `GradeRepository` interfaces with `FirebaseAuthRepository` / `LocalGradeRepository` delegating to the old static methods. New code pulls via `GetIt.I<AuthRepository>()`; old call sites left untouched. Tests inject mocks through `setupServiceLocator()` / `resetServiceLocator()` вҶ’ incremental migration + backward compatibility simultaneously.\r\n\r\n**Related:** `test/auth_repository_test.dart`, `test/auth_service_test.dart`, `test/grade_manager_test.dart`\r\n\r\n---\r\n\r\n## 15. Zero-read permission checks вҖ” custom claims migration\r\n\r\n**Problem:** Security rules called `get(/databases/.../users/$uid).data.role` on every request вҖ” every post read incurred one extra read for permission checking. Expanding the role model to 4 tiers (`moderator`/`auditor`/`manager`/`admin`) would scale that overhead with traffic.\r\n\r\n**Fix:**\r\n1. Bake `role` / `approved` into the Firebase Auth ID token via **custom claims** вҶ’ security rules read `request.auth.token.role` directly.\r\n2. `onUserUpdated` Cloud Function trigger detects `role` field changes and calls `setCustomUserClaims` вҶ’ permission updates propagate into the next token immediately.\r\n3. Client calls `getIdTokenResult(true)` right after a role change to force-refresh.\r\n4. For the existing 28 users, a one-shot `scripts/backfill-claims.js` (local admin SDK) iterates the `users` collection. Simple loop, but a wrong run wipes everyone's permissions вҖ” so dry-run first.\r\n\r\n**Outcome:** Zero extra Firestore reads for permission checks on post / comment fetches. Costs scale with traffic, not user count. Added 51 rules tests covering the 4-tier matrix.\r\n\r\n**Related:** `firestore.rules`, `functions/index.js` (`onUserUpdated`), `scripts/backfill-claims.js`, `tests/firestore-rules/test/rules.test.js`\r\n\r\n---\r\n\r\n## 16. PIPA TTL data lifecycle automation\r\n\r\n**Problem:** Korea's Personal Information Protection Act (PIPA) requires expired data to be destroyed automatically. The \"Delete\" button is the easy part вҖ” the hard part is making **expired data disappear without intervention**. A system that needs weekly hand-cleanup eventually doesn't get cleaned.\r\n\r\n**Fix:**\r\n1. Every new collection (`appeals`, `data_requests`, `admin_logs`) carries a mandatory `expiresAt: Timestamp` field.\r\n2. Bound a Firestore TTL policy to `expiresAt` вҶ’ Firestore deletes the document on its own once the timestamp passes (~once a day, non-deterministic but sufficient for PIPA).\r\n3. Retention is policy-driven and tiered: `appeals` 90d / `data_requests` 30d / `admin_logs` 1y.\r\n4. Data export runs async via the `createDataExport` Cloud Function вҖ” bundles the user's data into JSON, uploads to Storage, emails the download link. `purgeExpiredExports` runs the daily sweep.\r\n5. Security rules enforce `expiresAt` field presence/type вҶ’ blocks writes that would slip past TTL.\r\n\r\n**Outcome:** Data disappears on policy without anyone touching it. Took ~75 files / ~7,000 lines (auth guard, login flow, 240 i18n keys, 4 admin pages, rules tests, etc.) вҖ” satisfying a few statutory clauses cascaded through every layer of the stack.\r\n\r\n**Related:** `firestore.rules`, `firestore.indexes.json`, `functions/index.js` (`createDataExport` / `purgeExpiredExports`), `lib/screens/{appeal,data_request,community_rules}/`, `lib/services/verification_guard.dart`\r\n\r\n---\r\n\r\n## See Also\r\n- [Architecture Decisions](./architecture-decisions_en.md) вҖ” design background for each challenge\r\n- [Testing Strategy](./testing_en.md) вҖ” regression-proof test layers\r\n","guides/testing.md":"# н…ҢмҠӨнҠё м „лһө\r\n\r\n> English: [testing_en.md](./testing_en.md)\r\n\r\n4кі„мёө н…ҢмҠӨнҠё мІҙкі„ (Unit + Provider + Widget + Golden + Firestore Rules)лЎң мҙқ **597к°ң** н…ҢмҠӨнҠёлҘј мң м§Җн•©лӢҲлӢӨ.\r\n\r\n## н•ңлҲҲм—җ ліҙкё°\r\n\r\n| кі„мёө | к°ңмҲҳ | нҠ№м§• |\r\n|---|---|---|\r\n| `test()` лӢЁмң„ | 440 | лӘЁлҚё/мң нӢё/нҢҢм„ң/Provider/Repository/Golden нҸ¬н•Ё вҖ” мҷёл¶Җ мқҳмЎҙ 0 |\r\n| `testWidgets()` мң„м Ҝ | 123 | `ProviderScope.overrides` + Mock Notifier кё°л°ҳ UI кІҖмҰқ (a11y нҸ¬н•Ё) |\r\n| Integration | 4 | `integration_test/` вҖ” м•ұ л„Өл№„кІҢмқҙм…ҳ E2E |\r\n| Firestore Rules | 34 | `@firebase/rules-unit-testing` + м—җл®¬л Ҳмқҙн„° |\r\n| **н•©кі„** | **563 Flutter + 34 Rules = 597** | |\r\n\r\n> мёЎм •: `grep -rE \"^\\s*test\\(\" test/` = 440, `grep -rE \"^\\s*testWidgets\\(\" test/` = 123, `integration_test/` 4к°ң.\r\n\r\n## н…ҢмҠӨнҠё нҢҢмқј кө¬мЎ°\r\n\r\n```\r\ntest/\r\nв”ңв”Җв”Җ auth_repository_test.dart        # Repository нҢЁн„ҙ + Mock мЈјмһ…\r\nв”ңв”Җв”Җ auth_service_test.dart\r\nв”ңв”Җв”Җ board_categories_test.dart\r\nв”ңв”Җв”Җ chat_id_test.dart\r\nв”ңв”Җв”Җ comment_input_bar_test.dart      # Widget вҖ” a11y н…ҢмҠӨнҠё нҸ¬н•Ё\r\nв”ңв”Җв”Җ conflict_dialog_test.dart\r\nв”ңв”Җв”Җ dday_manager_test.dart\r\nв”ңв”Җв”Җ dday_manager_extended_test.dart\r\nв”ңв”Җв”Җ deep_link_service_test.dart\r\nв”ңв”Җв”Җ delete_alert_dialog_test.dart\r\nв”ңв”Җв”Җ error_snackbar_test.dart\r\nв”ңв”Җв”Җ error_view_test.dart\r\nв”ңв”Җв”Җ event_attach_card_test.dart\r\nв”ңв”Җв”Җ exceptions_test.dart\r\nв”ңв”Җв”Җ fcm_payload_test.dart\r\nв”ңв”Җв”Җ grade_manager_test.dart\r\nв”ңв”Җв”Җ grade_provider_test.dart         # Provider test\r\nв”ңв”Җв”Җ grade_screen_widget_test.dart    # Widget test\r\nв”ңв”Җв”Җ input_sanitizer_test.dart\r\nв”ңв”Җв”Җ link_card_a11y_test.dart         # Widget вҖ” a11y м „мҡ©\r\nв”ңв”Җв”Җ meal_api_test.dart               # Unit (Completer н”„лҰ¬нҺҳм№ҳ кІҖмҰқ)\r\nв”ңв”Җв”Җ meal_card_allergy_test.dart\r\nв”ңв”Җв”Җ meal_data_api_test.dart\r\nв”ңв”Җв”Җ meal_subject_model_test.dart\r\nв”ңв”Җв”Җ meal_test.dart\r\nв”ңв”Җв”Җ network_status_test.dart\r\nв”ңв”Җв”Җ notice_api_test.dart\r\nв”ңв”Җв”Җ notice_data_api_test.dart\r\nв”ңв”Җв”Җ offline_queue_manager_test.dart\r\nв”ңв”Җв”Җ poll_card_test.dart\r\nв”ңв”Җв”Җ post_card_golden_test.dart       # Golden\r\nв”ңв”Җв”Җ responsive_test.dart\r\nв”ңв”Җв”Җ schedule_data_test.dart\r\nв”ңв”Җв”Җ search_history_service_test.dart\r\nв”ңв”Җв”Җ search_tokens_test.dart          # Unit (2-gram нҶ нҒ¬лӮҳмқҙм Җ)\r\nв”ңв”Җв”Җ secure_storage_service_test.dart # Unit (migrateFromPlain)\r\nв”ңв”Җв”Җ setting_data_test.dart\r\nв”ңв”Җв”Җ skeleton_test.dart\r\nв”ңв”Җв”Җ timetable_api_test.dart\r\nв”ңв”Җв”Җ timetable_cell_test.dart\r\nв”ңв”Җв”Җ timetable_data_api_test.dart\r\nв”ңв”Җв”Җ timetable_parse_test.dart\r\nв”ңв”Җв”Җ today_banner_test.dart\r\nв”ңв”Җв”Җ user_profile_test.dart\r\nв”ңв”Җв”Җ version_compare_test.dart\r\nв”ңв”Җв”Җ vote_button_test.dart            # Widget вҖ” a11y + лҸҷмһ‘ н…ҢмҠӨнҠё\r\nв”ңв”Җв”Җ widget_service_test.dart\r\nв”ңв”Җв”Җ widget_service_logic_test.dart\r\nв”ңв”Җв”Җ write_category_selector_test.dart\r\nв”ңв”Җв”Җ write_toggle_row_test.dart\r\nв”ңв”Җв”Җ helpers/                         # Mock кіөнҶө мң нӢё\r\nв””в”Җв”Җ goldens/                         # Golden мҠӨлғ…мғ· PNG\r\n\r\ntests/firestore-rules/               # Rules м—җл®¬л Ҳмқҙн„° н…ҢмҠӨнҠё (Node.js)\r\nintegration_test/                    # e2e (м„ нғқ)\r\n```\r\n\r\n> мҙқ 53к°ң н…ҢмҠӨнҠё нҢҢмқј (helpers/, goldens/ л””л үн„°лҰ¬ м ңмҷё).\r\n\r\n## кі„мёөлі„ мғҒм„ё\r\n\r\n### 1. Unit (89к°ң)\r\n- лӘЁлҚё м§Ғл ¬нҷ” (`freezed` / `json_serializable`), л“ұкёү ліҖнҷҳ, кёүмӢқ нҢҢмӢұ\r\n- мӢңк°„н‘ң көҗмӢң кі„мӮ°, кІҖмғү нҶ нҒ¬лӮҳмқҙм Җ (2-gram), кІҖмғү кё°лЎқ(SharedPreferences)\r\n- secure_storage л§Ҳмқҙк·ёл Ҳмқҙм…ҳ\r\n- мҷёл¶Җ мқҳмЎҙ м—ҶмқҢ (нҢҢмқј/л„ӨнҠёмӣҢнҒ¬/мӢңк°„ лӘЁнӮ№)\r\n\r\n### 2. Provider (17к°ң)\r\n- `ProviderContainer` мғқм„ұ вҶ’ Notifier `.future` await вҶ’ state лӢЁм–ё\r\n- **мҳҲмӢң**:\r\n  ```dart\r\n  final container = ProviderContainer(overrides: [\r\n    gradeRepositoryProvider.overrideWithValue(FakeGradeRepository()),\r\n  ]);\r\n  addTearDown(container.dispose);\r\n\r\n  final exams = await container.read(examsProvider.future);\r\n  expect(exams, isNotEmpty);\r\n  ```\r\n- `addTearDown(container.dispose)`лЎң ProviderContainer лҲ„мҲҳ л°©м§Җ ([кё°мҲ кіјм ң #12](./technical-challenges.md#12-мң„м Ҝ-н…ҢмҠӨнҠёмқҳ-л№„кІ°м •м Ғ-timer-leak))\r\n\r\n### 3. Widget (123 testWidgets)\r\n- `ProviderScope(overrides: [...])`лЎң Mock Notifier мЈјмһ…\r\n- лЎңл”© / м—җлҹ¬ / л№Ҳ мғҒнғң / м„ұкіө л¶„кё° лӘЁл‘җ кІҖмҰқ\r\n- **Timer Leak л°©м§Җ**: мҳҒкө¬ лЎңл”©мқҖ `Completer.future` лЎң мӢңл®¬, н…ҢмҠӨнҠё лҒқм—җ `complete()`\r\n- **м ‘к·јм„ұ(a11y) н…ҢмҠӨнҠё**: `link_card_a11y_test.dart`, `vote_button_test.dart` (a11y к·ёлЈ№), `comment_input_bar_test.dart` (a11y к·ёлЈ№) вҖ” Semantics лқјлІЁ, нғӯ мҲңм„ң, мҠӨнҒ¬лҰ°лҰ¬лҚ” нҳёнҷҳ кІҖмҰқ\r\n\r\n### 4. Golden (5к°ң)\r\n- `post_card_golden_test.dart` вҖ” PostCard 5мў… ліҖмў… (кё°ліё/мўӢм•„мҡ”/кіөм§Җ/+N badge/мқөлӘ…+л§ӨлӢҲм Җл·°)\r\n- `fake_cloud_firestore`лЎң Mock Firestore мЈјмһ…\r\n- **Tolerance comparator**лЎң н”Ңлһ«нҸј нҸ°нҠё л ҢлҚ” лҜём„ё м°Ёмқҙ нқЎмҲҳ\r\n- м—…лҚ°мқҙнҠё: `flutter test --update-goldens`\r\n\r\n### 5. Repository (8к°ң)\r\n- `setupServiceLocator()` + Mock кө¬нҳ„мІҙ мЈјмһ… вҶ’ м •мғҒ/мҳҲмҷё л¶„кё° кІҖмҰқ\r\n- DI м җм§„м Ғ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ лҚ°лӘЁ ([ADR-07](./architecture-decisions.md#adr-07-di-getit--м¶”мғҒ-repository))\r\n\r\n### 6. Firestore Rules (34к°ң)\r\n- `tests/firestore-rules/` л””л үн„°лҰ¬, Node.js\r\n- `@firebase/rules-unit-testing` лқјмқҙлёҢлҹ¬лҰ¬ + Firestore м—җл®¬л Ҳмқҙн„°\r\n- мӢңлӮҳлҰ¬мҳӨ:\r\n  - к¶Ңн•ң мҡ°нҡҢ (л№„мһ‘м„ұмһҗмқҳ кёҖ мҲҳм •, нғҖмқё н”„лЎңн•„ мҲҳм • л“ұ)\r\n  - м№ҙмҡҙн„° Вұ1 delta кІҖмҰқ (`validCounterDelta`)\r\n  - н•„л“ң мң„мЎ° (л№„мһ‘м„ұмһҗк°Җ `likes` мҷё н•„л“ң мҲҳм • мӢңлҸ„)\r\n  - мұ„нҢ… м°ём—¬мһҗ м•„лӢҢ мӮ¬мҡ©мһҗмқҳ read/write м°ЁлӢЁ\r\n  - л©”мӢңм§Җ лӮҙмҡ© мҲҳм • мӢңлҸ„ м°ЁлӢЁ (мӮӯм ң н•„л“ңл§Ң н—Ҳмҡ©)\r\n\r\n## мӢӨн–үлІ•\r\n\r\n### Flutter н…ҢмҠӨнҠё\r\n```bash\r\n# м „мІҙ\r\nflutter test\r\n\r\n# м»ӨлІ„лҰ¬м§Җ нҸ¬н•Ё\r\nflutter test --coverage\r\n\r\n# Golden м—…лҚ°мқҙнҠё\r\nflutter test --update-goldens\r\n\r\n# нҠ№м • нҢҢмқј\r\nflutter test test/search_tokens_test.dart\r\n\r\n# нҠ№м • к·ёлЈ№/мқҙлҰ„\r\nflutter test --name \"2-gram\"\r\n```\r\n\r\n### Firestore Rules н…ҢмҠӨнҠё\r\n```bash\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\n```\r\n\r\n### Integration н…ҢмҠӨнҠё (м„ нғқ)\r\n```bash\r\nflutter test integration_test/\r\n```\r\n\r\n## Mock / Fake нҢЁн„ҙ\r\n\r\n| лҢҖмғҒ | л°©мӢқ |\r\n|---|---|\r\n| Firestore | `fake_cloud_firestore` |\r\n| Firebase Auth | Mock + `setupServiceLocator` |\r\n| Repository | Abstract + н…ҢмҠӨнҠёмҡ© кө¬нҳ„мІҙ (GetIt мЈјмһ…) |\r\n| AsyncNotifier | `ProviderScope.overrides` + Mock Notifier |\r\n| Timer | `Completer` нҢЁн„ҙ ([кё°мҲ кіјм ң #12](./technical-challenges.md#12-мң„м Ҝ-н…ҢмҠӨнҠёмқҳ-л№„кІ°м •м Ғ-timer-leak)) |\r\n| HTTP | н…ҢмҠӨнҠёмҡ© `Client` мҳӨлІ„лқјмқҙл“ң |\r\n\r\n## CI м—°кі„\r\n\r\nл‘җ GitHub Actions мӣҢнҒ¬н”ҢлЎңмҡ°к°Җ лі‘л ¬ мӢӨн–ү:\r\n\r\n1. `.github/workflows/flutter.yml` вҖ” `flutter analyze` + `flutter test --coverage` + Codecov м—…лЎңл“ң + master push мӢң APK л№Ңл“ң\r\n2. `.github/workflows/firestore-rules.yml` вҖ” `firebase emulators:exec ... npm test` (Node 20, Java 21, path нҠёлҰ¬кұ°)\r\n\r\nмғҒм„ёлҠ” [cicd-setup.md](./cicd-setup.md).\r\n\r\n## мӢӨн–ү мӢңк°„ (мӢӨмёЎ)\r\n- Flutter м „мІҙ (`flutter test`): 563к°ң (`test` + `testWidgets`), лЎңм»¬ лЁёмӢ  кё°мӨҖ мҲҳ мҙҲ~мҲҳмӢӯ мҙҲ\r\n- Integration (`integration_test/`): 4к°ң, л””л°”мқҙмҠӨ/м—җл®¬л Ҳмқҙн„° н•„мҡ”\r\n- Rules (`firebase emulators:exec ... npm test`): 34к°ң, Java 21 + Node 20\r\n\r\n## PIPA + 4лӢЁкі„ м—ӯн•  нҶөн•© мӢңлӮҳлҰ¬мҳӨ (мҲҳлҸҷ)\r\n\r\nмһҗлҸҷнҷ” н…ҢмҠӨнҠё лҢҖмғҒмқҙ м•„лӢҲлқј **л°°нҸ¬ м „ мҲҳлҸҷ м җкІҖмҡ©** мІҙнҒ¬лҰ¬мҠӨнҠёмһ…лӢҲлӢӨ. мӢӨм ң кі„м • 4мў…(admin / manager / moderator / auditor / мқјл°ҳ)мқ„ мӨҖл№„н•ҙ м§„н–үн•©лӢҲлӢӨ.\r\n\r\n### к°Җмһ… / лҸҷмқҳ н”ҢлЎңмҡ°\r\n- [ ] мӢ к·ң к°Җмһ… вҖ” м•ҪкҙҖ + к°ңмқём •ліҙ + 14м„ё мқҙмғҒ лӘЁл‘җ мІҙнҒ¬ вҶ’ к°Җмһ… м§„н–ү\r\n- [ ] м•ҪкҙҖ / к°ңмқём •ліҙ лҜёлҸҷмқҳ вҶ’ к°Җмһ… лІ„нҠј л№„нҷңм„ұ\r\n- [ ] 14м„ё лҜёл§Ң мІҙнҒ¬ вҶ’ к°Җмһ… м°ЁлӢЁ л©”мӢңм§Җ\r\n\r\n### м •м§Җ + мқҙмқҳм ңкё° (`appeals`)\r\n- [ ] managerк°Җ мқјл°ҳ мӮ¬мҡ©мһҗлҘј 24мӢңк°„ м •м§Җ вҶ’ м •м§Җ мӮ¬мҡ©мһҗк°Җ кёҖ/лҢ“кёҖ мһ‘м„ұ мӢңлҸ„ вҶ’ м°ЁлӢЁ\r\n- [ ] м •м§Җ мӮ¬мҡ©мһҗк°Җ м•ұ `/appeal_screen` вҶ’ мӮ¬мң  мһ…л Ҙ нӣ„ м ңм¶ң вҶ’ `appeals` м»¬л үм…ҳ мӢ к·ң л¬ём„ң (`status: pending`)\r\n- [ ] managerк°Җ Admin Web `/appeals`м—җм„ң кІҖнҶ  вҶ’ мҠ№мқё вҶ’ мӮ¬мҡ©мһҗ `suspendedUntil` н•ҙм ң + `appeals.status = approved`\r\n- [ ] auditor кі„м •мңјлЎң `/appeals` м§„мһ… вҶ’ лӘ©лЎқ мқҪкё° к°ҖлҠҘ, м•Ўм…ҳ лІ„нҠј л№„н‘ңмӢң\r\n\r\n### лҚ°мқҙн„° к¶ҢлҰ¬ (`data_requests`)\r\n- [ ] мӮ¬мҡ©мһҗк°Җ м•ұм—җм„ң лҚ°мқҙн„° мҡ”мІӯ м ңм¶ң (м—ҙлһҢ / мқҙм „ / мӮӯм ң) вҶ’ `data_requests` мӢ к·ң л¬ём„ң\r\n- [ ] managerк°Җ Admin Web `/data-requests`м—җм„ң мІҳлҰ¬ вҶ’ Functionsк°Җ ZIP мғқм„ұ + м„ңлӘ… URL л°ҳнҷҳ вҶ’ `status: completed`\r\n- [ ] мӮ¬мҡ©мһҗ мёЎм—җм„ң лӢӨмҡҙлЎңл“ң л§ҒнҒ¬ лҸҷмһ‘ нҷ•мқё, 7мқј л§ҢлЈҢ нӣ„ л§ҒнҒ¬ л¬ҙнҡЁ нҷ•мқё\r\n\r\n### 4лӢЁкі„ м—ӯн•  к¶Ңн•ң л§ӨнҠёлҰӯмҠӨ\r\n- [ ] **moderator**: `/posts` мӮӯм ң к°ҖлҠҘ, `/comments` мӮӯм ң к°ҖлҠҘ, `/users`/`/dashboard`/`/feedbacks` л©”лүҙ л№„н‘ңмӢң\r\n- [ ] **auditor**: `/admin-logs`, `/dashboard`, `/crashes`, `/feedbacks`, `/function-logs` лӘЁл‘җ мқҪкё° к°ҖлҠҘ / м“°кё° мӢңлҸ„ мӢң к¶Ңн•ң мҳӨлҘҳ\r\n- [ ] **manager**: `/users` м—ӯн•  ліҖкІҪ к°ҖлҠҘ (admin мһ„лӘ… м ңмҷё), м •м§Җ/мҠ№мқё/мӮӯм ң к°ҖлҠҘ\r\n- [ ] **admin**: лӢӨлҘё мӮ¬мҡ©мһҗм—җкІҢ admin мһ„лӘ… к°ҖлҠҘ, мһҗмӢ мқҳ admin н•ҙм ң лІ„нҠј л…ём¶ң нҷ•мқё\r\n\r\n### `admin_logs` кё°лЎқ\r\n- [ ] к°Ғ м•Ўм…ҳ нӣ„ Admin Web `/admin-logs`м—җм„ң н•ҙлӢ№ н•ӯлӘ© нҷ•мқё:\r\n  - `change_role` (with `previousRole`/`newRole`), `approve_user`, `reject_user`, `suspend_user` (with `hours`), `unsuspend_user`, `delete_user`, `delete_post`, `delete_comment`, `delete_feedback`\r\n- [ ] `expiresAt` н•„л“ңк°Җ `createdAt + 30мқј`лЎң м •нҷ•нһҲ м„Өм •\r\n- [ ] (Blaze н•ңм •) 30мқј кІҪкіј н•ӯлӘ©мқҙ TTLлЎң мһҗлҸҷ мӮӯм ңлҗҳлҠ”м§Җ нҷ•мқё\r\n\r\n### м»Өл®ӨлӢҲнӢ° к·ңм • (`community_rules`)\r\n- [ ] managerк°Җ Admin Web `/community-rules`м—җм„ң мӢ к·ң лІ„м „ л°ңн–ү вҶ’ `community_rules` мӢ к·ң л¬ём„ң + лІ„м „ мҰқк°Җ\r\n- [ ] мӮ¬мҡ©мһҗ м•ұмқҙ мғҲ лІ„м „ к°җм§Җ вҶ’ мһ¬лҸҷмқҳ лӢӨмқҙм–јлЎңк·ё л…ём¶ң вҶ’ лҸҷмқҳ мӢң лӢӨмқҢ мӮ¬мҡ© н—Ҳмҡ©\r\n- [ ] лҜёлҸҷмқҳ мӢң л©”мқё кё°лҠҘ м°ЁлӢЁ лҸҷмһ‘\r\n\r\nмғҒм„ё к¶Ңн•ң л§ӨнҠёлҰӯмҠӨ: [security.md](./security.md), м•Ўм…ҳ лЎңк·ё мҠӨнӮӨл§Ҳ: [admin-features.md](../features/admin-features.md#к°җмӮ¬-лЎңк·ё-admin_logs).\r\n\r\n## мғҲ н…ҢмҠӨнҠё м¶”к°Җ мӢң\r\n- мғҲ Riverpod Provider вҶ’ Provider test н•„мҲҳ\r\n- мғҲ Firestore н•„л“ң/к·ңм№ҷ ліҖкІҪ вҶ’ Rules test н•„мҲҳ (нҡҢк·Җ л°©м§Җ)\r\n- мғҲ кІҢмӢңнҢҗ UI ліҖмў… вҶ’ Golden test кі л Ө\r\n- лӘЁл“  л№„лҸҷкё° лЎңм§ҒмқҖ `Completer` / `addTearDown`мңјлЎң leak л°©м§Җ\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [CI/CD м„Өм •](./cicd-setup.md)\r\n- [м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ](./architecture-decisions.md)\r\n- [кё°мҲ  кіјм ң](./technical-challenges.md)\r\n","guides/testing_en.md":"# Testing Strategy\r\n\r\n> н•ңкөӯм–ҙ: [testing.md](./testing.md)\r\n\r\nA 4-layer test setup (Unit + Provider + Widget + Golden + Firestore Rules), totalling **597 tests**.\r\n\r\n## Snapshot\r\n\r\n| Layer | Count | Characteristic |\r\n|---|---|---|\r\n| `test()` unit | 440 | models / utils / parsers / Provider / Repository / Golden вҖ” zero external deps |\r\n| `testWidgets()` widget | 123 | UI verification with `ProviderScope.overrides` + mock notifier (incl. a11y) |\r\n| Integration | 4 | `integration_test/` вҖ” app-level navigation E2E |\r\n| Firestore Rules | 34 | `@firebase/rules-unit-testing` + emulator |\r\n| **Total** | **563 Flutter + 34 Rules = 597** | |\r\n\r\n> Measured: `grep -rE \"^\\s*test\\(\" test/` = 440, `grep -rE \"^\\s*testWidgets\\(\" test/` = 123, `integration_test/` = 4.\r\n\r\n## Test Layout\r\n\r\n```\r\ntest/\r\nв”ңв”Җв”Җ auth_repository_test.dart        # repository + mock injection\r\nв”ңв”Җв”Җ auth_service_test.dart\r\nв”ңв”Җв”Җ board_categories_test.dart\r\nв”ңв”Җв”Җ chat_id_test.dart\r\nв”ңв”Җв”Җ comment_input_bar_test.dart      # widget вҖ” incl. a11y tests\r\nв”ңв”Җв”Җ conflict_dialog_test.dart\r\nв”ңв”Җв”Җ dday_manager_test.dart\r\nв”ңв”Җв”Җ dday_manager_extended_test.dart\r\nв”ңв”Җв”Җ deep_link_service_test.dart\r\nв”ңв”Җв”Җ delete_alert_dialog_test.dart\r\nв”ңв”Җв”Җ error_snackbar_test.dart\r\nв”ңв”Җв”Җ error_view_test.dart\r\nв”ңв”Җв”Җ event_attach_card_test.dart\r\nв”ңв”Җв”Җ exceptions_test.dart\r\nв”ңв”Җв”Җ fcm_payload_test.dart\r\nв”ңв”Җв”Җ grade_manager_test.dart\r\nв”ңв”Җв”Җ grade_provider_test.dart         # provider test\r\nв”ңв”Җв”Җ grade_screen_widget_test.dart    # widget test\r\nв”ңв”Җв”Җ input_sanitizer_test.dart\r\nв”ңв”Җв”Җ link_card_a11y_test.dart         # widget вҖ” a11y only\r\nв”ңв”Җв”Җ meal_api_test.dart               # unit (Completer prefetch)\r\nв”ңв”Җв”Җ meal_card_allergy_test.dart\r\nв”ңв”Җв”Җ meal_data_api_test.dart\r\nв”ңв”Җв”Җ meal_subject_model_test.dart\r\nв”ңв”Җв”Җ meal_test.dart\r\nв”ңв”Җв”Җ network_status_test.dart\r\nв”ңв”Җв”Җ notice_api_test.dart\r\nв”ңв”Җв”Җ notice_data_api_test.dart\r\nв”ңв”Җв”Җ offline_queue_manager_test.dart\r\nв”ңв”Җв”Җ poll_card_test.dart\r\nв”ңв”Җв”Җ post_card_golden_test.dart       # golden\r\nв”ңв”Җв”Җ responsive_test.dart\r\nв”ңв”Җв”Җ schedule_data_test.dart\r\nв”ңв”Җв”Җ search_history_service_test.dart\r\nв”ңв”Җв”Җ search_tokens_test.dart          # unit (2-gram tokenizer)\r\nв”ңв”Җв”Җ secure_storage_service_test.dart # unit (migrateFromPlain)\r\nв”ңв”Җв”Җ setting_data_test.dart\r\nв”ңв”Җв”Җ skeleton_test.dart\r\nв”ңв”Җв”Җ timetable_api_test.dart\r\nв”ңв”Җв”Җ timetable_cell_test.dart\r\nв”ңв”Җв”Җ timetable_data_api_test.dart\r\nв”ңв”Җв”Җ timetable_parse_test.dart\r\nв”ңв”Җв”Җ today_banner_test.dart\r\nв”ңв”Җв”Җ user_profile_test.dart\r\nв”ңв”Җв”Җ version_compare_test.dart\r\nв”ңв”Җв”Җ vote_button_test.dart            # widget вҖ” a11y + behavior\r\nв”ңв”Җв”Җ widget_service_test.dart\r\nв”ңв”Җв”Җ widget_service_logic_test.dart\r\nв”ңв”Җв”Җ write_category_selector_test.dart\r\nв”ңв”Җв”Җ write_toggle_row_test.dart\r\nв”ңв”Җв”Җ helpers/                         # common mock utils\r\nв””в”Җв”Җ goldens/                         # golden PNG snapshots\r\n\r\ntests/firestore-rules/               # rules emulator (Node.js)\r\nintegration_test/                    # e2e (optional)\r\n```\r\n\r\n> 53 test files total (excluding helpers/ and goldens/ directories).\r\n\r\n## Layer Details\r\n\r\n### 1. Unit (89)\r\n- Model serialization (`freezed` / `json_serializable`), grade conversion, meal parsing\r\n- Timetable period math, search tokenizer (2-gram), search history (SharedPreferences)\r\n- secure_storage migration\r\n- No external deps вҖ” file/network/time mocked\r\n\r\n### 2. Provider (17)\r\n- Build `ProviderContainer` вҶ’ `await notifier.future` вҶ’ assert state\r\n- **Example**:\r\n  ```dart\r\n  final container = ProviderContainer(overrides: [\r\n    gradeRepositoryProvider.overrideWithValue(FakeGradeRepository()),\r\n  ]);\r\n  addTearDown(container.dispose);\r\n\r\n  final exams = await container.read(examsProvider.future);\r\n  expect(exams, isNotEmpty);\r\n  ```\r\n- `addTearDown(container.dispose)` prevents ProviderContainer leaks ([Technical Challenge #12](./technical-challenges_en.md#12-non-deterministic-widget-test-timer-leak))\r\n\r\n### 3. Widget (123 testWidgets)\r\n- Inject mock notifiers via `ProviderScope(overrides: [...])`\r\n- Cover loading / error / empty / success branches\r\n- **Avoid timer leaks**: simulate indefinite loading with `Completer.future`, `complete()` at teardown\r\n- **Accessibility (a11y) tests**: `link_card_a11y_test.dart`, `vote_button_test.dart` (a11y group), `comment_input_bar_test.dart` (a11y group) -- verify Semantics labels, tab order, and screen reader compatibility\r\n\r\n### 4. Golden (5)\r\n- `post_card_golden_test.dart` вҖ” 5 PostCard variants (default / liked / notice / +N badge / anon+manager view)\r\n- Mock Firestore via `fake_cloud_firestore`\r\n- **Tolerance comparator** absorbs platform font-rendering differences\r\n- Refresh: `flutter test --update-goldens`\r\n\r\n### 5. Repository (8)\r\n- `setupServiceLocator()` + mocks, cover success/failure\r\n- Demonstrates gradual DI migration ([ADR-07](./architecture-decisions_en.md#adr-07-di-getit--abstract-repository))\r\n\r\n### 6. Firestore Rules (34)\r\n- `tests/firestore-rules/` directory, Node.js\r\n- `@firebase/rules-unit-testing` + Firestore emulator\r\n- Scenarios:\r\n  - Permission bypass (non-author editing posts, altering other profiles)\r\n  - Counter Вұ1 delta enforcement (`validCounterDelta`)\r\n  - Field forgery (non-author editing non-interaction fields)\r\n  - Non-participant read/write on chats\r\n  - Message content modification\r\n\r\n## How to Run\r\n\r\n### Flutter tests\r\n```bash\r\n# all\r\nflutter test\r\n\r\n# with coverage\r\nflutter test --coverage\r\n\r\n# update goldens\r\nflutter test --update-goldens\r\n\r\n# single file\r\nflutter test test/search_tokens_test.dart\r\n\r\n# filter\r\nflutter test --name \"2-gram\"\r\n```\r\n\r\n### Rules tests\r\n```bash\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\n```\r\n\r\n### Integration (optional)\r\n```bash\r\nflutter test integration_test/\r\n```\r\n\r\n## Mock / Fake Patterns\r\n\r\n| Target | Approach |\r\n|---|---|\r\n| Firestore | `fake_cloud_firestore` |\r\n| Firebase Auth | Mock + `setupServiceLocator` |\r\n| Repository | Abstract + test implementation (GetIt injection) |\r\n| AsyncNotifier | `ProviderScope.overrides` + mock notifier |\r\n| Timer | `Completer` pattern ([Technical Challenge #12](./technical-challenges_en.md#12-non-deterministic-widget-test-timer-leak)) |\r\n| HTTP | Test `Client` override |\r\n\r\n## CI Integration\r\n\r\nTwo GitHub Actions workflows run in parallel:\r\n\r\n1. `.github/workflows/flutter.yml` вҖ” `flutter analyze` + `flutter test --coverage` + Codecov + APK build on master push\r\n2. `.github/workflows/firestore-rules.yml` вҖ” `firebase emulators:exec ... npm test` (Node 20, Java 21, path-triggered)\r\n\r\nDetails вҶ’ [cicd-setup_en.md](./cicd-setup_en.md).\r\n\r\n## Measured Times\r\n- Flutter full suite (`flutter test`): 563 tests (`test` + `testWidgets`), local machine seconds~tens of seconds\r\n- Integration (`integration_test/`): 4 tests, device/emulator required\r\n- Rules: **~4s**, 34 tests, via `firebase emulators:exec`\r\n\r\n## PIPA + Four-Tier Role Integration Scenarios (manual)\r\n\r\nNot part of the automated test suite вҖ” this is a **pre-deploy manual checklist**. Prepare four test accounts (admin / manager / moderator / auditor / regular).\r\n\r\n### Signup / consent flow\r\n- [ ] New signup with terms + privacy + age-14 all checked вҶ’ signup proceeds\r\n- [ ] Terms / privacy unchecked вҶ’ signup button disabled\r\n- [ ] Under-14 checked вҶ’ signup blocked with message\r\n\r\n### Suspension + appeal (`appeals`)\r\n- [ ] Manager suspends a regular user for 24h вҶ’ user can't post or comment\r\n- [ ] Suspended user opens `/appeal_screen` вҶ’ submits reason вҶ’ new `appeals` doc (`status: pending`)\r\n- [ ] Manager reviews on Admin Web `/appeals` вҶ’ approve вҶ’ user's `suspendedUntil` cleared + `appeals.status = approved`\r\n- [ ] Auditor opens `/appeals` вҶ’ list visible, action buttons hidden\r\n\r\n### Data rights (`data_requests`)\r\n- [ ] User submits data request (access / portability / deletion) in-app вҶ’ new `data_requests` doc\r\n- [ ] Manager processes on Admin Web `/data-requests` вҶ’ Function returns ZIP + signed URL вҶ’ `status: completed`\r\n- [ ] User can download via the link; verify expiry after 7 days\r\n\r\n### Four-tier role permission matrix\r\n- [ ] **moderator**: can delete posts/comments; `/users`, `/dashboard`, `/feedbacks` menus hidden\r\n- [ ] **auditor**: can read `/admin-logs`, `/dashboard`, `/crashes`, `/feedbacks`, `/function-logs`; all writes blocked\r\n- [ ] **manager**: can change roles (except granting admin), suspend / approve / delete users\r\n- [ ] **admin**: can grant admin to others; sees a \"Remove Admin\" button on own row\r\n\r\n### `admin_logs` records\r\n- [ ] After each action confirm an entry on Admin Web `/admin-logs`:\r\n  - `change_role` (with `previousRole`/`newRole`), `approve_user`, `reject_user`, `suspend_user` (with `hours`), `unsuspend_user`, `delete_user`, `delete_post`, `delete_comment`, `delete_feedback`\r\n- [ ] `expiresAt` is exactly `createdAt + 30 days`\r\n- [ ] (Blaze only) Entries past 30 days are auto-deleted by the TTL policy\r\n\r\n### Community rules (`community_rules`)\r\n- [ ] Manager publishes a new version on Admin Web `/community-rules` вҶ’ new `community_rules` doc + version bump\r\n- [ ] App detects the new version вҶ’ re-consent dialog appears вҶ’ user agrees вҶ’ continues\r\n- [ ] Without agreeing, the main UI is gated\r\n\r\nPermission matrix details: [security_en.md](./security_en.md). Action log schema: [admin-features_en.md](../features/admin-features_en.md#audit-log-admin_logs).\r\n\r\n## When Adding Tests\r\n- New Riverpod provider вҶ’ provider test mandatory\r\n- New Firestore field/rule вҶ’ rules test mandatory (regression guard)\r\n- New board UI variant вҶ’ consider golden test\r\n- All async logic вҶ’ use `Completer` / `addTearDown` to prevent leaks\r\n\r\n## See Also\r\n- [CI/CD Setup](./cicd-setup_en.md)\r\n- [Architecture Decisions](./architecture-decisions_en.md)\r\n- [Technical Challenges](./technical-challenges_en.md)\r\n","main.md":"# Main\r\n\r\n> `lib/main.dart` вҖ” м•ұ м§„мһ…м җ, MainScreen\r\n\r\n---\r\n\r\n## `main()`\r\n\r\n```dart\r\nFuture<void> main() async\r\n```\r\n\r\n**м„ӨлӘ…**: м•ұ мҙҲкё°нҷ”лҘј мҲҳн–үн•Ё. мҶҚлҸ„ мөңм Ғнҷ”лҘј мң„н•ҙ `runApp` м „м—җлҠ” UIм—җ н•„мҲҳм Ғмқё мҙҲкё°нҷ”л§Ң мҲҳн–үн•ҳкі , лӮҳлЁём§ҖлҠ” `_deferredInit()`мңјлЎң л°ұк·ёлқјмҡҙл“ң мІҳлҰ¬н•Ё\r\n\r\n### runApp м „ (н•„мҲҳ мҙҲкё°нҷ”)\r\n\r\n1. **Firebase мҙҲкё°нҷ”**: мӨ‘ліө л°©м§Җ мІҙнҒ¬ нӣ„ мҙҲкё°нҷ”\r\n2. **Crashlytics**: FlutterError н•ёл“Өлҹ¬ + Firestore `crash_logs` м»¬л үм…ҳм—җ м—җлҹ¬ кё°лЎқ\r\n3. **Kakao SDK** мҙҲкё°нҷ”\r\n4. **Timezone** мҙҲкё°нҷ” (`Asia/Seoul`)\r\n5. `providerContainer = ProviderContainer()` мғқм„ұ\r\n6. **[SettingData](data/setting_data.md)** + **[ServiceLocator](data/service_locator.md)** лі‘л ¬ мҙҲкё°нҷ”:\r\n   ```dart\r\n   await Future.wait([SettingData().init(), setupServiceLocator()]);\r\n   ```\r\n7. `runApp` вҶ’ `UncontrolledProviderScope`лЎң к°җмӢј `HansolHighSchool` мң„м Ҝ мӢӨн–ү\r\n\r\n### runApp нӣ„ (`_deferredInit`)\r\n\r\nUIк°Җ лң¬ л’Ө `unawaited(_deferredInit())`лЎң лӮҳлЁём§Җ мҙҲкё°нҷ”лҘј л°ұк·ёлқјмҡҙл“ң мӢӨн–ү:\r\n\r\n1. **App Check** / **Performance Monitoring** вҖ” к°Ғк°Ғ `_safeInit()`мңјлЎң fire-and-forget\r\n1. **Analytics** вҖ” `SharedPreferences('analyticsEnabled')` к°’кіј лҰҙлҰ¬мҠӨ лӘЁл“ң м—¬л¶ҖлҘј нҷ•мқён•ҳм—¬, л‘җ мЎ°кұҙ лӘЁл‘җ м¶©мЎұн•  л•Ңл§Ң мҲҳм§‘ нҷңм„ұнҷ”. мқҙнӣ„ `AnalyticsService.logAppOpen(source: 'organic')` нҳём¶ң\r\n2. **кіјлӘ© лҚ°мқҙн„° н”„лҰ¬лЎңл“ң** (2н•ҷл…„, 3н•ҷл…„ лі‘л ¬)\r\n3. **лЎңм»¬ кёүмӢқ м•ҢлҰј** мҙҲкё°нҷ” + мҠӨмјҖмӨ„л§Ғ\r\n4. **FCM** мҙҲкё°нҷ” + **л”Ҙл§ҒнҒ¬** мҙҲкё°нҷ” + **мң„м Ҝ м„ңл№„мҠӨ** мҙҲкё°нҷ” (fire-and-forget)\r\n5. **[OfflineQueueManager](network/offline_queue_manager.md)** мҙҲкё°нҷ” вҖ” sqflite DB м—ҙкё° + л„ӨнҠёмӣҢнҒ¬ ліөмӣҗ лҰ¬мҠӨл„Ҳ л“ұлЎқ\r\n\r\n### `_safeInit`\r\n\r\n```dart\r\nFuture<void> _safeInit(String name, Future<void> Function() fn) async\r\n```\r\n\r\ntry/catch лһҳнҚј. к°ңлі„ мҙҲкё°нҷ” мӢӨнҢЁк°Җ м•ұ м „мІҙлҘј л§үм§Җ м•ҠлҸ„лЎқ м—җлҹ¬лҘј лЎңк·ёл§Ң лӮЁкё°кі  л¬ҙмӢңн•Ё\r\n\r\n---\r\n\r\n## м „м—ӯ мғҒнғң\r\n\r\n| ліҖмҲҳ | нғҖмһ… | мҡ©лҸ„ |\r\n|------|------|------|\r\n| `providerContainer` | `ProviderContainer` | л№„мң„м Ҝ мҪ”л“ңм—җм„ң Riverpod provider м ‘к·јмҡ© (login_screen, setting_screen л“ұ) |\r\n| `rootNavigatorKey` | `GlobalKey<NavigatorState>` | FCM л”Ҙл§ҒнҒ¬м—җм„ң Navigator м ‘к·јмҡ© |\r\n| `notificationStream` | `StreamController<String?>` | м•ҢлҰј нғӯ вҶ’ MealScreen м „нҷҳмҡ© |\r\n\r\n> кё°мЎҙ `themeNotifier`, `localeNotifier`, `appRefreshNotifier` (ValueNotifier 3к°ң)лҠ” Riverpod providerлЎң нҶөмқјлҗЁ вҶ’ [providers л¬ём„ң](providers/providers.md) м°ёмЎ°\r\n\r\n---\r\n\r\n## `HansolHighSchool` (лЈЁнҠё мң„м Ҝ)\r\n\r\n```dart\r\nclass HansolHighSchool extends ConsumerStatefulWidget\r\n```\r\n\r\n**м„ӨлӘ…**: м•ұмқҳ лЈЁнҠё мң„м Ҝ. н…Ңл§Ҳ лӘЁл“ң м „нҷҳкіј MaterialApp м„Өм •мқ„ лӢҙлӢ№\r\n\r\n1. `initState`м—җм„ң [`AnimatedAppColors`](styles/app_colors.md) мҙҲкё°нҷ”\r\n2. `_resolveIsDark`: ThemeMode.systemмқј л•Ң platformBrightness нҷ•мқё\r\n3. `build`м—җм„ң 3к°ң providerлҘј watch:\r\n\r\n```dart\r\nfinal mode = ref.watch(themeProvider);\r\nfinal locale = ref.watch(localeProvider);\r\nfinal refreshKey = ref.watch(appRefreshProvider);\r\n\r\nreturn MaterialApp(\r\n  navigatorKey: rootNavigatorKey,\r\n  locale: locale,  // nullмқҙл©ҙ мӢңмҠӨн…ң лЎңмәҳ мӮ¬мҡ©\r\n  theme: _lightTheme,\r\n  darkTheme: _darkTheme,\r\n  themeMode: mode,\r\n  home: MainScreen(key: ValueKey(refreshKey)),\r\n);\r\n```\r\n\r\n`appRefreshProvider` к°’ ліҖкІҪ вҶ’ `ValueKey` ліҖкІҪ вҶ’ MainScreen мһ¬мғқм„ұ\r\n\r\n---\r\n\r\n## `MainScreen`\r\n\r\n```dart\r\nclass MainScreen extends StatefulWidget\r\n```\r\n\r\n**м„ӨлӘ…**: кёүмӢқ/нҷҲ/мқјм • 3нғӯ н•ҳлӢЁ л„Өл№„кІҢмқҙм…ҳ + мҙҲкё° мІҙнҒ¬ лЎңм§Ғ\r\n\r\n### `initState` мІҙнҒ¬ мҲңм„ң\r\n\r\n1. `_checkAccountExists()`: н”„лЎңн•„мқҙ м—Ҷмңјл©ҙ лЎңк·ём•„мӣғ (мӮӯм ңлҗң кі„м • мІҳлҰ¬)\r\n2. `_checkNewSemester()`: н•ҷкё° ліҖкІҪ мӢң н”„лЎңн•„ м—…лҚ°мқҙнҠё м•ҲлӮҙ + м„ нғқкіјлӘ©/мӢңк°„н‘ң мәҗмӢң мҙҲкё°нҷ”\r\n3. мҳЁліҙл”© лҜёмҷ„лЈҢ мӢң вҶ’ `OnboardingScreen`\r\n4. л№„лЎңк·ёмқё мӢң вҶ’ `LoginScreen`\r\n5. лЎңк·ёмқё мғҒнғңл©ҙ Firestoreм—җм„ң мқјм • ліөмӣҗ: `GetIt.I<LocalDataBase>().loadFromFirestore()`\r\n6. [`UpdateChecker`](notification/update_checker.md)`.check()` + [`PopupNotice`](notification/popup_notice.md)`.check()`\r\n\r\n### л„Өл№„кІҢмқҙм…ҳ\r\n\r\n```dart\r\n_pages = [const MealScreen(), HomeScreen(key: _homeKey), const NoticeScreen()];\r\n```\r\n\r\n- `PageView` + `NavigationBar` (м•„мқҙмҪҳ only, лқјлІЁ мҲЁк№Җ)\r\n- нҷҲ нғӯ м „нҷҳ мӢң `_homeKey.currentState?.refresh()` нҳём¶ң\r\n- м•ҢлҰј нғӯ (`meal_screen` payload) вҶ’ кёүмӢқ нғӯмңјлЎң мқҙлҸҷ\r\n\r\n---\r\n\r\n## `_logCrashToFirestore`\r\n\r\n```dart\r\nvoid _logCrashToFirestore(FlutterErrorDetails details)\r\n```\r\n\r\nFirestore `crash_logs` м»¬л үм…ҳм—җ м—җлҹ¬ м •ліҙ м ҖмһҘ. м—җлҹ¬ л©”мӢңм§Җ 500мһҗ, мҠӨнғқ 1000мһҗлЎң м ҲмӮӯ\r\n","main_en.md":"# Main\r\n\r\n> н•ңкөӯм–ҙ: [main.md](./main.md)\r\n>\r\n> `lib/main.dart` вҖ” App entry point, MainScreen\r\n\r\n---\r\n\r\n## `main()`\r\n\r\n```dart\r\nFuture<void> main() async\r\n```\r\n\r\n**Description**: Performs app initialization. For startup performance, only initialization essential to the UI runs before `runApp`; the rest is handled in the background via `_deferredInit()`.\r\n\r\n### Before runApp (essential initialization)\r\n\r\n1. **Firebase initialization**: Check for duplicates before initializing\r\n2. **Crashlytics**: FlutterError handler + log errors to the Firestore `crash_logs` collection\r\n3. **Kakao SDK** initialization\r\n4. **Timezone** initialization (`Asia/Seoul`)\r\n5. Create `providerContainer = ProviderContainer()`\r\n6. **[SettingData](data/setting_data.md)** + **[ServiceLocator](data/service_locator.md)** initialized in parallel:\r\n   ```dart\r\n   await Future.wait([SettingData().init(), setupServiceLocator()]);\r\n   ```\r\n7. `runApp` вҶ’ run `HansolHighSchool` widget wrapped in `UncontrolledProviderScope`\r\n\r\n### After runApp (`_deferredInit`)\r\n\r\nOnce the UI is up, `unawaited(_deferredInit())` runs the remaining initialization in the background:\r\n\r\n1. **App Check** / **Performance Monitoring** вҖ” each fire-and-forget via `_safeInit()`\r\n1. **Analytics** вҖ” reads `SharedPreferences('analyticsEnabled')` and checks release mode; collection is enabled only when both conditions are met. Then calls `AnalyticsService.logAppOpen(source: 'organic')`\r\n2. **Subject data preload** (grades 2 and 3 in parallel)\r\n3. **Local meal notifications** initialization + scheduling\r\n4. **FCM** init + **deep link** init + **widget service** init (fire-and-forget)\r\n5. **[OfflineQueueManager](network/offline_queue_manager.md)** initialization вҖ” open sqflite DB + register network-restored listener\r\n\r\n### `_safeInit`\r\n\r\n```dart\r\nFuture<void> _safeInit(String name, Future<void> Function() fn) async\r\n```\r\n\r\nA try/catch wrapper. Ensures an individual initialization failure does not block the whole app вҖ” errors are logged and ignored.\r\n\r\n---\r\n\r\n## Global State\r\n\r\n| Variable | Type | Purpose |\r\n|------|------|------|\r\n| `providerContainer` | `ProviderContainer` | Access Riverpod providers from non-widget code (login_screen, setting_screen, etc.) |\r\n| `rootNavigatorKey` | `GlobalKey<NavigatorState>` | Access Navigator from FCM deep links |\r\n| `notificationStream` | `StreamController<String?>` | Switch to MealScreen on notification tap |\r\n\r\n> The previous `themeNotifier`, `localeNotifier`, `appRefreshNotifier` (3 ValueNotifiers) have been unified into Riverpod providers вҖ” see the [providers doc](providers/providers.md).\r\n\r\n---\r\n\r\n## `HansolHighSchool` (root widget)\r\n\r\n```dart\r\nclass HansolHighSchool extends ConsumerStatefulWidget\r\n```\r\n\r\n**Description**: The app's root widget. Handles theme mode switching and MaterialApp configuration.\r\n\r\n1. Initializes [`AnimatedAppColors`](styles/app_colors.md) in `initState`\r\n2. `_resolveIsDark`: checks platformBrightness when ThemeMode.system\r\n3. Watches 3 providers in `build`:\r\n\r\n```dart\r\nfinal mode = ref.watch(themeProvider);\r\nfinal locale = ref.watch(localeProvider);\r\nfinal refreshKey = ref.watch(appRefreshProvider);\r\n\r\nreturn MaterialApp(\r\n  navigatorKey: rootNavigatorKey,\r\n  locale: locale,  // nullмқҙл©ҙ мӢңмҠӨн…ң лЎңмәҳ мӮ¬мҡ©\r\n  theme: _lightTheme,\r\n  darkTheme: _darkTheme,\r\n  themeMode: mode,\r\n  home: MainScreen(key: ValueKey(refreshKey)),\r\n);\r\n```\r\n\r\nA change in `appRefreshProvider` вҶ’ `ValueKey` changes вҶ’ MainScreen is rebuilt.\r\n\r\n---\r\n\r\n## `MainScreen`\r\n\r\n```dart\r\nclass MainScreen extends StatefulWidget\r\n```\r\n\r\n**Description**: A 3-tab bottom navigation (Meal / Home / Schedule) plus initial check logic.\r\n\r\n### `initState` check order\r\n\r\n1. `_checkAccountExists()`: logs out if no profile (handles deleted accounts)\r\n2. `_checkNewSemester()`: on semester change, prompts profile update + clears elective subject/timetable cache\r\n3. If onboarding is incomplete вҶ’ `OnboardingScreen`\r\n4. If not signed in вҶ’ `LoginScreen`\r\n5. If signed in, restore schedules from Firestore: `GetIt.I<LocalDataBase>().loadFromFirestore()`\r\n6. [`UpdateChecker`](notification/update_checker.md)`.check()` + [`PopupNotice`](notification/popup_notice.md)`.check()`\r\n\r\n### Navigation\r\n\r\n```dart\r\n_pages = [const MealScreen(), HomeScreen(key: _homeKey), const NoticeScreen()];\r\n```\r\n\r\n- `PageView` + `NavigationBar` (icon-only, labels hidden)\r\n- On switching to the Home tab, calls `_homeKey.currentState?.refresh()`\r\n- Notification tap (`meal_screen` payload) вҶ’ switches to the Meal tab\r\n\r\n---\r\n\r\n## `_logCrashToFirestore`\r\n\r\n```dart\r\nvoid _logCrashToFirestore(FlutterErrorDetails details)\r\n```\r\n\r\nSaves error info to the Firestore `crash_logs` collection. Error messages are truncated to 500 chars, stack traces to 1000 chars.\r\n","network/network_status.md":"# NetworkStatus\n\n> `lib/network/network_status.dart` вҖ” л„ӨнҠёмӣҢнҒ¬ м—°кІ° мғҒнғң\n\n`connectivity_plus` н”Ңлҹ¬к·ёмқёмңјлЎң нҳ„мһ¬ м—°кІ° мғҒнғңлҘј нҷ•мқён•Ё. мқјнҡҢм„ұ мІҙнҒ¬мҷҖ мӢӨмӢңк°„ мҠӨнҠёлҰј лӘЁл‘җ м ңкіө\n\n---\n\n## `isUnconnected`\n\n```dart\nstatic Future<bool> isUnconnected()\n```\n\n**м„ӨлӘ…**: WiFi/лӘЁл°”мқј лҚ°мқҙн„° лҜём—°кІ° мӢң `true`лҘј л°ҳнҷҳн•Ё\n\n```dart\nif (_testOverride != null) return _testOverride!();\nfinal results = await Connectivity().checkConnectivity();\nreturn results.isEmpty || results.contains(ConnectivityResult.none);\n```\n\n- `results`к°Җ л№„м–ҙмһҲкұ°лӮҳ `none`мқ„ нҸ¬н•Ён•ҳл©ҙ мҳӨн”„лқјмқё\n- API нҳём¶ң м „ мҳӨн”„лқјмқё мІҙнҒ¬м—җ мӮ¬мҡ© ([MealDataApi](../api/meal_data_api.md), [TimetableDataApi](../api/timetable_data_api.md), [NoticeDataApi](../api/notice_data_api.md))\n- мҳӨн”„лқјмқёмқҙл©ҙ мәҗмӢң лҚ°мқҙн„° л°ҳнҷҳ лҳҗлҠ” м•ҲлӮҙ л©”мӢңм§Җ н‘ңмӢң\n\n---\n\n## мӢӨмӢңк°„ мҠӨнҠёлҰј лӘЁлӢҲн„°л§Ғ\n\n### `onStatusChange`\n\n```dart\nstatic Stream<bool> get onStatusChange\n```\n\nм—°кІ° мғҒнғң ліҖкІҪ мҠӨнҠёлҰј. `true` = мҳӨн”„лқјмқё, `false` = мҳЁлқјмқё.\nмөңмҙҲ м ‘к·ј мӢң мһҗлҸҷмңјлЎң `connectivity_plus` лҰ¬мҠӨлӢқ мӢңмһ‘. лёҢлЎңл“ңмәҗмҠӨнҠё мҠӨнҠёлҰјмқҙлҜҖлЎң м—¬лҹ¬ мң„м Ҝм—җм„ң лҸҷмӢң кө¬лҸ… к°ҖлҠҘ\n\nмӮ¬мҡ©мІҳ:\n- `OfflineBanner` вҖ” мҳӨн”„лқјмқё л°°л„Ҳ + лҸҷкё°нҷ” мғҒнғң н‘ңмӢң\n- `OfflineQueueManager` вҖ” л„ӨнҠёмӣҢнҒ¬ ліөмӣҗ мӢң нҒҗ мһҗлҸҷ мІҳлҰ¬\n\n### `isOffline`\n\n```dart\nstatic bool get isOffline\n```\n\nл§Ҳм§Җл§үмңјлЎң м•Ңл Өм§„ м—°кІ° мғҒнғң. мҠӨнҠёлҰј кө¬лҸ… м—Ҷмқҙ нҳ„мһ¬ мғҒнғңлҘј лҸҷкё°м ҒмңјлЎң нҷ•мқён•  л•Ң мӮ¬мҡ©\n\n---\n\n## н…ҢмҠӨнҠё м§Җмӣҗ\n\n```dart\nstatic Future<bool> Function()? _testOverride;\n\n@visibleForTesting\nstatic set testOverride(Future<bool> Function()? fn) => _testOverride = fn;\n\n@visibleForTesting\nstatic void resetStream()\n```\n\n- `testOverride`лЎң `connectivity_plus` н”Ңлҹ¬к·ёмқё м—Ҷмқҙ мҳЁ/мҳӨн”„лқјмқё мӢңлӮҳлҰ¬мҳӨ н…ҢмҠӨнҠё\n- `resetStream()`мңјлЎң мҠӨнҠёлҰј мғҒнғң мҙҲкё°нҷ” (н…ҢмҠӨнҠё к°„ кІ©лҰ¬)\n- кё°ліёк°’ `null` вҶ’ н”„лЎңлҚ•м…ҳм—җм„ңлҠ” мӢӨм ң `Connectivity()` кІҪлЎң мӢӨн–ү\n","network/network_status_en.md":"# NetworkStatus\r\n\r\n> н•ңкөӯм–ҙ: [network_status.md](./network_status.md)\r\n\r\n> `lib/network/network_status.dart` вҖ” Network connectivity status\r\n\r\nUses the `connectivity_plus` plugin to check the current connectivity status. Provides both one-shot checks and a real-time stream.\r\n\r\n---\r\n\r\n## `isUnconnected`\r\n\r\n```dart\r\nstatic Future<bool> isUnconnected()\r\n```\r\n\r\n**Description**: Returns `true` when both WiFi and mobile data are disconnected.\r\n\r\n```dart\r\nif (_testOverride != null) return _testOverride!();\r\nfinal results = await Connectivity().checkConnectivity();\r\nreturn results.isEmpty || results.contains(ConnectivityResult.none);\r\n```\r\n\r\n- Offline if `results` is empty or contains `none`\r\n- Used for offline checks before API calls ([MealDataApi](../api/meal_data_api.md), [TimetableDataApi](../api/timetable_data_api.md), [NoticeDataApi](../api/notice_data_api.md))\r\n- When offline, returns cached data or displays a notice message\r\n\r\n---\r\n\r\n## Real-time stream monitoring\r\n\r\n### `onStatusChange`\r\n\r\n```dart\r\nstatic Stream<bool> get onStatusChange\r\n```\r\n\r\nStream of connectivity state changes. `true` = offline, `false` = online.\r\nAutomatically starts `connectivity_plus` listening on first access. It is a broadcast stream, so multiple widgets can subscribe concurrently.\r\n\r\nUsage:\r\n- `OfflineBanner` вҖ” displays offline banner + sync status\r\n- `OfflineQueueManager` вҖ” automatically processes the queue when the network is restored\r\n\r\n### `isOffline`\r\n\r\n```dart\r\nstatic bool get isOffline\r\n```\r\n\r\nThe last known connectivity status. Used to synchronously check the current state without subscribing to the stream.\r\n\r\n---\r\n\r\n## Test support\r\n\r\n```dart\r\nstatic Future<bool> Function()? _testOverride;\r\n\r\n@visibleForTesting\r\nstatic set testOverride(Future<bool> Function()? fn) => _testOverride = fn;\r\n\r\n@visibleForTesting\r\nstatic void resetStream()\r\n```\r\n\r\n- Use `testOverride` to test online/offline scenarios without the `connectivity_plus` plugin\r\n- Use `resetStream()` to reset the stream state (isolation between tests)\r\n- Default `null` вҶ’ in production, the real `Connectivity()` path runs\r\n","network/offline_queue_manager.md":"# OfflineQueueManager\n\n> `lib/network/offline_queue_manager.dart` вҖ” мҳӨн”„лқјмқё м“°кё° нҒҗ\n\nмҳӨн”„лқјмқё мғҒнғңм—җм„ң л°ңмғқн•ң Firestore м“°кё° мһ‘м—…мқ„ sqfliteм—җ м ҖмһҘн•ҳкі , л„ӨнҠёмӣҢнҒ¬ ліөмӣҗ мӢң мһҗлҸҷмңјлЎң мҲңм„ңлҢҖлЎң мһ¬мӢӨн–үн•Ё\n\n---\n\n## мӢұкёҖнҶӨ\n\n```dart\nclass OfflineQueueManager {\n  OfflineQueueManager._();\n  static final instance = OfflineQueueManager._();\n}\n```\n\n`main.dart`мқҳ `_deferredInit()`м—җм„ң `initialize()` нҳём¶ң\n\n---\n\n## `initialize`\n\n```dart\nFuture<void> initialize()\n```\n\n1. `offline_queue.db` SQLite лҚ°мқҙн„°лІ мқҙмҠӨ м—ҙкё°/мғқм„ұ\n2. лҢҖкё° мһ‘м—… мҲҳ к°ұмӢ \n3. `NetworkStatus.onStatusChange` кө¬лҸ… мӢңмһ‘ (л„ӨнҠёмӣҢнҒ¬ ліөмӣҗ мӢң нҒҗ мһҗлҸҷ мІҳлҰ¬)\n\n### нҒҗ н…Ңмқҙлё” мҠӨнӮӨл§Ҳ\n\n```sql\nCREATE TABLE queue (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  type TEXT NOT NULL,        -- 'create_post' | 'create_comment'\n  payload TEXT NOT NULL,     -- JSON м§Ғл ¬нҷ”лҗң лҚ°мқҙн„°\n  createdAt INTEGER NOT NULL,\n  retryCount INTEGER DEFAULT 0\n)\n```\n\n---\n\n## нҒҗ м¶”к°Җ\n\n### `enqueuePost`\n\n```dart\nFuture<int> enqueuePost(Map<String, dynamic> postData)\n```\n\nкёҖ мһ‘м„ұ лҚ°мқҙн„°лҘј нҒҗм—җ м ҖмһҘ. `FieldValue.serverTimestamp()` вҶ’ `'__SERVER_TIMESTAMP__'` н”Ңл ҲмқҙмҠӨнҷҖлҚ”лЎң ліҖнҷҳн•ҳм—¬ JSON м§Ғл ¬нҷ”\n\n### `enqueueComment`\n\n```dart\nFuture<int> enqueueComment(String postId, Map<String, dynamic> commentData)\n```\n\nлҢ“кёҖ лҚ°мқҙн„°лҘј нҒҗм—җ м ҖмһҘ. `postId`мҷҖ `commentData`лҘј н•ҳлӮҳмқҳ payloadлЎң л¬¶мқҢ\n\n---\n\n## нҒҗ мІҳлҰ¬\n\nл„ӨнҠёмӣҢнҒ¬ ліөмӣҗ мӢң `_processQueue()` мһҗлҸҷ мӢӨн–ү:\n\n```\nл„ӨнҠёмӣҢнҒ¬ ліөмӣҗ к°җм§Җ (onStatusChange)\n  в”Ӯ\n  в””в”Җв”Җ _processQueue()\n       в”ңв”Җв”Җ нҒҗм—җм„ң к°ҖмһҘ мҳӨлһҳлҗң мһ‘м—… мЎ°нҡҢ (FIFO)\n       в”ңв”Җв”Җ л„ӨнҠёмӣҢнҒ¬ лҒҠкё°л©ҙ мҰүмӢң мӨ‘лӢЁ\n       в”ңв”Җв”Җ мһ‘м—… мӢӨн–ү м„ұкіө вҶ’ нҒҗм—җм„ң мӮӯм ң\n       в”ңв”Җв”Җ мһ‘м—… мӢӨн–ү мӢӨнҢЁ\n       в”Ӯ     в”ңв”Җв”Җ retryCount < 3 вҶ’ м№ҙмҡҙнҠё мҰқк°Җ, лӢӨмқҢ м—°кІ° ліөмӣҗ мӢң мһ¬мӢңлҸ„\n       в”Ӯ     в””в”Җв”Җ retryCount >= 3 вҶ’ нҒҗм—җм„ң мӮӯм ң (л“ңлЎӯ)\n       в””в”Җв”Җ лӘЁл“  мһ‘м—… мҷ„лЈҢ вҶ’ SyncStatus.idle()\n```\n\n### м§Җмӣҗ мһ‘м—… нғҖмһ…\n\n| type | м„ӨлӘ… | Firestore мӢӨн–ү |\n|------|------|----------------|\n| `create_post` | кёҖ мһ‘м„ұ | `posts.add(data)` |\n| `create_comment` | лҢ“кёҖ мһ‘м„ұ | `comments.add(data)` + `commentCount` мҰқк°Җ |\n\n---\n\n## лҸҷкё°нҷ” мғҒнғң мҠӨнҠёлҰј\n\n```dart\nStream<SyncStatus> get onSyncStatusChange\nint get pendingCount\n```\n\n`OfflineBanner`м—җм„ң кө¬лҸ…н•ҳм—¬ UIм—җ мғҒнғң н‘ңмӢң\n\n### SyncStatus\n\n| мғҒнғң | мқҳлҜё |\n|------|------|\n| `SyncState.idle` | лҢҖкё° мһ‘м—… м—ҶмқҢ |\n| `SyncState.pending` | лҢҖкё° мһ‘м—… мһҲмқҢ (л„ӨнҠёмӣҢнҒ¬ лҢҖкё° мӨ‘) |\n| `SyncState.syncing` | нҒҗ мІҳлҰ¬ мӨ‘ |\n\n---\n\n## мң нӢёлҰ¬нӢ°\n\n### `syncNow`\n\n```dart\nFuture<void> syncNow()\n```\n\nмҲҳлҸҷ лҸҷкё°нҷ” нҠёлҰ¬кұ°. мҳЁлқјмқёмқҙл©ҙ мҰүмӢң нҒҗ мІҳлҰ¬ мӢңмһ‘\n\n### `clearQueue`\n\n```dart\nFuture<void> clearQueue()\n```\n\nлӘЁл“  лҢҖкё° мһ‘м—… мӮӯм ң\n\n---\n\n## ServerTimestamp м§Ғл ¬нҷ”\n\n`FieldValue.serverTimestamp()`лҠ” JSON м§Ғл ¬нҷ”к°Җ л¶Ҳк°Җн•ҳлҜҖлЎң:\n\n1. **м ҖмһҘ мӢң** (`_sanitizeForStorage`): `FieldValue` вҶ’ `'__SERVER_TIMESTAMP__'` л¬ёмһҗм—ҙ\n2. **мӢӨн–ү мӢң** (`_restoreTimestamps`): `'__SERVER_TIMESTAMP__'` вҶ’ `FieldValue.serverTimestamp()`\n\nмӨ‘мІ© MapлҸ„ мһ¬к·Җм ҒмңјлЎң мІҳлҰ¬\n","network/offline_queue_manager_en.md":"# OfflineQueueManager\r\n\r\n> н•ңкөӯм–ҙ: [offline_queue_manager.md](./offline_queue_manager.md)\r\n\r\n> `lib/network/offline_queue_manager.dart` вҖ” Offline write queue\r\n\r\nSaves Firestore write operations that occur while offline into sqflite, and automatically re-executes them in order when the network is restored.\r\n\r\n---\r\n\r\n## Singleton\r\n\r\n```dart\r\nclass OfflineQueueManager {\r\n  OfflineQueueManager._();\r\n  static final instance = OfflineQueueManager._();\r\n}\r\n```\r\n\r\n`initialize()` is called from `_deferredInit()` in `main.dart`.\r\n\r\n---\r\n\r\n## `initialize`\r\n\r\n```dart\r\nFuture<void> initialize()\r\n```\r\n\r\n1. Opens/creates the `offline_queue.db` SQLite database\r\n2. Refreshes the pending-operation count\r\n3. Starts subscribing to `NetworkStatus.onStatusChange` (automatically processes the queue when the network is restored)\r\n\r\n### Queue table schema\r\n\r\n```sql\r\nCREATE TABLE queue (\r\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\r\n  type TEXT NOT NULL,        -- 'create_post' | 'create_comment'\r\n  payload TEXT NOT NULL,     -- JSON-serialized data\r\n  createdAt INTEGER NOT NULL,\r\n  retryCount INTEGER DEFAULT 0\r\n)\r\n```\r\n\r\n---\r\n\r\n## Adding to the queue\r\n\r\n### `enqueuePost`\r\n\r\n```dart\r\nFuture<int> enqueuePost(Map<String, dynamic> postData)\r\n```\r\n\r\nSaves post creation data to the queue. Converts `FieldValue.serverTimestamp()` вҶ’ `'__SERVER_TIMESTAMP__'` placeholder for JSON serialization.\r\n\r\n### `enqueueComment`\r\n\r\n```dart\r\nFuture<int> enqueueComment(String postId, Map<String, dynamic> commentData)\r\n```\r\n\r\nSaves comment data to the queue. Bundles `postId` and `commentData` into a single payload.\r\n\r\n---\r\n\r\n## Queue processing\r\n\r\nWhen the network is restored, `_processQueue()` runs automatically:\r\n\r\n```\r\nNetwork restoration detected (onStatusChange)\r\n  в”Ӯ\r\n  в””в”Җв”Җ _processQueue()\r\n       в”ңв”Җв”Җ Fetch the oldest operation from the queue (FIFO)\r\n       в”ңв”Җв”Җ Abort immediately if the network disconnects\r\n       в”ңв”Җв”Җ Operation succeeds вҶ’ remove from the queue\r\n       в”ңв”Җв”Җ Operation fails\r\n       в”Ӯ     в”ңв”Җв”Җ retryCount < 3 вҶ’ increment count, retry on next restoration\r\n       в”Ӯ     в””в”Җв”Җ retryCount >= 3 вҶ’ remove from the queue (drop)\r\n       в””в”Җв”Җ All operations completed вҶ’ SyncStatus.idle()\r\n```\r\n\r\n### Supported operation types\r\n\r\n| type | Description | Firestore execution |\r\n|------|-------------|---------------------|\r\n| `create_post` | Create post | `posts.add(data)` |\r\n| `create_comment` | Create comment | `comments.add(data)` + `commentCount` increment |\r\n\r\n---\r\n\r\n## Sync status stream\r\n\r\n```dart\r\nStream<SyncStatus> get onSyncStatusChange\r\nint get pendingCount\r\n```\r\n\r\nSubscribed by `OfflineBanner` to display the status in the UI.\r\n\r\n### SyncStatus\r\n\r\n| State | Meaning |\r\n|-------|---------|\r\n| `SyncState.idle` | No pending operations |\r\n| `SyncState.pending` | Pending operations exist (waiting for network) |\r\n| `SyncState.syncing` | Queue is being processed |\r\n\r\n---\r\n\r\n## Utilities\r\n\r\n### `syncNow`\r\n\r\n```dart\r\nFuture<void> syncNow()\r\n```\r\n\r\nManual sync trigger. If online, immediately starts queue processing.\r\n\r\n### `clearQueue`\r\n\r\n```dart\r\nFuture<void> clearQueue()\r\n```\r\n\r\nDeletes all pending operations.\r\n\r\n---\r\n\r\n## ServerTimestamp serialization\r\n\r\nBecause `FieldValue.serverTimestamp()` cannot be JSON-serialized:\r\n\r\n1. **On save** (`_sanitizeForStorage`): `FieldValue` вҶ’ `'__SERVER_TIMESTAMP__'` string\r\n2. **On execution** (`_restoreTimestamps`): `'__SERVER_TIMESTAMP__'` вҶ’ `FieldValue.serverTimestamp()`\r\n\r\nNested Maps are handled recursively as well.\r\n","notification/daily_meal_notification.md":"# DailyMealNotification\r\n\r\n> `lib/notification/daily_meal_notification.dart` вҖ” лЎңм»¬ кёүмӢқ м•ҢлҰј мҠӨмјҖмӨ„л§Ғ\r\n\r\nмқёмҠӨн„ҙмҠӨ л©”м„ңл“ң. мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ нҸүмқј л°ҳліө м•ҢлҰјмқ„ `flutter_local_notifications` + `timezone`мңјлЎң мҠӨмјҖмӨ„л§Ғ. [`MealDataApi`](../api/meal_data_api.md)м—җм„ң л©”лүҙлҘј мЎ°нҡҢн•ҙ м•ҢлҰј ліёл¬ём—җ нҸ¬н•Ё\r\n\r\n---\r\n\r\n## `initializeNotifications`\r\n\r\n```dart\r\nFuture<void> initializeNotifications()\r\n```\r\n\r\n**м„ӨлӘ…**: лЎңм»¬ м•ҢлҰј н”Ңлҹ¬к·ёмқёмқ„ мҙҲкё°нҷ”н•Ё\r\n\r\n1. Android/iOS мҙҲкё°нҷ” м„Өм •:\r\n   ```dart\r\n   const androidSettings = AndroidInitializationSettings('@mipmap/ic_launcher');\r\n   final iosSettings = DarwinInitializationSettings(...);\r\n   ```\r\n\r\n2. м•ҢлҰј нғӯ мҪңл°ұ л“ұлЎқ:\r\n   ```dart\r\n   await _localNotificationsPlugin.initialize(\r\n     InitializationSettings(...),\r\n     onDidReceiveNotificationResponse: _onNotificationTap,\r\n     onDidReceiveBackgroundNotificationResponse: _onBackgroundNotification,\r\n   );\r\n   ```\r\n\r\n3. н”Ңлһ«нҸјлі„ к¶Ңн•ң мҡ”мІӯ:\r\n   ```dart\r\n   if (Platform.isIOS) { ... requestPermissions(...) }\r\n   else if (Platform.isAndroid) { await Permission.notification.request(); }\r\n   ```\r\n\r\n---\r\n\r\n## `scheduleDailyNotifications`\r\n\r\n```dart\r\nFuture<void> scheduleDailyNotifications()\r\n```\r\n\r\n**м„ӨлӘ…**: [SettingData](../data/setting_data.md) м„Өм •м—җ л”°лқј нҸүмқј(мӣ”~кёҲ) л°ҳліө м•ҢлҰјмқ„ л“ұлЎқн•Ё\r\n\r\n```dart\r\nif (settings.isBreakfastNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 1, mealLabel: 'мЎ°мӢқ', time: ...);\r\n}\r\nif (settings.isLunchNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 2, mealLabel: 'мӨ‘мӢқ', time: ...);\r\n}\r\nif (settings.isDinnerNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 3, mealLabel: 'м„қмӢқ', time: ...);\r\n}\r\n```\r\n\r\nкё°мЎҙ м•ҢлҰјмқ„ лӘЁл‘җ м·ЁмҶҢ нӣ„ мһ¬л“ұлЎқ (`cancelAllNotifications` лЁјм Җ нҳём¶ң)\r\n\r\n---\r\n\r\n## `_scheduleWeeklyNotification`\r\n\r\n```dart\r\nFuture<void> _scheduleWeeklyNotification({\r\n  required int id, required String mealLabel,\r\n  required TimeOfDay time, required List<int> weekdays,\r\n})\r\n```\r\n\r\n**м„ӨлӘ…**: нҠ№м • мӢқмӮ¬мқҳ мҡ”мқјлі„ л°ҳліө м•ҢлҰјмқ„ л“ұлЎқн•Ё\r\n\r\n1. мҳӨлҠҳмқҳ кёүмӢқ л©”лүҙлҘј лҜёлҰ¬ мЎ°нҡҢн•ҙ м•ҢлҰј ліёл¬ём—җ нҸ¬н•Ё:\r\n   ```dart\r\n   final meal = await MealDataApi.getMeal(date: DateTime.now(), mealType: mealType, ...);\r\n   menuPreview = _cleanMenu(meal?.meal);\r\n   ```\r\n\r\n2. мӣ”~кёҲ к°Ғ мҡ”мқјм—җ лҢҖн•ҙ к°ңлі„ м•ҢлҰј л“ұлЎқ:\r\n   ```dart\r\n   for (int weekday in weekdays) {\r\n     final notificationId = id * 10 + weekday;  // мҳҲ: мӨ‘мӢқ+нҷ”мҡ”мқј = 22\r\n     await _localNotificationsPlugin.zonedSchedule(\r\n       notificationId, ...,\r\n       matchDateTimeComponents: DateTimeComponents.dayOfWeekAndTime,  // л§ӨмЈј л°ҳліө\r\n     );\r\n   }\r\n   ```\r\n\r\n3. `BigTextStyleInformation`мңјлЎң л©”лүҙ лҜёлҰ¬ліҙкё° н‘ңмӢң\r\n\r\n---\r\n\r\n## `sendTestNotification`\r\n\r\n```dart\r\nFuture<void> sendTestNotification()\r\n```\r\n\r\n5мҙҲ нӣ„ н…ҢмҠӨнҠё м•ҢлҰј м „мҶЎ. м•ҢлҰј м„Өм • нҷ”л©ҙм—җм„ң \"н…ҢмҠӨнҠё м•ҢлҰј ліҙлӮҙкё°\" лІ„нҠјм—җ м—°кІ°\r\n\r\n---\r\n\r\n## `updateNotifications`\r\n\r\n```dart\r\nFuture<void> updateNotifications()\r\n```\r\n\r\nм„Өм • ліҖкІҪ мӢң нҳём¶ң. `cancelAllNotifications()` + `scheduleDailyNotifications()`\r\n\r\n---\r\n\r\n## `_cleanMenu`\r\n\r\n```dart\r\nString _cleanMenu(String? menu)\r\n```\r\n\r\nкёүмӢқ л©”лүҙм—җм„ң м•Ңл ҲлҘҙкё° м •ліҙ лІҲнҳёлҘј м ңкұ°н•ҳкі  н•ң мӨ„лЎң н•©м№Ё:\r\n\r\n```dart\r\nmenu.split('\\n')\r\n    .map((e) => e.replaceAll(RegExp(r'\\([0-9.,\\s]+\\)'), '').trim())\r\n    .where((e) => e.isNotEmpty)\r\n    .join(' В· ');\r\n// \"м№ҳнӮЁк№ҢмҠӨ (1.2.5) \\n лҗңмһҘкөӯ (5.6)\" вҶ’ \"м№ҳнӮЁк№ҢмҠӨ В· лҗңмһҘкөӯ\"\r\n```\r\n\r\n---\r\n\r\n## лӮҙл¶Җ мң нӢёлҰ¬нӢ°\r\n\r\n| н•ЁмҲҳ | м„ӨлӘ… |\r\n|------|------|\r\n| `_parseTimeOfDay(timeString)` | `'12:00'` вҶ’ `TimeOfDay(hour: 12, minute: 0)` |\r\n| `_nextInstanceOfWeekday(time, weekday)` | лӢӨмқҢ н•ҙлӢ№ мҡ”мқј+мӢңк°„мқҳ `TZDateTime` кі„мӮ° |\r\n| `_nextInstanceOfTime(timeOfDay)` | мҳӨлҠҳ/лӮҙмқј мӨ‘ н•ҙлӢ№ мӢңк°„мқҙ лҜёлһҳмқё `TZDateTime` |\r\n","notification/daily_meal_notification_en.md":"# DailyMealNotification\r\n\r\n> н•ңкөӯм–ҙ: [daily_meal_notification.md](./daily_meal_notification.md)\r\n\r\n> `lib/notification/daily_meal_notification.dart` вҖ” Local meal notification scheduling\r\n\r\nInstance methods. Schedules weekday-repeating notifications for breakfast/lunch/dinner using `flutter_local_notifications` + `timezone`. Looks up the menu via [`MealDataApi`](../api/meal_data_api.md) and includes it in the notification body.\r\n\r\n---\r\n\r\n## `initializeNotifications`\r\n\r\n```dart\r\nFuture<void> initializeNotifications()\r\n```\r\n\r\n**Description**: Initializes the local notifications plugin.\r\n\r\n1. Android/iOS initialization settings:\r\n   ```dart\r\n   const androidSettings = AndroidInitializationSettings('@mipmap/ic_launcher');\r\n   final iosSettings = DarwinInitializationSettings(...);\r\n   ```\r\n\r\n2. Register the notification tap callback:\r\n   ```dart\r\n   await _localNotificationsPlugin.initialize(\r\n     InitializationSettings(...),\r\n     onDidReceiveNotificationResponse: _onNotificationTap,\r\n     onDidReceiveBackgroundNotificationResponse: _onBackgroundNotification,\r\n   );\r\n   ```\r\n\r\n3. Per-platform permission requests:\r\n   ```dart\r\n   if (Platform.isIOS) { ... requestPermissions(...) }\r\n   else if (Platform.isAndroid) { await Permission.notification.request(); }\r\n   ```\r\n\r\n---\r\n\r\n## `scheduleDailyNotifications`\r\n\r\n```dart\r\nFuture<void> scheduleDailyNotifications()\r\n```\r\n\r\n**Description**: Registers weekday (MonвҖ“Fri) repeating notifications according to the [SettingData](../data/setting_data.md) configuration.\r\n\r\n```dart\r\nif (settings.isBreakfastNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 1, mealLabel: 'мЎ°мӢқ', time: ...);\r\n}\r\nif (settings.isLunchNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 2, mealLabel: 'мӨ‘мӢқ', time: ...);\r\n}\r\nif (settings.isDinnerNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 3, mealLabel: 'м„қмӢқ', time: ...);\r\n}\r\n```\r\n\r\nCancels all existing notifications before re-registering (calls `cancelAllNotifications` first).\r\n\r\n---\r\n\r\n## `_scheduleWeeklyNotification`\r\n\r\n```dart\r\nFuture<void> _scheduleWeeklyNotification({\r\n  required int id, required String mealLabel,\r\n  required TimeOfDay time, required List<int> weekdays,\r\n})\r\n```\r\n\r\n**Description**: Registers weekday-repeating notifications for a specific meal.\r\n\r\n1. Pre-fetches today's meal menu to include in the notification body:\r\n   ```dart\r\n   final meal = await MealDataApi.getMeal(date: DateTime.now(), mealType: mealType, ...);\r\n   menuPreview = _cleanMenu(meal?.meal);\r\n   ```\r\n\r\n2. Register an individual notification for each weekday MonвҖ“Fri:\r\n   ```dart\r\n   for (int weekday in weekdays) {\r\n     final notificationId = id * 10 + weekday;  // e.g., lunch + Tuesday = 22\r\n     await _localNotificationsPlugin.zonedSchedule(\r\n       notificationId, ...,\r\n       matchDateTimeComponents: DateTimeComponents.dayOfWeekAndTime,  // weekly repeat\r\n     );\r\n   }\r\n   ```\r\n\r\n3. Shows the menu preview via `BigTextStyleInformation`.\r\n\r\n---\r\n\r\n## `sendTestNotification`\r\n\r\n```dart\r\nFuture<void> sendTestNotification()\r\n```\r\n\r\nSends a test notification after 5 seconds. Wired to the \"Send test notification\" button on the notification settings screen.\r\n\r\n---\r\n\r\n## `updateNotifications`\r\n\r\n```dart\r\nFuture<void> updateNotifications()\r\n```\r\n\r\nCalled when settings change. `cancelAllNotifications()` + `scheduleDailyNotifications()`.\r\n\r\n---\r\n\r\n## `_cleanMenu`\r\n\r\n```dart\r\nString _cleanMenu(String? menu)\r\n```\r\n\r\nStrips allergy info numbers from the meal menu and joins it into a single line:\r\n\r\n```dart\r\nmenu.split('\\n')\r\n    .map((e) => e.replaceAll(RegExp(r'\\([0-9.,\\s]+\\)'), '').trim())\r\n    .where((e) => e.isNotEmpty)\r\n    .join(' В· ');\r\n// \"м№ҳнӮЁк№ҢмҠӨ (1.2.5) \\n лҗңмһҘкөӯ (5.6)\" вҶ’ \"м№ҳнӮЁк№ҢмҠӨ В· лҗңмһҘкөӯ\"\r\n```\r\n\r\n---\r\n\r\n## Internal utilities\r\n\r\n| Function | Description |\r\n|----------|-------------|\r\n| `_parseTimeOfDay(timeString)` | `'12:00'` вҶ’ `TimeOfDay(hour: 12, minute: 0)` |\r\n| `_nextInstanceOfWeekday(time, weekday)` | Computes the `TZDateTime` for the next matching weekday + time |\r\n| `_nextInstanceOfTime(timeOfDay)` | The `TZDateTime` for today/tomorrow where the given time is still in the future |\r\n","notification/fcm_service.md":"# FcmService\r\n\r\n> `lib/notification/fcm_service.dart` вҖ” FCM н‘ёмӢң м•ҢлҰј, нҶ н”Ҫ, л”Ҙл§ҒнҒ¬\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. Firebase Cloud Messaging мҙҲкё°нҷ”, нҶ нҒ° кҙҖлҰ¬, нҶ н”Ҫ кө¬лҸ…, л”Ҙл§ҒнҒ¬ лқјмҡ°нҢ…мқ„ лӢҙлӢ№\r\n\r\n---\r\n\r\n## `initialize`\r\n\r\n```dart\r\nstatic Future<void> initialize()\r\n```\r\n\r\n**м„ӨлӘ…**: FCM м„ңл№„мҠӨлҘј мҙҲкё°нҷ”н•Ё. `main()` м—җм„ң н•ң лІҲ нҳём¶ң\r\n\r\n1. Android м•ҢлҰј мұ„л„җ мғқм„ұ (`_initChannel`)\r\n\r\n2. **лЎңм»¬ м•ҢлҰј н”Ңлҹ¬к·ёмқё мҙҲкё°нҷ”** (нҸ¬к·ёлқјмҡҙл“ң FCM м•ҢлҰј нғӯ мҪңл°ұ л“ұлЎқ):\r\n   ```dart\r\n   await _localNotifications.initialize(\r\n     const InitializationSettings(android: androidSettings, iOS: iosSettings),\r\n     onDidReceiveNotificationResponse: onNotificationTap,\r\n   );\r\n   ```\r\n   > `onNotificationTap`мқҖ `main.dart`м—җм„ң import. нғӯ мӢң `notificationStream` м „лӢ¬ + `handleLocalNotificationTap` вҶ’ `_handleDeepLink` нҳём¶ң\r\n\r\n3. Android м•ҢлҰј мұ„л„җ л“ұлЎқ\r\n\r\n4. м•ҢлҰј к¶Ңн•ң мҡ”мІӯ:\r\n   ```dart\r\n   await _messaging.requestPermission(alert: true, badge: true, sound: true);\r\n   ```\r\n\r\n5. нҸ¬к·ёлқјмҡҙл“ң м•ҢлҰј н‘ңмӢң мҳөм…ҳ м„Өм •\r\n\r\n6. FCM нҶ нҒ° м ҖмһҘ + нҶ нҒ° к°ұмӢ  лҰ¬мҠӨл„Ҳ л“ұлЎқ:\r\n   ```dart\r\n   await _saveToken();\r\n   _messaging.onTokenRefresh.listen(_onTokenRefresh);\r\n   ```\r\n\r\n7. нҶ н”Ҫ кө¬лҸ… (м„Өм •м—җ л”°лқј):\r\n   ```dart\r\n   await _subscribeTopics();\r\n   ```\r\n\r\n8. л©”мӢңм§Җ н•ёл“Өлҹ¬ л“ұлЎқ:\r\n   ```dart\r\n   FirebaseMessaging.onMessage.listen(_onForegroundMessage);        // нҸ¬к·ёлқјмҡҙл“ң\r\n   FirebaseMessaging.onMessageOpenedApp.listen(_onMessageOpenedApp); // л°ұк·ёлқјмҡҙл“ң нғӯ\r\n   final initialMessage = await _messaging.getInitialMessage();      // мў…лЈҢ мғҒнғң нғӯ\r\n   ```\r\n\r\n---\r\n\r\n## `_saveToken` / `_onTokenRefresh`\r\n\r\n```dart\r\nstatic Future<void> _saveToken()\r\nstatic Future<void> _onTokenRefresh(String token)\r\n```\r\n\r\nFCM нҶ нҒ°мқ„ Firestore `users/{uid}` л¬ём„ңмқҳ `fcmToken` н•„л“ңм—җ м ҖмһҘ. Cloud Functionмқҙ мқҙ нҶ нҒ°мңјлЎң к°ңмқё м•ҢлҰј м „мҶЎ\r\n\r\n---\r\n\r\n## нҶ н”Ҫ кҙҖлҰ¬\r\n\r\n### `_subscribeTopics`\r\n\r\n```dart\r\nstatic Future<void> _subscribeTopics()\r\n```\r\n\r\n[SettingData](../data/setting_data.md) м„Өм •м—җ л”°лқј нҶ н”Ҫмқ„ кө¬лҸ…н•Ё:\r\n\r\n- `board_new_post`: м „мІҙ кІҢмӢңнҢҗ м•ҢлҰј\r\n- м№ҙн…Ңкі лҰ¬лі„: `board_free`, `board_question`, `board_info`, `board_lost`, `board_council`, `board_club`\r\n- `board_popular`: мқёкё°кёҖ м•ҢлҰј\r\n\r\n### н•ңкёҖвҶ’мҳҒл¬ё нҶ н”Ҫ л§Өн•‘\r\n\r\n```dart\r\nstatic const _categoryTopicKey = {\r\n  'мһҗмң ': 'free', 'м§Ҳл¬ё': 'question', 'м •ліҙкіөмң ': 'info',\r\n  'л¶„мӢӨл¬ј': 'lost', 'н•ҷмғқнҡҢ': 'council', 'лҸҷм•„лҰ¬': 'club',\r\n};\r\n```\r\n\r\nFCM нҶ н”ҪлӘ…м—җ н•ңкёҖ л¶Ҳк°Җ вҶ’ мҳҒл¬ё ліҖнҷҳ\r\n\r\n### `toggleBoardNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleBoardNotification(bool enabled)\r\n```\r\n\r\nм „мІҙ кІҢмӢңнҢҗ м•ҢлҰј нҶ кёҖ. `board_new_post` нҶ н”Ҫ кө¬лҸ…/н•ҙм ң + [SettingData](../data/setting_data.md) м ҖмһҘ\r\n\r\n### `toggleCategoryNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleCategoryNotification(String category, bool enabled)\r\n```\r\n\r\nм№ҙн…Ңкі лҰ¬лі„ м•ҢлҰј нҶ кёҖ. мҳҲ: `toggleCategoryNotification('мһҗмң ', false)`\r\n\r\n### `togglePopularNotification`\r\n\r\n```dart\r\nstatic Future<void> togglePopularNotification(bool enabled)\r\n```\r\n\r\nмқёкё°кёҖ м•ҢлҰј нҶ кёҖ. `board_popular` нҶ н”Ҫ\r\n\r\n---\r\n\r\n## `_onForegroundMessage`\r\n\r\n```dart\r\nstatic void _onForegroundMessage(RemoteMessage message)\r\n```\r\n\r\n**м„ӨлӘ…**: нҸ¬к·ёлқјмҡҙл“ңм—җм„ң FCM л©”мӢңм§Җ мҲҳмӢ  мӢң лЎңм»¬ м•ҢлҰјмңјлЎң н‘ңмӢңн•Ё\r\n\r\n```dart\r\n_localNotifications.show(\r\n  notification.hashCode,\r\n  notification.title,\r\n  notification.body,\r\n  NotificationDetails(...),\r\n  payload: payload,  // key=value;key=value нҳ•нғң\r\n);\r\n```\r\n\r\n---\r\n\r\n## `_handleDeepLink`\r\n\r\n```dart\r\nstatic Future<void> _handleDeepLink(Map<String, dynamic> data)\r\n```\r\n\r\n**м„ӨлӘ…**: м•ҢлҰј нғӯ мӢң data payload кё°л°ҳмңјлЎң нҷ”л©ҙмқ„ лқјмҡ°нҢ…н•Ё\r\n\r\n```dart\r\nswitch (type) {\r\n  case 'comment':\r\n  case 'new_post':\r\n    navigator.push(...PostDetailScreen(postId: postId));\r\n  case 'account':\r\n    if (isManager) navigator.push(...AdminScreen());\r\n    else navigator.push(...NotificationScreen());\r\n  case 'chat':\r\n    // chatIdлЎң chat л¬ём„ң мЎ°нҡҢ вҶ’ мғҒлҢҖл°© м •ліҙ лЎңл“ң вҶ’ ChatRoomScreen мқҙлҸҷ\r\n}\r\n```\r\n\r\n| type | лҢҖмғҒ | мқҙлҸҷ нҷ”л©ҙ |\r\n|------|------|----------|\r\n| `comment` | кІҢмӢңкёҖ мһ‘м„ұмһҗ / л©ҳм…ҳ лҢҖмғҒ | `PostDetailScreen` |\r\n| `new_post` | нҶ н”Ҫ кө¬лҸ…мһҗ | `PostDetailScreen` |\r\n| `account` | кҙҖлҰ¬мһҗ (к°Җмһ… мҡ”мІӯ) | `AdminScreen` |\r\n| `account` | мқјл°ҳ мң м Җ (мҠ№мқё/м •м§Җ л“ұ) | `NotificationScreen` |\r\n| `chat` | мұ„нҢ… м°ём—¬мһҗ | `ChatRoomScreen` |\r\n\r\n> кҙҖлҰ¬мһҗ/мқјл°ҳ мң м Җ кө¬л¶„мқҖ [`AuthService`](../data/auth_service.md)`.cachedProfile?.isManager`лЎң нҢҗлі„\r\n\r\n---\r\n\r\n## payload мқёмҪ”л”©/л””мҪ”л”©\r\n\r\n```dart\r\nstatic String _encodePayload(Map<String, dynamic> data)\r\n// вҶ’ \"type=comment;postId=abc123\"\r\n\r\nstatic Map<String, dynamic> decodePayload(String payload)\r\n// \"type=comment;postId=abc123\" вҶ’ {type: 'comment', postId: 'abc123'}\r\n```\r\n\r\nнҸ¬к·ёлқјмҡҙл“ң лЎңм»¬ м•ҢлҰјмқҳ payload м „лӢ¬мҡ©. `=`лЎң key-value л¶„лҰ¬, `;`лЎң мҢҚ л¶„лҰ¬\r\n\r\n---\r\n\r\n## `onUserLogin`\r\n\r\n```dart\r\nstatic Future<void> onUserLogin()\r\n```\r\n\r\nлЎңк·ёмқё м§Ғнӣ„ нҳём¶ң. нҶ нҒ° м ҖмһҘ + нҶ н”Ҫ мһ¬кө¬лҸ…\r\n\r\n---\r\n\r\n## `firebaseMessagingBackgroundHandler`\r\n\r\n```dart\r\n@pragma('vm:entry-point')\r\nFuture<void> firebaseMessagingBackgroundHandler(RemoteMessage message) async {}\r\n```\r\n\r\nл°ұк·ёлқјмҡҙл“ң л©”мӢңм§Җ н•ёл“Өлҹ¬. нҳ„мһ¬ л№Ҳ кө¬нҳ„ (мӢңмҠӨн…ң м•ҢлҰјмқҖ мһҗлҸҷ н‘ңмӢң)\r\n`@pragma('vm:entry-point')`лЎң tree-shaking л°©м§Җ\r\n","notification/fcm_service_en.md":"# FcmService\r\n\r\n> н•ңкөӯм–ҙ: [fcm_service.md](./fcm_service.md)\r\n\r\n> `lib/notification/fcm_service.dart` вҖ” FCM push notifications, topics, deep links\r\n\r\nAll methods are `static`. Handles Firebase Cloud Messaging initialization, token management, topic subscriptions, and deep-link routing.\r\n\r\n---\r\n\r\n## `initialize`\r\n\r\n```dart\r\nstatic Future<void> initialize()\r\n```\r\n\r\n**Description**: Initializes the FCM service. Called once from `main()`.\r\n\r\n1. Create the Android notification channel (`_initChannel`)\r\n\r\n2. **Initialize the local notifications plugin** (registers the tap callback for foreground FCM notifications):\r\n   ```dart\r\n   await _localNotifications.initialize(\r\n     const InitializationSettings(android: androidSettings, iOS: iosSettings),\r\n     onDidReceiveNotificationResponse: onNotificationTap,\r\n   );\r\n   ```\r\n   > `onNotificationTap` is imported from `main.dart`. On tap, it forwards to `notificationStream` + `handleLocalNotificationTap` вҶ’ calls `_handleDeepLink`.\r\n\r\n3. Register the Android notification channel\r\n\r\n4. Request notification permission:\r\n   ```dart\r\n   await _messaging.requestPermission(alert: true, badge: true, sound: true);\r\n   ```\r\n\r\n5. Configure foreground notification presentation options\r\n\r\n6. Save the FCM token + register a token-refresh listener:\r\n   ```dart\r\n   await _saveToken();\r\n   _messaging.onTokenRefresh.listen(_onTokenRefresh);\r\n   ```\r\n\r\n7. Subscribe to topics (based on settings):\r\n   ```dart\r\n   await _subscribeTopics();\r\n   ```\r\n\r\n8. Register message handlers:\r\n   ```dart\r\n   FirebaseMessaging.onMessage.listen(_onForegroundMessage);        // foreground\r\n   FirebaseMessaging.onMessageOpenedApp.listen(_onMessageOpenedApp); // background tap\r\n   final initialMessage = await _messaging.getInitialMessage();      // terminated tap\r\n   ```\r\n\r\n---\r\n\r\n## `_saveToken` / `_onTokenRefresh`\r\n\r\n```dart\r\nstatic Future<void> _saveToken()\r\nstatic Future<void> _onTokenRefresh(String token)\r\n```\r\n\r\nSaves the FCM token to the `fcmToken` field of the `users/{uid}` Firestore document. A Cloud Function uses this token to send personal notifications.\r\n\r\n---\r\n\r\n## Topic management\r\n\r\n### `_subscribeTopics`\r\n\r\n```dart\r\nstatic Future<void> _subscribeTopics()\r\n```\r\n\r\nSubscribes to topics based on the [SettingData](../data/setting_data.md) configuration:\r\n\r\n- `board_new_post`: notifications for the entire board\r\n- Per-category: `board_free`, `board_question`, `board_info`, `board_lost`, `board_council`, `board_club`\r\n- `board_popular`: popular-post notifications\r\n\r\n### Korean вҶ’ English topic mapping\r\n\r\n```dart\r\nstatic const _categoryTopicKey = {\r\n  'мһҗмң ': 'free', 'м§Ҳл¬ё': 'question', 'м •ліҙкіөмң ': 'info',\r\n  'л¶„мӢӨл¬ј': 'lost', 'н•ҷмғқнҡҢ': 'council', 'лҸҷм•„лҰ¬': 'club',\r\n};\r\n```\r\n\r\nFCM topic names cannot contain Korean вҶ’ convert to English.\r\n\r\n### `toggleBoardNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleBoardNotification(bool enabled)\r\n```\r\n\r\nToggles notifications for the entire board. Subscribes/unsubscribes the `board_new_post` topic + saves to [SettingData](../data/setting_data.md).\r\n\r\n### `toggleCategoryNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleCategoryNotification(String category, bool enabled)\r\n```\r\n\r\nToggles per-category notifications. Example: `toggleCategoryNotification('мһҗмң ', false)`.\r\n\r\n### `togglePopularNotification`\r\n\r\n```dart\r\nstatic Future<void> togglePopularNotification(bool enabled)\r\n```\r\n\r\nToggles popular-post notifications. `board_popular` topic.\r\n\r\n---\r\n\r\n## `_onForegroundMessage`\r\n\r\n```dart\r\nstatic void _onForegroundMessage(RemoteMessage message)\r\n```\r\n\r\n**Description**: When an FCM message is received in the foreground, displays it as a local notification.\r\n\r\n```dart\r\n_localNotifications.show(\r\n  notification.hashCode,\r\n  notification.title,\r\n  notification.body,\r\n  NotificationDetails(...),\r\n  payload: payload,  // key=value;key=value format\r\n);\r\n```\r\n\r\n---\r\n\r\n## `_handleDeepLink`\r\n\r\n```dart\r\nstatic Future<void> _handleDeepLink(Map<String, dynamic> data)\r\n```\r\n\r\n**Description**: Routes to a screen based on the data payload when the notification is tapped.\r\n\r\n```dart\r\nswitch (type) {\r\n  case 'comment':\r\n  case 'new_post':\r\n    navigator.push(...PostDetailScreen(postId: postId));\r\n  case 'account':\r\n    if (isManager) navigator.push(...AdminScreen());\r\n    else navigator.push(...NotificationScreen());\r\n  case 'chat':\r\n    // Look up chat document by chatId вҶ’ load peer info вҶ’ navigate to ChatRoomScreen\r\n}\r\n```\r\n\r\n| type | Target | Destination screen |\r\n|------|--------|--------------------|\r\n| `comment` | Post author / mentioned user | `PostDetailScreen` |\r\n| `new_post` | Topic subscribers | `PostDetailScreen` |\r\n| `account` | Admin (signup request) | `AdminScreen` |\r\n| `account` | Regular user (approved/suspended, etc.) | `NotificationScreen` |\r\n| `chat` | Chat participant | `ChatRoomScreen` |\r\n\r\n> Admin vs regular user is determined by [`AuthService`](../data/auth_service.md)`.cachedProfile?.isManager`.\r\n\r\n---\r\n\r\n## payload encoding/decoding\r\n\r\n```dart\r\nstatic String _encodePayload(Map<String, dynamic> data)\r\n// вҶ’ \"type=comment;postId=abc123\"\r\n\r\nstatic Map<String, dynamic> decodePayload(String payload)\r\n// \"type=comment;postId=abc123\" вҶ’ {type: 'comment', postId: 'abc123'}\r\n```\r\n\r\nUsed to carry the payload for foreground local notifications. `=` separates key and value; `;` separates pairs.\r\n\r\n---\r\n\r\n## `onUserLogin`\r\n\r\n```dart\r\nstatic Future<void> onUserLogin()\r\n```\r\n\r\nCalled right after login. Saves the token + re-subscribes to topics.\r\n\r\n---\r\n\r\n## `firebaseMessagingBackgroundHandler`\r\n\r\n```dart\r\n@pragma('vm:entry-point')\r\nFuture<void> firebaseMessagingBackgroundHandler(RemoteMessage message) async {}\r\n```\r\n\r\nBackground message handler. Currently an empty implementation (system notifications are displayed automatically).\r\n`@pragma('vm:entry-point')` prevents tree-shaking.\r\n","notification/popup_notice.md":"# PopupNotice\r\n\r\n> `lib/notification/popup_notice.dart` вҖ” мқём•ұ нҢқм—… кіөм§Җ\r\n\r\nFirestore `app_config/popup` л¬ём„ң кё°л°ҳ кёҙкёү/мқҙлІӨнҠё нҢқм—…\r\n\r\n---\r\n\r\n## `check`\r\n\r\n```dart\r\nstatic Future<void> check(BuildContext context)\r\n```\r\n\r\n**м„ӨлӘ…**: нҷңм„ұ нҢқм—…мқҙ мһҲмңјл©ҙ лӢӨмқҙм–јлЎңк·ёлҘј н‘ңмӢңн•Ё. `MainScreen.initState`м—җм„ң нҳём¶ң\r\n\r\n1. Firestoreм—җм„ң нҢқм—… м„Өм • мЎ°нҡҢ:\r\n   ```dart\r\n   final doc = await FirebaseFirestore.instance\r\n       .collection('app_config').doc('popup').get();\r\n   if (data['active'] != true) return;\r\n   ```\r\n\r\n2. лӮ м§ң лІ”мң„ мІҙнҒ¬ (`startDate` ~ `endDate`):\r\n   ```dart\r\n   if (startDate.isNotEmpty && todayStr.compareTo(startDate) < 0) return;\r\n   if (endDate.isNotEmpty && todayStr.compareTo(endDate) > 0) return;\r\n   ```\r\n\r\n3. \"мҳӨлҠҳ м•Ҳ ліҙкё°\" мІҙнҒ¬:\r\n   ```dart\r\n   final dismissKey = 'popup_dismissed_$todayStr';\r\n   if (prefs.getBool(dismissKey) == true) return;\r\n   ```\r\n\r\n4. нғҖмһ…лі„ мғүмғҒ/м•„мқҙмҪҳ кІ°м •:\r\n   ```dart\r\n   'emergency' вҶ’ Colors.red + Icons.warning_amber_rounded\r\n   'event'     вҶ’ Color(0xFF4CAF50) + Icons.celebration\r\n   'notice'    вҶ’ AppColors.theme.primaryColor + Icons.campaign\r\n   ```\r\n\r\n5. лӢӨмқҙм–јлЎңк·ё н‘ңмӢң:\r\n   - **н•„мҲҳ нҢқм—…** (`dismissible: false`): лӢ«кё° л¶Ҳк°Җ, нҷ•мқёл§Ң к°ҖлҠҘ\r\n   - **мқјл°ҳ нҢқм—…** (`dismissible: true`): нҷ•мқё + \"мҳӨлҠҳ н•ҳлЈЁ м•Ҳ ліҙкё°\" лІ„нҠј\r\n\r\n6. \"мҳӨлҠҳ н•ҳлЈЁ м•Ҳ ліҙкё°\" нғӯ мӢң:\r\n   ```dart\r\n   prefs.setBool(dismissKey, true);  // лӢ№мқј нӮӨлЎң м ҖмһҘ\r\n   ```\r\n\r\n---\r\n\r\n## Firestore л¬ём„ң кө¬мЎ° (`app_config/popup`)\r\n\r\n| н•„л“ң | нғҖмһ… | м„ӨлӘ… |\r\n|------|------|------|\r\n| `active` | bool | нҢқм—… нҷңм„ұнҷ” м—¬л¶Җ |\r\n| `title` | String | нҢқм—… м ңлӘ© |\r\n| `content` | String | нҢқм—… ліёл¬ё |\r\n| `type` | String | `'emergency'` / `'event'` / `'notice'` |\r\n| `startDate` | String | мӢңмһ‘мқј (`'2026-04-01'`) |\r\n| `endDate` | String | мў…лЈҢмқј |\r\n| `dismissible` | bool | лӢ«кё° к°ҖлҠҘ м—¬л¶Җ |\r\n","notification/popup_notice_en.md":"# PopupNotice\r\n\r\n> н•ңкөӯм–ҙ: [popup_notice.md](./popup_notice.md)\r\n\r\n> `lib/notification/popup_notice.dart` вҖ” In-app popup notices\r\n\r\nEmergency/event popup based on the Firestore `app_config/popup` document.\r\n\r\n---\r\n\r\n## `check`\r\n\r\n```dart\r\nstatic Future<void> check(BuildContext context)\r\n```\r\n\r\n**Description**: Displays a dialog if an active popup exists. Called from `MainScreen.initState`.\r\n\r\n1. Fetch the popup config from Firestore:\r\n   ```dart\r\n   final doc = await FirebaseFirestore.instance\r\n       .collection('app_config').doc('popup').get();\r\n   if (data['active'] != true) return;\r\n   ```\r\n\r\n2. Date-range check (`startDate` ~ `endDate`):\r\n   ```dart\r\n   if (startDate.isNotEmpty && todayStr.compareTo(startDate) < 0) return;\r\n   if (endDate.isNotEmpty && todayStr.compareTo(endDate) > 0) return;\r\n   ```\r\n\r\n3. \"Don't show today\" check:\r\n   ```dart\r\n   final dismissKey = 'popup_dismissed_$todayStr';\r\n   if (prefs.getBool(dismissKey) == true) return;\r\n   ```\r\n\r\n4. Determine color/icon by type:\r\n   ```dart\r\n   'emergency' вҶ’ Colors.red + Icons.warning_amber_rounded\r\n   'event'     вҶ’ Color(0xFF4CAF50) + Icons.celebration\r\n   'notice'    вҶ’ AppColors.theme.primaryColor + Icons.campaign\r\n   ```\r\n\r\n5. Display the dialog:\r\n   - **Mandatory popup** (`dismissible: false`): cannot be dismissed, only \"Confirm\" available\r\n   - **Regular popup** (`dismissible: true`): Confirm + \"Don't show today\" button\r\n\r\n6. When \"Don't show today\" is tapped:\r\n   ```dart\r\n   prefs.setBool(dismissKey, true);  // saved with today's key\r\n   ```\r\n\r\n---\r\n\r\n## Firestore document structure (`app_config/popup`)\r\n\r\n| Field | Type | Description |\r\n|-------|------|-------------|\r\n| `active` | bool | Whether the popup is active |\r\n| `title` | String | Popup title |\r\n| `content` | String | Popup body |\r\n| `type` | String | `'emergency'` / `'event'` / `'notice'` |\r\n| `startDate` | String | Start date (`'2026-04-01'`) |\r\n| `endDate` | String | End date |\r\n| `dismissible` | bool | Whether it can be dismissed |\r\n","notification/update_checker.md":"# UpdateChecker\r\n\r\n> `lib/notification/update_checker.dart` вҖ” Firestore кё°л°ҳ м•ұ лІ„м „ мІҙнҒ¬\r\n\r\n---\r\n\r\n## `check`\r\n\r\n```dart\r\nstatic Future<void> check(BuildContext context)\r\n```\r\n\r\n**м„ӨлӘ…**: м•ұ лІ„м „мқ„ мІҙнҒ¬н•ҳкі  м—…лҚ°мқҙнҠё лӢӨмқҙм–јлЎңк·ёлҘј н‘ңмӢңн•Ё. `MainScreen.initState`м—җм„ң нҳём¶ң\r\n\r\n1. Firestoreм—җм„ң лІ„м „ м •ліҙ мЎ°нҡҢ:\r\n   ```dart\r\n   final doc = await FirebaseFirestore.instance\r\n       .collection('app_config').doc('version').get();\r\n   ```\r\n\r\n2. нҳ„мһ¬ м•ұ лІ„м „ нҷ•мқё:\r\n   ```dart\r\n   final packageInfo = await PackageInfo.fromPlatform();\r\n   final currentVersion = packageInfo.version;\r\n   ```\r\n\r\n3. лІ„м „ л№„көҗ:\r\n   ```dart\r\n   final forceUpdate = _compareVersions(currentVersion, minVersion) < 0;   // мөңмҶҢ лІ„м „ лҜёл§Ң\r\n   final optionalUpdate = _compareVersions(currentVersion, latestVersion) < 0;  // мөңмӢ  лҜёл§Ң\r\n   ```\r\n\r\n4. лӢӨмқҙм–јлЎңк·ё л¶„кё°:\r\n   - **н•„мҲҳ м—…лҚ°мқҙнҠё** (`forceUpdate`): лӢ«кё° л¶Ҳк°Җ (`PopScope.canPop: false`), \"м—…лҚ°мқҙнҠё\"л§Ң к°ҖлҠҘ\r\n   - **м„ нғқ м—…лҚ°мқҙнҠё** (`optionalUpdate`): \"м—…лҚ°мқҙнҠё\" + \"лӮҳмӨ‘м—җ\" лІ„нҠј\r\n\r\n5. м—…лҚ°мқҙнҠё лІ„нҠј нғӯ мӢң мҠӨнҶ м–ҙ URLлЎң мқҙлҸҷ:\r\n   ```dart\r\n   launchUrl(Uri.parse(updateUrl), mode: LaunchMode.externalApplication);\r\n   ```\r\n\r\n6. н”Ңлһ«нҸјлі„ URL л¶„кё°:\r\n   ```dart\r\n   final updateUrl = (isIOS ? data['updateUrlIOS'] : data['updateUrlAndroid'])\r\n       ?? data['updateUrl'] ?? '';\r\n   ```\r\n\r\n---\r\n\r\n## `_compareVersions`\r\n\r\n```dart\r\nstatic int _compareVersions(String a, String b)\r\n```\r\n\r\n**м„ӨлӘ…**: мӢңл§ЁнӢұ лІ„м „мқ„ л№„көҗн•Ё (major.minor.patch)\r\n\r\n```dart\r\nfinal aParts = a.split('.').map(int.parse).toList();\r\nfinal bParts = b.split('.').map(int.parse).toList();\r\n// мҷјмӘҪл¶Җн„° л№„көҗ, a < b вҶ’ -1, a > b вҶ’ 1, к°ҷмңјл©ҙ 0\r\n```\r\n\r\nл№Ҳ л¬ёмһҗм—ҙмқҙл©ҙ 0 л°ҳнҷҳ (л№„көҗ кұҙл„ҲлңҖ)\r\n\r\n---\r\n\r\n## Firestore л¬ём„ң кө¬мЎ° (`app_config/version`)\r\n\r\n| н•„л“ң | нғҖмһ… | м„ӨлӘ… |\r\n|------|------|------|\r\n| `latest` | String | мөңмӢ  лІ„м „ (мҳҲ: `'2.1.0'`) |\r\n| `min` | String | мөңмҶҢ м§Җмӣҗ лІ„м „ (мқҙ лҜёл§Ңмқҙл©ҙ н•„мҲҳ м—…лҚ°мқҙнҠё) |\r\n| `updateUrl` | String | кё°ліё мҠӨнҶ м–ҙ URL |\r\n| `updateUrlAndroid` | String? | Android м „мҡ© URL |\r\n| `updateUrlIOS` | String? | iOS м „мҡ© URL |\r\n| `message` | String | м—…лҚ°мқҙнҠё м•ҲлӮҙ л©”мӢңм§Җ |\r\n","notification/update_checker_en.md":"# UpdateChecker\r\n\r\n> н•ңкөӯм–ҙ: [update_checker.md](./update_checker.md)\r\n\r\n> `lib/notification/update_checker.dart` вҖ” Firestore-based app version check\r\n\r\n---\r\n\r\n## `check`\r\n\r\n```dart\r\nstatic Future<void> check(BuildContext context)\r\n```\r\n\r\n**Description**: Checks the app versio
