goryNotification`\n\n```dart\nstatic Future<void> toggleCategoryNotification(String category, bool enabled)\n```\n\nToggles per-category notifications. Example: `toggleCategoryNotification('자유', false)`.\n\n### `togglePopularNotification`\n\n```dart\nstatic Future<void> togglePopularNotification(bool enabled)\n```\n\nToggles popular-post notifications. `board_popular` topic.\n\n---\n\n## `_onForegroundMessage`\n\n```dart\nstatic void _onForegroundMessage(RemoteMessage message)\n```\n\n**Description**: When an FCM message is received in the foreground, displays it as a local notification.\n\n```dart\n_localNotifications.show(\n  notification.hashCode,\n  notification.title,\n  notification.body,\n  NotificationDetails(...),\n  payload: payload,  // key=value;key=value format\n);\n```\n\n---\n\n## `_handleDeepLink`\n\n```dart\nstatic Future<void> _handleDeepLink(Map<String, dynamic> data)\n```\n\n**Description**: Routes to a screen based on the data payload when the notification is tapped.\n\n```dart\nswitch (type) {\n  case 'comment':\n  case 'new_post':\n    navigator.push(...PostDetailScreen(postId: postId));\n  case 'account':\n    if (isManager) navigator.push(...AdminScreen());\n    else navigator.push(...NotificationScreen());\n  case 'chat':\n    // Look up chat document by chatId → load peer info → navigate to ChatRoomScreen\n}\n```\n\n| type | Target | Destination screen |\n|------|--------|--------------------|\n| `comment` | Post author / mentioned user | `PostDetailScreen` |\n| `new_post` | Topic subscribers | `PostDetailScreen` |\n| `account` | Admin (signup request) | `AdminScreen` |\n| `account` | Regular user (approved/suspended, etc.) | `NotificationScreen` |\n| `chat` | Chat participant | `ChatRoomScreen` |\n\n> Admin vs regular user is determined by [`AuthService`](../data/auth_service.md)`.cachedProfile?.isManager`.\n\n---\n\n## payload encoding/decoding\n\n```dart\nstatic String _encodePayload(Map<String, dynamic> data)\n// → \"type=comment;postId=abc123\"\n\nstatic Map<String, dynamic> decodePayload(String payload)\n// \"type=comment;postId=abc123\" → {type: 'comment', postId: 'abc123'}\n```\n\nUsed to carry the payload for foreground local notifications. `=` separates key and value; `;` separates pairs.\n\n---\n\n## `onUserLogin`\n\n```dart\nstatic Future<void> onUserLogin()\n```\n\nCalled right after login. Saves the token + re-subscribes to topics.\n\n---\n\n## `firebaseMessagingBackgroundHandler`\n\n```dart\n@pragma('vm:entry-point')\nFuture<void> firebaseMessagingBackgroundHandler(RemoteMessage message) async {}\n```\n\nBackground message handler. Currently an empty implementation (system notifications are displayed automatically).\n`@pragma('vm:entry-point')` prevents tree-shaking.\n","notification/popup_notice.md":"# PopupNotice\r\n\r\n> `lib/notification/popup_notice.dart` — 인앱 팝업 공지\r\n\r\nFirestore `app_config/popup` 문서 기반 긴급/이벤트 팝업\r\n\r\n---\r\n\r\n## `check`\r\n\r\n```dart\r\nstatic Future<void> check(BuildContext context)\r\n```\r\n\r\n**설명**: 활성 팝업이 있으면 다이얼로그를 표시함. `MainScreen.initState`에서 호출\r\n\r\n1. Firestore에서 팝업 설정 조회:\r\n   ```dart\r\n   final doc = await FirebaseFirestore.instance\r\n       .collection('app_config').doc('popup').get();\r\n   if (data['active'] != true) return;\r\n   ```\r\n\r\n2. 날짜 범위 체크 (`startDate` ~ `endDate`):\r\n   ```dart\r\n   if (startDate.isNotEmpty && todayStr.compareTo(startDate) < 0) return;\r\n   if (endDate.isNotEmpty && todayStr.compareTo(endDate) > 0) return;\r\n   ```\r\n\r\n3. \"오늘 안 보기\" 체크:\r\n   ```dart\r\n   final dismissKey = 'popup_dismissed_$todayStr';\r\n   if (prefs.getBool(dismissKey) == true) return;\r\n   ```\r\n\r\n4. 타입별 색상/아이콘 결정:\r\n   ```dart\r\n   'emergency' → Colors.red + Icons.warning_amber_rounded\r\n   'event'     → Color(0xFF4CAF50) + Icons.celebration\r\n   'notice'    → AppColors.theme.primaryColor + Icons.campaign\r\n   ```\r\n\r\n5. 다이얼로그 표시:\r\n   - **필수 팝업** (`dismissible: false`): 닫기 불가, 확인만 가능\r\n   - **일반 팝업** (`dismissible: true`): 확인 + \"오늘 하루 안 보기\" 버튼\r\n\r\n6. \"오늘 하루 안 보기\" 탭 시:\r\n   ```dart\r\n   prefs.setBool(dismissKey, true);  // 당일 키로 저장\r\n   ```\r\n\r\n---\r\n\r\n## Firestore 문서 구조 (`app_config/popup`)\r\n\r\n| 필드 | 타입 | 설명 |\r\n|------|------|------|\r\n| `active` | bool | 팝업 활성화 여부 |\r\n| `title` | String | 팝업 제목 |\r\n| `content` | String | 팝업 본문 |\r\n| `type` | String | `'emergency'` / `'event'` / `'notice'` |\r\n| `startDate` | String | 시작일 (`'2026-04-01'`) |\r\n| `endDate` | String | 종료일 |\r\n| `dismissible` | bool | 닫기 가능 여부 |\r\n","notification/popup_notice_en.md":"# PopupNotice\n\n> 한국어: [popup_notice.md](./popup_notice.md)\n\n> `lib/notification/popup_notice.dart` — In-app popup notices\n\nEmergency/event popup based on the Firestore `app_config/popup` document.\n\n---\n\n## `check`\n\n```dart\nstatic Future<void> check(BuildContext context)\n```\n\n**Description**: Displays a dialog if an active popup exists. Called from `MainScreen.initState`.\n\n1. Fetch the popup config from Firestore:\n   ```dart\n   final doc = await FirebaseFirestore.instance\n       .collection('app_config').doc('popup').get();\n   if (data['active'] != true) return;\n   ```\n\n2. Date-range check (`startDate` ~ `endDate`):\n   ```dart\n   if (startDate.isNotEmpty && todayStr.compareTo(startDate) < 0) return;\n   if (endDate.isNotEmpty && todayStr.compareTo(endDate) > 0) return;\n   ```\n\n3. \"Don't show today\" check:\n   ```dart\n   final dismissKey = 'popup_dismissed_$todayStr';\n   if (prefs.getBool(dismissKey) == true) return;\n   ```\n\n4. Determine color/icon by type:\n   ```dart\n   'emergency' → Colors.red + Icons.warning_amber_rounded\n   'event'     → Color(0xFF4CAF50) + Icons.celebration\n   'notice'    → AppColors.theme.primaryColor + Icons.campaign\n   ```\n\n5. Display the dialog:\n   - **Mandatory popup** (`dismissible: false`): cannot be dismissed, only \"Confirm\" available\n   - **Regular popup** (`dismissible: true`): Confirm + \"Don't show today\" button\n\n6. When \"Don't show today\" is tapped:\n   ```dart\n   prefs.setBool(dismissKey, true);  // saved with today's key\n   ```\n\n---\n\n## Firestore document structure (`app_config/popup`)\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `active` | bool | Whether the popup is active |\n| `title` | String | Popup title |\n| `content` | String | Popup body |\n| `type` | String | `'emergency'` / `'event'` / `'notice'` |\n| `startDate` | String | Start date (`'2026-04-01'`) |\n| `endDate` | String | End date |\n| `dismissible` | bool | Whether it can be dismissed |\n","notification/update_checker.md":"# UpdateChecker\r\n\r\n> `lib/notification/update_checker.dart` — Firestore 기반 앱 버전 체크\r\n\r\n---\r\n\r\n## `check`\r\n\r\n```dart\r\nstatic Future<void> check(BuildContext context)\r\n```\r\n\r\n**설명**: 앱 버전을 체크하고 업데이트 다이얼로그를 표시함. `MainScreen.initState`에서 호출\r\n\r\n1. Firestore에서 버전 정보 조회:\r\n   ```dart\r\n   final doc = await FirebaseFirestore.instance\r\n       .collection('app_config').doc('version').get();\r\n   ```\r\n\r\n2. 현재 앱 버전 확인:\r\n   ```dart\r\n   final packageInfo = await PackageInfo.fromPlatform();\r\n   final currentVersion = packageInfo.version;\r\n   ```\r\n\r\n3. 버전 비교:\r\n   ```dart\r\n   final forceUpdate = _compareVersions(currentVersion, minVersion) < 0;   // 최소 버전 미만\r\n   final optionalUpdate = _compareVersions(currentVersion, latestVersion) < 0;  // 최신 미만\r\n   ```\r\n\r\n4. 다이얼로그 분기:\r\n   - **필수 업데이트** (`forceUpdate`): 닫기 불가 (`PopScope.canPop: false`), \"업데이트\"만 가능\r\n   - **선택 업데이트** (`optionalUpdate`): \"업데이트\" + \"나중에\" 버튼\r\n\r\n5. 업데이트 버튼 탭 시 스토어 URL로 이동:\r\n   ```dart\r\n   launchUrl(Uri.parse(updateUrl), mode: LaunchMode.externalApplication);\r\n   ```\r\n\r\n6. 플랫폼별 URL 분기:\r\n   ```dart\r\n   final updateUrl = (isIOS ? data['updateUrlIOS'] : data['updateUrlAndroid'])\r\n       ?? data['updateUrl'] ?? '';\r\n   ```\r\n\r\n---\r\n\r\n## `_compareVersions`\r\n\r\n```dart\r\nstatic int _compareVersions(String a, String b)\r\n```\r\n\r\n**설명**: 시맨틱 버전을 비교함 (major.minor.patch)\r\n\r\n```dart\r\nfinal aParts = a.split('.').map(int.parse).toList();\r\nfinal bParts = b.split('.').map(int.parse).toList();\r\n// 왼쪽부터 비교, a < b → -1, a > b → 1, 같으면 0\r\n```\r\n\r\n빈 문자열이면 0 반환 (비교 건너뜀)\r\n\r\n---\r\n\r\n## Firestore 문서 구조 (`app_config/version`)\r\n\r\n| 필드 | 타입 | 설명 |\r\n|------|------|------|\r\n| `latest` | String | 최신 버전 (예: `'2.1.0'`) |\r\n| `min` | String | 최소 지원 버전 (이 미만이면 필수 업데이트) |\r\n| `updateUrl` | String | 기본 스토어 URL |\r\n| `updateUrlAndroid` | String? | Android 전용 URL |\r\n| `updateUrlIOS` | String? | iOS 전용 URL |\r\n| `message` | String | 업데이트 안내 메시지 |\r\n","notification/update_checker_en.md":"# UpdateChecker\n\n> 한국어: [update_checker.md](./update_checker.md)\n\n> `lib/notification/update_checker.dart` — Firestore-based app version check\n\n---\n\n## `check`\n\n```dart\nstatic Future<void> check(BuildContext context)\n```\n\n**Description**: Checks the app version and displays an update dialog. Called from `MainScreen.initState`.\n\n1. Fetch version info from Firestore:\n   ```dart\n   final doc = await FirebaseFirestore.instance\n       .collection('app_config').doc('version').get();\n   ```\n\n2. Check the current app version:\n   ```dart\n   final packageInfo = await PackageInfo.fromPlatform();\n   final currentVersion = packageInfo.version;\n   ```\n\n3. Version comparison:\n   ```dart\n   final forceUpdate = _compareVersions(currentVersion, minVersion) < 0;   // below minimum\n   final optionalUpdate = _compareVersions(currentVersion, latestVersion) < 0;  // below latest\n   ```\n\n4. Dialog branching:\n   - **Forced update** (`forceUpdate`): cannot be dismissed (`PopScope.canPop: false`), only \"Update\" available\n   - **Optional update** (`optionalUpdate`): \"Update\" + \"Later\" buttons\n\n5. When the Update button is tapped, open the store URL:\n   ```dart\n   launchUrl(Uri.parse(updateUrl), mode: LaunchMode.externalApplication);\n   ```\n\n6. Per-platform URL branching:\n   ```dart\n   final updateUrl = (isIOS ? data['updateUrlIOS'] : data['updateUrlAndroid'])\n       ?? data['updateUrl'] ?? '';\n   ```\n\n---\n\n## `_compareVersions`\n\n```dart\nstatic int _compareVersions(String a, String b)\n```\n\n**Description**: Compares semantic versions (major.minor.patch).\n\n```dart\nfinal aParts = a.split('.').map(int.parse).toList();\nfinal bParts = b.split('.').map(int.parse).toList();\n// Compare from the left: a < b → -1, a > b → 1, equal → 0\n```\n\nReturns 0 for an empty string (comparison skipped).\n\n---\n\n## Firestore document structure (`app_config/version`)\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `latest` | String | Latest version (e.g., `'2.1.0'`) |\n| `min` | String | Minimum supported version (below this → forced update) |\n| `updateUrl` | String | Default store URL |\n| `updateUrlAndroid` | String? | Android-specific URL |\n| `updateUrlIOS` | String? | iOS-specific URL |\n| `message` | String | Update notice message |\n","providers/providers.md":"# Providers\r\n\r\n> `lib/providers/` — Riverpod Notifier/AsyncNotifier 전체\r\n\r\n---\r\n\r\n## auth_provider.dart\r\n\r\n### `authStateProvider`\r\n\r\n```dart\r\nfinal authStateProvider = StreamProvider<User?>((ref) {\r\n  return FirebaseAuth.instance.authStateChanges();\r\n});\r\n```\r\n\r\nFirebase Auth 상태 스트림. 로그인/로그아웃 시 자동 갱신\r\n\r\n### `UserProfileNotifier` / `userProfileProvider`\r\n\r\n```dart\r\nclass UserProfileNotifier extends AsyncNotifier<UserProfile?> {\r\n  @override\r\n  Future<UserProfile?> build() async {\r\n    final auth = ref.watch(authStateProvider);\r\n    return auth.when(\r\n      data: (user) async => user == null ? null : AuthService.getUserProfile(),\r\n      loading: () => null,\r\n      error: (_, __) => null,\r\n    );\r\n  }\r\n}\r\n```\r\n\r\n`authStateProvider`를 watch → 로그인 상태 변경 시 자동 재조회\r\n\r\n#### `refresh()`\r\n\r\n```dart\r\nFuture<void> refresh() async {\r\n  state = const AsyncLoading();\r\n  AuthService.clearProfileCache();\r\n  state = await AsyncValue.guard(() => AuthService.getUserProfile());\r\n}\r\n```\r\n\r\n프로필 수정 후 호출. 캐시 초기화 + Firestore에서 새로 조회\r\n\r\n#### `save(profile)`\r\n\r\n```dart\r\nFuture<void> save(UserProfile profile) async {\r\n  state = AsyncData(profile);                    // 낙관적 UI 업데이트\r\n  await AuthService.saveUserProfile(profile);    // 서버 저장\r\n  AuthService.clearProfileCache();\r\n}\r\n```\r\n\r\n### 파생 Provider\r\n\r\n| Provider | 타입 | 설명 |\r\n|----------|------|------|\r\n| `isLoggedInProvider` | `Provider<bool>` | `authStateProvider.user != null` |\r\n| `isManagerProvider` | `Provider<bool>` | `profile?.isManager ?? false` |\r\n| `isAdminProvider` | `Provider<bool>` | `profile?.isAdmin ?? false` |\r\n| `isSuspendedProvider` | `Provider<bool>` | `profile?.isSuspended ?? false` |\r\n\r\n---\r\n\r\n## grade_provider.dart\r\n\r\n### `ExamsNotifier` / `examsProvider`\r\n\r\n```dart\r\nclass ExamsNotifier extends AsyncNotifier<List<Exam>> {\r\n  @override\r\n  Future<List<Exam>> build() => GradeManager.loadExams();\r\n}\r\n```\r\n\r\n모든 mutator는 `await future`로 초기 build 완료를 보장한 뒤 직접 state를 갱신 (`invalidateSelf` race condition 회피). 데이터 저장은 [`GradeManager`](../data/grade_manager.md) 정적 메서드에 위임\r\n\r\n#### `add(exam)`\r\n\r\n```dart\r\nFuture<void> add(Exam exam) async {\r\n  final current = await future;\r\n  await GradeManager.addExam(exam);\r\n  state = AsyncData([...current, exam]);\r\n}\r\n```\r\n\r\n#### `updateExam(exam)`\r\n\r\n```dart\r\nstate = AsyncData([\r\n  for (final e in current) if (e.id == exam.id) exam else e,\r\n]);\r\n```\r\n\r\n#### `delete(id)`\r\n\r\n```dart\r\nstate = AsyncData(current.where((e) => e.id != id).toList());\r\nawait GradeManager.deleteExam(id);  // 낙관적: UI 먼저 갱신, 저장은 후처리\r\n```\r\n\r\n### `examsByTypeProvider`\r\n\r\n```dart\r\nfinal examsByTypeProvider = Provider.family<List<Exam>, ExamTab>((ref, tab) {\r\n  final exams = ref.watch(examsProvider).valueOrNull ?? [];\r\n  if (tab == 0) return exams.where((e) => e.type == 'midterm' || e.type == 'final').toList();\r\n  return exams.where((e) => e.type == 'mock' || e.type == 'private_mock').toList();\r\n});\r\n```\r\n\r\n탭 0 = 수시 (중간/기말), 탭 1 = 정시 (모의/사설)\r\n\r\n### `GoalsNotifier` / `goalsProvider`\r\n\r\n```dart\r\nclass GoalsNotifier extends AsyncNotifier<Map<String, double>> {\r\n  @override\r\n  Future<Map<String, double>> build() => GradeManager.loadGoals();\r\n\r\n  Future<void> save(Map<String, double> goals) async {\r\n    await future;\r\n    await GradeManager.saveGoals(goals);\r\n    state = AsyncData(goals);\r\n  }\r\n}\r\n```\r\n\r\n수시 목표 등급 (과목명 → 등급 double)\r\n\r\n### `JeongsiGoalsNotifier` / `jeongsiGoalsProvider`\r\n\r\n정시 목표 백분위. `GoalsNotifier`와 동일 구조, `GradeManager.loadJeongsiGoals()` 사용\r\n\r\n---\r\n\r\n## settings_provider.dart\r\n\r\n### `GradeClassNotifier` / `gradeClassProvider`\r\n\r\n```dart\r\nclass GradeClassNotifier extends Notifier<GradeClassState> {\r\n  @override\r\n  GradeClassState build() => GradeClassState(\r\n    grade: SettingData().grade,\r\n    classNum: SettingData().classNum,\r\n  );\r\n}\r\n```\r\n\r\n동기 `Notifier`. [SettingData](../data/setting_data.md) 싱글톤과 양방향 동기화\r\n\r\n#### 메서드\r\n\r\n| 메서드 | 설명 |\r\n|--------|------|\r\n| `setGrade(grade)` | 학년만 변경 |\r\n| `setClassNum(classNum)` | 반만 변경 |\r\n| `setBoth(grade, classNum)` | 학년+반 동시 변경 |\r\n\r\n### `NotificationSettingsNotifier` / `notificationSettingsProvider`\r\n\r\n```dart\r\nclass NotificationSettingsNotifier extends Notifier<NotificationSettings> {\r\n  @override\r\n  NotificationSettings build() {\r\n    final s = SettingData();\r\n    return NotificationSettings(\r\n      breakfast: s.isBreakfastNotificationOn,\r\n      breakfastTime: s.breakfastTime,\r\n      // ... lunch, dinner, board\r\n    );\r\n  }\r\n}\r\n```\r\n\r\n알림 설정 통합 상태. 각 setter(`setBreakfast`, `setLunch`, `setDinner`, `setBoard`)가 [SettingData](../data/setting_data.md)와 state를 동시에 갱신\r\n\r\n### `LocaleNotifier` / `localeProvider`\r\n\r\n```dart\r\nclass LocaleNotifier extends Notifier<Locale?> {\r\n  @override\r\n  Locale? build() {\r\n    final code = SettingData().localeCode;\r\n    return code.isEmpty ? null : Locale(code);\r\n  }\r\n\r\n  void setLocale(Locale? locale) {\r\n    SettingData().localeCode = locale?.languageCode ?? '';\r\n    state = locale;\r\n  }\r\n}\r\n```\r\n\r\n인앱 언어 전환. `null` = 시스템 로캘, `Locale('ko')` = 한국어, `Locale('en')` = 영어. `HansolHighSchool` 루트 위젯에서 `ref.watch(localeProvider)` → `MaterialApp.locale`에 전달\r\n\r\n### `AppRefreshNotifier` / `appRefreshProvider`\r\n\r\n```dart\r\nclass AppRefreshNotifier extends Notifier<int> {\r\n  @override\r\n  int build() => 0;\r\n\r\n  void refresh() => state++;\r\n}\r\n```\r\n\r\n`refresh()` 호출 시 카운터 증가 → `ValueKey(refreshKey)` 변경 → MainScreen 전체 재생성. 로그인/로그아웃/프로필 변경 후 호출\r\n\r\n**비위젯 코드에서 접근**: `providerContainer.read(appRefreshProvider.notifier).refresh()`\r\n\r\n---\r\n\r\n## theme_provider.dart\r\n\r\n### `Theme` / `themeProvider`\r\n\r\n```dart\r\n@Riverpod(keepAlive: true)\r\nclass Theme extends _$Theme {\r\n  @override\r\n  ThemeMode build() => _indexToMode(SettingData().themeModeIndex);\r\n\r\n  void setMode(int index) {\r\n    SettingData().themeModeIndex = index;\r\n    state = _indexToMode(index);\r\n  }\r\n}\r\n```\r\n\r\n`riverpod_annotation` (코드 생성) 기반. `keepAlive: true`로 Provider가 dispose되지 않음\r\n\r\n인덱스 매핑: 0 = 라이트, 1 = 다크, 2 = 시스템\r\n","providers/providers_en.md":"# Providers\n\n> 한국어: [providers.md](./providers.md)\n\n> `lib/providers/` — All Riverpod Notifier / AsyncNotifier providers\n\n---\n\n## auth_provider.dart\n\n### `authStateProvider`\n\n```dart\nfinal authStateProvider = StreamProvider<User?>((ref) {\n  return FirebaseAuth.instance.authStateChanges();\n});\n```\n\nFirebase Auth state stream. Automatically refreshes on login/logout.\n\n### `UserProfileNotifier` / `userProfileProvider`\n\n```dart\nclass UserProfileNotifier extends AsyncNotifier<UserProfile?> {\n  @override\n  Future<UserProfile?> build() async {\n    final auth = ref.watch(authStateProvider);\n    return auth.when(\n      data: (user) async => user == null ? null : AuthService.getUserProfile(),\n      loading: () => null,\n      error: (_, __) => null,\n    );\n  }\n}\n```\n\nWatches `authStateProvider` → automatically re-fetches whenever the login state changes.\n\n#### `refresh()`\n\n```dart\nFuture<void> refresh() async {\n  state = const AsyncLoading();\n  AuthService.clearProfileCache();\n  state = await AsyncValue.guard(() => AuthService.getUserProfile());\n}\n```\n\nCalled after editing the profile. Clears the cache + re-fetches from Firestore.\n\n#### `save(profile)`\n\n```dart\nFuture<void> save(UserProfile profile) async {\n  state = AsyncData(profile);                    // optimistic UI update\n  await AuthService.saveUserProfile(profile);    // save to server\n  AuthService.clearProfileCache();\n}\n```\n\n### Derived providers\n\n| Provider | Type | Description |\n|----------|------|-------------|\n| `isLoggedInProvider` | `Provider<bool>` | `authStateProvider.user != null` |\n| `isManagerProvider` | `Provider<bool>` | `profile?.isManager ?? false` |\n| `isAdminProvider` | `Provider<bool>` | `profile?.isAdmin ?? false` |\n| `isSuspendedProvider` | `Provider<bool>` | `profile?.isSuspended ?? false` |\n\n---\n\n## grade_provider.dart\n\n### `ExamsNotifier` / `examsProvider`\n\n```dart\nclass ExamsNotifier extends AsyncNotifier<List<Exam>> {\n  @override\n  Future<List<Exam>> build() => GradeManager.loadExams();\n}\n```\n\nAll mutators use `await future` to guarantee initial build completion, then update state directly (avoiding the `invalidateSelf` race condition). Data storage is delegated to [`GradeManager`](../data/grade_manager.md) static methods.\n\n#### `add(exam)`\n\n```dart\nFuture<void> add(Exam exam) async {\n  final current = await future;\n  await GradeManager.addExam(exam);\n  state = AsyncData([...current, exam]);\n}\n```\n\n#### `updateExam(exam)`\n\n```dart\nstate = AsyncData([\n  for (final e in current) if (e.id == exam.id) exam else e,\n]);\n```\n\n#### `delete(id)`\n\n```dart\nstate = AsyncData(current.where((e) => e.id != id).toList());\nawait GradeManager.deleteExam(id);  // optimistic: update UI first, persist afterwards\n```\n\n### `examsByTypeProvider`\n\n```dart\nfinal examsByTypeProvider = Provider.family<List<Exam>, ExamTab>((ref, tab) {\n  final exams = ref.watch(examsProvider).valueOrNull ?? [];\n  if (tab == 0) return exams.where((e) => e.type == 'midterm' || e.type == 'final').toList();\n  return exams.where((e) => e.type == 'mock' || e.type == 'private_mock').toList();\n});\n```\n\nTab 0 = Susi (midterm/final), Tab 1 = Jeongsi (mock/private mock).\n\n### `GoalsNotifier` / `goalsProvider`\n\n```dart\nclass GoalsNotifier extends AsyncNotifier<Map<String, double>> {\n  @override\n  Future<Map<String, double>> build() => GradeManager.loadGoals();\n\n  Future<void> save(Map<String, double> goals) async {\n    await future;\n    await GradeManager.saveGoals(goals);\n    state = AsyncData(goals);\n  }\n}\n```\n\nSusi target grades (subject name → grade double).\n\n### `JeongsiGoalsNotifier` / `jeongsiGoalsProvider`\n\nJeongsi target percentiles. Same structure as `GoalsNotifier`, using `GradeManager.loadJeongsiGoals()`.\n\n---\n\n## settings_provider.dart\n\n### `GradeClassNotifier` / `gradeClassProvider`\n\n```dart\nclass GradeClassNotifier extends Notifier<GradeClassState> {\n  @override\n  GradeClassState build() => GradeClassState(\n    grade: SettingData().grade,\n    classNum: SettingData().classNum,\n  );\n}\n```\n\nSynchronous `Notifier`. Bidirectionally synced with the [SettingData](../data/setting_data.md) singleton.\n\n#### Methods\n\n| Method | Description |\n|--------|-------------|\n| `setGrade(grade)` | Changes the grade only |\n| `setClassNum(classNum)` | Changes the class number only |\n| `setBoth(grade, classNum)` | Changes both grade and class number at once |\n\n### `NotificationSettingsNotifier` / `notificationSettingsProvider`\n\n```dart\nclass NotificationSettingsNotifier extends Notifier<NotificationSettings> {\n  @override\n  NotificationSettings build() {\n    final s = SettingData();\n    return NotificationSettings(\n      breakfast: s.isBreakfastNotificationOn,\n      breakfastTime: s.breakfastTime,\n      // ... lunch, dinner, board\n    );\n  }\n}\n```\n\nUnified notification settings state. Each setter (`setBreakfast`, `setLunch`, `setDinner`, `setBoard`) updates both [SettingData](../data/setting_data.md) and state at the same time.\n\n### `LocaleNotifier` / `localeProvider`\n\n```dart\nclass LocaleNotifier extends Notifier<Locale?> {\n  @override\n  Locale? build() {\n    final code = SettingData().localeCode;\n    return code.isEmpty ? null : Locale(code);\n  }\n\n  void setLocale(Locale? locale) {\n    SettingData().localeCode = locale?.languageCode ?? '';\n    state = locale;\n  }\n}\n```\n\nIn-app language switcher. `null` = system locale, `Locale('ko')` = Korean, `Locale('en')` = English. The root `HansolHighSchool` widget does `ref.watch(localeProvider)` → passes it to `MaterialApp.locale`.\n\n### `AppRefreshNotifier` / `appRefreshProvider`\n\n```dart\nclass AppRefreshNotifier extends Notifier<int> {\n  @override\n  int build() => 0;\n\n  void refresh() => state++;\n}\n```\n\nWhen `refresh()` is called, the counter increments → `ValueKey(refreshKey)` changes → the entire MainScreen is rebuilt. Called after login/logout/profile changes.\n\n**Access from non-widget code**: `providerContainer.read(appRefreshProvider.notifier).refresh()`.\n\n---\n\n## theme_provider.dart\n\n### `Theme` / `themeProvider`\n\n```dart\n@Riverpod(keepAlive: true)\nclass Theme extends _$Theme {\n  @override\n  ThemeMode build() => _indexToMode(SettingData().themeModeIndex);\n\n  void setMode(int index) {\n    SettingData().themeModeIndex = index;\n    state = _indexToMode(index);\n  }\n}\n```\n\nBased on `riverpod_annotation` (code generation). `keepAlive: true` ensures the provider is not disposed.\n\nIndex mapping: 0 = Light, 1 = Dark, 2 = System.\n","README.md":"# API Reference - 목차\r\n\r\n> 화면(Screen)·위젯(Widget) 문서는 제외. 서비스·모델·API·알림 등 핵심 계층만 정리\r\n>\r\n> 주제별 가이드(아키텍처, 데이터 모델, 테스트, 보안 등)는 [`guides/`](./guides/), 기능별 상세는 [`features/`](./features/) 참조\r\n\r\n## 앱 진입점\r\n- [main](main.md) — 앱 초기화, MainScreen, 전역 상태\r\n\r\n## API 계층 (lib/api/)\r\n- [meal_data_api](api/meal_data_api.md) — NEIS 급식 API, 월간 프리페치, 24h/5min 캐시\r\n- [notice_data_api](api/notice_data_api.md) — NEIS 학사일정 API, 예정 이벤트, 12h 캐시\r\n- [timetable_data_api](api/timetable_data_api.md) — NEIS 시간표 API, 과목 조합, 12h 캐시\r\n\r\n## 데이터 계층 (lib/data/)\r\n- [auth_service](data/auth_service.md) — 소셜 로그인 4종, 프로필 CRUD, 5분 캐시\r\n- [auth_repository](data/auth_repository.md) — AuthRepository 인터페이스, GetIt DI\r\n- [grade_manager](data/grade_manager.md) — 성적 CRUD, 목표 관리, 등급 변환\r\n- [grade_repository](data/grade_repository.md) — GradeRepository 인터페이스, GetIt DI\r\n- [dday_manager](data/dday_manager.md) — D-day CRUD, Firestore 동기화\r\n- [local_database](data/local_database.md) — SQLite 일정 DB, Firestore 동기화\r\n- [subject_data_manager](data/subject_data_manager.md) — 선택과목 로드/저장\r\n- [search_tokens](data/search_tokens.md) — 한국어 2-gram 토큰화\r\n- [search_history_service](data/search_history_service.md) — 검색 기록 (최대 10개)\r\n- [secure_storage_service](data/secure_storage_service.md) — 암호화 저장소 래퍼\r\n- [analytics_service](data/analytics_service.md) — Firebase Analytics 이벤트 래퍼\r\n- [setting_data](data/setting_data.md) — SharedPreferences 설정 싱글톤\r\n- [service_locator](data/service_locator.md) — GetIt DI 설정\r\n- [meal](data/meal.md) — Meal 데이터 모델 (freezed)\r\n- [schedule_data](data/schedule_data.md) — Schedule 데이터 모델\r\n- [subject](data/subject.md) — Subject 데이터 모델 (freezed)\r\n- [device](data/device.md) — 디바이스 크기 계산 유틸리티\r\n- [api_strings](data/api_strings.md) — API 센티널 문자열 상수 (데이터 유무 판별용)\r\n- [board_categories](data/board_categories.md) — 게시판 카테고리 ��수 + l10n/색상/FCM 토픽 헬퍼\r\n- [post_repository](data/post_repository.md) — 게시판 Firestore CRUD 싱글턴\r\n\r\n## 알림 (lib/notification/)\r\n- [fcm_service](notification/fcm_service.md) — FCM 푸시 알림, 토픽, 딥링크\r\n- [daily_meal_notification](notification/daily_meal_notification.md) — 로컬 급식 알림 스케줄링\r\n- [popup_notice](notification/popup_notice.md) — 인앱 팝업 공지\r\n- [update_checker](notification/update_checker.md) — 앱 버전 체크\r\n\r\n## 상태 관리 (lib/providers/)\r\n- [providers](providers/providers.md) — Riverpod Notifier/AsyncNotifier 전체\r\n\r\n## 스타일 (lib/styles/)\r\n- [app_colors](styles/app_colors.md) — 테마 컬러 + AnimatedAppColors\r\n- [dark_app_colors](styles/dark_app_colors.md) — 다크 테마 색상 구현체\r\n- [light_app_colors](styles/light_app_colors.md) — 라이트 테마 색상 구현체\r\n\r\n## 네트워크 (lib/network/)\r\n- [network_status](network/network_status.md) — 네트워크 연결 상태 스트림\r\n- [offline_queue_manager](network/offline_queue_manager.md) — 오프라인 쓰기 큐 (sqflite)\r\n","README_en.md":"# API Reference - Table of Contents\n\n> 한국어: [README.md](./README.md)\n>\n> Screen and Widget documentation is excluded. Only core layers (services, models, APIs, notifications, etc.) are organized here.\n>\n> For topic-based guides (architecture, data models, tests, security, etc.), see [`guides/`](./guides/). For feature-level details, see [`features/`](./features/).\n\n## App Entry Point\n- [main](main_en.md) — App initialization, MainScreen, global state\n\n## API Layer (lib/api/)\n- [meal_data_api](api/meal_data_api_en.md) — NEIS meal API, monthly prefetch, 24h/5min cache\n- [notice_data_api](api/notice_data_api_en.md) — NEIS school schedule API, upcoming events, 12h cache\n- [timetable_data_api](api/timetable_data_api_en.md) — NEIS timetable API, subject combinations, 12h cache\n\n## Data Layer (lib/data/)\n- [auth_service](data/auth_service_en.md) — 4 social login providers, profile CRUD, 5-minute cache\n- [auth_repository](data/auth_repository_en.md) — AuthRepository interface, GetIt DI\n- [grade_manager](data/grade_manager_en.md) — Grade CRUD, goal management, grade conversion\n- [grade_repository](data/grade_repository_en.md) — GradeRepository interface, GetIt DI\n- [dday_manager](data/dday_manager_en.md) — D-day CRUD, Firestore sync\n- [local_database](data/local_database_en.md) — SQLite schedule DB, Firestore sync\n- [subject_data_manager](data/subject_data_manager_en.md) — Elective subject load/save\n- [search_tokens](data/search_tokens_en.md) — Korean 2-gram tokenization\n- [search_history_service](data/search_history_service_en.md) — Search history (up to 10 entries)\n- [secure_storage_service](data/secure_storage_service_en.md) — Encrypted storage wrapper\n- [analytics_service](data/analytics_service_en.md) — Firebase Analytics event wrapper\n- [setting_data](data/setting_data_en.md) — SharedPreferences settings singleton\n- [service_locator](data/service_locator_en.md) — GetIt DI setup\n- [meal](data/meal_en.md) — Meal data model (freezed)\n- [schedule_data](data/schedule_data_en.md) — Schedule data model\n- [subject](data/subject_en.md) — Subject data model (freezed)\n- [device](data/device_en.md) — Device size calculation utility\n- [api_strings](data/api_strings_en.md) — API sentinel string constants (for determining data presence)\n- [board_categories](data/board_categories_en.md) — Board category constants + l10n/color/FCM topic helpers\n- [post_repository](data/post_repository_en.md) — Board Firestore CRUD singleton\n\n## Notifications (lib/notification/)\n- [fcm_service](notification/fcm_service_en.md) — FCM push notifications, topics, deep links\n- [daily_meal_notification](notification/daily_meal_notification_en.md) — Local meal notification scheduling\n- [popup_notice](notification/popup_notice_en.md) — In-app popup notices\n- [update_checker](notification/update_checker_en.md) — App version check\n\n## State Management (lib/providers/)\n- [providers](providers/providers_en.md) — All Riverpod Notifier/AsyncNotifier definitions\n\n## Styles (lib/styles/)\n- [app_colors](styles/app_colors_en.md) — Theme colors + AnimatedAppColors\n- [dark_app_colors](styles/dark_app_colors_en.md) — Dark theme color implementation\n- [light_app_colors](styles/light_app_colors_en.md) — Light theme color implementation\n\n## Network (lib/network/)\n- [network_status](network/network_status_en.md) — Network connection status stream\n- [offline_queue_manager](network/offline_queue_manager_en.md) — Offline write queue (sqflite)\n","styles/app_colors.md":"# AppColors\n\n> `lib/styles/app_colors.dart` — 테마 컬러 + AnimatedAppColors\n\n---\n\n## `AppColors` (추상 클래스)\n\n라이트/다크 테마의 색상 속성을 추상으로 정의. 총 13개 색상 프로퍼티\n\n### 정적 접근자\n\n| 접근자 | 설명 |\n|--------|------|\n| `AppColors.theme` | `AnimatedAppColors.instance` — 현재 보간된 색상 |\n| `AppColors.lightTheme` | [`LightAppColors`](light_app_colors.md)`()` — 라이트 테마 고정 색상 |\n| `AppColors.darkTheme` | [`DarkAppColors`](dark_app_colors.md)`()` — 다크 테마 고정 색상 |\n\n---\n\n## 색상 팔레트\n\n| 프로퍼티 | 라이트 (hex) | 다크 (hex) | 용도 |\n|----------|-------------|-----------|------|\n| `primaryColor` | `#3F72AF` | `#3D5A80` | 앱바, 게시판 자유 뱃지, 주요 강조색 |\n| `secondaryColor` | `#198A43` | `#4CAF50` | 게시판 질문 뱃지 |\n| `tertiaryColor` | `#4D99F4` | `#7EB8DA` | 게시판 정보공유 뱃지, 보조 강조색 |\n| `lighterColor` | `rgba(63,114,175,0.6)` | `rgba(61,90,128,0.5)` | primaryColor의 투명도 변형 |\n| `lightGreyColor` | `grey[200]` | `#252830` | 구분선, 배경 박스 |\n| `darkGreyColor` | `grey[600]` | `#8B8F99` | 보조 텍스트, 기본 뱃지 |\n| `textFiledFillColor` | `grey[300]` | `#2A2D35` | 텍스트 입력 필드 배경 |\n| `settingScreenBackgroundColor` | `#F8F6F6` | `#17191E` | 설정 화면 배경 |\n| `mealCardBackgroundColor` | `#DBE2EF` | `#1E2028` | 급식 카드 배경 |\n| `mealTypeTextColor` | `#666666` | `#9EA2AC` | 급식 타입 라벨 (조식/중식/석식) |\n| `mealHeaderIconColor` | `#DBE2EF` | `#2A2D35` | 급식 헤더 아이콘 |\n| `black` | `#000000` | `#EEEEEE` | 주요 텍스트 (다크에서는 반전) |\n| `white` | `#FFFFFF` | `#191B20` | 카드 배경 (다크에서는 반전) |\n\n### 디자인 의도\n\n- **black/white 반전**: 다크 모드에서 `black`은 밝은 텍스트색(`#EEEEEE`), `white`는 어두운 배경(`#191B20`)으로 매핑. 시맨틱 네이밍이 아닌 역할 네이밍 — \"주요 텍스트색\"과 \"주요 배경색\"으로 이해해야 함\n- **게시판 카테고리 색상**: `primaryColor`(자유) · `secondaryColor`(질문) · `tertiaryColor`(정보공유)은 [`BoardCategories.color()`](../data/board_categories.md)에서 사용. 분실물/학생회/동아리는 하드코딩 hex 사용\n- **접근성**: 라이트 모드 텍스트(`#000000`) on 배경(`#F2F3F5`)은 대비율 16.1:1 (WCAG AAA). 다크 모드 텍스트(`#EEEEEE`) on 배경(`#17191E`)은 대비율 14.4:1 (WCAG AAA). 보조 텍스트(`darkGreyColor`)는 각각 5.7:1 / 4.6:1 (WCAG AA)\n\n---\n\n## `AnimatedAppColors` (싱글톤)\n\n```dart\nclass AnimatedAppColors extends AppColors {\n  static final AnimatedAppColors instance = AnimatedAppColors._();\n}\n```\n\n라이트↔다크 전환 시 색상 보간(lerp)을 지원하는 싱글톤\n\n### `setDark(dark, {animate})`\n\n```dart\nvoid setDark(bool dark, {bool animate = true}) {\n  _isDark = dark;\n  if (!animate) _t = dark ? 1.0 : 0.0;\n}\n```\n\n테마 방향 설정. `animate: false`면 즉시 전환 (앱 초기화 시)\n\n### `tick(t)`\n\n```dart\nvoid tick(double t) => _t = t;\n```\n\n`AnimationController`에서 호출. `_t`는 0.0(라이트)~1.0(다크) 보간 진행도\n\n### 색상 보간\n\n```dart\nColor _lerp(Color light, Color dark) => Color.lerp(light, dark, _t)!;\n\n@override Color get primaryColor =>\n    _lerp(AppColors.lightTheme.primaryColor, AppColors.darkTheme.primaryColor);\n```\n\n모든 색상 프로퍼티가 `_lerp`를 통해 현재 `_t` 값에 따라 라이트/다크 사이를 보간. 테마 전환 애니메이션 시 부드러운 색상 전환 구현\n\n### 호출 흐름\n\n```\nthemeProvider 변경\n  → HansolHighSchool.build()\n    → AnimatedAppColors.setDark(isDark, animate: false)\n    → AnimatedAppColors.tick(isDark ? 1.0 : 0.0)\n      → 모든 AppColors.theme.xxx 갱신\n```\n\n현재는 `animate: false`로 즉시 전환만 사용. 향후 `AnimationController`와 연결 시 0.0→1.0 애니메이션으로 부드러운 전환 가능\n","styles/app_colors_en.md":"# AppColors\n\n> 한국어: [app_colors.md](./app_colors.md)\n\n> `lib/styles/app_colors.dart` — Theme colors + AnimatedAppColors\n\n---\n\n## `AppColors` (abstract class)\n\nAbstractly defines color properties for the light/dark themes. Total of 13 color properties.\n\n### Static accessors\n\n| Accessor | Description |\n|----------|-------------|\n| `AppColors.theme` | `AnimatedAppColors.instance` — current interpolated colors |\n| `AppColors.lightTheme` | [`LightAppColors`](light_app_colors.md)`()` — fixed light-theme colors |\n| `AppColors.darkTheme` | [`DarkAppColors`](dark_app_colors.md)`()` — fixed dark-theme colors |\n\n---\n\n## Color palette\n\n| Property | Light (hex) | Dark (hex) | Usage |\n|----------|-------------|------------|-------|\n| `primaryColor` | `#3F72AF` | `#3D5A80` | App bar, free-board badge, primary accent |\n| `secondaryColor` | `#198A43` | `#4CAF50` | Question-board badge |\n| `tertiaryColor` | `#4D99F4` | `#7EB8DA` | Info-sharing board badge, secondary accent |\n| `lighterColor` | `rgba(63,114,175,0.6)` | `rgba(61,90,128,0.5)` | Translucent variant of primaryColor |\n| `lightGreyColor` | `grey[200]` | `#252830` | Dividers, background boxes |\n| `darkGreyColor` | `grey[600]` | `#8B8F99` | Secondary text, default badges |\n| `textFiledFillColor` | `grey[300]` | `#2A2D35` | Text-field background |\n| `settingScreenBackgroundColor` | `#F8F6F6` | `#17191E` | Settings screen background |\n| `mealCardBackgroundColor` | `#DBE2EF` | `#1E2028` | Meal card background |\n| `mealTypeTextColor` | `#666666` | `#9EA2AC` | Meal type label (breakfast/lunch/dinner) |\n| `mealHeaderIconColor` | `#DBE2EF` | `#2A2D35` | Meal header icon |\n| `black` | `#000000` | `#EEEEEE` | Primary text (inverted in dark mode) |\n| `white` | `#FFFFFF` | `#191B20` | Card background (inverted in dark mode) |\n\n### Design intent\n\n- **black/white inversion**: In dark mode, `black` maps to a light text color (`#EEEEEE`) and `white` maps to a dark background (`#191B20`). These are role-based names, not semantic — think of them as \"primary text color\" and \"primary background color\".\n- **Board category colors**: `primaryColor` (Free) · `secondaryColor` (Question) · `tertiaryColor` (Info-sharing) are used by [`BoardCategories.color()`](../data/board_categories.md). Lost-and-found/student council/clubs use hard-coded hex.\n- **Accessibility**: Light-mode text (`#000000`) on background (`#F2F3F5`) has a contrast ratio of 16.1:1 (WCAG AAA). Dark-mode text (`#EEEEEE`) on background (`#17191E`) has a contrast ratio of 14.4:1 (WCAG AAA). Secondary text (`darkGreyColor`) measures 5.7:1 / 4.6:1 respectively (WCAG AA).\n\n---\n\n## `AnimatedAppColors` (singleton)\n\n```dart\nclass AnimatedAppColors extends AppColors {\n  static final AnimatedAppColors instance = AnimatedAppColors._();\n}\n```\n\nA singleton supporting color interpolation (lerp) during light↔dark transitions.\n\n### `setDark(dark, {animate})`\n\n```dart\nvoid setDark(bool dark, {bool animate = true}) {\n  _isDark = dark;\n  if (!animate) _t = dark ? 1.0 : 0.0;\n}\n```\n\nSets the theme direction. `animate: false` switches instantly (used during app init).\n\n### `tick(t)`\n\n```dart\nvoid tick(double t) => _t = t;\n```\n\nCalled from `AnimationController`. `_t` is the interpolation progress 0.0 (light) ~ 1.0 (dark).\n\n### Color interpolation\n\n```dart\nColor _lerp(Color light, Color dark) => Color.lerp(light, dark, _t)!;\n\n@override Color get primaryColor =>\n    _lerp(AppColors.lightTheme.primaryColor, AppColors.darkTheme.primaryColor);\n```\n\nEvery color property is interpolated between light and dark via `_lerp` based on the current `_t`. This produces smooth color transitions during theme-switch animations.\n\n### Call flow\n\n```\nthemeProvider change\n  → HansolHighSchool.build()\n    → AnimatedAppColors.setDark(isDark, animate: false)\n    → AnimatedAppColors.tick(isDark ? 1.0 : 0.0)\n      → all AppColors.theme.xxx refreshed\n```\n\nCurrently only uses `animate: false` (instant switch). If later connected to an `AnimationController`, a 0.0→1.0 animation would enable smooth transitions.\n","styles/dark_app_colors.md":"# DarkAppColors\r\n\r\n> `lib/styles/dark_app_colors.dart` — 다크 테마 색상 구현체\r\n\r\n[`AppColors`](app_colors.md) 추상 클래스를 구현. 싱글턴 패턴. 토스(Toss) 스타일 네이비 계열 배경색 사용\r\n\r\n---\r\n\r\n## 싱글턴\r\n\r\n```dart\r\nclass DarkAppColors extends AppColors {\r\n  static final DarkAppColors _instance = DarkAppColors._internal();\r\n  factory DarkAppColors() => _instance;\r\n  DarkAppColors._internal();\r\n}\r\n```\r\n\r\n`AppColors._dark`에서 `DarkAppColors()`로 접근\r\n\r\n---\r\n\r\n## 색상 정의\r\n\r\n| 프로퍼티 | 색상값 | 용도 |\r\n|----------|--------|------|\r\n| `black` | `0xFFEEEEEE` | 다크 모드의 \"검정\" = 밝은 회색 (텍스트용) |\r\n| `white` | `0xFF191B20` | 다크 모드의 \"흰색\" = 진한 네이비 (배경용) |\r\n| `primaryColor` | `0xFF3D5A80` | 주 색상 — 네이비 블루 |\r\n| `secondaryColor` | `0xFF4CAF50` | 보조 색상 — 초록 |\r\n| `tertiaryColor` | `0xFF7EB8DA` | 3차 색상 — 밝은 하늘색 |\r\n| `lighterColor` | `rgba(61,90,128, 0.5)` | 반투명 주 색상 |\r\n| `lightGreyColor` | `0xFF252830` | 밝은 회색 → 진한 회색 (카드 배경 등) |\r\n| `darkGreyColor` | `0xFF8B8F99` | 어두운 회색 (보조 텍스트) |\r\n| `textFiledFillColor` | `0xFF2A2D35` | 텍스트필드 배경 |\r\n| `settingScreenBackgroundColor` | `0xFF17191E` | 설정 화면 배경 (가장 어두운 색) |\r\n| `mealCardBackgroundColor` | `0xFF1E2028` | 급식 카드 배경 |\r\n| `mealTypeTextColor` | `0xFF8B8F99` | 급식 유형 라벨 색상 |\r\n| `mealHeaderIconColor` | `0xFF2A2D35` | 급식 헤더 아이콘 배경 |\r\n\r\n---\r\n\r\n## 디자인 특징\r\n\r\n- **반전 패턴**: `black`이 밝은색, `white`가 어두운색. `AnimatedAppColors._lerp`에서 라이트↔다크 보간 시 자연스럽게 전환됨\r\n- **네이비 계열**: 순수 검정(`#000000`) 대신 `0xFF191B20`, `0xFF1E2028` 등 약간의 파란 기가 있는 어두운 색 사용 — 눈의 피로 감소\r\n- `darkGreyColor`(`0xFF8B8F99`)는 라이트/다크 모두 비슷한 톤으로 보조 텍스트에 일관성 유지\r\n","styles/dark_app_colors_en.md":"# DarkAppColors\n\n> 한국어: [dark_app_colors.md](./dark_app_colors.md)\n\n> `lib/styles/dark_app_colors.dart` — Dark theme color implementation\n\nImplements the [`AppColors`](app_colors.md) abstract class. Singleton pattern. Uses Toss-style navy-tinted background colors.\n\n---\n\n## Singleton\n\n```dart\nclass DarkAppColors extends AppColors {\n  static final DarkAppColors _instance = DarkAppColors._internal();\n  factory DarkAppColors() => _instance;\n  DarkAppColors._internal();\n}\n```\n\nAccessed via `DarkAppColors()` inside `AppColors._dark`.\n\n---\n\n## Color definitions\n\n| Property | Color value | Usage |\n|----------|-------------|-------|\n| `black` | `0xFFEEEEEE` | Dark mode \"black\" = light grey (for text) |\n| `white` | `0xFF191B20` | Dark mode \"white\" = deep navy (for backgrounds) |\n| `primaryColor` | `0xFF3D5A80` | Primary color — navy blue |\n| `secondaryColor` | `0xFF4CAF50` | Secondary color — green |\n| `tertiaryColor` | `0xFF7EB8DA` | Tertiary color — light sky blue |\n| `lighterColor` | `rgba(61,90,128, 0.5)` | Translucent primary color |\n| `lightGreyColor` | `0xFF252830` | Light grey → dark grey (card background, etc.) |\n| `darkGreyColor` | `0xFF8B8F99` | Dark grey (secondary text) |\n| `textFiledFillColor` | `0xFF2A2D35` | Text-field background |\n| `settingScreenBackgroundColor` | `0xFF17191E` | Settings screen background (darkest color) |\n| `mealCardBackgroundColor` | `0xFF1E2028` | Meal card background |\n| `mealTypeTextColor` | `0xFF8B8F99` | Meal type label color |\n| `mealHeaderIconColor` | `0xFF2A2D35` | Meal header icon background |\n\n---\n\n## Design traits\n\n- **Inversion pattern**: `black` is the light color and `white` is the dark color. This transitions naturally in `AnimatedAppColors._lerp` when interpolating between light↔dark.\n- **Navy palette**: Instead of pure black (`#000000`), uses slightly blue-tinted dark tones such as `0xFF191B20` and `0xFF1E2028` — reduces eye strain.\n- `darkGreyColor` (`0xFF8B8F99`) keeps a similar tone in both light and dark modes, maintaining consistency for secondary text.\n","styles/light_app_colors.md":"# LightAppColors\r\n\r\n> `lib/styles/light_app_colors.dart` — 라이트 테마 색상 구현체\r\n\r\n[`AppColors`](app_colors.md) 추상 클래스를 구현. 싱글턴 패턴. 블루 계열 primaryColor와 밝은 배경색 사용\r\n\r\n---\r\n\r\n## 싱글턴\r\n\r\n```dart\r\nclass LightAppColors extends AppColors {\r\n  static final LightAppColors _instance = LightAppColors._internal();\r\n  factory LightAppColors() => _instance;\r\n  LightAppColors._internal();\r\n}\r\n```\r\n\r\n`AppColors._light`에서 `LightAppColors()`로 접근\r\n\r\n---\r\n\r\n## 색상 정의\r\n\r\n| 프로퍼티 | 색상값 | 용도 |\r\n|----------|--------|------|\r\n| `black` | `Colors.black` | 기본 텍스트 색상 |\r\n| `white` | `Colors.white` | 기본 배경 색상 |\r\n| `primaryColor` | `0xFF3F72AF` | 주 색상 — 차분한 블루 |\r\n| `secondaryColor` | `0xFF198A43` | 보조 색상 — 진한 초록 |\r\n| `tertiaryColor` | `0xFF4D99F4` | 3차 색상 — 밝은 파랑 |\r\n| `lighterColor` | `rgba(63,114,175, 0.6)` | 반투명 주 색상 |\r\n| `lightGreyColor` | `Colors.grey[200]` | 밝은 회색 (카드 배경, 구분선) |\r\n| `darkGreyColor` | `Colors.grey[600]` | 어두운 회색 (보조 텍스트) |\r\n| `textFiledFillColor` | `Colors.grey[300]` | 텍스트필드 배경 |\r\n| `settingScreenBackgroundColor` | `0xFFF8F6F6` | 설정 화면 배경 (약간 따뜻한 회색) |\r\n| `mealCardBackgroundColor` | `0xFFDBE2EF` | 급식 카드 배경 (연한 파란 회색) |\r\n| `mealTypeTextColor` | `0xFF848484` | 급식 유형 라벨 색상 |\r\n| `mealHeaderIconColor` | `0xFFDBE2EF` | 급식 헤더 아이콘 배경 |\r\n\r\n---\r\n\r\n## 디자인 특징\r\n\r\n- **블루 톤**: `primaryColor`(`0xFF3F72AF`)가 앱 전체의 기조 — AppBar, 버튼, 링크, 선택 인디케이터\r\n- **급식 카드**: `mealCardBackgroundColor`(`0xFFDBE2EF`)는 primaryColor의 연한 변형으로 시각적 통일감\r\n- `lightGreyColor` / `darkGreyColor`는 Flutter 기본 `Colors.grey` 팔레트 사용 — 플랫폼 친화적\r\n- `settingScreenBackgroundColor`(`0xFFF8F6F6`)는 순수 흰색보다 약간 따뜻한 톤으로 설정 화면 구분\r\n","styles/light_app_colors_en.md":"# LightAppColors\n\n> 한국어: [light_app_colors.md](./light_app_colors.md)\n\n> `lib/styles/light_app_colors.dart` — Light theme color implementation\n\nImplements the [`AppColors`](app_colors.md) abstract class. Singleton pattern. Uses a blue-family primaryColor with bright background colors.\n\n---\n\n## Singleton\n\n```dart\nclass LightAppColors extends AppColors {\n  static final LightAppColors _instance = LightAppColors._internal();\n  factory LightAppColors() => _instance;\n  LightAppColors._internal();\n}\n```\n\nAccessed via `LightAppColors()` inside `AppColors._light`.\n\n---\n\n## Color definitions\n\n| Property | Color value | Usage |\n|----------|-------------|-------|\n| `black` | `Colors.black` | Default text color |\n| `white` | `Colors.white` | Default background color |\n| `primaryColor` | `0xFF3F72AF` | Primary color — calm blue |\n| `secondaryColor` | `0xFF198A43` | Secondary color — deep green |\n| `tertiaryColor` | `0xFF4D99F4` | Tertiary color — bright blue |\n| `lighterColor` | `rgba(63,114,175, 0.6)` | Translucent primary color |\n| `lightGreyColor` | `Colors.grey[200]` | Light grey (card background, dividers) |\n| `darkGreyColor` | `Colors.grey[600]` | Dark grey (secondary text) |\n| `textFiledFillColor` | `Colors.grey[300]` | Text-field background |\n| `settingScreenBackgroundColor` | `0xFFF8F6F6` | Settings screen background (slightly warm grey) |\n| `mealCardBackgroundColor` | `0xFFDBE2EF` | Meal card background (pale blue-grey) |\n| `mealTypeTextColor` | `0xFF848484` | Meal type label color |\n| `mealHeaderIconColor` | `0xFFDBE2EF` | Meal header icon background |\n\n---\n\n## Design traits\n\n- **Blue tone**: `primaryColor` (`0xFF3F72AF`) is the app's overall keynote — AppBar, buttons, links, selection indicators.\n- **Meal card**: `mealCardBackgroundColor` (`0xFFDBE2EF`) is a pale variant of primaryColor for visual cohesion.\n- `lightGreyColor` / `darkGreyColor` use Flutter's stock `Colors.grey` palette — platform-friendly.\n- `settingScreenBackgroundColor` (`0xFFF8F6F6`) is a slightly warmer tone than pure white to visually distinguish the settings screen.\n"};

    {nameKo:'PostRepository',        nameEn:'PostRepository',         pathKo:'data/post_repository.md',       pathEn:'data/post_repository_en.md'},
    {nameKo:'Meal (모델)',           nameEn:'Meal (model)',           pathKo:'data/meal.md',                  pathEn:'data/meal_en.md'},
    {nameKo:'ScheduleData (모델)',   nameEn:'ScheduleData (model)',   pathKo:'data/schedule_data.md',         pathEn:'data/schedule_data_en.md'},
    {nameKo:'Subject (모델)',        nameEn:'Subject (model)',        pathKo:'data/subject.md',               pathEn:'data/subject_en.md'},
    {nameKo:'Device',                nameEn:'Device',                 pathKo:'data/device.md',                pathEn:'data/device_en.md'},
    {nameKo:'ApiStrings',            nameEn:'ApiStrings',             pathKo:'data/api_strings.md',           pathEn:'data/api_strings_en.md'},
    {nameKo:'BoardCategories',       nameEn:'BoardCategories',        pathKo:'data/board_categories.md',      pathEn:'data/board_categories_en.md'},
    {nameKo:'Exceptions',            nameEn:'Exceptions',             pathKo:'data/exceptions.md',            pathEn:'data/exceptions_en.md'}
  ]},
  { titleKo:'네트워크', titleEn:'Network', items:[
    {nameKo:'NetworkStatus',         nameEn:'NetworkStatus',          pathKo:'network/network_status.md',         pathEn:'network/network_status_en.md'},
    {nameKo:'OfflineQueueManager',   nameEn:'OfflineQueueManager',    pathKo:'network/offline_queue_manager.md',  pathEn:'network/offline_queue_manager_en.md'}
  ]},
  { titleKo:'알림', titleEn:'Notifications', items:[
    {nameKo:'FcmService',            nameEn:'FcmService',             pathKo:'notification/fcm_service.md',             pathEn:'notification/fcm_service_en.md'},
    {nameKo:'DailyMealNotification', nameEn:'DailyMealNotification',  pathKo:'notification/daily_meal_notification.md', pathEn:'notification/daily_meal_notification_en.md'},
    {nameKo:'PopupNotice',           nameEn:'PopupNotice',            pathKo:'notification/popup_notice.md',            pathEn:'notification/popup_notice_en.md'},
    {nameKo:'UpdateChecker',         nameEn:'UpdateChecker',          pathKo:'notification/update_checker.md',          pathEn:'notification/update_checker_en.md'}
  ]},
  { titleKo:'상태 관리', titleEn:'State management', items:[
    {nameKo:'Providers',             nameEn:'Providers',              pathKo:'providers/providers.md',  pathEn:'providers/providers_en.md'}
  ]},
  { titleKo:'스타일', titleEn:'Styles', items:[
    {nameKo:'AppColors',             nameEn:'AppColors',              pathKo:'styles/app_colors.md',        pathEn:'styles/app_colors_en.md'},
    {nameKo:'DarkAppColors',         nameEn:'DarkAppColors',          pathKo:'styles/dark_app_colors.md',   pathEn:'styles/dark_app_colors_en.md'},
    {nameKo:'LightAppColors',        nameEn:'LightAppColors',         pathKo:'styles/light_app_colors.md',  pathEn:'styles/light_app_colors_en.md'}
  ]}
];

(function(){
  try {
    if(globalThis.markedHighlight && globalThis.hljs){
      marked.use(globalThis.markedHighlight.markedHighlight({
        langPrefix:'hljs language-',
        highlight:function(code,lang){
          try{
            if(lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
            return hljs.highlightAuto(code).value;
          }catch(e){return code;}
        }
      }));
    }
  }catch(e){ console.warn('Highlight init skipped:', e); }
  marked.use({breaks:false,gfm:true});

  // ---- Language state ----
  var LANG_KEY = 'docsViewerLang';
  function getLang(){ return localStorage.getItem(LANG_KEY) === 'en' ? 'en' : 'ko'; }
  function setLang(l){ localStorage.setItem(LANG_KEY, l === 'en' ? 'en' : 'ko'); }

  // Build lookup: path -> { group, item, lang } and pair map (ko<->en).
  var PATH_INDEX = {};
  var PAIR = {}; // koPath -> enPath and enPath -> koPath
  FILES.forEach(function(g){
    g.items.forEach(function(it){
      PATH_INDEX[it.pathKo] = { group:g, item:it, lang:'ko' };
      if(it.pathEn){
        PATH_INDEX[it.pathEn] = { group:g, item:it, lang:'en' };
        PAIR[it.pathKo] = it.pathEn;
        PAIR[it.pathEn] = it.pathKo;
      }
    });
  });

  function pathForItem(item, lang){
    if(lang === 'en' && item.pathEn) return item.pathEn;
    return item.pathKo;
  }
  function nameForItem(item, lang){
    return (lang === 'en' && item.nameEn) ? item.nameEn : item.nameKo;
  }
  function titleForGroup(g, lang){
    return (lang === 'en' && g.titleEn) ? g.titleEn : g.titleKo;
  }

  // ---- Navigation rendering ----
  var navList = document.getElementById('navList');
  var allItems = []; // {el, item, group}

  function renderNav(lang){
    navList.innerHTML = '';
    allItems = [];
    FILES.forEach(function(g){
      var gEl = document.createElement('div');
      gEl.className = 'nav-group';
      var titleEl = document.createElement('div');
      titleEl.className = 'nav-group-title';
      titleEl.textContent = titleForGroup(g, lang);
      gEl.appendChild(titleEl);
      g.items.forEach(function(it){
        var a = document.createElement('a');
        a.className = 'nav-item';
        a.textContent = nameForItem(it, lang);
        a.dataset.path = pathForItem(it, lang);
        a.onclick = function(){ loadFile(a.dataset.path); };
        gEl.appendChild(a);
        allItems.push({el:a, item:it, group:g});
      });
      navList.appendChild(gEl);
    });
  }

  function applyLang(lang, opts){
    opts = opts || {};
    setLang(lang);
    document.documentElement.lang = lang;
    document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('search').placeholder = (lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
    document.getElementById('sidebarTitle').textContent = (lang === 'en') ? 'Hansol HS App Docs' : '한솔고 앱 Docs';
    renderNav(lang);

    if(!opts.skipContentSwap){
      // Remap currently open doc to the other language if available.
      var cur = currentPath();
      if(cur){
        var info = PATH_INDEX[cur];
        if(info){
          var newPath = pathForItem(info.item, lang);
          if(newPath !== cur){
            loadFile(newPath, { replaceHistory:true });
            return;
          }
        }
      }
    }
    // Re-apply active highlight & search filter for the newly rendered nav.
    var cur2 = currentPath();
    highlightActive(cur2);
    applySearchFilter();
  }

  function highlightActive(p){
    allItems.forEach(function(i){
      i.el.classList.toggle('active', i.el.dataset.path === p);
    });
  }

  // ---- Search ----
  function applySearchFilter(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    allItems.forEach(function(i){
      var hay = (i.item.nameKo + ' ' + (i.item.nameEn||'') + ' ' + i.item.pathKo + ' ' + (i.item.pathEn||'')).toLowerCase();
      i.el.style.display = (!q || hay.indexOf(q) !== -1) ? '' : 'none';
    });
    navList.querySelectorAll('.nav-group').forEach(function(g){
      var vis = Array.from(g.querySelectorAll('.nav-item')).some(function(i){ return i.style.display !== 'none'; });
      g.style.display = vis ? '' : 'none';
    });
  }
  document.getElementById('search').addEventListener('input', applySearchFilter);

  // ---- Navigation history (within viewer) ----
  var history = [];
  var historyIndex = -1;
  var navigating = false;

  function currentPath(){
    return historyIndex >= 0 ? history[historyIndex] : null;
  }

  function loadFile(p, opts){
    opts = opts || {};
    // Resolve alt-lang paths: if user is KR and clicks an _en link, keep the click path as-is.
    var text = MD_DATA[p];
    var inner = document.getElementById('contentInner');
    if(!text){
      inner.innerHTML = '<div class="welcome"><h2>문서를 찾을 수 없습니다</h2><p>' + p + '</p></div>';
      return;
    }

    highlightActive(p);

    // history management
    if(!opts.fromPopState && !opts.replaceHistory){
      history = history.slice(0, historyIndex + 1);
      history.push(p);
      historyIndex = history.length - 1;
    } else if(opts.replaceHistory){
      if(historyIndex < 0){ history.push(p); historyIndex = 0; }
      else history[historyIndex] = p;
    }

    var html = marked.parse(text);
    var dir = p.indexOf('/') !== -1 ? p.substring(0, p.lastIndexOf('/')) : '';
    var fileName = p.split('/').pop();

    var canBack = historyIndex > 0;
    var canFwd = historyIndex < history.length - 1;
    var lang = getLang();
    var backLabel = (lang === 'en') ? 'Back' : '뒤로';
    var fwdLabel = (lang === 'en') ? 'Forward' : '앞으로';
    var rootPath = (lang === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README.md';

    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="' + backLabel + '">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="' + fwdLabel + '">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'' + rootPath + '\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong></div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    // Rewrite .md links to in-viewer navigation.
    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || href.indexOf('http') === 0) return;
      var hashOnly = href.charAt(0) === '#';
      if(hashOnly) return; // same-page anchors handled by browser
      // Strip any query/hash for resolution but keep for re-attach (rare).
      var hashPart = '';
      var hashIdx = href.indexOf('#');
      if(hashIdx !== -1){ hashPart = href.substring(hashIdx); href = href.substring(0, hashIdx); }
      if(!href.endsWith('.md')) return;

      var resolved = href;
      if(dir && href.indexOf('/') !== 0 && href.indexOf('..') !== 0){
        resolved = dir + '/' + href;
      } else if(href.indexOf('./') === 0){
        resolved = (dir ? dir + '/' : '') + href.substring(2);
      } else if(href.indexOf('../') === 0){
        var parts = dir.split('/');
        while(resolved.indexOf('../') === 0){ parts.pop(); resolved = resolved.substring(3); }
        resolved = (parts.length ? parts.join('/') + '/' : '') + resolved;
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved); };
      }
    });

    document.getElementById('content').scrollTop = 0;
    closeSidebar();
    if(!opts.fromPopState){
      window.history.pushState({path:p}, '', '#' + p);
    }
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._loadFile = function(p){ loadFile(p); };

  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var p = (e.state && e.state.path) || location.hash.slice(1) || initialDefaultPath();
    if(MD_DATA[p]){
      navigating = true;
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, {fromPopState:true});
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  // ---- Language button wiring ----
  document.getElementById('langKo').addEventListener('click', function(){ if(getLang()!=='ko') applyLang('ko'); });
  document.getElementById('langEn').addEventListener('click', function(){ if(getLang()!=='en') applyLang('en'); });

  function initialDefaultPath(){
    return (getLang() === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README.md';
  }

  // ---- Bootstrap ----
  var initialLang = getLang();
  applyLang(initialLang, {skipContentSwap:true});

  var hash = location.hash.slice(1);
  if(hash && MD_DATA[hash]){
    // If URL hash points to a language different from the preference, honor the URL.
    var info = PATH_INDEX[hash];
    if(info && info.lang !== initialLang){
      // Adjust lang to match URL without re-navigating.
      setLang(info.lang);
      document.getElementById('langKo').classList.toggle('active', info.lang === 'ko');
      document.getElementById('langEn').classList.toggle('active', info.lang === 'en');
      document.getElementById('search').placeholder = (info.lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
      document.getElementById('sidebarTitle').textContent = (info.lang === 'en') ? 'Hansol HS App Docs' : '한솔고 앱 Docs';
      renderNav(info.lang);
    }
    loadFile(hash);
  } else {
    loadFile(initialDefaultPath());
  }
})();
</script>
