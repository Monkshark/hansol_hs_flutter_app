r\n| `displayName` | Branches by userType: prefix for graduate/teacher/parent, student uses `studentId + name` |\r\n| `localizedDisplayName(l)` | Localized variant of `displayName` (uses `l10n`) |\r\n| `needsProfileUpdate` | Students/teachers only; true if `lastProfileUpdate != current year` during March 1вҖ“14 |\r\n| `needsGraduateCheck` | Whether a 3rd-year student needs the graduation confirmation popup at the new term (March 1вҖ“14 with stale `lastProfileUpdate`) |\r\n\r\n---\r\n\r\n## `signInWithGoogle`\r\n\r\n```dart\r\nstatic Future<User?> signInWithGoogle()\r\n```\r\n\r\n**Description**: Performs Firebase authentication via Google social login.\r\n\r\n1. Show the Google account selection popup with `GoogleSignIn().signIn()`:\r\n   ```dart\r\n   final googleUser = await _googleSignIn.signIn();\r\n   if (googleUser == null) return null;  // user cancelled\r\n   ```\r\n\r\n2. Create a Firebase credential with the Google OAuth tokens:\r\n   ```dart\r\n   final googleAuth = await googleUser.authentication;\r\n   final credential = GoogleAuthProvider.credential(\r\n     accessToken: googleAuth.accessToken,\r\n     idToken: googleAuth.idToken,\r\n   );\r\n   ```\r\n\r\n3. Sign in to Firebase and publish an Analytics event:\r\n   ```dart\r\n   final result = await _auth.signInWithCredential(credential);\r\n   unawaited(AnalyticsService.logLogin('google'));\r\n   unawaited(AnalyticsService.setUserId(result.user!.uid));\r\n   ```\r\n\r\n**Returns**: `User?` вҖ” Firebase User on success, null on cancel/error.\r\n\r\n---\r\n\r\n## `signInWithApple`\r\n\r\n```dart\r\nstatic Future<User?> signInWithApple()\r\n```\r\n\r\n**Description**: Performs Apple Sign In. Includes nonce-based security handling.\r\n\r\n1. Generate a random security nonce and hash it with SHA-256:\r\n   ```dart\r\n   final rawNonce = _generateNonce();\r\n   final nonce = _sha256ofString(rawNonce);\r\n   ```\r\n\r\n2. Request the Apple ID credential (email, fullName scopes):\r\n   ```dart\r\n   final appleCredential = await SignInWithApple.getAppleIDCredential(\r\n     scopes: [AppleIDAuthorizationScopes.email, AppleIDAuthorizationScopes.fullName],\r\n     nonce: nonce,\r\n   );\r\n   ```\r\n\r\n3. Convert to a Firebase credential via OAuthProvider and sign in:\r\n   ```dart\r\n   final oauthCredential = OAuthProvider('apple.com').credential(\r\n     idToken: appleCredential.identityToken,\r\n     rawNonce: rawNonce,\r\n   );\r\n   ```\r\n\r\n4. On first login, set the name provided by Apple as the displayName:\r\n   ```dart\r\n   if (appleCredential.givenName != null) {\r\n     await result.user?.updateDisplayName(...);\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `signInWithKakao`\r\n\r\n```dart\r\nstatic Future<User?> signInWithKakao(String kakaoAccessToken)\r\n```\r\n\r\n**Description**: Kakao login. Converts to a Firebase Custom Token via a Cloud Function.\r\n\r\n1. POST the accessToken received from the Kakao SDK to the Cloud Function:\r\n   ```dart\r\n   final response = await http.post(\r\n     Uri.parse('https://.../kakaoCustomAuth'),\r\n     body: jsonEncode({'token': kakaoAccessToken}),\r\n   );\r\n   ```\r\n\r\n2. Sign in with the Firebase Custom Token returned by the Cloud Function:\r\n   ```dart\r\n   final customToken = jsonDecode(response.body)['firebaseToken'] as String;\r\n   final result = await _auth.signInWithCustomToken(customToken);\r\n   ```\r\n\r\n**Parameters**: `kakaoAccessToken` вҖ” access token obtained from the Kakao SDK `LoginResult`.\r\n\r\n---\r\n\r\n## `signInWithGitHub`\r\n\r\n```dart\r\nstatic Future<User?> signInWithGitHub()\r\n```\r\n\r\n**Description**: GitHub login. Uses Firebase's built-in `signInWithProvider`.\r\n\r\n```dart\r\nfinal githubProvider = GithubAuthProvider();\r\nfinal result = await _auth.signInWithProvider(githubProvider);\r\n```\r\n\r\nFirebase handles the OAuth flow directly without a separate server.\r\n\r\n---\r\n\r\n## `signOut`\r\n\r\n```dart\r\nstatic Future<void> signOut()\r\n```\r\n\r\nSign out of both Google and Firebase. Publishes a logout event to Analytics.\r\n\r\n```dart\r\nunawaited(AnalyticsService.logLogout());\r\nawait _googleSignIn.signOut();\r\nawait _auth.signOut();\r\n```\r\n\r\n---\r\n\r\n## `getUserProfile`\r\n\r\n```dart\r\nstatic Future<UserProfile?> getUserProfile()\r\n```\r\n\r\nFetches the profile from the Firestore `users/{uid}` document. Queries directly every time without caching.\r\n\r\n---\r\n\r\n## `saveUserProfile`\r\n\r\n```dart\r\nstatic Future<void> saveUserProfile(UserProfile profile)\r\n```\r\n\r\nSaves the profile to Firestore `users/{uid}`. Preserves existing fields with `SetOptions(merge: true)`.\r\n\r\n---\r\n\r\n## `hasProfile`\r\n\r\n```dart\r\nstatic Future<bool> hasProfile()\r\n```\r\n\r\nChecks whether the profile document exists and has a `name` field. Used to branch to the profile setup screen immediately after login.\r\n\r\n---\r\n\r\n## `isApproved`\r\n\r\n```dart\r\nstatic Future<bool> isApproved()\r\n```\r\n\r\n**Description**: Checks whether the user is in approved status.\r\n\r\n```dart\r\nif (profile.isSuspended) return false;\r\nreturn profile.approved || profile.isStaff;\r\n```\r\n\r\nReturns `false` if suspended; staff (admin/manager/moderator/auditor) bypass approval.\r\n\r\n---\r\n\r\n## `getSuspendedMessage`\r\n\r\n```dart\r\nstatic Future<String?> getSuspendedMessage()\r\n```\r\n\r\n**Description**: Returns the remaining suspension time as a Korean string.\r\n\r\n```dart\r\nfinal diff = profile.suspendedUntil!.difference(DateTime.now());\r\n// вҶ’ \"2мқј 3мӢңк°„ 15л¶„\" format\r\n```\r\n\r\nReturns null if not suspended.\r\n\r\n---\r\n\r\n## `getCachedProfile`\r\n\r\n```dart\r\nstatic Future<UserProfile?> getCachedProfile()\r\n```\r\n\r\n**Description**: Fetches the profile from a 5-minute TTL in-memory cache.\r\n\r\n```dart\r\nif (_cachedProfile != null && _cacheTime != null &&\r\n    DateTime.now().difference(_cacheTime!).inMinutes < 5) {\r\n  return _cachedProfile;\r\n}\r\n_cachedProfile = await getUserProfile();\r\n_cacheTime = DateTime.now();\r\n```\r\n\r\nReduces Firestore calls for frequent profile references in posting, commenting, etc.\r\n\r\n---\r\n\r\n## `clearProfileCache`\r\n\r\n```dart\r\nstatic void clearProfileCache()\r\n```\r\n\r\nCall after editing the profile. Resets `_cachedProfile` and `_cacheTime` to null.\r\n\r\n---\r\n\r\n## `refreshCustomClaims`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> refreshCustomClaims()\r\n```\r\n\r\n**Description**: Force-refreshes the ID token to get the latest Custom Claims.\r\n\r\n```dart\r\nfinal result = await user.getIdTokenResult(true);  // forceRefresh\r\nreturn result.claims;\r\n```\r\n\r\nAfter the Cloud Function `onUserUpdated` calls `setCustomUserClaims`, the client must call this method for the updated role/approved to take effect immediately.\r\n\r\n---\r\n\r\n## Internal utilities\r\n\r\n| Function | Description |\r\n|------|------|\r\n| `_generateNonce([length])` | Generates a random security string (for Apple login) |\r\n| `_sha256ofString(input)` | SHA-256 hash (for nonce hashing) |\r\n| `setCachedProfileForTest(profile)` | `@visibleForTesting` вҖ” cache injection for testing |\r\n","data/board_categories.md":"# BoardCategories\n\n> `lib/data/board_categories.dart` вҖ” кІҢмӢңнҢҗ м№ҙн…Ңкі лҰ¬ мғҒмҲҳ + н—¬нҚј\n\nFirestoreм—җ м ҖмһҘлҗҳлҠ” м№ҙн…Ңкі лҰ¬ к°’мқҖ н•ңкөӯм–ҙ(`'мһҗмң '`, `'м§Ҳл¬ё'` л“ұ)мқҙлҜҖлЎң, мҳҒл¬ё мғҒмҲҳлӘ…мңјлЎң м°ёмЎ°н•ҳм—¬ мҳӨнғҖВ·л¶Ҳмқјм№ҳлҘј л°©м§Җ. l10n мқҙлҰ„, мғүмғҒ, FCM нҶ н”Ҫ нӮӨлҘј н•ң кіім—җм„ң кҙҖлҰ¬\n\n---\n\n## мғҒмҲҳ\n\n| мғҒмҲҳ | Firestore к°’ | м„ӨлӘ… |\n|------|-------------|------|\n| `all` | `'м „мІҙ'` | м „мІҙ нғӯ (н•„н„° м—ҶмқҢ) |\n| `popular` | `'мқёкё°кёҖ'` | мқёкё°кёҖ нғӯ (likeCount м •л ¬) |\n| `free` | `'мһҗмң '` | мһҗмң  кІҢмӢңнҢҗ |\n| `question` | `'м§Ҳл¬ё'` | м§Ҳл¬ё кІҢмӢңнҢҗ |\n| `info` | `'м •ліҙкіөмң '` | м •ліҙкіөмң  кІҢмӢңнҢҗ |\n| `lostFound` | `'л¶„мӢӨл¬ј'` | л¶„мӢӨл¬ј кІҢмӢңнҢҗ |\n| `council` | `'н•ҷмғқнҡҢ'` | н•ҷмғқнҡҢ кІҢмӢңнҢҗ |\n| `club` | `'лҸҷм•„лҰ¬'` | лҸҷм•„лҰ¬ кІҢмӢңнҢҗ |\n\n---\n\n## лҰ¬мҠӨнҠё\n\n| лҰ¬мҠӨнҠё | лӮҙмҡ© | мҡ©лҸ„ |\n|--------|------|------|\n| `boardKeys` | м „мІҙ 8к°ң (all ~ club) | кІҢмӢңнҢҗ нғӯ л°” |\n| `writeKeys` | 6к°ң (allВ·popular м ңмҷё) | кёҖ мһ‘м„ұ мӢң м№ҙн…Ңкі лҰ¬ м„ нғқ |\n\n---\n\n## `topicKey`\n\n```dart\nstatic const topicKey = <String, String>{\n  free: 'free',\n  question: 'question',\n  info: 'info',\n  lostFound: 'lost',      // 'lostfound'к°Җ м•„лӢҳ вҖ” кё°мЎҙ FCM кө¬лҸ…мһҗ нҳёнҷҳ\n  council: 'council',\n  club: 'club',\n};\n```\n\nFCM нҶ н”Ҫ мқҙлҰ„ мғқм„ұм—җ мӮ¬мҡ©: `board_${topicKey[category]}`\n\n> `lostFound`мқҳ нҶ н”Ҫ нӮӨк°Җ `'lost'`мқё мқҙмң : кё°мЎҙм—җ `board_lost`лЎң кө¬лҸ…лҗң мӮ¬мҡ©мһҗк°Җ мһҲм–ҙ ліҖкІҪ л¶Ҳк°Җ\n\n---\n\n## `localizedName`\n\n```dart\nstatic String localizedName(AppLocalizations l, String key)\n```\n\nм№ҙн…Ңкі лҰ¬ нӮӨ вҶ’ l10n мқҙлҰ„ ліҖнҷҳ. `AppLocalizations`мқҳ `board_categoryXxx` нӮӨм—җ л§Өн•‘\n\n```dart\nBoardCategories.localizedName(l, BoardCategories.free)  // вҶ’ \"мһҗмң \" (ko) / \"Free\" (en)\n```\n\n---\n\n## `color`\n\n```dart\nstatic Color color(String category)\n```\n\nм№ҙн…Ңкі лҰ¬ вҶ’ мғүмғҒ л§Өн•‘. кІҢмӢңнҢҗ м№ҙл“ң, м№ҙн…Ңкі лҰ¬ лұғм§Җ, нҷҲ нҷ”л©ҙ мөңмӢ кёҖм—җм„ң мӮ¬мҡ©\n\n| м№ҙн…Ңкі лҰ¬ | мғүмғҒ |\n|----------|------|\n| free | `AppColors.theme.primaryColor` |\n| question | `AppColors.theme.secondaryColor` |\n| info | `AppColors.theme.tertiaryColor` |\n| lostFound | `#FF5722` (Deep Orange) |\n| council | `#4CAF50` (Green) |\n| club | `#9C27B0` (Purple) |\n| кё°нғҖ | `AppColors.theme.darkGreyColor` |\n\n---\n\n## мӮ¬мҡ© мң„м№ҳ\n\n- **board_screen.dart**: нғӯ л°”, м№ҙн…Ңкі лҰ¬ н•„н„°, PostCard лұғм§Җ\n- **write_post_screen.dart**: м№ҙн…Ңкі лҰ¬ м„ нғқ л“ңлЎӯлӢӨмҡҙ\n- **post_detail_screen.dart**: м№ҙн…Ңкі лҰ¬ мғүмғҒ н‘ңмӢң\n- **home_screen.dart**: мөңмӢ кёҖ м№ҙн…Ңкі лҰ¬ мғүмғҒ\n- **[fcm_service](../notification/fcm_service.md)**: нҶ н”Ҫ кө¬лҸ…/н•ҙм ң\n","data/board_categories_en.md":"# BoardCategories\r\n\r\n> н•ңкөӯм–ҙ: [board_categories.md](./board_categories.md)\r\n\r\n> `lib/data/board_categories.dart` вҖ” Board category constants + helpers\r\n\r\nCategory values stored in Firestore are Korean (`'мһҗмң '`, `'м§Ҳл¬ё'`, etc.). Referencing them by English constant names prevents typos and mismatches. Centralizes l10n names, colors, and FCM topic keys in one place.\r\n\r\n---\r\n\r\n## Constants\r\n\r\n| Constant | Firestore value | Description |\r\n|------|-------------|------|\r\n| `all` | `'м „мІҙ'` | All tab (no filter) |\r\n| `popular` | `'мқёкё°кёҖ'` | Popular tab (sorted by likeCount) |\r\n| `free` | `'мһҗмң '` | Free board |\r\n| `question` | `'м§Ҳл¬ё'` | Question board |\r\n| `info` | `'м •ліҙкіөмң '` | Info sharing board |\r\n| `lostFound` | `'л¶„мӢӨл¬ј'` | Lost & found board |\r\n| `council` | `'н•ҷмғқнҡҢ'` | Student council board |\r\n| `club` | `'лҸҷм•„лҰ¬'` | Club board |\r\n\r\n---\r\n\r\n## Lists\r\n\r\n| List | Contents | Usage |\r\n|--------|------|------|\r\n| `boardKeys` | All 8 (all ~ club) | Board tab bar |\r\n| `writeKeys` | 6 (excluding allВ·popular) | Category selection when writing a post |\r\n\r\n---\r\n\r\n## `topicKey`\r\n\r\n```dart\r\nstatic const topicKey = <String, String>{\r\n  free: 'free',\r\n  question: 'question',\r\n  info: 'info',\r\n  lostFound: 'lost',      // not 'lostfound' вҖ” for compatibility with existing FCM subscribers\r\n  council: 'council',\r\n  club: 'club',\r\n};\r\n```\r\n\r\nUsed for FCM topic name generation: `board_${topicKey[category]}`\r\n\r\n> Reason `lostFound`'s topic key is `'lost'`: existing users subscribed to `board_lost`, so it cannot be changed.\r\n\r\n---\r\n\r\n## `localizedName`\r\n\r\n```dart\r\nstatic String localizedName(AppLocalizations l, String key)\r\n```\r\n\r\nConverts a category key to the l10n name. Maps to the `board_categoryXxx` keys in `AppLocalizations`.\r\n\r\n```dart\r\nBoardCategories.localizedName(l, BoardCategories.free)  // вҶ’ \"мһҗмң \" (ko) / \"Free\" (en)\r\n```\r\n\r\n---\r\n\r\n## `color`\r\n\r\n```dart\r\nstatic Color color(String category)\r\n```\r\n\r\nMaps category to color. Used in board cards, category badges, and recent posts on the home screen.\r\n\r\n| Category | Color |\r\n|----------|------|\r\n| free | `AppColors.theme.primaryColor` |\r\n| question | `AppColors.theme.secondaryColor` |\r\n| info | `AppColors.theme.tertiaryColor` |\r\n| lostFound | `#FF5722` (Deep Orange) |\r\n| council | `#4CAF50` (Green) |\r\n| club | `#9C27B0` (Purple) |\r\n| other | `AppColors.theme.darkGreyColor` |\r\n\r\n---\r\n\r\n## Usage locations\r\n\r\n- **board_screen.dart**: tab bar, category filter, PostCard badge\r\n- **write_post_screen.dart**: category selection dropdown\r\n- **post_detail_screen.dart**: category color display\r\n- **home_screen.dart**: recent post category color\r\n- **[fcm_service](../notification/fcm_service.md)**: topic subscribe/unsubscribe\r\n","data/dday_manager.md":"# DDayManager\r\n\r\n> `lib/data/dday_manager.dart` вҖ” D-day CRUD, Firestore лҸҷкё°нҷ”\r\n\r\n`DDay` лӘЁлҚёкіј `DDayManager` нҒҙлһҳмҠӨлҘј нҸ¬н•Ё. лӘЁл“  л©”м„ңл“ңк°Җ `static`. мЈј м ҖмһҘмҶҢлҠ” Firestore (`users/{uid}/sync/ddays`), мҳӨн”„лқјмқё мәҗмӢңлҠ” SharedPreferences (`dday_cache` нӮӨ). D-day лҚ°мқҙн„°лҠ” лӮ м§ңмҷҖ лқјлІЁлҝҗмқҙлҜҖлЎң м•”нҳёнҷ” л¶Ҳн•„мҡ”\r\n\r\n---\r\n\r\n## DDay (лҚ°мқҙн„° лӘЁлҚё)\r\n\r\n```dart\r\nclass DDay {\r\n  final String title;\r\n  final DateTime date;\r\n  final bool isPinned;\r\n}\r\n```\r\n\r\n### `dDay` (кі„мӮ° н”„лЎңнҚјнӢ°)\r\n\r\n```dart\r\nint get dDay {\r\n  final now = DateTime(DateTime.now().year, DateTime.now().month, DateTime.now().day);\r\n  final target = DateTime(date.year, date.month, date.day);\r\n  return target.difference(now).inDays;\r\n}\r\n```\r\n\r\nмӢңк°„ л¶Җл¶„мқ„ м ңкұ°н•ҳкі  лӮ м§ң м°Ёмқҙл§Ң кі„мӮ°. м–‘мҲҳл©ҙ лҜёлһҳ, 0мқҙл©ҙ лӢ№мқј, мқҢмҲҳл©ҙ кіјкұ°\r\n\r\n---\r\n\r\n## `loadAll`\r\n\r\n```dart\r\nstatic Future<List<DDay>> loadAll()\r\n```\r\n\r\n**м„ӨлӘ…**: м „мІҙ D-day лӘ©лЎқмқ„ лЎңл“ңн•Ё\r\n\r\n1. л№„лЎңк·ёмқё мғҒнғңл©ҙ SharedPreferences мәҗмӢңм—җм„ң лЎңл“ң:\r\n   ```dart\r\n   if (!AuthService.isLoggedIn) return _loadFromCache();\r\n   ```\r\n\r\n2. мқјнҡҢм„ұ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢӨн–ү ([SecureStorage вҶ’ Firestore](#_migratefromsecurestorage))\r\n\r\n3. Firestoreм—җм„ң мқҪкё°:\r\n   ```dart\r\n   final doc = await _docRef(uid).get();\r\n   ```\r\n\r\n4. м„ұкіө мӢң мәҗмӢңм—җлҸ„ м ҖмһҘн•ҳм—¬ мҳӨн”„лқјмқё лҢҖл№„\r\n\r\n5. Firestore м—җлҹ¬ мӢң мәҗмӢң нҸҙл°ұ:\r\n   ```dart\r\n   catch (e) {\r\n     log('DDayManager: Firestore load error: $e, falling back to cache');\r\n     return _loadFromCache();\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `saveAll`\r\n\r\n```dart\r\nstatic Future<void> saveAll(List<DDay> list)\r\n```\r\n\r\n**м„ӨлӘ…**: D-day лӘ©лЎқ м „мІҙлҘј м ҖмһҘн•Ё\r\n\r\n1. н•ӯмғҒ SharedPreferences мәҗмӢңм—җ лЁјм Җ м ҖмһҘ (мҳӨн”„лқјмқё ліҙмһҘ)\r\n2. лЎңк·ёмқё мғҒнғңл©ҙ Firestoreм—җ лҸҷкё°нҷ”:\r\n   ```dart\r\n   await _docRef(uid).set({\r\n     'items': list.map((e) => e.toJson()).toList(),\r\n     'updatedAt': FieldValue.serverTimestamp(),\r\n   });\r\n   ```\r\n\r\nFirestore м—җлҹ¬лҠ” лЎңк№…л§Ң (мәҗмӢңлҠ” мқҙлҜё м ҖмһҘлҗЁ)\r\n\r\n---\r\n\r\n## `getPinned`\r\n\r\n```dart\r\nstatic Future<DDay?> getPinned()\r\n```\r\n\r\n**м„ӨлӘ…**: н•Җ лҗң D-day мӨ‘ к°ҖмһҘ к°Җк№Ңмҡҙ лҜёлһҳ н•ӯлӘ©мқ„ л°ҳнҷҳн•Ё\r\n\r\n```dart\r\nfinal pinned = list.where((d) => d.isPinned && d.dDay >= 0).toList();\r\npinned.sort((a, b) => a.dDay.compareTo(b.dDay));\r\nreturn pinned.first;\r\n```\r\n\r\nнҷҲ нҷ”л©ҙ мғҒлӢЁ D-day мң„м Ҝм—җ н‘ңмӢңлҗҳлҠ” н•ӯлӘ©\r\n\r\n---\r\n\r\n## `_loadFromCache` / `_saveToCache`\r\n\r\nSharedPreferences `dday_cache` нӮӨлҘј мӮ¬мҡ©н•ҳлҠ” мҳӨн”„лқјмқё мәҗмӢң. нҸүл¬ё м ҖмһҘ (D-day лҚ°мқҙн„°лҠ” лҜјк°җн•ҳм§Җ м•ҠмңјлҜҖлЎң м•”нҳёнҷ” л¶Ҳн•„мҡ”)\r\n\r\n- `_loadFromCache`: мәҗмӢңм—җм„ң D-day лӘ©лЎқ лЎңл“ң\r\n- `_saveToCache`: D-day лӘ©лЎқмқ„ мәҗмӢңм—җ м ҖмһҘ\r\n\r\n---\r\n\r\n## `_migrateFromSecureStorage`\r\n\r\n```dart\r\nstatic Future<void> _migrateFromSecureStorage()\r\n```\r\n\r\n**м„ӨлӘ…**: [`SecureStorageService`](secure_storage_service.md)м—җм„ң FirestoreлЎң мқјнҡҢм„ұ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ\r\n\r\n- SharedPreferences `dday_migrated` н”Ңлһҳк·ёлЎң мӨ‘ліө мӢӨн–ү л°©м§Җ\r\n- л Ҳкұ°мӢң SharedPreferences нӮӨ(`dday_list`) + SecureStorage нҷ•мқё\r\n- Firestore л¬ём„ңк°Җ м—Ҷмқ„ л•Ңл§Ң м—…лЎңл“ң\r\n- л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нӣ„ SecureStorage лҚ°мқҙн„° мӮӯм ң\r\n","data/dday_manager_en.md":"# DDayManager\r\n\r\n> н•ңкөӯм–ҙ: [dday_manager.md](./dday_manager.md)\r\n\r\n> `lib/data/dday_manager.dart` вҖ” D-day CRUD, Firestore sync\r\n\r\nContains the `DDay` model and the `DDayManager` class. All methods are `static`. Primary storage is Firestore (`users/{uid}/sync/ddays`), with SharedPreferences as offline cache (`dday_cache` key). D-day data is just dates and labels, so encryption is unnecessary.\r\n\r\n---\r\n\r\n## DDay (data model)\r\n\r\n```dart\r\nclass DDay {\r\n  final String title;\r\n  final DateTime date;\r\n  final bool isPinned;\r\n}\r\n```\r\n\r\n### `dDay` (computed property)\r\n\r\n```dart\r\nint get dDay {\r\n  final now = DateTime(DateTime.now().year, DateTime.now().month, DateTime.now().day);\r\n  final target = DateTime(date.year, date.month, date.day);\r\n  return target.difference(now).inDays;\r\n}\r\n```\r\n\r\nStrips the time component and calculates only the date difference. Positive is future, 0 is today, negative is past.\r\n\r\n---\r\n\r\n## `loadAll`\r\n\r\n```dart\r\nstatic Future<List<DDay>> loadAll()\r\n```\r\n\r\n**Description**: Loads the full list of D-days.\r\n\r\n1. If not logged in, load from SharedPreferences cache:\r\n   ```dart\r\n   if (!AuthService.isLoggedIn) return _loadFromCache();\r\n   ```\r\n\r\n2. Run one-time migration ([SecureStorage to Firestore](#_migratefromsecurestorage))\r\n\r\n3. Read from Firestore:\r\n   ```dart\r\n   final doc = await _docRef(uid).get();\r\n   ```\r\n\r\n4. On success, also save to cache for offline availability\r\n\r\n5. On Firestore error, fall back to cache:\r\n   ```dart\r\n   catch (e) {\r\n     log('DDayManager: Firestore load error: $e, falling back to cache');\r\n     return _loadFromCache();\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `saveAll`\r\n\r\n```dart\r\nstatic Future<void> saveAll(List<DDay> list)\r\n```\r\n\r\n**Description**: Saves the entire D-day list.\r\n\r\n1. Always save to SharedPreferences cache first (guarantees offline access)\r\n2. If logged in, sync to Firestore:\r\n   ```dart\r\n   await _docRef(uid).set({\r\n     'items': list.map((e) => e.toJson()).toList(),\r\n     'updatedAt': FieldValue.serverTimestamp(),\r\n   });\r\n   ```\r\n\r\nFirestore errors are only logged (cache is already saved).\r\n\r\n---\r\n\r\n## `getPinned`\r\n\r\n```dart\r\nstatic Future<DDay?> getPinned()\r\n```\r\n\r\n**Description**: Returns the closest upcoming item among pinned D-days.\r\n\r\n```dart\r\nfinal pinned = list.where((d) => d.isPinned && d.dDay >= 0).toList();\r\npinned.sort((a, b) => a.dDay.compareTo(b.dDay));\r\nreturn pinned.first;\r\n```\r\n\r\nItem displayed in the D-day widget at the top of the home screen.\r\n\r\n---\r\n\r\n## `_loadFromCache` / `_saveToCache`\r\n\r\nOffline cache using the SharedPreferences `dday_cache` key. Stored as plaintext (D-day data is not sensitive, so encryption is unnecessary).\r\n\r\n- `_loadFromCache`: Load D-day list from cache\r\n- `_saveToCache`: Save D-day list to cache\r\n\r\n---\r\n\r\n## `_migrateFromSecureStorage`\r\n\r\n```dart\r\nstatic Future<void> _migrateFromSecureStorage()\r\n```\r\n\r\n**Description**: One-time migration from [`SecureStorageService`](secure_storage_service.md) to Firestore.\r\n\r\n- Guarded by SharedPreferences `dday_migrated` flag to prevent repeated runs\r\n- Checks legacy SharedPreferences key (`dday_list`) + SecureStorage\r\n- Uploads to Firestore only if the document does not already exist\r\n- Cleans up SecureStorage data after migration\r\n","data/device.md":"# Device\r\n\r\n> `lib/data/device.dart` вҖ” л””л°”мқҙмҠӨ нҒ¬кё° кі„мӮ° мң нӢёлҰ¬нӢ°\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. нҷ”л©ҙ нҒ¬кё°лҘј нҚјм„јнҠё кё°л°ҳмңјлЎң кі„мӮ°н•ҳлҠ” л°ҳмқ‘нҳ• л Ҳмқҙм•„мӣғ н—¬нҚј\r\n\r\n---\r\n\r\n## `init`\r\n\r\n```dart\r\nstatic void init(BuildContext context) {\r\n  final size = MediaQuery.of(context).size;\r\n  width = size.width;\r\n  height = size.height;\r\n  isTablet = width > 500;\r\n}\r\n```\r\n\r\n**м„ӨлӘ…**: л””л°”мқҙмҠӨ нҒ¬кё°лҘј мҙҲкё°нҷ”н•Ё\r\n\r\n`MainScreen.build`м—җм„ң л§Ө л№Ңл“ңл§ҲлӢӨ нҳём¶ң:\r\n```dart\r\nDevice.init(context);\r\n```\r\n\r\n- `width`/`height`: `MediaQuery.of(context).size`м—җм„ң м¶”м¶ң\r\n- `isTablet`: л„Ҳл№„ 500px мҙҲкіј мӢң нғңлё”лҰҝмңјлЎң нҢҗм •\r\n\r\n---\r\n\r\n## `getWidth`\r\n\r\n```dart\r\nstatic double getWidth(double percent) {\r\n  return width / 100 * percent;\r\n}\r\n```\r\n\r\n**м„ӨлӘ…**: нҷ”л©ҙ л„Ҳл№„мқҳ нҚјм„јнҠёлҘј н”Ҫм…ҖлЎң ліҖнҷҳн•Ё\r\n\r\n```dart\r\n// мҳҲ: нҷ”л©ҙ л„Ҳл№„к°Җ 400pxмқј л•Ң\r\nDevice.getWidth(50)  // вҶ’ 200.0\r\nDevice.getWidth(90)  // вҶ’ 360.0\r\n```\r\n\r\n---\r\n\r\n## `getHeight`\r\n\r\n```dart\r\nstatic double getHeight(double percent) {\r\n  return height / 100 * percent;\r\n}\r\n```\r\n\r\nнҷ”л©ҙ лҶ’мқҙмқҳ нҚјм„јнҠёлҘј н”Ҫм…ҖлЎң ліҖнҷҳ. `getWidth`мҷҖ лҸҷмқјн•ң кі„мӮ° л°©мӢқ\r\n\r\n---\r\n\r\n## м •м Ғ н•„л“ң\r\n\r\n| н•„л“ң | нғҖмһ… | м„ӨлӘ… |\r\n|------|------|------|\r\n| `width` | `double` | нҷ”л©ҙ л„Ҳл№„ (px) |\r\n| `height` | `double` | нҷ”л©ҙ лҶ’мқҙ (px) |\r\n| `isTablet` | `bool` | нғңлё”лҰҝ м—¬л¶Җ (`width > 500`) |\r\n\r\n---\r\n\r\n## мӮ¬мҡ©мІҳ\r\n\r\nмң„м Ҝ нҒ¬кё°/нҢЁл”©мқ„ нҷ”л©ҙ л№„мңЁлЎң м§Җм •н•  л•Ң мӮ¬мҡ©:\r\n```dart\r\nContainer(\r\n  width: Device.getWidth(90),   // нҷ”л©ҙ л„Ҳл№„мқҳ 90%\r\n  height: Device.getHeight(5),  // нҷ”л©ҙ лҶ’мқҙмқҳ 5%\r\n)\r\n```\r\n","data/device_en.md":"# Device\r\n\r\n> н•ңкөӯм–ҙ: [device.md](./device.md)\r\n\r\n> `lib/data/device.dart` вҖ” Device size calculation utility\r\n\r\nAll methods are `static`. Responsive layout helper that calculates screen sizes based on percentages.\r\n\r\n---\r\n\r\n## `init`\r\n\r\n```dart\r\nstatic void init(BuildContext context) {\r\n  final size = MediaQuery.of(context).size;\r\n  width = size.width;\r\n  height = size.height;\r\n  isTablet = width > 500;\r\n}\r\n```\r\n\r\n**Description**: Initializes the device size.\r\n\r\nCalled on every build in `MainScreen.build`:\r\n```dart\r\nDevice.init(context);\r\n```\r\n\r\n- `width`/`height`: extracted from `MediaQuery.of(context).size`\r\n- `isTablet`: treated as tablet when width exceeds 500px\r\n\r\n---\r\n\r\n## `getWidth`\r\n\r\n```dart\r\nstatic double getWidth(double percent) {\r\n  return width / 100 * percent;\r\n}\r\n```\r\n\r\n**Description**: Converts a percentage of the screen width to pixels.\r\n\r\n```dart\r\n// e.g. when screen width is 400px\r\nDevice.getWidth(50)  // вҶ’ 200.0\r\nDevice.getWidth(90)  // вҶ’ 360.0\r\n```\r\n\r\n---\r\n\r\n## `getHeight`\r\n\r\n```dart\r\nstatic double getHeight(double percent) {\r\n  return height / 100 * percent;\r\n}\r\n```\r\n\r\nConverts a percentage of the screen height to pixels. Same calculation as `getWidth`.\r\n\r\n---\r\n\r\n## Static fields\r\n\r\n| Field | Type | Description |\r\n|------|------|------|\r\n| `width` | `double` | Screen width (px) |\r\n| `height` | `double` | Screen height (px) |\r\n| `isTablet` | `bool` | Whether it is a tablet (`width > 500`) |\r\n\r\n---\r\n\r\n## Usage\r\n\r\nUsed to specify widget sizes/paddings as a proportion of the screen:\r\n```dart\r\nContainer(\r\n  width: Device.getWidth(90),   // 90% of screen width\r\n  height: Device.getHeight(5),  // 5% of screen height\r\n)\r\n```\r\n","data/exceptions.md":"# Exceptions\n\n> `lib/data/exceptions.dart` вҖ” м»ӨмҠӨн…Җ мҳҲмҷё нҒҙлһҳмҠӨ кі„мёө\n\n---\n\n## нҒҙлһҳмҠӨ кі„мёө\n\n```\nException\nв””в”Җв”Җ AppException (base)\n    в”ңв”Җв”Җ NetworkException вҖ” HTTP нғҖмһ„м•„мӣғ, м—°кІ° мӢӨнҢЁ\n    в”ңв”Җв”Җ ApiException вҖ” API мқ‘лӢө нҢҢмӢұ мӢӨнҢЁ, л№„м •мғҒ мқ‘лӢө\n    в””в”Җв”Җ AuthException вҖ” мқёмҰқ/к¶Ңн•ң кҙҖл Ё м—җлҹ¬\n```\n\nлӘЁл“  мҳҲмҷё нҒҙлһҳмҠӨлҠ” `message` (м„ӨлӘ…)мҷҖ `cause` (мӣҗліё м—җлҹ¬, м„ нғқ)лҘј к°Җм§җ\n\n---\n\n## мӮ¬мҡ© нҢЁн„ҙ\n\n### API л Ҳмқҙм–ҙ (`_fetchData`)\n\n```dart\n// мөңн•ҳмң„ HTTP нҳём¶ң вҖ” мӢӨнҢЁ мӢң NetworkException throw\nstatic Future<Map<String, dynamic>> _fetchData(String url) async {\n  try {\n    final response = await _client.get(Uri.parse(url)).timeout(...);\n    // нҢҢмӢұ нӣ„ л°ҳнҷҳ\n  } catch (e) {\n    throw NetworkException('API мҡ”мІӯ мӢӨнҢЁ', e);\n  }\n}\n```\n\n### нҳём¶ңмёЎ (мәҗмӢң fallbackмқҙ мһҲлҠ” кІҪмҡ°)\n\n```dart\ntry {\n  final data = await _fetchData(url);\n  // м •мғҒ мІҳлҰ¬\n} on NetworkException {\n  // мәҗмӢңк°Җ мһҲмңјл©ҙ мәҗмӢң л°ҳнҷҳ, м—Ҷмңјл©ҙ кё°ліёк°’\n  return cached ?? Meal(meal: ApiStrings.mealNoData, ...);\n}\n```\n\n---\n\n## м Ғмҡ© лІ”мң„\n\n| нҢҢмқј | мӮ¬мҡ©н•ҳлҠ” мҳҲмҷё | м„ӨлӘ… |\n|------|-------------|------|\n| `meal_data_api.dart` | `NetworkException` | `_fetchData` throw, мғҒмң„ л©”м„ңл“ңм—җм„ң мәҗмӢң fallback |\n| `timetable_data_api.dart` | `NetworkException` | лҸҷмқј нҢЁн„ҙ, м—җлҹ¬ л§ө лҳҗлҠ” л№Ҳ лҰ¬мҠӨнҠё л°ҳнҷҳ |\n| `notice_data_api.dart` | `NetworkException` | лҸҷмқј нҢЁн„ҙ, кё°ліё л¬ёмһҗм—ҙ лҳҗлҠ” null л°ҳнҷҳ |\n","data/exceptions_en.md":"# Exceptions\r\n\r\n> н•ңкөӯм–ҙ: [exceptions.md](./exceptions.md)\r\n\r\n> `lib/data/exceptions.dart` вҖ” Custom exception class hierarchy\r\n\r\n---\r\n\r\n## Class hierarchy\r\n\r\n```\r\nException\r\nв””в”Җв”Җ AppException (base)\r\n    в”ңв”Җв”Җ NetworkException вҖ” HTTP timeout, connection failure\r\n    в”ңв”Җв”Җ ApiException вҖ” API response parsing failure, abnormal response\r\n    в””в”Җв”Җ AuthException вҖ” Auth/permission related errors\r\n```\r\n\r\nAll exception classes carry a `message` (description) and a `cause` (original error, optional).\r\n\r\n---\r\n\r\n## Usage patterns\r\n\r\n### API layer (`_fetchData`)\r\n\r\n```dart\r\n// Lowest-level HTTP call вҖ” throws NetworkException on failure\r\nstatic Future<Map<String, dynamic>> _fetchData(String url) async {\r\n  try {\r\n    final response = await _client.get(Uri.parse(url)).timeout(...);\r\n    // parse and return\r\n  } catch (e) {\r\n    throw NetworkException('API мҡ”мІӯ мӢӨнҢЁ', e);\r\n  }\r\n}\r\n```\r\n\r\n### Caller (when a cache fallback exists)\r\n\r\n```dart\r\ntry {\r\n  final data = await _fetchData(url);\r\n  // normal handling\r\n} on NetworkException {\r\n  // return cache if available, otherwise default value\r\n  return cached ?? Meal(meal: ApiStrings.mealNoData, ...);\r\n}\r\n```\r\n\r\n---\r\n\r\n## Scope\r\n\r\n| File | Exception used | Description |\r\n|------|-------------|------|\r\n| `meal_data_api.dart` | `NetworkException` | `_fetchData` throws; upper method falls back to cache |\r\n| `timetable_data_api.dart` | `NetworkException` | Same pattern; returns error map or empty list |\r\n| `notice_data_api.dart` | `NetworkException` | Same pattern; returns default string or null |\r\n","data/grade_manager.md":"# GradeManager\r\n\r\n> `lib/data/grade_manager.dart` вҖ” м„ұм Ғ CRUD, лӘ©н‘ң кҙҖлҰ¬, л“ұкёү ліҖнҷҳ\r\n\r\n`SubjectScore`, `Exam` лӘЁлҚёкіј `GradeManager` нҒҙлһҳмҠӨлҘј нҸ¬н•Ё. лӘЁл“  л©”м„ңл“ңк°Җ `static`. лҚ°мқҙн„°лҠ” [`SecureStorageService`](secure_storage_service.md)м—җ JSONмңјлЎң м•”нҳёнҷ” м ҖмһҘ (м„ңлІ„ м ҖмһҘ м•Ҳ н•Ё)\r\n\r\n---\r\n\r\n## SubjectScore (лҚ°мқҙн„° лӘЁлҚё)\r\n\r\n```dart\r\nclass SubjectScore {\r\n  final String subject;\r\n  final int? rawScore;        // мӣҗм җмҲҳ\r\n  final int? rank;            // л“ұкёү (1~9)\r\n  final double? percentile;   // л°ұл¶„мң„\r\n  final double? standardScore; // н‘ңмӨҖм җмҲҳ\r\n  final double? average;       // нҸүк· \r\n  final String? achievement;   // м„ұм·ЁлҸ„ A~E\r\n}\r\n```\r\n\r\nлӮҙмӢ (rawScore/average/rank/achievement)кіј лӘЁмқҳкі мӮ¬(percentile/standardScore/rank)лҘј н•ҳлӮҳмқҳ кө¬мЎ°мІҙлЎң нҶөн•©\r\n\r\n### мғҒмҲҳ\r\n\r\n| мғҒмҲҳ | к°’ |\r\n|------|----|\r\n| `rankCutoffs` | `{1: 'мғҒмң„ 10%', 2: 'мғҒмң„ 34%', ...}` вҖ” лӮҙмӢ  5л“ұкёү л№„мңЁ |\r\n| `achievements` | `['A', 'B', 'C', 'D', 'E']` |\r\n\r\n---\r\n\r\n## Exam (лҚ°мқҙн„° лӘЁлҚё)\r\n\r\n```dart\r\nclass Exam {\r\n  final String id;\r\n  final String type;        // 'midterm' | 'final' | 'mock' | 'private_mock'\r\n  final int year;\r\n  final int semester;       // 1 or 2\r\n  final int grade;          // 1, 2, 3\r\n  final String? mockLabel;  // лӘЁмқҳ: '3мӣ”', '6мӣ”' / мӮ¬м„Ө: м§Ғм ‘ мһ…л Ҙ\r\n  final List<SubjectScore> scores;\r\n  final DateTime createdAt;\r\n}\r\n```\r\n\r\n`displayName` н”„лЎңнҚјнӢ°: typeлі„ н•ңкөӯм–ҙ н‘ңмӢңлӘ… мғқм„ұ\r\n```dart\r\n'midterm' вҶ’ '$year ${semester}н•ҷкё° мӨ‘к°„кі мӮ¬'\r\n'mock'    вҶ’ '$year $mockLabel лӘЁмқҳкі мӮ¬'\r\n```\r\n\r\n---\r\n\r\n## `percentileToRank`\r\n\r\n```dart\r\nstatic int percentileToRank(double percentile)\r\n```\r\n\r\n**м„ӨлӘ…**: мҲҳлҠҘ л°ұл¶„мң„лҘј л“ұкёүмңјлЎң ліҖнҷҳн•Ё (9л“ұкёүм ң)\r\n\r\n```dart\r\nif (percentile >= 96) return 1;\r\nif (percentile >= 89) return 2;\r\nif (percentile >= 77) return 3;\r\n// ... 4~8л“ұкёү\r\nreturn 9;\r\n```\r\n\r\n---\r\n\r\n## `loadExams`\r\n\r\n```dart\r\nstatic Future<List<Exam>> loadExams()\r\n```\r\n\r\n**м„ӨлӘ…**: м ҖмһҘлҗң мӢңн—ҳ лӘ©лЎқмқ„ лЎңл“ңн•Ё\r\n\r\n1. SharedPreferences вҶ’ SecureStorage мқјнҡҢм„ұ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ:\r\n   ```dart\r\n   await SecureStorageService.migrateFromPlain(\r\n     key: SecureStorageService.keyGradeExams,\r\n     oldValue: prefs.getString(_examsKey),\r\n     onMigrated: () async => prefs.remove(_examsKey),\r\n   );\r\n   ```\r\n\r\n2. SecureStorageм—җм„ң JSON мқҪкё° нӣ„ `Exam.fromJson`мңјлЎң л””мҪ”л”©:\r\n   ```dart\r\n   final json = await SecureStorageService.read(SecureStorageService.keyGradeExams);\r\n   final list = jsonDecode(json) as List<dynamic>;\r\n   return list.map((e) => Exam.fromJson(e)).toList()\r\n     ..sort((a, b) => a.createdAt.compareTo(b.createdAt));\r\n   ```\r\n\r\n**л§Ҳмқҙк·ёл Ҳмқҙм…ҳ**: кё°мЎҙ SharedPreferences(нҸүл¬ё)м—җм„ң SecureStorage(м•”нҳёнҷ”)лЎң мһҗлҸҷ мқҙм „. н•ң лІҲ мҳ®кё°л©ҙ мқҙм „ лҚ°мқҙн„° мӮӯм ң\r\n\r\n---\r\n\r\n## `saveExams`\r\n\r\n```dart\r\nstatic Future<void> saveExams(List<Exam> exams)\r\n```\r\n\r\nмӢңн—ҳ лӘ©лЎқ м „мІҙлҘј SecureStorageм—җ JSONмңјлЎң м ҖмһҘ\r\n\r\n---\r\n\r\n## `addExam` / `updateExam` / `deleteExam`\r\n\r\n```dart\r\nstatic Future<void> addExam(Exam exam)\r\nstatic Future<void> updateExam(Exam exam)\r\nstatic Future<void> deleteExam(String id)\r\n```\r\n\r\nк°Ғк°Ғ `loadExams()` вҶ’ мҲҳм • вҶ’ `saveExams()` нҢЁн„ҙ. `updateExam`мқҖ id л§Өм№ӯ, `deleteExam`мқҖ `removeWhere`\r\n\r\n---\r\n\r\n## `loadGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadGoals()\r\n```\r\n\r\n**м„ӨлӘ…**: мҲҳмӢң лӘ©н‘ң л“ұкёү(кіјлӘ©лӘ… вҶ’ л“ұкёү)мқ„ лЎңл“ңн•Ё\r\n\r\n`loadExams`мҷҖ лҸҷмқјн•ң л§Ҳмқҙк·ёл Ҳмқҙм…ҳ + SecureStorage нҢЁн„ҙ. нӮӨ: `SecureStorageService.keyGradeGoals`\r\n\r\n---\r\n\r\n## `saveGoals`\r\n\r\n```dart\r\nstatic Future<void> saveGoals(Map<String, double> goals)\r\n```\r\n\r\nмҲҳмӢң лӘ©н‘ңлҘј SecureStorageм—җ JSON м ҖмһҘ\r\n\r\n---\r\n\r\n## `loadJeongsiGoals` / `saveJeongsiGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadJeongsiGoals()\r\nstatic Future<void> saveJeongsiGoals(Map<String, double> goals)\r\n```\r\n\r\nм •мӢң лӘ©н‘ң(л°ұл¶„мң„ кё°мӨҖ). нӮӨ: `SecureStorageService.keyGradeJeongsiGoals`. лЎңм§ҒмқҖ `loadGoals`/`saveGoals`мҷҖ лҸҷмқј\r\n\r\n---\r\n\r\n## мғҒмҲҳ лҚ°мқҙн„°\r\n\r\n### `mockSubjects`\r\n\r\n2022 к°ңм • көҗмңЎкіјм • мҲҳлҠҘ кіјлӘ© л§ө:\r\n```dart\r\n{\r\n  'кіөнҶө': ['көӯм–ҙ', 'мҲҳн•ҷ', 'мҳҒм–ҙ', 'н•ңкөӯмӮ¬', 'нҶөн•©мӮ¬нҡҢ', 'нҶөн•©кіјн•ҷ'],\r\n  'м§Ғм—…нғҗкө¬': ['м„ұкіөм Ғмқё м§Ғм—…мғқнҷң'],\r\n  'м ң2мҷёкөӯм–ҙ/н•ңл¬ё (нғқ 1)': ['лҸ…мқјм–ҙ', 'н”„лһ‘мҠӨм–ҙ', ... 'н•ңл¬ё'],\r\n}\r\n```\r\n\r\n### `subjectColors`\r\n\r\nкіјлӘ©лі„ кі м • мғүмғҒ (м°ЁнҠёмҡ©):\r\n```dart\r\n{'көӯм–ҙ': 0xFFE53935, 'мҲҳн•ҷ': 0xFF1E88E5, 'мҳҒм–ҙ': 0xFF43A047, ...}\r\n```\r\n\r\n### `getSubjectColor`\r\n\r\n```dart\r\nstatic int getSubjectColor(String subject)\r\n```\r\n\r\n`subjectColors`м—җ м—ҶлҠ” кіјлӘ©мқҖ `subject.hashCode | 0xFF000000`лЎң кІ°м •лЎ м Ғ мғүмғҒ мғқм„ұ\r\n","data/grade_manager_en.md":"# GradeManager\r\n\r\n> н•ңкөӯм–ҙ: [grade_manager.md](./grade_manager.md)\r\n\r\n> `lib/data/grade_manager.dart` вҖ” Grade CRUD, goal management, rank conversion\r\n\r\nContains the `SubjectScore`, `Exam` models and the `GradeManager` class. All methods are `static`. Data is encrypted and stored as JSON in [`SecureStorageService`](secure_storage_service.md) (not stored on the server).\r\n\r\n---\r\n\r\n## SubjectScore (data model)\r\n\r\n```dart\r\nclass SubjectScore {\r\n  final String subject;\r\n  final int? rawScore;        // raw score\r\n  final int? rank;            // rank (1~9)\r\n  final double? percentile;   // percentile\r\n  final double? standardScore; // standard score\r\n  final double? average;       // average\r\n  final String? achievement;   // achievement level A~E\r\n}\r\n```\r\n\r\nUnifies internal school grades (rawScore/average/rank/achievement) and mock exams (percentile/standardScore/rank) into a single structure.\r\n\r\n### Constants\r\n\r\n| Constant | Value |\r\n|------|----|\r\n| `rankCutoffs` | `{1: 'мғҒмң„ 10%', 2: 'мғҒмң„ 34%', ...}` вҖ” 5-rank ratio for internal grades |\r\n| `achievements` | `['A', 'B', 'C', 'D', 'E']` |\r\n\r\n---\r\n\r\n## Exam (data model)\r\n\r\n```dart\r\nclass Exam {\r\n  final String id;\r\n  final String type;        // 'midterm' | 'final' | 'mock' | 'private_mock'\r\n  final int year;\r\n  final int semester;       // 1 or 2\r\n  final int grade;          // 1, 2, 3\r\n  final String? mockLabel;  // mock: '3мӣ”', '6мӣ”' / private mock: custom input\r\n  final List<SubjectScore> scores;\r\n  final DateTime createdAt;\r\n}\r\n```\r\n\r\n`displayName` property: generates a Korean display name per type.\r\n```dart\r\n'midterm' вҶ’ '$year ${semester}н•ҷкё° мӨ‘к°„кі мӮ¬'\r\n'mock'    вҶ’ '$year $mockLabel лӘЁмқҳкі мӮ¬'\r\n```\r\n\r\n---\r\n\r\n## `percentileToRank`\r\n\r\n```dart\r\nstatic int percentileToRank(double percentile)\r\n```\r\n\r\n**Description**: Converts a CSAT percentile into a rank (9-rank scale).\r\n\r\n```dart\r\nif (percentile >= 96) return 1;\r\nif (percentile >= 89) return 2;\r\nif (percentile >= 77) return 3;\r\n// ... ranks 4~8\r\nreturn 9;\r\n```\r\n\r\n---\r\n\r\n## `loadExams`\r\n\r\n```dart\r\nstatic Future<List<Exam>> loadExams()\r\n```\r\n\r\n**Description**: Loads the saved exam list.\r\n\r\n1. One-time migration from SharedPreferences to SecureStorage:\r\n   ```dart\r\n   await SecureStorageService.migrateFromPlain(\r\n     key: SecureStorageService.keyGradeExams,\r\n     oldValue: prefs.getString(_examsKey),\r\n     onMigrated: () async => prefs.remove(_examsKey),\r\n   );\r\n   ```\r\n\r\n2. Read JSON from SecureStorage and decode via `Exam.fromJson`:\r\n   ```dart\r\n   final json = await SecureStorageService.read(SecureStorageService.keyGradeExams);\r\n   final list = jsonDecode(json) as List<dynamic>;\r\n   return list.map((e) => Exam.fromJson(e)).toList()\r\n     ..sort((a, b) => a.createdAt.compareTo(b.createdAt));\r\n   ```\r\n\r\n**Migration**: Automatically moves existing SharedPreferences (plaintext) data to SecureStorage (encrypted). Deletes the original data once moved.\r\n\r\n---\r\n\r\n## `saveExams`\r\n\r\n```dart\r\nstatic Future<void> saveExams(List<Exam> exams)\r\n```\r\n\r\nSaves the entire exam list as JSON to SecureStorage.\r\n\r\n---\r\n\r\n## `addExam` / `updateExam` / `deleteExam`\r\n\r\n```dart\r\nstatic Future<void> addExam(Exam exam)\r\nstatic Future<void> updateExam(Exam exam)\r\nstatic Future<void> deleteExam(String id)\r\n```\r\n\r\nEach follows the `loadExams()` вҶ’ modify вҶ’ `saveExams()` pattern. `updateExam` matches by id, `deleteExam` uses `removeWhere`.\r\n\r\n---\r\n\r\n## `loadGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadGoals()\r\n```\r\n\r\n**Description**: Loads early-admission target ranks (subject name вҶ’ rank).\r\n\r\nSame migration + SecureStorage pattern as `loadExams`. Key: `SecureStorageService.keyGradeGoals`.\r\n\r\n---\r\n\r\n## `saveGoals`\r\n\r\n```dart\r\nstatic Future<void> saveGoals(Map<String, double> goals)\r\n```\r\n\r\nSaves early-admission targets as JSON to SecureStorage.\r\n\r\n---\r\n\r\n## `loadJeongsiGoals` / `saveJeongsiGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadJeongsiGoals()\r\nstatic Future<void> saveJeongsiGoals(Map<String, double> goals)\r\n```\r\n\r\nRegular-admission targets (percentile-based). Key: `SecureStorageService.keyGradeJeongsiGoals`. Logic is the same as `loadGoals`/`saveGoals`.\r\n\r\n---\r\n\r\n## Constant data\r\n\r\n### `mockSubjects`\r\n\r\nMap of CSAT subjects under the 2022 revised curriculum:\r\n```dart\r\n{\r\n  'кіөнҶө': ['көӯм–ҙ', 'мҲҳн•ҷ', 'мҳҒм–ҙ', 'н•ңкөӯмӮ¬', 'нҶөн•©мӮ¬нҡҢ', 'нҶөн•©кіјн•ҷ'],\r\n  'м§Ғм—…нғҗкө¬': ['м„ұкіөм Ғмқё м§Ғм—…мғқнҷң'],\r\n  'м ң2мҷёкөӯм–ҙ/н•ңл¬ё (нғқ 1)': ['лҸ…мқјм–ҙ', 'н”„лһ‘мҠӨм–ҙ', ... 'н•ңл¬ё'],\r\n}\r\n```\r\n\r\n### `subjectColors`\r\n\r\nFixed per-subject colors (for charts):\r\n```dart\r\n{'көӯм–ҙ': 0xFFE53935, 'мҲҳн•ҷ': 0xFF1E88E5, 'мҳҒм–ҙ': 0xFF43A047, ...}\r\n```\r\n\r\n### `getSubjectColor`\r\n\r\n```dart\r\nstatic int getSubjectColor(String subject)\r\n```\r\n\r\nFor subjects not in `subjectColors`, a deterministic color is generated as `subject.hashCode | 0xFF000000`.\r\n","data/grade_repository.md":"# GradeRepository\r\n\r\n> `lib/data/grade_repository.dart` вҖ” м„ұм Ғ кҙҖлҰ¬ Repository мқён„°нҺҳмқҙмҠӨ\r\n\r\n[`GradeManager`](grade_manager.md)мқҳ м •м Ғ л©”м„ңл“ңлҘј мқёмҠӨн„ҙмҠӨ л©”м„ңл“ңлЎң к°җмӢё GetIt DIм—җ л“ұлЎқ. н…ҢмҠӨнҠём—җм„ң mock мЈјмһ… к°ҖлҠҘ\r\n\r\n---\r\n\r\n## м„Өкі„ л°°кІҪ\r\n\r\n[`AuthRepository`](auth_repository.md)мҷҖ лҸҷмқјн•ң нҢЁн„ҙ:\r\n```\r\nGradeManager (м •м Ғ л©”м„ңл“ң, SecureStorage мқҳмЎҙ)\r\n    вҶ‘\r\nGradeRepository (мқёмҠӨн„ҙмҠӨ мқён„°нҺҳмқҙмҠӨ)\r\n    вҶ‘\r\nLocalGradeRepository (GradeManagerм—җ мң„мһ„)\r\n```\r\n\r\n> рҹ“Һ [`GradeManager`](grade_manager.md) В· [`SecureStorageService`](secure_storage_service.md)\r\n\r\nRiverpod Provider н…ҢмҠӨнҠём—җм„ң `MockGradeRepository`лЎң көҗмІҙн•ҳл©ҙ sqflite/SharedPreferences/SecureStorage мқҳмЎҙмқ„ м ңкұ°н•  мҲҳ мһҲмқҢ\r\n\r\n---\r\n\r\n## `GradeRepository` (м¶”мғҒ нҒҙлһҳмҠӨ)\r\n\r\n```dart\r\nabstract class GradeRepository {\r\n  Future<List<Exam>> loadExams();\r\n  Future<void> saveExams(List<Exam> exams);\r\n  Future<void> addExam(Exam exam);\r\n  Future<void> updateExam(Exam exam);\r\n  Future<void> deleteExam(String id);\r\n  Future<Map<String, double>> loadGoals();\r\n  Future<void> saveGoals(Map<String, double> goals);\r\n  Future<Map<String, double>> loadJeongsiGoals();\r\n  Future<void> saveJeongsiGoals(Map<String, double> goals);\r\n}\r\n```\r\n\r\n[`GradeManager`](grade_manager.md)мқҳ лӘЁл“  public л©”м„ңл“ңлҘј мқён„°нҺҳмқҙмҠӨлЎң м¶”м¶ң. мӢңн—ҳ CRUD + мҲҳмӢң/м •мӢң лӘ©н‘ң кҙҖлҰ¬\r\n\r\n---\r\n\r\n## `LocalGradeRepository` (кё°ліё кө¬нҳ„)\r\n\r\n```dart\r\nclass LocalGradeRepository implements GradeRepository {\r\n  const LocalGradeRepository();\r\n\r\n  @override\r\n  Future<List<Exam>> loadExams() => GradeManager.loadExams();\r\n\r\n  @override\r\n  Future<void> addExam(Exam exam) => GradeManager.addExam(exam);\r\n\r\n  @override\r\n  Future<void> deleteExam(String id) => GradeManager.deleteExam(id);\r\n\r\n  // ... лӮҳлЁём§Җ лӘЁл‘җ GradeManager м •м Ғ л©”м„ңл“ңм—җ мң„мһ„\r\n}\r\n```\r\n\r\n`const` мғқм„ұмһҗ. лӘЁл“  л©”м„ңл“ңк°Җ [`GradeManager`](grade_manager.md) м •м Ғ л©”м„ңл“ңлҘј к·ёлҢҖлЎң нҳём¶ң\r\n\r\n---\r\n\r\n## GetIt м ‘к·јмһҗ\r\n\r\n```dart\r\nGradeRepository get gradeRepository => GetIt.I<GradeRepository>();\r\n```\r\n\r\n`service_locator.dart`м—җм„ң л“ұлЎқ:\r\n```dart\r\ngetIt.registerLazySingleton<GradeRepository>(\r\n  () => const LocalGradeRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## н…ҢмҠӨнҠё нҷңмҡ©\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<GradeRepository>(MockGradeRepository());\r\n```\r\n\r\n`MockGradeRepository`м—җм„ң мқёл©”лӘЁлҰ¬ лҰ¬мҠӨнҠёлЎң мӢңн—ҳ лҚ°мқҙн„°лҘј кҙҖлҰ¬н•ҳл©ҙ SecureStorage м—Ҷмқҙ [`ExamsNotifier`](../providers/providers.md) н…ҢмҠӨнҠё к°ҖлҠҘ\r\n","data/grade_repository_en.md":"# GradeRepository\r\n\r\n> н•ңкөӯм–ҙ: [grade_repository.md](./grade_repository.md)\r\n\r\n> `lib/data/grade_repository.dart` вҖ” Grade management Repository interface\r\n\r\nWraps the static methods of [`GradeManager`](grade_manager_en.md) as instance methods and registers them with GetIt DI. Allows mock injection in tests.\r\n\r\n---\r\n\r\n## Design background\r\n\r\nSame pattern as [`AuthRepository`](auth_repository_en.md):\r\n```\r\nGradeManager (static methods, depends on SecureStorage)\r\n    вҶ‘\r\nGradeRepository (instance interface)\r\n    вҶ‘\r\nLocalGradeRepository (delegates to GradeManager)\r\n```\r\n\r\n> рҹ“Һ [`GradeManager`](grade_manager_en.md) В· [`SecureStorageService`](secure_storage_service.md)\r\n\r\nReplacing with `MockGradeRepository` in Riverpod Provider tests removes the dependency on sqflite/SharedPreferences/SecureStorage.\r\n\r\n---\r\n\r\n## `GradeRepository` (abstract class)\r\n\r\n```dart\r\nabstract class GradeRepository {\r\n  Future<List<Exam>> loadExams();\r\n  Future<void> saveExams(List<Exam> exams);\r\n  Future<void> addExam(Exam exam);\r\n  Future<void> updateExam(Exam exam);\r\n  Future<void> deleteExam(String id);\r\n  Future<Map<String, double>> loadGoals();\r\n  Future<void> saveGoals(Map<String, double> goals);\r\n  Future<Map<String, double>> loadJeongsiGoals();\r\n  Future<void> saveJeongsiGoals(Map<String, double> goals);\r\n}\r\n```\r\n\r\nExtracts every public method of [`GradeManager`](grade_manager_en.md) into the interface. Exam CRUD + early/regular admission goal management.\r\n\r\n---\r\n\r\n## `LocalGradeRepository` (default implementation)\r\n\r\n```dart\r\nclass LocalGradeRepository implements GradeRepository {\r\n  const LocalGradeRepository();\r\n\r\n  @override\r\n  Future<List<Exam>> loadExams() => GradeManager.loadExams();\r\n\r\n  @override\r\n  Future<void> addExam(Exam exam) => GradeManager.addExam(exam);\r\n\r\n  @override\r\n  Future<void> deleteExam(String id) => GradeManager.deleteExam(id);\r\n\r\n  // ... all remaining methods delegate to GradeManager static methods\r\n}\r\n```\r\n\r\n`const` constructor. Every method calls a [`GradeManager`](grade_manager_en.md) static method directly.\r\n\r\n---\r\n\r\n## GetIt accessor\r\n\r\n```dart\r\nGradeRepository get gradeRepository => GetIt.I<GradeRepository>();\r\n```\r\n\r\nRegistered in `service_locator.dart`:\r\n```dart\r\ngetIt.registerLazySingleton<GradeRepository>(\r\n  () => const LocalGradeRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## Test usage\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<GradeRepository>(MockGradeRepository());\r\n```\r\n\r\nIf `MockGradeRepository` manages exam data with an in-memory list, [`ExamsNotifier`](../providers/providers.md) can be tested without SecureStorage.\r\n","data/local_database.md":"# LocalDataBase\r\n\r\n> `lib/data/local_database.dart` вҖ” SQLite мқјм • DB, Firestore лҸҷкё°нҷ”\r\n\r\nмқёмҠӨн„ҙмҠӨ л©”м„ңл“ң (GetItм—җ мӢұкёҖн„ҙ л“ұлЎқ). sqflite кё°л°ҳ к°ңмқё мқјм • CRUD\r\n\r\n---\r\n\r\n## лҚ°мқҙн„°лІ мқҙмҠӨ мҠӨнӮӨл§Ҳ\r\n\r\n```sql\r\nCREATE TABLE schedules (\r\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\r\n  startTime INTEGER NOT NULL,\r\n  endTime INTEGER NOT NULL,\r\n  content TEXT NOT NULL,\r\n  date TEXT NOT NULL,\r\n  endDate TEXT,\r\n  color INTEGER DEFAULT 4284811951\r\n)\r\n```\r\n\r\n- `date`: `'2026-04-10'` нҳ•мӢқ\r\n- `endDate`: м—¬лҹ¬ лӮ м—җ кұём№ҳлҠ” мқјм •мҡ© (v2м—җм„ң м¶”к°Җ)\r\n- `color`: ARGB м •мҲҳк°’ (кё°ліёк°’ = нҡҢмғү)\r\n\r\n---\r\n\r\n## `database` (getter)\r\n\r\n```dart\r\nFuture<Database> get database async {\r\n  if (_db != null) return _db!;\r\n  _db = await _initDB();\r\n  return _db!;\r\n}\r\n```\r\n\r\nLazy singleton нҢЁн„ҙ. мөңмҙҲ нҳём¶ң мӢң DB мғқм„ұ/м—ҙкё°\r\n\r\n---\r\n\r\n## `_initDB`\r\n\r\n```dart\r\nFuture<Database> _initDB()\r\n```\r\n\r\n**м„ӨлӘ…**: SQLite DBлҘј м—ҙкі  мҠӨнӮӨл§ҲлҘј мғқм„ұн•Ё\r\n\r\n```dart\r\nreturn openDatabase(\r\n  path,\r\n  version: 2,\r\n  onCreate: (db, version) async { /* CREATE TABLE */ },\r\n  onUpgrade: (db, oldVersion, newVersion) async {\r\n    if (oldVersion < 2) {\r\n      await db.execute('ALTER TABLE schedules ADD COLUMN endDate TEXT');\r\n      await db.execute('ALTER TABLE schedules ADD COLUMN color INTEGER DEFAULT 4284811951');\r\n    }\r\n  },\r\n);\r\n```\r\n\r\nv1вҶ’v2 л§Ҳмқҙк·ёл Ҳмқҙм…ҳ: `endDate`, `color` м»¬лҹј м¶”к°Җ\r\n\r\n---\r\n\r\n## `migrateFromPrefs`\r\n\r\n```dart\r\nFuture<void> migrateFromPrefs()\r\n```\r\n\r\n**м„ӨлӘ…**: SharedPreferencesмқҳ л Ҳкұ°мӢң мқјм • лҚ°мқҙн„°лҘј SQLiteлЎң л§Ҳмқҙк·ёл Ҳмқҙм…ҳн•Ё\r\n\r\n```dart\r\nfinal old = prefs.getStringList('schedules');\r\nfinal batch = db.batch();\r\nfor (var json in old) {\r\n  batch.insert('schedules', {...});\r\n}\r\nawait batch.commit(noResult: true);\r\nawait prefs.remove('schedules');\r\n```\r\n\r\nл°°м№ҳ мӮҪмһ…мңјлЎң м„ұлҠҘ мөңм Ғнҷ”. л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нӣ„ мӣҗліё мӮӯм ң\r\n\r\n---\r\n\r\n## `insertSchedule`\r\n\r\n```dart\r\nFuture<int> insertSchedule(Schedule schedule)\r\n```\r\n\r\nмқјм • мӮҪмһ… нӣ„ `syncToFirestore()` нҳём¶ң. л°ҳнҷҳк°’мқҖ auto-increment ID\r\n\r\n---\r\n\r\n## `deleteSchedule`\r\n\r\n```dart\r\nFuture<void> deleteSchedule(Schedule schedule)\r\n```\r\n\r\n**м„ӨлӘ…**: мқјм •мқ„ мӮӯм ңн•Ё. IDк°Җ мһҲмңјл©ҙ IDлЎң, м—Ҷмңјл©ҙ ліөн•© мЎ°кұҙмңјлЎң л§Өм№ӯн•Ё\r\n\r\n```dart\r\nif (schedule.id != null) {\r\n  await db.delete('schedules', where: 'id = ?', whereArgs: [schedule.id]);\r\n} else {\r\n  await db.delete('schedules',\r\n    where: 'startTime = ? AND endTime = ? AND content = ? AND date = ?',\r\n    whereArgs: [...],\r\n  );\r\n}\r\n```\r\n\r\nмӮӯм ң нӣ„ `syncToFirestore()` нҳём¶ң\r\n\r\n---\r\n\r\n## `watchSchedules`\r\n\r\n```dart\r\nStream<List<Schedule>> watchSchedules(DateTime date)\r\n```\r\n\r\n**м„ӨлӘ…**: нҠ№м • лӮ м§ңмқҳ мқјм • лӘ©лЎқмқ„ мҠӨнҠёлҰјмңјлЎң л°ҳнҷҳн•Ё\r\n\r\n```dart\r\nfinal results = await db.query(\r\n  'schedules',\r\n  where: \"date LIKE ? OR (endDate IS NOT NULL AND date <= ? AND endDate >= ?)\",\r\n  whereArgs: ['$dateStr%', '$dateStr', '$dateStr'],\r\n  orderBy: 'startTime ASC',\r\n);\r\n```\r\n\r\nм—¬лҹ¬ лӮ  мқјм •лҸ„ нҸ¬н•Ё: `date <= мЎ°нҡҢмқј <= endDate` мЎ°кұҙ\r\n\r\n> **м°ёкі **: нҳ„мһ¬ `async*`лЎң н•ң лІҲл§Ң yield нӣ„ мў…лЈҢ. мӢӨмӢңк°„ к°ұмӢ мқҙ м•„лӢҢ мқјнҡҢм„ұ мҝјлҰ¬\r\n\r\n---\r\n\r\n## `getSchedulesForDateRange`\r\n\r\n```dart\r\nFuture<List<Schedule>> getSchedulesForDateRange(DateTime start, int days)\r\n```\r\n\r\n`start`л¶Җн„° `days`мқјк°„мқҳ мқјм •мқ„ мЎ°нҡҢ. лӮ м§ңлі„лЎң к°ңлі„ мҝјлҰ¬ мӢӨн–ү\r\n\r\n---\r\n\r\n## `syncToFirestore`\r\n\r\n```dart\r\nFuture<void> syncToFirestore()\r\n```\r\n\r\n**м„ӨлӘ…**: м „мІҙ мқјм • лӘ©лЎқмқ„ Firestoreм—җ лҸҷкё°нҷ”н•Ё\r\n\r\n```dart\r\nfinal all = await _getAllSchedules();\r\nawait FirebaseFirestore.instance\r\n    .collection('users').doc(uid)\r\n    .collection('sync').doc('schedules')\r\n    .set({\r\n  'items': all.map((s) => s.toMap()).toList(),\r\n  'updatedAt': FieldValue.serverTimestamp(),\r\n});\r\n```\r\n\r\nл§Ө CRUD мһ‘м—… нӣ„ мһҗлҸҷ нҳём¶ң. л№„лЎңк·ёмқё мӢң skip\r\n\r\n---\r\n\r\n## `loadFromFirestore`\r\n\r\n```dart\r\nFuture<void> loadFromFirestore()\r\n```\r\n\r\n**м„ӨлӘ…**: Firestoreм—җм„ң мқјм •мқ„ ліөмӣҗн•Ё (лЎңм»¬ DBк°Җ л№„м–ҙмһҲмқ„ л•Ңл§Ң)\r\n\r\n```dart\r\nfinal existing = await db.query('schedules');\r\nif (existing.isNotEmpty) return;  // лЎңм»¬ лҚ°мқҙн„°к°Җ мһҲмңјл©ҙ skip\r\n```\r\n\r\nкё°кё° ліҖкІҪ/мһ¬м„Өм№ҳ мӢң ліөмӣҗ мҡ©лҸ„. л°°м№ҳ мӮҪмһ…мңјлЎң м„ұлҠҘ мөңм Ғнҷ”\r\n","data/local_database_en.md":"# LocalDataBase\r\n\r\n> н•ңкөӯм–ҙ: [local_database.md](./local_database.md)\r\n\r\n> `lib/data/local_database.dart` вҖ” SQLite schedule DB, Firestore sync\r\n\r\nInstance methods (registered as a singleton with GetIt). sqflite-based personal schedule CRUD.\r\n\r\n---\r\n\r\n## Database schema\r\n\r\n```sql\r\nCREATE TABLE schedules (\r\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\r\n  startTime INTEGER NOT NULL,\r\n  endTime INTEGER NOT NULL,\r\n  content TEXT NOT NULL,\r\n  date TEXT NOT NULL,\r\n  endDate TEXT,\r\n  color INTEGER DEFAULT 4284811951\r\n)\r\n```\r\n\r\n- `date`: `'2026-04-10'` format\r\n- `endDate`: for multi-day schedules (added in v2)\r\n- `color`: ARGB integer value (default = grey)\r\n\r\n---\r\n\r\n## `database` (getter)\r\n\r\n```dart\r\nFuture<Database> get database async {\r\n  if (_db != null) return _db!;\r\n  _db = await _initDB();\r\n  return _db!;\r\n}\r\n```\r\n\r\nLazy singleton pattern. Creates/opens the DB on first call.\r\n\r\n---\r\n\r\n## `_initDB`\r\n\r\n```dart\r\nFuture<Database> _initDB()\r\n```\r\n\r\n**Description**: Opens the SQLite DB and creates the schema.\r\n\r\n```dart\r\nreturn openDatabase(\r\n  path,\r\n  version: 2,\r\n  onCreate: (db, version) async { /* CREATE TABLE */ },\r\n  onUpgrade: (db, oldVersion, newVersion) async {\r\n    if (oldVersion < 2) {\r\n      await db.execute('ALTER TABLE schedules ADD COLUMN endDate TEXT');\r\n      await db.execute('ALTER TABLE schedules ADD COLUMN color INTEGER DEFAULT 4284811951');\r\n    }\r\n  },\r\n);\r\n```\r\n\r\nv1вҶ’v2 migration: adds `endDate`, `color` columns.\r\n\r\n---\r\n\r\n## `migrateFromPrefs`\r\n\r\n```dart\r\nFuture<void> migrateFromPrefs()\r\n```\r\n\r\n**Description**: Migrates legacy schedule data from SharedPreferences to SQLite.\r\n\r\n```dart\r\nfinal old = prefs.getStringList('schedules');\r\nfinal batch = db.batch();\r\nfor (var json in old) {\r\n  batch.insert('schedules', {...});\r\n}\r\nawait batch.commit(noResult: true);\r\nawait prefs.remove('schedules');\r\n```\r\n\r\nOptimizes performance with batch inserts. Deletes the original after migration.\r\n\r\n---\r\n\r\n## `insertSchedule`\r\n\r\n```dart\r\nFuture<int> insertSchedule(Schedule schedule)\r\n```\r\n\r\nAfter inserting a schedule, calls `syncToFirestore()`. Returns the auto-increment ID.\r\n\r\n---\r\n\r\n## `deleteSchedule`\r\n\r\n```dart\r\nFuture<void> deleteSchedule(Schedule schedule)\r\n```\r\n\r\n**Description**: Deletes a schedule. Matches by ID if present; otherwise matches by composite conditions.\r\n\r\n```dart\r\nif (schedule.id != null) {\r\n  await db.delete('schedules', where: 'id = ?', whereArgs: [schedule.id]);\r\n} else {\r\n  await db.delete('schedules',\r\n    where: 'startTime = ? AND endTime = ? AND content = ? AND date = ?',\r\n    whereArgs: [...],\r\n  );\r\n}\r\n```\r\n\r\nCalls `syncToFirestore()` after deletion.\r\n\r\n---\r\n\r\n## `watchSchedules`\r\n\r\n```dart\r\nStream<List<Schedule>> watchSchedules(DateTime date)\r\n```\r\n\r\n**Description**: Returns the schedule list for a specific date as a stream.\r\n\r\n```dart\r\nfinal results = await db.query(\r\n  'schedules',\r\n  where: \"date LIKE ? OR (endDate IS NOT NULL AND date <= ? AND endDate >= ?)\",\r\n  whereArgs: ['$dateStr%', '$dateStr', '$dateStr'],\r\n  orderBy: 'startTime ASC',\r\n);\r\n```\r\n\r\nIncludes multi-day schedules too: condition `date <= query date <= endDate`.\r\n\r\n> **Note**: Currently yields once with `async*` and then terminates. This is a one-time query, not a real-time update.\r\n\r\n---\r\n\r\n## `getSchedulesForDateRange`\r\n\r\n```dart\r\nFuture<List<Schedule>> getSchedulesForDateRange(DateTime start, int days)\r\n```\r\n\r\nQueries schedules for `days` days starting from `start`. Runs individual queries per date.\r\n\r\n---\r\n\r\n## `syncToFirestore`\r\n\r\n```dart\r\nFuture<void> syncToFirestore()\r\n```\r\n\r\n**Description**: Syncs the entire schedule list to Firestore.\r\n\r\n```dart\r\nfinal all = await _getAllSchedules();\r\nawait FirebaseFirestore.instance\r\n    .collection('users').doc(uid)\r\n    .collection('sync').doc('schedules')\r\n    .set({\r\n  'items': all.map((s) => s.toMap()).toList(),\r\n  'updatedAt': FieldValue.serverTimestamp(),\r\n});\r\n```\r\n\r\nCalled automatically after every CRUD operation. Skipped when not logged in.\r\n\r\n---\r\n\r\n## `loadFromFirestore`\r\n\r\n```dart\r\nFuture<void> loadFromFirestore()\r\n```\r\n\r\n**Description**: Restores schedules from Firestore (only when the local DB is empty).\r\n\r\n```dart\r\nfinal existing = await db.query('schedules');\r\nif (existing.isNotEmpty) return;  // skip if local data exists\r\n```\r\n\r\nUsed for restoration on device change/reinstall. Optimized with batch inserts.\r\n","data/meal.md":"# Meal\r\n\r\n> `lib/data/meal.dart` вҖ” кёүмӢқ лҚ°мқҙн„° лӘЁлҚё (freezed)\r\n\r\n`@freezed` кё°л°ҳ л¶ҲліҖ лҚ°мқҙн„° нҒҙлһҳмҠӨ. JSON м§Ғл ¬нҷ”(`meal.g.dart`), лҸҷл“ұм„ұ/copyWith(`meal.freezed.dart`)лҠ” мҪ”л“ң мғқм„ұмңјлЎң мһҗлҸҷ мІҳлҰ¬\r\n\r\n---\r\n\r\n## н•„л“ң\r\n\r\n```dart\r\n@freezed\r\nclass Meal with _$Meal {\r\n  const factory Meal({\r\n    required String? meal,      // л©”лүҙ н…ҚмҠӨнҠё (мӨ„л°”кҝҲ кө¬л¶„). nullмқҙл©ҙ кёүмӢқ м—ҶмқҢ\r\n    required DateTime date,     // кёүмӢқ лӮ м§ң\r\n    required int mealType,      // 1=мЎ°мӢқ, 2=мӨ‘мӢқ, 3=м„қмӢқ\r\n    required String kcal,       // м№јлЎңлҰ¬ (мҳҲ: '823.4 Kcal')\r\n    @Default('') String ntrInfo, // мҳҒм–‘м •ліҙ (нғ„мҲҳнҷ”л¬ј/лӢЁл°ұм§Ҳ/м§Җл°© л“ұ, мӨ„л°”кҝҲ кө¬л¶„)\r\n  }) = _Meal;\r\n}\r\n```\r\n\r\n- `meal` н•„л“ң: NEIS API мқ‘лӢөмқҳ `DDISH_NM`м—җм„ң `<br/>`мқ„ `\\n`мңјлЎң м№ҳнҷҳн•ң кІ°кіј\r\n- `ntrInfo` н•„л“ң: `NTR_INFO`м—җм„ң лҸҷмқјн•ҳкІҢ м№ҳнҷҳ. м—Ҷмңјл©ҙ л№Ҳ л¬ёмһҗм—ҙ\r\n\r\n---\r\n\r\n## `getMealType`\r\n\r\n```dart\r\nString getMealType() {\r\n  switch (mealType) {\r\n    case 1: return 'мЎ°мӢқ';\r\n    case 2: return 'мӨ‘мӢқ';\r\n    case 3: return 'м„қмӢқ';\r\n    default: return 'мӨ‘мӢқ';\r\n  }\r\n}\r\n```\r\n\r\n`mealType` м •мҲҳлҘј н•ңкөӯм–ҙ л¬ёмһҗм—ҙлЎң ліҖнҷҳ. кёүмӢқ м№ҙл“ң UIм—җм„ң мӢқмӮ¬ мң нҳ• лқјлІЁм—җ мӮ¬мҡ©\r\n\r\n---\r\n\r\n## `toString`\r\n\r\n```dart\r\n@override\r\nString toString() => meal ?? '';\r\n```\r\n\r\n`meal`мқҙ nullмқҙл©ҙ л№Ҳ л¬ёмһҗм—ҙ. л””лІ„к·ё м¶ңл Ҙ л°Ҹ мң„м Ҝ н…ҚмҠӨнҠё л°”мқёл”©м—җ нҷңмҡ©\r\n\r\n---\r\n\r\n## JSON м§Ғл ¬нҷ”\r\n\r\n```dart\r\nfactory Meal.fromJson(Map<String, dynamic> json) => _$MealFromJson(json);\r\n```\r\n\r\n`_$MealFromJson`/`_$MealToJson`мқҖ `meal.g.dart`м—җ мһҗлҸҷ мғқм„ұ. `MealDataApi._saveToCache`/`_getFromCache`м—җм„ң SharedPreferences JSON м ҖмһҘ/ліөмӣҗм—җ мӮ¬мҡ©\r\n\r\n---\r\n\r\n## мӮ¬мҡ©мІҳ\r\n\r\n| мң„м№ҳ | мҡ©лҸ„ |\r\n|------|------|\r\n| [`MealDataApi`](../api/meal_data_api.md)`.getMeal` | API мқ‘лӢөмқ„ Meal к°қмІҙлЎң ліҖнҷҳ нӣ„ л°ҳнҷҳ |\r\n| [`MealDataApi`](../api/meal_data_api.md)`._saveToCache` | Mealмқ„ JSONмңјлЎң м§Ғл ¬нҷ”н•ҙ SharedPreferencesм—җ мәҗмӢң |\r\n| `MealScreen` | Meal.mealмқ„ мӨ„л°”кҝҲ кё°мӨҖмңјлЎң splitн•ҙ л©”лүҙ лҰ¬мҠӨнҠё н‘ңмӢң |\r\n| `WidgetService.updateMealWidget` | Meal.mealм—җм„ң м•Ңл ҲлҘҙкё° м •ліҙ м ңкұ° нӣ„ нҷҲ мң„м Ҝм—җ м „лӢ¬ |\r\n| [`DailyMealNotification`](../notification/daily_meal_notification.md) | Meal.mealмқ„ н•ң мӨ„лЎң н•©міҗ м•ҢлҰј ліёл¬ём—җ мӮ¬мҡ© |\r\n","data/meal_en.md":"# Meal\r\n\r\n> н•ңкөӯм–ҙ: [meal.md](./meal.md)\r\n\r\n> `lib/data/meal.dart` вҖ” Meal data model (freezed)\r\n\r\nImmutable data class based on `@freezed`. JSON serialization (`meal.g.dart`) and equality/copyWith (`meal.freezed.dart`) are handled automatically by code generation.\r\n\r\n---\r\n\r\n## Fields\r\n\r\n```dart\r\n@freezed\r\nclass Meal with _$Meal {\r\n  const factory Meal({\r\n    required String? meal,      // Menu text (newline-separated). null means no meal\r\n    required DateTime date,     // Meal date\r\n    required int mealType,      // 1=breakfast, 2=lunch, 3=dinner\r\n    required String kcal,       // Calories (e.g., '823.4 Kcal')\r\n    @Default('') String ntrInfo, // Nutrition info (carbs/protein/fat, newline-separated)\r\n  }) = _Meal;\r\n}\r\n```\r\n\r\n- `meal` field: Result of replacing `<br/>` with `\\n` in the `DDISH_NM` field of the NEIS API response\r\n- `ntrInfo` field: Same replacement applied to `NTR_INFO`. Empty string if missing\r\n\r\n---\r\n\r\n## `getMealType`\r\n\r\n```dart\r\nString getMealType() {\r\n  switch (mealType) {\r\n    case 1: return 'мЎ°мӢқ';\r\n    case 2: return 'мӨ‘мӢқ';\r\n    case 3: return 'м„қмӢқ';\r\n    default: return 'мӨ‘мӢқ';\r\n  }\r\n}\r\n```\r\n\r\nConverts the `mealType` integer into a Korean string. Used as the meal type label in the meal card UI.\r\n\r\n---\r\n\r\n## `toString`\r\n\r\n```dart\r\n@override\r\nString toString() => meal ?? '';\r\n```\r\n\r\nReturns an empty string when `meal` is null. Used for debug output and widget text binding.\r\n\r\n---\r\n\r\n## JSON serialization\r\n\r\n```dart\r\nfactory Meal.fromJson(Map<String, dynamic> json) => _$MealFromJson(json);\r\n```\r\n\r\n`_$MealFromJson`/`_$MealToJson` are auto-generated in `meal.g.dart`. Used by `MealDataApi._saveToCache`/`_getFromCache` for SharedPreferences JSON save/restore.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|----------|---------|\r\n| [`MealDataApi`](../api/meal_data_api.md)`.getMeal` | Converts API response into Meal objects and returns them |\r\n| [`MealDataApi`](../api/meal_data_api.md)`._saveToCache` | Serializes Meal as JSON and caches it in SharedPreferences |\r\n| `MealScreen` | Splits Meal.meal by newline to display the menu list |\r\n| `WidgetService.updateMealWidget` | Strips allergy info from Meal.meal before passing to the home widget |\r\n| [`DailyMealNotification`](../notification/daily_meal_notification.md) | Joins Meal.meal into a single line for the notification body |\r\n","data/post_repository.md":"# PostRepository\n\n> `lib/data/post_repository.dart` вҖ” кІҢмӢңнҢҗ Firestore лҚ°мқҙн„° м ‘к·ј кі„мёө\n\nкІҢмӢңкёҖВ·лҢ“кёҖВ·мӢ кі  кҙҖл Ё Firestore CRUDлҘј мӢұкёҖн„ҙмңјлЎң мӨ‘м•ҷ м§‘мӨ‘. UI мҪ”л“ңм—җм„ң Firestore м§Ғм ‘ нҳём¶ңмқ„ м ңкұ°н•ҳкі , лҚ°мқҙн„° кі„мёөмңјлЎң л¶„лҰ¬\n\n---\n\n## мӢұкёҖн„ҙ\n\n```dart\nclass PostRepository {\n  PostRepository._();\n  static final instance = PostRepository._();\n}\n```\n\n`PostRepository.instance`лЎң м ‘к·ј. GetItм—җ л“ұлЎқн•ҳм§Җ м•Ҡкі  static мӢұкёҖн„ҙ нҢЁн„ҙ мӮ¬мҡ© (кІҢмӢңнҢҗ мҪ”л“ң м „мҡ©мқҙлқј м „м—ӯ DI л¶Ҳн•„мҡ”)\n\n---\n\n## References\n\n```dart\nDocumentReference postRef(String postId)\nCollectionReference commentsRef(String postId)\n```\n\nкІҢмӢңкёҖ/лҢ“кёҖ м»¬л үм…ҳ м°ёмЎ°. `postStream`, `commentsStream`мңјлЎң мӢӨмӢңк°„ мҠӨнҠёлҰјлҸ„ м ңкіө\n\n---\n\n## Read\n\n### `baseQuery`\n\n```dart\nQuery<Map<String, dynamic>> baseQuery({String? category})\n```\n\nм№ҙн…Ңкі лҰ¬лі„ кІҢмӢңкёҖ мҝјлҰ¬. `category`к°Җ nullмқҙл©ҙ м „мІҙ, мһҲмңјл©ҙ `where('category', isEqualTo: category)` н•„н„°. `createdAt` лӮҙлҰјм°ЁмҲң\n\n### `searchPosts`\n\n```dart\nFuture<QuerySnapshot> searchPosts({required List<String> tokens, int limit = 50})\n```\n\n[n-gram нҶ нҒ°](search_tokens.md)мңјлЎң кІҖмғү. `array-contains-any` мҝјлҰ¬, кё°ліё 50кұҙ fetch\n\n### `myPostsStream` / `bookmarkedPostsStream`\n\n```dart\nStream<QuerySnapshot> myPostsStream(String uid)\nStream<QuerySnapshot> bookmarkedPostsStream(String uid)\n```\n\nлӮҙк°Җ м“ҙ кёҖ / м ҖмһҘн•ң кёҖ мҠӨнҠёлҰј. к°Ғк°Ғ мөңлҢҖ 50кұҙ, `createdAt` лӮҙлҰјм°ЁмҲң\n\n---\n\n## Create\n\n### `createPost`\n\n```dart\nFuture<DocumentReference?> createPost(Map<String, dynamic> data)\n```\n\nкІҢмӢңкёҖ мғқм„ұ. мҳӨн”„лқјмқёмқҙл©ҙ [`OfflineQueueManager`](../network/offline_queue_manager.md)м—җ м ҖмһҘн•ҳкі  `null` л°ҳнҷҳ. мҳЁлқјмқёмқҙл©ҙ `_posts.add(data)` мӢӨн–ү\n\n### `addComment`\n\n```dart\nFuture<DocumentReference?> addComment(String postId, Map<String, dynamic> commentData)\n```\n\nлҢ“кёҖ м¶”к°Җ + `commentCount` мһҗлҸҷ мҰқк°Җ (`FieldValue.increment(1)`). мҳӨн”„лқјмқёмқҙл©ҙ нҒҗм—җ м ҖмһҘн•ҳкі  `null` л°ҳнҷҳ\n\n---\n\n## Update\n\n### `toggleLike` / `toggleDislike`\n\n```dart\nFuture<void> toggleLike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\nFuture<void> toggleDislike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\n```\n\nмўӢм•„мҡ”/л№„м¶”мІң нҶ кёҖ. `ensureLikesMap`мңјлЎң legacy кёҖ нҳёнҷҳ нӣ„, `likes.$uid` + `likeCount` лҘј лӢЁмқј updateлЎң мІҳлҰ¬. мўӢм•„мҡ”вҶ”л№„м¶”мІң мғҒнҳё л°°нғҖ мІҳлҰ¬ нҸ¬н•Ё\n\n### `votePoll`\n\n```dart\nFuture<void> votePoll(String postId, String uid, int optionIndex)\n```\n\nнҲ¬н‘ң. `pollVoters.$uid` м—җ м„ нғқм§Җ мқёлҚұмҠӨ м ҖмһҘ\n\n### `pinPost` / `unpinPost`\n\n```dart\nFuture<void> pinPost(String postId)   // мөңлҢҖ 3к°ң, мҙҲкіј мӢң StateError('pin_maxed')\nFuture<void> unpinPost(String postId)\n```\n\nкіөм§Җ кі м •/н•ҙм ң. `pinPost`лҠ” нҳ„мһ¬ кі м •лҗң кёҖ мҲҳлҘј нҷ•мқён•ҳм—¬ 3к°ң мҙҲкіј мӢң `StateError` throw\n\n### `resolvePost`\n\n```dart\nFuture<void> resolvePost(String postId)\n```\n\nм§Ҳл¬ёкёҖ н•ҙкІ° мІҳлҰ¬. `isResolved: true`\n\n### `toggleBookmark`\n\n```dart\nFuture<void> toggleBookmark(String postId, String uid, bool isCurrentlyBookmarked)\n```\n\nл¶Ғл§ҲнҒ¬ нҶ кёҖ. `bookmarkedBy` л°°м—ҙм—җ uid м¶”к°Җ/м ңкұ°\n\n---\n\n## `resolveAnonymousName`\n\n```dart\nFuture<String> resolveAnonymousName(\n  String postId, String uid,\n  String authorLabel, String Function(int) anonymousNumLabel,\n)\n```\n\nмқөлӘ… лҢ“кёҖ лІҲнҳё н• лӢ№. **Firestore Transaction** мӮ¬мҡ©\n\n1. кёҖ мһ‘м„ұмһҗл©ҙ вҶ’ `authorLabel` л°ҳнҷҳ (мҳҲ: \"мқөлӘ…(кёҖм“ҙмқҙ)\")\n2. кё°мЎҙ л§Өн•‘ мһҲмңјл©ҙ вҶ’ кё°мЎҙ лІҲнҳё л°ҳнҷҳ\n3. мғҲ мӮ¬мҡ©мһҗл©ҙ вҶ’ `anonymousCount + 1` н• лӢ№, `anonymousMapping` м—…лҚ°мқҙнҠё\n\nлҸҷмӢң лҢ“кёҖ мӢң лІҲнҳё мӨ‘ліөмқ„ TransactionмңјлЎң л°©м§Җ\n\n---\n\n## Delete\n\n### `deleteComment`\n\n```dart\nFuture<void> deleteComment(String postId, String commentId)\n```\n\nлҢ“кёҖ мӮӯм ң + `commentCount` к°җмҶҢ\n\n### `deletePost`\n\n```dart\nFuture<void> deletePost(String postId)\n```\n\nкІҢмӢңкёҖ мӮӯм ң. **н•ҳмң„ лҢ“кёҖ лЁјм Җ м „л¶Җ мӮӯм ң** нӣ„ кІҢмӢңкёҖ л¬ём„ң мӮӯм ң (cascade)\n\n---\n\n## Notification\n\n### `sendNotification`\n\n```dart\nFuture<void> sendNotification({\n  required String targetUid,\n  required String type,\n  required String postId,\n  required String postTitle,\n  required String senderName,\n  required String content,\n})\n```\n\nлҢҖмғҒ мң м Җмқҳ `users/{uid}/notifications` м„ңлёҢм»¬л үм…ҳм—җ мқём•ұ м•ҢлҰј л¬ём„ң мғқм„ұ\n\n---\n\n## Admin / Utility\n\n| л©”м„ңл“ң | м„ӨлӘ… |\n|--------|------|\n| `logAdminAction(data)` | `admin_logs` м»¬л үм…ҳм—җ кҙҖлҰ¬ н–үмң„ кё°лЎқ |\n| `refreshFromServer(postId)` | кІҢмӢңкёҖ + лҢ“кёҖмқ„ м„ңлІ„м—җм„ң к°•м ң мһ¬мЎ°нҡҢ (мәҗмӢң мҡ°нҡҢ) |\n| `reportPost(...)` | `reports` м»¬л үм…ҳм—җ мӢ кі  л¬ём„ң мғқм„ұ |\n| `getPinnedCount()` | нҳ„мһ¬ кі м •лҗң кёҖ мҲҳ л°ҳнҷҳ |\n| `getPinnedPosts()` | кі м •лҗң кёҖ лӘ©лЎқ л°ҳнҷҳ |\n| `ensureLikesMap(postId)` | legacy кёҖмқҳ likes/dislikes н•„л“ңлҘј Map + int кө¬мЎ°лЎң backfill |\n\n---\n\n## мӮ¬мҡ© мң„м№ҳ\n\n- **board_screen.dart**: `baseQuery`, `searchPosts`\n- **post_detail_screen.dart**: лҢҖл¶Җл¶„мқҳ л©”м„ңл“ң (мўӢм•„мҡ”, лҢ“кёҖ, л¶Ғл§ҲнҒ¬, мӢ кі  л“ұ)\n- **write_post_screen.dart**: `createPost`, `updatePost`, `getPinnedPosts`\n- **my_posts_screen.dart**: `myPostsStream`\n- **bookmarked_posts_screen.dart**: `bookmarkedPostsStream`\n- **reports_tab.dart**: `deletePost`\n","data/post_repository_en.md":"# PostRepository\r\n\r\n> н•ңкөӯм–ҙ: [post_repository.md](./post_repository.md)\r\n\r\n> `lib/data/post_repository.dart` вҖ” Firestore data access layer for the board\r\n\r\nCentralizes Firestore CRUD for posts, comments, and reports as a singleton. Removes direct Firestore calls from UI code and isolates them in the data layer.\r\n\r\n---\r\n\r\n## Singleton\r\n\r\n```dart\r\nclass PostRepository {\r\n  PostRepository._();\r\n  static final instance = PostRepository._();\r\n}\r\n```\r\n\r\nAccessed via `PostRepository.instance`. Uses a static singleton pattern instead of GetIt registration (board code only; no need for global DI).\r\n\r\n---\r\n\r\n## References\r\n\r\n```dart\r\nDocumentReference postRef(String postId)\r\nCollectionReference commentsRef(String postId)\r\n```\r\n\r\nPost/comment collection references. `postStream` and `commentsStream` also provide real-time streams.\r\n\r\n---\r\n\r\n## Read\r\n\r\n### `baseQuery`\r\n\r\n```dart\r\nQuery<Map<String, dynamic>> baseQuery({String? category})\r\n```\r\n\r\nPer-category post query. When `category` is null, returns all posts; otherwise applies `where('category', isEqualTo: category)`. Ordered by `createdAt` descending.\r\n\r\n### `searchPosts`\r\n\r\n```dart\r\nFuture<QuerySnapshot> searchPosts({required List<String> tokens, int limit = 50})\r\n```\r\n\r\nSearches with [n-gram tokens](search_tokens.md). Uses `array-contains-any` query, fetches 50 by default.\r\n\r\n### `myPostsStream` / `bookmarkedPostsStream`\r\n\r\n```dart\r\nStream<QuerySnapshot> myPostsStream(String uid)\r\nStream<QuerySnapshot> bookmarkedPostsStream(String uid)\r\n```\r\n\r\nStreams for my posts / bookmarked posts. Each limited to 50, ordered by `createdAt` descending.\r\n\r\n---\r\n\r\n## Create\r\n\r\n### `createPost`\r\n\r\n```dart\r\nFuture<DocumentReference?> createPost(Map<String, dynamic> data)\r\n```\r\n\r\nCreates a post. When offline, saves to [`OfflineQueueManager`](../network/offline_queue_manager.md) and returns `null`. When online, runs `_posts.add(data)`.\r\n\r\n### `addComment`\r\n\r\n```dart\r\nFuture<DocumentReference?> addComment(String postId, Map<String, dynamic> commentData)\r\n```\r\n\r\nAdds a comment and automatically increments `commentCount` (`FieldValue.increment(1)`). When offline, queues it and returns `null`.\r\n\r\n---\r\n\r\n## Update\r\n\r\n### `toggleLike` / `toggleDislike`\r\n\r\n```dart\r\nFuture<void> toggleLike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\r\nFuture<void> toggleDislike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\r\n```\r\n\r\nToggles like/dislike. After `ensureLikesMap` for legacy-post compatibility, updates `likes.$uid` + `likeCount` in a single update. Includes mutual-exclusion handling between like and dislike.\r\n\r\n### `votePoll`\r\n\r\n```dart\r\nFuture<void> votePoll(String postId, String uid, int optionIndex)\r\n```\r\n\r\nCast a vote. Stores the selected option index under `pollVoters.$uid`.\r\n\r\n### `pinPost` / `unpinPost`\r\n\r\n```dart\r\nFuture<void> pinPost(String postId)   // up to 3; throws StateError('pin_maxed') when exceeded\r\nFuture<void> unpinPost(String postId)\r\n```\r\n\r\nPin/unpin announcements. `pinPost` checks the current pinned count and throws `StateError` when more than 3.\r\n\r\n### `resolvePost`\r\n\r\n```dart\r\nFuture<void> resolvePost(String postId)\r\n```\r\n\r\nMarks a question post as resolved. `isResolved: true`.\r\n\r\n### `toggleBookmark`\r\n\r\n```dart\r\nFuture<void> toggleBookmark(String postId, String uid, bool isCurrentlyBookmarked)\r\n```\r\n\r\nToggles bookmark. Adds/removes the uid to/from the `bookmarkedBy` array.\r\n\r\n---\r\n\r\n## `resolveAnonymousName`\r\n\r\n```dart\r\nFuture<String> resolveAnonymousName(\r\n  String postId, String uid,\r\n  String authorLabel, String Function(int) anonymousNumLabel,\r\n)\r\n```\r\n\r\nAllocates anonymous comment numbers. Uses a **Firestore Transaction**.\r\n\r\n1. If the caller is the post author вҶ’ returns `authorLabel` (e.g., \"Anonymous (author)\")\r\n2. If an existing mapping exists вҶ’ returns the existing number\r\n3. If it's a new user вҶ’ allocates `anonymousCount + 1` and updates `anonymousMapping`\r\n\r\nThe transaction prevents number collisions when comments are posted concurrently.\r\n\r\n---\r\n\r\n## Delete\r\n\r\n### `deleteComment`\r\n\r\n```dart\r\nFuture<void> deleteComment(String postId, String commentId)\r\n```\r\n\r\nDeletes a comment and decrements `commentCount`.\r\n\r\n### `deletePost`\r\n\r\n```dart\r\nFuture<void> deletePost(String postId)\r\n```\r\n\r\nDeletes a post. **Deletes all child comments first**, then deletes the post document (cascade).\r\n\r\n---\r\n\r\n## Notification\r\n\r\n### `sendNotification`\r\n\r\n```dart\r\nFuture<void> sendNotification({\r\n  required String targetUid,\r\n  required String type,\r\n  required String postId,\r\n  required String postTitle,\r\n  required String senderName,\r\n  required String content,\r\n})\r\n```\r\n\r\nCreates an in-app notification document in the target user's `users/{uid}/notifications` subcollection.\r\n\r\n---\r\n\r\n## Admin / Utility\r\n\r\n| Method | Description |\r\n|--------|-------------|\r\n| `logAdminAction(data)` | Records admin actions in the `admin_logs` collection |\r\n| `refreshFromServer(postId)` | Force-refetches the post + comments from the server (bypassing cache) |\r\n| `reportPost(...)` | Creates a report document in the `reports` collection |\r\n| `getPinnedCount()` | Returns the current pinned post count |\r\n| `getPinnedPosts()` | Returns the list of pinned posts |\r\n| `ensureLikesMap(postId)` | Backfills legacy posts' likes/dislikes fields into the Map + int structure |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n- **board_screen.dart**: `baseQuery`, `searchPosts`\r\n- **post_detail_screen.dart**: most methods (like, comment, bookmark, report, etc.)\r\n- **write_post_screen.dart**: `createPost`, `updatePost`, `getPinnedPosts`\r\n- **my_posts_screen.dart**: `myPostsStream`\r\n- **bookmarked_posts_screen.dart**: `bookmarkedPostsStream`\r\n- **reports_tab.dart**: `deletePost`\r\n","data/schedule_data.md":"# Schedule\r\n\r\n> `lib/data/schedule_data.dart` вҖ” к°ңмқёмқјм • лҚ°мқҙн„° лӘЁлҚё\r\n\r\nSQLite `schedules` н…Ңмқҙлё”кіј 1:1 л§Өн•‘лҗҳлҠ” мҲңмҲҳ Dart нҒҙлһҳмҠӨ. freezedлҘј мӮ¬мҡ©н•ҳм§Җ м•Ҡкі  мҲҳлҸҷ `toMap`/`fromMap` м ңкіө\r\n\r\n---\r\n\r\n## н•„л“ң\r\n\r\n```dart\r\nclass Schedule {\r\n  final int? id;          // SQLite auto-increment PK. мғҲ мқјм •мқҖ null\r\n  final int startTime;    // мӢңмһ‘ мӢңк°„ (0~23, мӢң лӢЁмң„)\r\n  final int endTime;      // мў…лЈҢ мӢңк°„ (0~23, мӢң лӢЁмң„)\r\n  final String content;   // мқјм • лӮҙмҡ©\r\n  final String date;      // мӢңмһ‘ лӮ м§ң ('2026-04-10' нҳ•мӢқ)\r\n  final String? endDate;  // мў…лЈҢ лӮ м§ң (м—°мҶҚмқјм •мҡ©. nullмқҙл©ҙ н•ҳлЈЁмқјм •)\r\n  final int color;        // 0xFFRRGGBB нҳ•нғң. кё°ліёк°’ 0xFF3F72AF (нҢҢлһҖмғү)\r\n}\r\n```\r\n\r\n- `startTime`/`endTime`: мӢң(hour) лӢЁмң„ м •мҲҳ. мҳҲ: 9мӢң~12мӢң вҶ’ `startTime: 9, endTime: 12`\r\n- `endDate`: v2 мҠӨнӮӨл§Ҳм—җм„ң м¶”к°Җ. м—¬лҹ¬ лӮ м—җ кұём№ҳлҠ” мқјм • м§Җмӣҗ\r\n- `color`: мӮ¬мҡ©мһҗк°Җ мәҳлҰ°лҚ”м—җм„ң м„ нғқн•ң мғүмғҒ. кё°ліёк°’мқҖ м•ұ primaryColor\r\n\r\n---\r\n\r\n## `toMap`\r\n\r\n```dart\r\nMap<String, dynamic> toMap() => {\r\n  if (id != null) 'id': id,\r\n  'startTime': startTime,\r\n  'endTime': endTime,\r\n  'content': content,\r\n  'date': date,\r\n  'endDate': endDate,\r\n  'color': color,\r\n};\r\n```\r\n\r\nSQLite мӮҪмһ…мҡ©. `id`к°Җ nullмқҙл©ҙ л§өм—җм„ң м ңмҷё вҶ’ auto-incrementлЎң мһҗлҸҷ мғқм„ұ\r\n\r\n---\r\n\r\n## `fromMap`\r\n\r\n```dart\r\nfactory Schedule.fromMap(Map<String, dynamic> map) => Schedule(\r\n  id: map['id'] as int?,\r\n  startTime: map['startTime'] as int,\r\n  endTime: map['endTime'] as int,\r\n  content: map['content'] as String,\r\n  date: map['date'] as String,\r\n  endDate: map['endDate'] as String?,\r\n  color: map['color'] as int? ?? 0xFF3F72AF,\r\n);\r\n```\r\n\r\nSQLite мҝјлҰ¬ кІ°кіјм—җм„ң Schedule к°қмІҙ мғқм„ұ. `color`к°Җ null(v1 лҚ°мқҙн„°)мқҙл©ҙ кё°ліё нҢҢлһҖмғү\r\n\r\n---\r\n\r\n## мӮ¬мҡ©мІҳ\r\n\r\n| мң„м№ҳ | мҡ©лҸ„ |\r\n|------|------|\r\n| `LocalDataBase.insertSchedule` | Schedule вҶ’ toMap вҶ’ SQLite insert |\r\n| `LocalDataBase.watchSchedules` | SQLite row вҶ’ fromMap вҶ’ Schedule лҰ¬мҠӨнҠё |\r\n| `LocalDataBase.syncToFirestore` | Schedule вҶ’ toMap вҶ’ Firestore лҸҷкё°нҷ” |\r\n| `ScheduleBottomSheet` | мӮ¬мҡ©мһҗ мһ…л ҘмңјлЎң Schedule к°қмІҙ мғқм„ұ |\r\n| `ScheduleCard` | Schedule н•„л“ңлҘј мәҳлҰ°лҚ” м№ҙл“ңм—җ н‘ңмӢң |\r\n","data/schedule_data_en.md":"# Schedule\r\n\r\n> н•ңкөӯм–ҙ: [schedule_data.md](./schedule_data.md)\r\n\r\n> `lib/data/schedule_data.dart` вҖ” Personal schedule data model\r\n\r\nA plain Dart class mapped 1:1 to the SQLite `schedules` table. Does not use freezed; provides hand-written `toMap`/`fromMap`.\r\n\r\n---\r\n\r\n## Fields\r\n\r\n```dart\r\nclass Schedule {\r\n  final int? id;          // SQLite auto-increment PK. null for new schedules\r\n  final int startTime;    // Start hour (0вҖ“23)\r\n  final int endTime;      // End hour (0вҖ“23)\r\n  final String content;   // Schedule content\r\n  final String date;      // Start date (format '2026-04-10')\r\n  final String? endDate;  // End date (for multi-day schedules; null means single day)\r\n  final int color;        // 0xFFRRGGBB format. Default 0xFF3F72AF (blue)\r\n}\r\n```\r\n\r\n- `startTime`/`endTime`: Integer hour values. Example: 9:00вҖ“12:00 вҶ’ `startTime: 9, endTime: 12`\r\n- `endDate`: Added in schema v2. Supports schedules spanning multiple days\r\n- `color`: Color chosen by the user in the calendar. Defaults to the app's primaryColor\r\n\r\n---\r\n\r\n## `toMap`\r\n\r\n```dart\r\nMap<String, dynamic> toMap() => {\r\n  if (id != null) 'id': id,\r\n  'startTime': startTime,\r\n  'endTime': endTime,\r\n  'content': content,\r\n  'date': date,\r\n  'endDate': endDate,\r\n  'color': color,\r\n};\r\n```\r\n\r\nUsed for SQLite inserts. When `id` is null, it is excluded from the map so auto-increment can generate it.\r\n\r\n---\r\n\r\n## `fromMap`\r\n\r\n```dart\r\nfactory Schedule.fromMap(Map<String, dynamic> map) => Schedule(\r\n  id: map['id'] as int?,\r\n  startTime: map['startTime'] as int,\r\n  endTime: map['endTime'] as int,\r\n  content: map['content'] as String,\r\n  date: map['date'] as String,\r\n  endDate: map['endDate'] as String?,\r\n  color: map['color'] as int? ?? 0xFF3F72AF,\r\n);\r\n```\r\n\r\nCreates a Schedule object from a SQLite query result. When `color` is null (v1 data), defaults to blue.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|----------|---------|\r\n| `LocalDataBase.insertSchedule` | Schedule вҶ’ toMap вҶ’ SQLite insert |\r\n| `LocalDataBase.watchSchedules` | SQLite row вҶ’ fromMap вҶ’ Schedule list |\r\n| `LocalDataBase.syncToFirestore` | Schedule вҶ’ toMap вҶ’ Firestore sync |\r\n| `ScheduleBottomSheet` | Creates Schedule objects from user input |\r\n| `ScheduleCard` | Displays Schedule fields on calendar cards |\r\n","data/search_history_service.md":"# SearchHistoryService\r\n\r\n> `lib/data/search_history_service.dart` вҖ” кІҖмғү кё°лЎқ (мөңлҢҖ 10к°ң)\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. SharedPreferencesм—җ JSON л°°м—ҙлЎң м ҖмһҘ. лЎңм»¬ м „мҡ© (Firestore лҸҷкё°нҷ” м—ҶмқҢ)\r\n\r\n---\r\n\r\n## `load`\r\n\r\n```dart\r\nstatic Future<List<String>> load()\r\n```\r\n\r\n**м„ӨлӘ…**: м ҖмһҘлҗң кІҖмғү кё°лЎқмқ„ лЎңл“ңн•Ё\r\n\r\n```dart\r\nfinal raw = prefs.getString(_key);  // 'board_search_history'\r\nfinal decoded = jsonDecode(raw);\r\nreturn decoded.whereType<String>().toList();\r\n```\r\n\r\nнҢҢмӢұ мӢӨнҢЁ мӢң л№Ҳ лҰ¬мҠӨнҠё л°ҳнҷҳ (silent fail)\r\n\r\n---\r\n\r\n## `add`\r\n\r\n```dart\r\nstatic Future<void> add(String query)\r\n```\r\n\r\n**м„ӨлӘ…**: кІҖмғүм–ҙлҘј кё°лЎқм—җ м¶”к°Җн•Ё. мӨ‘ліө м ңкұ° + FIFO\r\n\r\n```dart\r\nfinal trimmed = query.trim();\r\nif (trimmed.isEmpty) return;\r\ncurrent.removeWhere((e) => e == trimmed);  // кё°мЎҙ мӨ‘ліө м ңкұ°\r\ncurrent.insert(0, trimmed);                // л§Ё м•һм—җ м¶”к°Җ\r\nfinal capped = current.take(_maxEntries).toList();  // мөңлҢҖ 10к°ң\r\n```\r\n\r\nк°ҷмқҖ кІҖмғүм–ҙлҘј лӢӨмӢң мһ…л Ҙн•ҳл©ҙ л§Ё м•һмңјлЎң мқҙлҸҷ\r\n\r\n---\r\n\r\n## `remove`\r\n\r\n```dart\r\nstatic Future<void> remove(String query)\r\n```\r\n\r\nнҠ№м • кІҖмғүм–ҙ н•ң к°ңлҘј кё°лЎқм—җм„ң мӮӯм ң\r\n\r\n---\r\n\r\n## `clear`\r\n\r\n```dart\r\nstatic Future<void> clear()\r\n```\r\n\r\nкІҖмғү кё°лЎқ м „мІҙ мӮӯм ң. `prefs.remove(_key)`\r\n","data/search_history_service_en.md":"# SearchHistoryService\r\n\r\n> н•ңкөӯм–ҙ: [search_history_service.md](./search_history_service.md)\r\n\r\n> `lib/data/search_history_service.dart` вҖ” Search history (max 10 entries)\r\n\r\nAll methods are `static`. Stored as a JSON array in SharedPreferences. Local only (no Firestore sync).\r\n\r\n---\r\n\r\n## `load`\r\n\r\n```dart\r\nstatic Future<List<String>> load()\r\n```\r\n\r\n**Description**: Loads the saved search history.\r\n\r\n```dart\r\nfinal raw = prefs.getString(_key);  // 'board_search_history'\r\nfinal decoded = jsonDecode(raw);\r\nreturn decoded.whereType<String>().toList();\r\n```\r\n\r\nReturns an empty list on parse failure (silent fail).\r\n\r\n---\r\n\r\n## `add`\r\n\r\n```dart\r\nstatic Future<void> add(String query)\r\n```\r\n\r\n**Description**: Adds a query to history. Deduplicates + FIFO.\r\n\r\n```dart\r\nfinal trimmed = query.trim();\r\nif (trimmed.isEmpty) return;\r\ncurrent.removeWhere((e) => e == trimmed);  // remove existing duplicate\r\ncurrent.insert(0, trimmed);                // insert at the front\r\nfinal capped = current.take(_maxEntries).toList();  // up to 10\r\n```\r\n\r\nRe-entering the same query moves it to the front.\r\n\r\n---\r\n\r\n## `remove`\r\n\r\n```dart\r\nstatic Future<void> remove(String query)\r\n```\r\n\r\nRemoves a single query from history.\r\n\r\n---\r\n\r\n## `clear`\r\n\r\n```dart\r\nstatic Future<void> clear()\r\n```\r\n\r\nDeletes the entire search history. `prefs.remove(_key)`.\r\n","data/search_tokens.md":"# SearchTokens\r\n\r\n> `lib/data/search_tokens.dart` вҖ” н•ңкөӯм–ҙ 2-gram нҶ нҒ°нҷ”\r\n\r\nFirestoreлҠ” LIKE/full-text кІҖмғүмқҙ м—ҶмңјлҜҖлЎң, кёҖ мһ‘м„ұ мӢң м ңлӘ©+ліёл¬ёмқ„ 2-gramмңјлЎң л¶„н•ҙн•ҙ `searchTokens` л°°м—ҙм—җ м ҖмһҘн•ҳкі , кІҖмғү мӢң `array-contains-any` мҝјлҰ¬лЎң л§Өм№ӯн•Ё\r\n\r\nмҳҲ) `\"кё°л§җкі мӮ¬ мқјм •\"` вҶ’ `['кё°л§җ', 'л§җкі ', 'кі мӮ¬', 'мқјм •']`\r\n\r\n---\r\n\r\n## `forDocument`\r\n\r\n```dart\r\nstatic List<String> forDocument(String title, String content, {int maxTokens = 200})\r\n```\r\n\r\n**м„ӨлӘ…**: кёҖ м ҖмһҘ мӢң мӮ¬мҡ©. м ңлӘ©+ліёл¬ёмқ„ н•©міҗ 2-gram нҶ нҒ°мқ„ мғқм„ұн•Ё\r\n\r\n```dart\r\nfinal combined = '$title $content';\r\nfinal tokens = _ngrams(combined);\r\nif (tokens.length <= maxTokens) return tokens.toList();\r\nreturn tokens.take(maxTokens).toList();\r\n```\r\n\r\n- SetмңјлЎң мһҗлҸҷ мӨ‘ліө м ңкұ°\r\n- **maxTokens = 200**: Firestore л°°м—ҙ нҒ¬кё° + м ҖмһҘ л№„мҡ© м ңн•ң\r\n\r\n---\r\n\r\n## `forQuery`\r\n\r\n```dart\r\nstatic List<String> forQuery(String query, {int maxTokens = 10})\r\n```\r\n\r\n**м„ӨлӘ…**: кІҖмғү мӢң мӮ¬мҡ©. мӮ¬мҡ©мһҗ мҝјлҰ¬м—җм„ң 2-gramмқ„ м¶”м¶ңн•Ё\r\n\r\n```dart\r\nfinal cleaned = _normalize(query);\r\nif (cleaned.length == 1) return [cleaned];  // 1кёҖмһҗлҠ” к·ёлҢҖлЎң л°ҳнҷҳ\r\nfinal tokens = _ngrams(query);\r\nreturn tokens.take(maxTokens).toList();\r\n```\r\n\r\n- **maxTokens = 10**: Firestore `array-contains-any` н•ңкі„лҠ” 30мқҙм§Җл§Ң 10к°ңл©ҙ м¶©л¶„\r\n- 1кёҖмһҗ мҝјлҰ¬лҠ” 2-gram мғқм„ұ л¶Ҳк°Җ вҶ’ 1-gram н•ң к°ң л°ҳнҷҳ (кІ°кіј м—ҶмқҢ к°ҖлҠҘ)\r\n\r\n---\r\n\r\n## `_ngrams`\r\n\r\n```dart\r\nstatic Set<String> _ngrams(String text)\r\n```\r\n\r\n**м„ӨлӘ…**: м •к·ңнҷ”лҗң н…ҚмҠӨнҠём—җм„ң м—°мҶҚ 2кёҖмһҗ мЎ°н•©(sliding window)мқ„ SetмңјлЎң мғқм„ұн•Ё\r\n\r\n```dart\r\nfinal cleaned = _normalize(text);\r\nfor (int i = 0; i + 2 <= cleaned.length; i++) {\r\n  out.add(cleaned.substring(i, i + 2));\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_normalize`\r\n\r\n```dart\r\nstatic String _normalize(String text)\r\n```\r\n\r\n**м„ӨлӘ…**: н…ҚмҠӨнҠёлҘј кІҖмғүмҡ©мңјлЎң м •к·ңнҷ”н•Ё\r\n\r\n1. мҶҢл¬ёмһҗ ліҖнҷҳ: `text.toLowerCase()`\r\n2. н—Ҳмҡ© л¬ёмһҗл§Ң лӮЁкё°кі  лӮҳлЁём§Җ м ңкұ°:\r\n   - `0x30~0x39`: мҲ«мһҗ (0-9)\r\n   - `0x61~0x7A`: мҳҒмҶҢл¬ёмһҗ (a-z)\r\n   - `0xAC00~0xD7A3`: н•ңкёҖ мқҢм Ҳ (к°Җ~нһЈ)\r\n3. кіөл°ұ, кё°нҳё, н•ңмһҗ, мқҙлӘЁм§Җ л“ұ лӘЁл‘җ м ңкұ°\r\n\r\n```dart\r\nfor (final r in lower.runes) {\r\n  if (r >= 0x30 && r <= 0x39) { buf.writeCharCode(r); continue; }\r\n  if (r >= 0x61 && r <= 0x7A) { buf.writeCharCode(r); continue; }\r\n  if (r >= 0xAC00 && r <= 0xD7A3) { buf.writeCharCode(r); continue; }\r\n}\r\n```\r\n","data/search_tokens_en.md":"# SearchTokens\r\n\r\n> н•ңкөӯм–ҙ: [search_tokens.md](./search_tokens.md)\r\n\r\n> `lib/data/search_tokens.dart` вҖ” Korean 2-gram tokenization\r\n\r\nFirestore has no LIKE/full-text search, so when a post is created, its title + body are broken into 2-grams and stored in the `searchTokens` array; on search, an `array-contains-any` query matches against them.\r\n\r\nEx
