<script>
const MD_DATA = {"api/meal_data_api.md":"# MealDataApi\r\n\r\n> `lib/api/meal_data_api.dart` вҖ” NEIS кёүмӢқ API м—°лҸҷ\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. NEIS көҗмңЎм •ліҙ APIм—җм„ң кёүмӢқ лҚ°мқҙн„°лҘј мЎ°нҡҢн•ҳкі , SharedPreferencesм—җ мәҗмӢұн•Ё.\r\nHTTP нҒҙлқјмқҙм–ёнҠёлҠ” `@visibleForTesting` setterлЎң көҗмІҙ к°ҖлҠҘн•ҳм—¬ MockClient кё°л°ҳ лӢЁмң„ н…ҢмҠӨнҠёлҘј м§Җмӣҗн•Ё\r\n\r\n---\r\n\r\n## мғҒмҲҳ\r\n\r\n| мғҒмҲҳ | к°’ | м„ӨлӘ… |\r\n|------|----|------|\r\n| `BREAKFAST` | 1 | мЎ°мӢқ мҪ”л“ң |\r\n| `LUNCH` | 2 | мӨ‘мӢқ мҪ”л“ң |\r\n| `DINNER` | 3 | м„қмӢқ мҪ”л“ң |\r\n\r\n---\r\n\r\n## `getMeal`\r\n\r\n```dart\r\nstatic Future<Meal?> getMeal({\r\n  required DateTime date,\r\n  required int mealType,\r\n  required String type,\r\n})\r\n```\r\n\r\n**м„ӨлӘ…**: нҠ№м • лӮ м§ңВ·мӢқмӮ¬ мң нҳ•мқҳ кёүмӢқ лҚ°мқҙн„°лҘј л°ҳнҷҳн•Ё\r\n\r\n**нқҗлҰ„**:\r\n\r\n1. мәҗмӢң нӮӨлҘј мғқм„ұн•Ё:\r\n   ```dart\r\n   final cacheKey = _cacheKey(date, mealType);\r\n   // вҶ’ \"meal_20260410_2\" нҳ•нғң\r\n   ```\r\n\r\n2. SharedPreferencesм—җм„ң мәҗмӢңлҘј мЎ°нҡҢ. мң нҡЁн•ң лҚ°мқҙн„°л©ҙ мҰүмӢң л°ҳнҷҳ:\r\n   ```dart\r\n   final cached = _getFromCache(prefs, cacheKey);\r\n   if (cached != null && cached.meal != null && cached.meal != 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.') {\r\n     return cached;\r\n   }\r\n   ```\r\n\r\n3. мҳӨн”„лқјмқёмқҙл©ҙ мәҗмӢң лҚ°мқҙн„° лҳҗлҠ” м•ҲлӮҙ л©”мӢңм§Җ л°ҳнҷҳ:\r\n   ```dart\r\n   if (await NetworkStatus.isUnconnected()) {\r\n     if (cached != null) return cached;\r\n     return Meal(meal: \"мӢқлӢЁ м •ліҙлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”\", ...);\r\n   }\r\n   ```\r\n\r\n4. мӣ”к°„ н”„лҰ¬нҺҳм№ҳлҘј мӢңлҸ„н•ҙ н•ҙлӢ№ мӣ” м „мІҙ кёүмӢқмқ„ н•ң лІҲм—җ мәҗмӢұ:\r\n   ```dart\r\n   await _prefetchMonth(date);\r\n   ```\r\n\r\n5. н”„лҰ¬нҺҳм№ҳ нӣ„ мәҗмӢң мһ¬нҷ•мқё. мһҲмңјл©ҙ л°ҳнҷҳ, м—Ҷмңјл©ҙ к°ңлі„ мҡ”мІӯ:\r\n   ```dart\r\n   final afterPrefetch = _getFromCache(prefs, cacheKey);\r\n   if (afterPrefetch != null) return afterPrefetch;\r\n   return _fetchSingleMeal(date, mealType, prefs, cacheKey);\r\n   ```\r\n\r\n**л°ҳнҷҳк°’**: `Meal?` вҖ” кёүмӢқ лҚ°мқҙн„°. м—Ҷмңјл©ҙ `meal: 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.'`\r\n\r\n---\r\n\r\n## `_fetchSingleMeal`\r\n\r\n```dart\r\nstatic Future<Meal> _fetchSingleMeal(\r\n  DateTime date, int mealType, SharedPreferences prefs, String cacheKey)\r\n```\r\n\r\n**м„ӨлӘ…**: лӢЁмқј лӮ м§ңВ·мӢқмӮ¬мқҳ кёүмӢқмқ„ NEIS APIлЎң м§Ғм ‘ мҡ”мІӯн•Ё\r\n\r\n1. NEIS API URLмқ„ кө¬м„ұ:\r\n   ```dart\r\n   final requestURL = 'https://open.neis.go.kr/hub/mealServiceDietInfo?...'\r\n       '&MMEAL_SC_CODE=$mealType'\r\n       '&MLSV_YMD=$formattedDate';\r\n   ```\r\n\r\n2. `_fetchData`лЎң HTTP GET мҡ”мІӯ:\r\n   ```dart\r\n   final data = await _fetchData(requestURL);\r\n   ```\r\n\r\n3. мқ‘лӢөмқҳ `mealServiceDietInfo > row`лҘј нҢҢмӢұ:\r\n   ```dart\r\n   meal: (row['DDISH_NM'] as String).replaceAll('<br/>', '\\n'),\r\n   kcal: row['CAL_INFO'] as String,\r\n   ntrInfo: (row['NTR_INFO'] as String?)?.replaceAll('<br/>', '\\n') ?? '',\r\n   ```\r\n   `<br/>` нғңк·ёлҘј мӨ„л°”кҝҲмңјлЎң м№ҳнҷҳ\r\n\r\n4. кІ°кіјлҘј мәҗмӢңм—җ м ҖмһҘ нӣ„ л°ҳнҷҳ. лҚ°мқҙн„° м—Ҷмңјл©ҙ 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.' л°ҳнҷҳ\r\n\r\n---\r\n\r\n## `_prefetchMonth`\r\n\r\n```dart\r\nstatic Future<void> _prefetchMonth(DateTime date)\r\n```\r\n\r\n**м„ӨлӘ…**: н•ҙлӢ№ мӣ”мқҳ м „мІҙ кёүмӢқмқ„ н•ң лІҲмқҳ API нҳём¶ңлЎң н”„лҰ¬нҺҳм№ҳн•Ё\r\n\r\n1. к°ҷмқҖ мӣ”мқҙ мқҙлҜё н”„лҰ¬нҺҳм№ҳ мӨ‘мқҙл©ҙ к·ё FutureлҘј лҢҖкё°:\r\n   ```dart\r\n   if (_prefetchingMonths.containsKey(monthKey)) {\r\n     await _prefetchingMonths[monthKey];\r\n     return;\r\n   }\r\n   ```\r\n   `Completer`лЎң мӨ‘ліө мҡ”мІӯ л°©м§Җ\r\n\r\n2. мӣ”мқҳ мІ«лӮ ~л§Ҳм§Җл§үлӮ  лІ”мң„лЎң API нҳём¶ң:\r\n   ```dart\r\n   '&MLSV_FROM_YMD=$fromDate'\r\n   '&MLSV_TO_YMD=$toDate'\r\n   '&pSize=100'\r\n   ```\r\n\r\n3. мқ‘лӢөмқҳ лӘЁл“  rowлҘј к°ңлі„ мәҗмӢң нӮӨлЎң м ҖмһҘ:\r\n   ```dart\r\n   final key = _cacheKey(mealDate, mealCode);\r\n   _saveToCache(prefs, key, meal);\r\n   ```\r\n\r\n4. `finally`м—җм„ң `_prefetchingMonths` л§өм—җм„ң м ңкұ°\r\n\r\n---\r\n\r\n## `prefetchWeek`\r\n\r\n```dart\r\nstatic Future<void> prefetchWeek(DateTime baseDate)\r\n```\r\n\r\n**м„ӨлӘ…**: мЈјк°„ л·° м§„мһ… мӢң н•ҙлӢ№ мЈјмқҳ кёүмӢқмқ„ н”„лҰ¬нҺҳм№ҳн•Ё\r\n\r\n- мӣ”~кёҲмқҙ к°ҷмқҖ лӢ¬мқҙл©ҙ `_prefetchMonth` 1нҡҢ\r\n- лӢ¬мқҙ кұём№ҳл©ҙ 2к°ңмӣ” лі‘л ¬ н”„лҰ¬нҺҳм№ҳ:\r\n  ```dart\r\n  await Future.wait([_prefetchMonth(monday), _prefetchMonth(friday)]);\r\n  ```\r\n\r\n---\r\n\r\n## `_getFromCache`\r\n\r\n```dart\r\nstatic Meal? _getFromCache(SharedPreferences prefs, String key)\r\n```\r\n\r\n**м„ӨлӘ…**: мәҗмӢңм—җм„ң кёүмӢқ лҚ°мқҙн„°лҘј мқҪлҗҳ, л§ҢлЈҢлҗң лҚ°мқҙн„°лҠ” null л°ҳнҷҳн•Ё\r\n\r\n**мәҗмӢң м „лһө (м°Ёл“ұ TTL)**:\r\n- м •мғҒ кёүмӢқ лҚ°мқҙн„° вҶ’ **24мӢңк°„** мәҗмӢң\r\n- 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.' вҶ’ **5л¶„** мәҗмӢң (кі§ л“ұлЎқлҗ  мҲҳ мһҲмңјлҜҖлЎң)\r\n\r\n```dart\r\nif (meal.meal == 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.') {\r\n  if (age > 5 * 60 * 1000) return null;   // 5л¶„ нӣ„ л§ҢлЈҢ\r\n} else {\r\n  if (age > 24 * 60 * 60 * 1000) return null;  // 24мӢңк°„ нӣ„ л§ҢлЈҢ\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_saveToCache`\r\n\r\n```dart\r\nstatic void _saveToCache(SharedPreferences prefs, String key, Meal meal)\r\n```\r\n\r\n[Meal](../data/meal.md) JSON + нғҖмһ„мҠӨнғ¬н”„лҘј SharedPreferencesм—җ м ҖмһҘ\r\n\r\n---\r\n\r\n## `clearCacheForDate`\r\n\r\n```dart\r\nstatic Future<void> clearCacheForDate(DateTime date)\r\n```\r\n\r\nнҠ№м • лӮ м§ңмқҳ мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ мәҗмӢңлҘј лӘЁл‘җ мӮӯм ңн•Ё\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\n**м„ӨлӘ…**: `_client`лҘј нҶөн•ҙ HTTP GET мҡ”мІӯмқ„ мҲҳн–үн•Ё\r\n\r\n- **нғҖмһ„м•„мӣғ**: 10мҙҲ\r\n- NEIS `INFO-200` (лҚ°мқҙн„° м—ҶмқҢ) мқ‘лӢөмқҖ м •мғҒ л°ҳнҷҳ (л№Ҳ лҚ°мқҙн„°)\r\n- м—җлҹ¬/нғҖмһ„м•„мӣғ мӢң `NetworkException` throw (нҳём¶ңмёЎм—җм„ң мәҗмӢң fallback мІҳлҰ¬)\r\n\r\n---\r\n\r\n## н…ҢмҠӨнҠё м§Җмӣҗ\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n\r\n@visibleForTesting\r\nstatic Future<void> resetCache() async { ... }\r\n```\r\n\r\n- `client` setterлЎң `MockClient` мЈјмһ… вҶ’ л„ӨнҠёмӣҢнҒ¬ м—Ҷмқҙ нҢҢмӢұВ·мәҗмӢңВ·SWR лЎңм§Ғ н…ҢмҠӨнҠё\r\n- `resetCache()`лЎң `_prefetchingMonths` + SharedPreferences мҙҲкё°нҷ”\r\n\r\n---\r\n\r\n## `isAllMealEmpty`\r\n\r\n```dart\r\nstatic Future<bool> isAllMealEmpty(DateTime date)\r\n```\r\n\r\n**м„ӨлӘ…**: нҠ№м • лӮ м§ңм—җ кёүмӢқмқҙ н•ҳлӮҳлҸ„ м—ҶлҠ”м§Җ нҷ•мқён•Ё\r\nNEIS `INFO-200` мқ‘лӢөмқҙл©ҙ `true` (кёүмӢқ м—ҶмқҢ)\r\nнҷҲ мң„м Ҝм—җм„ң \"кёүмӢқ м—ҶмқҢ\" н‘ңмӢң м—¬л¶Җ нҢҗлӢЁм—җ мӮ¬мҡ©\r\n","api/meal_data_api_en.md":"# MealDataApi\r\n\r\n> н•ңкөӯм–ҙ: [meal_data_api.md](./meal_data_api.md)\r\n>\r\n> `lib/api/meal_data_api.dart` вҖ” NEIS meal API integration\r\n\r\nAll methods are `static`. Queries meal data from the NEIS education information API and caches it in SharedPreferences.\r\nThe HTTP client can be replaced through a `@visibleForTesting` setter, enabling MockClient-based unit tests.\r\n\r\n---\r\n\r\n## Constants\r\n\r\n| Constant | Value | Description |\r\n|------|----|------|\r\n| `BREAKFAST` | 1 | Breakfast code |\r\n| `LUNCH` | 2 | Lunch code |\r\n| `DINNER` | 3 | Dinner code |\r\n\r\n---\r\n\r\n## `getMeal`\r\n\r\n```dart\r\nstatic Future<Meal?> getMeal({\r\n  required DateTime date,\r\n  required int mealType,\r\n  required String type,\r\n})\r\n```\r\n\r\n**Description**: Returns the meal data for a specific date and meal type.\r\n\r\n**Flow**:\r\n\r\n1. Build the cache key:\r\n   ```dart\r\n   final cacheKey = _cacheKey(date, mealType);\r\n   // вҶ’ \"meal_20260410_2\" нҳ•нғң\r\n   ```\r\n\r\n2. Look up SharedPreferences. Return immediately if valid:\r\n   ```dart\r\n   final cached = _getFromCache(prefs, cacheKey);\r\n   if (cached != null && cached.meal != null && cached.meal != 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.') {\r\n     return cached;\r\n   }\r\n   ```\r\n\r\n3. If offline, return cached data or a guidance message:\r\n   ```dart\r\n   if (await NetworkStatus.isUnconnected()) {\r\n     if (cached != null) return cached;\r\n     return Meal(meal: \"мӢқлӢЁ м •ліҙлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”\", ...);\r\n   }\r\n   ```\r\n\r\n4. Attempt a monthly prefetch to cache the entire month's meals in one go:\r\n   ```dart\r\n   await _prefetchMonth(date);\r\n   ```\r\n\r\n5. Re-check the cache after prefetching. Return it if present; otherwise, fetch individually:\r\n   ```dart\r\n   final afterPrefetch = _getFromCache(prefs, cacheKey);\r\n   if (afterPrefetch != null) return afterPrefetch;\r\n   return _fetchSingleMeal(date, mealType, prefs, cacheKey);\r\n   ```\r\n\r\n**Return value**: `Meal?` вҖ” meal data. When absent, `meal: 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.'`\r\n\r\n---\r\n\r\n## `_fetchSingleMeal`\r\n\r\n```dart\r\nstatic Future<Meal> _fetchSingleMeal(\r\n  DateTime date, int mealType, SharedPreferences prefs, String cacheKey)\r\n```\r\n\r\n**Description**: Directly requests a single day's meal via the NEIS API.\r\n\r\n1. Build the NEIS API URL:\r\n   ```dart\r\n   final requestURL = 'https://open.neis.go.kr/hub/mealServiceDietInfo?...'\r\n       '&MMEAL_SC_CODE=$mealType'\r\n       '&MLSV_YMD=$formattedDate';\r\n   ```\r\n\r\n2. HTTP GET request via `_fetchData`:\r\n   ```dart\r\n   final data = await _fetchData(requestURL);\r\n   ```\r\n\r\n3. Parse `mealServiceDietInfo > row` from the response:\r\n   ```dart\r\n   meal: (row['DDISH_NM'] as String).replaceAll('<br/>', '\\n'),\r\n   kcal: row['CAL_INFO'] as String,\r\n   ntrInfo: (row['NTR_INFO'] as String?)?.replaceAll('<br/>', '\\n') ?? '',\r\n   ```\r\n   `<br/>` tags are replaced with newlines.\r\n\r\n4. Save the result to cache and return. If no data is found, returns 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.'\r\n\r\n---\r\n\r\n## `_prefetchMonth`\r\n\r\n```dart\r\nstatic Future<void> _prefetchMonth(DateTime date)\r\n```\r\n\r\n**Description**: Prefetches the entire month's meals in a single API call.\r\n\r\n1. If the same month is already being prefetched, await that Future:\r\n   ```dart\r\n   if (_prefetchingMonths.containsKey(monthKey)) {\r\n     await _prefetchingMonths[monthKey];\r\n     return;\r\n   }\r\n   ```\r\n   Uses a `Completer` to prevent duplicate requests.\r\n\r\n2. Call the API with the first to last day of the month:\r\n   ```dart\r\n   '&MLSV_FROM_YMD=$fromDate'\r\n   '&MLSV_TO_YMD=$toDate'\r\n   '&pSize=100'\r\n   ```\r\n\r\n3. Save every row in the response under its individual cache key:\r\n   ```dart\r\n   final key = _cacheKey(mealDate, mealCode);\r\n   _saveToCache(prefs, key, meal);\r\n   ```\r\n\r\n4. Remove from the `_prefetchingMonths` map in `finally`.\r\n\r\n---\r\n\r\n## `prefetchWeek`\r\n\r\n```dart\r\nstatic Future<void> prefetchWeek(DateTime baseDate)\r\n```\r\n\r\n**Description**: Prefetches the meals for the current week when the weekly view is opened.\r\n\r\n- One `_prefetchMonth` call if MondayвҖ“Friday share the same month\r\n- Two parallel prefetches if the week crosses months:\r\n  ```dart\r\n  await Future.wait([_prefetchMonth(monday), _prefetchMonth(friday)]);\r\n  ```\r\n\r\n---\r\n\r\n## `_getFromCache`\r\n\r\n```dart\r\nstatic Meal? _getFromCache(SharedPreferences prefs, String key)\r\n```\r\n\r\n**Description**: Reads meal data from the cache, returning null if expired.\r\n\r\n**Caching strategy (tiered TTL)**:\r\n- Normal meal data вҶ’ **24 hours** cached\r\n- 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.' вҶ’ cached for **5 minutes** (since data may be registered shortly)\r\n\r\n```dart\r\nif (meal.meal == 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.') {\r\n  if (age > 5 * 60 * 1000) return null;   // 5л¶„ нӣ„ л§ҢлЈҢ\r\n} else {\r\n  if (age > 24 * 60 * 60 * 1000) return null;  // 24мӢңк°„ нӣ„ л§ҢлЈҢ\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_saveToCache`\r\n\r\n```dart\r\nstatic void _saveToCache(SharedPreferences prefs, String key, Meal meal)\r\n```\r\n\r\nSaves [Meal](../data/meal.md) JSON + timestamp into SharedPreferences.\r\n\r\n---\r\n\r\n## `clearCacheForDate`\r\n\r\n```dart\r\nstatic Future<void> clearCacheForDate(DateTime date)\r\n```\r\n\r\nClears breakfast/lunch/dinner caches for a specific date.\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\n**Description**: Performs an HTTP GET request through `_client`.\r\n\r\n- **Timeout**: 10 seconds\r\n- NEIS `INFO-200` (no data) responses are returned normally (empty data)\r\n- Throws `NetworkException` on error/timeout (caller handles cache fallback)\r\n\r\n---\r\n\r\n## Testing Support\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n\r\n@visibleForTesting\r\nstatic Future<void> resetCache() async { ... }\r\n```\r\n\r\n- Inject `MockClient` via the `client` setter вҶ’ test parsing/cache/SWR logic without the network\r\n- `resetCache()` resets `_prefetchingMonths` + SharedPreferences\r\n\r\n---\r\n\r\n## `isAllMealEmpty`\r\n\r\n```dart\r\nstatic Future<bool> isAllMealEmpty(DateTime date)\r\n```\r\n\r\n**Description**: Checks whether any meal exists for a given date.\r\nReturns `true` on a NEIS `INFO-200` response (no meals).\r\nUsed by the home widget to decide whether to display \"No meals\".\r\n","api/notice_data_api.md":"# NoticeDataApi\r\n\r\n> `lib/api/notice_data_api.dart` вҖ” NEIS н•ҷмӮ¬мқјм • API м—°лҸҷ\r\n\r\nмқёмҠӨн„ҙмҠӨ л©”м„ңл“ң (singletonмқҙ м•„лӢҳ). NEIS н•ҷмӮ¬мқјм • APIм—җм„ң н•ҷкөҗ мқјм •мқ„ мЎ°нҡҢн•Ё.\r\nHTTP нҒҙлқјмқҙм–ёнҠёлҠ” `@visibleForTesting` static setterлЎң көҗмІҙ к°ҖлҠҘн•ҳм—¬ MockClient кё°л°ҳ лӢЁмң„ н…ҢмҠӨнҠёлҘј м§Җмӣҗн•Ё\r\n\r\n---\r\n\r\n## `getNotice`\r\n\r\n```dart\r\nFuture<String?> getNotice({required DateTime date})\r\n```\r\n\r\n**м„ӨлӘ…**: нҠ№м • лӮ м§ңмқҳ н•ҷмӮ¬мқјм • мқҙлҰ„мқ„ л°ҳнҷҳн•Ё\r\n\r\n1. мәҗмӢң нҷ•мқё (12мӢңк°„ TTL):\r\n   ```dart\r\n   final cacheKey = 'notice_$formattedDate';\r\n   // 12мӢңк°„ мқҙлӮҙл©ҙ мәҗмӢң л°ҳнҷҳ\r\n   ```\r\n\r\n2. мҳӨн”„лқјмқёмқҙл©ҙ м•ҲлӮҙ л©”мӢңм§Җ л°ҳнҷҳ\r\n\r\n3. NEIS `SchoolSchedule` м—”л“ңнҸ¬мқёнҠё нҳём¶ң (`AA_YMD` нҢҢлқјлҜён„°)\r\n\r\n4. `_processSchoolSchedule`лЎң мқјм •лӘ… м¶”м¶ң:\r\n   ```dart\r\n   if (row['EVENT_NM'] == 'нҶ мҡ”нңҙм—…мқј') return null;\r\n   return row['EVENT_NM'];\r\n   ```\r\n   'нҶ мҡ”нңҙм—…мқј'мқҖ мқҳлҜё м—ҶмңјлҜҖлЎң null л°ҳнҷҳ\r\n\r\n**л°ҳнҷҳк°’**: мқјм •лӘ… л¬ёмһҗм—ҙ лҳҗлҠ” 'н•ҷмӮ¬мқјм •мқҙ м—ҶмҠөлӢҲлӢӨ'\r\n\r\n---\r\n\r\n## `getUpcomingEvent`\r\n\r\n```dart\r\nFuture<UpcomingEvent?> getUpcomingEvent()\r\n```\r\n\r\n**м„ӨлӘ…**: к°ҖмһҘ к°Җк№Ңмҡҙ лҜёлһҳ н•ҷмӮ¬ мқҙлІӨнҠёлҘј л°ҳнҷҳн•Ё\r\n\r\n1. мәҗмӢң нҷ•мқё (6мӢңк°„ TTL). D-dayк°Җ 0 мқҙмғҒмқём§Җ мһ¬кі„мӮ°:\r\n   ```dart\r\n   final dDay = eventDate.difference(DateTime(now.year, now.month, now.day)).inDays;\r\n   if (dDay >= 0) return cached;\r\n   ```\r\n\r\n2. лӮҙмқјл¶Җн„° 90мқј лІ”мң„лЎң NEIS API нҳём¶ң:\r\n   ```dart\r\n   final tomorrow = now.add(const Duration(days: 1));\r\n   final endDate = now.add(const Duration(days: 90));\r\n   ```\r\n\r\n3. 'нҶ мҡ”нңҙм—…мқј' м ңмҷё, D-day > 0мқё мқҙлІӨнҠёл§Ң мҲҳм§‘\r\n\r\n4. D-day кё°мӨҖ м •л ¬ вҶ’ к°ҖмһҘ к°Җк№Ңмҡҙ мқҙлІӨнҠё л°ҳнҷҳ + мәҗмӢң м ҖмһҘ\r\n\r\n**л°ҳнҷҳк°’**: `UpcomingEvent?` вҖ” `name`, `date`, `dDay` нҸ¬н•Ё\r\n\r\n---\r\n\r\n## `getEventsInRange`\r\n\r\n```dart\r\nFuture<List<UpcomingEvent>> getEventsInRange({int days = 30})\r\n```\r\n\r\n**м„ӨлӘ…**: мҳӨлҠҳл¶Җн„° `days`мқј лІ”мң„ лӮҙ лӘЁл“  н•ҷмӮ¬ мқҙлІӨнҠёлҘј л°ҳнҷҳн•Ё\r\n\r\nмәҗмӢң м—Ҷмқҙ л§ӨлІҲ API нҳём¶ң. D-day кё°мӨҖ м •л ¬лҗң лҰ¬мҠӨнҠё л°ҳнҷҳ\r\nD-day нҷ”л©ҙм—җм„ң \"мқјм •м—җм„ң D-day м¶”к°Җ\" кё°лҠҘм—җ мӮ¬мҡ©\r\n\r\n---\r\n\r\n## `getMonthEvents`\r\n\r\n```dart\r\nFuture<Map<DateTime, String>> getMonthEvents(DateTime month)\r\n```\r\n\r\n**м„ӨлӘ…**: мӣ”лі„ н•ҷмӮ¬мқјм • л§өмқ„ л°ҳнҷҳн•Ё (мәҳлҰ°лҚ” л§Ҳм»Өмҡ©)\r\n\r\n1. мәҗмӢң нҷ•мқё (12мӢңк°„ TTL, `month_events_v2_` нӮӨ):\r\n   ```dart\r\n   final cacheKey = 'month_events_v2_$monthKey';\r\n   ```\r\n\r\n2. мӣ”мқҳ мІ«лӮ ~л§Ҳм§Җл§үлӮ  лІ”мң„лЎң API нҳём¶ң\r\n\r\n3. `{ DateTime: \"мқјм •лӘ…\" }` л§ө кө¬м„ұ, 'нҶ мҡ”нңҙм—…мқј' м ңмҷё\r\n\r\n4. мәҗмӢң м ҖмһҘ (DateTimeмқ„ ISO string нӮӨлЎң ліҖнҷҳ)\r\n\r\n**л°ҳнҷҳк°’**: `Map<DateTime, String>` вҖ” лӮ м§ңлі„ мқјм •лӘ…\r\n\r\n---\r\n\r\n## `_processSchoolSchedule`\r\n\r\n```dart\r\nString? _processSchoolSchedule(List<dynamic> schoolScheduleArray)\r\n```\r\n\r\nNEIS мқ‘лӢөмқҳ `SchoolSchedule` л°°м—ҙм—җм„ң мІ« лІҲм§ё `EVENT_NM`мқ„ м¶”м¶ң. 'нҶ мҡ”нңҙм—…мқј'мқҙл©ҙ null\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nFuture<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\n`_client`лҘј нҶөн•ҙ HTTP GET мҡ”мІӯ. 10мҙҲ нғҖмһ„м•„мӣғ, м—җлҹ¬ мӢң `NetworkException` throw\r\n\r\n---\r\n\r\n## н…ҢмҠӨнҠё м§Җмӣҗ\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n```\r\n\r\n`client` setterлЎң `MockClient` мЈјмһ… вҶ’ л„ӨнҠёмӣҢнҒ¬ м—Ҷмқҙ нҢҢмӢұВ·мәҗмӢңВ·мқҙлІӨнҠё м •л ¬ лЎңм§Ғ н…ҢмҠӨнҠё\r\n\r\n---\r\n\r\n## UpcomingEvent (лҚ°мқҙн„° нҒҙлһҳмҠӨ)\r\n\r\n```dart\r\nclass UpcomingEvent {\r\n  final String name;\r\n  final DateTime date;\r\n  final int dDay;\r\n}\r\n```\r\n\r\nлӢӨк°ҖмҳӨлҠ” н•ҷмӮ¬ мқҙлІӨнҠёлҘј лӮҳнғҖлӮҙлҠ” лӘЁлҚё\r\n","api/notice_data_api_en.md":"# NoticeDataApi\r\n\r\n> н•ңкөӯм–ҙ: [notice_data_api.md](./notice_data_api.md)\r\n>\r\n> `lib/api/notice_data_api.dart` вҖ” NEIS school schedule API integration\r\n\r\nInstance methods (not a singleton). Queries school schedules from the NEIS school schedule API.\r\nThe HTTP client can be replaced through a `@visibleForTesting` static setter, enabling MockClient-based unit tests.\r\n\r\n---\r\n\r\n## `getNotice`\r\n\r\n```dart\r\nFuture<String?> getNotice({required DateTime date})\r\n```\r\n\r\n**Description**: Returns the school schedule event name for a specific date.\r\n\r\n1. Cache check (12-hour TTL):\r\n   ```dart\r\n   final cacheKey = 'notice_$formattedDate';\r\n   // 12мӢңк°„ мқҙлӮҙл©ҙ мәҗмӢң л°ҳнҷҳ\r\n   ```\r\n\r\n2. If offline, returns a guidance message\r\n\r\n3. Calls the NEIS `SchoolSchedule` endpoint (`AA_YMD` parameter)\r\n\r\n4. Extracts the event name via `_processSchoolSchedule`:\r\n   ```dart\r\n   if (row['EVENT_NM'] == 'нҶ мҡ”нңҙм—…мқј') return null;\r\n   return row['EVENT_NM'];\r\n   ```\r\n   'нҶ мҡ”нңҙм—…мқј' (Saturday holiday) is meaningless, so null is returned.\r\n\r\n**Return value**: The event name string, or 'н•ҷмӮ¬мқјм •мқҙ м—ҶмҠөлӢҲлӢӨ'\r\n\r\n---\r\n\r\n## `getUpcomingEvent`\r\n\r\n```dart\r\nFuture<UpcomingEvent?> getUpcomingEvent()\r\n```\r\n\r\n**Description**: Returns the nearest future school event.\r\n\r\n1. Cache check (6-hour TTL). Recomputes whether D-day is вүҘ 0:\r\n   ```dart\r\n   final dDay = eventDate.difference(DateTime(now.year, now.month, now.day)).inDays;\r\n   if (dDay >= 0) return cached;\r\n   ```\r\n\r\n2. Calls the NEIS API for a 90-day range starting tomorrow:\r\n   ```dart\r\n   final tomorrow = now.add(const Duration(days: 1));\r\n   final endDate = now.add(const Duration(days: 90));\r\n   ```\r\n\r\n3. Excludes 'нҶ мҡ”нңҙм—…мқј' and collects only events with D-day > 0.\r\n\r\n4. Sorts by D-day вҶ’ returns the closest event and caches it.\r\n\r\n**Return value**: `UpcomingEvent?` вҖ” includes `name`, `date`, and `dDay`.\r\n\r\n---\r\n\r\n## `getEventsInRange`\r\n\r\n```dart\r\nFuture<List<UpcomingEvent>> getEventsInRange({int days = 30})\r\n```\r\n\r\n**Description**: Returns all school events within `days` days from today.\r\n\r\nCalls the API every time without caching. Returns a list sorted by D-day.\r\nUsed by the \"Add D-day from schedule\" feature on the D-day screen.\r\n\r\n---\r\n\r\n## `getMonthEvents`\r\n\r\n```dart\r\nFuture<Map<DateTime, String>> getMonthEvents(DateTime month)\r\n```\r\n\r\n**Description**: Returns a monthly school-event map (for calendar markers).\r\n\r\n1. Cache check (12-hour TTL, `month_events_v2_` key):\r\n   ```dart\r\n   final cacheKey = 'month_events_v2_$monthKey';\r\n   ```\r\n\r\n2. Calls the API from the first to the last day of the month.\r\n\r\n3. Builds a `{ DateTime: \"мқјм •лӘ…\" }` map, excluding 'нҶ мҡ”нңҙм—…мқј'.\r\n\r\n4. Stores to cache (DateTime converted to an ISO string key).\r\n\r\n**Return value**: `Map<DateTime, String>` вҖ” event name keyed by date.\r\n\r\n---\r\n\r\n## `_processSchoolSchedule`\r\n\r\n```dart\r\nString? _processSchoolSchedule(List<dynamic> schoolScheduleArray)\r\n```\r\n\r\nExtracts the first `EVENT_NM` from the `SchoolSchedule` array in the NEIS response. Returns null if it is 'нҶ мҡ”нңҙм—…мқј'.\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nFuture<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\nPerforms an HTTP GET request through `_client`. 10-second timeout; throws `NetworkException` on error.\r\n\r\n---\r\n\r\n## Testing Support\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n```\r\n\r\nInject `MockClient` via the `client` setter вҶ’ test parsing / caching / event-sort logic without the network.\r\n\r\n---\r\n\r\n## UpcomingEvent (data class)\r\n\r\n```dart\r\nclass UpcomingEvent {\r\n  final String name;\r\n  final DateTime date;\r\n  final int dDay;\r\n}\r\n```\r\n\r\nA model representing an upcoming school event.\r\n","api/timetable_data_api.md":"# TimetableDataApi\r\n\r\n> `lib/api/timetable_data_api.dart` вҖ” NEIS мӢңк°„н‘ң API м—°лҸҷ\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. мӢңк°„н‘ң лҚ°мқҙн„° мЎ°нҡҢ, кіјлӘ© мЎ°н•© м¶”м¶ң, мәҗмӢұмқ„ лӢҙлӢ№н•Ё.\r\nHTTP нҒҙлқјмқҙм–ёнҠёлҠ” `@visibleForTesting` setterлЎң көҗмІҙ к°ҖлҠҘн•ҳм—¬ MockClient кё°л°ҳ лӢЁмң„ н…ҢмҠӨнҠёлҘј м§Җмӣҗн•Ё\r\n\r\n---\r\n\r\n## `getTimeTable`\r\n\r\n```dart\r\nstatic Future<Map<String, Map<String, List<String>>>> getTimeTable({\r\n  required DateTime startDate,\r\n  required DateTime endDate,\r\n  required String grade,\r\n  String? classNum,\r\n})\r\n```\r\n\r\n**м„ӨлӘ…**: н•ҷл…„/л°ҳлі„ мӢңк°„н‘ңлҘј лӮ м§ң лІ”мң„лЎң мЎ°нҡҢн•Ё\r\n\r\n**л°ҳнҷҳ кө¬мЎ°**: `{ \"20260410\": { \"3\": [\"көӯм–ҙ\",\"мҲҳн•ҷ\",\"мҳҒм–ҙ\",...] } }` вҖ” лӮ м§ң вҶ’ л°ҳ вҶ’ көҗмӢңлі„ кіјлӘ© лҰ¬мҠӨнҠё\r\n\r\n1. мәҗмӢң нҷ•мқё (12мӢңк°„ TTL):\r\n   ```dart\r\n   final cacheKey = '$formattedStartDate-$formattedEndDate-$grade${classNum != null ? '-$classNum' : ''}';\r\n   ```\r\n\r\n2. мҳӨн”„лқјмқёмқҙл©ҙ м—җлҹ¬ л§ө л°ҳнҷҳ:\r\n   ```dart\r\n   return {\"error\": {\"error\": [\"мӢңк°„н‘ңлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”\"]}};\r\n   ```\r\n\r\n3. NEIS `hisTimetable` м—”л“ңнҸ¬мқёнҠё нҳём¶ң (`pSize=1000`):\r\n   ```dart\r\n   '&GRADE=$grade'\r\n   '${classNum != null ? '&CLASS_NM=$classNum' : ''}'\r\n   ```\r\n\r\n4. `_processTimetable`лЎң мқ‘лӢө нҢҢмӢұ нӣ„ мәҗмӢңм—җ м ҖмһҘ\r\n\r\n---\r\n\r\n## `_processTimetable`\r\n\r\n```dart\r\nstatic Map<String, Map<String, List<String>>> _processTimetable(\r\n    List<dynamic> timetableArray)\r\n```\r\n\r\n**м„ӨлӘ…**: NEIS API мқ‘лӢөмқ„ `{ лӮ м§ң вҶ’ л°ҳ вҶ’ кіјлӘ©лҰ¬мҠӨнҠё }` кө¬мЎ°лЎң ліҖнҷҳн•Ё\r\n\r\nн•өмӢ¬ лЎңм§Ғ вҖ” **PERIO кё°л°ҳ көҗмӢң л°°м№ҳ**:\r\n```dart\r\nfinal perio = int.tryParse(item['PERIO']?.toString() ?? '');\r\nwhile (classList.length < perio) {\r\n  classList.add('');  // л№Ҳ көҗмӢң мұ„мҡ°кё°\r\n}\r\nclassList[perio - 1] = content;  // 1-based вҶ’ 0-based\r\n```\r\n\r\nл°ҳ лІҲнҳёк°Җ м—ҶлҠ” кІҪмҡ° `'special'`лЎң мІҳлҰ¬ (нҠ№лі„мӢӨ кіјлӘ©)\r\n\r\n---\r\n\r\n## `_getWeekTimetableWithFallback`\r\n\r\n```dart\r\nstatic Future<Map<String, Map<String, List<String>>>> _getWeekTimetableWithFallback(\r\n    String grade)\r\n```\r\n\r\n**м„ӨлӘ…**: мқҙлІҲ мЈј вҶ’ лӢӨмқҢ мЈј вҶ’ м§ҖлӮң мЈј мҲңмңјлЎң мӢңк°„н‘ңлҘј мӢңлҸ„н•Ё\r\n\r\nл°©н•ҷ л“ұ лҚ°мқҙн„°к°Җ м—ҶлҠ” мЈјлҘј лҢҖл№„н•ң нҸҙл°ұ:\r\n```dart\r\nvar timetable = await getTimeTable(startDate: thisMonday, ...);\r\nif (_hasData(timetable)) return timetable;\r\n\r\n// мқҙлІҲ мЈј м—Ҷмңјл©ҙ лӢӨмқҢ мЈј мӢңлҸ„\r\nfinal nextMonday = thisMonday.add(const Duration(days: 7));\r\ntimetable = await getTimeTable(startDate: nextMonday, ...);\r\nif (_hasData(timetable)) return timetable;\r\n\r\n// лӢӨмқҢ мЈјлҸ„ м—Ҷмңјл©ҙ м§ҖлӮң мЈј мӢңлҸ„\r\nfinal prevMonday = thisMonday.subtract(const Duration(days: 7));\r\nreturn await getTimeTable(startDate: prevMonday, ...);\r\n```\r\n\r\n---\r\n\r\n## `getSubjects`\r\n\r\n```dart\r\nstatic Future<List<String>?> getSubjects({required int grade})\r\n```\r\n\r\n**м„ӨлӘ…**: н•ҷл…„лі„ кіјлӘ©лӘ… лҰ¬мҠӨнҠёлҘј м¶”м¶ңн•Ё\r\n\r\n`_getWeekTimetableWithFallback`лЎң мӢңк°„н‘ңлҘј к°Җм ёмҳЁ л’Ө, лӘЁл“  кіјлӘ©лӘ…мқ„ `Set`мңјлЎң мҲҳм§‘\r\n`[ліҙк°•]`, `нҶ мҡ”нңҙм—…мқј` м ңмҷё. 1мЈјмқј мәҗмӢң\r\n\r\n---\r\n\r\n## `getAllSubjectCombinations`\r\n\r\n```dart\r\nstatic Future<List<Subject>> getAllSubjectCombinations({\r\n  required int grade,\r\n  int maxRetries = 3,\r\n})\r\n```\r\n\r\n**м„ӨлӘ…**: н•ҷл…„мқҳ лӘЁл“  л°ҳм—җм„ң к°ҖлҘҙм№ҳлҠ” кіјлӘ© + л°ҳ лІҲнҳё мЎ°н•©мқ„ м¶”м¶ңн•Ё\r\n\r\nмӢңк°„н‘ң м„ нғқ нҷ”л©ҙм—җм„ң \"м–ҙл–Ө л°ҳм—җм„ң м–ҙл–Ө кіјлӘ©мқ„ к°ҖлҘҙм№ҳлҠ”м§Җ\" нҢҢм•…м—җ мӮ¬мҡ©\r\n\r\n1. лЎңм»¬ мәҗмӢң нҷ•мқё (1мЈјмқј TTL):\r\n   ```dart\r\n   final cachedSubjects = await _loadCachedSubjects(grade);\r\n   if (cachedSubjects != null && cachedSubjects.isNotEmpty) return cachedSubjects;\r\n   ```\r\n\r\n2. мөңлҢҖ 3нҡҢ мһ¬мӢңлҸ„лЎң `_getWeekTimetableWithFallback` нҳём¶ң:\r\n   ```dart\r\n   for (int attempt = 1; attempt <= maxRetries; attempt++) { ... }\r\n   ```\r\n\r\n3. `Subject(subjectName, subjectClass)` мҢҚмқ„ SetмңјлЎң мҲҳм§‘:\r\n   ```dart\r\n   subjectSet.add(Subject(\r\n     subjectName: subjectName,\r\n     subjectClass: classInt,  // -1мқҙл©ҙ нҠ№лі„мӢӨ\r\n   ));\r\n   ```\r\n\r\n4. мқҙлҰ„мҲң м •л ¬ нӣ„ мәҗмӢң м ҖмһҘ\r\n\r\n**мһ¬мӢңлҸ„**: мӢӨнҢЁ мӢң `2 * attempt`мҙҲ лҢҖкё° нӣ„ мһ¬мӢңлҸ„\r\n\r\n---\r\n\r\n## `getCustomTimeTable`\r\n\r\n```dart\r\nstatic Future<List<List<String?>>> getCustomTimeTable({\r\n  required List<Subject> userSubjects,\r\n  required String grade,\r\n})\r\n```\r\n\r\n**м„ӨлӘ…**: мӮ¬мҡ©мһҗк°Җ м„ нғқн•ң кіјлӘ©мңјлЎң м»ӨмҠӨн…Җ мӢңк°„н‘ңлҘј мғқм„ұн•Ё\r\n\r\n**л°ҳнҷҳ**: `List<List<String?>>` вҖ” мқёлҚұмҠӨ 1~5к°Җ мӣ”~кёҲ, к°Ғ лҰ¬мҠӨнҠёмқҳ мқёлҚұмҠӨ 1~7мқҙ 1~7көҗмӢң\r\n\r\n1. м „мІҙ н•ҷл…„ мӢңк°„н‘ңлҘј мЎ°нҡҢ (л°ҳ м§Җм • м—Ҷмқҙ):\r\n   ```dart\r\n   final timetable = await getTimeTable(..., classNum: null);\r\n   ```\r\n\r\n2. мӮ¬мҡ©мһҗ м„ нғқ кіјлӘ©мқ„ л°ҳ лІҲнҳёлЎң к·ёлЈ№нҷ”:\r\n   ```dart\r\n   final classToSubjects = <int, List<Subject>>{};\r\n   ```\r\n\r\n3. к°Ғ л°ҳмқҳ мӢңк°„н‘ңм—җм„ң м„ нғқ кіјлӘ©мқҙ л§Өм№ӯлҗҳлҠ” көҗмӢңлҘј м¶”м¶ң:\r\n   ```dart\r\n   if (subjectsList[i] == subject.subjectName) {\r\n     customTimeTable[weekday][i + 1] = subject.subjectName;\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `getClassCount`\r\n\r\n```dart\r\nstatic Future<int> getClassCount(int grade)\r\n```\r\n\r\nNEIS `classInfo` APIлЎң н•ҷл…„мқҳ л°ҳ мҲҳлҘј мЎ°нҡҢн•Ё. 1мЈјмқј мәҗмӢң\r\n\r\n---\r\n\r\n## `getSubjectsFromAdminFirestore`\r\n\r\n```dart\r\nstatic Future<List<Subject>> getSubjectsFromAdminFirestore(int grade)\r\n```\r\n\r\nFirestore `grade/{grade}/subject/` м»¬л үм…ҳм—җм„ң кҙҖлҰ¬мһҗк°Җ л“ұлЎқн•ң кіјлӘ© лӘ©лЎқмқ„ мЎ°нҡҢн•Ё\r\n`category`мҷҖ `isOriginal` н•„л“ң нҸ¬н•Ё\r\n\r\n---\r\n\r\n## лӮҙл¶Җ мң нӢёлҰ¬нӢ°\r\n\r\n| н•ЁмҲҳ | м„ӨлӘ… |\r\n|------|------|\r\n| `_fetchData(url)` | `_client`лҘј нҶөн•ҙ HTTP GET мҡ”мІӯ, м—җлҹ¬ мӢң `NetworkException` throw |\r\n| `_hasData(timetable)` | м—җлҹ¬к°Җ м•„лӢҲкі  кіјлӘ© лҚ°мқҙн„°к°Җ мһҲлҠ”м§Җ |\r\n| `_loadCachedSubjects(grade)` | кіјлӘ© мЎ°н•© мәҗмӢң лЎңл“ң (1мЈјмқј TTL) |\r\n| `_saveSubjectsToCache(grade, subjects)` | кіјлӘ© мЎ°н•© мәҗмӢң м ҖмһҘ |\r\n\r\n---\r\n\r\n## н…ҢмҠӨнҠё м§Җмӣҗ\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n```\r\n\r\n`client` setterлЎң `MockClient` мЈјмһ… вҶ’ л„ӨнҠёмӣҢнҒ¬ м—Ҷмқҙ нҢҢмӢұВ·мәҗмӢңВ·SWRВ·кіјлӘ© м¶”м¶ң лЎңм§Ғ н…ҢмҠӨнҠё\r\n","api/timetable_data_api_en.md":"# TimetableDataApi\r\n\r\n> н•ңкөӯм–ҙ: [timetable_data_api.md](./timetable_data_api.md)\r\n>\r\n> `lib/api/timetable_data_api.dart` вҖ” NEIS timetable API integration\r\n\r\nAll methods are `static`. Responsible for querying timetable data, extracting subject combinations, and caching.\r\nThe HTTP client can be replaced through a `@visibleForTesting` setter, enabling MockClient-based unit tests.\r\n\r\n---\r\n\r\n## `getTimeTable`\r\n\r\n```dart\r\nstatic Future<Map<String, Map<String, List<String>>>> getTimeTable({\r\n  required DateTime startDate,\r\n  required DateTime endDate,\r\n  required String grade,\r\n  String? classNum,\r\n})\r\n```\r\n\r\n**Description**: Queries a timetable for a grade/class over a date range.\r\n\r\n**Return structure**: `{ \"20260410\": { \"3\": [\"көӯм–ҙ\",\"мҲҳн•ҷ\",\"мҳҒм–ҙ\",...] } }` вҖ” date вҶ’ class вҶ’ per-period subject list.\r\n\r\n1. Cache check (12-hour TTL):\r\n   ```dart\r\n   final cacheKey = '$formattedStartDate-$formattedEndDate-$grade${classNum != null ? '-$classNum' : ''}';\r\n   ```\r\n\r\n2. When offline, returns an error map:\r\n   ```dart\r\n   return {\"error\": {\"error\": [\"мӢңк°„н‘ңлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”\"]}};\r\n   ```\r\n\r\n3. Calls the NEIS `hisTimetable` endpoint (`pSize=1000`):\r\n   ```dart\r\n   '&GRADE=$grade'\r\n   '${classNum != null ? '&CLASS_NM=$classNum' : ''}'\r\n   ```\r\n\r\n4. Parses the response via `_processTimetable` and stores it in the cache.\r\n\r\n---\r\n\r\n## `_processTimetable`\r\n\r\n```dart\r\nstatic Map<String, Map<String, List<String>>> _processTimetable(\r\n    List<dynamic> timetableArray)\r\n```\r\n\r\n**Description**: Converts the NEIS API response into a `{ date вҶ’ class вҶ’ subject list }` structure.\r\n\r\nCore logic вҖ” **period placement based on PERIO**:\r\n```dart\r\nfinal perio = int.tryParse(item['PERIO']?.toString() ?? '');\r\nwhile (classList.length < perio) {\r\n  classList.add('');  // л№Ҳ көҗмӢң мұ„мҡ°кё°\r\n}\r\nclassList[perio - 1] = content;  // 1-based вҶ’ 0-based\r\n```\r\n\r\nEntries without a class number are treated as `'special'` (special-room subjects).\r\n\r\n---\r\n\r\n## `_getWeekTimetableWithFallback`\r\n\r\n```dart\r\nstatic Future<Map<String, Map<String, List<String>>>> _getWeekTimetableWithFallback(\r\n    String grade)\r\n```\r\n\r\n**Description**: Tries this week вҶ’ next week вҶ’ last week in order.\r\n\r\nA fallback for weeks with no data (e.g., vacations):\r\n```dart\r\nvar timetable = await getTimeTable(startDate: thisMonday, ...);\r\nif (_hasData(timetable)) return timetable;\r\n\r\n// мқҙлІҲ мЈј м—Ҷмңјл©ҙ лӢӨмқҢ мЈј мӢңлҸ„\r\nfinal nextMonday = thisMonday.add(const Duration(days: 7));\r\ntimetable = await getTimeTable(startDate: nextMonday, ...);\r\nif (_hasData(timetable)) return timetable;\r\n\r\n// лӢӨмқҢ мЈјлҸ„ м—Ҷмңјл©ҙ м§ҖлӮң мЈј мӢңлҸ„\r\nfinal prevMonday = thisMonday.subtract(const Duration(days: 7));\r\nreturn await getTimeTable(startDate: prevMonday, ...);\r\n```\r\n\r\n---\r\n\r\n## `getSubjects`\r\n\r\n```dart\r\nstatic Future<List<String>?> getSubjects({required int grade})\r\n```\r\n\r\n**Description**: Extracts the list of subject names for a given grade.\r\n\r\nFetches the timetable via `_getWeekTimetableWithFallback`, then collects every subject name into a `Set`.\r\nExcludes `[ліҙк°•]` and `нҶ мҡ”нңҙм—…мқј`. Cached for 1 week.\r\n\r\n---\r\n\r\n## `getAllSubjectCombinations`\r\n\r\n```dart\r\nstatic Future<List<Subject>> getAllSubjectCombinations({\r\n  required int grade,\r\n  int maxRetries = 3,\r\n})\r\n```\r\n\r\n**Description**: Extracts combinations of subjects + class numbers taught across every class of a grade.\r\n\r\nUsed on the timetable selection screen to determine \"which subjects are taught in which classes\".\r\n\r\n1. Local cache check (1-week TTL):\r\n   ```dart\r\n   final cachedSubjects = await _loadCachedSubjects(grade);\r\n   if (cachedSubjects != null && cachedSubjects.isNotEmpty) return cachedSubjects;\r\n   ```\r\n\r\n2. Calls `_getWeekTimetableWithFallback` with up to 3 retries:\r\n   ```dart\r\n   for (int attempt = 1; attempt <= maxRetries; attempt++) { ... }\r\n   ```\r\n\r\n3. Collects `Subject(subjectName, subjectClass)` pairs into a Set:\r\n   ```dart\r\n   subjectSet.add(Subject(\r\n     subjectName: subjectName,\r\n     subjectClass: classInt,  // -1мқҙл©ҙ нҠ№лі„мӢӨ\r\n   ));\r\n   ```\r\n\r\n4. Sorts by name and saves to cache.\r\n\r\n**Retry**: On failure, waits `2 * attempt` seconds before retrying.\r\n\r\n---\r\n\r\n## `getCustomTimeTable`\r\n\r\n```dart\r\nstatic Future<List<List<String?>>> getCustomTimeTable({\r\n  required List<Subject> userSubjects,\r\n  required String grade,\r\n})\r\n```\r\n\r\n**Description**: Builds a custom timetable from the user's selected subjects.\r\n\r\n**Return**: `List<List<String?>>` вҖ” indices 1вҖ“5 are MondayвҖ“Friday, and within each list indices 1вҖ“7 are periods 1вҖ“7.\r\n\r\n1. Queries the full-grade timetable (without specifying a class):\r\n   ```dart\r\n   final timetable = await getTimeTable(..., classNum: null);\r\n   ```\r\n\r\n2. Groups the user's selected subjects by class number:\r\n   ```dart\r\n   final classToSubjects = <int, List<Subject>>{};\r\n   ```\r\n\r\n3. Extracts the periods from each class's timetable where a selected subject matches:\r\n   ```dart\r\n   if (subjectsList[i] == subject.subjectName) {\r\n     customTimeTable[weekday][i + 1] = subject.subjectName;\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `getClassCount`\r\n\r\n```dart\r\nstatic Future<int> getClassCount(int grade)\r\n```\r\n\r\nQueries the number of classes in a grade via the NEIS `classInfo` API. Cached for 1 week.\r\n\r\n---\r\n\r\n## `getSubjectsFromAdminFirestore`\r\n\r\n```dart\r\nstatic Future<List<Subject>> getSubjectsFromAdminFirestore(int grade)\r\n```\r\n\r\nQueries the admin-registered subject list from the Firestore `grade/{grade}/subject/` collection.\r\nIncludes the `category` and `isOriginal` fields.\r\n\r\n---\r\n\r\n## Internal Utilities\r\n\r\n| Function | Description |\r\n|------|------|\r\n| `_fetchData(url)` | Performs an HTTP GET through `_client`; throws `NetworkException` on error |\r\n| `_hasData(timetable)` | Whether it is not an error and contains subject data |\r\n| `_loadCachedSubjects(grade)` | Loads the subject-combination cache (1-week TTL) |\r\n| `_saveSubjectsToCache(grade, subjects)` | Saves the subject-combination cache |\r\n\r\n---\r\n\r\n## Testing Support\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n```\r\n\r\nInject `MockClient` via the `client` setter вҶ’ test parsing / caching / SWR / subject-extraction logic without the network.\r\n","CONTRIBUTING.md":"# кё°м—¬ к°Җмқҙл“ң\r\n\r\n> English: [CONTRIBUTING_en.md](./CONTRIBUTING_en.md)\r\n\r\nн•ңмҶ”кі  м•ұ н”„лЎңм қнҠём—җ кё°м—¬н•ҙмЈјм…”м„ң к°җмӮ¬н•©лӢҲлӢӨ. мқҙ л¬ём„ңлҠ” лёҢлһңм№ҳ/PR/мҪ”л“ң мҠӨнғҖмқј/н…ҢмҠӨнҠё к·ңм№ҷмқ„ м •лҰ¬н•©лӢҲлӢӨ.\r\n\r\n## лЁјм Җ мқҪмқ„ л¬ём„ң\r\n\r\nмғҲ кё°м—¬мһҗлқјл©ҙ мқҙ мҲңм„ңлЎң л¬ём„ңлҘј нӣ‘мңјл©ҙ л§ҘлқҪмқҙ мһЎнһҷлӢҲлӢӨ.\r\n\r\n1. [м ңн’Ҳ к°ңмҡ”](https://monkshark.github.io/hansol_hs_flutter_app/#guides/product-overview.md)\r\n2. [м•„нӮӨн…ҚмІҳ к°ңмҡ”](https://monkshark.github.io/hansol_hs_flutter_app/#guides/architecture-overview.md)\r\n3. [м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ](https://monkshark.github.io/hansol_hs_flutter_app/#guides/architecture-decisions.md)\r\n4. мһ‘м—…н•  н”јмІҳмқҳ мғҒм„ё: [кіөк°ң](https://monkshark.github.io/hansol_hs_flutter_app/#features/public-features.md) / [м»Өл®ӨлӢҲнӢ°](https://monkshark.github.io/hansol_hs_flutter_app/#features/community-features.md) / [к°ңмқё](https://monkshark.github.io/hansol_hs_flutter_app/#features/personal-features.md) / [кҙҖлҰ¬мһҗ](https://monkshark.github.io/hansol_hs_flutter_app/#features/admin-features.md)\r\n5. [н…ҢмҠӨнҠё м „лһө](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing.md)\r\n\r\n## к°ңл°ң нҷҳкІҪ мӨҖл№„\r\n\r\n### н•„мҲҳ лҸ„кө¬\r\n- Flutter SDK stable (вүҘ 3.x). `pubspec.yaml` мқҖ `sdk: '>=2.17.0 <4.0.0'` лІ”мң„\r\n- Dart (Flutter лҸҷлҙү)\r\n- Node.js 20+ (Cloud Functions, Admin Web, rules н…ҢмҠӨнҠё)\r\n- Firebase CLI (`npm install -g firebase-tools`)\r\n- Java 17+ (Android л№Ңл“ң), 21 (Firebase emulator)\r\n\r\n### лҚ”лҜё мӢңнҒ¬лҰҝ нҢҢмқј мғқм„ұ\r\n\r\n`lib/api/nies_api_keys.dart`, `lib/firebase_options.dart`, `lib/api/kakao_keys.dart` м„ё нҢҢмқјмқҙ м—Ҷмңјл©ҙ analyze/testк°Җ мӢӨнҢЁн•©лӢҲлӢӨ. CI мӣҢнҒ¬н”ҢлЎңмҡ°мқҳ heredoc лё”лЎқ(`.github/workflows/flutter.yml`)мқ„ м°ёмЎ°н•ҙ лҚ”лҜё лӮҙмҡ©мқ„ мғқм„ұн•ҳкұ°лӮҳ, мӢӨм ң нӮӨлҘј л°ӣм•„ мЈјмһ…н•ҳм„ёмҡ”.\r\n\r\nмӢӨм ң мӢӨн–ү(м•ұ кө¬лҸҷ)к№Ңм§Җ н•„мҡ”н•ң кІҪмҡ° `google-services.json`(Android) / `GoogleService-Info.plist`(iOS) м¶”к°Җ. [DEPLOY.md](./DEPLOY.md) м°ёмЎ°.\r\n\r\n### м„Өм№ҳ\r\n\r\n```bash\r\nflutter pub get\r\n```\r\n\r\n`build_runner` мҪ”л“ң мғқм„ұмқҙ н•„мҡ”н•ң кІҪмҡ° (Riverpod мҪ”л“ңм  , Freezed, JSON мӢңлҰ¬м–јлқјмқҙм Җ):\r\n\r\n```bash\r\nflutter pub run build_runner build --delete-conflicting-outputs\r\n# лҳҗлҠ” watch лӘЁл“ң\r\nflutter pub run build_runner watch --delete-conflicting-outputs\r\n```\r\n\r\n## лёҢлһңм№ҳ & PR\r\n\r\n### лёҢлһңм№ҳ м „лһө\r\n- **кё°ліё лёҢлһңм№ҳ**: `master`\r\n- **кё°лҠҘ лёҢлһңм№ҳ**: `feature/<м§§мқҖ-м„ӨлӘ…>` лҳҗлҠ” `fix/<м§§мқҖ-м„ӨлӘ…>`, `docs/<м§§мқҖ-м„ӨлӘ…>`\r\n- м§Ғм ‘ master push кёҲм§Җ, PRмқ„ кұ°міҗ лЁём§Җ\r\n\r\n### PR мІҙнҒ¬лҰ¬мҠӨнҠё\r\n- [ ] `flutter analyze --no-fatal-infos --no-fatal-warnings` нҶөкіј\r\n- [ ] `flutter test` м „мІҙ нҶөкіј\r\n- [ ] к·ңм№ҷ ліҖкІҪ мӢң `tests/firestore-rules` н…ҢмҠӨнҠё м¶”к°Җ/м—…лҚ°мқҙнҠё\r\n- [ ] мғҲ UI ліҖмў…мқҖ Golden н…ҢмҠӨнҠё кі л Ө\r\n- [ ] мғҲ ProviderлҠ” Provider test м¶”к°Җ\r\n- [ ] мҠӨнҒ¬лҰ°мғ· ліҖкІҪ мӢң `screenshots/` м—…лҚ°мқҙнҠё\r\n- [ ] кҙҖл Ё л¬ём„ң лҸҷкё°нҷ” (`docs/*.md`, README, USER_GUIDE л“ұ)\r\n\r\n### м»Өл°Ӣ л©”мӢңм§Җ\r\n\r\nкё°мЎҙ м»ЁлІӨм…ҳ (н•ңкөӯм–ҙ мҡ”м•Ҫ, н•өмӢ¬ мЈјм ң мҡ°м„ ):\r\n\r\n```\r\n<мЈјм ң>: <мҡ”м•Ҫ>\r\n\r\n<н•„мҡ” мӢң ліёл¬ё м„ӨлӘ…>\r\n```\r\n\r\nмӢӨм ң мҳҲмӢң (`git log --oneline` м°ёкі ):\r\n- `Blaze л°°нҸ¬: Storage Rules + cleanupOldPosts + Functions лҹ°нғҖмһ„ м—…к·ёл Ҳмқҙл“ң`\r\n- `README лҜјк°җ лҚ°мқҙн„° row D-day м ңкұ° + Firestore Rules CI Java 21 м—…к·ёл Ҳмқҙл“ң`\r\n- `golden test: tolerance comparatorлЎң platform font diff нқЎмҲҳ`\r\n- `н…ҢмҠӨнҠё м»ӨлІ„лҰ¬м§Җ нҷ•лҢҖ (Golden + SearchHistory)`\r\n\r\nмЈјм ң мҳҲмӢң: `README`, `golden test`, `Firestore rules`, `auth`, `build`, `docs`, `CI`.\r\n\r\n## мҪ”л“ң мҠӨнғҖмқј\r\n\r\n### Dart\r\n- `analysis_options.yaml` + `flutter_lints ^4.0.0`\r\n- `dart format .` м Ғмҡ©\r\n- `custom_lint` + `riverpod_lint` н”Ңлҹ¬к·ёмқёлҸ„ нҷңмҡ©\r\n\r\n### мЈјмҡ” кҙҖлЎҖ\r\n- **Riverpod**: `@riverpod` м–ҙл…ён…Ңмқҙм…ҳ кё°л°ҳ мҪ”л“ң мғқм„ұ. мҲҳлҸҷ `Provider<T>` м„ м–ёмқҖ мҳҲмҷём Ғ кІҪмҡ°м—җл§Ң.\r\n- **л Ҳмқҙм–ҙ л¶„лҰ¬**: Widget вҶ’ Provider вҶ’ Manager/Repository. Widgetм—җм„ң Firestore м§Ғм ‘ м ‘к·ј кёҲм§Җ.\r\n- **DI**: Manager/RepositoryлҠ” GetItмңјлЎң, WidgetмқҖ RiverpodмңјлЎң. нҳјмҡ© к·ңм№ҷмқҖ [ADR-07](./docs/guides/architecture-decisions.md#adr-07-di-getit--м¶”мғҒ-repository).\r\n- **л№„кіөк°ң мң„м Ҝ мөңмҶҢнҷ”**: нҢҢмқјмқҙ 200мӨ„мқ„ л„ҳмңјл©ҙ Stateless WidgetмңјлЎң л¶„лҰ¬ ([кё°мҲ кіјм ң #13](./docs/guides/technical-challenges.md#13-statefulwidget-1400-лқјмқё--stateless-composition-refactoring)).\r\n\r\n### TypeScript (Admin Web)\r\n- `admin-web/` м—җм„ң лҸҷмқј мӣҗм№ҷ. Next.js 14 App Router, Tailwind, Firebase Auth.\r\n- ESLint/PrettierлҠ” `admin-web/` н•ҳмң„мқҳ м„Өм •мқ„ л”°лҰ…лӢҲлӢӨ.\r\n\r\n## н…ҢмҠӨнҠё\r\n\r\n```bash\r\n# м „мІҙ\r\nflutter test\r\n\r\n# м»ӨлІ„лҰ¬м§Җ\r\nflutter test --coverage\r\n\r\n# Golden м—…лҚ°мқҙнҠё\r\nflutter test --update-goldens\r\n\r\n# Rules (Node)\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\n```\r\n\r\nмғҲ кё°лҠҘ мӢң мөңмҶҢ лӢӨмқҢ мӨ‘ н•ҳлӮҳлҠ” м¶”к°Җ:\r\n- л№„мҰҲлӢҲмҠӨ лЎңм§Ғ вҶ’ Unit\r\n- Provider вҶ’ Provider test\r\n- мғҲ rules л¶„кё° вҶ’ Rules test\r\n- мһ¬мӮ¬мҡ© UI вҶ’ Widget / Golden\r\n\r\nмһҗм„ён•ң м „лһө: [testing.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing.md).\r\n\r\n## л¬ём„ң м—…лҚ°мқҙнҠё\r\n\r\nкё°лҠҘ/м•„нӮӨн…ҚмІҳ ліҖкІҪ мӢң н•ҙлӢ№ л¬ём„ңлҘј н•Ёк»ҳ мҲҳм •н•©лӢҲлӢӨ. лҢҖмқ‘н‘ң:\r\n\r\n| ліҖкІҪ лҢҖмғҒ | м—…лҚ°мқҙнҠён•  л¬ём„ң |\r\n|---|---|\r\n| мғҲ кё°лҠҘ | `docs/features/*.md`, `USER_GUIDE.md`, README н”јмІҳ м„№м…ҳ |\r\n| ліҙм•Ҳ к·ңм№ҷ | `firestore.rules` + `docs/security.md` + `docs/data-model.md` |\r\n| м•„нӮӨн…ҚмІҳ кІ°м • | `docs/architecture-decisions.md`м—җ мғҲ ADR м¶”к°Җ |\r\n| мЈјмҡ” кё°мҲ  кіјм ң н•ҙкІ° | `docs/technical-challenges.md` |\r\n| л°°нҸ¬ м Ҳм°Ё | `DEPLOY.md` |\r\n\r\nн•ңкөӯм–ҙ нҢҢмқјмқ„ м—…лҚ°мқҙнҠён–Ҳмңјл©ҙ `_en.md` мҳҒл¬ё мҢҚлҸ„ лҸҷкё°нҷ”н•ҙмЈјм„ёмҡ”. мғҒлӢЁ \"Last sync: YYYY-MM-DD\" мЈјм„қмқ„ к°ұмӢ н•ҳл©ҙ лҰ¬л·°к°Җ мү¬мӣҢм§‘лӢҲлӢӨ.\r\n\r\n## мҪ”л“ң лҰ¬л·°\r\n\r\n- PR нҒ¬кё°лҠ” к°ҖлҠҘн•ң 300мӨ„ мқҙлӮҙлЎң л¶„н• \r\n- лҰ¬л·°м–ҙ м§Җм • мӢң н•ҙлӢ№ мҳҒм—ӯ мҳӨл„Ҳм—җкІҢ (к°җм§Җ м•Ҳ лҗҳл©ҙ @Monkshark)\r\n- CIк°Җ лӘЁл‘җ к·ёлҰ°мқё мғҒнғңм—җм„ңл§Ң лЁём§Җ\r\n\r\n## мқҙмҠҲ лҰ¬нҸ¬нҢ…\r\n\r\n- лІ„к·ё: мһ¬нҳ„ лӢЁкі„, мҳҲмғҒ кІ°кіј, мӢӨм ң кІ°кіј, нҷҳкІҪ (OS/Flutter/м•ұ лІ„м „)\r\n- кё°лҠҘ м ңм•Ҳ: л¬ём ң м •мқҳ, м ңм•Ҳ мҶ”лЈЁм…ҳ, лҢҖм•Ҳ кІҖнҶ \r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [л°°нҸ¬ к°Җмқҙл“ң](./DEPLOY.md)\r\n- [м—”л“ңмң м Җ к°Җмқҙл“ң](./USER_GUIDE.md)\r\n- [н…ҢмҠӨнҠё м „лһө](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing.md)\r\n- [CI/CD м„Өм •](https://monkshark.github.io/hansol_hs_flutter_app/#guides/cicd-setup.md)\r\n","CONTRIBUTING_en.md":"# Contributing Guide\r\n\r\n> н•ңкөӯм–ҙ: [CONTRIBUTING.md](./CONTRIBUTING.md)\r\n\r\nThanks for contributing to the Hansol HS app. This document covers branching, PRs, code style, and testing.\r\n\r\n## Read First\r\n\r\nNew contributors should skim these in order to build context:\r\n\r\n1. [Product Overview](https://monkshark.github.io/hansol_hs_flutter_app/#guides/product-overview_en.md)\r\n2. [Architecture Overview](https://monkshark.github.io/hansol_hs_flutter_app/#guides/architecture-overview_en.md)\r\n3. [Architecture Decisions (ADRs)](https://monkshark.github.io/hansol_hs_flutter_app/#guides/architecture-decisions_en.md)\r\n4. Target feature detail: [Public](https://monkshark.github.io/hansol_hs_flutter_app/#features/public-features_en.md) / [Community](https://monkshark.github.io/hansol_hs_flutter_app/#features/community-features_en.md) / [Personal](https://monkshark.github.io/hansol_hs_flutter_app/#features/personal-features_en.md) / [Admin](https://monkshark.github.io/hansol_hs_flutter_app/#features/admin-features_en.md)\r\n5. [Testing Strategy](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing_en.md)\r\n\r\n## Dev Environment\r\n\r\n### Prerequisites\r\n- Flutter SDK stable (вүҘ 3.x). `pubspec.yaml` declares `sdk: '>=2.17.0 <4.0.0'`\r\n- Dart (bundled with Flutter)\r\n- Node.js 20+ (Cloud Functions, Admin Web, rules tests)\r\n- Firebase CLI: `npm install -g firebase-tools`\r\n- Java 17+ (Android build), Java 21 (Firebase emulator)\r\n\r\n### Dummy Secret Files\r\n\r\nAnalyze/test fails without three files: `lib/api/nies_api_keys.dart`, `lib/firebase_options.dart`, `lib/api/kakao_keys.dart`. Either copy the heredoc blocks from the CI workflow (`.github/workflows/flutter.yml`) or inject real keys.\r\n\r\nTo actually run the app, also add `google-services.json` (Android) / `GoogleService-Info.plist` (iOS). See [DEPLOY_en.md](./DEPLOY_en.md).\r\n\r\n### Install\r\n\r\n```bash\r\nflutter pub get\r\n```\r\n\r\nIf codegen is needed (Riverpod generator, Freezed, JSON serializer):\r\n\r\n```bash\r\nflutter pub run build_runner build --delete-conflicting-outputs\r\n# or watch\r\nflutter pub run build_runner watch --delete-conflicting-outputs\r\n```\r\n\r\n## Branching & PRs\r\n\r\n### Branch Strategy\r\n- **Default branch**: `master`\r\n- **Feature branches**: `feature/<short-desc>`, `fix/<short-desc>`, `docs/<short-desc>`\r\n- No direct push to master вҖ” open a PR.\r\n\r\n### PR Checklist\r\n- [ ] `flutter analyze --no-fatal-infos --no-fatal-warnings` passes\r\n- [ ] `flutter test` all green\r\n- [ ] If rules changed, `tests/firestore-rules` tests updated\r\n- [ ] New UI variants: consider golden tests\r\n- [ ] New Providers: add provider tests\r\n- [ ] Screenshots updated if UI changed (`screenshots/`)\r\n- [ ] Related docs synced (`docs/*.md`, README, USER_GUIDE, etc.)\r\n\r\n### Commit Messages\r\n\r\nExisting convention (Korean summary with leading topic):\r\n\r\n```\r\n<topic>: <summary>\r\n\r\n<optional body>\r\n```\r\n\r\nReal examples (from `git log --oneline`):\r\n- `Blaze л°°нҸ¬: Storage Rules + cleanupOldPosts + Functions лҹ°нғҖмһ„ м—…к·ёл Ҳмқҙл“ң`\r\n- `README лҜјк°җ лҚ°мқҙн„° row D-day м ңкұ° + Firestore Rules CI Java 21 м—…к·ёл Ҳмқҙл“ң`\r\n- `golden test: tolerance comparatorлЎң platform font diff нқЎмҲҳ`\r\n- `н…ҢмҠӨнҠё м»ӨлІ„лҰ¬м§Җ нҷ•лҢҖ (Golden + SearchHistory)`\r\n\r\nTopics: `README`, `golden test`, `Firestore rules`, `auth`, `build`, `docs`, `CI`.\r\n\r\n## Code Style\r\n\r\n### Dart\r\n- `analysis_options.yaml` + `flutter_lints ^4.0.0`\r\n- Apply `dart format .`\r\n- `custom_lint` + `riverpod_lint` plugins also enforced\r\n\r\n### Core Conventions\r\n- **Riverpod**: `@riverpod` annotation with codegen. Manual `Provider<T>` only in exceptional cases.\r\n- **Layer separation**: Widget вҶ’ Provider вҶ’ Manager/Repository. Widgets must not touch Firestore directly.\r\n- **DI**: Managers/Repositories via GetIt, widgets via Riverpod. Mixing rules: [ADR-07](./docs/guides/architecture-decisions_en.md#adr-07-di-getit--abstract-repository).\r\n- **Minimize private widgets**: if a file exceeds ~200 lines, extract Stateless widgets. See [Technical Challenge #13](./docs/guides/technical-challenges_en.md#13-statefulwidget-1400-lines--stateless-composition-refactoring).\r\n\r\n### TypeScript (Admin Web)\r\n- Same principles under `admin-web/`. Next.js 14 App Router, Tailwind, Firebase Auth.\r\n- ESLint/Prettier config lives under `admin-web/`.\r\n\r\n## Testing\r\n\r\n```bash\r\n# all\r\nflutter test\r\n\r\n# coverage\r\nflutter test --coverage\r\n\r\n# update goldens\r\nflutter test --update-goldens\r\n\r\n# rules (Node)\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\n```\r\n\r\nFor every new feature, add at least one of:\r\n- Unit (business logic)\r\n- Provider test\r\n- Rules test (for any new rule branch)\r\n- Widget / Golden (for reusable UI)\r\n\r\nFull strategy: [testing_en.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing_en.md).\r\n\r\n## Documentation Updates\r\n\r\nKeep docs in sync with feature/architecture changes:\r\n\r\n| Change | Update |\r\n|---|---|\r\n| New feature | `docs/features/*.md`, `USER_GUIDE.md`, README feature section |\r\n| Security rules | `firestore.rules` + `docs/security_en.md` + `docs/data-model_en.md` |\r\n| Architecture decision | New ADR in `docs/architecture-decisions_en.md` |\r\n| Notable engineering fix | `docs/technical-challenges_en.md` |\r\n| Deployment step | `DEPLOY_en.md` |\r\n\r\nIf you update a Korean file, sync the paired `_en.md`. Updating a \"Last sync: YYYY-MM-DD\" marker at the top helps reviewers.\r\n\r\n## Code Review\r\n\r\n- Keep PRs вүӨ ~300 lines where possible\r\n- Assign a reviewer from the area owner (@Monkshark if unsure)\r\n- Merge only after CI is fully green\r\n\r\n## Issue Reporting\r\n\r\n- Bugs: reproduction steps, expected, actual, environment (OS / Flutter / app version)\r\n- Feature proposals: problem statement, proposed solution, alternatives considered\r\n\r\n## Related Docs\r\n- [Deployment Guide](./DEPLOY_en.md)\r\n- [User Guide](./USER_GUIDE_en.md)\r\n- [Testing Strategy](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing_en.md)\r\n- [CI/CD Setup](https://monkshark.github.io/hansol_hs_flutter_app/#guides/cicd-setup_en.md)\r\n","data/analytics_service.md":"# AnalyticsService\r\n\r\n> `lib/data/analytics_service.dart` вҖ” Firebase Analytics мқҙлІӨнҠё лһҳнҚј\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. мқҙлІӨнҠё мқҙлҰ„ мҳӨнғҖ/мӨ‘ліө л°©м§ҖлҘј мң„н•ҙ лӘЁл“  лЎңк№…мқ„ мқҙ нҒҙлһҳмҠӨлЎң м§‘мӨ‘. лӮҙл¶Җм—җм„ң silent fail мІҳлҰ¬ (нҳём¶ңл¶Җм—җм„ң try/catch л¶Ҳн•„мҡ”)\r\n\r\n---\r\n\r\n## `observer`\r\n\r\n```dart\r\nstatic FirebaseAnalyticsObserver get observer\r\n```\r\n\r\n`MaterialApp.navigatorObservers`м—җ л“ұлЎқн•ҳл©ҙ нҷ”л©ҙ м „нҷҳ(`screen_view`) мһҗлҸҷ м¶”м Ғ\r\n\r\n---\r\n\r\n## `setUserId`\r\n\r\n```dart\r\nstatic Future<void> setUserId(String? uid)\r\n```\r\n\r\nлЎңк·ёмқё мӢң uid м„Өм •, лЎңк·ём•„мӣғ мӢң null м „лӢ¬\r\n\r\n---\r\n\r\n## `setUserProperty`\r\n\r\n```dart\r\nstatic Future<void> setUserProperty(String name, String? value)\r\n```\r\n\r\nмӮ¬мҡ©мһҗ мҶҚм„ұ м„Өм • (grade, userType л“ұ)\r\n\r\n---\r\n\r\n## мқёмҰқ мқҙлІӨнҠё\r\n\r\n| л©”м„ңл“ң | мқҙлІӨнҠёлӘ… | нҢҢлқјлҜён„° |\r\n|--------|----------|----------|\r\n| `logLogin(method)` | `login` | `{method: 'google'\\|'apple'\\|'kakao'\\|'github'}` |\r\n| `logSignUp(method)` | `sign_up` | `{method}` |\r\n| `logLogout()` | `logout` | вҖ” |\r\n\r\n---\r\n\r\n## кІҢмӢңнҢҗ мқҙлІӨнҠё\r\n\r\n| л©”м„ңл“ң | мқҙлІӨнҠёлӘ… | нҢҢлқјлҜён„° |\r\n|--------|----------|----------|\r\n| `logPostCreate(boardType, isAnonymous)` | `post_create` | `{board_type, is_anonymous}` |\r\n| `logPostView(postId)` | `post_view` | `{post_id}` |\r\n| `logCommentCreate(postId, isReply)` | `comment_create` | `{post_id, is_reply}` |\r\n| `logPostShare(postId)` | `post_share` | `{post_id}` |\r\n| `logPostReport(postId)` | `post_report` | `{post_id}` |\r\n\r\n---\r\n\r\n## м„ұм Ғ/мқјм •/кІҖмғү мқҙлІӨнҠё\r\n\r\n| л©”м„ңл“ң | мқҙлІӨнҠёлӘ… | нҢҢлқјлҜён„° |\r\n|--------|----------|----------|\r\n| `logGradeAdd(examType, subject)` | `grade_add` | `{exam_type, subject}` |\r\n| `logGradeGoalSet(subject)` | `grade_goal_set` | `{subject}` |\r\n| `logScheduleAdd()` | `schedule_add` | вҖ” |\r\n| `logDdayAdd()` | `dday_add` | вҖ” |\r\n| `logNotificationToggle(category, enabled)` | `notification_toggle` | `{category, enabled}` |\r\n| `logSearch(term)` | `search` | `{search_term}` |\r\n\r\n---\r\n\r\n## м•ұ мҲҳлӘ…мЈјкё° мқҙлІӨнҠё\r\n\r\n| л©”м„ңл“ң | мқҙлІӨнҠёлӘ… | нҢҢлқјлҜён„° |\r\n|--------|----------|----------|\r\n| `logAppOpen(source)` | `app_open` | `{source}` |\r\n| `markSessionStart()` | вҖ” | лӮҙл¶Җ нғҖмқҙлЁё мӢңмһ‘ |\r\n| `logSessionEnd()` | `session_duration` | `{seconds}` |\r\n\r\n`markSessionStart()`лҠ” м„ём…ҳ мӢңмһ‘ мӢңк°Ғмқ„ кё°лЎқн•ҳкі , `logSessionEnd()`к°Җ нҳём¶ңлҗҳл©ҙ кІҪкіј мӢңк°„(мҙҲ)мқ„ `session_duration` мқҙлІӨнҠёлЎң м „мҶЎ\r\n\r\n---\r\n\r\n## кёҖ мһ‘м„ұ нҚјл„җ\r\n\r\n| л©”м„ңл“ң | мқҙлІӨнҠёлӘ… | нҢҢлқјлҜён„° |\r\n|--------|----------|----------|\r\n| `logPostStart(boardType)` | `post_start` | `{board_type}` |\r\n| `logPostDraft()` | `post_draft` | вҖ” |\r\n| `logPostSubmit(boardType)` | `post_submit` | `{board_type}` |\r\n\r\nкёҖ мһ‘м„ұ нқҗлҰ„: **post_start вҶ’ post_draft вҶ’ post_submit**. нҚјл„җ л¶„м„қмңјлЎң мқҙнғҲ кө¬к°„ нҢҢм•… к°ҖлҠҘ\r\n\r\n---\r\n\r\n## кё°нғҖ мқҙлІӨнҠё\r\n\r\n| л©”м„ңл“ң | мқҙлІӨнҠёлӘ… | нҢҢлқјлҜён„° |\r\n|--------|----------|----------|\r\n| `logFeatureDiscovery(feature)` | `feature_discovery` | `{feature}` |\r\n| `trackFirstVisit(feature)` | `feature_discovery` | `{feature}` (мөңмҙҲ 1нҡҢл§Ң) |\r\n| `logErrorShown(errorType)` | `error_shown` | `{error_type}` |\r\n\r\n`trackFirstVisit`лҠ” SharedPreferences `visited_$feature` нӮӨлҘј нҷ•мқён•ҳм—¬ мөңмҙҲ л°©л¬ё мӢңм—җл§Ң `feature_discovery` мқҙлІӨнҠёлҘј кё°лЎқ\r\n\r\n---\r\n\r\n## мӮ¬мҡ©мһҗ мҲҳм§‘ лҸҷмқҳ (opt-out)\r\n\r\nAnalyticsService мҷёл¶Җм—җм„ң мҲҳм§‘ м—¬л¶ҖлҘј м ңм–ҙ:\r\n\r\n- **`main.dart` `_deferredInit()`**: `SharedPreferences.getBool('analyticsEnabled')`мҷҖ лҰҙлҰ¬мҠӨ лӘЁл“ң м—¬л¶ҖлҘј мЎ°н•©н•ҳм—¬ `FirebaseAnalytics.instance.setAnalyticsCollectionEnabled()` нҳём¶ң\r\n- **м„Өм • нҷ”л©ҙ**: мӮ¬мҡ©мһҗк°Җ нҶ кёҖлЎң analytics мҲҳм§‘мқ„ мјңкі  лҒҢ мҲҳ мһҲмңјл©°, ліҖкІҪ мӢң `SharedPreferences`м—җ м ҖмһҘ нӣ„ мҰүмӢң `setAnalyticsCollectionEnabled()`лҘј нҳём¶ң\r\n\r\nкё°ліёк°’мқҖ лҰҙлҰ¬мҠӨ л№Ңл“ңм—җм„ң нҷңм„ұнҷ”. мӮ¬мҡ©мһҗк°Җ м„Өм •м—җм„ң лҒ„л©ҙ мқҙнӣ„ лӘЁл“  мқҙлІӨнҠё м „мҶЎмқҙ мӨ‘лӢЁлҗЁ\r\n\r\n---\r\n\r\n## лӮҙл¶Җ кө¬мЎ°\r\n\r\n```dart\r\nstatic Future<void> _log(String name, [Map<String, Object>? params]) async {\r\n  try {\r\n    await _instance.logEvent(name: name, parameters: params);\r\n  } catch (e) {\r\n    if (kDebugMode) debugPrint('[Analytics] $name failed: $e');\r\n  }\r\n}\r\n```\r\n\r\nлӘЁл“  public л©”м„ңл“ңк°Җ `_log`лҘј нҶөн•ҙ мқҙлІӨнҠёлҘј л°ңн–ү. лҰҙлҰ¬мҠӨ л№Ңл“ңм—җм„ң мӢӨнҢЁн•ҙлҸ„ м•ұм—җ мҳҒн–Ҙ м—ҶмқҢ\r\n","data/analytics_service_en.md":"# AnalyticsService\r\n\r\n> н•ңкөӯм–ҙ: [analytics_service.md](./analytics_service.md)\r\n\r\n> `lib/data/analytics_service.dart` вҖ” Firebase Analytics event wrapper\r\n\r\nAll methods are `static`. All logging is centralized in this class to prevent event name typos and duplicates. Failures are handled silently inside (no try/catch needed at the call site).\r\n\r\n---\r\n\r\n## `observer`\r\n\r\n```dart\r\nstatic FirebaseAnalyticsObserver get observer\r\n```\r\n\r\nRegister on `MaterialApp.navigatorObservers` to automatically track screen transitions (`screen_view`).\r\n\r\n---\r\n\r\n## `setUserId`\r\n\r\n```dart\r\nstatic Future<void> setUserId(String? uid)\r\n```\r\n\r\nSet the uid on login, pass null on logout.\r\n\r\n---\r\n\r\n## `setUserProperty`\r\n\r\n```dart\r\nstatic Future<void> setUserProperty(String name, String? value)\r\n```\r\n\r\nSet user properties (grade, userType, etc.).\r\n\r\n---\r\n\r\n## Auth events\r\n\r\n| Method | Event name | Parameters |\r\n|--------|----------|----------|\r\n| `logLogin(method)` | `login` | `{method: 'google'\\|'apple'\\|'kakao'\\|'github'}` |\r\n| `logSignUp(method)` | `sign_up` | `{method}` |\r\n| `logLogout()` | `logout` | вҖ” |\r\n\r\n---\r\n\r\n## Board events\r\n\r\n| Method | Event name | Parameters |\r\n|--------|----------|----------|\r\n| `logPostCreate(boardType, isAnonymous)` | `post_create` | `{board_type, is_anonymous}` |\r\n| `logPostView(postId)` | `post_view` | `{post_id}` |\r\n| `logCommentCreate(postId, isReply)` | `comment_create` | `{post_id, is_reply}` |\r\n| `logPostShare(postId)` | `post_share` | `{post_id}` |\r\n| `logPostReport(postId)` | `post_report` | `{post_id}` |\r\n\r\n---\r\n\r\n## Grade/Schedule/Search events\r\n\r\n| Method | Event name | Parameters |\r\n|--------|----------|----------|\r\n| `logGradeAdd(examType, subject)` | `grade_add` | `{exam_type, subject}` |\r\n| `logGradeGoalSet(subject)` | `grade_goal_set` | `{subject}` |\r\n| `logScheduleAdd()` | `schedule_add` | вҖ” |\r\n| `logDdayAdd()` | `dday_add` | вҖ” |\r\n| `logNotificationToggle(category, enabled)` | `notification_toggle` | `{category, enabled}` |\r\n| `logSearch(term)` | `search` | `{search_term}` |\r\n\r\n---\r\n\r\n## App lifecycle events\r\n\r\n| Method | Event name | Parameters |\r\n|--------|----------|----------|\r\n| `logAppOpen(source)` | `app_open` | `{source}` |\r\n| `markSessionStart()` | вҖ” | Starts internal timer |\r\n| `logSessionEnd()` | `session_duration` | `{seconds}` |\r\n\r\n`markSessionStart()` records the session start time. When `logSessionEnd()` is called, the elapsed time in seconds is sent as a `session_duration` event.\r\n\r\n---\r\n\r\n## Post creation funnel\r\n\r\n| Method | Event name | Parameters |\r\n|--------|----------|----------|\r\n| `logPostStart(boardType)` | `post_start` | `{board_type}` |\r\n| `logPostDraft()` | `post_draft` | вҖ” |\r\n| `logPostSubmit(boardType)` | `post_submit` | `{board_type}` |\r\n\r\nPost creation flow: **post_start вҶ’ post_draft вҶ’ post_submit**. Funnel analysis can identify drop-off points.\r\n\r\n---\r\n\r\n## Other events\r\n\r\n| Method | Event name | Parameters |\r\n|--------|----------|----------|\r\n| `logFeatureDiscovery(feature)` | `feature_discovery` | `{feature}` |\r\n| `trackFirstVisit(feature)` | `feature_discovery` | `{feature}` (first visit only) |\r\n| `logErrorShown(errorType)` | `error_shown` | `{error_type}` |\r\n\r\n`trackFirstVisit` checks SharedPreferences key `visited_$feature` and logs the `feature_discovery` event only on the first visit.\r\n\r\n---\r\n\r\n## User collection consent (opt-out)\r\n\r\nAnalytics collection is controlled outside of AnalyticsService:\r\n\r\n- **`main.dart` `_deferredInit()`**: Combines `SharedPreferences.getBool('analyticsEnabled')` with a release mode check to call `FirebaseAnalytics.instance.setAnalyticsCollectionEnabled()`.\r\n- **Settings screen**: The user can toggle analytics collection on/off. Changes are saved to `SharedPreferences` and `setAnalyticsCollectionEnabled()` is called immediately.\r\n\r\nCollection is enabled by default in release builds. If the user disables it in settings, all subsequent event transmission stops.\r\n\r\n---\r\n\r\n## Internal structure\r\n\r\n```dart\r\nstatic Future<void> _log(String name, [Map<String, Object>? params]) async {\r\n  try {\r\n    await _instance.logEvent(name: name, parameters: params);\r\n  } catch (e) {\r\n    if (kDebugMode) debugPrint('[Analytics] $name failed: $e');\r\n  }\r\n}\r\n```\r\n\r\nAll public methods publish events through `_log`. Failures in release builds do not affect the app.\r\n","data/api_strings.md":"# ApiStrings\n\n> `lib/data/api_strings.dart` вҖ” API кі„мёө м„јнӢ°л„җ л¬ёмһҗм—ҙ мғҒмҲҳ\n\nAPI мқ‘лӢөм—җм„ң лҚ°мқҙн„° мң л¬ҙлҘј нҢҗлі„н•ҳлҠ” н•ңкөӯм–ҙ л¬ёмһҗм—ҙмқ„ мғҒмҲҳлЎң кҙҖлҰ¬. UI н‘ңмӢңмҡ©мқҙ м•„лӢҢ `==` л№„көҗм—җ мӮ¬мҡ©лҗҳлҜҖлЎң l10n лҢҖмғҒмқҙ м•„лӢҳ\n\n---\n\n## мҡ©лҸ„\n\nAPIм—җм„ң \"лҚ°мқҙн„° м—ҶмқҢ\" лҳҗлҠ” \"мқён„°л„· м—ҶмқҢ\" мғҒнғңлҘј л°ҳнҷҳн•  л•Ң н•ҳл“ңмҪ”л”©лҗң н•ңкөӯм–ҙ л¬ёмһҗм—ҙ лҢҖмӢ  мғҒмҲҳлҘј мӮ¬мҡ©н•ҳм—¬ мҳӨнғҖВ·л¶Ҳмқјм№ҳлҘј л°©м§Җ\n\n```dart\n// Before\nif (result == 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.') { ... }\n\n// After\nif (result == ApiStrings.mealNoData) { ... }\n```\n\n---\n\n## мғҒмҲҳ лӘ©лЎқ\n\n### кёүмӢқ (Meal)\n\n| мғҒмҲҳ | к°’ | мӮ¬мҡ© мң„м№ҳ |\n|------|------|----------|\n| `mealNoData` | `'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.'` | [meal_data_api](../api/meal_data_api.md), meal_card, meal_screen |\n| `mealNoDataLegacy` | `'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ'` | meal_screen (л§Ҳм№Ён‘ң м—ҶлҠ” кө¬лІ„м „ нҳёнҷҳ) |\n| `mealNoInternet` | `'мӢқлӢЁ м •ліҙлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”'` | [meal_data_api](../api/meal_data_api.md) |\n\n### мӢңк°„н‘ң (Timetable)\n\n| мғҒмҲҳ | к°’ | мӮ¬мҡ© мң„м№ҳ |\n|------|------|----------|\n| `timetableNoInternet` | `'мӢңк°„н‘ңлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”'` | [timetable_data_api](../api/timetable_data_api.md) |\n| `timetableNoData` | `'м •ліҙ м—ҶмқҢ'` | [timetable_data_api](../api/timetable_data_api.md) |\n\n### н•ҷмӮ¬мқјм • (Notice)\n\n| мғҒмҲҳ | к°’ | мӮ¬мҡ© мң„м№ҳ |\n|------|------|----------|\n| `noticeNoInternet` | `'н•ҷмӮ¬мқјм •мқ„ нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”'` | [notice_data_api](../api/notice_data_api.md) |\n| `noticeNoData` | `'н•ҷмӮ¬мқјм •мқҙ м—ҶмҠөлӢҲлӢӨ'` | [notice_data_api](../api/notice_data_api.md), notice_screen |\n\n---\n\n## м„Өкі„ м°ёкі \n\n- **l10nкіј лі„к°ң**: мқҙ л¬ёмһҗм—ҙмқҖ API л°ҳнҷҳк°’кіјмқҳ `==` л№„көҗмҡ©мқҙлҜҖлЎң лІҲм—ӯн•ҳл©ҙ м•Ҳ лҗЁ. UIм—җ л…ём¶ңлҗҳлҠ” л¬ёмһҗм—ҙмқҖ `AppLocalizations`м—җм„ң лі„лҸ„ кҙҖлҰ¬\n- `mealNoDataLegacy`: л§Ҳм№Ён‘ң мң л¬ҙ м°ЁмқҙлЎң мқён•ң н•ҳмң„ нҳёнҷҳ. мӢ к·ң мҪ”л“ңлҠ” `mealNoData` мӮ¬мҡ©\n","data/api_strings_en.md":"# ApiStrings\r\n\r\n> н•ңкөӯм–ҙ: [api_strings.md](./api_strings.md)\r\n\r\n> `lib/data/api_strings.dart` вҖ” Sentinel string constants for the API layer\r\n\r\nManages Korean strings used to determine data presence in API responses as constants. Not subject to l10n since they are used for `==` comparison, not UI display.\r\n\r\n---\r\n\r\n## Purpose\r\n\r\nPrevent typos and mismatches by using constants instead of hardcoded Korean strings when an API returns a \"no data\" or \"no internet\" state.\r\n\r\n```dart\r\n// Before\r\nif (result == 'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.') { ... }\r\n\r\n// After\r\nif (result == ApiStrings.mealNoData) { ... }\r\n```\r\n\r\n---\r\n\r\n## Constant list\r\n\r\n### Meal\r\n\r\n| Constant | Value | Usage |\r\n|------|------|----------|\r\n| `mealNoData` | `'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.'` | [meal_data_api](../api/meal_data_api.md), meal_card, meal_screen |\r\n| `mealNoDataLegacy` | `'кёүмӢқ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ'` | meal_screen (legacy compatibility without trailing period) |\r\n| `mealNoInternet` | `'мӢқлӢЁ м •ліҙлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”'` | [meal_data_api](../api/meal_data_api.md) |\r\n\r\n### Timetable\r\n\r\n| Constant | Value | Usage |\r\n|------|------|----------|\r\n| `timetableNoInternet` | `'мӢңк°„н‘ңлҘј нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”'` | [timetable_data_api](../api/timetable_data_api.md) |\r\n| `timetableNoData` | `'м •ліҙ м—ҶмқҢ'` | [timetable_data_api](../api/timetable_data_api.md) |\r\n\r\n### Notice (academic calendar)\r\n\r\n| Constant | Value | Usage |\r\n|------|------|----------|\r\n| `noticeNoInternet` | `'н•ҷмӮ¬мқјм •мқ„ нҷ•мқён•ҳл Өл©ҙ мқён„°л„·м—җ м—°кІ°н•ҳм„ёмҡ”'` | [notice_data_api](../api/notice_data_api.md) |\r\n| `noticeNoData` | `'н•ҷмӮ¬мқјм •мқҙ м—ҶмҠөлӢҲлӢӨ'` | [notice_data_api](../api/notice_data_api.md), notice_screen |\r\n\r\n---\r\n\r\n## Design notes\r\n\r\n- **Separate from l10n**: These strings are used for `==` comparison against API return values and must not be translated. Strings exposed in the UI are managed separately in `AppLocalizations`.\r\n- `mealNoDataLegacy`: Backward compatibility due to the difference in trailing period. New code should use `mealNoData`.\r\n","data/auth_repository.md":"# AuthRepository\r\n\r\n> `lib/data/auth_repository.dart` вҖ” мқёмҰқ/н”„лЎңн•„ Repository мқён„°нҺҳмқҙмҠӨ\r\n\r\n[`AuthService`](auth_service.md)мқҳ м •м Ғ л©”м„ңл“ңлҘј мқёмҠӨн„ҙмҠӨ л©”м„ңл“ңлЎң к°җмӢё GetIt DIм—җ л“ұлЎқ. н…ҢмҠӨнҠём—җм„ң mock мЈјмһ… к°ҖлҠҘ\r\n\r\n---\r\n\r\n## м„Өкі„ л°°кІҪ\r\n\r\n```\r\nAuthService (м •м Ғ л©”м„ңл“ң, 25к°ң нҢҢмқјм—җм„ң м§Ғм ‘ нҳём¶ң)\r\n    вҶ‘\r\nAuthRepository (мқёмҠӨн„ҙмҠӨ мқён„°нҺҳмқҙмҠӨ)\r\n    вҶ‘\r\nFirebaseAuthRepository (AuthServiceм—җ мң„мһ„)\r\n```\r\n\r\n> рҹ“Һ [`AuthService`](auth_service.md)\r\n\r\nм •м Ғ л©”м„ңл“ңлҘј н•ң лІҲм—җ м ңкұ°н•ҳл©ҙ 25к°ң нҢҢмқјмқ„ лҸҷмӢңм—җ мҲҳм •н•ҙм•ј н•ҳлҜҖлЎң, л‘җ мқён„°нҺҳмқҙмҠӨлҘј **лі‘н–ү**:\r\n- **мӢ к·ң мҪ”л“ң / Riverpod Provider** вҶ’ `AuthRepository` мӮ¬мҡ©\r\n- **кё°мЎҙ нҳём¶ңмІҳ** вҶ’ [`AuthService`](auth_service.md) м§Ғм ‘ нҳём¶ң (м җм§„м Ғ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ)\r\n\r\n---\r\n\r\n## `AuthRepository` (м¶”мғҒ нҒҙлһҳмҠӨ)\r\n\r\n```dart\r\nabstract class AuthRepository {\r\n  User? get currentUser;\r\n  bool get isLoggedIn;\r\n\r\n  Future<UserProfile?> getUserProfile();\r\n  Future<UserProfile?> getCachedProfile();\r\n  Future<void> saveUserProfile(UserProfile profile);\r\n  Future<bool> hasProfile();\r\n  Future<bool> isApproved();\r\n  Future<bool> isManager();\r\n  Future<void> signOut();\r\n  void clearProfileCache();\r\n}\r\n```\r\n\r\n[`AuthService`](auth_service.md)мқҳ н•өмӢ¬ л©”м„ңл“ңл§Ң мқён„°нҺҳмқҙмҠӨлЎң м¶”м¶ң. лЎңк·ёмқё л©”м„ңл“ң(signInWithGoogle л“ұ)лҠ” UIм—җм„ңл§Ң м§Ғм ‘ нҳём¶ңн•ҳлҜҖлЎң м ңмҷё\r\n\r\n---\r\n\r\n## `FirebaseAuthRepository` (кё°ліё кө¬нҳ„)\r\n\r\n```dart\r\nclass FirebaseAuthRepository implements AuthRepository {\r\n  const FirebaseAuthRepository();\r\n\r\n  @override\r\n  User? get currentUser => AuthService.currentUser;\r\n\r\n  @override\r\n  Future<UserProfile?> getUserProfile() => AuthService.getUserProfile();\r\n\r\n  @override\r\n  Future<UserProfile?> getCachedProfile() => AuthService.getCachedProfile();\r\n\r\n  // ... лӮҳлЁём§Җ лӘЁл‘җ AuthService м •м Ғ л©”м„ңл“ңм—җ мң„мһ„\r\n}\r\n```\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ [`AuthService`](auth_service.md)мқҳ м •м Ғ л©”м„ңл“ңлҘј к·ёлҢҖлЎң нҳём¶ң. `const` мғқм„ұмһҗлЎң мқёмҠӨн„ҙмҠӨ мғқм„ұ л№„мҡ© м—ҶмқҢ\r\n\r\n---\r\n\r\n## GetIt м ‘к·јмһҗ\r\n\r\n```dart\r\nAuthRepository get authRepository => GetIt.I<AuthRepository>();\r\n```\r\n\r\nм „м—ӯ getter. `service_locator.dart`м—җм„ң `FirebaseAuthRepository`лЎң л“ұлЎқлҗЁ:\r\n```dart\r\ngetIt.registerLazySingleton<AuthRepository>(\r\n  () => const FirebaseAuthRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## н…ҢмҠӨнҠё нҷңмҡ©\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n\r\n// лҳҗлҠ” Riverpod overrides\r\nProviderScope(\r\n  overrides: [authRepositoryProvider.overrideWithValue(mockRepo)],\r\n  child: ...,\r\n);\r\n```\r\n\r\n`MockAuthRepository`лҘј мЈјмһ…н•ҙ Firestore/Firebase Auth мқҳмЎҙ м—Ҷмқҙ лӢЁмң„ н…ҢмҠӨнҠё к°ҖлҠҘ\r\n","data/auth_repository_en.md":"# AuthRepository\r\n\r\n> н•ңкөӯм–ҙ: [auth_repository.md](./auth_repository.md)\r\n\r\n> `lib/data/auth_repository.dart` вҖ” Auth/profile Repository interface\r\n\r\nWraps the static methods of [`AuthService`](auth_service_en.md) as instance methods and registers them with GetIt DI. Allows mock injection in tests.\r\n\r\n---\r\n\r\n## Design background\r\n\r\n```\r\nAuthService (static methods, called directly from 25 files)\r\n    вҶ‘\r\nAuthRepository (instance interface)\r\n    вҶ‘\r\nFirebaseAuthRepository (delegates to AuthService)\r\n```\r\n\r\n> рҹ“Һ [`AuthService`](auth_service_en.md)\r\n\r\nRemoving the static methods all at once would require modifying 25 files simultaneously, so the two interfaces run **in parallel**:\r\n- **New code / Riverpod Providers** вҶ’ use `AuthRepository`\r\n- **Existing call sites** вҶ’ call [`AuthService`](auth_service_en.md) directly (gradual migration)\r\n\r\n---\r\n\r\n## `AuthRepository` (abstract class)\r\n\r\n```dart\r\nabstract class AuthRepository {\r\n  User? get currentUser;\r\n  bool get isLoggedIn;\r\n\r\n  Future<UserProfile?> getUserProfile();\r\n  Future<UserProfile?> getCachedProfile();\r\n  Future<void> saveUserProfile(UserProfile profile);\r\n  Future<bool> hasProfile();\r\n  Future<bool> isApproved();\r\n  Future<bool> isManager();\r\n  Future<void> signOut();\r\n  void clearProfileCache();\r\n}\r\n```\r\n\r\nOnly the core methods of [`AuthService`](auth_service_en.md) are extracted into the interface. Login methods (signInWithGoogle, etc.) are called directly only from the UI and are excluded.\r\n\r\n---\r\n\r\n## `FirebaseAuthRepository` (default implementation)\r\n\r\n```dart\r\nclass FirebaseAuthRepository implements AuthRepository {\r\n  const FirebaseAuthRepository();\r\n\r\n  @override\r\n  User? get currentUser => AuthService.currentUser;\r\n\r\n  @override\r\n  Future<UserProfile?> getUserProfile() => AuthService.getUserProfile();\r\n\r\n  @override\r\n  Future<UserProfile?> getCachedProfile() => AuthService.getCachedProfile();\r\n\r\n  // ... all remaining methods delegate to AuthService static methods\r\n}\r\n```\r\n\r\nEvery method calls an [`AuthService`](auth_service_en.md) static method directly. `const` constructor means no instance creation cost.\r\n\r\n---\r\n\r\n## GetIt accessor\r\n\r\n```dart\r\nAuthRepository get authRepository => GetIt.I<AuthRepository>();\r\n```\r\n\r\nGlobal getter. Registered as `FirebaseAuthRepository` in `service_locator.dart`:\r\n```dart\r\ngetIt.registerLazySingleton<AuthRepository>(\r\n  () => const FirebaseAuthRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## Test usage\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n\r\n// or Riverpod overrides\r\nProviderScope(\r\n  overrides: [authRepositoryProvider.overrideWithValue(mockRepo)],\r\n  child: ...,\r\n);\r\n```\r\n\r\nInjecting `MockAuthRepository` enables unit testing without Firestore/Firebase Auth dependencies.\r\n","data/auth_service.md":"# AuthService\r\n\r\n> `lib/data/auth_service.dart` вҖ” Firebase мқёмҰқ + н”„лЎңн•„ CRUD\r\n\r\n`UserProfile` лӘЁлҚёкіј `AuthService` нҒҙлһҳмҠӨлҘј нҸ¬н•Ё. лӘЁл“  л©”м„ңл“ңк°Җ `static`\r\n\r\n---\r\n\r\n## UserProfile (лҚ°мқҙн„° лӘЁлҚё)\r\n\r\n```dart\r\nclass UserProfile {\r\n  final String uid;\r\n  final String name;\r\n  final String studentId;\r\n  final int grade;\r\n  final int classNum;\r\n  final String email;\r\n  final bool approved;\r\n  final String role;                // 'user' | 'moderator' | 'auditor' | 'manager' | 'admin'\r\n  final String userType;            // 'student' | 'graduate' | 'teacher' | 'parent'\r\n  final String lastProfileUpdate;\r\n  final int? graduationYear;\r\n  final String? teacherSubject;\r\n  final DateTime? suspendedUntil;\r\n  final List<String> blockedUsers;\r\n  final String loginProvider;\r\n  final String? profilePhotoUrl;\r\n  final String verificationStatus;  // 'pending' | 'verified'\r\n  final String? suspendReason;\r\n}\r\n```\r\n\r\n### кі„мӮ° н”„лЎңнҚјнӢ°\r\n\r\n| н”„лЎңнҚјнӢ° | лЎңм§Ғ |\r\n|----------|------|\r\n| `isAdmin` | `role == 'admin'` |\r\n| `isManager` | `role == 'manager' \\|\\| isAdmin` |\r\n| `isModerator` | `role == 'moderator' \\|\\| isManager` |\r\n| `isAuditor` | `role == 'auditor' \\|\\| isManager` |\r\n| `isStaff` | `isModerator \\|\\| isAuditor` (= admin/manager/moderator/auditor) |\r\n| `isSuspended` | `suspendedUntil != null && DateTime.now().isBefore(suspendedUntil!)` |\r\n| `isVerified` | `verificationStatus == 'verified'` |\r\n| `canWrite` | `isVerified && !isSuspended` |\r\n| `isStudent` / `isGraduate` / `isTeacher` / `isParent` | `userType == '...'` |\r\n| `displayName` | userTypeлі„ л¶„кё°: мЎём—…мғқ/көҗмӮ¬/н•ҷл¶ҖлӘЁ м ‘л‘җм–ҙ, н•ҷмғқмқҖ `studentId + name` |\r\n| `localizedDisplayName(l)` | `displayName`мқҳ лӢӨкөӯм–ҙ лІ„м „ (`l10n` мӮ¬мҡ©) |\r\n| `needsProfileUpdate` | н•ҷмғқ/көҗмӮ¬л§Ң н•ҙлӢ№, 3мӣ” 1~14мқј + `lastProfileUpdate != мҳ¬н•ҙ`л©ҙ true |\r\n| `needsGraduateCheck` | 3н•ҷл…„ н•ҷмғқмқҙ мғҲ н•ҷкё°м—җ мЎём—… нҷ•мқёмқҙ н•„мҡ”н•ңм§Җ (3мӣ” 1~14мқј + мһ‘л…„ лҚ°мқҙн„°) |\r\n\r\n---\r\n\r\n## `signInWithGoogle`\r\n\r\n```dart\r\nstatic Future<User?> signInWithGoogle()\r\n```\r\n\r\n**м„ӨлӘ…**: Google мҶҢм…ң лЎңк·ёмқёмңјлЎң Firebase мқёмҰқмқ„ мҲҳн–үн•Ё\r\n\r\n1. `GoogleSignIn().signIn()`мңјлЎң Google кі„м • м„ нғқ нҢқм—…:\r\n   ```dart\r\n   final googleUser = await _googleSignIn.signIn();\r\n   if (googleUser == null) return null;  // мӮ¬мҡ©мһҗ м·ЁмҶҢ\r\n   ```\r\n\r\n2. Google OAuth нҶ нҒ°мңјлЎң Firebase credential мғқм„ұ:\r\n   ```dart\r\n   final googleAuth = await googleUser.authentication;\r\n   final credential = GoogleAuthProvider.credential(\r\n     accessToken: googleAuth.accessToken,\r\n     idToken: googleAuth.idToken,\r\n   );\r\n   ```\r\n\r\n3. Firebaseм—җ лЎңк·ёмқё нӣ„ Analytics мқҙлІӨнҠё л°ңн–ү:\r\n   ```dart\r\n   final result = await _auth.signInWithCredential(credential);\r\n   unawaited(AnalyticsService.logLogin('google'));\r\n   unawaited(AnalyticsService.setUserId(result.user!.uid));\r\n   ```\r\n\r\n**л°ҳнҷҳк°’**: `User?` вҖ” м„ұкіө мӢң Firebase User, м·ЁмҶҢ/м—җлҹ¬ мӢң null\r\n\r\n---\r\n\r\n## `signInWithApple`\r\n\r\n```dart\r\nstatic Future<User?> signInWithApple()\r\n```\r\n\r\n**м„ӨлӘ…**: Apple лЎңк·ёмқёмқ„ мҲҳн–үн•Ё. nonce кё°л°ҳ ліҙм•Ҳ мІҳлҰ¬ нҸ¬н•Ё\r\n\r\n1. ліҙм•Ҳмҡ© лһңлҚӨ nonce мғқм„ұ л°Ҹ SHA-256 н•ҙмӢұ:\r\n   ```dart\r\n   final rawNonce = _generateNonce();\r\n   final nonce = _sha256ofString(rawNonce);\r\n   ```\r\n\r\n2. Apple ID credential мҡ”мІӯ (email, fullName мҠӨмҪ”н”„):\r\n   ```dart\r\n   final appleCredential = await SignInWithApple.getAppleIDCredential(\r\n     scopes: [AppleIDAuthorizationScopes.email, AppleIDAuthorizationScopes.fullName],\r\n     nonce: nonce,\r\n   );\r\n   ```\r\n\r\n3. OAuthProviderлЎң Firebase credential ліҖнҷҳ нӣ„ лЎңк·ёмқё:\r\n   ```dart\r\n   final oauthCredential = OAuthProvider('apple.com').credential(\r\n     idToken: appleCredential.identityToken,\r\n     rawNonce: rawNonce,\r\n   );\r\n   ```\r\n\r\n4. мөңмҙҲ лЎңк·ёмқё мӢң Appleм—җм„ң м ңкіөн•ң мқҙлҰ„мқ„ displayNameм—җ м„Өм •:\r\n   ```dart\r\n   if (appleCredential.givenName != null) {\r\n     await result.user?.updateDisplayName(...);\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `signInWithKakao`\r\n\r\n```dart\r\nstatic Future<User?> signInWithKakao(String kakaoAccessToken)\r\n```\r\n\r\n**м„ӨлӘ…**: м№ҙм№ҙмҳӨ лЎңк·ёмқё. Cloud Functionмқ„ кұ°міҗ Firebase Custom TokenмңјлЎң ліҖнҷҳн•Ё\r\n\r\n1. м№ҙм№ҙмҳӨ SDKм—җм„ң л°ӣмқҖ accessTokenмқ„ Cloud Functionм—җ POST:\r\n   ```dart\r\n   final response = await http.post(\r\n     Uri.parse('https://.../kakaoCustomAuth'),\r\n     body: jsonEncode({'token': kakaoAccessToken}),\r\n   );\r\n   ```\r\n\r\n2. Cloud Functionмқҙ л°ҳнҷҳн•ң Firebase Custom TokenмңјлЎң лЎңк·ёмқё:\r\n   ```dart\r\n   final customToken = jsonDecode(response.body)['firebaseToken'] as String;\r\n   final result = await _auth.signInWithCustomToken(customToken);\r\n   ```\r\n\r\n**нҢҢлқјлҜён„°**: `kakaoAccessToken` вҖ” м№ҙм№ҙмҳӨ SDK `LoginResult`м—җм„ң м–»мқҖ м•Ўм„ёмҠӨ нҶ нҒ°\r\n\r\n---\r\n\r\n## `signInWithGitHub`\r\n\r\n```dart\r\nstatic Future<User?> signInWithGitHub()\r\n```\r\n\r\n**м„ӨлӘ…**: GitHub лЎңк·ёмқё. Firebase лӮҙмһҘ `signInWithProvider`лҘј мӮ¬мҡ©н•Ё\r\n\r\n```dart\r\nfinal githubProvider = GithubAuthProvider();\r\nfinal result = await _auth.signInWithProvider(githubProvider);\r\n```\r\n\r\nлі„лҸ„ м„ңлІ„ м—Ҷмқҙ Firebaseк°Җ OAuth н”ҢлЎңмҡ°лҘј м§Ғм ‘ мІҳлҰ¬\r\n\r\n---\r\n\r\n## `signOut`\r\n\r\n```dart\r\nstatic Future<void> signOut()\r\n```\r\n\r\nGoogleкіј Firebase лӘЁл‘җ лЎңк·ём•„мӣғ. Analyticsм—җ лЎңк·ём•„мӣғ мқҙлІӨнҠё л°ңн–ү\r\n\r\n```dart\r\nunawaited(AnalyticsService.logLogout());\r\nawait _googleSignIn.signOut();\r\nawait _auth.signOut();\r\n```\r\n\r\n---\r\n\r\n## `getUserProfile`\r\n\r\n```dart\r\nstatic Future<UserProfile?> getUserProfile()\r\n```\r\n\r\nFirestore `users/{uid}` л¬ём„ңм—җм„ң н”„лЎңн•„мқ„ мЎ°нҡҢн•Ё. мәҗмӢң м—Ҷмқҙ л§ӨлІҲ м§Ғм ‘ мЎ°нҡҢ\r\n\r\n---\r\n\r\n## `saveUserProfile`\r\n\r\n```dart\r\nstatic Future<void> saveUserProfile(UserProfile profile)\r\n```\r\n\r\nFirestore `users/{uid}`м—җ н”„лЎңн•„мқ„ м ҖмһҘн•Ё. `SetOptions(merge: true)`лЎң кё°мЎҙ н•„л“ң ліҙмЎҙ\r\n\r\n---\r\n\r\n## `hasProfile`\r\n\r\n```dart\r\nstatic Future<bool> hasProfile()\r\n```\r\n\r\nн”„лЎңн•„ л¬ём„ңк°Җ мЎҙмһ¬н•ҳкі  `name` н•„л“ңк°Җ мһҲлҠ”м§Җ нҷ•мқё. лЎңк·ёмқё м§Ғнӣ„ н”„лЎңн•„ м„Өм • нҷ”л©ҙ л¶„кё°м—җ мӮ¬мҡ©\r\n\r\n---\r\n\r\n## `isApproved`\r\n\r\n```dart\r\nstatic Future<bool> isApproved()\r\n```\r\n\r\n**м„ӨлӘ…**: мӮ¬мҡ©мһҗк°Җ мҠ№мқё мғҒнғңмқём§Җ нҷ•мқён•Ё\r\n\r\n```dart\r\nif (profile.isSuspended) return false;\r\nreturn profile.approved || profile.isStaff;\r\n```\r\n\r\nм •м§Җ мғҒнғңл©ҙ `false`, staff(admin/manager/moderator/auditor)лҠ” мҠ№мқё л¶Ҳн•„мҡ”\r\n\r\n---\r\n\r\n## `getSuspendedMessage`\r\n\r\n```dart\r\nstatic Future<String?> getSuspendedMessage()\r\n```\r\n\r\n**м„ӨлӘ…**: м •м§Җ мһ”м—¬ мӢңк°„мқ„ н•ңкөӯм–ҙ л¬ёмһҗм—ҙлЎң л°ҳнҷҳн•Ё\r\n\r\n```dart\r\nfinal diff = profile.suspendedUntil!.difference(DateTime.now());\r\n// вҶ’ \"2мқј 3мӢңк°„ 15л¶„\" нҳ•нғң\r\n```\r\n\r\nм •м§Җ мғҒнғңк°Җ м•„лӢҲл©ҙ null\r\n\r\n---\r\n\r\n## `getCachedProfile`\r\n\r\n```dart\r\nstatic Future<UserProfile?> getCachedProfile()\r\n```\r\n\r\n**м„ӨлӘ…**: 5л¶„ TTL л©”лӘЁлҰ¬ мәҗмӢңлЎң н”„лЎңн•„мқ„ мЎ°нҡҢн•Ё\r\n\r\n```dart\r\nif (_cachedProfile != null && _cacheTime != null &&\r\n    DateTime.now().difference(_cacheTime!).inMinutes < 5) {\r\n  return _cachedProfile;\r\n}\r\n_cachedProfile = await getUserProfile();\r\n_cacheTime = DateTime.now();\r\n```\r\n\r\nкІҢмӢңнҢҗ мһ‘м„ұ, лҢ“кёҖ л“ұ л№ҲлІҲн•ң н”„лЎңн•„ м°ёмЎ° мӢң Firestore нҳём¶ңмқ„ мӨ„мһ„\r\n\r\n---\r\n\r\n## `clearProfileCache`\r\n\r\n```dart\r\nstatic void clearProfileCache()\r\n```\r\n\r\nн”„лЎңн•„ мҲҳм • нӣ„ нҳём¶ң. `_cachedProfile`кіј `_cacheTime`мқ„ nullлЎң мҙҲкё°нҷ”\r\n\r\n---\r\n\r\n## `refreshCustomClaims`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> refreshCustomClaims()\r\n```\r\n\r\n**м„ӨлӘ…**: ID нҶ нҒ°мқ„ к°•м ң к°ұмӢ н•ҙ мөңмӢ  Custom ClaimsлҘј к°Җм ёмҳҙ\r\n\r\n```dart\r\nfinal result = await user.getIdTokenResult(true);  // forceRefresh\r\nreturn result.claims;\r\n```\r\n\r\nCloud Function `onUserUpdated`к°Җ `setCustomUserClaims`лҘј нҳём¶ңн•ң л’Ө, нҒҙлқјмқҙм–ёнҠём—җм„ң мқҙ л©”м„ңл“ңлҘј нҳём¶ңн•ҙм•ј ліҖкІҪлҗң role/approvedк°Җ мҰүмӢң л°ҳмҳҒлҗЁ\r\n\r\n---\r\n\r\n## лӮҙл¶Җ мң нӢёлҰ¬нӢ°\r\n\r\n| н•ЁмҲҳ | м„ӨлӘ… |\r\n|------|------|\r\n| `_generateNonce([length])` | ліҙм•Ҳмҡ© лһңлҚӨ л¬ёмһҗм—ҙ мғқм„ұ (Apple лЎңк·ёмқёмҡ©) |\r\n| `_sha256ofString(input)` | SHA-256 н•ҙмӢң (nonce н•ҙмӢұ) |\r\n| `setCachedProfileForTest(profile)` | `@visibleForTesting` вҖ” н…ҢмҠӨнҠёмҡ© мәҗмӢң мЈјмһ… |\r\n","data/auth_service_en.md":"# AuthService\r\n\r\n> н•ңкөӯм–ҙ: [auth_service.md](./auth_service.md)\r\n\r\n> `lib/data/auth_service.dart` вҖ” Firebase auth + profile CRUD\r\n\r\nContains the `UserProfile` model and the `AuthService` class. All methods are `static`.\r\n\r\n---\r\n\r\n## UserProfile (data model)\r\n\r\n```dart\r\nclass UserProfile {\r\n  final String uid;\r\n  final String name;\r\n  final String studentId;\r\n  final int grade;\r\n  final int classNum;\r\n  final String email;\r\n  final bool approved;\r\n  final String role;                // 'user' | 'moderator' | 'auditor' | 'manager' | 'admin'\r\n  final String userType;            // 'student' | 'graduate' | 'teacher' | 'parent'\r\n  final String lastProfileUpdate;\r\n  final int? graduationYear;\r\n  final String? teacherSubject;\r\n  final DateTime? suspendedUntil;\r\n  final List<String> blockedUsers;\r\n  final String loginProvider;\r\n  final String? profilePhotoUrl;\r\n  final String verificationStatus;  // 'pending' | 'verified'\r\n  final String? suspendReason;\r\n}\r\n```\r\n\r\n### Computed properties\r\n\r\n| Property | Logic |\r\n|----------|------|\r\n| `isAdmin` | `role == 'admin'` |\r\n| `isManager` | `role == 'manager' \\|\\| isAdmin` |\r\n| `isModerator` | `role == 'moderator' \\|\\| isManager` |\r\n| `isAuditor` | `role == 'auditor' \\|\\| isManager` |\r\n| `isStaff` | `isModerator \\|\\| isAuditor` (= admin/manager/moderator/auditor) |\r\n| `isSuspended` | `suspendedUntil != null && DateTime.now().isBefore(suspendedUntil!)` |\r\n| `isVerified` | `verificationStatus == 'verified'` |\r\n| `canWrite` | `isVerified && !isSuspended` |\r\n| `isStudent` / `isGraduate` / `isTeacher` / `isParent` | `userType == '...'` |\
