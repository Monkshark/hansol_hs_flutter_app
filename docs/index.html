 Future<Map<String, double>> loadJeongsiGoals()\r\nstatic Future<void> saveJeongsiGoals(Map<String, double> goals)\r\n```\r\n\r\n정시 목표(백분위 기준). 키: `SecureStorageService.keyGradeJeongsiGoals`. 로직은 `loadGoals`/`saveGoals`와 동일\r\n\r\n---\r\n\r\n## 상수 데이터\r\n\r\n### `mockSubjects`\r\n\r\n2022 개정 교육과정 수능 과목 맵:\r\n```dart\r\n{\r\n  '공통': ['국어', '수학', '영어', '한국사', '통합사회', '통합과학'],\r\n  '직업탐구': ['성공적인 직업생활'],\r\n  '제2외국어/한문 (택 1)': ['독일어', '프랑스어', ... '한문'],\r\n}\r\n```\r\n\r\n### `subjectColors`\r\n\r\n과목별 고정 색상 (차트용):\r\n```dart\r\n{'국어': 0xFFE53935, '수학': 0xFF1E88E5, '영어': 0xFF43A047, ...}\r\n```\r\n\r\n### `getSubjectColor`\r\n\r\n```dart\r\nstatic int getSubjectColor(String subject)\r\n```\r\n\r\n`subjectColors`에 없는 과목은 `subject.hashCode | 0xFF000000`로 결정론적 색상 생성\r\n","data/grade_manager_en.md":"# GradeManager\n\n> 한국어: [grade_manager.md](./grade_manager.md)\n\n> `lib/data/grade_manager.dart` — Grade CRUD, goal management, rank conversion\n\nContains the `SubjectScore`, `Exam` models and the `GradeManager` class. All methods are `static`. Data is encrypted and stored as JSON in [`SecureStorageService`](secure_storage_service.md) (not stored on the server).\n\n---\n\n## SubjectScore (data model)\n\n```dart\nclass SubjectScore {\n  final String subject;\n  final int? rawScore;        // raw score\n  final int? rank;            // rank (1~9)\n  final double? percentile;   // percentile\n  final double? standardScore; // standard score\n  final double? average;       // average\n  final String? achievement;   // achievement level A~E\n}\n```\n\nUnifies internal school grades (rawScore/average/rank/achievement) and mock exams (percentile/standardScore/rank) into a single structure.\n\n### Constants\n\n| Constant | Value |\n|------|----|\n| `rankCutoffs` | `{1: '상위 10%', 2: '상위 34%', ...}` — 5-rank ratio for internal grades |\n| `achievements` | `['A', 'B', 'C', 'D', 'E']` |\n\n---\n\n## Exam (data model)\n\n```dart\nclass Exam {\n  final String id;\n  final String type;        // 'midterm' | 'final' | 'mock' | 'private_mock'\n  final int year;\n  final int semester;       // 1 or 2\n  final int grade;          // 1, 2, 3\n  final String? mockLabel;  // mock: '3월', '6월' / private mock: custom input\n  final List<SubjectScore> scores;\n  final DateTime createdAt;\n}\n```\n\n`displayName` property: generates a Korean display name per type.\n```dart\n'midterm' → '$year ${semester}학기 중간고사'\n'mock'    → '$year $mockLabel 모의고사'\n```\n\n---\n\n## `percentileToRank`\n\n```dart\nstatic int percentileToRank(double percentile)\n```\n\n**Description**: Converts a CSAT percentile into a rank (9-rank scale).\n\n```dart\nif (percentile >= 96) return 1;\nif (percentile >= 89) return 2;\nif (percentile >= 77) return 3;\n// ... ranks 4~8\nreturn 9;\n```\n\n---\n\n## `loadExams`\n\n```dart\nstatic Future<List<Exam>> loadExams()\n```\n\n**Description**: Loads the saved exam list.\n\n1. One-time migration from SharedPreferences to SecureStorage:\n   ```dart\n   await SecureStorageService.migrateFromPlain(\n     key: SecureStorageService.keyGradeExams,\n     oldValue: prefs.getString(_examsKey),\n     onMigrated: () async => prefs.remove(_examsKey),\n   );\n   ```\n\n2. Read JSON from SecureStorage and decode via `Exam.fromJson`:\n   ```dart\n   final json = await SecureStorageService.read(SecureStorageService.keyGradeExams);\n   final list = jsonDecode(json) as List<dynamic>;\n   return list.map((e) => Exam.fromJson(e)).toList()\n     ..sort((a, b) => a.createdAt.compareTo(b.createdAt));\n   ```\n\n**Migration**: Automatically moves existing SharedPreferences (plaintext) data to SecureStorage (encrypted). Deletes the original data once moved.\n\n---\n\n## `saveExams`\n\n```dart\nstatic Future<void> saveExams(List<Exam> exams)\n```\n\nSaves the entire exam list as JSON to SecureStorage.\n\n---\n\n## `addExam` / `updateExam` / `deleteExam`\n\n```dart\nstatic Future<void> addExam(Exam exam)\nstatic Future<void> updateExam(Exam exam)\nstatic Future<void> deleteExam(String id)\n```\n\nEach follows the `loadExams()` → modify → `saveExams()` pattern. `updateExam` matches by id, `deleteExam` uses `removeWhere`.\n\n---\n\n## `loadGoals`\n\n```dart\nstatic Future<Map<String, double>> loadGoals()\n```\n\n**Description**: Loads early-admission target ranks (subject name → rank).\n\nSame migration + SecureStorage pattern as `loadExams`. Key: `SecureStorageService.keyGradeGoals`.\n\n---\n\n## `saveGoals`\n\n```dart\nstatic Future<void> saveGoals(Map<String, double> goals)\n```\n\nSaves early-admission targets as JSON to SecureStorage.\n\n---\n\n## `loadJeongsiGoals` / `saveJeongsiGoals`\n\n```dart\nstatic Future<Map<String, double>> loadJeongsiGoals()\nstatic Future<void> saveJeongsiGoals(Map<String, double> goals)\n```\n\nRegular-admission targets (percentile-based). Key: `SecureStorageService.keyGradeJeongsiGoals`. Logic is the same as `loadGoals`/`saveGoals`.\n\n---\n\n## Constant data\n\n### `mockSubjects`\n\nMap of CSAT subjects under the 2022 revised curriculum:\n```dart\n{\n  '공통': ['국어', '수학', '영어', '한국사', '통합사회', '통합과학'],\n  '직업탐구': ['성공적인 직업생활'],\n  '제2외국어/한문 (택 1)': ['독일어', '프랑스어', ... '한문'],\n}\n```\n\n### `subjectColors`\n\nFixed per-subject colors (for charts):\n```dart\n{'국어': 0xFFE53935, '수학': 0xFF1E88E5, '영어': 0xFF43A047, ...}\n```\n\n### `getSubjectColor`\n\n```dart\nstatic int getSubjectColor(String subject)\n```\n\nFor subjects not in `subjectColors`, a deterministic color is generated as `subject.hashCode | 0xFF000000`.\n","data/grade_repository.md":"# GradeRepository\r\n\r\n> `lib/data/grade_repository.dart` — 성적 관리 Repository 인터페이스\r\n\r\n[`GradeManager`](grade_manager.md)의 정적 메서드를 인스턴스 메서드로 감싸 GetIt DI에 등록. 테스트에서 mock 주입 가능\r\n\r\n---\r\n\r\n## 설계 배경\r\n\r\n[`AuthRepository`](auth_repository.md)와 동일한 패턴:\r\n```\r\nGradeManager (정적 메서드, SecureStorage 의존)\r\n    ↑\r\nGradeRepository (인스턴스 인터페이스)\r\n    ↑\r\nLocalGradeRepository (GradeManager에 위임)\r\n```\r\n\r\n> 📎 [`GradeManager`](grade_manager.md) · [`SecureStorageService`](secure_storage_service.md)\r\n\r\nRiverpod Provider 테스트에서 `MockGradeRepository`로 교체하면 sqflite/SharedPreferences/SecureStorage 의존을 제거할 수 있음\r\n\r\n---\r\n\r\n## `GradeRepository` (추상 클래스)\r\n\r\n```dart\r\nabstract class GradeRepository {\r\n  Future<List<Exam>> loadExams();\r\n  Future<void> saveExams(List<Exam> exams);\r\n  Future<void> addExam(Exam exam);\r\n  Future<void> updateExam(Exam exam);\r\n  Future<void> deleteExam(String id);\r\n  Future<Map<String, double>> loadGoals();\r\n  Future<void> saveGoals(Map<String, double> goals);\r\n  Future<Map<String, double>> loadJeongsiGoals();\r\n  Future<void> saveJeongsiGoals(Map<String, double> goals);\r\n}\r\n```\r\n\r\n[`GradeManager`](grade_manager.md)의 모든 public 메서드를 인터페이스로 추출. 시험 CRUD + 수시/정시 목표 관리\r\n\r\n---\r\n\r\n## `LocalGradeRepository` (기본 구현)\r\n\r\n```dart\r\nclass LocalGradeRepository implements GradeRepository {\r\n  const LocalGradeRepository();\r\n\r\n  @override\r\n  Future<List<Exam>> loadExams() => GradeManager.loadExams();\r\n\r\n  @override\r\n  Future<void> addExam(Exam exam) => GradeManager.addExam(exam);\r\n\r\n  @override\r\n  Future<void> deleteExam(String id) => GradeManager.deleteExam(id);\r\n\r\n  // ... 나머지 모두 GradeManager 정적 메서드에 위임\r\n}\r\n```\r\n\r\n`const` 생성자. 모든 메서드가 [`GradeManager`](grade_manager.md) 정적 메서드를 그대로 호출\r\n\r\n---\r\n\r\n## GetIt 접근자\r\n\r\n```dart\r\nGradeRepository get gradeRepository => GetIt.I<GradeRepository>();\r\n```\r\n\r\n`service_locator.dart`에서 등록:\r\n```dart\r\ngetIt.registerLazySingleton<GradeRepository>(\r\n  () => const LocalGradeRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## 테스트 활용\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<GradeRepository>(MockGradeRepository());\r\n```\r\n\r\n`MockGradeRepository`에서 인메모리 리스트로 시험 데이터를 관리하면 SecureStorage 없이 [`ExamsNotifier`](../providers/providers.md) 테스트 가능\r\n","data/grade_repository_en.md":"# GradeRepository\n\n> 한국어: [grade_repository.md](./grade_repository.md)\n\n> `lib/data/grade_repository.dart` — Grade management Repository interface\n\nWraps the static methods of [`GradeManager`](grade_manager_en.md) as instance methods and registers them with GetIt DI. Allows mock injection in tests.\n\n---\n\n## Design background\n\nSame pattern as [`AuthRepository`](auth_repository_en.md):\n```\nGradeManager (static methods, depends on SecureStorage)\n    ↑\nGradeRepository (instance interface)\n    ↑\nLocalGradeRepository (delegates to GradeManager)\n```\n\n> 📎 [`GradeManager`](grade_manager_en.md) · [`SecureStorageService`](secure_storage_service.md)\n\nReplacing with `MockGradeRepository` in Riverpod Provider tests removes the dependency on sqflite/SharedPreferences/SecureStorage.\n\n---\n\n## `GradeRepository` (abstract class)\n\n```dart\nabstract class GradeRepository {\n  Future<List<Exam>> loadExams();\n  Future<void> saveExams(List<Exam> exams);\n  Future<void> addExam(Exam exam);\n  Future<void> updateExam(Exam exam);\n  Future<void> deleteExam(String id);\n  Future<Map<String, double>> loadGoals();\n  Future<void> saveGoals(Map<String, double> goals);\n  Future<Map<String, double>> loadJeongsiGoals();\n  Future<void> saveJeongsiGoals(Map<String, double> goals);\n}\n```\n\nExtracts every public method of [`GradeManager`](grade_manager_en.md) into the interface. Exam CRUD + early/regular admission goal management.\n\n---\n\n## `LocalGradeRepository` (default implementation)\n\n```dart\nclass LocalGradeRepository implements GradeRepository {\n  const LocalGradeRepository();\n\n  @override\n  Future<List<Exam>> loadExams() => GradeManager.loadExams();\n\n  @override\n  Future<void> addExam(Exam exam) => GradeManager.addExam(exam);\n\n  @override\n  Future<void> deleteExam(String id) => GradeManager.deleteExam(id);\n\n  // ... all remaining methods delegate to GradeManager static methods\n}\n```\n\n`const` constructor. Every method calls a [`GradeManager`](grade_manager_en.md) static method directly.\n\n---\n\n## GetIt accessor\n\n```dart\nGradeRepository get gradeRepository => GetIt.I<GradeRepository>();\n```\n\nRegistered in `service_locator.dart`:\n```dart\ngetIt.registerLazySingleton<GradeRepository>(\n  () => const LocalGradeRepository(),\n);\n```\n\n---\n\n## Test usage\n\n```dart\n// test setUp\nawait resetServiceLocator();\nGetIt.I.registerSingleton<GradeRepository>(MockGradeRepository());\n```\n\nIf `MockGradeRepository` manages exam data with an in-memory list, [`ExamsNotifier`](../providers/providers.md) can be tested without SecureStorage.\n","data/local_database.md":"# LocalDataBase\r\n\r\n> `lib/data/local_database.dart` — SQLite 일정 DB, Firestore 동기화\r\n\r\n인스턴스 메서드 (GetIt에 싱글턴 등록). sqflite 기반 개인 일정 CRUD\r\n\r\n---\r\n\r\n## 데이터베이스 스키마\r\n\r\n```sql\r\nCREATE TABLE schedules (\r\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\r\n  startTime INTEGER NOT NULL,\r\n  endTime INTEGER NOT NULL,\r\n  content TEXT NOT NULL,\r\n  date TEXT NOT NULL,\r\n  endDate TEXT,\r\n  color INTEGER DEFAULT 4284811951\r\n)\r\n```\r\n\r\n- `date`: `'2026-04-10'` 형식\r\n- `endDate`: 여러 날에 걸치는 일정용 (v2에서 추가)\r\n- `color`: ARGB 정수값 (기본값 = 회색)\r\n\r\n---\r\n\r\n## `database` (getter)\r\n\r\n```dart\r\nFuture<Database> get database async {\r\n  if (_db != null) return _db!;\r\n  _db = await _initDB();\r\n  return _db!;\r\n}\r\n```\r\n\r\nLazy singleton 패턴. 최초 호출 시 DB 생성/열기\r\n\r\n---\r\n\r\n## `_initDB`\r\n\r\n```dart\r\nFuture<Database> _initDB()\r\n```\r\n\r\n**설명**: SQLite DB를 열고 스키마를 생성함\r\n\r\n```dart\r\nreturn openDatabase(\r\n  path,\r\n  version: 2,\r\n  onCreate: (db, version) async { /* CREATE TABLE */ },\r\n  onUpgrade: (db, oldVersion, newVersion) async {\r\n    if (oldVersion < 2) {\r\n      await db.execute('ALTER TABLE schedules ADD COLUMN endDate TEXT');\r\n      await db.execute('ALTER TABLE schedules ADD COLUMN color INTEGER DEFAULT 4284811951');\r\n    }\r\n  },\r\n);\r\n```\r\n\r\nv1→v2 마이그레이션: `endDate`, `color` 컬럼 추가\r\n\r\n---\r\n\r\n## `migrateFromPrefs`\r\n\r\n```dart\r\nFuture<void> migrateFromPrefs()\r\n```\r\n\r\n**설명**: SharedPreferences의 레거시 일정 데이터를 SQLite로 마이그레이션함\r\n\r\n```dart\r\nfinal old = prefs.getStringList('schedules');\r\nfinal batch = db.batch();\r\nfor (var json in old) {\r\n  batch.insert('schedules', {...});\r\n}\r\nawait batch.commit(noResult: true);\r\nawait prefs.remove('schedules');\r\n```\r\n\r\n배치 삽입으로 성능 최적화. 마이그레이션 후 원본 삭제\r\n\r\n---\r\n\r\n## `insertSchedule`\r\n\r\n```dart\r\nFuture<int> insertSchedule(Schedule schedule)\r\n```\r\n\r\n일정 삽입 후 `syncToFirestore()` 호출. 반환값은 auto-increment ID\r\n\r\n---\r\n\r\n## `deleteSchedule`\r\n\r\n```dart\r\nFuture<void> deleteSchedule(Schedule schedule)\r\n```\r\n\r\n**설명**: 일정을 삭제함. ID가 있으면 ID로, 없으면 복합 조건으로 매칭함\r\n\r\n```dart\r\nif (schedule.id != null) {\r\n  await db.delete('schedules', where: 'id = ?', whereArgs: [schedule.id]);\r\n} else {\r\n  await db.delete('schedules',\r\n    where: 'startTime = ? AND endTime = ? AND content = ? AND date = ?',\r\n    whereArgs: [...],\r\n  );\r\n}\r\n```\r\n\r\n삭제 후 `syncToFirestore()` 호출\r\n\r\n---\r\n\r\n## `watchSchedules`\r\n\r\n```dart\r\nStream<List<Schedule>> watchSchedules(DateTime date)\r\n```\r\n\r\n**설명**: 특정 날짜의 일정 목록을 스트림으로 반환함\r\n\r\n```dart\r\nfinal results = await db.query(\r\n  'schedules',\r\n  where: \"date LIKE ? OR (endDate IS NOT NULL AND date <= ? AND endDate >= ?)\",\r\n  whereArgs: ['$dateStr%', '$dateStr', '$dateStr'],\r\n  orderBy: 'startTime ASC',\r\n);\r\n```\r\n\r\n여러 날 일정도 포함: `date <= 조회일 <= endDate` 조건\r\n\r\n> **참고**: 현재 `async*`로 한 번만 yield 후 종료. 실시간 갱신이 아닌 일회성 쿼리\r\n\r\n---\r\n\r\n## `getSchedulesForDateRange`\r\n\r\n```dart\r\nFuture<List<Schedule>> getSchedulesForDateRange(DateTime start, int days)\r\n```\r\n\r\n`start`부터 `days`일간의 일정을 조회. 날짜별로 개별 쿼리 실행\r\n\r\n---\r\n\r\n## `syncToFirestore`\r\n\r\n```dart\r\nFuture<void> syncToFirestore()\r\n```\r\n\r\n**설명**: 전체 일정 목록을 Firestore에 동기화함\r\n\r\n```dart\r\nfinal all = await _getAllSchedules();\r\nawait FirebaseFirestore.instance\r\n    .collection('users').doc(uid)\r\n    .collection('sync').doc('schedules')\r\n    .set({\r\n  'items': all.map((s) => s.toMap()).toList(),\r\n  'updatedAt': FieldValue.serverTimestamp(),\r\n});\r\n```\r\n\r\n매 CRUD 작업 후 자동 호출. 비로그인 시 skip\r\n\r\n---\r\n\r\n## `loadFromFirestore`\r\n\r\n```dart\r\nFuture<void> loadFromFirestore()\r\n```\r\n\r\n**설명**: Firestore에서 일정을 복원함 (로컬 DB가 비어있을 때만)\r\n\r\n```dart\r\nfinal existing = await db.query('schedules');\r\nif (existing.isNotEmpty) return;  // 로컬 데이터가 있으면 skip\r\n```\r\n\r\n기기 변경/재설치 시 복원 용도. 배치 삽입으로 성능 최적화\r\n","data/local_database_en.md":"# LocalDataBase\n\n> 한국어: [local_database.md](./local_database.md)\n\n> `lib/data/local_database.dart` — SQLite schedule DB, Firestore sync\n\nInstance methods (registered as a singleton with GetIt). sqflite-based personal schedule CRUD.\n\n---\n\n## Database schema\n\n```sql\nCREATE TABLE schedules (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  startTime INTEGER NOT NULL,\n  endTime INTEGER NOT NULL,\n  content TEXT NOT NULL,\n  date TEXT NOT NULL,\n  endDate TEXT,\n  color INTEGER DEFAULT 4284811951\n)\n```\n\n- `date`: `'2026-04-10'` format\n- `endDate`: for multi-day schedules (added in v2)\n- `color`: ARGB integer value (default = grey)\n\n---\n\n## `database` (getter)\n\n```dart\nFuture<Database> get database async {\n  if (_db != null) return _db!;\n  _db = await _initDB();\n  return _db!;\n}\n```\n\nLazy singleton pattern. Creates/opens the DB on first call.\n\n---\n\n## `_initDB`\n\n```dart\nFuture<Database> _initDB()\n```\n\n**Description**: Opens the SQLite DB and creates the schema.\n\n```dart\nreturn openDatabase(\n  path,\n  version: 2,\n  onCreate: (db, version) async { /* CREATE TABLE */ },\n  onUpgrade: (db, oldVersion, newVersion) async {\n    if (oldVersion < 2) {\n      await db.execute('ALTER TABLE schedules ADD COLUMN endDate TEXT');\n      await db.execute('ALTER TABLE schedules ADD COLUMN color INTEGER DEFAULT 4284811951');\n    }\n  },\n);\n```\n\nv1→v2 migration: adds `endDate`, `color` columns.\n\n---\n\n## `migrateFromPrefs`\n\n```dart\nFuture<void> migrateFromPrefs()\n```\n\n**Description**: Migrates legacy schedule data from SharedPreferences to SQLite.\n\n```dart\nfinal old = prefs.getStringList('schedules');\nfinal batch = db.batch();\nfor (var json in old) {\n  batch.insert('schedules', {...});\n}\nawait batch.commit(noResult: true);\nawait prefs.remove('schedules');\n```\n\nOptimizes performance with batch inserts. Deletes the original after migration.\n\n---\n\n## `insertSchedule`\n\n```dart\nFuture<int> insertSchedule(Schedule schedule)\n```\n\nAfter inserting a schedule, calls `syncToFirestore()`. Returns the auto-increment ID.\n\n---\n\n## `deleteSchedule`\n\n```dart\nFuture<void> deleteSchedule(Schedule schedule)\n```\n\n**Description**: Deletes a schedule. Matches by ID if present; otherwise matches by composite conditions.\n\n```dart\nif (schedule.id != null) {\n  await db.delete('schedules', where: 'id = ?', whereArgs: [schedule.id]);\n} else {\n  await db.delete('schedules',\n    where: 'startTime = ? AND endTime = ? AND content = ? AND date = ?',\n    whereArgs: [...],\n  );\n}\n```\n\nCalls `syncToFirestore()` after deletion.\n\n---\n\n## `watchSchedules`\n\n```dart\nStream<List<Schedule>> watchSchedules(DateTime date)\n```\n\n**Description**: Returns the schedule list for a specific date as a stream.\n\n```dart\nfinal results = await db.query(\n  'schedules',\n  where: \"date LIKE ? OR (endDate IS NOT NULL AND date <= ? AND endDate >= ?)\",\n  whereArgs: ['$dateStr%', '$dateStr', '$dateStr'],\n  orderBy: 'startTime ASC',\n);\n```\n\nIncludes multi-day schedules too: condition `date <= query date <= endDate`.\n\n> **Note**: Currently yields once with `async*` and then terminates. This is a one-time query, not a real-time update.\n\n---\n\n## `getSchedulesForDateRange`\n\n```dart\nFuture<List<Schedule>> getSchedulesForDateRange(DateTime start, int days)\n```\n\nQueries schedules for `days` days starting from `start`. Runs individual queries per date.\n\n---\n\n## `syncToFirestore`\n\n```dart\nFuture<void> syncToFirestore()\n```\n\n**Description**: Syncs the entire schedule list to Firestore.\n\n```dart\nfinal all = await _getAllSchedules();\nawait FirebaseFirestore.instance\n    .collection('users').doc(uid)\n    .collection('sync').doc('schedules')\n    .set({\n  'items': all.map((s) => s.toMap()).toList(),\n  'updatedAt': FieldValue.serverTimestamp(),\n});\n```\n\nCalled automatically after every CRUD operation. Skipped when not logged in.\n\n---\n\n## `loadFromFirestore`\n\n```dart\nFuture<void> loadFromFirestore()\n```\n\n**Description**: Restores schedules from Firestore (only when the local DB is empty).\n\n```dart\nfinal existing = await db.query('schedules');\nif (existing.isNotEmpty) return;  // skip if local data exists\n```\n\nUsed for restoration on device change/reinstall. Optimized with batch inserts.\n","data/meal.md":"# Meal\r\n\r\n> `lib/data/meal.dart` — 급식 데이터 모델 (freezed)\r\n\r\n`@freezed` 기반 불변 데이터 클래스. JSON 직렬화(`meal.g.dart`), 동등성/copyWith(`meal.freezed.dart`)는 코드 생성으로 자동 처리\r\n\r\n---\r\n\r\n## 필드\r\n\r\n```dart\r\n@freezed\r\nclass Meal with _$Meal {\r\n  const factory Meal({\r\n    required String? meal,      // 메뉴 텍스트 (줄바꿈 구분). null이면 급식 없음\r\n    required DateTime date,     // 급식 날짜\r\n    required int mealType,      // 1=조식, 2=중식, 3=석식\r\n    required String kcal,       // 칼로리 (예: '823.4 Kcal')\r\n    @Default('') String ntrInfo, // 영양정보 (탄수화물/단백질/지방 등, 줄바꿈 구분)\r\n  }) = _Meal;\r\n}\r\n```\r\n\r\n- `meal` 필드: NEIS API 응답의 `DDISH_NM`에서 `<br/>`을 `\\n`으로 치환한 결과\r\n- `ntrInfo` 필드: `NTR_INFO`에서 동일하게 치환. 없으면 빈 문자열\r\n\r\n---\r\n\r\n## `getMealType`\r\n\r\n```dart\r\nString getMealType() {\r\n  switch (mealType) {\r\n    case 1: return '조식';\r\n    case 2: return '중식';\r\n    case 3: return '석식';\r\n    default: return '중식';\r\n  }\r\n}\r\n```\r\n\r\n`mealType` 정수를 한국어 문자열로 변환. 급식 카드 UI에서 식사 유형 라벨에 사용\r\n\r\n---\r\n\r\n## `toString`\r\n\r\n```dart\r\n@override\r\nString toString() => meal ?? '';\r\n```\r\n\r\n`meal`이 null이면 빈 문자열. 디버그 출력 및 위젯 텍스트 바인딩에 활용\r\n\r\n---\r\n\r\n## JSON 직렬화\r\n\r\n```dart\r\nfactory Meal.fromJson(Map<String, dynamic> json) => _$MealFromJson(json);\r\n```\r\n\r\n`_$MealFromJson`/`_$MealToJson`은 `meal.g.dart`에 자동 생성. `MealDataApi._saveToCache`/`_getFromCache`에서 SharedPreferences JSON 저장/복원에 사용\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|------|------|\r\n| [`MealDataApi`](../api/meal_data_api.md)`.getMeal` | API 응답을 Meal 객체로 변환 후 반환 |\r\n| [`MealDataApi`](../api/meal_data_api.md)`._saveToCache` | Meal을 JSON으로 직렬화해 SharedPreferences에 캐시 |\r\n| `MealScreen` | Meal.meal을 줄바꿈 기준으로 split해 메뉴 리스트 표시 |\r\n| [`WidgetService`](../widgets/home_widget/widget_service.md)`.updateMealWidget` | Meal.meal에서 알레르기 정보 제거 후 홈 위젯에 전달 |\r\n| [`DailyMealNotification`](../notification/daily_meal_notification.md) | Meal.meal을 한 줄로 합쳐 알림 본문에 사용 |\r\n","data/meal_en.md":"# Meal\n\n> 한국어: [meal.md](./meal.md)\n\n> `lib/data/meal.dart` — Meal data model (freezed)\n\nImmutable data class based on `@freezed`. JSON serialization (`meal.g.dart`) and equality/copyWith (`meal.freezed.dart`) are handled automatically by code generation.\n\n---\n\n## Fields\n\n```dart\n@freezed\nclass Meal with _$Meal {\n  const factory Meal({\n    required String? meal,      // Menu text (newline-separated). null means no meal\n    required DateTime date,     // Meal date\n    required int mealType,      // 1=breakfast, 2=lunch, 3=dinner\n    required String kcal,       // Calories (e.g., '823.4 Kcal')\n    @Default('') String ntrInfo, // Nutrition info (carbs/protein/fat, newline-separated)\n  }) = _Meal;\n}\n```\n\n- `meal` field: Result of replacing `<br/>` with `\\n` in the `DDISH_NM` field of the NEIS API response\n- `ntrInfo` field: Same replacement applied to `NTR_INFO`. Empty string if missing\n\n---\n\n## `getMealType`\n\n```dart\nString getMealType() {\n  switch (mealType) {\n    case 1: return '조식';\n    case 2: return '중식';\n    case 3: return '석식';\n    default: return '중식';\n  }\n}\n```\n\nConverts the `mealType` integer into a Korean string. Used as the meal type label in the meal card UI.\n\n---\n\n## `toString`\n\n```dart\n@override\nString toString() => meal ?? '';\n```\n\nReturns an empty string when `meal` is null. Used for debug output and widget text binding.\n\n---\n\n## JSON serialization\n\n```dart\nfactory Meal.fromJson(Map<String, dynamic> json) => _$MealFromJson(json);\n```\n\n`_$MealFromJson`/`_$MealToJson` are auto-generated in `meal.g.dart`. Used by `MealDataApi._saveToCache`/`_getFromCache` for SharedPreferences JSON save/restore.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|----------|---------|\n| [`MealDataApi`](../api/meal_data_api.md)`.getMeal` | Converts API response into Meal objects and returns them |\n| [`MealDataApi`](../api/meal_data_api.md)`._saveToCache` | Serializes Meal as JSON and caches it in SharedPreferences |\n| `MealScreen` | Splits Meal.meal by newline to display the menu list |\n| [`WidgetService`](../widgets/home_widget/widget_service.md)`.updateMealWidget` | Strips allergy info from Meal.meal before passing to the home widget |\n| [`DailyMealNotification`](../notification/daily_meal_notification.md) | Joins Meal.meal into a single line for the notification body |\n","data/post_repository.md":"# PostRepository\n\n> `lib/data/post_repository.dart` — 게시판 Firestore 데이터 접근 계층\n\n게시글·댓글·신고 관련 Firestore CRUD를 싱글턴으로 중앙 집중. UI 코드에서 Firestore 직접 호출을 제거하고, 데이터 계층으로 분리\n\n---\n\n## 싱글턴\n\n```dart\nclass PostRepository {\n  PostRepository._();\n  static final instance = PostRepository._();\n}\n```\n\n`PostRepository.instance`로 접근. GetIt에 등록하지 않고 static 싱글턴 패턴 사용 (게시판 코드 전용이라 전역 DI 불필요)\n\n---\n\n## References\n\n```dart\nDocumentReference postRef(String postId)\nCollectionReference commentsRef(String postId)\n```\n\n게시글/댓글 컬렉션 참조. `postStream`, `commentsStream`으로 실시간 스트림도 제공\n\n---\n\n## Read\n\n### `baseQuery`\n\n```dart\nQuery<Map<String, dynamic>> baseQuery({String? category})\n```\n\n카테고리별 게시글 쿼리. `category`가 null이면 전체, 있으면 `where('category', isEqualTo: category)` 필터. `createdAt` 내림차순\n\n### `searchPosts`\n\n```dart\nFuture<QuerySnapshot> searchPosts({required List<String> tokens, int limit = 50})\n```\n\n[n-gram 토큰](search_tokens.md)으로 검색. `array-contains-any` 쿼리, 기본 50건 fetch\n\n### `myPostsStream` / `bookmarkedPostsStream`\n\n```dart\nStream<QuerySnapshot> myPostsStream(String uid)\nStream<QuerySnapshot> bookmarkedPostsStream(String uid)\n```\n\n내가 쓴 글 / 저장한 글 스트림. 각각 최대 50건, `createdAt` 내림차순\n\n---\n\n## Create\n\n### `createPost`\n\n```dart\nFuture<DocumentReference?> createPost(Map<String, dynamic> data)\n```\n\n게시글 생성. 오프라인이면 [`OfflineQueueManager`](../network/offline_queue_manager.md)에 저장하고 `null` 반환. 온라인이면 `_posts.add(data)` 실행\n\n### `addComment`\n\n```dart\nFuture<DocumentReference?> addComment(String postId, Map<String, dynamic> commentData)\n```\n\n댓글 추가 + `commentCount` 자동 증가 (`FieldValue.increment(1)`). 오프라인이면 큐에 저장하고 `null` 반환\n\n---\n\n## Update\n\n### `toggleLike` / `toggleDislike`\n\n```dart\nFuture<void> toggleLike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\nFuture<void> toggleDislike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\n```\n\n좋아요/비추천 토글. `ensureLikesMap`으로 legacy 글 호환 후, `likes.$uid` + `likeCount` 를 단일 update로 처리. 좋아요↔비추천 상호 배타 처리 포함\n\n### `votePoll`\n\n```dart\nFuture<void> votePoll(String postId, String uid, int optionIndex)\n```\n\n투표. `pollVoters.$uid` 에 선택지 인덱스 저장\n\n### `pinPost` / `unpinPost`\n\n```dart\nFuture<void> pinPost(String postId)   // 최대 3개, 초과 시 StateError('pin_maxed')\nFuture<void> unpinPost(String postId)\n```\n\n공지 고정/해제. `pinPost`는 현재 고정된 글 수를 확인하여 3개 초과 시 `StateError` throw\n\n### `resolvePost`\n\n```dart\nFuture<void> resolvePost(String postId)\n```\n\n질문글 해결 처리. `isResolved: true`\n\n### `toggleBookmark`\n\n```dart\nFuture<void> toggleBookmark(String postId, String uid, bool isCurrentlyBookmarked)\n```\n\n북마크 토글. `bookmarkedBy` 배열에 uid 추가/제거\n\n---\n\n## `resolveAnonymousName`\n\n```dart\nFuture<String> resolveAnonymousName(\n  String postId, String uid,\n  String authorLabel, String Function(int) anonymousNumLabel,\n)\n```\n\n익명 댓글 번호 할당. **Firestore Transaction** 사용\n\n1. 글 작성자면 → `authorLabel` 반환 (예: \"익명(글쓴이)\")\n2. 기존 매핑 있으면 → 기존 번호 반환\n3. 새 사용자면 → `anonymousCount + 1` 할당, `anonymousMapping` 업데이트\n\n동시 댓글 시 번호 중복을 Transaction으로 방지\n\n---\n\n## Delete\n\n### `deleteComment`\n\n```dart\nFuture<void> deleteComment(String postId, String commentId)\n```\n\n댓글 삭제 + `commentCount` 감소\n\n### `deletePost`\n\n```dart\nFuture<void> deletePost(String postId)\n```\n\n게시글 삭제. **하위 댓글 먼저 전부 삭제** 후 게시글 문서 삭제 (cascade)\n\n---\n\n## Notification\n\n### `sendNotification`\n\n```dart\nFuture<void> sendNotification({\n  required String targetUid,\n  required String type,\n  required String postId,\n  required String postTitle,\n  required String senderName,\n  required String content,\n})\n```\n\n대상 유저의 `users/{uid}/notifications` 서브컬렉션에 인앱 알림 문서 생성\n\n---\n\n## Admin / Utility\n\n| 메서드 | 설명 |\n|--------|------|\n| `logAdminAction(data)` | `admin_logs` 컬렉션에 관리 행위 기록 |\n| `refreshFromServer(postId)` | 게시글 + 댓글을 서버에서 강제 재조회 (캐시 우회) |\n| `reportPost(...)` | `reports` 컬렉션에 신고 문서 생성 |\n| `getPinnedCount()` | 현재 고정된 글 수 반환 |\n| `getPinnedPosts()` | 고정된 글 목록 반환 |\n| `ensureLikesMap(postId)` | legacy 글의 likes/dislikes 필드를 Map + int 구조로 backfill |\n\n---\n\n## 사용 위치\n\n- **board_screen.dart**: `baseQuery`, `searchPosts`\n- **post_detail_screen.dart**: 대부분의 메서드 (좋아요, 댓글, 북마크, 신고 등)\n- **write_post_screen.dart**: `createPost`, `updatePost`, `getPinnedPosts`\n- **my_posts_screen.dart**: `myPostsStream`\n- **bookmarked_posts_screen.dart**: `bookmarkedPostsStream`\n- **reports_tab.dart**: `deletePost`\n","data/post_repository_en.md":"# PostRepository\n\n> 한국어: [post_repository.md](./post_repository.md)\n\n> `lib/data/post_repository.dart` — Firestore data access layer for the board\n\nCentralizes Firestore CRUD for posts, comments, and reports as a singleton. Removes direct Firestore calls from UI code and isolates them in the data layer.\n\n---\n\n## Singleton\n\n```dart\nclass PostRepository {\n  PostRepository._();\n  static final instance = PostRepository._();\n}\n```\n\nAccessed via `PostRepository.instance`. Uses a static singleton pattern instead of GetIt registration (board code only; no need for global DI).\n\n---\n\n## References\n\n```dart\nDocumentReference postRef(String postId)\nCollectionReference commentsRef(String postId)\n```\n\nPost/comment collection references. `postStream` and `commentsStream` also provide real-time streams.\n\n---\n\n## Read\n\n### `baseQuery`\n\n```dart\nQuery<Map<String, dynamic>> baseQuery({String? category})\n```\n\nPer-category post query. When `category` is null, returns all posts; otherwise applies `where('category', isEqualTo: category)`. Ordered by `createdAt` descending.\n\n### `searchPosts`\n\n```dart\nFuture<QuerySnapshot> searchPosts({required List<String> tokens, int limit = 50})\n```\n\nSearches with [n-gram tokens](search_tokens.md). Uses `array-contains-any` query, fetches 50 by default.\n\n### `myPostsStream` / `bookmarkedPostsStream`\n\n```dart\nStream<QuerySnapshot> myPostsStream(String uid)\nStream<QuerySnapshot> bookmarkedPostsStream(String uid)\n```\n\nStreams for my posts / bookmarked posts. Each limited to 50, ordered by `createdAt` descending.\n\n---\n\n## Create\n\n### `createPost`\n\n```dart\nFuture<DocumentReference?> createPost(Map<String, dynamic> data)\n```\n\nCreates a post. When offline, saves to [`OfflineQueueManager`](../network/offline_queue_manager.md) and returns `null`. When online, runs `_posts.add(data)`.\n\n### `addComment`\n\n```dart\nFuture<DocumentReference?> addComment(String postId, Map<String, dynamic> commentData)\n```\n\nAdds a comment and automatically increments `commentCount` (`FieldValue.increment(1)`). When offline, queues it and returns `null`.\n\n---\n\n## Update\n\n### `toggleLike` / `toggleDislike`\n\n```dart\nFuture<void> toggleLike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\nFuture<void> toggleDislike(String postId, String uid, {required bool hasLiked, required bool hasDisliked})\n```\n\nToggles like/dislike. After `ensureLikesMap` for legacy-post compatibility, updates `likes.$uid` + `likeCount` in a single update. Includes mutual-exclusion handling between like and dislike.\n\n### `votePoll`\n\n```dart\nFuture<void> votePoll(String postId, String uid, int optionIndex)\n```\n\nCast a vote. Stores the selected option index under `pollVoters.$uid`.\n\n### `pinPost` / `unpinPost`\n\n```dart\nFuture<void> pinPost(String postId)   // up to 3; throws StateError('pin_maxed') when exceeded\nFuture<void> unpinPost(String postId)\n```\n\nPin/unpin announcements. `pinPost` checks the current pinned count and throws `StateError` when more than 3.\n\n### `resolvePost`\n\n```dart\nFuture<void> resolvePost(String postId)\n```\n\nMarks a question post as resolved. `isResolved: true`.\n\n### `toggleBookmark`\n\n```dart\nFuture<void> toggleBookmark(String postId, String uid, bool isCurrentlyBookmarked)\n```\n\nToggles bookmark. Adds/removes the uid to/from the `bookmarkedBy` array.\n\n---\n\n## `resolveAnonymousName`\n\n```dart\nFuture<String> resolveAnonymousName(\n  String postId, String uid,\n  String authorLabel, String Function(int) anonymousNumLabel,\n)\n```\n\nAllocates anonymous comment numbers. Uses a **Firestore Transaction**.\n\n1. If the caller is the post author → returns `authorLabel` (e.g., \"Anonymous (author)\")\n2. If an existing mapping exists → returns the existing number\n3. If it's a new user → allocates `anonymousCount + 1` and updates `anonymousMapping`\n\nThe transaction prevents number collisions when comments are posted concurrently.\n\n---\n\n## Delete\n\n### `deleteComment`\n\n```dart\nFuture<void> deleteComment(String postId, String commentId)\n```\n\nDeletes a comment and decrements `commentCount`.\n\n### `deletePost`\n\n```dart\nFuture<void> deletePost(String postId)\n```\n\nDeletes a post. **Deletes all child comments first**, then deletes the post document (cascade).\n\n---\n\n## Notification\n\n### `sendNotification`\n\n```dart\nFuture<void> sendNotification({\n  required String targetUid,\n  required String type,\n  required String postId,\n  required String postTitle,\n  required String senderName,\n  required String content,\n})\n```\n\nCreates an in-app notification document in the target user's `users/{uid}/notifications` subcollection.\n\n---\n\n## Admin / Utility\n\n| Method | Description |\n|--------|-------------|\n| `logAdminAction(data)` | Records admin actions in the `admin_logs` collection |\n| `refreshFromServer(postId)` | Force-refetches the post + comments from the server (bypassing cache) |\n| `reportPost(...)` | Creates a report document in the `reports` collection |\n| `getPinnedCount()` | Returns the current pinned post count |\n| `getPinnedPosts()` | Returns the list of pinned posts |\n| `ensureLikesMap(postId)` | Backfills legacy posts' likes/dislikes fields into the Map + int structure |\n\n---\n\n## Usage\n\n- **board_screen.dart**: `baseQuery`, `searchPosts`\n- **post_detail_screen.dart**: most methods (like, comment, bookmark, report, etc.)\n- **write_post_screen.dart**: `createPost`, `updatePost`, `getPinnedPosts`\n- **my_posts_screen.dart**: `myPostsStream`\n- **bookmarked_posts_screen.dart**: `bookmarkedPostsStream`\n- **reports_tab.dart**: `deletePost`\n","data/schedule_data.md":"# Schedule\r\n\r\n> `lib/data/schedule_data.dart` — 개인일정 데이터 모델\r\n\r\nSQLite `schedules` 테이블과 1:1 매핑되는 순수 Dart 클래스. freezed를 사용하지 않고 수동 `toMap`/`fromMap` 제공\r\n\r\n---\r\n\r\n## 필드\r\n\r\n```dart\r\nclass Schedule {\r\n  final int? id;          // SQLite auto-increment PK. 새 일정은 null\r\n  final int startTime;    // 시작 시간 (0~23, 시 단위)\r\n  final int endTime;      // 종료 시간 (0~23, 시 단위)\r\n  final String content;   // 일정 내용\r\n  final String date;      // 시작 날짜 ('2026-04-10' 형식)\r\n  final String? endDate;  // 종료 날짜 (연속일정용. null이면 하루일정)\r\n  final int color;        // 0xFFRRGGBB 형태. 기본값 0xFF3F72AF (파란색)\r\n}\r\n```\r\n\r\n- `startTime`/`endTime`: 시(hour) 단위 정수. 예: 9시~12시 → `startTime: 9, endTime: 12`\r\n- `endDate`: v2 스키마에서 추가. 여러 날에 걸치는 일정 지원\r\n- `color`: 사용자가 캘린더에서 선택한 색상. 기본값은 앱 primaryColor\r\n\r\n---\r\n\r\n## `toMap`\r\n\r\n```dart\r\nMap<String, dynamic> toMap() => {\r\n  if (id != null) 'id': id,\r\n  'startTime': startTime,\r\n  'endTime': endTime,\r\n  'content': content,\r\n  'date': date,\r\n  'endDate': endDate,\r\n  'color': color,\r\n};\r\n```\r\n\r\nSQLite 삽입용. `id`가 null이면 맵에서 제외 → auto-increment로 자동 생성\r\n\r\n---\r\n\r\n## `fromMap`\r\n\r\n```dart\r\nfactory Schedule.fromMap(Map<String, dynamic> map) => Schedule(\r\n  id: map['id'] as int?,\r\n  startTime: map['startTime'] as int,\r\n  endTime: map['endTime'] as int,\r\n  content: map['content'] as String,\r\n  date: map['date'] as String,\r\n  endDate: map['endDate'] as String?,\r\n  color: map['color'] as int? ?? 0xFF3F72AF,\r\n);\r\n```\r\n\r\nSQLite 쿼리 결과에서 Schedule 객체 생성. `color`가 null(v1 데이터)이면 기본 파란색\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|------|------|\r\n| `LocalDataBase.insertSchedule` | Schedule → toMap → SQLite insert |\r\n| `LocalDataBase.watchSchedules` | SQLite row → fromMap → Schedule 리스트 |\r\n| `LocalDataBase.syncToFirestore` | Schedule → toMap → Firestore 동기화 |\r\n| `ScheduleBottomSheet` | 사용자 입력으로 Schedule 객체 생성 |\r\n| `ScheduleCard` | Schedule 필드를 캘린더 카드에 표시 |\r\n","data/schedule_data_en.md":"# Schedule\n\n> 한국어: [schedule_data.md](./schedule_data.md)\n\n> `lib/data/schedule_data.dart` — Personal schedule data model\n\nA plain Dart class mapped 1:1 to the SQLite `schedules` table. Does not use freezed; provides hand-written `toMap`/`fromMap`.\n\n---\n\n## Fields\n\n```dart\nclass Schedule {\n  final int? id;          // SQLite auto-increment PK. null for new schedules\n  final int startTime;    // Start hour (0–23)\n  final int endTime;      // End hour (0–23)\n  final String content;   // Schedule content\n  final String date;      // Start date (format '2026-04-10')\n  final String? endDate;  // End date (for multi-day schedules; null means single day)\n  final int color;        // 0xFFRRGGBB format. Default 0xFF3F72AF (blue)\n}\n```\n\n- `startTime`/`endTime`: Integer hour values. Example: 9:00–12:00 → `startTime: 9, endTime: 12`\n- `endDate`: Added in schema v2. Supports schedules spanning multiple days\n- `color`: Color chosen by the user in the calendar. Defaults to the app's primaryColor\n\n---\n\n## `toMap`\n\n```dart\nMap<String, dynamic> toMap() => {\n  if (id != null) 'id': id,\n  'startTime': startTime,\n  'endTime': endTime,\n  'content': content,\n  'date': date,\n  'endDate': endDate,\n  'color': color,\n};\n```\n\nUsed for SQLite inserts. When `id` is null, it is excluded from the map so auto-increment can generate it.\n\n---\n\n## `fromMap`\n\n```dart\nfactory Schedule.fromMap(Map<String, dynamic> map) => Schedule(\n  id: map['id'] as int?,\n  startTime: map['startTime'] as int,\n  endTime: map['endTime'] as int,\n  content: map['content'] as String,\n  date: map['date'] as String,\n  endDate: map['endDate'] as String?,\n  color: map['color'] as int? ?? 0xFF3F72AF,\n);\n```\n\nCreates a Schedule object from a SQLite query result. When `color` is null (v1 data), defaults to blue.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|----------|---------|\n| `LocalDataBase.insertSchedule` | Schedule → toMap → SQLite insert |\n| `LocalDataBase.watchSchedules` | SQLite row → fromMap → Schedule list |\n| `LocalDataBase.syncToFirestore` | Schedule → toMap → Firestore sync |\n| `ScheduleBottomSheet` | Creates Schedule objects from user input |\n| `ScheduleCard` | Displays Schedule fields on calendar cards |\n","data/search_history_service.md":"# SearchHistoryService\r\n\r\n> `lib/data/search_history_service.dart` — 검색 기록 (최대 10개)\r\n\r\n모든 메서드가 `static`. SharedPreferences에 JSON 배열로 저장. 로컬 전용 (Firestore 동기화 없음)\r\n\r\n---\r\n\r\n## `load`\r\n\r\n```dart\r\nstatic Future<List<String>> load()\r\n```\r\n\r\n**설명**: 저장된 검색 기록을 로드함\r\n\r\n```dart\r\nfinal raw = prefs.getString(_key);  // 'board_search_history'\r\nfinal decoded = jsonDecode(raw);\r\nreturn decoded.whereType<String>().toList();\r\n```\r\n\r\n파싱 실패 시 빈 리스트 반환 (silent fail)\r\n\r\n---\r\n\r\n## `add`\r\n\r\n```dart\r\nstatic Future<void> add(String query)\r\n```\r\n\r\n**설명**: 검색어를 기록에 추가함. 중복 제거 + FIFO\r\n\r\n```dart\r\nfinal trimmed = query.trim();\r\nif (trimmed.isEmpty) return;\r\ncurrent.removeWhere((e) => e == trimmed);  // 기존 중복 제거\r\ncurrent.insert(0, trimmed);                // 맨 앞에 추가\r\nfinal capped = current.take(_maxEntries).toList();  // 최대 10개\r\n```\r\n\r\n같은 검색어를 다시 입력하면 맨 앞으로 이동\r\n\r\n---\r\n\r\n## `remove`\r\n\r\n```dart\r\nstatic Future<void> remove(String query)\r\n```\r\n\r\n특정 검색어 한 개를 기록에서 삭제\r\n\r\n---\r\n\r\n## `clear`\r\n\r\n```dart\r\nstatic Future<void> clear()\r\n```\r\n\r\n검색 기록 전체 삭제. `prefs.remove(_key)`\r\n","data/search_history_service_en.md":"# SearchHistoryService\n\n> 한국어: [search_history_service.md](./search_history_service.md)\n\n> `lib/data/search_history_service.dart` — Search history (max 10 entries)\n\nAll methods are `static`. Stored as a JSON array in SharedPreferences. Local only (no Firestore sync).\n\n---\n\n## `load`\n\n```dart\nstatic Future<List<String>> load()\n```\n\n**Description**: Loads the saved search history.\n\n```dart\nfinal raw = prefs.getString(_key);  // 'board_search_history'\nfinal decoded = jsonDecode(raw);\nreturn decoded.whereType<String>().toList();\n```\n\nReturns an empty list on parse failure (silent fail).\n\n---\n\n## `add`\n\n```dart\nstatic Future<void> add(String query)\n```\n\n**Description**: Adds a query to history. Deduplicates + FIFO.\n\n```dart\nfinal trimmed = query.trim();\nif (trimmed.isEmpty) return;\ncurrent.removeWhere((e) => e == trimmed);  // remove existing duplicate\ncurrent.insert(0, trimmed);                // insert at the front\nfinal capped = current.take(_maxEntries).toList();  // up to 10\n```\n\nRe-entering the same query moves it to the front.\n\n---\n\n## `remove`\n\n```dart\nstatic Future<void> remove(String query)\n```\n\nRemoves a single query from history.\n\n---\n\n## `clear`\n\n```dart\nstatic Future<void> clear()\n```\n\nDeletes the entire search history. `prefs.remove(_key)`.\n","data/search_tokens.md":"# SearchTokens\r\n\r\n> `lib/data/search_tokens.dart` — 한국어 2-gram 토큰화\r\n\r\nFirestore는 LIKE/full-text 검색이 없으므로, 글 작성 시 제목+본문을 2-gram으로 분해해 `searchTokens` 배열에 저장하고, 검색 시 `array-contains-any` 쿼리로 매칭함\r\n\r\n예) `\"기말고사 일정\"` → `['기말', '말고', '고사', '일정']`\r\n\r\n---\r\n\r\n## `forDocument`\r\n\r\n```dart\r\nstatic List<String> forDocument(String title, String content, {int maxTokens = 200})\r\n```\r\n\r\n**설명**: 글 저장 시 사용. 제목+본문을 합쳐 2-gram 토큰을 생성함\r\n\r\n```dart\r\nfinal combined = '$title $content';\r\nfinal tokens = _ngrams(combined);\r\nif (tokens.length <= maxTokens) return tokens.toList();\r\nreturn tokens.take(maxTokens).toList();\r\n```\r\n\r\n- Set으로 자동 중복 제거\r\n- **maxTokens = 200**: Firestore 배열 크기 + 저장 비용 제한\r\n\r\n---\r\n\r\n## `forQuery`\r\n\r\n```dart\r\nstatic List<String> forQuery(String query, {int maxTokens = 10})\r\n```\r\n\r\n**설명**: 검색 시 사용. 사용자 쿼리에서 2-gram을 추출함\r\n\r\n```dart\r\nfinal cleaned = _normalize(query);\r\nif (cleaned.length == 1) return [cleaned];  // 1글자는 그대로 반환\r\nfinal tokens = _ngrams(query);\r\nreturn tokens.take(maxTokens).toList();\r\n```\r\n\r\n- **maxTokens = 10**: Firestore `array-contains-any` 한계는 30이지만 10개면 충분\r\n- 1글자 쿼리는 2-gram 생성 불가 → 1-gram 한 개 반환 (결과 없음 가능)\r\n\r\n---\r\n\r\n## `_ngrams`\r\n\r\n```dart\r\nstatic Set<String> _ngrams(String text)\r\n```\r\n\r\n**설명**: 정규화된 텍스트에서 연속 2글자 조합(sliding window)을 Set으로 생성함\r\n\r\n```dart\r\nfinal cleaned = _normalize(text);\r\nfor (int i = 0; i + 2 <= cleaned.length; i++) {\r\n  out.add(cleaned.substring(i, i + 2));\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_normalize`\r\n\r\n```dart\r\nstatic String _normalize(String text)\r\n```\r\n\r\n**설명**: 텍스트를 검색용으로 정규화함\r\n\r\n1. 소문자 변환: `text.toLowerCase()`\r\n2. 허용 문자만 남기고 나머지 제거:\r\n   - `0x30~0x39`: 숫자 (0-9)\r\n   - `0x61~0x7A`: 영소문자 (a-z)\r\n   - `0xAC00~0xD7A3`: 한글 음절 (가~힣)\r\n3. 공백, 기호, 한자, 이모지 등 모두 제거\r\n\r\n```dart\r\nfor (final r in lower.runes) {\r\n  if (r >= 0x30 && r <= 0x39) { buf.writeCharCode(r); continue; }\r\n  if (r >= 0x61 && r <= 0x7A) { buf.writeCharCode(r); continue; }\r\n  if (r >= 0xAC00 && r <= 0xD7A3) { buf.writeCharCode(r); continue; }\r\n}\r\n```\r\n","data/search_tokens_en.md":"# SearchTokens\n\n> 한국어: [search_tokens.md](./search_tokens.md)\n\n> `lib/data/search_tokens.dart` — Korean 2-gram tokenization\n\nFirestore has no LIKE/full-text search, so when a post is created, its title + body are broken into 2-grams and stored in the `searchTokens` array; on search, an `array-contains-any` query matches against them.\n\nExample: `\"기말고사 일정\"` → `['기말', '말고', '고사', '일정']`\n\n---\n\n## `forDocument`\n\n```dart\nstatic List<String> forDocument(String title, String content, {int maxTokens = 200})\n```\n\n**Description**: Used when saving a post. Combines title + body and generates 2-gram tokens.\n\n```dart\nfinal combined = '$title $content';\nfinal tokens = _ngrams(combined);\nif (tokens.length <= maxTokens) return tokens.toList();\nreturn tokens.take(maxTokens).toList();\n```\n\n- Set automatically removes duplicates\n- **maxTokens = 200**: Limits Firestore array size and storage cost\n\n---\n\n## `forQuery`\n\n```dart\nstatic List<String> forQuery(String query, {int maxTokens = 10})\n```\n\n**Description**: Used at search time. Extracts 2-grams from the user's query.\n\n```dart\nfinal cleaned = _normalize(query);\nif (cleaned.length == 1) return [cleaned];  // 1-char: return as-is\nfinal tokens = _ngrams(query);\nreturn tokens.take(maxTokens).toList();\n```\n\n- **maxTokens = 10**: Firestore's `array-contains-any` limit is 30, but 10 is enough\n- 1-character queries cannot form a 2-gram → returns a single 1-gram (may yield no results)\n\n---\n\n## `_ngrams`\n\n```dart\nstatic Set<String> _ngrams(String text)\n```\n\n**Description**: Produces a Set of all consecutive 2-character combinations (sliding window) from the normalized text.\n\n```dart\nfinal cleaned = _normalize(text);\nfor (int i = 0; i + 2 <= cleaned.length; i++) {\n  out.add(cleaned.substring(i, i + 2));\n}\n```\n\n---\n\n## `_normalize`\n\n```dart\nstatic String _normalize(String text)\n```\n\n**Description**: Normalizes text for search.\n\n1. Lowercase: `text.toLowerCase()`\n2. Keep only allowed characters; remove the rest:\n   - `0x30~0x39`: digits (0–9)\n   - `0x61~0x7A`: lowercase English letters (a–z)\n   - `0xAC00~0xD7A3`: Korean syllables (가–힣)\n3. Removes spaces, symbols, Chinese characters, emoji, etc.\n\n```dart\nfor (final r in lower.runes) {\n  if (r >= 0x30 && r <= 0x39) { buf.writeCharCode(r); continue; }\n  if (r >= 0x61 && r <= 0x7A) { buf.writeCharCode(r); continue; }\n  if (r >= 0xAC00 && r <= 0xD7A3) { buf.writeCharCode(r); continue; }\n}\n```\n","data/secure_storage_service.md":"# SecureStorageService\n\n> `lib/data/secure_storage_service.dart` — 암호화 저장소 래퍼\n\n`flutter_secure_storage` wrapper. 모든 메서드가 `static`. 에러 시 **silent fail** (데이터 반환 없이 로깅만)\n\n---\n\n## 저장 정책\n\n| 여기에 저장 | 여기에 저장하지 않음 |\n|-------------|---------------------|\n| 학업 기록 (성적, 목표) | 캐시 (시간표/급식/공지) — 빠른 read, 평문 OK |\n| D-day 등 개인 식별 정보 | Firebase Auth / Kakao SDK 토큰 — SDK 자체 관리 |\n\n---\n\n## 키 상수\n\n```dart\nstatic const String keyGradeExams = 'secure_grade_exams';\nstatic const String keyGradeGoals = 'secure_grade_goals';\nstatic const String keyGradeJeongsiGoals = 'secure_grade_jeongsi_goals';\nstatic const String keyDdays = 'secure_ddays';\n```\n\n네임스페이스 prefix(`secure_`)로 SharedPreferences 키와 충돌 방지\n\n---\n\n## 플랫폼 설정\n\n```dart\nstatic const _storage = FlutterSecureStorage(\n  aOptions: AndroidOptions(encryptedSharedPreferences: true),\n  iOptions: IOSOptions(accessibility: KeychainAccessibility.first_unlock),\n);\n```\n\n- **Android**: `EncryptedSharedPreferences` 사용 (AES-256, Android Keystore 기반)\n- **iOS**: Keychain, `first_unlock` — 기기 부팅 후 최초 잠금 해제 이후 접근 가능. 백그라운드 작업에서도 읽기 가능\n\n---\n\n## 에러 처리 전략\n\n모든 메서드에 `try/catch` + `log()` 적용. **Silent fail 원칙**:\n\n| 메서드 | 에러 시 동작 | 근거 |\n|--------|-------------|------|\n| `read` | `null` 반환 | 호출부가 null을 \"데이터 없음\"으로 처리 → 빈 목록 표시 |\n| `write` | 무시 (로깅만) | 다음 write 시 재시도됨, 앱 크래시보다 데이터 유실이 나음 |\n| `delete` | 무시 (로깅만) | 삭제 실패 시 데이터가 남아있을 뿐 위험하지 않음 |\n| `deleteAll` | 무시 (로깅만) | 회원 탈퇴 시 호출 — 실패해도 Auth 삭제로 재접근 불가 |\n\n```dart\nstatic Future<String?> read(String key) async {\n  try {\n    return await _storage.read(key: key);\n  } catch (e) {\n    log('SecureStorage read failed for $key: $e', name: 'SecureStorage');\n    return null;\n  }\n}\n```\n\n### 알려진 플랫폼 에러\n\n- **Android 앱 재설치 후**: Keystore 키가 남아있지만 EncryptedSharedPreferences 파일이 삭제됨 → `PlatformException` 발생. read에서 null 반환으로 자연 복구\n- **iOS Keychain 접근 거부**: 기기 잠금 해제 전 백그라운드에서 읽기 시도 시 실패. `first_unlock` 설정으로 최소화했지만 극단적 타이밍에서 발생 가능\n\n---\n\n## `read` / `write` / `delete` / `deleteAll`\n\n```dart\nstatic Future<String?> read(String key)\nstatic Future<void> write(String key, String value)\nstatic Future<void> delete(String key)\nstatic Future<void> deleteAll()\n```\n\n기본 CRUD. 모든 값은 String으로 직렬화 (JSON)하여 저장. 호출부([`GradeManager`](grade_manager.md), [`DDayManager`](dday_manager.md))가 `jsonEncode`/`jsonDecode` 담당\n\n---\n\n## `migrateFromPlain`\n\n```dart\nstatic Future<bool> migrateFromPlain({\n  required String key,\n  required String? oldValue,\n  required Future<void> Function() onMigrated,\n})\n```\n\n**설명**: SharedPreferences(평문) → SecureStorage(암호화) 일회성 마이그레이션 helper\n\n```dart\nif (oldValue == null || oldValue.isEmpty) return false;  // 옮길 게 없음\nfinal existing = await read(key);\nif (existing != null && existing.isNotEmpty) return false;  // 이미 있음\nawait write(key, oldValue);      // 암호화 저장\nawait onMigrated();              // 호출부가 SharedPreferences에서 삭제\n```\n\n- [`GradeManager`](grade_manager.md)`.loadExams`, [`DDayManager`](dday_manager.md)`.loadAll` 등에서 첫 호출 시 자동 실행\n- **Idempotent**: 이미 마이그레이션된 경우 `false` 반환, 재실행 안전\n- `onMigrated` 콜백에서 평문 키 삭제 → 마이그레이션 완료 후 평문 데이터 잔존 방지\n\n**반환값**: 옮겨진 경우 `true`, 아닌 경우 `false`\n\n**회귀 방지**: unit test 8개 — 마이그레이션 성공/실패/이미 존재/빈 값 등 케이스 검증\n","data/secure_storage_service_en.md":"# SecureStorageService\n\n> 한국어: [secure_storage_service.md](./secure_storage_service.md)\n\n> `lib/data/secure_storage_service.dart` — Encrypted storage wrapper\n\n`flutter_secure_storage` wrapper. All methods are `static`. On error, **silent fail** (logs only; returns no data).\n\n---\n\n## Storage policy\n\n| Stored here | Not stored here |\n|-------------|----------------|\n| Academic records (grades, goals) | Cache (timetable/meal/notice) — fast reads, plaintext OK |\n| Personally-identifying info like D-day | Firebase Auth / Kakao SDK tokens — managed by the SDKs themselves |\n\n---\n\n## Key constants\n\n```dart\nstatic const String keyGradeExams = 'secure_grade_exams';\nstatic const String keyGradeGoals = 'secure_grade_goals';\nstatic const String keyGradeJeongsiGoals = 'secure_grade_jeongsi_goals';\nstatic const String keyDdays = 'secure_ddays';\n```\n\nThe namespace prefix (`secure_`) prevents collisions with SharedPreferences keys.\n\n---\n\n## Platform configuration\n\n```dart\nstatic const _storage = FlutterSecureStorage(\n  aOptions: AndroidOptions(encryptedSharedPreferences: true),\n  iOptions: IOSOptions(accessibility: KeychainAccessibility.first_unlock),\n);\n```\n\n- **Android**: Uses `EncryptedSharedPreferences` (AES-256, backed by the Android Keystore)\n- **iOS**: Keychain, `first_unlock` — accessible after the first unlock following boot. Readable even from background tasks\n\n---\n\n## Error-handling strategy\n\nEvery method wraps a `try/catch` + `log()`. **Silent-fail principle**:\n\n| Method | On error | Rationale |\n|--------|----------|-----------|\n| `read` | returns `null` | Callers treat null as \"no data\" → show an empty list |\n| `write` | ignored (log only) | Next write will retry; data loss is preferable to app crash |\n| `delete` | ignored (log only) | Failed deletion only leaves data behind; not dangerous |\n| `deleteAll` | ignored (log only) | Called on account deletion — Auth deletion already prevents re-access |\n\n```dart\nstatic Future<String?> read(String key) async {\n  try {\n    return await _storage.read(key: key);\n  } catch (e) {\n    log('SecureStorage read failed for $key: $e', name: 'SecureStorage');\n    return null;\n  }\n}\n```\n\n### Known platform errors\n\n- **After Android reinstall**: The Keystore key remains but the EncryptedSharedPreferences file is wiped → `PlatformException`. Self-heals because read returns null\n- **iOS Keychain access denied**: Attempting a background read before the device is unlocked fails. Minimized by `first_unlock`, but possible in edge-case timing\n\n---\n\n## `read` / `write` / `delete` / `deleteAll`\n\n```dart\nstatic Future<String?> read(String key)\nstatic Future<void> write(String key, String value)\nstatic Future<void> delete(String key)\nstatic Future<void> deleteAll()\n```\n\nBasic CRUD. All values are serialized as String (JSON). Callers ([`GradeManager`](grade_manager.md), [`DDayManager`](dday_manager.md)) handle `jsonEncode`/`jsonDecode`.\n\n---\n\n## `migrateFromPlain`\n\n```dart\nstatic Future<bool> migrateFromPlain({\n  required String key,\n  required String? oldValue,\n  required Future<void> Function() onMigrated,\n})\n```\n\n**Description**: One-shot migration helper from SharedPreferences (plaintext) → SecureStorage (encrypted).\n\n```dart\nif (oldValue == null || oldValue.isEmpty) return false;  // nothing to migrate\nfinal existing = await read(key);\nif (existing != null && existing.isNotEmpty) return false;  // already exists\nawait write(key, oldValue);      // encrypted write\nawait onMigrated();              // caller removes the plaintext from SharedPreferences\n```\n\n- Runs automatically on the first call to [`GradeManager`](grade_manager.md)`.loadExams`, [`DDayManager`](dday_manager.md)`.loadAll`, etc.\n- **Idempotent**: Returns `false` when already migrated; safe to re-run\n- The `onMigrated` callback deletes the plaintext key → prevents residual plaintext data after migration\n\n**Returns**: `true` when migrated, `false` otherwise.\n\n**Regression coverage**: 8 unit tests — validating cases like successful migration, failure, already-exists, and empty values.\n","data/service_locator.md":"# ServiceLocator\r\n\r\n> `lib/data/service_locator.dart` — GetIt DI 설정\r\n\r\n앱 시작 시 한 번 호출하여 의존성을 등록함\r\n\r\n---\r\n\r\n## `setupServiceLocator`\r\n\r\n```dart\r\nFuture<void> setupServiceLocator()\r\n```\r\n\r\n**설명**: GetIt 컨테이너에 Repository와 서비스를 등록함\r\n\r\n```dart\r\nfinal getIt = GetIt.I;\r\n\r\nif (!getIt.isRegistered<AuthRepository>()) {\r\n  getIt.registerLazySingleton<AuthRepository>(\r\n    () => const FirebaseAuthRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<GradeRepository>()) {\r\n  getIt.registerLazySingleton<GradeRepository>(\r\n    () => const LocalGradeRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<LocalDataBase>()) {\r\n  final localDb = LocalDataBase();\r\n  await localDb.migrateFromPrefs();       // SharedPreferences → SQLite 마이그레이션\r\n  getIt.registerSingleton<LocalDataBase>(localDb);\r\n}\r\n```\r\n\r\n- `isRegistered` 체크로 중복 등록 방지 (테스트에서 여러 번 호출해도 안전)\r\n- [`AuthRepository`](auth_repository.md), [`GradeRepository`](grade_repository.md)는 `LazySignleton` (처음 접근 시 생성)\r\n- [`LocalDataBase`](local_database.md)는 즉시 생성 + 마이그레이션 실행\r\n\r\n**호출 위치**: `main()` 함수에서 Firebase 초기화 후 호출\r\n\r\n---\r\n\r\n## `resetServiceLocator`\r\n\r\n```dart\r\nFuture<void> resetServiceLocator()\r\n```\r\n\r\n테스트용 헬퍼. `GetIt.I.reset()`으로 모든 등록을 초기화\r\n\r\n```dart\r\n// 테스트 setUp에서:\r\nawait resetServiceLocator();\r\n// mock 등록\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n```\r\n\r\n---\r\n\r\n## 설계 참고\r\n\r\n> Riverpod Provider 내부에서 `GetIt.I<AuthRepository>()`로 접근하지 않고,\r\n> `ref.read(authRepositoryProvider)` 형태로 별도 Provider를 두는 것이 정석이지만,\r\n> 점진적 마이그레이션 단계라 GetIt + Riverpod 병행을 허용\r\n","data/service_locator_en.md":"# ServiceLocator\n\n> 한국어: [service_locator.md](./service_locator.md)\n\n> `lib/data/service_locator.dart` — GetIt DI configuration\n\nCalled once at app startup to register dependencies.\n\n---\n\n## `setupServiceLocator`\n\n```dart\nFuture<void> setupServiceLocator()\n```\n\n**Description**: Registers Repositories and services into the GetIt container.\n\n```dart\nfinal getIt = GetIt.I;\n\nif (!getIt.isRegistered<AuthRepository>()) {\n  getIt.registerLazySingleton<AuthRepository>(\n    () => const FirebaseAuthRepository(),\n  );\n}\n\nif (!getIt.isRegistered<GradeRepository>()) {\n  getIt.registerLazySingleton<GradeRepository>(\n    () => const LocalGradeRepository(),\n  );\n}\n\nif (!getIt.isRegistered<LocalDataBase>()) {\n  final localDb = LocalDataBase();\n  await localDb.migrateFromPrefs();       // SharedPreferences → SQLite migration\n  getIt.registerSingleton<LocalDataBase>(localDb);\n}\n```\n\n- The `isRegistered` check prevents duplicate registration (safe to call multiple times in tests)\n- [`AuthRepository`](auth_repository.md) and [`GradeRepository`](grade_repository.md) are `LazySingleton` (created on first access)\n- [`LocalDataBase`](local_database.md) is created eagerly and runs migration\n\n**Call site**: Called from `main()` after Firebase initialization.\n\n---\n\n## `resetServiceLocator`\n\n```dart\nFuture<void> resetServiceLocator()\n```\n\nTest-only helper. Resets all registrations via `GetIt.I.reset()`.\n\n```dart\n// In test setUp:\nawait resetServiceLocator();\n// register mocks\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\n```\n\n---\n\n## Design note\n\n> The canonical approach is to expose repositories through dedicated Providers (e.g., `ref.read(authRepositoryProvider)`) instead of calling `GetIt.I<AuthRepository>()` inside Riverpod Providers,\n> but since this project is in a gradual migration phase, coexistence of GetIt + Riverpod is allowed.\n","data/setting_data.md":"# SettingData\r\n\r\n> `lib/data/setting_data.dart` — SharedPreferences 설정 싱글톤\r\n\r\n앱 전체 설정을 SharedPreferences로 관리하는 싱글턴 클래스\r\n\r\n---\r\n\r\n## 싱글턴 패턴\r\n\r\n```dart\r\nstatic final SettingData _instance = SettingData._internal();\r\nfactory SettingData() => _instance;\r\n```\r\n\r\n`SettingData()`로 어디서든 같은 인스턴스 접근\r\n\r\n---\r\n\r\n## `init`\r\n\r\n```dart\r\nFuture<void> init()\r\n```\r\n\r\n`main()` 시작 시 한 번 호출. `SharedPreferences.getInstance()` 결과를 내부에 캐시\r\n\r\n---\r\n\r\n## 학년/반 설정\r\n\r\n| 프로퍼티 | SharedPreferences 키 | 기본값 |\r\n|----------|---------------------|--------|\r\n| `grade` (get/set) | `'Grade'` | 0 |\r\n| `classNum` (get/set) | `'Class'` | 0 |\r\n| `isGradeSet` (get) | — | `grade > 0 && classNum > 0` |\r\n\r\n---\r\n\r\n## 테마 설정\r\n\r\n| 프로퍼티 | 키 | 기본값 | 설명 |\r\n|----------|----|--------|------|\r\n| `isDarkMode` | `'isDarkMode'` | false | 레거시 (themeModeIndex로 대체) |\r\n| `themeModeIndex` | `'themeModeIndex'` | 2 | 0=라이트, 1=다크, 2=시스템 |\r\n\r\n---\r\n\r\n## 알림 설정\r\n\r\n| 프로퍼티 | 키 | 기본값 |\r\n|----------|----|--------|\r\n| `isBreakfastNotificationOn` | `'isBreakfastNotificationOn'` | true |\r\n| `breakfastTime` | `'breakfastTime'` | `'06:30'` |\r\n| `isLunchNotificationOn` | `'isLunchNotificationOn'` | true |\r\n| `lunchTime` | `'lunchTime'` | `'12:00'` |\r\n| `isDinnerNotificationOn` | `'isDinnerNotificationOn'` | true |\r\n| `dinnerTime` | `'dinnerTime'` | `'17:00'` |\r\n| `isBoardNotificationOn` | `'isBoardNotificationOn'` | true |\r\n\r\n---\r\n\r\n## 범용 접근자\r\n\r\n```dart\r\nbool getBool(String key, {bool defaultValue = false})\r\nvoid setBool(String key, bool value)\r\n```\r\n\r\n카테고리별 알림 토글 등 동적 키에 사용. 예: `getBool('noti_board_자유', defaultValue: true)`\r\n","data/setting_data_en.md":"# SettingData\n\n> 한국어: [setting_data.md](./setting_data.md)\n\n> `lib/data/setting_data.dart` — SharedPreferences settings singleton\n\nSingleton class that manages app-wide settings through SharedPreferences.\n\n---\n\n## Singleton pattern\n\n```dart\nstatic final SettingData _instance = SettingData._internal();\nfactory SettingData() => _instance;\n```\n\n`SettingData()` provides access to the same instance from anywhere.\n\n---\n\n## `init`\n\n```dart\nFuture<void> init()\n```\n\nCalled once at the start of `main()`. Caches the result of `SharedPreferences.getInstance()` internally.\n\n---\n\n## Grade/class settings\n\n| Property | SharedPreferences key | Default |\n|----------|----------------------|---------|\n| `grade` (get/set) | `'Grade'` | 0 |\n| `classNum` (get/set) | `'Class'` | 0 |\n| `isGradeSet` (get) | — | `grade > 0 && classNum > 0` |\n\n---\n\n## Theme settings\n\n| Property | Key | Default | Description |\n|----------|-----|---------|-------------|\n| `isDarkMode` | `'isDarkMode'` | false | Legacy (superseded by themeModeIndex) |\n| `themeModeIndex` | `'themeModeIndex'` | 2 | 0=light, 1=dark, 2=system |\n\n---\n\n## Notification settings\n\n| Property | Key | Default |\n|----------|-----|---------|\n| `isBreakfastNotificationOn` | `'isBreakfastNotificationOn'` | true |\n| `breakfastTime` | `'breakfastTime'` | `'06:30'` |\n| `isLunchNotificationOn` | `'isLunchNotificationOn'` | true |\n| `lunchTime` | `'lunchTime'` | `'12:00'` |\n| `isDinnerNotificationOn` | `'isDinnerNotificationOn'` | true |\n| `dinnerTime` | `'dinnerTime'` | `'17:00'` |\n| `isBoardNotificationOn` | `'isBoardNotificationOn'` | true |\n\n---\n\n## Generic accessors\n\n```dart\nbool getBool(String key, {bool defaultValue = false})\nvoid setBool(String key, bool value)\n```\n\nUsed for dynamic keys such as per-category notification toggles. Example: `getBool('noti_board_자유', defaultValue: true)`.\n","data/subject.md":"# Subject\r\n\r\n> `lib/data/subject.dart` — 과목 데이터 모델 (freezed)\r\n\r\n`@freezed` 기반이지만 커스텀 `==`/`hashCode`를 오버라이드. JSON 직렬화는 코드 생성(`subject.g.dart`)\r\n\r\n---\r\n\r\n## 필드\r\n\r\n```dart\r\n@freezed\r\nclass Subject with _$Subject {\r\n  const factory Subject({\r\n    required String subjectName,   // 과목명 (예: '국어', '수학')\r\n    required int subjectClass,     // 반 번호. -1이면 특별실 과목\r\n    String? category,              // 과목 카테고리 (관리자 Firestore에서 설정)\r\n    @Default(false) bool isOriginal, // 관리자가 등록한 원본 과목 여부\r\n  }) = _Subject;\r\n}\r\n```\r\n\r\n- `subjectClass`: NEIS 시간표에서 `CLASS_NM` 값. 특별실(반 번호 없음)이면 `-1`\r\n- `category`: `TimetableDataApi.getSubjectsFromAdminFirestore`에서 가져오는 분류\r\n- `isOriginal`: 관리자 등록 과목이면 true, NEIS 자동 추출이면 false\r\n\r\n---\r\n\r\n## 동등성 비교 (커스텀)\r\n\r\n```dart\r\n@override\r\nbool operator ==(Object other) =>\r\n    identical(this, other) ||\r\n    other is Subject &&\r\n        runtimeType == other.runtimeType &&\r\n        subjectName == other.subjectName &&\r\n        subjectClass == other.subjectClass;\r\n\r\n@override\r\nint get hashCode => subjectName.hashCode ^ subjectClass.hashCode;\r\n```\r\n\r\n`subjectName` + `subjectClass` 조합으로 동등성 판단. `category`와 `isOriginal`은 비교에서 제외\r\n\r\n**이유**: `TimetableDataApi.getAllSubjectCombinations`에서 Set에 Subject를 넣어 중복 제거 시, 같은 과목+반 조합이면 같은 과목으로 취급해야 하므로\r\n\r\n---\r\n\r\n## JSON 직렬화\r\n\r\n```dart\r\nfactory Subject.fromJson(Map<String, dynamic> json) => _$SubjectFromJson(json);\r\n```\r\n\r\n[`SubjectDataManager`](subject_data_manager.md)에서 SharedPreferences/Firestore에 저장/복원할 때 사용\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|------|------|\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getAllSubjectCombinations` | NEIS 시간표에서 과목+반 조합 추출, Set으로 중복 제거 |\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getCustomTimeTable` | 사용자 선택 Subject 리스트로 커스텀 시간표 생성 |\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getSubjectsFromAdminFirestore` | Firestore에서 관리자 등록 과목 조회 |\r\n| [`SubjectDataManager`](subject_data_manager.md) | 선택과목 로컬/Firestore 저장 |\r\n| `TimetableSelectScreen` | 과목 선택 UI에서 Subject 리스트 표시 |\r\n","data/subject_data_manager.md":"# SubjectDataManager\r\n\r\n> `lib/data/subject_data_manager.dart` — 선택과목 로드/저장, Firestore 동기화\r\n\r\n모든 메서드가 `static`. 학년별 선택과목을 SharedPreferences(로컬)와 Firestore(클라우드) 양쪽에 관리\r\n\r\n---\r\n\r\n## `loadSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<List<Subject>> loadSelectedSubjects(int grade)\r\n```\r\n\r\n**설명**: 학년별 선택과목 목록을 로드함\r\n\r\n1. SharedPreferences에서 로컬 데이터 확인:\r\n   ```dart\r\n   final jsonString = prefs.getString('$_selectedSubjectsKeyPrefix$grade');\r\n   // 키: 'selected_subjects_grade_1', 'selected_subjects_grade_2', ...\r\n   ```\r\n\r\n2. 로컬 데이터가 없고 로그인 상태면 Firestore에서 복원:\r\n   ```dart\r\n   if (localSubjects.isEmpty && AuthService.isLoggedIn) {\r\n     final doc = await FirebaseFirestore.instance\r\n         .collection('users').doc(uid)\r\n         .collection('subjects').doc('grade_$grade')\r\n         .get();\r\n   }\r\n   ```\r\n\r\n3. Firestore에서 복원한 데이터는 로컬에도 저장:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, localSubjects);\r\n   ```\r\n\r\n---\r\n\r\n## `saveSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<void> saveSelectedSubjects(int grade, List<Subject> selectedSubjects)\r\n```\r\n\r\n**설명**: 선택과목을 로컬과 Firestore 양쪽에 저장함\r\n\r\n1. 로컬 SharedPreferences에 즉시 저장:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, selectedSubjects);\r\n   ```\r\n\r\n2. 로그인 상태면 Firestore에도 동기화:\r\n   ```dart\r\n   await FirebaseFirestore.instance\r\n       .collection('users').doc(uid)\r\n       .collection('subjects').doc('grade_$grade')\r\n       .set({\r\n     'subjects': selectedSubjects.map((s) => s.toJson()).toList(),\r\n     'updatedAt': FieldValue.serverTimestamp(),\r\n   });\r\n   ```\r\n\r\n---\r\n\r\n## `_saveLocal`\r\n\r\n```dart\r\nstatic Future<void> _saveLocal(SharedPreferences prefs, int grade, List<Subject> subjects)\r\n```\r\n\r\n내부 헬퍼. [Subject](subject.md) 리스트를 JSON 인코딩 후 SharedPreferences에 저장\r\n","data/subject_data_manager_en.md":"# SubjectDataManager\n\n> 한국어: [subject_data_manager.md](./subject_data_manager.md)\n\n> `lib/data/subject_data_manager.dart` — Loads/saves elective subjects, syncs with Firestore\n\nAll methods are `static`. Manages per-grade elective subjects across both SharedPreferences (local) and Firestore (cloud).\n\n---\n\n## `loadSelectedSubjects`\n\n```dart\nstatic Future<List<Subject>> loadSelectedSubjects(int grade)\n```\n\n**Description**: Loads the list of elective subjects for a given grade.\n\n1. Check local data from SharedPreferences:\n   ```dart\n   final jsonString = prefs.getString('$_selectedSubjectsKeyPrefix$grade');\n   // keys: 'selected_subjects_grade_1', 'selected_subjects_grade_2', ...\n   ```\n\n2. If no local data and the user is signed in, restore from Firestore:\n   ```dart\n   if (localSubjects.isEmpty && AuthService.isLoggedIn) {\n     final doc = await FirebaseFirestore.instance\n         .collection('users').doc(uid)\n         .collection('subjects').doc('grade_$grade')\n         .get();\n   }\n   ```\n\n3. Data restored from Firestore is also written locally:\n   ```dart\n   await _saveLocal(prefs, grade, localSubjects);\n   ```\n\n---\n\n## `saveSelectedSubjects`\n\n```dart\nstatic Future<void> saveSelectedSubjects(int grade, List<Subject> selectedSubjects)\n```\n\n**Description**: Saves the selected subjects to both local storage and Firestore.\n\n1. Immediately save to local SharedPreferences:\n   ```dart\n   await _saveLocal(prefs, grade, selectedSubjects);\n   ```\n\n2. If signed in, also sync to Firestore:\n   ```dart\n   await FirebaseFirestore.instance\n       .collection('users').doc(uid)\n       .collection('subjects').doc('grade_$grade')\n       .set({\n     'subjects': selectedSubjects.map((s) => s.toJson()).toList(),\n     'updatedAt': FieldValue.serverTimestamp(),\n   });\n   ```\n\n---\n\n## `_saveLocal`\n\n```dart\nstatic Future<void> _saveLocal(SharedPreferences prefs, int grade, List<Subject> subjects)\n```\n\nInternal helper. JSON-encodes the [Subject](subject.md) list and writes it to SharedPreferences.\n","data/subject_en.md":"# Subject\n\n> 한국어: [subject.md](./subject.md)\n\n> `lib/data/subject.dart` — Subject data model (freezed)\n\nBased on `@freezed`, but overrides `==`/`hashCode` with custom implementations. JSON serialization is code-generated (`subject.g.dart`).\n\n---\n\n## Fields\n\n```dart\n@freezed\nclass Subject with _$Subject {\n  const factory Subject({\n    required String subjectName,   // Subject name (e.g., 'Korean', 'Math')\n    required int subjectClass,     // Class number. -1 for special-room subjects\n    String? category,              // Subject category (configured in admin Firestore)\n    @Default(false) bool isOriginal, // Whether the subject was registered by an admin\n  }) = _Subject;\n}\n```\n\n- `subjectClass`: `CLASS_NM` value from the NEIS timetable. `-1` for special rooms (no class number)\n- `category`: Classification fetched by `TimetableDataApi.getSubjectsFromAdminFirestore`\n- `isOriginal`: true for admin-registered subjects, false for NEIS auto-extracted ones\n\n---\n\n## Equality (custom)\n\n```dart\n@override\nbool operator ==(Object other) =>\n    identical(this, other) ||\n    other is Subject &&\n        runtimeType == other.runtimeType &&\n        subjectName == other.subjectName &&\n        subjectClass == other.subjectClass;\n\n@override\nint get hashCode => subjectName.hashCode ^ subjectClass.hashCode;\n```\n\nEquality is determined by the combination of `subjectName` + `subjectClass`. `category` and `isOriginal` are excluded from comparison.\n\n**Reason**: When `TimetableDataApi.getAllSubjectCombinations` puts Subjects into a Set to deduplicate, any two with the same subject+class should be treated as the same subject.\n\n---\n\n## JSON serialization\n\n```dart\nfactory Subject.fromJson(Map<String, dynamic> json) => _$SubjectFromJson(json);\n```\n\nUsed by [`SubjectDataManager`](subject_data_manager.md) when saving/restoring to SharedPreferences/Firestore.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|----------|---------|\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getAllSubjectCombinations` | Extracts subject+class combinations from the NEIS timetable and deduplicates with a Set |\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getCustomTimeTable` | Builds a custom timetable from a user-selected Subject list |\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getSubjectsFromAdminFirestore` | Queries admin-registered subjects from Firestore |\n| [`SubjectDataManager`](subject_data_manager.md) | Local/Firestore storage for elective subjects |\n| `TimetableSelectScreen` | Displays the Subject list in the subject-selection UI |\n","features/admin-features.md":"# 관리자 기능 (Flutter Admin + Next.js Admin Web)\n\n> English: [admin-features_en.md](./admin-features_en.md)\n\n`manager` / `admin` 역할 사용자를 위한 관리 기능입니다. Flutter 앱 내 Admin 화면과 별도 Next.js 대시보드 두 채널로 제공됩니다.\n\n## 역할 체계\n\n| 역할 | 권한 범위 |\n|---|---|\n| `user` | 일반 기능 |\n| `manager` | 승인/정지 없는 사용자 관리 + 모든 일반 기능 |\n| `admin` | 모든 권한 (다른 admin 임명 포함) |\n\n**검증 위치**: `firestore.rules`의 `isAdminOrManager()` / `isAdmin()` 헬퍼. Cloud Functions는 호출 시 Firestore `role` 필드 재확인.\n\n## Flutter Admin 화면\n\n**진입**: 설정 → 관리자 (manager/admin만 표시)\n\n### ExpansionTile 기반 탭 구조\n\n5개 섹션이 펼쳤다 접었다 할 수 있는 `ExpansionTile` 카드로 구성 — 닫힌 탭은 child 렌더 안 함으로 Firestore 읽기 0 ([기술과제 #9](../guides/technical-challenges.md#9-관리자-화면-firestore-읽기-과다-stream--future-전환))\n\n| 탭 | 내용 |\n|---|---|\n| **승인 대기** | `approved: false` 사용자 목록 → 승인/거절 |\n| **정지** | 정지 기간 설정 (1시간~30일) / 즉시 해제 |\n| **사용자** | 전체 검색, 역할 변경, 상세 보기 |\n| **신고** | 신고된 글/댓글 목록, 삭제 처리 |\n| **삭제 로그** | `admin_logs` 최근 액션 |\n| **건의사항** | 상태 변경 (대기 → 확인 → 해결) |\n\n### 액션 후 수동 갱신\n\n- `StreamBuilder` 대신 `FutureBuilder` → 액션 후 `_refresh()` 호출\n- **결과**: 화면 열 때 130+ 읽기 → 20~30으로 감소\n\n**관련 파일**: `lib/screens/board/admin_screen.dart`, `lib/screens/board/admin/users_tab.dart`\n\n## Next.js Admin Web (`/admin-web`)\n\n웹 브라우저에서 접속 가능한 별도 대시보드. 동일 Firestore를 공유하며 `admin` 역할만 접근 가능.\n\n### 페이지 구성\n\n`admin-web/app/` 하위:\n\n| 경로 | 내용 |\n|---|---|\n| `dashboard/` | 통계 카드 (사용자 수, 신고 수, 대기 건 등) |\n| `users/` | 사용자 검색/필터/승인/정지/역할 변경 |\n| `posts/` | 게시글 검색/삭제 |\n| `comments/` | 댓글 모더레이션 |\n| `reports/` | 신고 큐 처리 |\n| `feedbacks/` | 건의사항 상태 변경 |\n| `crashes/` | Crashlytics 로그 Firestore 미러 조회 |\n| `function-logs/` | Cloud Functions 오류 로그 (`function_logs` 컬렉션) |\n| `settings/` | 긴급 팝업 공지, 앱 버전 (`app_config`) |\n\n### 공통 UX\n\n- **다크 모드** 토글, 모바일 반응형\n- **익명 → 실명 확인** (admin만, 감사 로그 남김)\n- **감사 로그 기록**: 모든 관리 행위 (`admin_logs`)\n\n**관련 파일**: `admin-web/app/`, `admin-web/components/`, `admin-web/lib/`\n\n## 감사 로그 (`admin_logs`)\n\n| 필드 | 예시 |\n|---|---|\n| `action` | `approve_user`, `suspend_user`, `change_role`, `delete_post`, `resolve_feedback` |\n| `actorUid` | 액션 수행한 관리자 |\n| `targetUid` / `targetPostId` | 대상 |\n| `detail` | JSON 필드 (이전/이후 값) |\n| `createdAt` | 타임스탬프 |\n\n인덱스: `action ASC, createdAt DESC` → Admin Web에서 액션별 필터 가능.\n\n## 크래시 모니터링\n\n- **Crashlytics** 기본 대시보드는 Firebase 콘솔에서 확인\n- 추가로 `function_logs` 컬렉션에 Cloud Functions 오류 저장\n- Admin Web `crashes/`에서 Firestore 미러 조회 (빠른 쿼리 / 필터 / 삭제)\n\n## 긴급 팝업 공지 관리\n\n- `app_config/announcement` 문서 수정\n- 필드: `title`, `body`, `type` (`urgent`/`notice`/`event`), `startAt`, `endAt`, `hideToday`\n- 사용자 동작은 [공개 기능 > 긴급 팝업 공지](./public-features.md#긴급-팝업-공지) 참조\n\n## 사용자 관리 플로우\n\n```mermaid\ngraph LR\n    A[신규 가입] --> B{관리자 승인}\n    B -->|승인| C[일반 사용]\n    B -->|거절| D[계정 비활성]\n    C --> E{위반 신고}\n    E -->|경미| F[관리자 메모]\n    E -->|중대| G[정지 1시간~30일]\n    G -->|만료| C\n    G -->|영구| H[영구 정지 = 탈퇴]\n```\n\n- **자동 정지 해제**: Cloud Functions 스케줄러가 매시간 `suspendedUntil <= now` 조회 → 필드 삭제 → `onUserUpdated` 트리거 → 해제 푸시\n\n## 관련 문서\n- [인증 & 접근](../guides/account-and-access.md)\n- [보안 모델](../guides/security.md) — rules 헬퍼 함수, 필드 단위 검증\n- [CI/CD & 배포](../guides/cicd-setup.md)\n- [배포 가이드](../../DEPLOY.md)\n","features/admin-features_en.md":"# Admin Features (Flutter Admin + Next.js Admin Web)\n\n> 한국어: [admin-features.md](./admin-features.md)\n\nManagement functionality for `manager` / `admin` roles. Delivered through two channels: an in-app Flutter Admin screen, and a separate Next.js dashboard.\n\n## Role System\n\n| Role | Scope |\n|---|---|\n| `user` | General features |\n| `manager` | User management (without full suspension powers) + all general features |\n| `admin` | Everything (can promote other admins) |\n\n**Validation**: `isAdminOrManager()` / `isAdmin()` helpers in `firestore.rules`. Cloud Functions re-check the Firestore `role` field at call time.\n\n## Flutter Admin Screen\n\n**Entry**: Settings → Admin (visible to manager/admin)\n\n### ExpansionTile-Based Tabs\n\nFive sections as collapsible `ExpansionTile` cards — collapsed tabs render nothing, so Firestore reads are 0 ([Technical Challenge #9](../guides/technical-challenges_en.md#9-admin-screen-firestore-read-overload-stream--future-transition)).\n\n| Tab | Content |\n|---|---|\n| **Pending approval** | Users with `approved: false` → approve/reject |\n| **Suspension** | Set duration (1h–30d) / immediate release |\n| **Users** | Full search, role change, detail view |\n| **Reports** | Reported posts/comments queue, moderation |\n| **Deletion log** | Recent entries in `admin_logs` |\n| **Feedback** | Change state (pending → acknowledged → resolved) |\n\n### Manual Refresh After Actions\n\n- Uses `FutureBuilder` (not `StreamBuilder`) → call `_refresh()` after each action\n- **Result**: opening the screen dropped from 130+ reads to 20–30\n\n**Files**: `lib/screens/board/admin_screen.dart`, `lib/screens/board/admin/users_tab.dart`\n\n## Next.js Admin Web (`/admin-web`)\n\nA browser-based dashboard sharing the same Firestore. Only `admin` role can enter.\n\n### Pages\n\nUnder `admin-web/app/`:\n\n| Path | Content |\n|---|---|\n| `dashboard/` | Stats cards (user count, reports, pending, etc.) |\n| `users/` | User search / filter / approve / suspend / role change |\n| `posts/` | Post search / delete |\n| `comments/` | Comment moderation |\n| `reports/` | Report queue |\n| `feedbacks/` | Feedback state change |\n| `crashes/` | Crashlytics log mirror in Firestore |\n| `function-logs/` | Cloud Function error logs (`function_logs` collection) |\n| `settings/` | Urgent popup, app version (`app_config`) |\n\n### Common UX\n\n- **Dark mode** toggle, mobile-responsive\n- **Anonymous → real-name reveal** (admin-only, audit-logged)\n- **Audit logging**: every admin action recorded in `admin_logs`\n\n**Files**: `admin-web/app/`, `admin-web/components/`, `admin-web/lib/`\n\n## Audit Log (`admin_logs`)\n\n| Field | Example |\n|---|---|\n| `action` | `approve_user`, `suspend_user`, `change_role`, `delete_post`, `resolve_feedback` |\n| `actorUid` | admin who performed the action |\n| `targetUid` / `targetPostId` | subject |\n| `detail` | JSON (before/after) |\n| `createdAt` | timestamp |\n\nIndex: `action ASC, createdAt DESC` — Admin Web can filter by action type.\n\n## Crash Monitoring\n\n- **Crashlytics** baseline in Firebase Console\n- Additionally, Cloud Functions errors are persisted in `function_logs`\n- Admin Web `crashes/` pulls from Firestore for fast query / filter / delete\n\n## Urgent Popup Management\n\n- Edit `app_config/announcement` document\n- Fields: `title`, `body`, `type` (`urgent` / `notice` / `event`), `startAt`, `endAt`, `hideToday`\n- User-facing behavior → [public-features_en.md#urgent-popup-announcements](./public-features_en.md#urgent-popup-announcements)\n\n## User-Management Flow\n\n```mermaid\ngraph LR\n    A[signup] --> B{admin approval}\n    B -->|approve| C[general use]\n    B -->|reject| D[disabled]\n    C --> E{violation report}\n    E -->|minor| F[admin note]\n    E -->|serious| G[suspension 1h–30d]\n    G -->|expires| C\n    G -->|permanent| H[permanent = deletion]\n```\n\n- **Auto-unsuspension**: Cloud Functions scheduler checks `suspendedUntil <= now` hourly → deletes the field → `onUserUpdated` trigger → unsuspension push\n\n## See Also\n- [Account & Access](../guides/account-and-access_en.md)\n- [Security Model](../guides/security_en.md) — rules helpers, field validation\n- [CI/CD Setup](../guides/cicd-setup_en.md)\n- [Deployment Guide](../../DEPLOY_en.md)\n","features/community-features.md":"# 커뮤니티 기능 (게시판 / 채팅 / 알림)\n\n> English: [community-features_en.md](./community-features_en.md)\n\n학생·교사·졸업생·학부모가 서로 소통하는 기능을 묶었습니다. 게시판, 1:1 채팅, 알림 시스템이 여기 포함됩니다.\n\n## 게시판\n\n### 카테고리 & 탐색\n\n- **6개 카테고리** + **인기글** 탭: 자유 / 질문 / 정보공유 / 분실물 / 학생회 / 동아리\n- **인기글 정렬**: `likeCount` 비정규화 카운터 + composite index `(likeCount desc, createdAt desc)` ([ADR-04](../guides/architecture-decisions.md#adr-04-좋아요-카운터))\n- **커서 기반 페이지네이션** (20개씩, 무한 스크롤, 당겨서 새로고침)\n- **공지 시스템** (최대 3개, 상단 고정, 관리자 전용)\n\n### 작성 / 본문\n\n- **이미지 첨부**: 1080px 압축 + EXIF/GPS 제거, PageView swipe viewer + Hero animation + pinch-zoom\n- **투표** 첨부 (최대 6선택지, 실시간 결과 바)\n- **일정 공유** (학사일정 링크)\n- **익명 번호제**: 익명1/익명2/익명(글쓴이), Firestore Transaction ([기술과제 #3](../guides/technical-challenges.md#3-익명-게시판-번호-일관성-concurrent-write))\n\n### 인터랙션\n\n- **추천/비추천**: `Map<uid,bool>` + `likeCount` int counter, rules 단계 ±1 delta 검증 ([ADR-04](../guides/architecture-decisions.md#adr-04-좋아요-카운터))\n- **북마크** (내 활동 → 저장한 글에서 재조회)\n- **댓글 + 대댓글** (들여쓰기), 글쓴이 댓글 구분 (파란 배경 + 뱃지)\n\n### 검색\n\n- **n-gram 검색**: 제목+본문 2-gram을 `searchTokens` 배열에 인덱싱, `array-contains-any` 쿼리 ([ADR-03](../guides/architecture-decisions.md#adr-03-게시판-검색-클라이언트-n-gram-인덱싱))\n- **350ms debounce**, 50개 fetch + client substring 필터로 false positive 줄임\n- **검색 history**: 최근 10개 검색어 chip, 개별/전체 삭제\n\n### UX\n\n- Shimmer 스켈레톤 로딩\n- **바텀시트 메뉴** (아이콘 + 텍스트, 삭제/신고 빨간색 강조)\n- 신고, 사용자 차단, 글 자동 삭제 (TTL), Rate Limiting\n\n### 내 활동\n\n- 내가 쓴 글 / 내가 쓴 댓글 / 저장한 글 탭 분리\n- `authorUid + createdAt` composite index 사용\n\n**관련 파일**: `lib/screens/board/board_screen.dart`, `post_detail_screen.dart`, `write_post_screen.dart`, `my_posts_screen.dart`, `bookmarked_posts_screen.dart`, `search_history_service_test.dart`, `search_tokens_test.dart`\n\n## 1:1 채팅\n\n- **유저 검색**으로 새 채팅 시작 (이름/학번 검색, 관리자 기본 표시)\n- **실시간 메시지** (Firestore onSnapshot, limit 30)\n- **읽음 표시** + 읽지 않은 메시지 수 뱃지 ([기술과제 #6](../guides/technical-challenges.md#6-채팅-읽음-확인-실시간-동기화-dual-stream))\n- **메시지 삭제**: 나만 삭제 / 같이 삭제 (안 읽었고 1시간 이내)\n- **채팅방 나가기**: 시스템 메시지 + 상대방 채팅 유지\n- 스켈레톤 로딩 UI\n\n**보안**: `chats/{chatId}`의 `participants` 배열 기반 rules 검증. 참여자만 read/write.\n\n**관련 파일**: `lib/screens/chat/chat_list_screen.dart`, `chat_room_screen.dart`, `chat_utils.dart`\n\n## 알림 시스템\n\n### 설정 화면\n\n**5개 카테고리** 개별 on/off:\n\n| 카테고리 | 트리거 | 경로 |\n|---|---|---|\n| **댓글/답글** | 내 글에 댓글 / 내 댓글에 답글 | Cloud Functions → FCM |\n| **채팅** | 새 메시지 | Cloud Functions → FCM |\n| **새 글** | 관심 카테고리 새 글 | Cloud Functions → FCM |\n| **계정** | 승인/정지/해제/역할변경 | Cloud Functions → FCM |\n| **급식** | 조식/중식/석식 | 로컬 알림 (시간 설정) |\n\n### 구현\n\n- **인앱 알림**: 벨 아이콘 + 안 읽은 뱃지 (`users/{uid}/notifications/{id}`)\n- **FCM 푸시**: FCM 4종 (`account` / `comment` / `new_post` / `chat`) + 로컬 3종 (조식/중식/석식)\n- **서버 필터링**: `users/{uid}`의 `notiXxx` 필드를 Cloud Functions에서 발송 전 체크 ([기술과제 #7](../guides/technical-challenges.md#7-cloud-functions-알림-설정-개별-제어-server-side-filtering))\n- **정지 만료 자동 해제**: Cloud Functions 스케줄러 (매시간) ([기술과제 #8](../guides/technical-challenges.md#8-정지-만료-자동-해제-scheduler-trigger))\n\n**관련 파일**: `lib/notification/fcm_service.dart`, `lib/screens/sub/notification_setting_screen.dart`, `lib/screens/board/notification_screen.dart`, `functions/index.js`\n\n## 건의사항\n\n- **앱 건의사항 & 버그 제보** + **학생회 건의사항** 두 채널\n- 텍스트(1000자) + 사진 첨부(최대 3장)\n- 상태 관리: 대기중 → 확인됨 → 해결됨 → 삭제 (로그 기록)\n- 관리자 Admin Web에서 상태 변경\n\n**관련 파일**: `lib/screens/sub/feedback_screen.dart`, `feedback_list_screen.dart`\n\n## Rate Limiting\n\n| 대상 | 제한 |\n|---|---|\n| 글 작성 | 30초 쿨타임 |\n| 댓글 작성 | 10초 쿨타임 |\n| 신고 | 동일 `(postId, reporterUid)` 중복 방지 (인덱스) |\n| 채팅 메시지 | (기본 클라이언트 debounce) |\n\nRate Limit은 클라이언트 선방어 + Firestore Rules에서 최소 검증.\n\
