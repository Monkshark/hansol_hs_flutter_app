 급식, 시간표, 일정, 커뮤니티, 성적\n- **학생 프라이버시 우선** — 성적은 로컬 전용, OAuth 전용 인증\n- **실시간성** — Firestore onSnapshot + FCM 푸시\n- **오프라인 친화** — 급식/시간표 캐시, 오프라인 배너, sqflite 개인 일정\n- **저비용 운영** — 1,000명 기준 $0~3/월 (무료 한도 내)\n\n## 범위 경계 (명시적으로 하지 않는 것)\n\n- **성적은 서버 저장/백업 없음** — 기기 변경 시 이관 안 됨 (의도)\n- **교무 시스템 연동 없음** — NEIS 공공 API만 사용\n- **웹 버전 없음** — 관리자 대시보드만 웹. 일반 사용자는 앱 전용\n- **결제/유료 기능 없음**\n\n## 규모 지표\n\n| 항목 | 수치 |\n|---|---|\n| 총 코드 라인 | 약 40,000 (Dart 33,389 + TS 2,098 + Java/XML 1,181 + Swift 330 + JS 543) |\n| 소스 파일 | 122 (Flutter) + 22 (Admin Web TS/TSX) + Android/iOS 위젯 |\n| Cloud Functions | 13개 |\n| OAuth 로그인 | 4종 (Google / Apple / Kakao / GitHub) |\n| 푸시 알림 | FCM 4종 (`account` / `comment` / `new_post` / `chat`) + 로컬 3종 (조식/중식/석식) |\n| 테스트 | 513 Flutter + 34 Rules = 547개 |\n\n## 기술 스택 요약\n\n| 분류 | 기술 |\n|---|---|\n| Mobile | Flutter (Dart) — Android / iOS |\n| State | Riverpod 2.5 |\n| DI | GetIt + Abstract Repository |\n| Admin Web | Next.js 14 + TypeScript + Tailwind |\n| Backend | Firebase (Auth / Firestore / Storage / FCM / Crashlytics) |\n| Server | Cloud Functions (Node.js) |\n| External | NEIS 공공데이터 API |\n\n상세는 [architecture-overview.md](./architecture-overview.md).\n\n## 주요 플로우 요약\n\n1. **OAuth 로그인 → 신분 선택 → 관리자 승인 → 홈 진입** ([account-and-access.md](./account-and-access.md))\n2. **홈에서 급식/시간표/일정 조회** ([public-features.md](../features/public-features.md))\n3. **게시판/채팅으로 소통** ([community-features.md](../features/community-features.md))\n4. **성적/개인일정은 로컬 관리** ([personal-features.md](../features/personal-features.md))\n5. **관리자는 Admin Web에서 사용자/콘텐츠 관리** ([admin-features.md](../features/admin-features.md))\n\n## 관련 문서\n- [아키텍처 개요](./architecture-overview.md)\n- [아키텍처 의사결정 일지](./architecture-decisions.md)\n- [기여 가이드](../../CONTRIBUTING.md)\n- [배포 가이드](../../DEPLOY.md)\n- [엔드유저 가이드](../../USER_GUIDE.md)\n","guides/product-overview_en.md":"# Product Overview\n\n> 한국어: [product-overview.md](./product-overview.md)\n\n## One-Liner\n\n**An integrated school platform for students, teachers, alumni, and parents of Hansol High School (Sejong, Korea).** Built on a Flutter mobile app + Next.js admin dashboard with NEIS public-data API integration, Firebase realtime database, role-based access control, push notifications, and 1:1 chat — at production-service quality.\n\n## Why This Exists\n\nSchool announcements, meals, timetables, and academic calendars are scattered across different websites and notification channels. This app unifies them **in one user context**, and adds a student community layer (board / chat) to consolidate school communication.\n\n**Grade management** stays strictly local to protect student privacy, while still offering trend charts and per-subject goal management.\n\n## Audience\n\n| Audience | Value |\n|---|---|\n| **Students** | Meals / timetable / academic calendar / board / chat / grades / personal schedule / home widget |\n| **Teachers** | Teacher-view timetable, announcements, approvals/moderation |\n| **Alumni** | Login + community access (grade/timetable limited) |\n| **Parents** | Academic calendar / announcements / urgent popup subscription |\n| **Admins (manager/admin)** | Flutter Admin screen + Next.js Admin Web |\n\n## Core Value Props\n\n- **Everything school-related in one app** — meals, timetable, schedule, community, grades\n- **Student privacy first** — grades stored locally only, OAuth-only auth\n- **Realtime** — Firestore onSnapshot + FCM push\n- **Offline-friendly** — meal/timetable cache, offline banner, sqflite personal schedule\n- **Low-cost ops** — $0–3 / month at ~1,000 users (free tier)\n\n## Scope Boundaries (Explicit Non-Goals)\n\n- **Grades are not backed up or synced** — device change loses data (intentional)\n- **No school-internal system integration** — only NEIS public API\n- **No web version** — Admin dashboard is web, end users are app-only\n- **No payments / paid features**\n\n## Scale Numbers\n\n| Item | Value |\n|---|---|\n| Total LOC | ~40,000 (Dart 33,389 + TS 2,098 + Java/XML 1,181 + Swift 330 + JS 543) |\n| Source files | 122 (Flutter) + 22 (Admin Web TS/TSX) + Android/iOS widgets |\n| Cloud Functions | 13 |\n| OAuth providers | 4 (Google / Apple / Kakao / GitHub) |\n| Push types | 4 FCM (`account` / `comment` / `new_post` / `chat`) + 3 local (breakfast/lunch/dinner) |\n| Tests | 513 Flutter + 34 Rules = 547 |\n\n## Tech Stack Summary\n\n| Category | Tech |\n|---|---|\n| Mobile | Flutter (Dart) — Android / iOS |\n| State | Riverpod 2.5 |\n| DI | GetIt + abstract repository |\n| Admin Web | Next.js 14 + TypeScript + Tailwind |\n| Backend | Firebase (Auth / Firestore / Storage / FCM / Crashlytics) |\n| Server | Cloud Functions (Node.js) |\n| External | NEIS public-data API |\n\nDetails → [architecture-overview_en.md](./architecture-overview_en.md).\n\n## Main Flows\n\n1. **OAuth login → identity → admin approval → home** ([account-and-access_en.md](./account-and-access_en.md))\n2. **Home shows meal / timetable / schedule** ([public-features_en.md](../features/public-features_en.md))\n3. **Board / chat for community** ([community-features_en.md](../features/community-features_en.md))\n4. **Grades / personal schedule managed locally** ([personal-features_en.md](../features/personal-features_en.md))\n5. **Admins manage users / content on Admin Web** ([admin-features_en.md](../features/admin-features_en.md))\n\n## See Also\n- [Architecture Overview](./architecture-overview_en.md)\n- [Architecture Decisions](./architecture-decisions_en.md)\n- [Contributing Guide](../../CONTRIBUTING_en.md)\n- [Deployment Guide](../../DEPLOY_en.md)\n- [User Guide](../../USER_GUIDE_en.md)\n","guides/screenshots-gallery.md":"# 스크린샷 갤러리\n\n> English: [screenshots-gallery_en.md](./screenshots-gallery_en.md)\n\nREADME에 게재된 핵심 스크린샷의 확장 갤러리입니다. 기능별로 묶어 흐름을 따라갈 수 있도록 구성했습니다.\n\n## 온보딩 & 로그인\n\n| 온보딩 | 로그인 |\n|:--:|:--:|\n| ![온보딩](../../screenshots/onboarding.png) | ![로그인](../../screenshots/login.png) |\n\n## 홈\n\n| 홈 (다크) | 홈 (라이트) |\n|:--:|:--:|\n| ![홈](../../screenshots/home.png) | ![홈 라이트](../../screenshots/home_light.png) |\n\n## 급식 / 일정 / 시간표\n\n| 급식 | 일정 | 일정 만들기 | 시간표 |\n|:--:|:--:|:--:|:--:|\n| ![급식](../../screenshots/meal.png) | ![일정](../../screenshots/calendar.png) | ![일정만들기](../../screenshots/schedule_create.png) | ![시간표](../../screenshots/timetable.png) |\n\n## 게시판\n\n| 목록 | 게시글 상세 | 글쓰기 |\n|:--:|:--:|:--:|\n| ![게시판](../../screenshots/board.png) | ![상세](../../screenshots/post_detail.png) | ![글쓰기](../../screenshots/write_post.png) |\n\n### 게시판 고급 기능\n\n| 인기글 (좋아요순) | 검색 (최근 검색어) | 검색 결과 (n-gram) | 이미지 뷰어 (PageView + Hero) |\n|:--:|:--:|:--:|:--:|\n| ![인기글](../../screenshots/board_popular.png) | ![검색](../../screenshots/board_search.png) | ![검색결과](../../screenshots/board_search_results.png) | ![이미지뷰어](../../screenshots/post_image_viewer.gif) |\n\n## 채팅\n\n| 채팅 목록 | 채팅방 |\n|:--:|:--:|\n| ![채팅목록](../../screenshots/chat_list.png) | ![채팅방](../../screenshots/chat_room.png) |\n\n## 설정 / 프로필\n\n| 설정 | 내 계정 | 알림 설정 |\n|:--:|:--:|:--:|\n| ![설정](../../screenshots/settings.png) | ![내계정](../../screenshots/profile.png) | ![알림설정](../../screenshots/noti_settings.png) |\n\n## 관리자 (Flutter + Next.js)\n\n| Admin (Flutter) | Admin Web (라이트) | Admin Web (다크) |\n|:--:|:--:|:--:|\n| ![Admin](../../screenshots/admin.png) | ![웹](../../screenshots/admin_web.png) | ![웹다크](../../screenshots/admin_web_dark.png) |\n\n## 홈 화면 위젯\n\n| 위젯 (라이트) | 위젯 (다크) |\n|:--:|:--:|\n| ![위젯 라이트](../../screenshots/widget_white.png) | ![위젯 다크](../../screenshots/widget_black.png) |\n\n## 성적 관리\n\n| 수시 성적 | 정시 성적 |\n|:--:|:--:|\n| ![수시](../../screenshots/susi.png) | ![정시](../../screenshots/jeongsi.png) |\n\n## 원본 위치\n\n전체 스크린샷 원본: `/screenshots` 디렉터리 참고.\n\n## 관련 문서\n- [기능 문서 (공개)](../features/public-features.md)\n- [기능 문서 (커뮤니티)](../features/community-features.md)\n- [기능 문서 (개인)](../features/personal-features.md)\n- [기능 문서 (관리자)](../features/admin-features.md)\n","guides/screenshots-gallery_en.md":"# Screenshots Gallery\n\n> 한국어: [screenshots-gallery.md](./screenshots-gallery.md)\n\nExtended gallery of the key screenshots shown in the README, grouped by feature flow.\n\n## Onboarding & Login\n\n| Onboarding | Login |\n|:--:|:--:|\n| ![Onboarding](../../screenshots/onboarding.png) | ![Login](../../screenshots/login.png) |\n\n## Home\n\n| Home (dark) | Home (light) |\n|:--:|:--:|\n| ![Home](../../screenshots/home.png) | ![Home light](../../screenshots/home_light.png) |\n\n## Meals / Schedule / Timetable\n\n| Meal | Calendar | Create Event | Timetable |\n|:--:|:--:|:--:|:--:|\n| ![Meal](../../screenshots/meal.png) | ![Calendar](../../screenshots/calendar.png) | ![Create Event](../../screenshots/schedule_create.png) | ![Timetable](../../screenshots/timetable.png) |\n\n## Board\n\n| List | Post Detail | Write |\n|:--:|:--:|:--:|\n| ![Board](../../screenshots/board.png) | ![Detail](../../screenshots/post_detail.png) | ![Write](../../screenshots/write_post.png) |\n\n### Advanced Board Features\n\n| Popular (by likes) | Search (recent keywords) | Search Results (n-gram) | Image Viewer (PageView + Hero) |\n|:--:|:--:|:--:|:--:|\n| ![Popular](../../screenshots/board_popular.png) | ![Search](../../screenshots/board_search.png) | ![Results](../../screenshots/board_search_results.png) | ![Viewer](../../screenshots/post_image_viewer.gif) |\n\n## Chat\n\n| List | Room |\n|:--:|:--:|\n| ![Chat list](../../screenshots/chat_list.png) | ![Chat room](../../screenshots/chat_room.png) |\n\n## Settings / Profile\n\n| Settings | My Account | Notification Settings |\n|:--:|:--:|:--:|\n| ![Settings](../../screenshots/settings.png) | ![Profile](../../screenshots/profile.png) | ![Noti settings](../../screenshots/noti_settings.png) |\n\n## Admin (Flutter + Next.js)\n\n| Admin (Flutter) | Admin Web (light) | Admin Web (dark) |\n|:--:|:--:|:--:|\n| ![Admin](../../screenshots/admin.png) | ![Web](../../screenshots/admin_web.png) | ![Web dark](../../screenshots/admin_web_dark.png) |\n\n## Home Widgets\n\n| Widget (light) | Widget (dark) |\n|:--:|:--:|\n| ![Widget field] - resource.data.get(field, 0) <= 1\n  );\n}\n```\n\n## 컬렉션별 규칙 요약\n\n### `users/{uid}`\n- **read**: 본인 또는 manager/admin\n- **create**: 인증 사용자\n- **update**: 본인은 `role`/`suspendedUntil`/`approved` 불변 조건으로, manager/admin은 자유\n- **delete**: 본인 또는 admin\n- **서브컬렉션**: `subjects`, `sync` 는 본인만; `notifications`는 본인만 read/update/delete하되 create는 누구나 (관리자 알림 발송 허용)\n\n### `posts/{postId}`\n- **read**: 공개\n- **create**: `authorUid == auth.uid` + 제목 1~200자 + 본문 ≤5000자\n- **update**: 작성자 자유 OR 비작성자는 `isInteractionUpdate()` 필드 + `validCounterDelta(±1)`\n- **delete**: 작성자 또는 manager/admin\n\n### `chats/{chatId}` + 메시지\n- 참여자(`participants` 배열)만 read/write\n- 메시지 update는 삭제 필드(`deleted`, `deletedFor`)만 허용 — 내용 위변조 차단\n\n### `reports`, `admin_logs`, `function_logs`\n- `reports.create` 인증 사용자, 읽기/삭제 관리자 전용\n- `admin_logs` / `function_logs` 관리자 전용\n\n### `app_config/{key}`\n- 읽기 공개 (버전 체크 / 팝업 공지), 쓰기 관리자 전용\n\n## Rate Limiting\n\n| 대상 | 방식 |\n|---|---|\n| 글 작성 | 클라이언트 30초 쿨타임, 규칙은 제목/본문 길이만 |\n| 댓글 작성 | 클라이언트 10초 쿨타임 |\n| 신고 중복 | `(postId, reporterUid)` 복합 인덱스로 중복 저장 차단 |\n\n클라이언트 우회 가능성이 있어 **핵심 방어선은 Rules의 필드 단위 검증**입니다.\n\n## Cloud Functions 보안\n\n- `kakaoCustomAuth`: zod 스키마(`KakaoAuthSchema`)로 입력 검증, Kakao API 검증 후 Firebase custom token 발급\n- 푸시 알림 트리거: 발송 전 수신자 `users/{uid}.notiXxx` 필드 체크 ([기술과제 #7](./technical-challenges.md#7-cloud-functions-알림-설정-개별-제어-server-side-filtering))\n- 오류는 `function_logs` 컬렉션에 기록 (`logError` 헬퍼)\n\n## 민감 데이터 처리\n\n### 성적 — 로컬 전용\n- `flutter_secure_storage` 사용 → Android Keystore / iOS Keychain\n- 서버 업로드 없음, Cloud Backup 없음\n- 기존 평문 SharedPreferences → 첫 실행 시 1회 마이그레이션 후 구키 삭제\n\n### 프로필 사진\n- Cloud Storage 업로드 전 **256px 압축**\n- 탈퇴 시 Storage 파일 함께 삭제\n\n### 게시글 이미지\n- **1080px 압축 + EXIF/GPS 제거** (`flutter_image_compress`)\n- Storage 업로드, URL을 Firestore에 저장\n\n### OAuth 전용 인증\n- 비밀번호 저장 없음 (Google / Apple / Kakao / GitHub)\n- Kakao만 커스텀 토큰 브릿지 (Firebase Auth가 직접 지원 안 함)\n\n## 개인정보 보호\n\n- **개인정보 처리방침** 앱 내 표시 (`assets/privacy_policy.html`)\n- 가입 시 동의 필수\n- 최소 수집 원칙: 이름/학번/이메일/프로필 사진만 (학교 맥락 필수 정보)\n- **회원 탈퇴 시 즉시 파기** — 관련 컬렉션 + Storage + Auth 계정 순서로 완전 삭제 ([기술과제 #10](./technical-challenges.md#10-계정-삭제-순서-문제))\n- **TTL 자동 삭제**: 오래된 로그/신고는 `cleanupOldPosts` 스케줄러로 만료 처리\n\n## 크래시 / 감사\n\n- **Crashlytics** (Firebase 콘솔)\n- `function_logs` (Functions 오류 미러)\n- `admin_logs` (모든 관리 행위: 누가, 언제, 무엇을, 이전→이후)\n\n## 테스트\n\n- `tests/firestore-rules/`: `@firebase/rules-unit-testing` + 에뮬레이터 34개 테스트\n- 권한 우회 / 카운터 위조 / 필드 위조 시나리오를 CI 단계에서 검증\n- 실행법: [testing.md](./testing.md) + [cicd-setup.md](./cicd-setup.md)\n\n## 관련 문서\n- [데이터 모델](./data-model.md)\n- [아키텍처 의사결정 일지](./architecture-decisions.md)\n- [인증 & 접근](./account-and-access.md)\n- [배포 가이드](../../DEPLOY.md) — 규칙 배포 명령\n","guides/security_en.md":"# Security Model\n\n> 한국어: [security.md](./security.md)\n\nFirestore rules, role-based access control, and privacy safeguards in one place. Source file: `firestore.rules`. Tests: `tests/firestore-rules/`.\n\n## Core Principles\n\n1. **Firestore rules are the single source of truth** — app and Admin Web run under the same rules\n2. **Roles live only on the server** (`users/{uid}.role`). Clients read but cannot modify\n3. **Per-field validation** — non-authors can still touch interaction fields\n4. **Sensitive data never goes to the server** — grades live only in the OS keychain\n\n## Helper Functions (firestore.rules)\n\n```\nfunction isSignedIn() { return request.auth != null; }\n\nfunction isAdmin() {\n  return isSignedIn() &&\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role == 'admin';\n}\n\nfunction isAdminOrManager() {\n  return isSignedIn() && (\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager']\n  );\n}\n\nfunction changedKeys() {\n  return request.resource.data.diff(resource.data).affectedKeys();\n}\n\nfunction isInteractionUpdate() {\n  return changedKeys().hasOnly(\n    ['likes', 'dislikes', 'likeCount', 'dislikeCount',\n     'pollVoters', 'commentCount',\n     'anonymousMapping', 'anonymousCount', 'bookmarkedBy']\n  );\n}\n\nfunction validCounterDelta(field) {\n  return !(field in changedKeys()) || (\n    request.resource.data[field] is int &&\n    request.resource.data[field] >= 0 &&\n    request.resource.data[field] - resource.data.get(field, 0) >= -1 &&\n    request.resource.data[field] - resource.data.get(field, 0) <= 1\n  );\n}\n```\n\n## Per-collection Rules\n\n### `users/{uid}`\n- **read**: self or manager/admin\n- **create**: any authed user\n- **update**: self (but `role`/`suspendedUntil`/`approved` immutable), or manager/admin freely\n- **delete**: self or admin\n- **Subcollections**: `subjects`, `sync` → self only; `notifications` → self reads/updates/deletes, anyone may create (admin alerts)\n\n### `posts/{postId}`\n- **read**: public\n- **create**: `authorUid == auth.uid` + title 1–200 chars + content ≤5000 chars\n- **update**: author freely, OR non-author limited to `isInteractionUpdate()` + `validCounterDelta(±1)`\n- **delete**: author or manager/admin\n\n### `chats/{chatId}` + messages\n- Only participants (`participants` array) can read/write\n- Message `update` is only for deletion fields (`deleted`, `deletedFor`) — content tampering blocked\n\n### `reports`, `admin_logs`, `function_logs`\n- `reports.create` — authed users; read/delete admin-only\n- `admin_logs` / `function_logs` — admin-only\n\n### `app_config/{key}`\n- Public read (version check, popup); admin-only write\n\n## Rate Limiting\n\n| Target | Method |\n|---|---|\n| Post creation | client-side 30s cooldown; rules only check title/content length |\n| Comment creation | client-side 10s cooldown |\n| Duplicate reports | `(postId, reporterUid)` composite index blocks duplicates |\n\nClient-side guards are bypassable, so **the real defense is the per-field validation in rules**.\n\n## Cloud Functions Security\n\n- `kakaoCustomAuth`: zod schema (`KakaoAuthSchema`) validates input, verifies with Kakao, then issues a Firebase custom token\n- Push triggers: check receiver's `users/{uid}.notiXxx` before sending ([technical-challenges_en.md#7](./technical-challenges_en.md#7-per-category-push-toggles-server-side-filter))\n- Errors are written to `function_logs` via the `logError` helper\n\n## Sensitive Data Handling\n\n### Grades — local only\n- `flutter_secure_storage` → Android Keystore / iOS Keychain\n- No server upload, no Cloud Backup\n- Plain SharedPreferences data → one-time migration on first launch, old keys cleared\n\n### Profile Pictures\n- **256px compression** before Cloud Storage upload\n- Deleted alongside Storage files on account deletion\n\n### Post Images\n- **1080px compression + EXIF/GPS stripping** (`flutter_image_compress`)\n- Uploaded to Storage; URLs saved in Firestore\n\n### OAuth-only Auth\n- No password storage (Google / Apple / Kakao / GitHub)\n- Kakao alone needs a custom-token bridge (Firebase Auth has no direct provider)\n\n## Privacy\n\n- **Privacy policy** shown in-app (`assets/privacy_policy.html`); consent required at signup\n- Minimal collection: name / student ID / email / profile picture (school context essentials)\n- **Immediate wipe on deletion** — collections + Storage + Auth in order ([technical-challenges_en.md#10](./technical-challenges_en.md#10-account-deletion-ordering-auth--firestore-permission-loss))\n- **TTL cleanup**: stale logs/reports swept by the `cleanupOldPosts` scheduler\n\n## Crash / Audit\n\n- **Crashlytics** (Firebase console)\n- `function_logs` (Cloud Functions error mirror)\n- `admin_logs` (every admin action: who, when, what, before→after)\n\n## Testing\n\n- `tests/firestore-rules/`: `@firebase/rules-unit-testing` + emulator, 34 tests\n- Covers permission bypass / counter forgery / field forgery at CI time\n- Run: see [testing_en.md](./testing_en.md) + [cicd-setup_en.md](./cicd-setup_en.md)\n\n## See Also\n- [Data Model](./data-model_en.md)\n- [Architecture Decisions](./architecture-decisions_en.md)\n- [Account & Access](./account-and-access_en.md)\n- [Deployment Guide](../../DEPLOY_en.md) — rules deploy commands\n","guides/technical-challenges.md":"# Technical Challenges & Solutions\n\n> English: [technical-challenges_en.md](./technical-challenges_en.md)\n\n실제 배포 운영 중 부딪힌 14건의 기술 과제와 해결 방법을 정리합니다. 각 사례는 *문제 → 해결 → 결과*의 흐름을 유지하고, 관련 파일 경로를 함께 남깁니다.\n\n## 목차\n\n1. [Firebase Auth 토큰 동기화 문제](#1-firebase-auth-토큰-동기화-문제-permission-denied)\n2. [급식 API 동시 요청 경합](#2-급식-api-동시-요청-경합-race-condition)\n3. [익명 게시판 번호 일관성](#3-익명-게시판-번호-일관성-concurrent-write)\n4. [선택과목 시간표 충돌](#4-선택과목-시간표-충돌-slot-conflict)\n5. [Firestore 보안 규칙과 기능 충돌](#5-firestore-보안-규칙과-기능-충돌-field-level-validation)\n6. [채팅 읽음 확인 실시간 동기화](#6-채팅-읽음-확인-실시간-동기화-dual-stream)\n7. [Cloud Functions 알림 설정 개별 제어](#7-cloud-functions-알림-설정-개별-제어-server-side-filtering)\n8. [정지 만료 자동 해제](#8-정지-만료-자동-해제-scheduler-trigger)\n9. [관리자 화면 Firestore 읽기 과다](#9-관리자-화면-firestore-읽기-과다-stream--future-전환)\n10. [계정 삭제 순서 문제](#10-계정-삭제-순서-문제-auth--firestore-권한-소실)\n11. [Riverpod AsyncNotifier 경합 상태](#11-riverpod-asyncnotifier-경합-상태-invalidateself-race-condition)\n12. [위젯 테스트의 비결정적 Timer Leak](#12-위젯-테스트의-비결정적-timer-leak)\n13. [StatefulWidget 1,400+ 라인 리팩토링](#13-statefulwidget-1400-라인--stateless-composition-refactoring)\n14. [Repository 패턴 + GetIt 점진적 마이그레이션](#14-repository-패턴--getit-점진적-마이그레이션)\n\n---\n\n## 1. Firebase Auth 토큰 동기화 문제 (Permission Denied)\n\n**문제:** 소셜 로그인 직후 Firestore 문서 조회 시 PERMISSION_DENIED 발생 — Auth 토큰이 Firestore SDK에 전파되기 전에 요청이 나감\n\n**해결:** `getIdToken(true)`로 토큰 강제 갱신 + 최대 3회 재시도 로직으로 첫 설치/재로그인 시에도 안정적으로 프로필 확인\n\n**관련 파일:** `lib/screens/auth/login_screen.dart`, `lib/screens/auth/profile_setup_screen.dart`\n\n---\n\n## 2. 급식 API 동시 요청 경합 (Race Condition)\n\n**문제:** 여러 화면에서 동시에 같은 월의 급식 데이터를 요청하면 중복 API 호출 발생\n\n**해결:** `Completer` 패턴으로 동일 월 프리페치를 단일 Future로 병합, 진행 중인 요청이 있으면 기존 Future를 공유\n\n**결과:** API 호출 **30회 → 1회**\n\n**관련 파일:** `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`\n\n---\n\n## 3. 익명 게시판 번호 일관성 (Concurrent Write)\n\n**문제:** 클라이언트에서 익명 번호를 부여하면 동시 댓글 시 같은 번호가 중복 할당될 수 있음\n\n**해결:** Firestore Transaction으로 게시글 문서의 `anonymousMapping` / `anonymousCount`를 원자적으로 읽기/쓰기하여 번호 중복 방지. 작성자 본인은 `익명(글쓴이)` 고정 라벨\n\n**관련 파일:** `lib/screens/board/post_detail_screen.dart`, `firestore.rules` (`isInteractionUpdate`가 `anonymousMapping` 포함)\n\n---\n\n## 4. 선택과목 시간표 충돌 (Slot Conflict)\n\n**문제:** 2-3학년 선택과목 조합 시 같은 교시에 다른 반의 수업이 겹칠 수 있음\n\n**해결:** 시간표 빌드 시 슬롯별 충돌 자동 감지 → 사용자에게 선택 다이얼로그 표시, 선택 결과를 로컬에 저장하여 재충돌 방지\n\n**관련 파일:** `lib/screens/sub/timetable_view_screen.dart`, `lib/screens/sub/timetable_select_screen.dart`\n\n---\n\n## 5. Firestore 보안 규칙과 기능 충돌 (Field-level Validation)\n\n**문제:** 게시글 update를 `작성자만` 허용하면 다른 유저의 투표/추천이 차단됨\n\n**해결:** `request.resource.data.diff(resource.data).affectedKeys().hasOnly([...])` 로 필드 단위 검증 — 인터랙션 필드만 변경 시 모든 인증 유저 허용. `validCounterDelta(field)`로 `likeCount` 등의 ±1 delta를 강제\n\n**관련 파일:** `firestore.rules` (`isInteractionUpdate`, `validCounterDelta`), `tests/firestore-rules/`\n\n---\n\n## 6. 채팅 읽음 확인 실시간 동기화 (Dual Stream)\n\n**문제:** 메시지 스트림과 별도로 읽음 상태를 추적하면 추가 Firestore 읽기 발생\n\n**해결:** 채팅방 문서의 `unreadCount` 맵을 별도 `StreamBuilder`로 감시하여 단일 문서 스트림으로 읽음 상태 실시간 반영\n\n**관련 파일:** `lib/screens/chat/chat_room_screen.dart`, `lib/screens/chat/chat_list_screen.dart`\n\n---\n\n## 7. Cloud Functions 알림 설정 개별 제어 (Server-side Filtering)\n\n**문제:** FCM 푸시는 서버에서 발송하므로 클라이언트에서 카테고리별 on/off 불가\n\n**해결:** Firestore `users/{uid}`에 `notiComment`, `notiReply`, `notiChat` 등 필드 저장, Cloud Functions에서 발송 전 해당 필드 체크하여 `false`면 발송 스킵\n\n**관련 파일:** `functions/index.js`, `lib/screens/sub/notification_setting_screen.dart`\n\n---\n\n## 8. 정지 만료 자동 해제 (Scheduler Trigger)\n\n**문제:** 계정 정지 만료 시간이 지나도 Firestore 필드가 자동으로 삭제되지 않아 `onUserUpdated` 트리거 불발\n\n**해결:** Cloud Functions Scheduler로 매시간 `suspendedUntil <= now`인 유저를 조회하여 필드 삭제 → `onUserUpdated` 트리거 → 정지 해제 푸시 발송\n\n**관련 파일:** `functions/index.js` (`checkSuspensionExpiry`)\n\n---\n\n## 9. 관리자 화면 Firestore 읽기 과다 (Stream → Future 전환)\n\n**문제:** 관리자 화면이 `StreamBuilder`로 유저/신고/로그를 실시간 감시하여, 화면 열기만 해도 130+ 읽기 발생. 데이터 변경 시마다 전체 재조회\n\n**해결:** `StreamBuilder` → `FutureBuilder`로 전환하여 열 때 1회만 조회 + 액션(승인/삭제 등) 후 `_refresh()`로 수동 갱신. `ExpansionTile`을 펼칠 때만 child를 렌더링하여 접힌 탭은 읽기 0\n\n**결과:** **130 → 20~30 읽기로 감소**\n\n**관련 파일:** `lib/screens/board/admin_screen.dart`, `lib/screens/board/admin/users_tab.dart`\n\n---\n\n## 10. 계정 삭제 순서 문제 (Auth → Firestore 권한 소실)\n\n**문제:** `user.delete()` 호출 시 Firebase Auth가 즉시 로그아웃되어, 이후 Firestore 문서 삭제가 PERMISSION_DENIED로 실패\n\n**해결:** Firestore 문서를 먼저 삭제(인증 상태 유지 중)한 후 Auth 계정 삭제. `uid`를 미리 변수에 저장하여 삭제 순서 역전에 의한 참조 소실 방지\n\n**관련 파일:** `lib/screens/sub/setting_screen.dart`, `lib/screens/auth/profile_edit_screen.dart`\n\n---\n\n## 11. Riverpod AsyncNotifier 경합 상태 (invalidateSelf Race Condition)\n\n**문제:** `ExamsNotifier`의 `add()` / `delete()` 같은 mutator에서 `ref.invalidateSelf()`로 재조회를 트리거했더니, Provider 단위 테스트가 간헐적으로 실패. invalidate가 비동기로 처리되어 다음 `read()`가 *이전* state를 반환하는 race condition\n\n**해결:** mutator 내부에서 `final current = await future;` 로 현재 state를 먼저 확보 → 저장소 갱신 → `state = AsyncData([...current, exam])` 로 직접 state 교체. invalidateSelf를 제거하여 race condition 원천 차단. 동일 패턴을 `GoalsNotifier` / `JeongsiGoalsNotifier`에도 적용\n\n**관련 파일:** `lib/providers/grade_provider.dart`, `test/grade_provider_test.dart`\n\n---\n\n## 12. 위젯 테스트의 비결정적 Timer Leak\n\n**문제:** `_LoadingExamsNotifier` mock에서 `await Future.delayed(Duration(seconds: 30))`로 영구 로딩을 시뮬레이션했더니 `flutter test`가 \"A Timer is still pending even after the widget tree was disposed\" 로 실패\n\n**해결:** `Completer<List<Exam>>` 패턴으로 교체 — Future를 외부 신호로 완료시킬 수 있도록 하여 테스트 종료 시점에 명시적으로 `complete()` 호출. Provider 테스트에서도 `addTearDown(container.dispose)`로 ProviderContainer 누수 방지\n\n**관련 파일:** `test/grade_screen_widget_test.dart`, `test/helpers/`\n\n---\n\n## 13. StatefulWidget 1,400+ 라인 → Stateless Composition (Refactoring)\n\n**문제:** `post_detail_screen.dart`(1442줄), `admin_screen.dart`(1071줄), `write_post_screen.dart`(1119줄), `timetable_view_screen.dart`(943줄) 4개 화면이 모든 sub-widget을 private 클래스 / `_buildXxx` 메서드로 한 파일에 가지고 있어 가독성/재사용성/테스트성이 모두 저하. 단순 string match로 재사용 위치를 찾기도 어려움\n\n**해결:** 두 가지 패턴으로 분리\n1. **Private class → Public StatelessWidget 추출** — `post_detail_screen` 의 `_PollCard` / `_VoteButton` / `_CommentItem` / `_EventAttachCard`, `admin_screen` 의 5개 탭 클래스, `timetable_view` 의 다이얼로그/Painter 등을 별도 파일로 이동 + `_` prefix 제거\n2. **State 의존 builder method → Callback parameter 위젯** — `write_post_screen` 의 `_buildEventForm` / `_buildPollForm` / `_buildImageSection` 은 state를 직접 참조하므로, state 값과 setState wrapper를 명시적 callback (`onPickDate`, `onAddOption`, `onReorder`...)으로 받는 StatelessWidget으로 변환\n\n**결과:** 4개 화면 합계 **4,575 → 1,919줄 (-58%)** — `post_detail` 545, `write_post` 700, `timetable_view` 588, `admin_screen` 86(+admin/ 5파일 1,123). 16개 위젯 모듈로 분리(`widgets/` 9 + `write_widgets/` 7), 524개 Flutter 테스트 모두 통과 (회귀 0)\n\n**관련 파일:** `lib/screens/board/widgets/`, `lib/screens/board/write_widgets/`, `lib/screens/board/admin/`, `lib/screens/sub/timetable_widgets/`\n\n---\n\n## 14. Repository 패턴 + GetIt 점진적 마이그레이션\n\n**문제:** `AuthService`/`GradeManager`가 static 메서드로 25개 이상의 호출 사이트에 흩어져 있어 한번에 DI로 전환하면 전 파일 수정 필요 + 회귀 위험\n\n**해결:** Abstract `AuthRepository` / `GradeRepository` 인터페이스를 새로 정의하고 `FirebaseAuthRepository` / `LocalGradeRepository` 가 기존 static 메서드를 위임 호출. 신규 코드는 `GetIt.I<AuthRepository>()`로 가져가고 기존 호출 사이트는 그대로 둠. 테스트에서는 `setupServiceLocator()` / `resetServiceLocator()` + Mock 구현체로 주입 가능 → 점진적 마이그레이션과 백워드 호환을 동시에 확보\n\n**관련 파일:** `test/auth_repository_test.dart`, `test/auth_service_test.dart`, `test/grade_manager_test.dart`\n\n---\n\n## 참고\n- [아키텍처 의사결정 일지](./architecture-decisions.md) — 각 과제에 연결된 설계 배경\n- [테스트 전략](./testing.md) — 회귀 방지 테스트 체계\n","guides/technical-challenges_en.md":"# Technical Challenges & Solutions\n\n> 한국어: [technical-challenges.md](./technical-challenges.md)\n\n14 engineering challenges hit during production operation, each with a *problem → solution → outcome* summary and related file paths.\n\n## Contents\n\n1. [Firebase Auth token propagation (Permission Denied)](#1-firebase-auth-token-propagation-permission-denied)\n2. [Meal API concurrent-request race](#2-meal-api-concurrent-request-race-condition)\n3. [Anonymous number consistency (concurrent write)](#3-anonymous-number-consistency-concurrent-write)\n4. [Timetable elective slot conflicts](#4-timetable-elective-slot-conflicts)\n5. [Firestore rules vs features (field-level validation)](#5-firestore-rules-vs-features-field-level-validation)\n6. [Chat read-receipt realtime sync (dual stream)](#6-chat-read-receipt-realtime-sync-dual-stream)\n7. [Per-category push toggles (server-side filter)](#7-per-category-push-toggles-server-side-filter)\n8. [Auto-expiring suspensions (scheduler trigger)](#8-auto-expiring-suspensions-scheduler-trigger)\n9. [Admin screen Firestore read overload (Stream → Future transition)](#9-admin-screen-firestore-read-overload-stream--future-transition)\n10. [Account deletion ordering (Auth → Firestore permission loss)](#10-account-deletion-ordering-auth--firestore-permission-loss)\n11. [Riverpod AsyncNotifier race condition (invalidateSelf)](#11-riverpod-asyncnotifier-race-condition-invalidateself)\n12. [Non-deterministic widget test timer leak](#12-non-deterministic-widget-test-timer-leak)\n13. [StatefulWidget 1,400+ lines → Stateless composition (refactoring)](#13-statefulwidget-1400-lines--stateless-composition-refactoring)\n14. [Repository + GetIt gradual migration](#14-repository--getit-gradual-migration)\n\n---\n\n## 1. Firebase Auth token propagation (Permission Denied)\n\n**Problem:** Right after a social login, querying Firestore threw PERMISSION_DENIED — the auth token hadn't propagated to the Firestore SDK yet.\n\n**Fix:** `getIdToken(true)` to force-refresh + retry up to 3 times so first-install / re-login flows reliably fetch the profile.\n\n**Related:** `lib/screens/auth/login_screen.dart`, `lib/screens/auth/profile_setup_screen.dart`\n\n---\n\n## 2. Meal API concurrent-request race condition\n\n**Problem:** Multiple screens requested the same month's meals simultaneously → duplicate API calls.\n\n**Fix:** `Completer` pattern coalesces same-month prefetches into a single Future; in-flight requests share it.\n\n**Outcome:** API calls dropped **30 → 1**.\n\n**Related:** `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`\n\n---\n\n## 3. Anonymous number consistency (concurrent write)\n\n**Problem:** If the client assigned anonymous numbers, simultaneous comments could collide on the same number.\n\n**Fix:** Firestore Transaction atomically reads/writes `anonymousMapping` / `anonymousCount` on the post doc, preventing collisions. The author is always labeled \"익명(글쓴이)\" (`anonymous (author)`).\n\n**Related:** `lib/screens/board/post_detail_screen.dart`, `firestore.rules` (`isInteractionUpdate` covers `anonymousMapping`)\n\n---\n\n## 4. Timetable elective slot conflicts\n\n**Problem:** 2nd/3rd-year electives could overlap with another class in the same slot.\n\n**Fix:** Build-time per-slot conflict detection → user-facing dialog to choose, with the choice stored locally to prevent recurrence.\n\n**Related:** `lib/screens/sub/timetable_view_screen.dart`, `timetable_select_screen.dart`\n\n---\n\n## 5. Firestore rules vs features (field-level validation)\n\n**Problem:** Restricting `posts.update` to authors blocks other users from voting / upvoting.\n\n**Fix:** `request.resource.data.diff(resource.data).affectedKeys().hasOnly([...])` for field-level validation — non-authors can only change interaction fields. `validCounterDelta(field)` enforces `likeCount` / etc. ±1 delta.\n\n**Related:** `firestore.rules` (`isInteractionUpdate`, `validCounterDelta`), `tests/firestore-rules/`\n\n---\n\n## 6. Chat read-receipt realtime sync (dual stream)\n\n**Problem:** Tracking read state separately from the message stream meant extra Firestore reads.\n\n**Fix:** Watch `chats/{id}.unreadCount` via a dedicated `StreamBuilder` — one doc stream delivers read state in realtime.\n\n**Related:** `lib/screens/chat/chat_room_screen.dart`, `chat_list_screen.dart`\n\n---\n\n## 7. Per-category push toggles (server-side filter)\n\n**Problem:** FCM pushes are server-triggered, so clients can't toggle categories on/off locally.\n\n**Fix:** Store `notiComment`, `notiReply`, `notiChat`, … booleans on `users/{uid}`. Cloud Functions check them before sending; skip if `false`.\n\n**Related:** `functions/index.js`, `lib/screens/sub/notification_setting_screen.dart`\n\n---\n\n## 8. Auto-expiring suspensions (scheduler trigger)\n\n**Problem:** Even after `suspendedUntil` expired, the field lingered and `onUserUpdated` didn't fire, so no unsuspension push.\n\n**Fix:** Hourly Cloud Functions scheduler queries `suspendedUntil <= now` and deletes the field → `onUserUpdated` triggers → unsuspension push.\n\n**Related:** `functions/index.js` (`checkSuspensionExpiry`)\n\n---\n\n## 9. Admin screen Firestore read overload (Stream → Future transition)\n\n**Problem:** Admin screen watched users/reports/logs live via `StreamBuilder`, so opening it alone produced 130+ reads; every data change re-queried everything.\n\n**Fix:** Switched to `FutureBuilder` — one read on open + manual `_refresh()` after actions (approve/delete). `ExpansionTile` children render only when expanded; collapsed tabs do 0 reads.\n\n**Outcome:** **130 → 20–30 reads**.\n\n**Related:** `lib/screens/board/admin_screen.dart`, `admin/users_tab.dart`\n\n---\n\n## 10. Account deletion ordering (Auth → Firestore permission loss)\n\n**Problem:** Calling `user.delete()` signs out Firebase Auth immediately — any subsequent Firestore deletes fail with PERMISSION_DENIED.\n\n**Fix:** Delete Firestore docs first (while still authed), then Auth. Save `uid` in a local variable to keep the reference after auth is gone.\n\n**Related:** `lib/screens/sub/setting_screen.dart`, `lib/screens/auth/profile_edit_screen.dart`\n\n---\n\n## 11. Riverpod AsyncNotifier race condition (invalidateSelf)\n\n**Problem:** `ExamsNotifier.add()` / `delete()` called `ref.invalidateSelf()` to reload — provider tests flaked intermittently. Invalidate is async, so a following `read()` returned the *old* state.\n\n**Fix:** Inside mutators, `final current = await future;` → mutate store → `state = AsyncData([...current, exam])`. Removed `invalidateSelf`. Applied the same pattern to `GoalsNotifier` / `JeongsiGoalsNotifier`.\n\n**Related:** `lib/providers/grade_provider.dart`, `test/grade_provider_test.dart`\n\n---\n\n## 12. Non-deterministic widget test timer leak\n\n**Problem:** `_LoadingExamsNotifier` mocked eternal loading with `await Future.delayed(Duration(seconds: 30))` — `flutter test` failed \"A Timer is still pending even after the widget tree was disposed\".\n\n**Fix:** `Completer<List<Exam>>` pattern — the Future can be externally completed, so tests explicitly `complete()` at teardown. Provider tests use `addTearDown(container.dispose)` to plug container leaks.\n\n**Related:** `test/grade_screen_widget_test.dart`, `test/helpers/`\n\n---\n\n## 13. StatefulWidget 1,400+ lines → Stateless composition (refactoring)\n\n**Problem:** `post_detail_screen.dart` (1,442), `admin_screen.dart` (1,071), `write_post_screen.dart` (1,119), `timetable_view_screen.dart` (943) — all sub-widgets were private classes / `_buildXxx` methods in one file. Readability, reusability, testability all suffered; even `grep` for reuse points was hard.\n\n**Fix:** Two patterns:\n1. **Private class → public StatelessWidget** — extracted `_PollCard` / `_VoteButton` / `_CommentItem` / `_EventAttachCard` from `post_detail_screen`, 5 tab classes from `admin_screen`, dialogs / Painters from `timetable_view`, etc. Moved to separate files, dropped `_` prefix.\n2. **State-dependent builder methods → callback-parameter widgets** — `write_post_screen`'s `_buildEventForm` / `_buildPollForm` / `_buildImageSection` accessed state directly; converted to Stateless widgets that accept explicit callbacks (`onPickDate`, `onAddOption`, `onReorder`, …).\n\n**Outcome:** 4 screens **4,575 → 1,919 lines (-58%)** — `post_detail` 545, `write_post` 700, `timetable_view` 588, `admin_screen` 86 (+ `admin/` 5 files, 1,123 total). Split into 16 widget modules (`widgets/` 9 + `write_widgets/` 7); all 524 Flutter tests still passing (zero regression).\n\n**Related:** `lib/screens/board/widgets/`, `lib/screens/board/write_widgets/`, `lib/screens/board/admin/`, `lib/screens/sub/timetable_widgets/`\n\n---\n\n## 14. Repository + GetIt gradual migration\n\n**Problem:** `AuthService` / `GradeManager` were static methods scattered across 25+ call sites — switching to DI in one shot meant editing everything at once, regression risk high.\n\n**Fix:** Introduced abstract `AuthRepository` / `GradeRepository` interfaces with `FirebaseAuthRepository` / `LocalGradeRepository` delegating to the old static methods. New code pulls via `GetIt.I<AuthRepository>()`; old call sites left untouched. Tests inject mocks through `setupServiceLocator()` / `resetServiceLocator()` → incremental migration + backward compatibility simultaneously.\n\n**Related:** `test/auth_repository_test.dart`, `test/auth_service_test.dart`, `test/grade_manager_test.dart`\n\n---\n\n## See Also\n- [Architecture Decisions](./architecture-decisions_en.md) — design background for each challenge\n- [Testing Strategy](./testing_en.md) — regression-proof test layers\n","guides/testing.md":"# 테스트 전략\n\n> English: [testing_en.md](./testing_en.md)\n\n4계층 테스트 체계 (Unit + Provider + Widget + Golden + Firestore Rules)로 총 **558개** 테스트를 유지합니다.\n\n## 한눈에 보기\n\n| 계층 | 개수 | 특징 |\n|---|---|---|\n| `test()` 단위 | 440 | 모델/유틸/파서/Provider/Repository/Golden 포함 — 외부 의존 0 |\n| `testWidgets()` 위젯 | 80 | `ProviderScope.overrides` + Mock Notifier 기반 UI 검증 |\n| Integration | 4 | `integration_test/` — 앱 네비게이션 E2E |\n| Firestore Rules | 34 | `@firebase/rules-unit-testing` + 에뮬레이터 |\n| **합계** | **524 Flutter + 34 Rules = 558** | |\n\n> 측정: `grep -rE \"^\\s*test\\(\" test/` = 440, `grep -rE \"^\\s*testWidgets\\(\" test/` = 80, `integration_test/` 4개.\n\n## 테스트 파일 구조\n\n```\ntest/\n├── auth_repository_test.dart       # Repository 패턴 + Mock 주입\n├── auth_service_test.dart\n├── dday_manager_test.dart\n├── grade_manager_test.dart\n├── grade_provider_test.dart        # Provider test\n├── grade_screen_widget_test.dart   # Widget test\n├── meal_api_test.dart              # Unit (Completer 프리페치 검증)\n├── meal_test.dart\n├── post_card_golden_test.dart      # Golden\n├── schedule_data_test.dart\n├── search_history_service_test.dart\n├── search_tokens_test.dart         # Unit (2-gram 토크나이저)\n├── secure_storage_service_test.dart# Unit (migrateFromPlain)\n├── timetable_api_test.dart\n├── widget_service_test.dart\n├── helpers/                        # Mock 공통 유틸\n└── goldens/                        # Golden 스냅샷 PNG\n\ntests/firestore-rules/              # Rules 에뮬레이터 테스트 (Node.js)\nintegration_test/                   # e2e (선택)\n```\n\n## 계층별 상세\n\n### 1. Unit (89개)\n- 모델 직렬화 (`freezed` / `json_serializable`), 등급 변환, 급식 파싱\n- 시간표 교시 계산, 검색 토크나이저 (2-gram), 검색 기록(SharedPreferences)\n- secure_storage 마이그레이션\n- 외부 의존 없음 (파일/네트워크/시간 모킹)\n\n### 2. Provider (17개)\n- `ProviderContainer` 생성 → Notifier `.future` await → state 단언\n- **예시**:\n  ```dart\n  final container = ProviderContainer(overrides: [\n    gradeRepositoryProvider.overrideWithValue(FakeGradeRepository()),\n  ]);\n  addTearDown(container.dispose);\n\n  final exams = await container.read(examsProvider.future);\n  expect(exams, isNotEmpty);\n  ```\n- `addTearDown(container.dispose)`로 ProviderContainer 누수 방지 ([기술과제 #12](./technical-challenges.md#12-위젯-테스트의-비결정적-timer-leak))\n\n### 3. Widget (17개)\n- `ProviderScope(overrides: [...])`로 Mock Notifier 주입\n- 로딩 / 에러 / 빈 상태 / 성공 분기 모두 검증\n- **Timer Leak 방지**: 영구 로딩은 `Completer.future` 로 시뮬, 테스트 끝에 `complete()`\n\n### 4. Golden (5개)\n- `post_card_golden_test.dart` — PostCard 5종 변종 (기본/좋아요/공지/+N badge/익명+매니저뷰)\n- `fake_cloud_firestore`로 Mock Firestore 주입\n- **Tolerance comparator**로 플랫폼 폰트 렌더 미세 차이 흡수\n- 업데이트: `flutter test --update-goldens`\n\n### 5. Repository (8개)\n- `setupServiceLocator()` + Mock 구현체 주입 → 정상/예외 분기 검증\n- DI 점진적 마이그레이션 데모 ([ADR-07](./architecture-decisions.md#adr-07-di-getit--추상-repository))\n\n### 6. Firestore Rules (34개)\n- `tests/firestore-rules/` 디렉터리, Node.js\n- `@firebase/rules-unit-testing` 라이브러리 + Firestore 에뮬레이터\n- 시나리오:\n  - 권한 우회 (비작성자의 글 수정, 타인 프로필 수정 등)\n  - 카운터 ±1 delta 검증 (`validCounterDelta`)\n  - 필드 위조 (비작성자가 `likes` 외 필드 수정 시도)\n  - 채팅 참여자 아닌 사용자의 read/write 차단\n  - 메시지 내용 수정 시도 차단 (삭제 필드만 허용)\n\n## 실행법\n\n### Flutter 테스트\n```bash\n# 전체\nflutter test\n\n# 커버리지 포함\nflutter test --coverage\n\n# Golden 업데이트\nflutter test --update-goldens\n\n# 특정 파일\nflutter test test/search_tokens_test.dart\n\n# 특정 그룹/이름\nflutter test --name \"2-gram\"\n```\n\n### Firestore Rules 테스트\n```bash\ncd tests/firestore-rules\nnpm install\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\n```\n\n### Integration 테스트 (선택)\n```bash\nflutter test integration_test/\n```\n\n## Mock / Fake 패턴\n\n| 대상 | 방식 |\n|---|---|\n| Firestore | `fake_cloud_firestore` |\n| Firebase Auth | Mock + `setupServiceLocator` |\n| Repository | Abstract + 테스트용 구현체 (GetIt 주입) |\n| AsyncNotifier | `ProviderScope.overrides` + Mock Notifier |\n| Timer | `Completer` 패턴 ([기술과제 #12](./technical-challenges.md#12-위젯-테스트의-비결정적-timer-leak)) |\n| HTTP | 테스트용 `Client` 오버라이드 |\n\n## CI 연계\n\n두 GitHub Actions 워크플로우가 병렬 실행:\n\n1. `.github/workflows/flutter.yml` — `flutter analyze` + `flutter test --coverage` + Codecov 업로드 + master push 시 APK 빌드\n2. `.github/workflows/firestore-rules.yml` — `firebase emulators:exec ... npm test` (Node 20, Java 21, path 트리거)\n\n상세는 [cicd-setup.md](./cicd-setup.md).\n\n## 실행 시간 (실측)\n- Flutter 전체 (`flutter test`): 520개 (`test` + `testWidgets`), 로컬 머신 기준 수 초~수십 초\n- Integration (`integration_test/`): 4개, 디바이스/에뮬레이터 필요\n- Rules (`firebase emulators:exec ... npm test`): 34개, Java 21 + Node 20\n\n## 새 테스트 추가 시\n- 새 Riverpod Provider → Provider test 필수\n- 새 Firestore 필드/규칙 변경 → Rules test 필수 (회귀 방지)\n- 새 게시판 UI 변종 → Golden test 고려\n- 모든 비동기 로직은 `Completer` / `addTearDown`으로 leak 방지\n\n## 관련 문서\n- [CI/CD 설정](./cicd-setup.md)\n- [아키텍처 의사결정 일지](./architecture-decisions.md)\n- [기술 과제](./technical-challenges.md)\n","guides/testing_en.md":"# Testing Strategy\n\n> 한국어: [testing.md](./testing.md)\n\nA 4-layer test setup (Unit + Provider + Widget + Golden + Firestore Rules), totalling **558 tests**.\n\n## Snapshot\n\n| Layer | Count | Characteristic |\n|---|---|---|\n| `test()` unit | 440 | models / utils / parsers / Provider / Repository / Golden — zero external deps |\n| `testWidgets()` widget | 80 | UI verification with `ProviderScope.overrides` + mock notifier |\n| Integration | 4 | `integration_test/` — app-level navigation E2E |\n| Firestore Rules | 34 | `@firebase/rules-unit-testing` + emulator |\n| **Total** | **524 Flutter + 34 Rules = 558** | |\n\n> Measured: `grep -rE \"^\\s*test\\(\" test/` = 440, `grep -rE \"^\\s*testWidgets\\(\" test/` = 80, `integration_test/` = 4.\n\n## Test Layout\n\n```\ntest/\n├── auth_repository_test.dart       # repository + mock injection\n├── auth_service_test.dart\n├── dday_manager_test.dart\n├── grade_manager_test.dart\n├── grade_provider_test.dart        # provider test\n├── grade_screen_widget_test.dart   # widget test\n├── meal_api_test.dart              # unit (Completer prefetch)\n├── meal_test.dart\n├── post_card_golden_test.dart      # golden\n├── schedule_data_test.dart\n├── search_history_service_test.dart\n├── search_tokens_test.dart         # unit (2-gram tokenizer)\n├── secure_storage_service_test.dart# unit (migrateFromPlain)\n├── timetable_api_test.dart\n├── widget_service_test.dart\n├── helpers/                        # common mock utils\n└── goldens/                        # golden PNG snapshots\n\ntests/firestore-rules/              # rules emulator (Node.js)\nintegration_test/                   # e2e (optional)\n```\n\n## Layer Details\n\n### 1. Unit (89)\n- Model serialization (`freezed` / `json_serializable`), grade conversion, meal parsing\n- Timetable period math, search tokenizer (2-gram), search history (SharedPreferences)\n- secure_storage migration\n- No external deps — file/network/time mocked\n\n### 2. Provider (17)\n- Build `ProviderContainer` → `await notifier.future` → assert state\n- **Example**:\n  ```dart\n  final container = ProviderContainer(overrides: [\n    gradeRepositoryProvider.overrideWithValue(FakeGradeRepository()),\n  ]);\n  addTearDown(container.dispose);\n\n  final exams = await container.read(examsProvider.future);\n  expect(exams, isNotEmpty);\n  ```\n- `addTearDown(container.dispose)` prevents ProviderContainer leaks ([Technical Challenge #12](./technical-challenges_en.md#12-non-deterministic-widget-test-timer-leak))\n\n### 3. Widget (17)\n- Inject mock notifiers via `ProviderScope(overrides: [...])`\n- Cover loading / error / empty / success branches\n- **Avoid timer leaks**: simulate indefinite loading with `Completer.future`, `complete()` at teardown\n\n### 4. Golden (5)\n- `post_card_golden_test.dart` — 5 PostCard variants (default / liked / notice / +N badge / anon+manager view)\n- Mock Firestore via `fake_cloud_firestore`\n- **Tolerance comparator** absorbs platform font-rendering differences\n- Refresh: `flutter test --update-goldens`\n\n### 5. Repository (8)\n- `setupServiceLocator()` + mocks, cover success/failure\n- Demonstrates gradual DI migration ([ADR-07](./architecture-decisions_en.md#adr-07-di-getit--abstract-repository))\n\n### 6. Firestore Rules (34)\n- `tests/firestore-rules/` directory, Node.js\n- `@firebase/rules-unit-testing` + Firestore emulator\n- Scenarios:\n  - Permission bypass (non-author editing posts, altering other profiles)\n  - Counter ±1 delta enforcement (`validCounterDelta`)\n  - Field forgery (non-author editing non-interaction fields)\n  - Non-participant read/write on chats\n  - Message content modification\n\n## How to Run\n\n### Flutter tests\n```bash\n# all\nflutter test\n\n# with coverage\nflutter test --coverage\n\n# update goldens\nflutter test --update-goldens\n\n# single file\nflutter test test/search_tokens_test.dart\n\n# filter\nflutter test --name \"2-gram\"\n```\n\n### Rules tests\n```bash\ncd tests/firestore-rules\nnpm install\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\n```\n\n### Integration (optional)\n```bash\nflutter test integration_test/\n```\n\n## Mock / Fake Patterns\n\n| Target | Approach |\n|---|---|\n| Firestore | `fake_cloud_firestore` |\n| Firebase Auth | Mock + `setupServiceLocator` |\n| Repository | Abstract + test implementation (GetIt injection) |\n| AsyncNotifier | `ProviderScope.overrides` + mock notifier |\n| Timer | `Completer` pattern ([Technical Challenge #12](./technical-challenges_en.md#12-non-deterministic-widget-test-timer-leak)) |\n| HTTP | Test `Client` override |\n\n## CI Integration\n\nTwo GitHub Actions workflows run in parallel:\n\n1. `.github/workflows/flutter.yml` — `flutter analyze` + `flutter test --coverage` + Codecov + APK build on master push\n2. `.github/workflows/firestore-rules.yml` — `firebase emulators:exec ... npm test` (Node 20, Java 21, path-triggered)\n\nDetails → [cicd-setup_en.md](./cicd-setup_en.md).\n\n## Measured Times\n- Flutter full suite (`flutter test`): 520 tests (`test` + `testWidgets`), local machine seconds~tens of seconds\n- Integration (`integration_test/`): 4 tests, device/emulator required\n- Rules: **~4s**, 34 tests, via `firebase emulators:exec`\n\n## When Adding Tests\n- New Riverpod provider → provider test mandatory\n- New Firestore field/rule → rules test mandatory (regression guard)\n- New board UI variant → consider golden test\n- All async logic → use `Completer` / `addTearDown` to prevent leaks\n\n## See Also\n- [CI/CD Setup](./cicd-setup_en.md)\n- [Architecture Decisions](./architecture-decisions_en.md)\n- [Technical Challenges](./technical-challenges_en.md)\n","main.md":"# Main\r\n\r\n> `lib/main.dart` — 앱 진입점, MainScreen\r\n\r\n---\r\n\r\n## `main()`\r\n\r\n```dart\r\nFuture<void> main() async\r\n```\r\n\r\n**설명**: 앱 초기화를 수행함. 속도 최적화를 위해 `runApp` 전에는 UI에 필수적인 초기화만 수행하고, 나머지는 `_deferredInit()`으로 백그라운드 처리함\r\n\r\n### runApp 전 (필수 초기화)\r\n\r\n1. **Firebase 초기화**: 중복 방지 체크 후 초기화\r\n2. **Crashlytics**: FlutterError 핸들러 + Firestore `crash_logs` 컬렉션에 에러 기록\r\n3. **Kakao SDK** 초기화\r\n4. **Timezone** 초기화 (`Asia/Seoul`)\r\n5. `providerContainer = ProviderContainer()` 생성\r\n6. **[SettingData](data/setting_data.md)** + **[ServiceLocator](data/service_locator.md)** 병렬 초기화:\r\n   ```dart\r\n   await Future.wait([SettingData().init(), setupServiceLocator()]);\r\n   ```\r\n7. `runApp` → `UncontrolledProviderScope`로 감싼 `HansolHighSchool` 위젯 실행\r\n\r\n### runApp 후 (`_deferredInit`)\r\n\r\nUI가 뜬 뒤 `unawaited(_deferredInit())`로 나머지 초기화를 백그라운드 실행:\r\n\r\n1. **App Check** / **Performance Monitoring** / **Analytics** — 각각 `_safeInit()`으로 fire-and-forget\r\n2. **과목 데이터 프리로드** (2학년, 3학년 병렬)\r\n3. **로컬 급식 알림** 초기화 + 스케줄링\r\n4. **FCM** 초기화 + **딥링크** 초기화 + **위젯 서비스** 초기화 (fire-and-forget)\r\n5. **[OfflineQueueManager](network/offline_queue_manager.md)** 초기화 — sqflite DB 열기 + 네트워크 복원 리스너 등록\r\n\r\n### `_safeInit`\r\n\r\n```dart\r\nFuture<void> _safeInit(String name, Future<void> Function() fn) async\r\n```\r\n\r\ntry/catch 래퍼. 개별 초기화 실패가 앱 전체를 막지 않도록 에러를 로그만 남기고 무시함\r\n\r\n---\r\n\r\n## 전역 상태\r\n\r\n| 변수 | 타입 | 용도 |\r\n|------|------|------|\r\n| `providerContainer` | `ProviderContainer` | 비위젯 코드에서 Riverpod provider 접근용 (login_screen, setting_screen 등) |\r\n| `rootNavigatorKey` | `GlobalKey<NavigatorState>` | FCM 딥링크에서 Navigator 접근용 |\r\n| `notificationStream` | `StreamController<String?>` | 알림 탭 → MealScreen 전환용 |\r\n\r\n> 기존 `themeNotifier`, `localeNotifier`, `appRefreshNotifier` (ValueNotifier 3개)는 Riverpod provider로 통일됨 → [providers 문서](providers/providers.md) 참조\r\n\r\n---\r\n\r\n## `HansolHighSchool` (루트 위젯)\r\n\r\n```dart\r\nclass HansolHighSchool extends ConsumerStatefulWidget\r\n```\r\n\r\n**설명**: 앱의 루트 위젯. 테마 모드 전환과 MaterialApp 설정을 담당\r\n\r\n1. `initState`에서 [`AnimatedAppColors`](styles/app_colors.md) 초기화\r\n2. `_resolveIsDark`: ThemeMode.system일 때 platformBrightness 확인\r\n3. `build`에서 3개 provider를 watch:\r\n\r\n```dart\r\nfinal mode = ref.watch(themeProvider);\r\nfinal locale = ref.watch(localeProvider);\r\nfinal refreshKey = ref.watch(appRefreshProvider);\r\n\r\nreturn MaterialApp(\r\n  navigatorKey: rootNavigatorKey,\r\n  locale: locale,  // null이면 시스템 로캘 사용\r\n  theme: _lightTheme,\r\n  darkTheme: _darkTheme,\r\n  themeMode: mode,\r\n  home: MainScreen(key: ValueKey(refreshKey)),\r\n);\r\n```\r\n\r\n`appRefreshProvider` 값 변경 → `ValueKey` 변경 → MainScreen 재생성\r\n\r\n---\r\n\r\n## `MainScreen`\r\n\r\n```dart\r\nclass MainScreen extends StatefulWidget\r\n```\r\n\r\n**설명**: 급식/홈/일정 3탭 하단 네비게이션 + 초기 체크 로직\r\n\r\n### `initState` 체크 순서\r\n\r\n1. `_checkAccountExists()`: 프로필이 없으면 로그아웃 (삭제된 계정 처리)\r\n2. `_checkNewSemester()`: 학기 변경 시 프로필 업데이트 안내 + 선택과목/시간표 캐시 초기화\r\n3. 온보딩 미완료 시 → `OnboardingScreen`\r\n4. 비로그인 시 → `LoginScreen`\r\n5. 로그인 상태면 Firestore에서 일정 복원: `GetIt.I<LocalDataBase>().loadFromFirestore()`\r\n6. [`UpdateChecker`](notification/update_checker.md)`.check()` + [`PopupNotice`](notification/popup_notice.md)`.check()`\r\n\r\n### 네비게이션\r\n\r\n```dart\r\n_pages = [const MealScreen(), HomeScreen(key: _homeKey), const NoticeScreen()];\r\n```\r\n\r\n- `PageView` + `NavigationBar` (아이콘 only, 라벨 숨김)\r\n- 홈 탭 전환 시 `_homeKey.currentState?.refresh()` 호출\r\n- 알림 탭 (`meal_screen` payload) → 급식 탭으로 이동\r\n\r\n---\r\n\r\n## `_logCrashToFirestore`\r\n\r\n```dart\r\nvoid _logCrashToFirestore(FlutterErrorDetails details)\r\n```\r\n\r\nFirestore `crash_logs` 컬렉션에 에러 정보 저장. 에러 메시지 500자, 스택 1000자로 절삭\r\n","main_en.md":"# Main\n\n> 한국어: [main.md](./main.md)\n>\n> `lib/main.dart` — App entry point, MainScreen\n\n---\n\n## `main()`\n\n```dart\nFuture<void> main() async\n```\n\n**Description**: Performs app initialization. For startup performance, only initialization essential to the UI runs before `runApp`; the rest is handled in the background via `_deferredInit()`.\n\n### Before runApp (essential initialization)\n\n1. **Firebase initialization**: Check for duplicates before initializing\n2. **Crashlytics**: FlutterError handler + log errors to the Firestore `crash_logs` collection\n3. **Kakao SDK** initialization\n4. **Timezone** initialization (`Asia/Seoul`)\n5. Create `providerContainer = ProviderContainer()`\n6. **[SettingData](data/setting_data.md)** + **[ServiceLocator](data/service_locator.md)** initialized in parallel:\n   ```dart\n   await Future.wait([SettingData().init(), setupServiceLocator()]);\n   ```\n7. `runApp` → run `HansolHighSchool` widget wrapped in `UncontrolledProviderScope`\n\n### After runApp (`_deferredInit`)\n\nOnce the UI is up, `unawaited(_deferredInit())` runs the remaining initialization in the background:\n\n1. **App Check** / **Performance Monitoring** / **Analytics** — each fire-and-forget via `_safeInit()`\n2. **Subject data preload** (grades 2 and 3 in parallel)\n3. **Local meal notifications** initialization + scheduling\n4. **FCM** init + **deep link** init + **widget service** init (fire-and-forget)\n5. **[OfflineQueueManager](network/offline_queue_manager.md)** initialization — open sqflite DB + register network-restored listener\n\n### `_safeInit`\n\n```dart\nFuture<void> _safeInit(String name, Future<void> Function() fn) async\n```\n\nA try/catch wrapper. Ensures an individual initialization failure does not block the whole app — errors are logged and ignored.\n\n---\n\n## Global State\n\n| Variable | Type | Purpose |\n|------|------|------|\n| `providerContainer` | `ProviderContainer` | Access Riverpod providers from non-widget code (login_screen, setting_screen, etc.) |\n| `rootNavigatorKey` | `GlobalKey<NavigatorState>` | Access Navigator from FCM deep links |\n| `notificationStream` | `StreamController<String?>` | Switch to MealScreen on notification tap |\n\n> The previous `themeNotifier`, `localeNotifier`, `appRefreshNotifier` (3 ValueNotifiers) have been unified into Riverpod providers — see the [providers doc](providers/providers.md).\n\n---\n\n## `HansolHighSchool` (root widget)\n\n```dart\nclass HansolHighSchool extends ConsumerStatefulWidget\n```\n\n**Description**: The app's root widget. Handles theme mode switching and MaterialApp configuration.\n\n1. Initializes [`AnimatedAppColors`](styles/app_colors.md) in `initState`\n2. `_resolveIsDark`: checks platformBrightness when ThemeMode.system\n3. Watches 3 providers in `build`:\n\n```dart\nfinal mode = ref.watch(themeProvider);\nfinal locale = ref.watch(localeProvider);\nfinal refreshKey = ref.watch(appRefreshProvider);\n\nreturn MaterialApp(\n  navigatorKey: rootNavigatorKey,\n  locale: locale,  // null이면 시스템 로캘 사용\n  theme: _lightTheme,\n  darkTheme: _darkTheme,\n  themeMode: mode,\n  home: MainScreen(key: ValueKey(refreshKey)),\n);\n```\n\nA change in `appRefreshProvider` → `ValueKey` changes → MainScreen is rebuilt.\n\n---\n\n## `MainScreen`\n\n```dart\nclass MainScreen extends StatefulWidget\n```\n\n**Description**: A 3-tab bottom navigation (Meal / Home / Schedule) plus initial check logic.\n\n### `initState` check order\n\n1. `_checkAccountExists()`: logs out if no profile (handles deleted accounts)\n2. `_checkNewSemester()`: on semester change, prompts profile update + clears elective subject/timetable cache\n3. If onboarding is incomplete → `OnboardingScreen`\n4. If not signed in → `LoginScreen`\n5. If signed in, restore schedules from Firestore: `GetIt.I<LocalDataBase>().loadFromFirestore()`\n6. [`UpdateChecker`](notification/update_checker.md)`.check()` + [`PopupNotice`](notification/popup_notice.md)`.check()`\n\n### Navigation\n\n```dart\n_pages = [const MealScreen(), HomeScreen(key: _homeKey), const NoticeScreen()];\n```\n\n- `PageView` + `NavigationBar` (icon-only, labels hidden)\n- On switching to the Home tab, calls `_homeKey.currentState?.refresh()`\n- Notification tap (`meal_screen` payload) → switches to the Meal tab\n\n---\n\n## `_logCrashToFirestore`\n\n```dart\nvoid _logCrashToFirestore(FlutterErrorDetails details)\n```\n\nSaves error info to the Firestore `crash_logs` collection. Error messages are truncated to 500 chars, stack traces to 1000 chars.\n","network/network_status.md":"# NetworkStatus\n\n> `lib/network/network_status.dart` — 네트워크 연결 상태\n\n`connectivity_plus` 플러그인으로 현재 연결 상태를 확인함. 일회성 체크와 실시간 스트림 모두 제공\n\n---\n\n## `isUnconnected`\n\n```dart\nstatic Future<bool> isUnconnected()\n```\n\n**설명**: WiFi/모바일 데이터 미연결 시 `true`를 반환함\n\n```dart\nif (_testOverride != null) return _testOverride!();\nfinal results = await Connectivity().checkConnectivity();\nreturn results.isEmpty || results.contains(ConnectivityResult.none);\n```\n\n- `results`가 비어있거나 `none`을 포함하면 오프라인\n- API 호출 전 오프라인 체크에 사용 ([MealDataApi](../api/meal_data_api.md), [TimetableDataApi](../api/timetable_data_api.md), [NoticeDataApi](../api/notice_data_api.md))\n- 오프라인이면 캐시 데이터 반환 또는 안내 메시지 표시\n\n---\n\n## 실시간 스트림 모니터링\n\n### `onStatusChange`\n\n```dart\nstatic Stream<bool> get onStatusChange\n```\n\n연결 상태 변경 스트림. `true` = 오프라인, `false` = 온라인.\n최초 접근 시 자동으로 `connectivity_plus` 리스닝 시작. 브로드캐스트 스트림이므로 여러 위젯에서 동시 구독 가능\n\n사용처:\n- `OfflineBanner` — 오프라인 배너 + 동기화 상태 표시\n- `OfflineQueueManager` — 네트워크 복원 시 큐 자동 처리\n\n### `isOffline`\n\n```dart\nstatic bool get isOffline\n```\n\n마지막으로 알려진 연결 상태. 스트림 구독 없이 현재 상태를 동기적으로 확인할 때 사용\n\n---\n\n## 테스트 지원\n\n```dart\nstatic Future<bool> Function()? _testOverride;\n\n@visibleForTesting\nstatic set testOverride(Future<bool> Function()? fn) => _testOverride = fn;\n\n@visibleForTesting\nstatic void resetStream()\n```\n\n- `testOverride`로 `connectivity_plus` 플러그인 없이 온/오프라인 시나리오 테스트\n- `resetStream()`으로 스트림 상태 초기화 (테스트 간 격리)\n- 기본값 `null` → 프로덕션에서는 실제 `Connectivity()` 경로 실행\n","network/network_status_en.md":"# NetworkStatus\n\n> 한국어: [network_status.md](./network_status.md)\n\n> `lib/network/network_status.dart` — Network connectivity status\n\nUses the `connectivity_plus` plugin to check the current connectivity status. Provides both one-shot checks and a real-time stream.\n\n---\n\n## `isUnconnected`\n\n```dart\nstatic Future<bool> isUnconnected()\n```\n\n**Description**: Returns `true` when both WiFi and mobile data are disconnected.\n\n```dart\nif (_testOverride != null) return _testOverride!();\nfinal results = await Connectivity().checkConnectivity();\nreturn results.isEmpty || results.contains(ConnectivityResult.none);\n```\n\n- Offline if `results` is empty or contains `none`\n- Used for offline checks before API calls ([MealDataApi](../api/meal_data_api.md), [TimetableDataApi](../api/timetable_data_api.md), [NoticeDataApi](../api/notice_data_api.md))\n- When offline, returns cached data or displays a notice message\n\n---\n\n## Real-time stream monitoring\n\n### `onStatusChange`\n\n```dart\nstatic Stream<bool> get onStatusChange\n```\n\nStream of connectivity state changes. `true` = offline, `false` = online.\nAutomatically starts `connectivity_plus` listening on first access. It is a broadcast stream, so multiple widgets can subscribe concurrently.\n\nUsage:\n- `OfflineBanner` — displays offline banner + sync status\n- `OfflineQueueManager` — automatically processes the queue when the network is restored\n\n### `isOffline`\n\n```dart\nstatic bool get isOffline\n```\n\nThe last known connectivity status. Used to synchronously check the current state without subscribing to the stream.\n\n---\n\n## Test support\n\n```dart\nstatic Future<bool> Function()? _testOverride;\n\n@visibleForTesting\nstatic set testOverride(Future<bool> Function()? fn) => _testOverride = fn;\n\n@visibleForTesting\nstatic void resetStream()\n```\n\n- Use `testOverride` to test online/offline scenarios without the `connectivity_plus` plugin\n- Use `resetStream()` to reset the stream state (isolation between tests)\n- Default `null` → in production, the real `Connectivity()` path runs\n","network/offline_queue_manager.md":"# OfflineQueueManager\n\n> `lib/network/offline_queue_manager.dart` — 오프라인 쓰기 큐\n\n오프라인 상태에서 발생한 Firestore 쓰기 작업을 sqflite에 저장하고, 네트워크 복원 시 자동으로 순서대로 재실행함\n\n---\n\n## 싱글톤\n\n```dart\nclass OfflineQueueManager {\n  OfflineQueueManager._();\n  static final instance = OfflineQueueManager._();\n}\n```\n\n`main.dart`의 `_deferredInit()`에서 `initialize()` 호출\n\n---\n\n## `initialize`\n\n```dart\nFuture<void> initialize()\n```\n\n1. `offline_queue.db` SQLite 데이터베이스 열기/생성\n2. 대기 작업 수 갱신\n3. `NetworkStatus.onStatusChange` 구독 시작 (네트워크 복원 시 큐 자동 처리)\n\n### 큐 테이블 스키마\n\n```sql\nCREATE TABLE queue (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  type TEXT NOT NULL,        -- 'create_post' | 'create_comment'\n  payload TEXT NOT NULL,     -- JSON 직렬화된 데이터\n  createdAt INTEGER NOT NULL,\n  retryCount INTEGER DEFAULT 0\n)\n```\n\n---\n\n## 큐 추가\n\n### `enqueuePost`\n\n```dart\nFuture<int> enqueuePost(Map<String, dynamic> postData)\n```\n\n글 작성 데이터를 큐에 저장. `FieldValue.serverTimestamp()` → `'__SERVER_TIMESTAMP__'` 플레이스홀더로 변환하여 JSON 직렬화\n\n### `enqueueComment`\n\n```dart\nFuture<int> enqueueComment(String postId, Map<String, dynamic> commentData)\n```\n\n댓글 데이터를 큐에 저장. `postId`와 `commentData`를 하나의 payload로 묶음\n\n---\n\n## 큐 처리\n\n네트워크 복원 시 `_processQueue()` 자동 실행:\n\n```\n네트워크 복원 감지 (onStatusChange)\n  │\n  └── _processQueue()\n       ├── 큐에서 가장 오래된 작업 조회 (FIFO)\n       ├── 네트워크 끊기면 즉시 중단\n       ├── 작업 실행 성공 → 큐에서 삭제\n       ├── 작업 실행 실패\n       │     ├── retryCount < 3 → 카운트 증가, 다음 연결 복원 시 재시도\n       │     └── retryCount >= 3 → 큐에서 삭제 (드롭)\n       └── 모든 작업 완료 → SyncStatus.idle()\n```\n\n### 지원 작업 타입\n\n| type | 설명 | Firestore 실행 |\n|------|------|----------------|\n| `create_post` | 글 작성 | `posts.add(data)` |\n| `create_comment` | 댓글 작성 | `comments.add(data)` + `commentCount` 증가 |\n\n---\n\n## 동기화 상태 스트림\n\n```dart\nStream<SyncStatus> get onSyncStatusChange\nint get pendingCount\n```\n\n`OfflineBanner`에서 구독하여 UI에 상태 표시\n\n### SyncStatus\n\n| 상태 | 의미 |\n|------|------|\n| `SyncState.idle` | 대기 작업 없음 |\n| `SyncState.pending` | 대기 작업 있음 (네트워크 대기 중) |\n| `SyncState.syncing` | 큐 처리 중 |\n\n---\n\n## 유틸리티\n\n### `syncNow`\n\n```dart\nFuture<void> syncNow()\n```\n\n수동 동기화 트리거. 온라인이면 즉시 큐 처리 시작\n\n### `clearQueue`\n\n```dart\nFuture<void> clearQueue()\n```\n\n모든 대기 작업 삭제\n\n---\n\n## ServerTimestamp 직렬화\n\n`FieldValue.serverTimestamp()`는 JSON 직렬화가 불가하므로:\n\n1. **저장 시** (`_sanitizeForStorage`): `FieldValue` → `'__SERVER_TIMESTAMP__'` 문자열\n2. **실행 시** (`_restoreTimestamps`): `'__SERVER_TIMESTAMP__'` → `FieldValue.serverTimestamp()`\n\n중첩 Map도 재귀적으로 처리\n","network/offline_queue_manager_en.md":"# OfflineQueueManager\n\n> 한국어: [offline_queue_manager.md](./offline_queue_manager.md)\n\n> `lib/network/offline_queue_manager.dart` — Offline write queue\n\nSaves Firestore write operations that occur while offline into sqflite, and automatically re-executes them in order when the network is restored.\n\n---\n\n## Singleton\n\n```dart\nclass OfflineQueueManager {\n  OfflineQueueManager._();\n  static final instance = OfflineQueueManager._();\n}\n```\n\n`initialize()` is called from `_deferredInit()` in `main.dart`.\n\n---\n\n## `initialize`\n\n```dart\nFuture<void> initialize()\n```\n\n1. Opens/creates the `offline_queue.db` SQLite database\n2. Refreshes the pending-operation count\n3. Starts subscribing to `NetworkStatus.onStatusChange` (automatically processes the queue when the network is restored)\n\n### Queue table schema\n\n```sql\nCREATE TABLE queue (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  type TEXT NOT NULL,        -- 'create_post' | 'create_comment'\n  payload TEXT NOT NULL,     -- JSON-serialized data\n  createdAt INTEGER NOT NULL,\n  retryCount INTEGER DEFAULT 0\n)\n```\n\n---\n\n## Adding to the queue\n\n### `enqueuePost`\n\n```dart\nFuture<int> enqueuePost(Map<String, dynamic> postData)\n```\n\nSaves post creation data to the queue. Converts `FieldValue.serverTimestamp()` → `'__SERVER_TIMESTAMP__'` placeholder for JSON serialization.\n\n### `enqueueComment`\n\n```dart\nFuture<int> enqueueComment(String postId, Map<String, dynamic> commentData)\n```\n\nSaves comment data to the queue. Bundles `postId` and `commentData` into a single payload.\n\n---\n\n## Queue processing\n\nWhen the network is restored, `_processQueue()` runs automatically:\n\n```\nNetwork restoration detected (onStatusChange)\n  │\n  └── _processQueue()\n       ├── Fetch the oldest operation from the queue (FIFO)\n       ├── Abort immediately if the network disconnects\n       ├── Operation succeeds → remove from the queue\n       ├── Operation fails\n       │     ├── retryCount < 3 → increment count, retry on next restoration\n       │     └── retryCount >= 3 → remove from the queue (drop)\n       └── All operations completed → SyncStatus.idle()\n```\n\n### Supported operation types\n\n| type | Description | Firestore execution |\n|------|-------------|---------------------|\n| `create_post` | Create post | `posts.add(data)` |\n| `create_comment` | Create comment | `comments.add(data)` + `commentCount` increment |\n\n---\n\n## Sync status stream\n\n```dart\nStream<SyncStatus> get onSyncStatusChange\nint get pendingCount\n```\n\nSubscribed by `OfflineBanner` to display the status in the UI.\n\n### SyncStatus\n\n| State | Meaning |\n|-------|---------|\n| `SyncState.idle` | No pending operations |\n| `SyncState.pending` | Pending operations exist (waiting for network) |\n| `SyncState.syncing` | Queue is being processed |\n\n---\n\n## Utilities\n\n### `syncNow`\n\n```dart\nFuture<void> syncNow()\n```\n\nManual sync trigger. If online, immediately starts queue processing.\n\n### `clearQueue`\n\n```dart\nFuture<void> clearQueue()\n```\n\nDeletes all pending operations.\n\n---\n\n## ServerTimestamp serialization\n\nBecause `FieldValue.serverTimestamp()` cannot be JSON-serialized:\n\n1. **On save** (`_sanitizeForStorage`): `FieldValue` → `'__SERVER_TIMESTAMP__'` string\n2. **On execution** (`_restoreTimestamps`): `'__SERVER_TIMESTAMP__'` → `FieldValue.serverTimestamp()`\n\nNested Maps are handled recursively as well.\n","notification/daily_meal_notification.md":"# DailyMealNotification\r\n\r\n> `lib/notification/daily_meal_notification.dart` — 로컬 급식 알림 스케줄링\r\n\r\n인스턴스 메서드. 조식/중식/석식 평일 반복 알림을 `flutter_local_notifications` + `timezone`으로 스케줄링. [`MealDataApi`](../api/meal_data_api.md)에서 메뉴를 조회해 알림 본문에 포함\r\n\r\n---\r\n\r\n## `initializeNotifications`\r\n\r\n```dart\r\nFuture<void> initializeNotifications()\r\n```\r\n\r\n**설명**: 로컬 알림 플러그인을 초기화함\r\n\r\n1. Android/iOS 초기화 설정:\r\n   ```dart\r\n   const androidSettings = AndroidInitializationSettings('@mipmap/ic_launcher');\r\n   final iosSettings = DarwinInitializationSettings(...);\r\n   ```\r\n\r\n2. 알림 탭 콜백 등록:\r\n   ```dart\r\n   await _localNotificationsPlugin.initialize(\r\n     InitializationSettings(...),\r\n     onDidReceiveNotificationResponse: _onNotificationTap,\r\n     onDidReceiveBackgroundNotificationResponse: _onBackgroundNotification,\r\n   );\r\n   ```\r\n\r\n3. 플랫폼별 권한 요청:\r\n   ```dart\r\n   if (Platform.isIOS) { ... requestPermissions(...) }\r\n   else if (Platform.isAndroid) { await Permission.notification.request(); }\r\n   ```\r\n\r\n---\r\n\r\n## `scheduleDailyNotifications`\r\n\r\n```dart\r\nFuture<void> scheduleDailyNotifications()\r\n```\r\n\r\n**설명**: [SettingData](../data/setting_data.md) 설정에 따라 평일(월~금) 반복 알림을 등록함\r\n\r\n```dart\r\nif (settings.isBreakfastNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 1, mealLabel: '조식', time: ...);\r\n}\r\nif (settings.isLunchNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 2, mealLabel: '중식', time: ...);\r\n}\r\nif (settings.isDinnerNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 3, mealLabel: '석식', time: ...);\r\n}\r\n```\r\n\r\n기존 알림을 모두 취소 후 재등록 (`cancelAllNotifications` 먼저 호출)\r\n\r\n---\r\n\r\n## `_scheduleWeeklyNotification`\r\n\r\n```dart\r\nFuture<void> _scheduleWeeklyNotification({\r\n  required int id, required String mealLabel,\r\n  required TimeOfDay time, required List<int> weekdays,\r\n})\r\n```\r\n\r\n**설명**: 특정 식사의 요일별 반복 알림을 등록함\r\n\r\n1. 오늘의 급식 메뉴를 미리 조회해 알림 본문에 포함:\r\n   ```dart\r\n   final meal = await MealDataApi.getMeal(date: DateTime.now(), mealType: mealType, ...);\r\n   menuPreview = _cleanMenu(meal?.meal);\r\n   ```\r\n\r\n2. 월~금 각 요일에 대해 개별 알림 등록:\r\n   ```dart\r\n   for (int weekday in weekdays) {\r\n     final notificationId = id * 10 + weekday;  // 예: 중식+화요일 = 22\r\n     await _localNotificationsPlugin.zonedSchedule(\r\n       notificationId, ...,\r\n       matchDateTimeComponents: DateTimeComponents.dayOfWeekAndTime,  // 매주 반복\r\n     );\r\n   }\r\n   ```\r\n\r\n3. `BigTextStyleInformation`으로 메뉴 미리보기 표시\r\n\r\n---\r\n\r\n## `sendTestNotification`\r\n\r\n```dart\r\nFuture<void> sendTestNotification()\r\n```\r\n\r\n5초 후 테스트 알림 전송. 알림 설정 화면에서 \"테스트 알림 보내기\" 버튼에 연결\r\n\r\n---\r\n\r\n## `updateNotifications`\r\n\r\n```dart\r\nFuture<void> updateNotifications()\r\n```\r\n\r\n설정 변경 시 호출. `cancelAllNotifications()` + `scheduleDailyNotifications()`\r\n\r\n---\r\n\r\n## `_cleanMenu`\r\n\r\n```dart\r\nString _cleanMenu(String? menu)\r\n```\r\n\r\n급식 메뉴에서 알레르기 정보 번호를 제거하고 한 줄로 합침:\r\n\r\n```dart\r\nmenu.split('\\n')\r\n    .map((e) => e.replaceAll(RegExp(r'\\([0-9.,\\s]+\\)'), '').trim())\r\n    .where((e) => e.isNotEmpty)\r\n    .join(' · ');\r\n// \"치킨까스 (1.2.5) \\n 된장국 (5.6)\" → \"치킨까스 · 된장국\"\r\n```\r\n\r\n---\r\n\r\n## 내부 유틸리티\r\n\r\n| 함수 | 설명 |\r\n|------|------|\r\n| `_parseTimeOfDay(timeString)` | `'12:00'` → `TimeOfDay(hour: 12, minute: 0)` |\r\n| `_nextInstanceOfWeekday(time, weekday)` | 다음 해당 요일+시간의 `TZDateTime` 계산 |\r\n| `_nextInstanceOfTime(timeOfDay)` | 오늘/내일 중 해당 시간이 미래인 `TZDateTime` |\r\n","notification/daily_meal_notification_en.md":"# DailyMealNotification\n\n> 한국어: [daily_meal_notification.md](./daily_meal_notification.md)\n\n> `lib/notification/daily_meal_notification.dart` — Local meal notification scheduling\n\nInstance methods. Schedules weekday-repeating notifications for breakfast/lunch/dinner using `flutter_local_notifications` + `timezone`. Looks up the menu via [`MealDataApi`](../api/meal_data_api.md) and includes it in the notification body.\n\n---\n\n## `initializeNotifications`\n\n```dart\nFuture<void> initializeNotifications()\n```\n\n**Description**: Initializes the local notifications plugin.\n\n1. Android/iOS initialization settings:\n   ```dart\n   const androidSettings = AndroidInitializationSettings('@mipmap/ic_launcher');\n   final iosSettings = DarwinInitializationSettings(...);\n   ```\n\n2. Register the notification tap callback:\n   ```dart\n   await _localNotificationsPlugin.initialize(\n     InitializationSettings(...),\n     onDidReceiveNotificationResponse: _onNotificationTap,\n     onDidReceiveBackgroundNotificationResponse: _onBackgroundNotification,\n   );\n   ```\n\n3. Per-platform permission requests:\n   ```dart\n   if (Platform.isIOS) { ... requestPermissions(...) }\n   else if (Platform.isAndroid) { await Permission.notification.request(); }\n   ```\n\n---\n\n## `scheduleDailyNotifications`\n\n```dart\nFuture<void> scheduleDailyNotifications()\n```\n\n**Description**: Registers weekday (Mon–Fri) repeating notifications according to the [SettingData](../data/setting_data.md) configuration.\n\n```dart\nif (settings.isBreakfastNotificationOn) {\n  await _scheduleWeeklyNotification(id: 1, mealLabel: '조식', time: ...);\n}\nif (settings.isLunchNotificationOn) {\n  await _scheduleWeeklyNotification(id: 2, mealLabel: '중식', time: ...);\n}\nif (settings.isDinnerNotificationOn) {\n  await _scheduleWeeklyNotification(id: 3, mealLabel: '석식', time: ...);\n}\n```\n\nCancels all existing notifications before re-registering (calls `cancelAllNotifications` first).\n\n---\n\n## `_scheduleWeeklyNotification`\n\n```dart\nFuture<void> _scheduleWeeklyNotification({\n  required int id, required String mealLabel,\n  required TimeOfDay time, required List<int> weekdays,\n})\n```\n\n**Description**: Registers weekday-repeating notifications for a specific meal.\n\n1. Pre-fetches today's meal menu to include in the notification body:\n   ```dart\n   final meal = await MealDataApi.getMeal(date: DateTime.now(), mealType: mealType, ...);\n   menuPreview = _cleanMenu(meal?.meal);\n   ```\n\n2. Register an individual notification for each weekday Mon–Fri:\n   ```dart\n   for (int weekday in weekdays) {\n     final notificationId = id * 10 + weekday;  // e.g., lunch + Tuesday = 22\n     await _localNotificationsPlugin.zonedSchedule(\n       notificationId, ...,\n       matchDateTimeComponents: DateTimeComponents.dayOfWeekAndTime,  // weekly repeat\n     );\n   }\n   ```\n\n3. Shows the menu preview via `BigTextStyleInformation`.\n\n---\n\n## `sendTestNotification`\n\n```dart\nFuture<void> sendTestNotification()\n```\n\nSends a test notification after 5 seconds. Wired to the \"Send test notification\" button on the notification settings screen.\n\n---\n\n## `updateNotifications`\n\n```dart\nFuture<void> updateNotifications()\n```\n\nCalled when settings change. `cancelAllNotifications()` + `scheduleDailyNotifications()`.\n\n---\n\n## `_cleanMenu`\n\n```dart\nString _cleanMenu(String? menu)\n```\n\nStrips allergy info numbers from the meal menu and joins it into a single line:\n\n```dart\nmenu.split('\\n')\n    .map((e) => e.replaceAll(RegExp(r'\\([0-9.,\\s]+\\)'), '').trim())\n    .where((e) => e.isNotEmpty)\n    .join(' · ');\n// \"치킨까스 (1.2.5) \\n 된장국 (5.6)\" → \"치킨까스 · 된장국\"\n```\n\n---\n\n## Internal utilities\n\n| Function | Description |\n|----------|-------------|\n| `_parseTimeOfDay(timeString)` | `'12:00'` → `TimeOfDay(hour: 12, minute: 0)` |\n| `_nextInstanceOfWeekday(time, weekday)` | Computes the `TZDateTime` for the next matching weekday + time |\n| `_nextInstanceOfTime(timeOfDay)` | The `TZDateTime` for today/tomorrow where the given time is still in the future |\n","notification/fcm_service.md":"# FcmService\r\n\r\n> `lib/notification/fcm_service.dart` — FCM 푸시 알림, 토픽, 딥링크\r\n\r\n모든 메서드가 `static`. Firebase Cloud Messaging 초기화, 토큰 관리, 토픽 구독, 딥링크 라우팅을 담당\r\n\r\n---\r\n\r\n## `initialize`\r\n\r\n```dart\r\nstatic Future<void> initialize()\r\n```\r\n\r\n**설명**: FCM 서비스를 초기화함. `main()` 에서 한 번 호출\r\n\r\n1. Android 알림 채널 생성 (`_initChannel`)\r\n\r\n2. **로컬 알림 플러그인 초기화** (포그라운드 FCM 알림 탭 콜백 등록):\r\n   ```dart\r\n   await _localNotifications.initialize(\r\n     const InitializationSettings(android: androidSettings, iOS: iosSettings),\r\n     onDidReceiveNotificationResponse: onNotificationTap,\r\n   );\r\n   ```\r\n   > `onNotificationTap`은 `main.dart`에서 import. 탭 시 `notificationStream` 전달 + `handleLocalNotificationTap` → `_handleDeepLink` 호출\r\n\r\n3. Android 알림 채널 등록\r\n\r\n4. 알림 권한 요청:\r\n   ```dart\r\n   await _messaging.requestPermission(alert: true, badge: true, sound: true);\r\n   ```\r\n\r\n5. 포그라운드 알림 표시 옵션 설정\r\n\r\n6. FCM 토큰 저장 + 토큰 갱신 리스너 등록:\r\n   ```dart\r\n   await _saveToken();\r\n   _messaging.onTokenRefresh.listen(_onTokenRefresh);\r\n   ```\r\n\r\n7. 토픽 구독 (설정에 따라):\r\n   ```dart\r\n   await _subscribeTopics();\r\n   ```\r\n\r\n8. 메시지 핸들러 등록:\r\n   ```dart\r\n   FirebaseMessaging.onMessage.listen(_onForegroundMessage);        // 포그라운드\r\n   FirebaseMessaging.onMessageOpenedApp.listen(_onMessageOpenedApp); // 백그라운드 탭\r\n   final initialMessage = await _messaging.getInitialMessage();      // 종료 상태 탭\r\n   ```\r\n\r\n---\r\n\r\n## `_saveToken` / `_onTokenRefresh`\r\n\r\n```dart\r\nstatic Future<void> _saveToken()\r\nstatic Future<void> _onTokenRefresh(String token)\r\n```\r\n\r\nFCM 토큰을 Firestore `users/{uid}` 문서의 `fcmToken` 필드에 저장. Cloud Function이 이 토큰으로 개인 알림 전송\r\n\r\n---\r\n\r\n## 토픽 관리\r\n\r\n### `_subscribeTopics`\r\n\r\n```dart\r\nstatic Future<void> _subscribeTopics()\r\n```\r\n\r\n[SettingData](../data/setting_data.md) 설정에 따라 토픽을 구독함:\r\n\r\n- `board_new_post`: 전체 게시판 알림\r\n- 카테고리별: `board_free`, `board_question`, `board_info`, `board_lost`, `board_council`, `board_club`\r\n- `board_popular`: 인기글 알림\r\n\r\n### 한글→영문 토픽 매핑\r\n\r\n```dart\r\nstatic const _categoryTopicKey = {\r\n  '자유': 'free', '질문': 'question', '정보공유': 'info',\r\n  '분실물': 'lost', '학생회': 'council', '동아리': 'club',\r\n};\r\n```\r\n\r\nFCM 토픽명에 한글 불가 → 영문 변환\r\n\r\n### `toggleBoardNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleBoardNotification(bool enabled)\r\n```\r\n\r\n전체 게시판 알림 토글. `board_new_post` 토픽 구독/해제 + [SettingData](../data/setting_data.md) 저장\r\n\r\n### `toggleCategoryNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleCategoryNotification(String category, bool enabled)\r\n```\r\n\r\n카테고리별 알림 토글. 예: `toggleCategoryNotification('자유', false)`\r\n\r\n### `togglePopularNotification`\r\n\r\n```dart\r\nstatic Future<void> togglePopularNotification(bool enabled)\r\n```\r\n\r\n인기글 알림 토글. `board_popular` 토픽\r\n\r\n---\r\n\r\n## `_onForegroundMessage`\r\n\r\n```dart\r\nstatic void _onForegroundMessage(RemoteMessage message)\r\n```\r\n\r\n**설명**: 포그라운드에서 FCM 메시지 수신 시 로컬 알림으로 표시함\r\n\r\n```dart\r\n_localNotifications.show(\r\n  notification.hashCode,\r\n  notification.title,\r\n  notification.body,\r\n  NotificationDetails(...),\r\n  payload: payload,  // key=value;key=value 형태\r\n);\r\n```\r\n\r\n---\r\n\r\n## `_handleDeepLink`\r\n\r\n```dart\r\nstatic Future<void> _handleDeepLink(Map<String, dynamic> data)\r\n```\r\n\r\n**설명**: 알림 탭 시 data payload 기반으로 화면을 라우팅함\r\n\r\n```dart\r\nswitch (type) {\r\n  case 'comment':\r\n  case 'new_post':\r\n    navigator.push(...PostDetailScreen(postId: postId));\r\n  case 'account':\r\n    if (isManager) navigator.push(...AdminScreen());\r\n    else navigator.push(...NotificationScreen());\r\n  case 'chat':\r\n    // chatId로 chat 문서 조회 → 상대방 정보 로드 → ChatRoomScreen 이동\r\n}\r\n```\r\n\r\n| type | 대상 | 이동 화면 |\r\n|------|------|----------|\r\n| `comment` | 게시글 작성자 / 멘션 대상 | `PostDetailScreen` |\r\n| `new_post` | 토픽 구독자 | `PostDetailScreen` |\r\n| `account` | 관리자 (가입 요청) | `AdminScreen` |\r\n| `account` | 일반 유저 (승인/정지 등) | `NotificationScreen` |\r\n| `chat` | 채팅 참여자 | `ChatRoomScreen` |\r\n\r\n> 관리자/일반 유저 구분은 [`AuthService`](../data/auth_service.md)`.cachedProfile?.isManager`로 판별\r\n\r\n---\r\n\r\n## payload 인코딩/디코딩\r\n\r\n```dart\r\nstatic String _encodePayload(Map<String, dynamic> data)\r\n// → \"type=comment;postId=abc123\"\r\n\r\nstatic Map<String, dynamic> decodePayload(String payload)\r\n// \"type=comment;postId=abc123\" → {type: 'comment', postId: 'abc123'}\r\n```\r\n\r\n포그라운드 로컬 알림의 payload 전달용. `=`로 key-value 분리, `;`로 쌍 분리\r\n\r\n---\r\n\r\n## `onUserLogin`\r\n\r\n```dart\r\nstatic Future<void> onUserLogin()\r\n```\r\n\r\n로그인 직후 호출. 토큰 저장 + 토픽 재구독\r\n\r\n---\r\n\r\n## `firebaseMessagingBackgroundHandler`\r\n\r\n```dart\r\n@pragma('vm:entry-point')\r\nFuture<void> firebaseMessagingBackgroundHandler(RemoteMessage message) async {}\r\n```\r\n\r\n백그라운드 메시지 핸들러. 현재 빈 구현 (시스템 알림은 자동 표시)\r\n`@pragma('vm:entry-point')`로 tree-shaking 방지\r\n","notification/fcm_service_en.md":"# FcmService\n\n> 한국어: [fcm_service.md](./fcm_service.md)\n\n> `lib/notification/fcm_service.dart` — FCM push notifications, topics, deep links\n\nAll methods are `static`. Handles Firebase Cloud Messaging initialization, token management, topic subscriptions, and deep-link routing.\n\n---\n\n## `initialize`\n\n```dart\nstatic Future<void> initialize()\n```\n\n**Description**: Initializes the FCM service. Called once from `main()`.\n\n1. Create the Android notification channel (`_initChannel`)\n\n2. **Initialize the local notifications plugin** (registers the tap callback for foreground FCM notifications):\n   ```dart\n   await _localNotifications.initialize(\n     const InitializationSettings(android: androidSettings, iOS: iosSettings),\n     onDidReceiveNotificationResponse: onNotificationTap,\n   );\n   ```\n   > `onNotificationTap` is imported from `main.dart`. On tap, it forwards to `notificationStream` + `handleLocalNotificationTap` → calls `_handleDeepLink`.\n\n3. Register the Android notification channel\n\n4. Request notification permission:\n   ```dart\n   await _messaging.requestPermission(alert: true, badge: true, sound: true);\n   ```\n\n5. Configure foreground notification presentation options\n\n6. Save the FCM token + register a token-refresh listener:\n   ```dart\n   await _saveToken();\n   _messaging.onTokenRefresh.listen(_onTokenRefresh);\n   ```\n\n7. Subscribe to topics (based on settings):\n   ```dart\n   await _subscribeTopics();\n   ```\n\n8. Register message handlers:\n   ```dart\n   FirebaseMessaging.onMessage.listen(_onForegroundMessage);        // foreground\n   FirebaseMessaging.onMessageOpenedApp.listen(_onMessageOpenedApp); // background tap\n   final initialMessage = await _messaging.getInitialMessage();      // terminated tap\n   ```\n\n---\n\n## `_saveToken` / `_onTokenRefresh`\n\n```dart\nstatic Future<void> _saveToken()\nstatic Future<void> _onTokenRefresh(String token)\n```\n\nSaves the FCM token to the `fcmToken` field of the `users/{uid}` Firestore document. A Cloud Function uses this token to send personal notifications.\n\n---\n\n## Topic management\n\n### `_subscribeTopics`\n\n```dart\nstatic Future<void> _subscribeTopics()\n```\n\nSubscribes to topics based on the [SettingData](../data/setting_data.md) configuration:\n\n- `board_new_post`: notifications for the entire board\n- Per-category: `board_free`, `board_question`, `board_info`, `board_lost`, `board_council`, `board_club`\n- `board_popular`: popular-post notifications\n\n### Korean → English topic mapping\n\n```dart\nstatic const _categoryTopicKey = {\n  '자유': 'free', '질문': 'question', '정보공유': 'info',\n  '분실물': 'lost', '학생회': 'council', '동아리': 'club',\n};\n```\n\nFCM topic names cannot contain Korean → convert to English.\n\n### `toggleBoardNotification`\n\n```dart\nstatic Future<void> toggleBoardNotification(bool enabled)\n```\n\nToggles notifications for the entire board. Subscribes/unsubscribes the `board_new_post` topic + saves to [SettingData](../data/setting_data.md).\n\n### `toggleCate
