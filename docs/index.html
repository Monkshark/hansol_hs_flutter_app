ork** | Flutter Material | Next.js 14 + Tailwind CSS |\r\n| **State** | Riverpod 2.5 | React hooks + SWR |\r\n| **Auth** | Firebase Auth SDK (mobile) | Firebase Auth (web) + role check |\r\n| **Audience** | students / teachers / parents / alumni | moderator/auditor/manager/admin roles only (4 tiers) |\r\n| **Shared** | same Firestore collections (`users`, `posts`, ...) | same |\r\n\r\n**Conflict prevention**: Admin Web UPDATE permissions enforce `isManager()` / `isAdmin()` / `isAuditor()` helpers from `firestore.rules`. All role checks read from `request.auth.token.role` (Firebase Auth custom claims) вҶ’ zero extra Firestore reads. Rules remain the single source of truth regardless of client.\r\n\r\n## Cloud Functions Trigger Map\r\n\r\n| Function | Trigger | Role |\r\n|---|---|---|\r\n| `kakaoCustomAuth` | HTTPS onRequest | Kakao access token вҶ’ Firebase custom token |\r\n| `sendSchoolEmailOTP` / `verifySchoolEmailOTP` | onCall | School email OTP issue / verify (teacher onboarding) |\r\n| `redeemTeacherInvite` | onCall | Redeem teacher invite code (`teacher` userType + auto-approve) |\r\n| `postOgRenderer` | HTTPS onRequest | Render OG-tagged HTML for deep links |\r\n| `onCommentCreated` | `posts/{pid}/comments/{cid}` onCreate | push to post author + stat increment |\r\n| `onPostCreated` | `posts/{pid}` onCreate | push to admins (per-category opt-in) + `app_stats/totals.posts++` |\r\n| `onPostLikeUpdated` | `posts/{pid}` onUpdate | detect like count changes, correct popular-post counter |\r\n| `onReportCreated` | `reports/{rid}` onCreate | push to admins on report + write log + stat increment |\r\n| `aggregateReports` | `reports/{rid}` onCreate | Burst detection (multiple reports on same target within 5min) вҶ’ manager alert |\r\n| `onUserCreated` | `users/{uid}` onCreate | initialize user, grant custom claims (`role: \"user\"`, `approved: false`) |\r\n| `onUserUpdated` | `users/{uid}` onUpdate | push on approval / role / suspension change + claim refresh |\r\n| `onUserDeleted` | `users/{uid}` onDelete | cascade delete Auth account + Storage files |\r\n| `onChatMessageCreated` | `chats/{cid}/messages/{mid}` onCreate | push to recipient |\r\n| `checkSuspensionExpiry` | onSchedule (hourly) | delete `suspendedUntil` when expired вҶ’ cascades `onUserUpdated` |\r\n| `applyProgressiveSuspension` | onCall | Progressive suspension (1st: 1d вҶ’ 2nd: 7d вҶ’ 3rd: 30d) вҖ” manager only |\r\n| `requestAccountDeletion` | onCall | User-initiated account deletion (deferred 30-day purge) |\r\n| `purgeDeactivatedAccounts` | onSchedule (daily 04:00) | Permanently destroy accounts past 30-day deletion window |\r\n| `createDataExport` | onCall | Export user's own data (posts/comments/reports/chats) as JSON вҶ’ Storage |\r\n| `purgeExpiredExports` | onSchedule (daily 05:00) | Sweep expired `data_requests` export files |\r\n| `cleanupOldPosts` | onSchedule (daily 18:00) | TTL cleanup for stale reports/logs |\r\n| `promoteGradesAnnually` | onSchedule (yearly Mar-2 00:00) | Auto-promote grades + graduate handoff |\r\n| `backfillStats` | HTTPS onRequest | Recompute counters from full collection scan (manual tool) |\r\n| `backfillCustomClaims` | HTTPS onRequest | Re-grant custom claims to existing users (admin tool) |\r\n\r\nFull code in `functions/index.js`.\r\n\r\n## See Also\r\n- [Architecture Decisions (ADRs)](./architecture-decisions_en.md)\r\n- [Data Model](./data-model_en.md)\r\n- [Security Model](./security_en.md)\r\n- [Testing Strategy](./testing_en.md)\r\n","guides/cicd-setup.md":"# CI/CD м„Өм •\r\n\r\n> English: [cicd-setup_en.md](./cicd-setup_en.md)\r\n\r\nGitHub Actions кё°л°ҳ CI/CD нҢҢмқҙн”„лқјмқёмқ„ м •лҰ¬н•©лӢҲлӢӨ. л‘җ мӣҢнҒ¬н”ҢлЎңмҡ°к°Җ лі‘л ¬лЎң лҸҢл©°, л‘ҳ лӢӨ нҶөкіјн•ҙм•ј masterм—җ лЁём§Җлҗ©лӢҲлӢӨ.\r\n\r\n## мӣҢнҒ¬н”ҢлЎңмҡ° лӘ©лЎқ\r\n\r\n| нҢҢмқј | нҠёлҰ¬кұ° | м—ӯн•  |\r\n|---|---|---|\r\n| `.github/workflows/flutter.yml` | `push`/`pull_request` вҶ’ `master` | analyze + test + APK л№Ңл“ң |\r\n| `.github/workflows/firestore-rules.yml` | к·ңм№ҷ кІҪлЎң ліҖкІҪ мӢңл§Ң | Firestore Rules лӢЁмң„ н…ҢмҠӨнҠё |\r\n\r\nл‘җ мӣҢнҒ¬н”ҢлЎңмҡ° лӘЁл‘җ `concurrency: cancel-in-progress: true` лЎң к°ҷмқҖ лёҢлһңм№ҳмқҳ мқҙм „ мӢӨн–үмқ„ мһҗлҸҷ м·ЁмҶҢн•©лӢҲлӢӨ.\r\n\r\n## flutter.yml нҢҢмқҙн”„лқјмқё\r\n\r\n### Job 1 вҖ” `analyze-and-test`\r\n\r\n| лӢЁкі„ | лӮҙмҡ© |\r\n|---|---|\r\n| Setup Flutter | `subosito/flutter-action@v2`, stable мұ„л„җ, мәҗмӢң нҷңм„ұнҷ” |\r\n| **Create dummy secret files** | `lib/api/nies_api_keys.dart`, `lib/firebase_options.dart`, `lib/api/kakao_keys.dart` лҘј лҚ”лҜё к°’мңјлЎң мғқм„ұ вҖ” мӢӨм ң нӮӨлҠ” CIм—җ м—ҶмқҢ |\r\n| Install deps | `flutter pub get` |\r\n| Verify formatting | `dart format --output=none --set-exit-if-changed .` (кІҪкі л§Ң, мӢӨнҢЁлҠ” non-fatal) |\r\n| **Analyze** | `flutter analyze --no-fatal-infos --no-fatal-warnings` |\r\n| **Run tests with coverage** | `flutter test --coverage --reporter=expanded` |\r\n| Upload coverage to Codecov | `codecov/codecov-action@v4`, flag `unittests` |\r\n| Upload coverage artifact | `coverage/lcov.info` 14мқј ліҙкҙҖ |\r\n\r\n### Job 2 вҖ” `build-android` (conditional)\r\n\r\n- мЎ°кұҙ: `github.event_name == 'push' && github.ref == 'refs/heads/master'` вҶ’ **master push мӢңм—җл§Ң**\r\n- `needs: analyze-and-test` вҶ’ м„ н–ү Job м„ұкіөн•ҙм•ј мӢӨн–ү\r\n- лҚ”лҜё нҢҢмқј м¶”к°ҖлЎң `android/app/google-services.json` мғқм„ұ (н”„лЎңм қнҠё idлҠ” dummy)\r\n- Java 17, Flutter stable\r\n- **Debug APK л№Ңл“ң** (`--debug --target-platform android-arm64`)\r\n- `build/app/outputs/flutter-apk/app-debug.apk` лҘј artifactлЎң 7мқј ліҙкҙҖ\r\n\r\n### лҚ”лҜё мӢңнҒ¬лҰҝ м „лһө\r\n\r\nCIлҠ” мӢӨм ң NEIS / Firebase / Kakao нӮӨ м—Ҷмқҙ л№Ңл“ң/н…ҢмҠӨнҠёл§Ң мҲҳн–үн•©лӢҲлӢӨ. н•өмӢ¬ мқҙмң :\r\n- нӮӨлҘј л ҲнҸ¬м—җ м»Өл°Ӣн•ҳм§Җ м•ҠмқҢ\r\n- н…ҢмҠӨнҠёлҠ” л„ӨнҠёмӣҢнҒ¬ нҳём¶ң м—Ҷмқҙ лЎңм§Ғ кІҖмҰқ\r\n- APKлҸ„ dummy configлЎң мғқм„ұ (мӢӨм ң мӢӨн–үмҡ© м•„лӢҳ)\r\n\r\nлЎңм»¬ к°ңл°ңм—җм„ңлҠ” мӢӨм ң нӮӨ нҢҢмқјмқ„ мғқм„ұн•ҙм•ј н•©лӢҲлӢӨ. [DEPLOY.md](../DEPLOY.md) м°ёмЎ°.\r\n\r\n## firestore-rules.yml нҢҢмқҙн”„лқјмқё\r\n\r\nкІҪлЎң нҠёлҰ¬кұ° вҖ” лӢӨмқҢ нҢҢмқј ліҖкІҪ мӢңл§Ң мӢӨн–ү:\r\n- `firestore.rules`\r\n- `tests/firestore-rules/**`\r\n- `.github/workflows/firestore-rules.yml`\r\n\r\n| лӢЁкі„ | лӮҙмҡ© |\r\n|---|---|\r\n| Setup Node | v20 |\r\n| Setup Java | v21 (Firebase emulator мҡ”кө¬мӮ¬н•ӯ) |\r\n| Install Firebase CLI | `npm install -g firebase-tools` |\r\n| Install test deps | `cd tests/firestore-rules && npm install` |\r\n| **Run rules tests** | `firebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"` |\r\n\r\n34к°ң rules н…ҢмҠӨнҠёк°Җ м•Ҫ 4мҙҲ м•Ҳм—җ мҷ„лЈҢлҗ©лӢҲлӢӨ.\r\n\r\n## л°°м§Җ м—°лҸҷ\r\n\r\nREADME мөңмғҒлӢЁ л°°м§Җ:\r\n\r\n```md\r\n[![Flutter CI](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/flutter.yml/badge.svg)](...)\r\n[![Firestore Rules Tests](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/firestore-rules.yml/badge.svg)](...)\r\n```\r\n\r\n## лЎңм»¬м—җм„ң лҸҷмқјн•ҳкІҢ мһ¬нҳ„\r\n\r\n```bash\r\n# CIмқҳ analyze лӢЁкі„\r\nflutter analyze --no-fatal-infos --no-fatal-warnings\r\n\r\n# CIмқҳ test лӢЁкі„\r\nflutter test --coverage\r\n\r\n# CIмқҳ rules лӢЁкі„\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\n\r\n# CIмқҳ APK л№Ңл“ң лӢЁкі„ (release нӮӨ м—Ҷмқҙ л””лІ„к·ёл§Ң)\r\nflutter build apk --debug --target-platform android-arm64\r\n```\r\n\r\n## Codecov\r\n\r\n- `lcov.info` кё°л°ҳ м»ӨлІ„лҰ¬м§Җ ліҙкі \r\n- `fail_ci_if_error: false` вҖ” м—…лЎңл“ң мӢӨнҢЁк°Җ CI мӢӨнҢЁлЎң мқҙм–ҙм§Җм§Җ м•ҠмқҢ\r\n- PRм—җ м»ӨлІ„лҰ¬м§Җ ліҖнҷ” мһҗлҸҷ мҪ”л©ҳнҠё\r\n\r\n## лЁём§Җ к·ңм№ҷ (к¶ҢмһҘ)\r\n\r\n- **Required checks**: `Flutter CI / Analyze + Test (ubuntu-latest)` м„ұкіө\r\n- **Required when rules path touched**: `Firestore Rules Tests / Firestore Rules Unit Tests` м„ұкіө\r\n- **APK л№Ңл“ң** мӢӨнҢЁлҠ” лё”лЎңнӮ№ м•„лӢҳ (notification мҡ©лҸ„)\r\n\r\n## нҠёлҹ¬лё”мҠҲнҢ…\r\n\r\n| мҰқмғҒ | мӣҗмқё | н•ҙкІ° |\r\n|---|---|---|\r\n| `Formatting issues found` кІҪкі  | `dart format` н•„мҡ” | лЎңм»¬м—җм„ң `dart format .` нӣ„ м»Өл°Ӣ |\r\n| analyze мӢӨнҢЁ | info/warningмқҙ м•„лӢҢ error | лЎңм»¬м—җм„ң `flutter analyze` лҸҷмқј н”Ңлһҳк·ёлЎң нҷ•мқё |\r\n| Rules н…ҢмҠӨнҠё лЁём§Җ м§Ғм „ к№Ём§җ | к·ңм№ҷ-м•ұ лЎңм§Ғ лҸҷкё°нҷ” м•Ҳ лҗЁ | `firestore.rules` ліҖкІҪ мӢң `tests/firestore-rules/*.spec.js` н•Ёк»ҳ мҲҳм • |\r\n| APK л№Ңл“ң мӢӨнҢЁ `google-services.json` | dummy нҢҢмқј мғқм„ұ лҲ„лқҪ | workflowмқҳ heredoc лё”лЎқ нҷ•мқё |\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [н…ҢмҠӨнҠё м „лһө](./testing.md)\r\n- [л°°нҸ¬ к°Җмқҙл“ң](../DEPLOY.md)\r\n- [кё°м—¬ к°Җмқҙл“ң](../CONTRIBUTING.md)\r\n","guides/cicd-setup_en.md":"# CI/CD Setup\r\n\r\n> н•ңкөӯм–ҙ: [cicd-setup.md](./cicd-setup.md)\r\n\r\nGitHub Actions-based CI/CD pipeline. Two workflows run in parallel; both must pass before merging to master.\r\n\r\n## Workflows\r\n\r\n| File | Trigger | Role |\r\n|---|---|---|\r\n| `.github/workflows/flutter.yml` | `push`/`pull_request` вҶ’ `master` | analyze + test + APK build |\r\n| `.github/workflows/firestore-rules.yml` | rules paths changed | Firestore rules unit tests |\r\n\r\nBoth use `concurrency: cancel-in-progress: true` so a newer push cancels older runs on the same branch.\r\n\r\n## flutter.yml Pipeline\r\n\r\n### Job 1 вҖ” `analyze-and-test`\r\n\r\n| Step | Content |\r\n|---|---|\r\n| Setup Flutter | `subosito/flutter-action@v2`, stable channel, cache enabled |\r\n| **Create dummy secret files** | `lib/api/nies_api_keys.dart`, `lib/firebase_options.dart`, `lib/api/kakao_keys.dart` generated with dummy values вҖ” CI has no real keys |\r\n| Install deps | `flutter pub get` |\r\n| Verify formatting | `dart format --output=none --set-exit-if-changed .` (warn only, non-fatal) |\r\n| **Analyze** | `flutter analyze --no-fatal-infos --no-fatal-warnings` |\r\n| **Run tests with coverage** | `flutter test --coverage --reporter=expanded` |\r\n| Upload coverage to Codecov | `codecov/codecov-action@v4`, flag `unittests` |\r\n| Upload coverage artifact | `coverage/lcov.info` retained 14 days |\r\n\r\n### Job 2 вҖ” `build-android` (conditional)\r\n\r\n- Condition: `github.event_name == 'push' && github.ref == 'refs/heads/master'` вҶ’ **master pushes only**\r\n- `needs: analyze-and-test` вҖ” runs only if prior job succeeds\r\n- Also generates `android/app/google-services.json` with a dummy project id\r\n- Java 17, Flutter stable\r\n- **Debug APK build** (`--debug --target-platform android-arm64`)\r\n- Artifact: `build/app/outputs/flutter-apk/app-debug.apk`, 7 days\r\n\r\n### Dummy Secret Strategy\r\n\r\nCI builds/tests without real NEIS / Firebase / Kakao keys. Reasons:\r\n- No keys committed to the repo\r\n- Tests validate logic without network calls\r\n- APK is built with a dummy config (not for real execution)\r\n\r\nLocal development needs the real key files вҖ” see [DEPLOY_en.md](../DEPLOY_en.md).\r\n\r\n## firestore-rules.yml Pipeline\r\n\r\nPath-triggered вҖ” only runs if any of these changed:\r\n- `firestore.rules`\r\n- `tests/firestore-rules/**`\r\n- `.github/workflows/firestore-rules.yml`\r\n\r\n| Step | Content |\r\n|---|---|\r\n| Setup Node | v20 |\r\n| Setup Java | v21 (Firebase emulator requirement) |\r\n| Install Firebase CLI | `npm install -g firebase-tools` |\r\n| Install test deps | `cd tests/firestore-rules && npm install` |\r\n| **Run rules tests** | `firebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"` |\r\n\r\n34 rules tests complete in roughly 4 seconds.\r\n\r\n## Badges\r\n\r\nREADME top:\r\n\r\n```md\r\n[![Flutter CI](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/flutter.yml/badge.svg)](...)\r\n[![Firestore Rules Tests](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/firestore-rules.yml/badge.svg)](...)\r\n```\r\n\r\n## Reproduce Locally\r\n\r\n```bash\r\n# CI analyze\r\nflutter analyze --no-fatal-infos --no-fatal-warnings\r\n\r\n# CI test\r\nflutter test --coverage\r\n\r\n# CI rules\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\n\r\n# CI APK (debug only вҖ” no release key)\r\nflutter build apk --debug --target-platform android-arm64\r\n```\r\n\r\n## Codecov\r\n\r\n- Coverage reporting based on `lcov.info`\r\n- `fail_ci_if_error: false` вҖ” upload failures don't fail the CI\r\n- Auto-comments coverage delta on PRs\r\n\r\n## Merge Rules (recommended)\r\n\r\n- **Required checks**: `Flutter CI / Analyze + Test (ubuntu-latest)` passing\r\n- **When rules paths touched**: `Firestore Rules Tests / Firestore Rules Unit Tests` passing\r\n- **APK build** failure is non-blocking (notification only)\r\n\r\n## Troubleshooting\r\n\r\n| Symptom | Cause | Fix |\r\n|---|---|---|\r\n| `Formatting issues found` warning | needs `dart format` | run `dart format .` locally and commit |\r\n| analyze failure | error (not info/warning) | reproduce locally with same flags |\r\n| Rules test breaks right before merge | rules/app logic out of sync | when changing `firestore.rules`, update `tests/firestore-rules/*.spec.js` together |\r\n| APK build `google-services.json` missing | workflow dummy block missing | check the heredoc in the workflow |\r\n\r\n## See Also\r\n- [Testing Strategy](./testing_en.md)\r\n- [Deployment Guide](../DEPLOY_en.md)\r\n- [Contributing Guide](../CONTRIBUTING_en.md)\r\n","guides/data-model.md":"# лҚ°мқҙн„° лӘЁлҚё\r\n\r\n> English: [data-model_en.md](./data-model_en.md)\r\n\r\nFirestore м»¬л үм…ҳ кө¬мЎ°, н•„л“ң мҠӨнӮӨл§Ҳ, мқёлҚұмҠӨ, ліҙм•Ҳ к·ңм№ҷ м—°кҙҖмқ„ н•ң кіім—җ м •лҰ¬н•©лӢҲлӢӨ.\r\n\r\n## ERD\r\n\r\n```mermaid\r\nerDiagram\r\n    users ||--o{ posts : \"мһ‘м„ұ\"\r\n    users ||--o{ notifications : \"мҲҳмӢ \"\r\n    users ||--o{ subjects : \"м„ нғқкіјлӘ©\"\r\n    posts ||--o{ comments : \"нҸ¬н•Ё\"\r\n    posts ||--o{ reports : \"мӢ кі \"\r\n    chats ||--o{ messages : \"нҸ¬н•Ё\"\r\n    users }o--o{ chats : \"м°ём—¬\"\r\n\r\n    users {\r\n        string uid PK\r\n        string name\r\n        string studentId\r\n        string role\r\n        string userType\r\n        boolean approved\r\n        timestamp suspendedUntil\r\n        string profilePhotoUrl\r\n        string fcmToken\r\n        boolean notiComment\r\n        boolean notiChat\r\n    }\r\n\r\n    posts {\r\n        string id PK\r\n        string title\r\n        string content\r\n        string category\r\n        string authorUid FK\r\n        boolean isAnonymous\r\n        boolean isPinned\r\n        int likes\r\n        int dislikes\r\n        array bookmarkedBy\r\n        array pollOptions\r\n        map pollVotes\r\n    }\r\n\r\n    comments {\r\n        string id PK\r\n        string authorUid FK\r\n        string content\r\n        boolean isAnonymous\r\n        string parentId\r\n        timestamp createdAt\r\n    }\r\n\r\n    chats {\r\n        string id PK\r\n        array participants\r\n        map participantNames\r\n        string lastMessage\r\n        map unreadCount\r\n    }\r\n\r\n    messages {\r\n        string id PK\r\n        string senderUid FK\r\n        string content\r\n        boolean deleted\r\n        array deletedFor\r\n    }\r\n```\r\n\r\n## м»¬л үм…ҳ мғҒм„ё\r\n\r\n### `users/{uid}`\r\n\r\n| н•„л“ң | нғҖмһ… | м„ӨлӘ… |\r\n|---|---|---|\r\n| `uid` | string (doc id) | Firebase Auth UID лҳҗлҠ” `kakao:{id}` |\r\n| `name` | string | мӢӨлӘ… |\r\n| `studentId` | string | н•ҷлІҲ (мһ¬н•ҷмғқ) |\r\n| `userType` | string | `student` / `graduate` / `teacher` / `parent` |\r\n| `role` | string | `user` / `moderator` / `auditor` / `manager` / `admin` |\r\n| `approved` | boolean | кҙҖлҰ¬мһҗ мҠ№мқё м—¬л¶Җ |\r\n| `verificationStatus` | string | `pending` / `verified` (н•ҷкөҗ мқҙл©”мқј OTP мқёмҰқ кІ°кіј). н•„л“ң м—Ҷмңјл©ҙ `verified`лЎң grandfathered |\r\n| `schoolEmail` | string | мқёмҰқлҗң н•ҷкөҗ мқҙл©”мқј (м„ұкіө мӢң кё°лЎқ) |\r\n| `verifiedAt` | timestamp | мқёмҰқ мҷ„лЈҢ мӢңк°Ғ |\r\n| `verifiedVia` | string | мқёмҰқ кІҪлЎң (`otp`) |\r\n| `suspendedUntil` | timestamp \\| null | м •м§Җ л§ҢлЈҢ мӢңк°Ғ. мҠӨмјҖмӨ„лҹ¬к°Җ л§ӨмӢңк°„ мІӯмҶҢ |\r\n| `suspendReason` | string \\| null | м •м§Җ мӮ¬мң  (л°°л„Ҳ н‘ңмӢңмҡ©) |\r\n| `blockedUsers` | string[] | м°ЁлӢЁн•ң мӮ¬мҡ©мһҗ uid лӘ©лЎқ |\r\n| `lastProfileUpdate` | string | \"YYYY\" нҳ•мӢқ вҖ” мғҲ н•ҷкё° н•ҷл…„/л°ҳ/лІҲнҳё к°ұмӢ  м¶”м Ғ |\r\n| `graduationYear` | int \\| null | мЎём—…мғқл§Ң |\r\n| `teacherSubject` | string \\| null | көҗмӮ¬л§Ң (лӢҙлӢ№ кіјлӘ©) |\r\n| `loginProvider` | string | `google` / `apple` / `kakao` / `github` |\r\n| `profilePhotoUrl` | string | Cloud Storage лҳҗлҠ” OAuth н”„лЎңн•„ |\r\n| `fcmToken` | string | FCM н‘ёмӢң нғҖкІҹ |\r\n| `notiComment` / `notiReply` / `notiChat` / `notiNewPost` / `notiAccount` | boolean | м№ҙн…Ңкі лҰ¬лі„ м•ҢлҰј on/off |\r\n| `createdAt` / `updatedAt` | timestamp | к°җмӮ¬мҡ© |\r\n\r\n**ліҙм•Ҳ к·ңм№ҷ мҡ”м•Ҫ** (`firestore.rules`):\r\n- `read`: ліёмқё лҳҗлҠ” manager/admin\r\n- `update`: ліёмқё(лӢЁ `role`, `suspendedUntil`, `approved` л¶ҲліҖ) лҳҗлҠ” manager/admin\r\n- `delete`: ліёмқё лҳҗлҠ” admin\r\n\r\n**м„ңлёҢм»¬л үм…ҳ**:\r\n- `users/{uid}/subjects/{doc}` вҖ” м„ нғқкіјлӘ© (ліёмқёл§Ң read/write)\r\n- `users/{uid}/sync/{doc}` вҖ” лҸҷкё°нҷ” л©”нғҖ (ліёмқёл§Ң read/write)\r\n- `users/{uid}/notifications/{notifId}` вҖ” мқём•ұ м•ҢлҰј (ліёмқёл§Ң read/update/delete; createлҠ” лҲ„кө¬лӮҳ вҖ” кҙҖлҰ¬мһҗ м•ҢлҰј н—Ҳмҡ©)\r\n\r\n### `posts/{postId}`\r\n\r\n| н•„л“ң | нғҖмһ… | м„ӨлӘ… |\r\n|---|---|---|\r\n| `title` | string (1~200мһҗ) | м ңлӘ© |\r\n| `content` | string (вүӨ5000мһҗ) | ліёл¬ё |\r\n| `category` | string | 6м№ҙн…Ңкі лҰ¬ мӨ‘ н•ҳлӮҳ |\r\n| `authorUid` | string | мһ‘м„ұмһҗ |\r\n| `isAnonymous` | boolean | мқөлӘ… м—¬л¶Җ |\r\n| `isPinned` / `pinnedAt` | boolean / timestamp | кіөм§Җ кі м • (мөңлҢҖ 3к°ң) |\r\n| `likes` / `dislikes` | map<uid,bool> | нҶ кёҖмҡ© |\r\n| `likeCount` / `dislikeCount` | int | м •л ¬мҡ© л№„м •к·ңнҷ” |\r\n| `bookmarkedBy` | array<string> | л¶Ғл§ҲнҒ¬ мӮ¬мҡ©мһҗ |\r\n| `pollOptions` | array<string> | нҲ¬н‘ң м„ нғқм§Җ (мөңлҢҖ 6) |\r\n| `pollVoters` | map<uid,int> | мӮ¬мҡ©мһҗлі„ м„ нғқ мқёлҚұмҠӨ |\r\n| `searchTokens` | array<string> | 2-gram кІҖмғү нҶ нҒ° (вүӨ200) |\r\n| `anonymousMapping` / `anonymousCount` | map / int | мқөлӘ… лІҲнҳём ң |\r\n| `commentCount` | int | лҢ“кёҖ мҲҳ л№„м •к·ңнҷ” |\r\n| `imageUrls` | array<string> | мІЁл¶Җ мқҙлҜём§Җ |\r\n| `createdAt` / `updatedAt` | timestamp | вҖ” |\r\n\r\n**ліҙм•Ҳ к·ңм№ҷ мҡ”м•Ҫ**:\r\n- `read`: лӘЁл‘җ н—Ҳмҡ©\r\n- `create`: мқёмҰқ + `authorUid == auth.uid` + м ңлӘ©/ліёл¬ё кёёмқҙ кІҖмҰқ\r\n- `update`: мһ‘м„ұмһҗ мһҗмң  мҲҳм • OR л№„мһ‘м„ұмһҗлҠ” `isInteractionUpdate()` н•„л“ңл§Ң (`likes`, `dislikes`, `likeCount`, `dislikeCount`, `pollVoters`, `commentCount`, `anonymousMapping`, `anonymousCount`, `bookmarkedBy`) + `validCounterDelta(Вұ1)`\r\n- `delete`: мһ‘м„ұмһҗ лҳҗлҠ” manager/admin (к°җмӮ¬ лЎңк·ё кё°лЎқ)\r\n\r\n**м„ңлёҢм»¬л үм…ҳ**:\r\n- `posts/{postId}/comments/{commentId}` вҖ” лҢ“кёҖ/лҢҖлҢ“кёҖ\r\n\r\n### `chats/{chatId}`, `chats/{chatId}/messages/{messageId}`\r\n\r\n| н•„л“ң | нғҖмһ… | м„ӨлӘ… |\r\n|---|---|---|\r\n| `participants` | array<string> | м°ём—¬мһҗ uid (2лӘ…) |\r\n| `participantNames` | map<uid,string> | мәҗмӢңлҗң мқҙлҰ„ |\r\n| `lastMessage` | string | лӘ©лЎқ лҜёлҰ¬ліҙкё° |\r\n| `lastMessageAt` | timestamp | м •л ¬мҡ© |\r\n| `unreadCount` | map<uid,int> | мӮ¬мҡ©мһҗлі„ м•Ҳ мқҪмқҖ мҲҳ |\r\n\r\nл©”мӢңм§Җ:\r\n- `senderUid`, `content`, `createdAt`, `deleted: boolean`, `deletedFor: array<uid>`\r\n\r\n**ліҙм•Ҳ к·ңм№ҷ мҡ”м•Ҫ**: м°ём—¬мһҗл§Ң read/write. л©”мӢңм§Җ updateлҠ” мӮӯм ң кё°лҠҘ(`deleted`, `deletedFor` н•„л“ңл§Ң) н—Ҳмҡ©.\r\n\r\n### `reports/{reportId}`\r\n\r\n- н•„л“ң: `postId`, `reporterUid`, `reason`, `createdAt`, `status`\r\n- `read`: кҙҖлҰ¬мһҗ м „мҡ©\r\n- `create`: мқёмҰқ мӮ¬мҡ©мһҗ (лҸҷмқј `(postId, reporterUid)` мӨ‘ліө л°©м§Җ мқёлҚұмҠӨ)\r\n\r\n### `admin_logs/{logId}`\r\n\r\n- кҙҖлҰ¬ н–үмң„ к°җмӮ¬ лЎңк·ё: `action`, `actorUid`, `targetUid` / `targetPostId`, `createdAt`, `detail`\r\n- `read/write`: кҙҖлҰ¬мһҗ м „мҡ©\r\n\r\n### `function_logs/{logId}`\r\n\r\n- Cloud Functions мҳӨлҘҳ кё°лЎқ (`function`, `error`, `code`, `stack`, `createdAt`)\r\n- `write`: Functionsл§Ң (admin SDK), `read`: кҙҖлҰ¬мһҗ\r\n\r\n### `app_config/{key}`\r\n\r\n- `version`: мөңмҶҢ/мөңмӢ  м•ұ лІ„м „\r\n- `announcement`: кёҙкёү нҢқм—… кіөм§Җ м„Өм •\r\n- `read`: лӘЁл‘җ, `write`: кҙҖлҰ¬мһҗ\r\n\r\n## мқёлҚұмҠӨ\r\n\r\n`firestore.indexes.json`мқҳ ліөн•© мқёлҚұмҠӨ мҙқ 9к°ң:\r\n\r\n| м»¬л үм…ҳ | н•„л“ң | мҡ©лҸ„ |\r\n|---|---|---|\r\n| `posts` | `category ASC, createdAt DESC` | м№ҙн…Ңкі лҰ¬лі„ мөңмӢ  кёҖ |\r\n| `posts` | `authorUid ASC, createdAt DESC` | лӮҙ кёҖ лӘ©лЎқ |\r\n| `posts` | `bookmarkedBy CONTAINS, createdAt DESC` | л¶Ғл§ҲнҒ¬ кёҖ лӘ©лЎқ |\r\n| `posts` | `isPinned ASC, pinnedAt DESC` | кіөм§Җ м •л ¬ |\r\n| `posts` | `likeCount DESC, createdAt DESC` | **мқёкё°кёҖ м •л ¬** (ADR-04) |\r\n| `chats` | `participants CONTAINS, lastMessageAt DESC` | мұ„нҢ… лӘ©лЎқ |\r\n| `admin_logs` | `action ASC, createdAt DESC` | кҙҖлҰ¬ лЎңк·ё н•„н„° |\r\n| `reports` | `postId ASC, reporterUid ASC` | мӨ‘ліө мӢ кі  л°©м§Җ |\r\n| `reports` | `reporterUid ASC, createdAt ASC` | лӮҙ мӢ кі  нһҲмҠӨнҶ лҰ¬ |\r\n\r\n## лЎңм»¬ м ҖмһҘмҶҢ\r\n\r\n### sqflite (`lib/data/local_database.dart`)\r\n- `schedules`: `id`, `title`, `startDate`, `endDate`, `color`, `repeatRule`\r\n- `ddays`: `id`, `title`, `targetDate`, `pinned`\r\n\r\n### SecureStorage\r\n- нӮӨ: `exams_json`, `goals_json`, `jeongsi_goals_json`\r\n- к°’: JSON м§Ғл ¬нҷ”лҗң м„ұм Ғ/лӘ©н‘ң\r\n- л§Ҳмқҙк·ёл Ҳмқҙм…ҳ лЎңк·ё: `sp_to_secure_migrated: \"1\"`\r\n\r\n### SharedPreferences\r\n- `theme_mode`, `notification_time_breakfast`, `search_history`, `timetable_cache_{YYYYMMDD}` л“ұ\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [ліҙм•Ҳ лӘЁлҚё](./security.md) вҖ” rules н—¬нҚј н•ЁмҲҳ мғҒм„ё\r\n- [ADR-04](./architecture-decisions.md#adr-04-мўӢм•„мҡ”-м№ҙмҡҙн„°) вҖ” м№ҙмҡҙн„° мҠӨнӮӨл§Ҳ м„Өкі„ к·јкұ°\r\n","guides/data-model_en.md":"# Data Model\r\n\r\n> н•ңкөӯм–ҙ: [data-model.md](./data-model.md)\r\n\r\nFirestore collection layout, field schema, indexes, and security-rule relationships in one place.\r\n\r\n## ERD\r\n\r\n```mermaid\r\nerDiagram\r\n    users ||--o{ posts : \"authors\"\r\n    users ||--o{ notifications : \"receives\"\r\n    users ||--o{ subjects : \"electives\"\r\n    posts ||--o{ comments : \"contains\"\r\n    posts ||--o{ reports : \"reported by\"\r\n    chats ||--o{ messages : \"contains\"\r\n    users }o--o{ chats : \"participates\"\r\n\r\n    users {\r\n        string uid PK\r\n        string name\r\n        string studentId\r\n        string role\r\n        string userType\r\n        boolean approved\r\n        timestamp suspendedUntil\r\n        string profilePhotoUrl\r\n        string fcmToken\r\n        boolean notiComment\r\n        boolean notiChat\r\n    }\r\n\r\n    posts {\r\n        string id PK\r\n        string title\r\n        string content\r\n        string category\r\n        string authorUid FK\r\n        boolean isAnonymous\r\n        boolean isPinned\r\n        int likes\r\n        int dislikes\r\n        array bookmarkedBy\r\n        array pollOptions\r\n        map pollVotes\r\n    }\r\n\r\n    comments {\r\n        string id PK\r\n        string authorUid FK\r\n        string content\r\n        boolean isAnonymous\r\n        string parentId\r\n        timestamp createdAt\r\n    }\r\n\r\n    chats {\r\n        string id PK\r\n        array participants\r\n        map participantNames\r\n        string lastMessage\r\n        map unreadCount\r\n    }\r\n\r\n    messages {\r\n        string id PK\r\n        string senderUid FK\r\n        string content\r\n        boolean deleted\r\n        array deletedFor\r\n    }\r\n```\r\n\r\n## Collections\r\n\r\n### `users/{uid}`\r\n\r\n| Field | Type | Notes |\r\n|---|---|---|\r\n| `uid` | string (doc id) | Firebase Auth UID, or `kakao:{id}` for Kakao users |\r\n| `name` | string | real name |\r\n| `studentId` | string | student number (current students) |\r\n| `userType` | string | `student` / `graduate` / `teacher` / `parent` |\r\n| `role` | string | `user` / `moderator` / `auditor` / `manager` / `admin` |\r\n| `approved` | boolean | admin-approved flag |\r\n| `verificationStatus` | string | `pending` / `verified` (school email OTP). Missing field is grandfathered to `verified` |\r\n| `schoolEmail` | string | verified school email (set on success) |\r\n| `verifiedAt` | timestamp | verification completion time |\r\n| `verifiedVia` | string | verification path (`otp`) |\r\n| `suspendedUntil` | timestamp \\| null | expiry; scheduler clears hourly |\r\n| `suspendReason` | string \\| null | reason for suspension (banner display) |\r\n| `blockedUsers` | string[] | uids the user has blocked |\r\n| `lastProfileUpdate` | string | `\"YYYY\"` вҖ” tracks new-term grade/class/number refresh |\r\n| `graduationYear` | int \\| null | graduates only |\r\n| `teacherSubject` | string \\| null | teachers only |\r\n| `loginProvider` | string | `google` / `apple` / `kakao` / `github` |\r\n| `profilePhotoUrl` | string | Cloud Storage or OAuth profile |\r\n| `fcmToken` | string | FCM push target |\r\n| `notiComment` / `notiReply` / `notiChat` / `notiNewPost` / `notiAccount` | boolean | per-category toggles |\r\n| `createdAt` / `updatedAt` | timestamp | audit |\r\n\r\n**Rules summary** (`firestore.rules`):\r\n- `read`: self or manager/admin\r\n- `update`: self (but `role`, `suspendedUntil`, `approved` immutable) or manager/admin\r\n- `delete`: self or admin\r\n\r\n**Subcollections**:\r\n- `users/{uid}/subjects/{doc}` вҖ” electives (self-only read/write)\r\n- `users/{uid}/sync/{doc}` вҖ” sync metadata (self-only)\r\n- `users/{uid}/notifications/{notifId}` вҖ” in-app notifications (self reads/updates/deletes; anyone may create вҖ” allows admin alerts)\r\n\r\n### `posts/{postId}`\r\n\r\n| Field | Type | Notes |\r\n|---|---|---|\r\n| `title` | string (1вҖ“200) | post title |\r\n| `content` | string (вүӨ5000) | body |\r\n| `category` | string | one of 6 categories |\r\n| `authorUid` | string | author |\r\n| `isAnonymous` | boolean | anonymous flag |\r\n| `isPinned` / `pinnedAt` | boolean / timestamp | announcement pin (max 3) |\r\n| `likes` / `dislikes` | map<uid,bool> | toggle map |\r\n| `likeCount` / `dislikeCount` | int | denormalized for sorting |\r\n| `bookmarkedBy` | array<string> | bookmarking users |\r\n| `pollOptions` | array<string> | poll choices (max 6) |\r\n| `pollVoters` | map<uid,int> | per-user choice index |\r\n| `searchTokens` | array<string> | 2-gram tokens (вүӨ200) |\r\n| `anonymousMapping` / `anonymousCount` | map / int | anonymous numbering |\r\n| `commentCount` | int | denormalized |\r\n| `imageUrls` | array<string> | attached images |\r\n| `createdAt` / `updatedAt` | timestamp | вҖ” |\r\n\r\n**Rules summary**:\r\n- `read`: public\r\n- `create`: authed + `authorUid == auth.uid` + title 1вҖ“200 + content вүӨ5000\r\n- `update`: author free-form OR non-author limited to `isInteractionUpdate()` fields (`likes`, `dislikes`, `likeCount`, `dislikeCount`, `pollVoters`, `commentCount`, `anonymousMapping`, `anonymousCount`, `bookmarkedBy`) + `validCounterDelta(Вұ1)`\r\n- `delete`: author or manager/admin (audit-logged)\r\n\r\n**Subcollections**:\r\n- `posts/{postId}/comments/{commentId}` вҖ” comments & replies\r\n\r\n### `chats/{chatId}`, `chats/{chatId}/messages/{messageId}`\r\n\r\n| Field | Type | Notes |\r\n|---|---|---|\r\n| `participants` | array<string> | participant UIDs (length 2) |\r\n| `participantNames` | map<uid,string> | cached names |\r\n| `lastMessage` | string | list preview |\r\n| `lastMessageAt` | timestamp | sort key |\r\n| `unreadCount` | map<uid,int> | per-user unread count |\r\n\r\nMessages:\r\n- `senderUid`, `content`, `createdAt`, `deleted: boolean`, `deletedFor: array<uid>`\r\n\r\n**Rules**: participants-only read/write. Message `update` is allowed only for delete-related fields (`deleted`, `deletedFor`).\r\n\r\n### `reports/{reportId}`\r\n\r\n- Fields: `postId`, `reporterUid`, `reason`, `createdAt`, `status`\r\n- `read`: admin-only\r\n- `create`: authed users; duplicate `(postId, reporterUid)` blocked via composite index\r\n\r\n### `admin_logs/{logId}`\r\n\r\n- Audit log: `action`, `actorUid`, `targetUid` / `targetPostId`, `createdAt`, `detail`\r\n- `read`/`write`: admin-only\r\n\r\n### `function_logs/{logId}`\r\n\r\n- Cloud Function errors (`function`, `error`, `code`, `stack`, `createdAt`)\r\n- `write`: functions only (admin SDK), `read`: admin\r\n\r\n### `app_config/{key}`\r\n\r\n- `version`: min/latest app version\r\n- `announcement`: urgent popup config\r\n- `read`: public, `write`: admin\r\n\r\n## Indexes\r\n\r\n9 composite indexes in `firestore.indexes.json`:\r\n\r\n| Collection | Fields | Purpose |\r\n|---|---|---|\r\n| `posts` | `category ASC, createdAt DESC` | per-category feed |\r\n| `posts` | `authorUid ASC, createdAt DESC` | my posts |\r\n| `posts` | `bookmarkedBy CONTAINS, createdAt DESC` | bookmarked posts |\r\n| `posts` | `isPinned ASC, pinnedAt DESC` | pinned order |\r\n| `posts` | `likeCount DESC, createdAt DESC` | **Popular tab** (ADR-04) |\r\n| `chats` | `participants CONTAINS, lastMessageAt DESC` | chat list |\r\n| `admin_logs` | `action ASC, createdAt DESC` | action filter |\r\n| `reports` | `postId ASC, reporterUid ASC` | dedupe reports |\r\n| `reports` | `reporterUid ASC, createdAt ASC` | my reports |\r\n\r\n## Local Stores\r\n\r\n### sqflite (`lib/data/local_database.dart`)\r\n- `schedules`: `id`, `title`, `startDate`, `endDate`, `color`, `repeatRule`\r\n- `ddays`: `id`, `title`, `targetDate`, `pinned`\r\n\r\n### SecureStorage\r\n- Keys: `exams_json`, `goals_json`, `jeongsi_goals_json`\r\n- Values: JSON-serialized grades/targets\r\n- Migration marker: `sp_to_secure_migrated: \"1\"`\r\n\r\n### SharedPreferences\r\n- `theme_mode`, `notification_time_breakfast`, `search_history`, `timetable_cache_{YYYYMMDD}`, etc.\r\n\r\n## See Also\r\n- [Security Model](./security_en.md) вҖ” rules helpers in detail\r\n- [ADR-04](./architecture-decisions_en.md#adr-04-like-counter-mapuidbool--denormalized-int) вҖ” counter schema rationale\r\n","guides/product-overview.md":"# м ңн’Ҳ к°ңмҡ”\r\n\r\n> English: [product-overview_en.md](./product-overview_en.md)\r\n\r\n## н•ң мӨ„ мҶҢк°ң\r\n\r\n**м„ёмў…мӢң н•ңмҶ”кі л“ұн•ҷкөҗ н•ҷмғқВ·көҗмӮ¬В·мЎём—…мғқВ·н•ҷл¶ҖлӘЁлҘј мң„н•ң нҶөн•© н•ҷкөҗ н”Ңлһ«нҸј.** Flutter кё°л°ҳ лӘЁл°”мқј м•ұ + Next.js кҙҖлҰ¬мһҗ лҢҖмӢңліҙл“ңлЎң кө¬м„ұлҗҳл©°, NEIS кіөкіөлҚ°мқҙн„° API м—°лҸҷ, Firebase мӢӨмӢңк°„ лҚ°мқҙн„°лІ мқҙмҠӨ, м—ӯн•  кё°л°ҳ к¶Ңн•ң мӢңмҠӨн…ң, н‘ёмӢң м•ҢлҰј, 1:1 мұ„нҢ… л“ұ мӢӨм„ңл№„мҠӨ мҲҳмӨҖмқҳ кё°лҠҘмқ„ кө¬нҳ„н–ҲлӢӨ.\r\n\r\n## мҷң л§Ңл“Өм—ҲлҠ”к°Җ\r\n\r\nн•ҷкөҗ кіөм§Җ, кёүмӢқ, мӢңк°„н‘ң, н•ҷмӮ¬мқјм •мқҖ к°Ғкё° лӢӨлҘё мӣ№мӮ¬мқҙнҠё/м•ҢлҰј мұ„л„җм—җ нқ©м–ҙм ё мһҲлӢӨ. мқҙ м•ұмқҖ к·ёкІғмқ„ **н•ҳлӮҳмқҳ мӮ¬мҡ©мһҗ л§ҘлқҪ м•Ҳм—җм„ң** мЎ°нҡҢн•ҳкі , н•ҷмғқ м»Өл®ӨлӢҲнӢ°(кІҢмӢңнҢҗ/мұ„нҢ…) кё°лҠҘк№Ңм§Җ нҸ¬н•Ён•ҙ н•ҷлӮҙ мҶҢнҶөмқ„ нҶөн•©н•ңлӢӨ.\r\n\r\nлҳҗн•ң **м„ұм Ғ кҙҖлҰ¬**лҠ” мІ м ҖнһҲ лЎңм»¬м—җл§Ң м ҖмһҘн•ҙ н•ҷмғқ н”„лқјмқҙлІ„мӢңлҘј ліҙнҳён•ҳл©ҙм„ң, м¶”мқҙ к·ёлһҳн”„мҷҖ лӘ©н‘ң л“ұкёү кҙҖлҰ¬лҘј м ңкіөн•ңлӢӨ.\r\n\r\n## лҢҖмғҒ мӮ¬мҡ©мһҗ\r\n\r\n| мӮ¬мҡ©мһҗ | м ңкіө к°Җм№ҳ |\r\n|---|---|\r\n| **мһ¬н•ҷмғқ** | кёүмӢқ/мӢңк°„н‘ң/н•ҷмӮ¬мқјм •/кІҢмӢңнҢҗ/мұ„нҢ…/м„ұм Ғ/к°ңмқёмқјм •/нҷҲ мң„м Ҝ |\r\n| **көҗмӮ¬** | көҗмӮ¬ м „мҡ© мӢңк°„н‘ң, кіөм§Җ мһ‘м„ұ, мҠ№мқё/лӘЁлҚ”л Ҳмқҙм…ҳ |\r\n| **мЎём—…мғқ** | лЎңк·ёмқё + м»Өл®ӨлӢҲнӢ° м ‘к·ј (м„ұм Ғ/мӢңк°„н‘ң м ңн•ң) |\r\n| **н•ҷл¶ҖлӘЁ** | н•ҷмӮ¬мқјм • / кіөм§Җ / кёҙкёү нҢқм—… кө¬лҸ… |\r\n| **кҙҖлҰ¬мһҗ (moderator/auditor/manager/admin)** | Flutter Admin нҷ”л©ҙ + Next.js Admin Web (4лӢЁкі„ к¶Ңн•ң л¶„лҰ¬) |\r\n\r\n## н•өмӢ¬ к°Җм№ҳ\r\n\r\n- **н•ҳлӮҳмқҳ м•ұм—җм„ң н•ҷкөҗ мғқнҷң м „л°ҳ** вҖ” кёүмӢқ, мӢңк°„н‘ң, мқјм •, м»Өл®ӨлӢҲнӢ°, м„ұм Ғ\r\n- **н•ҷмғқ н”„лқјмқҙлІ„мӢң мҡ°м„ ** вҖ” м„ұм ҒмқҖ лЎңм»¬ м „мҡ©, OAuth м „мҡ© мқёмҰқ\r\n- **мӢӨмӢңк°„м„ұ** вҖ” Firestore onSnapshot + FCM н‘ёмӢң\r\n- **мҳӨн”„лқјмқё м№ңнҷ”** вҖ” кёүмӢқ/мӢңк°„н‘ң мәҗмӢң, мҳӨн”„лқјмқё л°°л„Ҳ, sqflite к°ңмқё мқјм •\r\n- **м Җл№„мҡ© мҡҙмҳҒ** вҖ” 1,000лӘ… кё°мӨҖ $0~3/мӣ” (л¬ҙлЈҢ н•ңлҸ„ лӮҙ)\r\n\r\n## лІ”мң„ кІҪкі„ (лӘ…мӢңм ҒмңјлЎң н•ҳм§Җ м•ҠлҠ” кІғ)\r\n\r\n- **м„ұм ҒмқҖ м„ңлІ„ м ҖмһҘ/л°ұм—… м—ҶмқҢ** вҖ” кё°кё° ліҖкІҪ мӢң мқҙкҙҖ м•Ҳ лҗЁ (мқҳлҸ„)\r\n- **көҗл¬ҙ мӢңмҠӨн…ң м—°лҸҷ м—ҶмқҢ** вҖ” NEIS кіөкіө APIл§Ң мӮ¬мҡ©\r\n- **мӣ№ лІ„м „ м—ҶмқҢ** вҖ” кҙҖлҰ¬мһҗ лҢҖмӢңліҙл“ңл§Ң мӣ№. мқјл°ҳ мӮ¬мҡ©мһҗлҠ” м•ұ м „мҡ©\r\n- **кІ°м ң/мң лЈҢ кё°лҠҘ м—ҶмқҢ**\r\n\r\n## к·ңлӘЁ м§Җн‘ң\r\n\r\n| н•ӯлӘ© | мҲҳм№ҳ |\r\n|---|---|\r\n| мҙқ мҪ”л“ң лқјмқё | м•Ҫ 43,000 (Dart 36,031 + TS/TSX + Java/XML + Swift + JS) |\r\n| мҶҢмҠӨ нҢҢмқј | 139 (Flutter) + 30 (Admin Web TS/TSX) + Android/iOS мң„м Ҝ |\r\n| Cloud Functions | 24к°ң |\r\n| OAuth лЎңк·ёмқё | 4мў… (Google / Apple / Kakao / GitHub) |\r\n| н‘ёмӢң м•ҢлҰј | FCM 4мў… (`account` / `comment` / `new_post` / `chat`) + лЎңм»¬ 3мў… (мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ) |\r\n| к¶Ңн•ң лӘЁлҚё | 4лӢЁкі„ (`moderator` / `auditor` / `manager` / `admin`) + Firebase Auth custom claims |\r\n| PIPA м»ҙн”Ңлқјмқҙм–ёмҠӨ | `appeals` (90мқј TTL) / `data_requests` (30мқј TTL) / `community_rules` |\r\n| н…ҢмҠӨнҠё | 563 Flutter + 85 Rules = 648к°ң |\r\n\r\n## кё°мҲ  мҠӨнғқ мҡ”м•Ҫ\r\n\r\n| л¶„лҘҳ | кё°мҲ  |\r\n|---|---|\r\n| Mobile | Flutter (Dart) вҖ” Android / iOS |\r\n| State | Riverpod 2.5 |\r\n| DI | GetIt + Abstract Repository |\r\n| Admin Web | Next.js 14 + TypeScript + Tailwind |\r\n| Backend | Firebase (Auth / Firestore / Storage / FCM / Crashlytics) |\r\n| Server | Cloud Functions (Node.js) |\r\n| External | NEIS кіөкіөлҚ°мқҙн„° API |\r\n\r\nмғҒм„ёлҠ” [architecture-overview.md](./architecture-overview.md).\r\n\r\n## мЈјмҡ” н”ҢлЎңмҡ° мҡ”м•Ҫ\r\n\r\n1. **OAuth лЎңк·ёмқё вҶ’ мӢ л¶„ м„ нғқ вҶ’ кҙҖлҰ¬мһҗ мҠ№мқё вҶ’ нҷҲ м§„мһ…** ([account-and-access.md](./account-and-access.md))\r\n2. **нҷҲм—җм„ң кёүмӢқ/мӢңк°„н‘ң/мқјм • мЎ°нҡҢ** ([public-features.md](../features/public-features.md))\r\n3. **кІҢмӢңнҢҗ/мұ„нҢ…мңјлЎң мҶҢнҶө** ([community-features.md](../features/community-features.md))\r\n4. **м„ұм Ғ/к°ңмқёмқјм •мқҖ лЎңм»¬ кҙҖлҰ¬** ([personal-features.md](../features/personal-features.md))\r\n5. **кҙҖлҰ¬мһҗлҠ” Admin Webм—җм„ң мӮ¬мҡ©мһҗ/мҪҳн…җмё  кҙҖлҰ¬** ([admin-features.md](../features/admin-features.md))\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [м•„нӮӨн…ҚмІҳ к°ңмҡ”](./architecture-overview.md)\r\n- [м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ](./architecture-decisions.md)\r\n- [кё°м—¬ к°Җмқҙл“ң](../CONTRIBUTING.md)\r\n- [л°°нҸ¬ к°Җмқҙл“ң](../DEPLOY.md)\r\n- [м—”л“ңмң м Җ к°Җмқҙл“ң](../USER_GUIDE.md)\r\n","guides/product-overview_en.md":"# Product Overview\r\n\r\n> н•ңкөӯм–ҙ: [product-overview.md](./product-overview.md)\r\n\r\n## One-Liner\r\n\r\n**An integrated school platform for students, teachers, alumni, and parents of Hansol High School (Sejong, Korea).** Built on a Flutter mobile app + Next.js admin dashboard with NEIS public-data API integration, Firebase realtime database, role-based access control, push notifications, and 1:1 chat вҖ” at production-service quality.\r\n\r\n## Why This Exists\r\n\r\nSchool announcements, meals, timetables, and academic calendars are scattered across different websites and notification channels. This app unifies them **in one user context**, and adds a student community layer (board / chat) to consolidate school communication.\r\n\r\n**Grade management** stays strictly local to protect student privacy, while still offering trend charts and per-subject goal management.\r\n\r\n## Audience\r\n\r\n| Audience | Value |\r\n|---|---|\r\n| **Students** | Meals / timetable / academic calendar / board / chat / grades / personal schedule / home widget |\r\n| **Teachers** | Teacher-view timetable, announcements, approvals/moderation |\r\n| **Alumni** | Login + community access (grade/timetable limited) |\r\n| **Parents** | Academic calendar / announcements / urgent popup subscription |\r\n| **Admins (moderator/auditor/manager/admin)** | Flutter Admin screen + Next.js Admin Web (4-tier role separation) |\r\n\r\n## Core Value Props\r\n\r\n- **Everything school-related in one app** вҖ” meals, timetable, schedule, community, grades\r\n- **Student privacy first** вҖ” grades stored locally only, OAuth-only auth\r\n- **Realtime** вҖ” Firestore onSnapshot + FCM push\r\n- **Offline-friendly** вҖ” meal/timetable cache, offline banner, sqflite personal schedule\r\n- **Low-cost ops** вҖ” $0вҖ“3 / month at ~1,000 users (free tier)\r\n\r\n## Scope Boundaries (Explicit Non-Goals)\r\n\r\n- **Grades are not backed up or synced** вҖ” device change loses data (intentional)\r\n- **No school-internal system integration** вҖ” only NEIS public API\r\n- **No web version** вҖ” Admin dashboard is web, end users are app-only\r\n- **No payments / paid features**\r\n\r\n## Scale Numbers\r\n\r\n| Item | Value |\r\n|---|---|\r\n| Total LOC | ~43,000 (Dart 36,031 + TS/TSX + Java/XML + Swift + JS) |\r\n| Source files | 139 (Flutter) + 30 (Admin Web TS/TSX) + Android/iOS widgets |\r\n| Cloud Functions | 24 |\r\n| OAuth providers | 4 (Google / Apple / Kakao / GitHub) |\r\n| Push types | 4 FCM (`account` / `comment` / `new_post` / `chat`) + 3 local (breakfast/lunch/dinner) |\r\n| Role model | 4 tiers (`moderator` / `auditor` / `manager` / `admin`) + Firebase Auth custom claims |\r\n| PIPA compliance | `appeals` (90-day TTL) / `data_requests` (30-day TTL) / `community_rules` |\r\n| Tests | 563 Flutter + 85 Rules = 648 |\r\n\r\n## Tech Stack Summary\r\n\r\n| Category | Tech |\r\n|---|---|\r\n| Mobile | Flutter (Dart) вҖ” Android / iOS |\r\n| State | Riverpod 2.5 |\r\n| DI | GetIt + abstract repository |\r\n| Admin Web | Next.js 14 + TypeScript + Tailwind |\r\n| Backend | Firebase (Auth / Firestore / Storage / FCM / Crashlytics) |\r\n| Server | Cloud Functions (Node.js) |\r\n| External | NEIS public-data API |\r\n\r\nDetails вҶ’ [architecture-overview_en.md](./architecture-overview_en.md).\r\n\r\n## Main Flows\r\n\r\n1. **OAuth login вҶ’ identity вҶ’ admin approval вҶ’ home** ([account-and-access_en.md](./account-and-access_en.md))\r\n2. **Home shows meal / timetable / schedule** ([public-features_en.md](../features/public-features_en.md))\r\n3. **Board / chat for community** ([community-features_en.md](../features/community-features_en.md))\r\n4. **Grades / personal schedule managed locally** ([personal-features_en.md](../features/personal-features_en.md))\r\n5. **Admins manage users / content on Admin Web** ([admin-features_en.md](../features/admin-features_en.md))\r\n\r\n## See Also\r\n- [Architecture Overview](./architecture-overview_en.md)\r\n- [Architecture Decisions](./architecture-decisions_en.md)\r\n- [Contributing Guide](../CONTRIBUTING_en.md)\r\n- [Deployment Guide](../DEPLOY_en.md)\r\n- [User Guide](../USER_GUIDE_en.md)\r\n","guides/screenshots-gallery.md":"# мҠӨнҒ¬лҰ°мғ· к°Өлҹ¬лҰ¬\r\n\r\n> English: [screenshots-gallery_en.md](./screenshots-gallery_en.md)\r\n\r\nREADMEм—җ кІҢмһ¬лҗң н•өмӢ¬ мҠӨнҒ¬лҰ°мғ·мқҳ нҷ•мһҘ к°Өлҹ¬лҰ¬мһ…лӢҲлӢӨ. кё°лҠҘлі„лЎң л¬¶м–ҙ нқҗлҰ„мқ„ л”°лқјк°Ҳ мҲҳ мһҲлҸ„лЎқ кө¬м„ұн–ҲмҠөлӢҲлӢӨ.\r\n\r\n## мҳЁліҙл”© & лЎңк·ёмқё\r\n\r\n| мҳЁліҙл”© | лЎңк·ёмқё |\r\n|:--:|:--:|\r\n| ![мҳЁліҙл”©](../../screenshots/onboarding.png) | ![лЎңк·ёмқё](../../screenshots/login.png) |\r\n\r\n## нҷҲ\r\n\r\n| нҷҲ (лӢӨнҒ¬) | нҷҲ (лқјмқҙнҠё) |\r\n|:--:|:--:|\r\n| ![нҷҲ](../../screenshots/home.png) | ![нҷҲ лқјмқҙнҠё](../../screenshots/home_light.png) |\r\n\r\n## кёүмӢқ / мқјм • / мӢңк°„н‘ң\r\n\r\n| кёүмӢқ | мқјм • | мқјм • л§Ңл“Өкё° | мӢңк°„н‘ң |\r\n|:--:|:--:|:--:|:--:|\r\n| ![кёүмӢқ](../../screenshots/meal.png) | ![мқјм •](../../screenshots/calendar.png) | ![мқјм •л§Ңл“Өкё°](../../screenshots/schedule_create.png) | ![мӢңк°„н‘ң](../../screenshots/timetable.png) |\r\n\r\n## кІҢмӢңнҢҗ\r\n\r\n| лӘ©лЎқ | кІҢмӢңкёҖ мғҒм„ё | кёҖм“°кё° |\r\n|:--:|:--:|:--:|\r\n| ![кІҢмӢңнҢҗ](../../screenshots/board.png) | ![мғҒм„ё](../../screenshots/post_detail.png) | ![кёҖм“°кё°](../../screenshots/write_post.png) |\r\n\r\n### кІҢмӢңнҢҗ кі кёү кё°лҠҘ\r\n\r\n| мқёкё°кёҖ (мўӢм•„мҡ”мҲң) | кІҖмғү (мөңк·ј кІҖмғүм–ҙ) | кІҖмғү кІ°кіј (n-gram) | мқҙлҜём§Җ л·°м–ҙ (PageView + Hero) |\r\n|:- | ![Onboarding](../../screenshots/onboarding.png) | ![Login](../../screenshots/login.png) |\r\n\r\n## Home\r\n\r\n| Home (dark) | Home (light) |\r\n|:--:|:--:|\r\n| ![Home](../../screenshots/home.png) | ![Home light](../../screenshots/home_light.png) |\r\n\r\n## Meals / Schedule / Timetable\r\n\r\n| Meal | Calendar | Create Event | Timetable |\r\n|:--:|:--:|:--:|:--:|\r\n| ![Meal](../../screenshots/meal.png) | ![Calendar](../../screenshots/calendar.png) | ![Create Event](../../screenshots/schedule_create.png) | ![Timetable](../../screenshots/timetable.png) |\r\n\r\n## Board\r\n\r\n| List | Post Detail | Write |\r\n|:--:|:--:|:--:|\r\n| ![Board](../../screenshots/board.png) | ![Detail](../../screenshots/post_detail.png) | ![Write](../../screenshots/write_post.png) |\r\n\r\n### Advanced Board Features\r\n\r\n| Popular (by likes) | Search (recent keywords) | Search Results (n-gram) | Image Viewer (PageView + Hero) |\r\n|:--:|:--:|:--:|:--:|\r\n| ![Popular](../../screenshots/board_popular.png) | ![Search](../../screenshots/board_search.png) | ![Results](../../screenshots/board_search_results.png) | ![Viewer](../../screenshots/post_image_viewer.gif) |\r\n\r\n## Chat\r\n\r\n| List | Room |\r\n|:--:|:--:|\r\n| ![Chat list](../../screenshots/chat_list.png) | ![Chat room](../../screenshots/chat_room.png) |\r\n\r\n## Settings / Profile\r\n\r\n| Settings | My Account | Notification Settings |\r\n|:--:|:--:|:--:|\r\n| ![Settings](../../screenshots/settings.png) | ![Profile](../../screenshots/profile.png) | ![Noti settings](../../screenshots/noti_settings.png) |\r\n\r\n## Admin (Flutter + Next.js)\r\n\r\n| Admin (Flutter) | Admin Web (light) | Admin Web (dark) |\r\n|:--:|:--:|:--:|\r\n| ![Admin](../../screenshots/admin.png) | ![Web](../../screenshots/admin_web.png) | ![Web dark](../../screenshots/admin_web_dark.png) |\r\n\r\n## Home Widgets\r\n\r\n| Widget (light) | Widget (dark) |\r\n|:--:|:--:|\r\n| ![Widget light](../../screenshots/widget_white.png) | ![Widget dark](../../screenshots/widget_black.png) |\r\n\r\n## Grade Management\r\n\r\n| Susi (mid-term) | Jeongsi (standardized) |\r\n|:--:|:--:|\r\n| ![Susi](../../screenshots/susi.png) | ![Jeongsi](../../screenshots/jeongsi.png) |\r\n\r\n## Source Location\r\n\r\nAll screenshot originals live under `/screenshots`.\r\n\r\n## See Also\r\n- [Public Features](../features/public-features_en.md)\r\n- [Community Features](../features/community-features_en.md)\r\n- [Personal Features](../features/personal-features_en.md)\r\n- [Admin Features](../features/admin-features_en.md)\r\n","guides/security.md":"# ліҙм•Ҳ лӘЁлҚё\r\n\r\n> English: [security_en.md](./security_en.md)\r\n\r\nFirestore ліҙм•Ҳ к·ңм№ҷ, м—ӯн•  кё°л°ҳ м ‘к·ј м ңм–ҙ, к°ңмқём •ліҙ ліҙнҳё мһҘм№ҳлҘј н•ң кіім—җ м •лҰ¬н•©лӢҲлӢӨ. мӢӨм ң к·ңм№ҷ нҢҢмқјмқҖ `firestore.rules`, н…ҢмҠӨнҠёлҠ” `tests/firestore-rules/`мһ…лӢҲлӢӨ.\r\n\r\n## н•өмӢ¬ мӣҗм№ҷ\r\n\r\n1. **Firestore Rulesк°Җ лӢЁмқј м§„мӢӨ мҶҢмҠӨ** вҖ” м•ұкіј Admin Webмқҙ к°ҷмқҖ к·ңм№ҷ н•ҳм—җм„ң лҸҷмһ‘\r\n2. **м—ӯн• мқҖ м„ңлІ„м—җл§Ң м ҖмһҘ** вҖ” `users/{uid}.role`. нҒҙлқјмқҙм–ёнҠёлҠ” м°ёмЎ°л§Ң, ліҖкІҪ л¶Ҳк°Җ\r\n3. **н•„л“ң лӢЁмң„ кІҖмҰқ** вҖ” мһ‘м„ұмһҗ мҷё мӮ¬мҡ©мһҗлҸ„ мқён„°лһҷм…ҳ н•„л“ңл§Ң мҲҳм • к°ҖлҠҘ\r\n4. **лҜјк°җ лҚ°мқҙн„°лҠ” м„ңлІ„м—җ м ҖмһҘн•ҳм§Җ м•ҠмқҢ** вҖ” м„ұм ҒмқҖ OS нӮӨмІҙмқём—җл§Ң\r\n\r\n## Helper н•ЁмҲҳ (firestore.rules)\r\n\r\n```\r\nfunction isSignedIn() { return request.auth != null; }\r\n\r\nfunction isAdmin() {\r\n  return isSignedIn() &&\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role == 'admin';\r\n}\r\n\r\nfunction isAdminOrManager() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager']\r\n  );\r\n}\r\n\r\nfunction isModerator() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager', 'moderator']\r\n  );\r\n}\r\n\r\nfunction isAuditor() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager', 'auditor']\r\n  );\r\n}\r\n\r\nfunction isStaff() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager', 'moderator', 'auditor']\r\n  );\r\n}\r\n\r\nfunction isVerified() {\r\n  return isSignedIn() &&\r\n    get(/databases/$(db)/documents/users/$(auth.uid))\r\n      .data.get('verificationStatus', 'verified') == 'verified';\r\n}\r\n\r\nfunction isNotSuspended() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.get('suspendedUntil', null) == null ||\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.suspendedUntil < request.time\r\n  );\r\n}\r\n\r\nfunction canWrite() { return isVerified() && isNotSuspended(); }\r\n\r\nfunction changedKeys() {\r\n  return request.resource.data.diff(resource.data).affectedKeys();\r\n}\r\n\r\nfunction isInteractionUpdate() {\r\n  return changedKeys().hasOnly(\r\n    ['likes', 'dislikes', 'likeCount', 'dislikeCount',\r\n     'pollVoters', 'commentCount',\r\n     'anonymousMapping', 'anonymousCount', 'bookmarkedBy']\r\n  );\r\n}\r\n\r\nfunction validCounterDelta(field) {\r\n  return !(field in changedKeys()) || (\r\n    request.resource.data[field] is int &&\r\n    request.resource.data[field] >= 0 &&\r\n    request.resource.data[field] - resource.data.get(field, 0) >= -1 &&\r\n    request.resource.data[field] - resource.data.get(field, 0) <= 1\r\n  );\r\n}\r\n```\r\n\r\n## м»¬л үм…ҳлі„ к·ңм№ҷ мҡ”м•Ҫ\r\n\r\n### `users/{uid}`\r\n- **read**: ліёмқё лҳҗлҠ” manager/admin\r\n- **create**: мқёмҰқ мӮ¬мҡ©мһҗ\r\n- **update**: ліёмқёмқҖ `role`/`suspendedUntil`/`approved` л¶ҲліҖ мЎ°кұҙмңјлЎң, manager/adminмқҖ мһҗмң \r\n- **delete**: ліёмқё лҳҗлҠ” admin\r\n- **м„ңлёҢм»¬л үм…ҳ**: `subjects`, `sync` лҠ” ліёмқёл§Ң; `notifications`лҠ” ліёмқёл§Ң read/update/deleteн•ҳлҗҳ createлҠ” лҲ„кө¬лӮҳ (кҙҖлҰ¬мһҗ м•ҢлҰј л°ңмҶЎ н—Ҳмҡ©)\r\n\r\n### `posts/{postId}`\r\n- **read**: кіөк°ң\r\n- **create**: `authorUid == auth.uid` + м ңлӘ© 1~200мһҗ + ліёл¬ё вүӨ5000мһҗ\r\n- **update**: мһ‘м„ұмһҗ мһҗмң  OR л№„мһ‘м„ұмһҗлҠ” `isInteractionUpdate()` н•„л“ң + `validCounterDelta(Вұ1)`\r\n- **delete**: мһ‘м„ұмһҗ лҳҗлҠ” moderator мқҙмғҒ (`isModerator()`)\r\n\r\n### `posts/{postId}/comments/{commentId}`\r\n- **delete**: мһ‘м„ұмһҗ лҳҗлҠ” moderator мқҙмғҒ (`isModerator()`)\r\n\r\n### `chats/{chatId}` + л©”мӢңм§Җ\r\n- м°ём—¬мһҗ(`participants` л°°м—ҙ)л§Ң read/write\r\n- л©”мӢңм§Җ updateлҠ” мӮӯм ң н•„л“ң(`deleted`, `deletedFor`)л§Ң н—Ҳмҡ© вҖ” лӮҙмҡ© мң„ліҖмЎ° м°ЁлӢЁ\r\n\r\n### `reports`\r\n- **create**: мқёмҰқ мӮ¬мҡ©мһҗ\r\n- **read**: staff мқҙмғҒ (`isStaff()` вҖ” admin, manager, moderator, auditor)\r\n- **delete**: manager/admin (`isAdminOrManager()`)\r\n\r\n### `admin_logs`\r\n- **create**: moderator мқҙмғҒ (`isModerator()`)\r\n- **read**: staff мқҙмғҒ (`isStaff()`)\r\n\r\n### `app_stats`, `function_logs`, `crash_logs`\r\n- **read**: auditor мқҙмғҒ (`isAuditor()` вҖ” admin, manager, auditor)\r\n\r\n### `app_feedbacks`, `council_feedbacks`\r\n- **read**: auditor мқҙмғҒ (`isAuditor()`)\r\n- **update/delete**: manager/admin (`isAdminOrManager()`)\r\n\r\n### `app_config/{key}`\r\n- мқҪкё° кіөк°ң (лІ„м „ мІҙнҒ¬ / нҢқм—… кіөм§Җ), м“°кё° кҙҖлҰ¬мһҗ м „мҡ©\r\n\r\n### мқёмҰқ/м •м§Җ к°Җл“ң м Ғмҡ© м»¬л үм…ҳ\r\n- `posts` create, `comments` create, `reports` create, `chats/messages` createлҠ” `canWrite()` нҶөкіј н•„мҲҳ вҖ” м •м§Җ/лҜёмқёмҰқ мӮ¬мҡ©мһҗ м°ЁлӢЁ\r\n- кё°мЎҙ мӮ¬мҡ©мһҗ(`verificationStatus`/`suspendedUntil` н•„л“ң м—ҶмқҢ)лҠ” grandfathered мІҳлҰ¬лҗҳм–ҙ нҶөкіј\r\n\r\n### мӢ к·ң м»¬л үм…ҳ (PIPA лҢҖмқ‘)\r\n- `studentIds/{studentId}` вҖ” н•ҷлІҲ м җмң  мқёлҚұмҠӨ. read мқёмҰқ мӮ¬мҡ©мһҗ, write Cloud Functions м „мҡ©\r\n- `otp_codes/{uid}` вҖ” н•ҷкөҗ мқҙл©”мқј мқёмҰқ OTP. нҒҙлқјмқҙм–ёнҠё read/write м „л¶Җ кұ°л¶Җ\r\n- `banned_devices/{installationId}` вҖ” м •м§Җ нҡҢн”ј м°ЁлӢЁ. нҒҙлқјмқҙм–ёнҠё кұ°л¶Җ\r\n- `reports_queue/{postId}` вҖ” мһҗлҸҷ лҲ„м Ғ мӢ кі  нҒҗ. read staff мқҙмғҒ, write Functions\r\n- `appeals/{appealId}` вҖ” мқҙмқҳм ңкё°. м •м§Җ мӮ¬мҡ©мһҗлҸ„ ліёмқё uidлЎң мһ‘м„ұ к°ҖлҠҘ (canWrite мҡ°нҡҢ), 500мһҗ м ңн•ң, мғҒнғң ліҖкІҪмқҖ admin/manager\r\n- `data_requests/{requestId}` вҖ” лҚ°мқҙн„° мқҙм „к¶Ң/м—ҙлһҢк¶Ң. create canWrite + ліёмқё uid, read ліёмқё лҳҗлҠ” manager+\r\n- `teacher_invites/{inviteId}` вҖ” көҗмӮ¬ мҙҲлҢҖл§ҒнҒ¬. л°ңкёү admin/manager, м°Ёк°җмқҖ Functions\r\n- `community_rules/{version}` вҖ” кіөк°ң read, л°ңн–ү admin/manager\r\n\r\n## Rate Limiting\r\n\r\n| лҢҖмғҒ | л°©мӢқ |\r\n|---|---|\r\n| кёҖ мһ‘м„ұ | нҒҙлқјмқҙм–ёнҠё 30мҙҲ мҝЁнғҖмһ„, к·ңм№ҷмқҖ м ңлӘ©/ліёл¬ё кёёмқҙл§Ң |\r\n| лҢ“кёҖ мһ‘м„ұ | нҒҙлқјмқҙм–ёнҠё 10мҙҲ мҝЁнғҖмһ„ |\r\n| мӢ кі  мӨ‘ліө | `(postId, reporterUid)` ліөн•© мқёлҚұмҠӨлЎң мӨ‘ліө м ҖмһҘ м°ЁлӢЁ |\r\n\r\nнҒҙлқјмқҙм–ёнҠё мҡ°нҡҢ к°ҖлҠҘм„ұмқҙ мһҲм–ҙ **н•өмӢ¬ л°©м–ҙм„ мқҖ Rulesмқҳ н•„л“ң лӢЁмң„ кІҖмҰқ**мһ…лӢҲлӢӨ.\r\n\r\n## Cloud Functions ліҙм•Ҳ\r\n\r\n- `kakaoCustomAuth`: zod мҠӨнӮӨл§Ҳ(`KakaoAuthSchema`)лЎң мһ…л Ҙ кІҖмҰқ, Kakao API кІҖмҰқ нӣ„ Firebase custom token л°ңкёү\r\n- н‘ёмӢң м•ҢлҰј нҠёлҰ¬кұ°: л°ңмҶЎ м „ мҲҳмӢ мһҗ `users/{uid}.notiXxx` н•„л“ң мІҙнҒ¬ ([кё°мҲ кіјм ң #7](./technical-challenges.md#7-cloud-functions-м•ҢлҰј-м„Өм •-к°ңлі„-м ңм–ҙ-server-side-filtering))\r\n- мҳӨлҘҳлҠ” `function_logs` м»¬л үм…ҳм—җ кё°лЎқ (`logError` н—¬нҚј)\r\n\r\n## лҜјк°җ лҚ°мқҙн„° мІҳлҰ¬\r\n\r\n### м„ұм Ғ вҖ” лЎңм»¬ м „мҡ©\r\n- `flutter_secure_storage` мӮ¬мҡ© вҶ’ Android Keystore / iOS Keychain\r\n- м„ңлІ„ м—…лЎңл“ң м—ҶмқҢ, Cloud Backup м—ҶмқҢ\r\n- кё°мЎҙ нҸүл¬ё SharedPreferences вҶ’ мІ« мӢӨн–ү мӢң 1нҡҢ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нӣ„ кө¬нӮӨ мӮӯм ң\r\n\r\n### н”„лЎңн•„ мӮ¬м§„\r\n- Cloud Storage м—…лЎңл“ң м „ **256px м••м¶•**\r\n- нғҲнҮҙ мӢң Storage нҢҢмқј н•Ёк»ҳ мӮӯм ң\r\n\r\n### кІҢмӢңкёҖ мқҙлҜём§Җ\r\n- **1080px м••м¶• + EXIF/GPS м ңкұ°** (`flutter_image_compress`)\r\n- Storage м—…лЎңл“ң, URLмқ„ Firestoreм—җ м ҖмһҘ\r\n\r\n### OAuth м „мҡ© мқёмҰқ\r\n- л№„л°ҖлІҲнҳё м ҖмһҘ м—ҶмқҢ (Google / Apple / Kakao / GitHub)\r\n- Kakaoл§Ң м»ӨмҠӨн…Җ нҶ нҒ° лёҢлҰҝм§Җ (Firebase Authк°Җ м§Ғм ‘ м§Җмӣҗ м•Ҳ н•Ё)\r\n\r\n## к°ңмқём •ліҙ ліҙнҳё\r\n\r\n- **к°ңмқём •ліҙ мІҳлҰ¬л°©м№Ё** м•ұ лӮҙ н‘ңмӢң (`AppLocalizations` l10n кё°л°ҳ, `PrivacyPolicyScreen`)\r\n- к°Җмһ… мӢң лҸҷмқҳ н•„мҲҳ + **л§Ң 14м„ё мқҙмғҒ нҷ•мқё мІҙнҒ¬л°•мҠӨ** (к°ңмқём •ліҙліҙнҳёлІ• м ң22мЎ°мқҳ2)\r\n- к°Җмһ… нҷ”л©ҙм—җм„ң \"м „мІҙ ліҙкё°\"лЎң м „л¬ё нҷ•мқё к°ҖлҠҘ\r\n- **м„Өм •м—җм„ң Analytics мҲҳм§‘ лҸҷмқҳ/кұ°л¶Җ нҶ кёҖ** (к°ңмқём •ліҙліҙнҳёлІ• м ң10мЎ°)\r\n- мөңмҶҢ мҲҳм§‘ мӣҗм№ҷ: мқҙлҰ„/н•ҷлІҲ/мқҙл©”мқј/н”„лЎңн•„ мӮ¬м§„л§Ң (н•ҷкөҗ л§ҘлқҪ н•„мҲҳ м •ліҙ)\r\n- D-day лҚ°мқҙн„°(лӮ м§ң + лқјлІЁ)лҠ” л№„лҜјк°җ м •ліҙлЎң Firestoreм—җ кі„м • м—°лҸҷ м ҖмһҘ\r\n- **нҡҢмӣҗ нғҲнҮҙ мӢң мҰүмӢң нҢҢкё°** вҖ” кҙҖл Ё м»¬л үм…ҳ + Storage + Auth кі„м • мҲңм„ңлЎң мҷ„м „ мӮӯм ң ([кё°мҲ кіјм ң #10](./technical-challenges.md#10-кі„м •-мӮӯм ң-мҲңм„ң-л¬ём ң))\r\n- **TTL мһҗлҸҷ мӮӯм ң**: мҳӨлһҳлҗң лЎңк·ё/мӢ кі лҠ” `cleanupOldPosts` мҠӨмјҖмӨ„лҹ¬лЎң л§ҢлЈҢ мІҳлҰ¬\r\n\r\n## нҒ¬лһҳмӢң / к°җмӮ¬\r\n\r\n- **Crashlytics** (Firebase мҪҳмҶ”)\r\n- `function_logs` (Functions мҳӨлҘҳ лҜёлҹ¬)\r\n- `admin_logs` (лӘЁл“  кҙҖлҰ¬ н–үмң„: лҲ„к°Җ, м–ём ң, л¬ҙм—Үмқ„, мқҙм „вҶ’мқҙнӣ„)\r\n\r\n## н…ҢмҠӨнҠё\r\n\r\n- `tests/firestore-rules/`: `@firebase/rules-unit-testing` + м—җл®¬л Ҳмқҙн„° 80к°ң н…ҢмҠӨнҠё\r\n- к¶Ңн•ң мҡ°нҡҢ / м№ҙмҡҙн„° мң„мЎ° / н•„л“ң мң„мЎ° мӢңлӮҳлҰ¬мҳӨлҘј CI лӢЁкі„м—җм„ң кІҖмҰқ\r\n- мӢӨн–үлІ•: [testing.md](./testing.md) + [cicd-setup.md](./cicd-setup.md)\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [лҚ°мқҙн„° лӘЁлҚё](./data-model.md)\r\n- [м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ](./architecture-decisions.md)\r\n- [мқёмҰқ & м ‘к·ј](./account-and-access.md)\r\n- [л°°нҸ¬ к°Җмқҙл“ң](../DEPLOY.md) вҖ” к·ңм№ҷ л°°нҸ¬ лӘ…л №\r\n","guides/security_en.md":"# Security Model\r\n\r\n> н•ңкөӯм–ҙ: [security.md](./security.md)\r\n\r\nFirestore rules, role-based access control, and privacy safeguards in one place. Source file: `firestore.rules`. Tests: `tests/firestore-rules/`.\r\n\r\n## Core Principles\r\n\r\n1. **Firestore rules are the single source of truth** вҖ” app and Admin Web run under the same rules\r\n2. **Roles live only on the server** (`users/{uid}.role`). Clients read but cannot modify\r\n3. **Per-field validation** вҖ” non-authors can still touch interaction fields\r\n4. **Sensitive data never goes to the server** вҖ” grades live only in the OS keychain\r\n\r\n## Helper Functions (firestore.rules)\r\n\r\n```\r\nfunction isSignedIn() { return request.auth != null; }\r\n\r\nfunction isAdmin() {\r\n  return isSignedIn() &&\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role == 'admin';\r\n}\r\n\r\nfunction isAdminOrManager() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager']\r\n  );\r\n}\r\n\r\nfunction isModerator() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager', 'moderator']\r\n  );\r\n}\r\n\r\nfunction isAuditor() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager', 'auditor']\r\n  );\r\n}\r\n\r\nfunction isStaff() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.role in ['admin', 'manager', 'moderator', 'auditor']\r\n  );\r\n}\r\n\r\nfunction isVerified() {\r\n  return isSignedIn() &&\r\n    get(/databases/$(db)/documents/users/$(auth.uid))\r\n      .data.get('verificationStatus', 'verified') == 'verified';\r\n}\r\n\r\nfunction isNotSuspended() {\r\n  return isSignedIn() && (\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.get('suspendedUntil', null) == null ||\r\n    get(/databases/$(db)/documents/users/$(auth.uid)).data.suspendedUntil < request.time\r\n  );\r\n}\r\n\r\nfunction canWrite() { return isVerified() && isNotSuspended(); }\r\n\r\nfunction changedKeys() {\r\n  return request.resource.data.diff(resource.data).affectedKeys();\r\n}\r\n\r\nfunction isInteractionUpdate() {\r\n  return changedKeys().hasOnly(\r\n    ['likes', 'dislikes', 'likeCount', 'dislikeCount',\r\n     'pollVoters', 'commentCount',\r\n     'anonymousMapping', 'anonymousCount', 'bookmarkedBy']\r\n  );\r\n}\r\n\r\nfunction validCounterDelta(field) {\r\n  return !(field in changedKeys()) || (\r\n    request.resource.data[field] is int &&\r\n    request.resource.data[field] >= 0 &&\r\n    request.resource.data[field] - resource.data.get(field, 0) >= -1 &&\r\n    request.resource.data[field] - resource.data.get(field, 0) <= 1\r\n  );\r\n}\r\n```\r\n\r\n## Per-collection Rules\r\n\r\n### `users/{uid}`\r\n- **read**: self or manager/admin\r\n- **create**: any authed user\r\n- **update**: self (but `role`/`suspendedUntil`/`approved` immutable), or manager/admin freely\r\n- **delete**: self or admin\r\n- **Subcollections**: `subjects`, `sync` вҶ’ self only; `notifications` вҶ’ self reads/updates/deletes, anyone may create (admin alerts)\r\n\r\n### `posts/{postId}`\r\n- **read**: public\r\n- **create**: `authorUid == auth.uid` + title 1вҖ“200 chars + content вүӨ5000 chars\r\n- **update**: author freely, OR non-author limited to `isInteractionUpdate()` + `validCounterDelta(Вұ1)`\r\n- **delete**: author or moderator+ (`isModerator()`)\r\n\r\n### `posts/{postId}/comments/{commentId}`\r\n- **delete**: author or moderator+ (`isModerator()`)\r\n\r\n### `chats/{chatId}` + messages\r\n- Only participants (`participants` array) can read/write\r\n- Message `update` is only for deletion fields (`deleted`, `deletedFor`) вҖ” content tampering blocked\r\n\r\n### `reports`\r\n- **create**: authed users\r\n- **read**: staff+ (`isStaff()` вҖ” admin, manager, moderator, auditor)\r\n- **delete**: manager/admin (`isAdminOrManager()`)\r\n\r\n### `admin_logs`\r\n- **create**: moderator+ (`isModerator()`)\r\n- **read**: staff+ (`isStaff()`)\r\n\r\n### `app_stats`, `function_logs`, `crash_logs`\r\n- **read**: auditor+ (`isAuditor()` вҖ” admin, manager, auditor)\r\n\r\n### `app_feedbacks`, `council_feedbacks`\r\n- **read**: auditor+ (`isAuditor()`)\r\n- **update/delete**: manager/admin (`isAdminOrManager()`)\r\n\r\n### `app_config/{key}`\r\n- Public read (version check, popup); admin-only write\r\n\r\n### Verification / Suspension Guard\r\n- `posts` create, `comments` create, `reports` create, `chats/messages` create require `canWrite()` вҖ” blocks suspended/unverified users\r\n- Legacy users (no `verificationStatus`/`suspendedUntil` field) are grandfathered through\r\n\r\n### New Collections (PIPA compliance)\r\n- `studentIds/{studentId}` вҖ” student ID occupancy index. Read: signed-in. Write: Cloud Functions only\r\n- `otp_codes/{uid}` вҖ” school-email OTP. All client read/write denied\r\n- `banned_devices/{installationId}` вҖ” block re-registration after suspension. Client denied\r\n- `reports_queue/{postId}` вҖ” auto-aggregated report queue. Read: staff+, write: Functions\r\n- `appeals/{appealId}` вҖ” suspension appeals. Suspended users may write under their own uid (bypasses canWrite), 500-char limit, status changes by admin/manager only\r\n- `data_requests/{requestId}` вҖ” data portability / access requests. Create requires canWrite + own uid; read by self or manager+\r\n- `teacher_invites/{inviteId}` вҖ” teacher invite codes. Issue by admin/manager, redemption by Functions\r\n- `community_rules/{version}` вҖ” public read, admin/manager publish\r\n\r\n## Rate Limiting\r\n\r\n| Target | Method |\r\n|---|---|\r\n| Post creation | client-side 30s cooldown; rules only check title/content length |\r\n| Comment creation | client-side 10s cooldown |\r\n| Duplicate reports | `(postId, reporterUid)` composite index blocks duplicates |\r\n\r\nClient-side guards are bypassable, so **the real defense is the per-field validation in rules**.\r\n\r\n## Cloud Functions Security\r\n\r\n- `kakaoCustomAuth`: zod schema (`KakaoAuthSchema`) validates input, verifies with Kakao, then issues a Firebase custom token\r\n- Push triggers: check receiver's `users/{uid}.notiXxx` before sending ([technical-challenges_en.md#7](./technical-challenges_en.md#7-per-category-push-toggles-server-side-filter))\r\n- Errors are written to `function_logs` via the `logError` helper\r\n\r\n## Sensitive Data Handling\r\n\r\n### Grades вҖ” local only\r\n- `flutter_secure_storage` вҶ’ Android Keystore / iOS Keychain\r\n- No server upload, no Cloud Backup\r\n- Plain SharedPreferences data вҶ’ one-time migration on first launch, old keys cleared\r\n\r\n### Profile Pictures\r\n- **256px compression** before Cloud Storage upload\r\n- Deleted alongside Storage files on account deletion\r\n\r\n### Post Images\r\n- **1080px compression + EXIF/GPS stripping** (`flutter_image_compress`)\r\n- Uploaded to Storage; URLs saved in Firestore\r\n\r\n### OAuth-only Auth\r\n- No password storage (Google / Apple / Kakao / GitHub)\r\n- Kakao alone needs a custom-token bridge (Firebase Auth has no direct provider)\r\n\r\n## Privacy\r\n\r\n- **Privacy policy** shown in-app (`AppLocalizations`-based l10n, `PrivacyPolicyScreen`); consent required at signup\r\n- **Age confirmation checkbox** (must be 14+) at profile setup (PIPA Article 22-2)\r\n- \"View full policy\" link opens the complete privacy policy during signup\r\n- **Analytics opt-out toggle** in settings (PIPA Article 10)\r\n- Minimal collection: name / student ID / email / profile picture (school context essentials)\r\n- D-day data (dates + labels) is non-sensitive and synced to Firestore (account-linked)\r\n- **Immediate wipe on deletion** вҖ” collections + Storage + Auth in order ([technical-challenges_en.md#10](./technical-challenges_en.md#10-account-deletion-ordering-auth--firestore-permission-loss))\r\n- **TTL cleanup**: stale logs/reports swept by the `cleanupOldPosts` scheduler\r\n\r\n## Crash / Audit\r\n\r\n- **Crashlytics** (Firebase console)\r\n- `function_logs` (Cloud Functions error mirror)\r\n- `admin_logs` (every admin action: who, when, what, beforeвҶ’after)\r\n\r\n## Testing\r\n\r\n- `tests/firestore-rules/`: `@firebase/rules-unit-testing` + emulator, 80 tests\r\n- Covers permission bypass / counter forgery / field forgery at CI time\r\n- Run: see [testing_en.md](./testing_en.md) + [cicd-setup_en.md](./cicd-setup_en.md)\r\n\r\n## See Also\r\n- [Data Model](./data-model_en.md)\r\n- [Architecture Decisions](./architecture-decisions_en.md)\r\n- [Account & Access](./account-and-access_en.md)\r\n- [Deployment Guide](../DEPLOY_en.md) вҖ” rules deploy commands\r\n","guides/technical-challenges.md":"# Technical Challenges & Solutions\r\n\r\n> English: [technical-challenges_en.md](./technical-challenges_en.md)\r\n\r\nк°ңл°ң мӨ‘ л¶Җл”ӘнһҢ 16кұҙмқҳ кё°мҲ  кіјм ңмҷҖ н•ҙкІ° л°©лІ•мқ„ м •лҰ¬н•©лӢҲлӢӨ. к°Ғ мӮ¬лЎҖлҠ” *л¬ём ң вҶ’ н•ҙкІ° вҶ’ кІ°кіј*мқҳ нқҗлҰ„мқ„ мң м§Җн•ҳкі , кҙҖл Ё нҢҢмқј кІҪлЎңлҘј н•Ёк»ҳ лӮЁк№ҒлӢҲлӢӨ.\r\n\r\n## лӘ©м°Ё\r\n\r\n1. [Firebase Auth нҶ нҒ° лҸҷкё°нҷ” л¬ём ң](#1-firebase-auth-нҶ нҒ°-лҸҷкё°нҷ”-л¬ём ң-permission-denied)\r\n2. [кёүмӢқ API лҸҷмӢң мҡ”мІӯ кІҪн•©](#2-кёүмӢқ-api-лҸҷмӢң-мҡ”мІӯ-кІҪн•©-race-condition)\r\n3. [мқөлӘ… кІҢмӢңнҢҗ лІҲнҳё мқјкҙҖм„ұ](#3-мқөлӘ…-кІҢмӢңнҢҗ-лІҲнҳё-мқјкҙҖм„ұ-concurrent-write)\r\n4. [м„ нғқкіјлӘ© мӢңк°„н‘ң м¶©лҸҢ](#4-м„ нғқкіјлӘ©-мӢңк°„н‘ң-м¶©лҸҢ-slot-conflict)\r\n5. [Firestore ліҙм•Ҳ к·ңм№ҷкіј кё°лҠҘ м¶©лҸҢ](#5-firestore-ліҙм•Ҳ-к·ңм№ҷкіј-кё°лҠҘ-м¶©лҸҢ-field-level-validation)\r\n6. [мұ„нҢ… мқҪмқҢ нҷ•мқё мӢӨмӢңк°„ лҸҷкё°нҷ”](#6-мұ„нҢ…-мқҪмқҢ-нҷ•мқё-мӢӨмӢңк°„-лҸҷкё°нҷ”-dual-stream)\r\n7. [Cloud Functions м•ҢлҰј м„Өм • к°ңлі„ м ңм–ҙ](#7-cloud-functions-м•ҢлҰј-м„Өм •-к°ңлі„-м ңм–ҙ-server-side-filtering)\r\n8. [м •м§Җ л§ҢлЈҢ мһҗлҸҷ н•ҙм ң](#8-м •м§Җ-л§ҢлЈҢ-мһҗлҸҷ-н•ҙм ң-scheduler-trigger)\r\n9. [кҙҖлҰ¬мһҗ нҷ”л©ҙ Firestore мқҪкё° кіјлӢӨ](#9-кҙҖлҰ¬мһҗ-нҷ”л©ҙ-firestore-мқҪкё°-кіјлӢӨ-stream--future-м „нҷҳ)\r\n10. [кі„м • мӮӯм ң мҲңм„ң л¬ём ң](#10-кі„м •-мӮӯм ң-мҲңм„ң-л¬ём ң-auth--firestore-к¶Ңн•ң-мҶҢмӢӨ)\r\n11. [Riverpod AsyncNotifier кІҪн•© мғҒнғң](#11-riverpod-asyncnotifier-кІҪн•©-мғҒнғң-invalidateself-race-condition)\r\n12. [мң„м Ҝ н…ҢмҠӨнҠёмқҳ л№„кІ°м •м Ғ Timer Leak](#12-мң„м Ҝ-н…ҢмҠӨнҠёмқҳ-л№„кІ°м •м Ғ-timer-leak)\r\n13. [StatefulWidget 1,400+ лқјмқё лҰ¬нҢ©нҶ л§Ғ](#13-statefulwidget-1400-лқјмқё--stateless-composition-refactoring)\r\n14. [Repository нҢЁн„ҙ + GetIt м җм§„м Ғ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ](#14-repository-нҢЁн„ҙ--getit-м җм§„м Ғ-л§Ҳмқҙк·ёл Ҳмқҙм…ҳ)\r\n15. [к¶Ңн•ң кІҖмӮ¬ Firestore мқҪкё° 0нҡҢ вҖ” Custom Claims л§Ҳмқҙк·ёл Ҳмқҙм…ҳ](#15-к¶Ңн•ң-кІҖмӮ¬-firestore-мқҪкё°-0нҡҢ--custom-claims-л§Ҳмқҙк·ёл Ҳмқҙм…ҳ)\r\n16. [PIPA TTL лҚ°мқҙн„° лқјмқҙн”„мӮ¬мқҙнҒҙ мһҗлҸҷнҷ”](#16-pipa-ttl-лҚ°мқҙн„°-лқјмқҙн”„мӮ¬мқҙнҒҙ-мһҗлҸҷнҷ”)\r\n\r\n---\r\n\r\n## 1. Firebase Auth нҶ нҒ° лҸҷкё°нҷ” л¬ём ң (Permission Denied)\r\n\r\n**л¬ём ң:** мҶҢм…ң лЎңк·ёмқё м§Ғнӣ„ Firestore л¬ём„ң мЎ°нҡҢ мӢң PERMISSION_DENIED л°ңмғқ вҖ” Auth нҶ нҒ°мқҙ Firestore SDKм—җ м „нҢҢлҗҳкё° м „м—җ мҡ”мІӯмқҙ лӮҳк°җ\r\n\r\n**н•ҙкІ°:** `getIdToken(true)`лЎң нҶ нҒ° к°•м ң к°ұмӢ  + мөңлҢҖ 3нҡҢ мһ¬мӢңлҸ„ лЎңм§ҒмңјлЎң мІ« м„Өм№ҳ/мһ¬лЎңк·ёмқё мӢңм—җлҸ„ м•Ҳм •м ҒмңјлЎң н”„лЎңн•„ нҷ•мқё\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/auth/login_screen.dart`, `lib/screens/auth/profile_setup_screen.dart`\r\n\r\n---\r\n\r\n## 2. кёүмӢқ API лҸҷмӢң мҡ”мІӯ кІҪн•© (Race Condition)\r\n\r\n**л¬ём ң:** м—¬лҹ¬ нҷ”л©ҙм—җм„ң лҸҷмӢңм—җ к°ҷмқҖ мӣ”мқҳ кёүмӢқ лҚ°мқҙн„°лҘј мҡ”мІӯн•ҳл©ҙ мӨ‘ліө API нҳём¶ң л°ңмғқ\r\n\r\n**н•ҙкІ°:** `Completer` нҢЁн„ҙмңјлЎң лҸҷмқј мӣ” н”„лҰ¬нҺҳм№ҳлҘј лӢЁмқј FutureлЎң лі‘н•©, м§„н–ү мӨ‘мқё мҡ”мІӯмқҙ мһҲмңјл©ҙ кё°мЎҙ FutureлҘј кіөмң \r\n\r\n**кІ°кіј:** API нҳём¶ң **30нҡҢ вҶ’ 1нҡҢ**\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`\r\n\r\n---\r\n\r\n## 3. мқөлӘ… кІҢмӢңнҢҗ лІҲнҳё мқјкҙҖм„ұ (Concurrent Write)\r\n\r\n**л¬ём ң:** нҒҙлқјмқҙм–ёнҠём—җм„ң мқөлӘ… лІҲнҳёлҘј л¶Җм—¬н•ҳл©ҙ лҸҷмӢң лҢ“кёҖ мӢң к°ҷмқҖ лІҲнҳёк°Җ мӨ‘ліө н• лӢ№лҗ  мҲҳ мһҲмқҢ\r\n\r\n**н•ҙкІ°:** Firestore TransactionмңјлЎң кІҢмӢңкёҖ л¬ём„ңмқҳ `anonymousMapping` / `anonymousCount`лҘј мӣҗмһҗм ҒмңјлЎң мқҪкё°/м“°кё°н•ҳм—¬ лІҲнҳё мӨ‘ліө л°©м§Җ. мһ‘м„ұмһҗ ліёмқёмқҖ `мқөлӘ…(кёҖм“ҙмқҙ)` кі м • лқјлІЁ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/board/post_detail_screen.dart`, `firestore.rules` (`isInteractionUpdate`к°Җ `anonymousMapping` нҸ¬н•Ё)\r\n\r\n---\r\n\r\n## 4. м„ нғқкіјлӘ© мӢңк°„н‘ң м¶©лҸҢ (Slot Conflict)\r\n\r\n**л¬ём ң:** 2-3н•ҷл…„ м„ нғқкіјлӘ© мЎ°н•© мӢң к°ҷмқҖ көҗмӢңм—җ лӢӨлҘё л°ҳмқҳ мҲҳм—…мқҙ кІ№м№  мҲҳ мһҲмқҢ\r\n\r\n**н•ҙкІ°:** мӢңк°„н‘ң л№Ңл“ң мӢң мҠ¬лЎҜлі„ м¶©лҸҢ мһҗлҸҷ к°җм§Җ вҶ’ мӮ¬мҡ©мһҗм—җкІҢ м„ нғқ лӢӨмқҙм–јлЎңк·ё н‘ңмӢң, м„ нғқ кІ°кіјлҘј лЎңм»¬м—җ м ҖмһҘн•ҳм—¬ мһ¬м¶©лҸҢ л°©м§Җ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/sub/timetable_view_screen.dart`, `lib/screens/sub/timetable_select_screen.dart`\r\n\r\n---\r\n\r\n## 5. Firestore ліҙм•Ҳ к·ңм№ҷкіј кё°лҠҘ м¶©лҸҢ (Field-level Validation)\r\n\r\n**л¬ём ң:** кІҢмӢңкёҖ updateлҘј `мһ‘м„ұмһҗл§Ң` н—Ҳмҡ©н•ҳл©ҙ лӢӨлҘё мң м Җмқҳ нҲ¬н‘ң/м¶”мІңмқҙ м°ЁлӢЁлҗЁ\r\n\r\n**н•ҙкІ°:** `request.resource.data.diff(resource.data).affectedKeys().hasOnly([...])` лЎң н•„л“ң лӢЁмң„ кІҖмҰқ вҖ” мқён„°лһҷм…ҳ н•„л“ңл§Ң ліҖкІҪ мӢң лӘЁл“  мқёмҰқ мң м Җ н—Ҳмҡ©. `validCounterDelta(field)`лЎң `likeCount` л“ұмқҳ Вұ1 deltaлҘј к°•м ң\r\n\r\n**кҙҖл Ё нҢҢмқј:** `firestore.rules` (`isInteractionUpdate`, `validCounterDelta`), `tests/firestore-rules/`\r\n\r\n---\r\n\r\n## 6. мұ„нҢ… мқҪмқҢ нҷ•мқё мӢӨмӢңк°„ лҸҷкё°нҷ” (Dual Stream)\r\n\r\n**л¬ём ң:** л©”мӢңм§Җ мҠӨнҠёлҰјкіј лі„лҸ„лЎң мқҪмқҢ мғҒнғңлҘј м¶”м Ғн•ҳл©ҙ м¶”к°Җ Firestore мқҪкё° л°ңмғқ\r\n\r\n**н•ҙкІ°:** мұ„нҢ…л°© л¬ём„ңмқҳ `unreadCount` л§өмқ„ лі„лҸ„ `StreamBuilder`лЎң к°җмӢңн•ҳм—¬ лӢЁмқј л¬ём„ң мҠӨнҠёлҰјмңјлЎң мқҪмқҢ мғҒнғң мӢӨмӢңк°„ л°ҳмҳҒ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/chat/chat_room_screen.dart`, `lib/screens/chat/chat_list_screen.dart`\r\n\r\n---\r\n\r\n## 7. Cloud Functions м•ҢлҰј м„Өм • к°ңлі„ м ңм–ҙ (Server-side Filtering)\r\n\r\n**л¬ём ң:** FCM н‘ёмӢңлҠ” м„ңлІ„м—җм„ң л°ңмҶЎн•ҳлҜҖлЎң нҒҙлқјмқҙм–ёнҠём—җм„ң м№ҙн…Ңкі лҰ¬лі„ on/off л¶Ҳк°Җ\r\n\r\n**н•ҙкІ°:** Firestore `users/{uid}`м—җ `notiComment`, `notiReply`, `notiChat` л“ұ н•„л“ң м ҖмһҘ, Cloud Functionsм—җм„ң л°ңмҶЎ м „ н•ҙлӢ№ н•„л“ң мІҙнҒ¬н•ҳм—¬ `false`л©ҙ л°ңмҶЎ мҠӨнӮө\r\n\r\n**кҙҖл Ё нҢҢмқј:** `functions/index.js`, `lib/screens/sub/notification_setting_screen.dart`\r\n\r\n---\r\n\r\n## 8. м •м§Җ л§ҢлЈҢ мһҗлҸҷ н•ҙм ң (Scheduler Trigger)\r\n\r\n**л¬ём ң:** кі„м • м •м§Җ л§ҢлЈҢ мӢңк°„мқҙ м§ҖлӮҳлҸ„ Firestore н•„л“ңк°Җ мһҗлҸҷмңјлЎң мӮӯм ңлҗҳм§Җ м•Ҡм•„ `onUserUpdated` нҠёлҰ¬кұ° л¶Ҳл°ң\r\n\r\n**н•ҙкІ°:** Cloud Functions SchedulerлЎң л§ӨмӢңк°„ `suspendedUntil <= now`мқё мң м ҖлҘј мЎ°нҡҢн•ҳм—¬ н•„л“ң мӮӯм ң вҶ’ `onUserUpdated` нҠёлҰ¬кұ° вҶ’ м •м§Җ н•ҙм ң н‘ёмӢң л°ңмҶЎ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `functions/index.js` (`checkSuspensionExpiry`)\r\n\r\n---\r\n\r\n## 9. кҙҖлҰ¬мһҗ нҷ”л©ҙ Firestore мқҪкё° кіјлӢӨ (Stream вҶ’ Future м „нҷҳ)\r\n\r\n**л¬ём ң:** кҙҖлҰ¬мһҗ нҷ”л©ҙмқҙ `StreamBuilder`лЎң мң м Җ/мӢ кі /лЎңк·ёлҘј мӢӨмӢңк°„ к°җмӢңн•ҳм—¬, нҷ”л©ҙ м—ҙкё°л§Ң н•ҙлҸ„ 130+ мқҪкё° л°ңмғқ. лҚ°мқҙн„° ліҖкІҪ мӢңл§ҲлӢӨ м „мІҙ мһ¬мЎ°нҡҢ\r\n\r\n**н•ҙкІ°:** `StreamBuilder` вҶ’ `FutureBuilder`лЎң м „нҷҳн•ҳм—¬ м—ҙ л•Ң 1нҡҢл§Ң мЎ°нҡҢ + м•Ўм…ҳ(мҠ№мқё/мӮӯм ң л“ұ) нӣ„ `_refresh()`лЎң мҲҳлҸҷ к°ұмӢ . `ExpansionTile`мқ„ нҺјм№  л•Ңл§Ң childлҘј л ҢлҚ”л§Ғн•ҳм—¬ м ‘нһҢ нғӯмқҖ мқҪкё° 0\r\n\r\n**кІ°кіј:** **130 вҶ’ 20~30 мқҪкё°лЎң к°җмҶҢ**\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/board/admin_screen.dart`, `lib/screens/board/admin/users_tab.dart`\r\n\r\n---\r\n\r\n## 10. кі„м • мӮӯм ң мҲңм„ң л¬ём ң (Auth вҶ’ Firestore к¶Ңн•ң мҶҢмӢӨ)\r\n\r\n**л¬ём ң:** `user.delete()` нҳём¶ң мӢң Firebase Authк°Җ мҰүмӢң лЎңк·ём•„мӣғлҗҳм–ҙ, мқҙнӣ„ Firestore л¬ём„ң мӮӯм ңк°Җ PERMISSION_DENIEDлЎң мӢӨнҢЁ\r\n\r\n**н•ҙкІ°:** Firestore л¬ём„ңлҘј лЁјм Җ мӮӯм ң(мқёмҰқ мғҒнғң мң м§Җ мӨ‘)н•ң нӣ„ Auth кі„м • мӮӯм ң. `uid`лҘј лҜёлҰ¬ ліҖмҲҳм—җ м ҖмһҘн•ҳм—¬ мӮӯм ң мҲңм„ң м—ӯм „м—җ мқҳн•ң м°ёмЎ° мҶҢмӢӨ л°©м§Җ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/sub/setting_screen.dart`, `lib/screens/auth/profile_edit_screen.dart`\r\n\r\n---\r\n\r\n## 11. Riverpod AsyncNotifier кІҪн•© мғҒнғң (invalidateSelf Race Condition)\r\n\r\n**л¬ём ң:** `ExamsNotifier`мқҳ `add()` / `delete()` к°ҷмқҖ mutatorм—җм„ң `ref.invalidateSelf()`лЎң мһ¬мЎ°нҡҢлҘј нҠёлҰ¬кұ°н–ҲлҚ”лӢҲ, Provider лӢЁмң„ н…ҢмҠӨнҠёк°Җ к°„н—җм ҒмңјлЎң мӢӨнҢЁ. invalidateк°Җ л№„лҸҷкё°лЎң мІҳлҰ¬лҗҳм–ҙ лӢӨмқҢ `read()`к°Җ *мқҙм „* stateлҘј л°ҳнҷҳн•ҳлҠ” race condition\r\n\r\n**н•ҙкІ°:** mutator лӮҙл¶Җм—җм„ң `final current = await future;` лЎң нҳ„мһ¬ stateлҘј лЁјм Җ нҷ•ліҙ вҶ’ м ҖмһҘмҶҢ к°ұмӢ  вҶ’ `state = AsyncData([...current, exam])` лЎң м§Ғм ‘ state көҗмІҙ. invalidateSelfлҘј м ңкұ°н•ҳм—¬ race condition мӣҗмІң м°ЁлӢЁ. лҸҷмқј нҢЁн„ҙмқ„ `GoalsNotifier` / `JeongsiGoalsNotifier`м—җлҸ„ м Ғмҡ©\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/providers/grade_provider.dart`, `test/grade_provider_test.dart`\r\n\r\n---\r\n\r\n## 12. мң„м Ҝ н…ҢмҠӨнҠёмқҳ л№„кІ°м •м Ғ Timer Leak\r\n\r\n**л¬ём ң:** `_LoadingExamsNotifier` mockм—җм„ң `await Future.delayed(Duration(seconds: 30))`лЎң мҳҒкө¬ лЎңл”©мқ„ мӢңл®¬л Ҳмқҙм…ҳн–ҲлҚ”лӢҲ `flutter test`к°Җ \"A Timer is still pending even after the widget tree was disposed\" лЎң мӢӨнҢЁ\r\n\r\n**н•ҙкІ°:** `Completer<List<Exam>>` нҢЁн„ҙмңјлЎң көҗмІҙ вҖ” FutureлҘј мҷёл¶Җ мӢ нҳёлЎң мҷ„лЈҢмӢңнӮ¬ мҲҳ мһҲлҸ„лЎқ н•ҳм—¬ н…ҢмҠӨнҠё мў…лЈҢ мӢңм җм—җ лӘ…мӢңм ҒмңјлЎң `complete()` нҳём¶ң. Provider н…ҢмҠӨнҠём—җм„ңлҸ„ `addTearDown(container.dispose)`лЎң ProviderContainer лҲ„мҲҳ л°©м§Җ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `test/grade_screen_widget_test.dart`, `test/helpers/`\r\n\r\n---\r\n\r\n## 13. StatefulWidget 1,400+ лқјмқё вҶ’ Stateless Composition (Refactoring)\r\n\r\n**л¬ём ң:** `post_detail_screen.dart`(1442мӨ„), `admin_screen.dart`(1071мӨ„), `write_post_screen.dart`(1119мӨ„), `timetable_view_screen.dart`(943мӨ„) 4к°ң нҷ”л©ҙмқҙ лӘЁл“  sub-widgetмқ„ private нҒҙлһҳмҠӨ / `_buildXxx` л©”м„ңл“ңлЎң н•ң нҢҢмқјм—җ к°Җм§Җкі  мһҲм–ҙ к°ҖлҸ…м„ұ/мһ¬мӮ¬мҡ©м„ұ/н…ҢмҠӨнҠём„ұмқҙ лӘЁл‘җ м Җн•ҳ. лӢЁмҲң string matchлЎң мһ¬мӮ¬мҡ© мң„м№ҳлҘј м°ҫкё°лҸ„ м–ҙл ӨмӣҖ\r\n\r\n**н•ҙкІ°:** л‘җ к°Җм§Җ нҢЁн„ҙмңјлЎң л¶„лҰ¬\r\n1. **Private class вҶ’ Public StatelessWidget м¶”м¶ң** вҖ” `post_detail_screen` мқҳ `_PollCard` / `_VoteButton` / `_CommentItem` / `_EventAttachCard`, `admin_screen` мқҳ 5к°ң нғӯ нҒҙлһҳмҠӨ, `timetable_view` мқҳ лӢӨмқҙм–јлЎңк·ё/Painter л“ұмқ„ лі„лҸ„ нҢҢмқјлЎң мқҙлҸҷ + `_` prefix м ңкұ°\r\n2. **State мқҳмЎҙ builder method вҶ’ Callback parameter мң„м Ҝ** вҖ” `write_post_screen` мқҳ `_buildEventForm` / `_buildPollForm` / `_buildImageSection` мқҖ stateлҘј м§Ғм ‘ м°ёмЎ°н•ҳлҜҖлЎң, state к°’кіј setState wrapperлҘј лӘ…мӢңм Ғ callback (`onPickDate`, `onAddOption`, `onReorder`...)мңјлЎң л°ӣлҠ” StatelessWidgetмңјлЎң ліҖнҷҳ\r\n\r\n**кІ°кіј:** 4к°ң нҷ”л©ҙ н•©кі„ **4,575 вҶ’ 1,919мӨ„ (-58%)** вҖ” `post_detail` 545, `write_post` 700, `timetable_view` 588, `admin_screen` 86(+admin/ 5нҢҢмқј 1,123). 16к°ң мң„м Ҝ лӘЁл“ҲлЎң л¶„лҰ¬(`widgets/` 9 + `write_widgets/` 7), 563к°ң Flutter н…ҢмҠӨнҠё лӘЁл‘җ нҶөкіј (нҡҢк·Җ 0)\r\n\r\n**кҙҖл Ё нҢҢмқј:** `lib/screens/board/widgets/`, `lib/screens/board/write_widgets/`, `lib/screens/board/admin/`, `lib/screens/sub/timetable_widgets/`\r\n\r\n---\r\n\r\n## 14. Repository нҢЁн„ҙ + GetIt м җм§„м Ғ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ\r\n\r\n**л¬ём ң:** `AuthService`/`GradeManager`к°Җ static л©”м„ңл“ңлЎң 25к°ң мқҙмғҒмқҳ нҳём¶ң мӮ¬мқҙнҠём—җ нқ©м–ҙм ё мһҲм–ҙ н•ңлІҲм—җ DIлЎң м „нҷҳн•ҳл©ҙ м „ нҢҢмқј мҲҳм • н•„мҡ” + нҡҢк·Җ мң„н—ҳ\r\n\r\n**н•ҙкІ°:** Abstract `AuthRepository` / `GradeRepository` мқён„°нҺҳмқҙмҠӨлҘј мғҲлЎң м •мқҳн•ҳкі  `FirebaseAuthRepository` / `LocalGradeRepository` к°Җ кё°мЎҙ static л©”м„ңл“ңлҘј мң„мһ„ нҳём¶ң. мӢ к·ң мҪ”л“ңлҠ” `GetIt.I<AuthRepository>()`лЎң к°Җм ёк°Җкі  кё°мЎҙ нҳём¶ң мӮ¬мқҙнҠёлҠ” к·ёлҢҖлЎң л‘ . н…ҢмҠӨнҠём—җм„ңлҠ” `setupServiceLocator()` / `resetServiceLocator()` + Mock кө¬нҳ„мІҙлЎң мЈјмһ… к°ҖлҠҘ вҶ’ м җм§„м Ғ л§Ҳмқҙк·ёл Ҳмқҙм…ҳкіј л°ұмӣҢл“ң нҳёнҷҳмқ„ лҸҷмӢңм—җ нҷ•ліҙ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `test/auth_repository_test.dart`, `test/auth_service_test.dart`, `test/grade_manager_test.dart`\r\n\r\n---\r\n\r\n## 15. к¶Ңн•ң кІҖмӮ¬ Firestore мқҪкё° 0нҡҢ вҖ” Custom Claims л§Ҳмқҙк·ёл Ҳмқҙм…ҳ\r\n\r\n**л¬ём ң:** ліҙм•Ҳ к·ңм№ҷмқҙ л§Ө мҡ”мІӯл§ҲлӢӨ `get(/databases/.../users/$uid).data.role`лЎң мӮ¬мҡ©мһҗ л¬ём„ңлҘј м¶”к°Җ мЎ°нҡҢ вҶ’ кІҢмӢңкёҖ 1кұҙ мқҪмқ„ л•Ңл§ҲлӢӨ м¶”к°Җ 1нҡҢ мқҪкё°. к¶Ңн•ң лӘЁлҚёмқ„ 4лӢЁкі„(`moderator`/`auditor`/`manager`/`admin`)лЎң нҷ•мһҘн•ҳл©ҙм„ң нҠёлһҳн”Ҫмқҙ л№„лЎҖ мҰқк°Җн•  мҡ°л Ө\r\n\r\n**н•ҙкІ°:**\r\n1. мӮ¬мҡ©мһҗмқҳ `role`/`approved`лҘј Firebase Auth **custom claims**лЎң ID нҶ нҒ°м—җ л°•мқҢ вҶ’ ліҙм•Ҳ к·ңм№ҷмқҖ `request.auth.token.role`лЎң м§Ғм ‘ кІҖмӮ¬\r\n2. `onUserUpdated` Cloud Function нҠёлҰ¬кұ°м—җм„ң `role` н•„л“ң ліҖкІҪ к°җм§Җ мӢң `setCustomUserClaims` нҳём¶ң вҶ’ к¶Ңн•ң ліҖкІҪмқҙ мҰүмӢң нҶ нҒ°м—җ л°ҳмҳҒ\r\n3. нҒҙлқјмқҙм–ёнҠёлҠ” к¶Ңн•ң ліҖкІҪ м§Ғнӣ„ `getIdTokenResult(true)` к°•м ң к°ұмӢ \r\n4. кё°мЎҙ 28лӘ…м—җ лҢҖн•ҙм„ңлҠ” `scripts/backfill-claims.js` (лЎңм»¬ admin SDK)лЎң 1нҡҢ л°ұн•„. лӢЁмҲңн•ң лЈЁн”„м§Җл§Ң мһҳлӘ» лҸҢл©ҙ к¶Ңн•ңмқҙ лӢӨ к№Ём§ҖлҜҖлЎң dry-run нӣ„ м Ғмҡ©\r\n\r\n**кІ°кіј:** кІҢмӢңкёҖ/лҢ“кёҖ мЎ°нҡҢ мӢң к¶Ңн•ң кІҖмӮ¬ м¶”к°Җ мқҪкё° 0нҡҢ. Firestore л№„мҡ©мқҙ мӮ¬мҡ©мһҗ мҲҳк°Җ м•„лӢҲлқј нҠёлһҳн”Ҫм—җ л№„лЎҖн•ҳм§Җ м•ҠкІҢ лҗЁ. Rules н…ҢмҠӨнҠё 51кұҙ м¶”к°Җ (4лӢЁкі„ л§ӨнҠёлҰӯмҠӨ кІҖмҰқ)\r\n\r\n**кҙҖл Ё нҢҢмқј:** `firestore.rules`, `functions/index.js` (`onUserUpdated`), `scripts/backfill-claims.js`, `tests/firestore-rules/test/rules.test.js`\r\n\r\n---\r\n\r\n## 16. PIPA TTL лҚ°мқҙн„° лқјмқҙн”„мӮ¬мқҙнҒҙ мһҗлҸҷнҷ”\r\n\r\n**л¬ём ң:** PIPA(к°ңмқём •ліҙ ліҙнҳёлІ•)лҠ” ліҙкҙҖ мқҳл¬ҙк°Җ лҒқлӮң лҚ°мқҙн„°лҘј мһҗлҸҷ нҢҢкё°н•ҳлқјкі  мҡ”кө¬. лӢЁмҲңнһҲ \"мӮӯм ң лІ„нҠј\"мқ„ л§Ңл“ңлҠ” кұҙ мқјмқҙ м•„лӢҢлҚ°, м§„м§ң м–ҙл Өмҡҙ кұҙ **мӮ¬лһҢ к°ңмһ… м—Ҷмқҙ л§ҢлЈҢлҗң лҚ°мқҙн„°к°Җ мӮ¬лқјм§ҖкІҢ** н•ҳлҠ” кІғ. л§ӨмЈј мІӯмҶҢн•ҳлҠ” мӢңмҠӨн…ңмқҖ кІ°көӯ м•Ҳ мІӯмҶҢлҗЁ\r\n\r\n**н•ҙкІ°:**\r\n1. мғҲлЎң м¶”к°Җн•ң м»¬л үм…ҳ(`appeals`, `data_requests`, `admin_logs`)м—җ `expiresAt: Timestamp` н•„л“ңлҘј к°•м ң\r\n2. Firestore TTL м •мұ…мқ„ `expiresAt`м—җ л°”мқёл”© вҶ’ мӢңк°Ғмқҙ м§ҖлӮҳл©ҙ Firestoreк°Җ м•Ңм•„м„ң л¬ём„ң мӮӯм ң (1нҡҢ/мқј м •лҸ„, л№„кІ°м •м Ғмқҙм§Җл§Ң PIPA мҡ”кұҙм—” м¶©л¶„)\r\n3. ліҙкҙҖ кё°к°„мқҖ м •мұ… кё°л°ҳмңјлЎң м°Ёл“ұ: `appeals` 90мқј / `data_requests` 30мқј / `admin_logs` 1л…„\r\n4. лҚ°мқҙн„° мқөмҠӨнҸ¬нҠёлҠ” Cloud Function `createDataExport`к°Җ л№„лҸҷкё° мІҳлҰ¬ вҖ” мӮ¬мҡ©мһҗ лҚ°мқҙн„°лҘј JSONмңјлЎң л¬¶м–ҙ Storage м—…лЎңл“ң, лӢӨмҡҙлЎңл“ң л§ҒнҒ¬ мқҙл©”мқј л°ңмҶЎ. `purgeExpiredExports`к°Җ мқјмқј мІӯмҶҢ\r\n5. ліҙм•Ҳ к·ңм№ҷм—җм„ң `expiresAt` н•„л“ңмқҳ мЎҙмһ¬/нғҖмһ… кІҖмҰқмқ„ к°•м ң вҶ’ TTL лҲ„лқҪ лҚ°мқҙн„° м§„мһ… м°ЁлӢЁ\r\n\r\n**кІ°кіј:** мӮ¬лһҢмқҳ к°ңмһ… м—Ҷмқҙ лҚ°мқҙн„°к°Җ м •мұ…лҢҖлЎң мӮ¬лқјм§җ. 75к°ң нҢҢмқј / м•Ҫ 7,000мӨ„ ліҖкІҪ(мқёмҰқ к°Җл“ң, лЎңк·ёмқё н”ҢлЎңмҡ°, i18n 240нӮӨ, м–ҙл“ңлҜј 4нҺҳмқҙм§Җ, Rules н…ҢмҠӨнҠё л“ұ) вҖ” лІ• мЎ°н•ӯ лӘҮ мӨ„мқ„ л§ҢмЎұмӢңнӮӨл Өкі  лӘЁл“  л Ҳмқҙм–ҙм—җ мҶҗмқҙ к°җ\r\n\r\n**кҙҖл Ё нҢҢмқј:** `firestore.rules`, `firestore.indexes.json`, `functions/index.js` (`createDataExport`/`purgeExpiredExports`), `lib/screens/{appeal,data_request,community_rules}/`, `lib/services/verification_guard.dart`\r\n\r\n---\r\n\r\n## м°ёкі \r\n- [м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ](./architecture-decisions.md) вҖ” к°Ғ кіјм ңм—җ м—°кІ°лҗң м„Өкі„ л°°кІҪ\r\n- [н…ҢмҠӨнҠё м „лһө](./testing.md) вҖ” нҡҢк·Җ л°©м§Җ н…ҢмҠӨнҠё мІҙкі„\r\n","guides/technical-challenges_en.md":"# Technical Challenges & Solutions\r\n\r\n> н•ңкөӯм–ҙ: [technical-challenges.md](./technical-challenges.md)\r\n\r\n16 engineering challenges hit during development, each with a *problem вҶ’ solution вҶ’ outcome* summary and related file paths.\r\n\r\n## Contents\r\n\r\n1. [Firebase Auth token propagation (Permission Denied)](#1-firebase-auth-token-propagation-permission-denied)\r\n2. [Meal API concurrent-request race](#2-meal-api-concurrent-request-race-condition)\r\n3. [Anonymous number consistency (concurrent write)](#3-anonymous-number-consistency-concurrent-write)\r\n4. [Timetable elective slot conflicts](#4-timetable-elective-slot-conflicts)\r\n5. [Firestore rules vs features (field-level validation)](#5-firestore-rules-vs-features-field-level-validation)\r\n6. [Chat read-receipt realtime sync (dual stream)](#6-chat-read-receipt-realtime-sync-dual-stream)\r\n7. [Per-category push toggles (server-side filter)](#7-per-category-push-toggles-server-side-filter)\r\n8. [Auto-expiring suspensions (scheduler trigger)](#8-auto-expiring-suspensions-scheduler-trigger)\r\n9. [Admin screen Firestore read overload (Stream вҶ’ Future transition)](#9-admin-screen-firestore-read-overload-stream--future-transition)\r\n10. [Account deletion ordering (Auth вҶ’ Firestore permission loss)](#10-account-deletion-ordering-auth--firestore-permission-loss)\r\n11. [Riverpod AsyncNotifier race condition (invalidateSelf)](#11-riverpod-asyncnotifier-race-condition-invalidateself)\r\n12. [Non-deterministic widget test timer leak](#12-non-deterministic-widget-test-timer-leak)\r\n13. [StatefulWidget 1,400+ lines вҶ’ Stateless composition (refactoring)](#13-statefulwidget-1400-lines--stateless-composition-refactoring)\r\n14. [Repository + GetIt gradual migration](#14-repository--getit-gradual-migration)\r\n15. [Zero-read permission checks вҖ” custom claims migration](#15-zero-read-permission-checks--custom-claims-migration)\r\n16. [PIPA TTL data lifecycle automation](#16-pipa-ttl-data-lifecycle-automation)\r\n\r\n---\r\n\r\n## 1. Firebase Auth token propagation (Permission Denied)\r\n\r\n**Problem:** Right after a social login, querying Firestore threw PERMISSION_DENIED вҖ” the auth token hadn't propagated to the Firestore SDK yet.\r\n\r\n**Fix:** `getIdToken(true)` to force-refresh + retry up to 3 times so first-install / re-login flows reliably fetch the profile.\r\n\r\n**Related:** `lib/screens/auth/login_screen.dart`, `lib/screens/auth/profile_setup_screen.dart`\r\n\r\n---\r\n\r\n## 2. Meal API concurrent-request race condition\r\n\r\n**Problem:** Multiple screens requested the same month's meals simultaneously вҶ’ duplicate API calls.\r\n\r\n**Fix:** `Completer` pattern coalesces same-month prefetches into a single Future; in-flight requests share it.\r\n\r\n**Outcome:** API calls dropped **30 вҶ’ 1**.\r\n\r\n**Related:** `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`\r\n\r\n---\r\n\r\n## 3. Anonymous number consistency (concurrent write)\r\n\r\n**Problem:** If the client assigned anonymous numbers, simultaneous comments could collide on the same number.\r\n\r\n**Fix:** Firestore Transaction atomically reads/writes `anonymousMapping` / `anonymousCount` on the post doc, preventing collisions. The author is always labeled \"мқөлӘ…(кёҖм“ҙмқҙ)\" (`anonymous (author)`).\r\n\r\n**Related:** `lib/screens/board/post_detail_screen.dart`, `firestore.rules` (`isInteractionUpdate` covers `anonymousMapping`)\r\n\r\n---\r\n\r\n## 4. Timetable elective slot conflicts\r\n\r\n**Problem:** 2nd/3rd-year electives could overlap with another class in the same slot.\r\n\r\n**Fix:** Build-time per-slot conflict detection вҶ’ user-facing dialog to choose, with the choice stored locally to prevent recurrence.\r\n\r\n**Related:** `lib/screens/sub/timetable_view_screen.dart`, `timetable_select_screen.dart`\r\n\r\n---\r\n\r\n## 5. Firestore rules vs features (field-level validation)\r\n\r\n**Problem:** Restricting `posts.update` to authors blocks other users from voting / upvoting.\r\n\r\n**Fix:** `request.resource.data.diff(resource.data).affectedKeys().hasOnly([...])` for field-level validation вҖ” non-authors can only change interaction fields. `validCounterDelta(field)` enforces `likeCount` / etc. Вұ1 delta.\r\n\r\n**Related:** `firestore.rules` (`isInteractionUpdate`, `validCounterDelta`), `tests/firestore-rules/`\r\n\r\n---\r\n\r\n## 6. Chat read-receipt realtime sync (dual stream)\r\n\r\n**Problem:** Tracking read state separately from the message stream meant extra Firestore reads.\r\n\r\n**Fix:** Watch `chats/{id}.unreadCount` via a dedicated `StreamBuilder` вҖ” one doc stream delivers read state in realtime.\r\n\r\n**Related:** `lib/screens/chat/chat_room_screen.dart`, `chat_list_screen.dart`\r\n\r\n---\r\n\r\n## 7. Per-category push toggles (server-side filter)\r\n\r\n**Problem:** FCM pushes are se
