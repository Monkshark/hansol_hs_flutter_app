n## 관련 문서\n- [공개 기능](./public-features.md)\n- [개인 기능](./personal-features.md)\n- [관리자 기능](./admin-features.md)\n- [보안 모델](../guides/security.md)\n- [데이터 모델](../guides/data-model.md) — `posts`, `comments`, `chats`, `reports` 스키마\n","features/community-features_en.md":"# Community Features (Board / Chat / Notifications)\n\n> 한국어: [community-features.md](./community-features.md)\n\nFeatures where students, teachers, alumni, and parents communicate — board, 1:1 chat, notification system.\n\n## Board\n\n### Categories & Browsing\n\n- **6 categories** + **Popular** tab: Free / Question / Info-share / Lost & Found / Student Council / Clubs\n- **Popular sorted** by denormalized `likeCount` + composite index `(likeCount desc, createdAt desc)` ([ADR-04](../guides/architecture-decisions_en.md#adr-04-like-counter-mapuidbool--denormalized-int))\n- **Cursor-based pagination** (20 per page, infinite scroll, pull-to-refresh)\n- **Pinned announcements** (up to 3, admin-only, always on top)\n\n### Composition / Body\n\n- **Image attachment**: 1080px compressed + EXIF/GPS stripped, PageView swipe viewer + Hero animation + pinch-zoom\n- **Polls** (up to 6 options, real-time result bars)\n- **Schedule sharing** (links to academic events)\n- **Anonymous numbering**: 익명1/익명2/익명(글쓴이), via Firestore Transaction ([Technical Challenge #3](../guides/technical-challenges_en.md#3-anonymous-number-consistency-concurrent-write))\n\n### Interactions\n\n- **Upvote/downvote**: `Map<uid,bool>` + `likeCount` int counter, ±1 delta enforced in rules ([ADR-04](../guides/architecture-decisions_en.md#adr-04-like-counter-mapuidbool--denormalized-int))\n- **Bookmark** (re-accessible under My Activity → Saved)\n- **Comments + replies** (indented), author-of-post comments badged blue\n\n### Search\n\n- **n-gram search**: title+body 2-gram indexed into `searchTokens`, `array-contains-any` query ([ADR-03](../guides/architecture-decisions_en.md#adr-03-board-search-client-side-n-gram-indexing))\n- **350ms debounce**, 50-result fetch + client substring filter reduces false positives\n- **Search history**: last 10 keyword chips, delete individually or all\n\n### UX\n\n- Shimmer skeleton loading\n- **Bottom-sheet menu** (icon + text, delete/report highlighted red)\n- Reports, user blocking, auto-delete (TTL), rate limiting\n\n### My Activity\n\n- My posts / my comments / saved tabs\n- Uses `authorUid + createdAt` composite index\n\n**Files**: `lib/screens/board/board_screen.dart`, `post_detail_screen.dart`, `write_post_screen.dart`, `my_posts_screen.dart`, `bookmarked_posts_screen.dart`, `search_history_service_test.dart`, `search_tokens_test.dart`\n\n## 1:1 Chat\n\n- **User search** to start a chat (by name/student ID; admins shown by default)\n- **Realtime messages** (Firestore `onSnapshot`, limit 30)\n- **Read receipts** + unread badge ([Technical Challenge #6](../guides/technical-challenges_en.md#6-chat-read-receipt-realtime-sync-dual-stream))\n- **Message deletion**: self only / for both (if unread and ≤1h old)\n- **Leave chat**: system message + other party's view retained\n- Skeleton loading UI\n\n**Security**: rules enforce `participants` array → read/write participants only.\n\n**Files**: `lib/screens/chat/chat_list_screen.dart`, `chat_room_screen.dart`, `chat_utils.dart`\n\n## Notifications\n\n### Settings Screen\n\nFive independent toggles:\n\n| Category | Trigger | Path |\n|---|---|---|\n| **Comments/replies** | Comment on my post / reply to my comment | Cloud Functions → FCM |\n| **Chat** | New message | Cloud Functions → FCM |\n| **New posts** | New post in subscribed categories | Cloud Functions → FCM |\n| **Account** | Approval / suspension / unsuspension / role change | Cloud Functions → FCM |\n| **Meals** | Breakfast/lunch/dinner | Local notifications (per-meal time) |\n\n### Implementation\n\n- **In-app notifications**: bell icon + unread badge (`users/{uid}/notifications/{id}`)\n- **FCM push**: 4 FCM topics (`account` / `comment` / `new_post` / `chat`) + 3 local (breakfast/lunch/dinner)\n- **Server-side filtering**: Cloud Functions check `users/{uid}.notiXxx` before sending ([Technical Challenge #7](../guides/technical-challenges_en.md#7-per-category-push-toggles-server-side-filter))\n- **Auto-unsuspension**: Cloud Functions scheduler (hourly) ([Technical Challenge #8](../guides/technical-challenges_en.md#8-auto-expiring-suspensions-scheduler-trigger))\n\n**Files**: `lib/notification/fcm_service.dart`, `lib/screens/sub/notification_setting_screen.dart`, `lib/screens/board/notification_screen.dart`, `functions/index.js`\n\n## Feedback\n\n- **App feedback & bug reports** + **student-council feedback** (two channels)\n- Text (1000 chars) + up to 3 photos\n- State machine: pending → acknowledged → resolved → deleted (logged)\n- Admin Web changes state\n\n**Files**: `lib/screens/sub/feedback_screen.dart`, `feedback_list_screen.dart`\n\n## Rate Limiting\n\n| Target | Limit |\n|---|---|\n| Post creation | 30s cooldown |\n| Comment creation | 10s cooldown |\n| Report | dedup index on `(postId, reporterUid)` |\n| Chat messages | (client-side debounce) |\n\nClient-side front-loaded; Firestore rules carry only minimal validation.\n\n## See Also\n- [Public Features](./public-features_en.md)\n- [Personal Features](./personal-features_en.md)\n- [Admin Features](./admin-features_en.md)\n- [Security Model](../guides/security_en.md)\n- [Data Model](../guides/data-model_en.md) — `posts`, `comments`, `chats`, `reports`\n","features/personal-features.md":"# 개인 기능 (성적 / 개인일정 / 프로필)\n\n> English: [personal-features_en.md](./personal-features_en.md)\n\n사용자 개인 데이터를 다루는 기능을 묶었습니다. 성적은 완전 로컬, 개인일정은 sqflite, 프로필은 Firestore에 저장됩니다.\n\n## 성적 관리\n\n### 탭 구조\n\n- **수시(내신) / 정시(모의고사)** 탭 분리, 스와이프 전환\n- **내신**: 5등급제 + 성취도(A~E) 병기, 2022 개정 교육과정 적용\n- **모의고사**: 2022 개정 수능 과목 (국/수/영/한국사/통합사회/통합과학 + 제2외국어)\n- **사설 모의고사** 추가 가능\n\n### 시각화\n\n- **추이 그래프**: CustomPainter 꺾은선 ([ADR-05](../guides/architecture-decisions.md#adr-05-차트-custompainter-직접-구현))\n  - 모드 토글: 등급 / 원점수 / 백분위 / 표준점수\n  - 등급 스케일 반전(낮을수록 좋음) 올바르게 표시\n- **과목별 목표** 등급(수시 0.1단위) / 목표 백분위(정시) 분리 설정\n- **백분위 → 등급 자동 변환** (등급컷 기준 점선 표시)\n- **영어/한국사** 절대평가 과목 백분위 목표 제외\n- 과목별 고정 색상 (`lib/data/` 정의)\n\n### 저장소\n\n- **성적 로컬 전용 저장** — 서버 전송 없음 (`flutter_secure_storage`, [ADR-02](../guides/architecture-decisions.md#adr-02-민감-데이터-저장소-flutter_secure_storage))\n- Android Keystore / iOS Keychain 위임\n- 기존 평문 데이터 → 첫 실행 시 1회 자동 마이그레이션\n\n**관련 파일**: `lib/screens/sub/grade_screen.dart`, `grade_input_screen.dart`, `lib/providers/grade_provider.dart`, `test/grade_manager_test.dart`, `test/secure_storage_service_test.dart`\n\n## 개인일정\n\n- **커스텀 월간 캘린더**와 연동 (공개 기능 참조)\n- 하루/연속 일정, 6색 + 원형 컬러피커\n- **sqflite** 저장 — 오프라인 우선, 범위 쿼리 빠름\n- NEIS 학사일정과 시각적 구분 (점 vs 바)\n\n**관련 파일**: `test/schedule_data_test.dart`\n\n## D-day\n\n- 목표일까지 남은 일수 표시\n- **홈 화면 핀 고정** 지원\n- sqflite 저장 (일정과 동일 DB)\n\n**관련 파일**: `lib/screens/sub/dday_screen.dart`, `test/dday_manager_test.dart`\n\n## 프로필 / 설정\n\n- **프로필 사진** (Cloud Storage 업로드, 256px 압축)\n- 개인정보 동의, 온보딩 → 로그인 플로우\n- 알림 5카테고리 on/off (→ [커뮤니티 기능의 알림](./community-features.md#알림-시스템))\n- 테마 (라이트/다크/시스템)\n- 급식 알림 시간 설정\n\n**관련 파일**: `lib/screens/auth/profile_edit_screen.dart`, `profile_setup_screen.dart`, `lib/screens/sub/setting_screen.dart`, `notification_setting_screen.dart`, `lib/screens/sub/onboarding_screen.dart`\n\n## 새 학년 프로필 업데이트\n\n- 재학생/교사만 **3월에 정보 업데이트 팝업** 표시\n- 학년/반/번호 등 새 학년 정보 입력 유도\n- **역할 변경 불가** (관리자만 역할 변경 가능 — [security.md](../guides/security.md) 참조)\n\n## 회원 탈퇴\n\n- **이중 확인** 다이얼로그\n- **완전 삭제 순서** ([기술과제 #10](../guides/technical-challenges.md#10-계정-삭제-순서-문제-auth--firestore-권한-소실)):\n  1. Firestore `users/{uid}` 문서 삭제 (인증 상태 유지 중)\n  2. 연관 하위 컬렉션 (`subjects`, `notifications`, `sync`) 일괄 삭제\n  3. Cloud Storage 프로필 사진 삭제\n  4. `user.delete()`로 Auth 계정 삭제\n- 이름/프로필 사진/성적은 로컬 포함 완전 파기\n\n## 관련 문서\n- [공개 기능](./public-features.md)\n- [커뮤니티 기능](./community-features.md)\n- [관리자 기능](./admin-features.md)\n- [인증 & 접근](../guides/account-and-access.md)\n- [보안 모델](../guides/security.md)\n","features/personal-features_en.md":"# Personal Features (Grades / Schedule / Profile)\n\n> 한국어: [personal-features.md](./personal-features.md)\n\nFeatures handling personal user data. Grades are fully local, personal schedules live in sqflite, and profiles live in Firestore.\n\n## Grade Management\n\n### Tab Layout\n\n- **Susi (internal) / Jeongsi (standardized)** tabs, swipe-switchable\n- **Internal**: 5-grade system + A–E achievement tiers, per the 2022 curriculum revision\n- **Standardized**: 2022-curriculum subjects (Korean / Math / English / Korean History / Integrated Social Studies / Integrated Science + second foreign language)\n- **Private practice exams** supported\n\n### Visualization\n\n- **Trend chart**: `CustomPainter` line chart ([ADR-05](../guides/architecture-decisions_en.md#adr-05-charts-custompainter-directly))\n  - Toggle modes: grade / raw score / percentile / standard score\n  - Correctly renders inverted grade axis (lower = better)\n- **Per-subject goals** — grade (0.1 step for susi) / percentile (for jeongsi), managed separately\n- **Percentile → grade auto-conversion** (with dashed grade-cut lines)\n- **English / Korean History** (absolute-grade subjects) exclude percentile goals\n- Per-subject colors fixed in `lib/data/`\n\n### Storage\n\n- **Grades stored locally only** — never uploaded (`flutter_secure_storage`, [ADR-02](../guides/architecture-decisions_en.md#adr-02-sensitive-data-storage-flutter_secure_storage))\n- Android Keystore / iOS Keychain delegation\n- Plain legacy data → one-time migration on first launch\n\n**Files**: `lib/screens/sub/grade_screen.dart`, `grade_input_screen.dart`, `lib/providers/grade_provider.dart`, `test/grade_manager_test.dart`, `test/secure_storage_service_test.dart`\n\n## Personal Schedule\n\n- Integrated with the **custom monthly calendar** (see Public Features)\n- Single-day / multi-day, 6 presets + circular color picker\n- **sqflite** storage — offline-first, fast range queries\n- Visually distinct from NEIS academic events (dot vs bar)\n\n**Files**: `test/schedule_data_test.dart`\n\n## D-day\n\n- Days remaining until a target date\n- **Home-screen pinning** supported\n- sqflite-backed (same DB as schedules)\n\n**Files**: `lib/screens/sub/dday_screen.dart`, `test/dday_manager_test.dart`\n\n## Profile / Settings\n\n- **Profile picture** (uploaded to Cloud Storage, 256px compression)\n- Privacy consent, onboarding → login flow\n- Notification toggles — 5 categories (see [Community Features notifications](./community-features_en.md#notifications))\n- Theme (light / dark / system)\n- Meal notification time\n\n**Files**: `lib/screens/auth/profile_edit_screen.dart`, `profile_setup_screen.dart`, `lib/screens/sub/setting_screen.dart`, `notification_setting_screen.dart`, `onboarding_screen.dart`\n\n## New School-Year Update\n\n- Students/teachers see a March popup to update year/class/number\n- **Identity not user-changeable** (admin only — see [security_en.md](../guides/security_en.md))\n\n## Deletion\n\nDouble-confirmation dialog → full wipe:\n1. Delete subcollections (`users/{uid}/{subjects,sync,notifications}`)\n2. Delete `users/{uid}` document (while still authed)\n3. Delete Cloud Storage profile picture\n4. `user.delete()` — delete Auth account\n\nOrder matters — Auth first causes PERMISSION_DENIED ([Technical Challenge #10](../guides/technical-challenges_en.md#10-account-deletion-ordering-auth--firestore-permission-loss)).\n\n## See Also\n- [Public Features](./public-features_en.md)\n- [Community Features](./community-features_en.md)\n- [Admin Features](./admin-features_en.md)\n- [Account & Access](../guides/account-and-access_en.md)\n- [Security Model](../guides/security_en.md)\n","features/public-features.md":"# 공개 기능 (급식 / 시간표 / 일정 / 위젯 / 공지)\n\n> English: [public-features_en.md](./public-features_en.md)\n\n로그인 여부와 크게 무관하게 모든 사용자가 접하는 핵심 정보 기능들을 다룹니다. 로그인이 필요한 항목이 섞여 있어도, 학교의 공개 정보 성격이 강한 기능을 이 문서에 묶었습니다.\n\n## 급식 조회\n\n- **NEIS API** 기반 조식/중식/석식 메뉴 실시간 조회\n- **월간 프리페치** 캐시 (24시간 / 빈 결과 5분), Completer 패턴으로 동시 요청 방지 ([기술과제 #2](../guides/technical-challenges.md#2-급식-api-동시-요청-경합-race-condition))\n- 급식 카드 탭 → 이미지 공유, **영양 성분** (탄수화물/단백질/지방 등) + 알레르기 유발 식품 표시\n- 급식 알림에 메뉴 미리보기 포함 (로컬 알림 — 조식/중식/석식 개별 시간)\n\n**관련 파일**: `lib/screens/main/meal_screen.dart`, `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`, `test/meal_test.dart`\n\n### 캐시 전략\n\n| 상황 | TTL |\n|---|---|\n| 정상 응답 | 24시간 |\n| 빈 응답(주말/방학) | 5분 (과도한 재요청 방지) |\n| 오류 | 즉시 만료, 다음 접근 시 재시도 |\n\n## 시간표\n\n- **1학년**: 반별 자동 조회 / **2-3학년**: 선택과목 기반 맞춤 시간표\n- **교사 전용 시간표**: 학년 탭(1/2/3학년) → 과목 스와이프 → 중복 반 선택\n- **충돌 자동 감지** + 해결 팝업, 과목별 컬러 커스터마이징 (원형 피커) ([기술과제 #4](../guides/technical-challenges.md#4-선택과목-시간표-충돌-slot-conflict))\n- **현재 교시** 실시간 표시 (1분 갱신, 프로그레스 바), 오늘 요일 하이라이트\n- 선택과목 저장 확인 + 미저장 뒤로가기 경고\n- 새 학기(3월) 시간표 + 선택과목 자동 리셋\n\n**관련 파일**: `lib/screens/sub/timetable_view_screen.dart`, `lib/screens/sub/timetable_select_screen.dart`, `lib/screens/sub/teacher_timetable_select_screen.dart`, `test/timetable_api_test.dart`\n\n## 학사일정 & 개인일정\n\n- **커스텀 월간 캘린더** (스와이프 월 이동, 유동적 주 수, 한국어)\n- **연속 학사일정 바** (끊김 없이 이어지는 컬러 바 + 일정명 표시)\n- **개인일정** 하루/연속, **6색 + 원형 컬러피커** (밝기 조절)\n- **NEIS 학사일정** 자동 표시, 개인일정 색상 점\n- **D-day** 관리 + 홈 화면 핀 고정\n\n**저장소**: 개인 일정은 `sqflite`(로컬). 학사일정은 NEIS API 캐시.\n\n**관련 파일**: `lib/screens/main/home_screen.dart` (캘린더 위젯), `lib/screens/sub/dday_screen.dart`, `test/schedule_data_test.dart`, `test/dday_manager_test.dart`\n\n## 홈 화면 위젯 (Android)\n\n- **급식 위젯 (4×2)**: 오늘의 조식/중식/석식\n- **시간표 위젯 (3×2)**: 오늘의 시간표, 현재 교시 강조\n- **급식+시간표 통합 위젯 (5×2)**: 급식과 시간표를 한 화면에\n- 시스템 다크/라이트 모드 자동 대응\n- **자정 자동 갱신** (AlarmManager + Dart 백그라운드 콜백)\n- 앱 실행 시 자동 갱신, **Firestore 읽기 0** (캐시 데이터 활용)\n\n**관련 파일**: `android/app/src/main/java/.../widget/`, `lib/` 의 `home_widget` 브릿지 — 자세한 네이티브 동기화는 [기술과제 #참고](../guides/technical-challenges.md) 참조.\n\n## 홈 화면 위젯 (iOS)\n\n- **급식 위젯 (Medium)**: 오늘의 조식/중식/석식\n- **시간표 위젯 (Medium)**: 오늘의 시간표, 현재 교시 강조\n- **급식+시간표 통합 위젯 (Large)**: 급식과 시간표를 한 화면에\n- **SwiftUI + WidgetKit** 네이티브 구현\n- App Groups를 통한 Flutter ↔ 위젯 데이터 공유\n- 시스템 다크/라이트 모드 자동 대응\n- 1시간 주기 Timeline 갱신\n\n**관련 파일**: `ios/Widget*/`, App Groups 설정은 [DEPLOY.md](../../DEPLOY.md) 참조.\n\n## 긴급 팝업 공지\n\n- 앱 실행 시 **모달 팝업**으로 중요 공지 표시\n- **3종 타입**: 긴급(빨강), 공지(파랑), 이벤트(초록)\n- **시작/종료일** 설정 → 기간 외 자동 비활성화\n- **\"오늘 안 보기\"** 지원 (관리자 설정으로 비활성화 가능)\n- 앱 Admin 화면 + Admin Web에서 작성/관리\n\n**저장 위치**: `app_config/announcement` (Firestore). 자세한 관리는 [admin-features.md](./admin-features.md).\n\n## 앱 업데이트 & 오프라인\n\n- **업데이트 체커**: Firestore `app_config/version`에서 최신/최소 버전 비교\n  - **필수 업데이트**: 닫기 불가 다이얼로그 + 스토어 이동\n  - **선택 업데이트**: \"나중에\" 버튼 포함 안내 다이얼로그\n  - 버전 비교 로직 (`major.minor.patch`)\n- **오프라인 배너**: 네트워크 끊기면 상단에 빨간 \"오프라인 상태입니다\" 표시, 재연결 시 자동 소멸\n- **오프라인 캐시**: 급식/시간표는 로컬 캐시로 오프라인에서도 조회 가능\n\n**관련 파일**: `lib/main.dart` (초기화 체크), `lib/data/setting_data.dart`, 연결성은 `connectivity_plus` 패키지.\n\n## 공지 목록\n\n- **학교 공지** 섹션 (`lib/screens/main/notice_screen.dart`)\n- 관리자가 작성하는 공식 공지 (게시판과 분리)\n- 첨부 파일 / 중요 표시 지원\n\n## 관련 문서\n- [엔드유저 가이드](../../USER_GUIDE.md) — 실제 사용 방법\n- [커뮤니티 기능](./community-features.md) — 게시판/채팅 등 로그인 필요 기능\n- [개인 기능](./personal-features.md) — 성적/개인일정 등 개인화 기능\n- [데이터 모델](../guides/data-model.md) — `app_config`, `users` 스키마\n","features/public-features_en.md":"# Public Features (Meals / Timetable / Schedule / Widgets / Announcements)\n\n> 한국어: [public-features.md](./public-features.md)\n\nCore information features any user encounters. Some require login, but they all fall under \"public information\" in spirit.\n\n## Meals\n\n- **NEIS API**-based real-time breakfast/lunch/dinner lookup\n- **Monthly prefetch** cache (24h / 5min for empty results); Completer pattern avoids concurrent duplicate fetches ([Technical Challenge #2](../guides/technical-challenges_en.md#2-meal-api-concurrent-request-race-condition))\n- Tap a meal card → share as image; shows **nutrition** (carb/protein/fat) + allergen info\n- Meal notifications include a menu preview (local notifications, per-meal schedulable)\n\n**Files**: `lib/screens/main/meal_screen.dart`, `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`, `test/meal_test.dart`\n\n### Cache Strategy\n\n| Case | TTL |\n|---|---|\n| Success response | 24 hours |\n| Empty (weekend/break) | 5 minutes (avoid over-refetching) |\n| Error | expire immediately, retry on next access |\n\n## Timetable\n\n- **1st year**: auto by class. **2nd/3rd year**: custom based on selected electives\n- **Teacher view**: year tabs (1/2/3) → swipe subjects → pick among duplicated classes\n- **Auto slot-conflict detection** + resolution dialog; per-subject color customization ([Technical Challenge #4](../guides/technical-challenges_en.md#4-timetable-elective-slot-conflicts))\n- **Current period** live highlight (1-min refresh, progress bar); today's column highlighted\n- Elective save confirmation + unsaved back-nav warning\n- Auto-reset in March (new semester) for timetable + electives\n\n**Files**: `lib/screens/sub/timetable_view_screen.dart`, `timetable_select_screen.dart`, `teacher_timetable_select_screen.dart`, `test/timetable_api_test.dart`\n\n## Academic & Personal Schedule\n\n- **Custom monthly calendar** (swipe to change months, variable week count, Korean locale)\n- **Continuous academic-event bar** (unbroken colored bar + event name)\n- **Personal events** single/multi-day, **6 presets + circular color picker** (with brightness)\n- **NEIS academic events** shown automatically; personal events as colored dots\n- **D-day** management + home-screen pinning\n\n**Storage**: personal events in `sqflite` (local). Academic events cached from NEIS.\n\n**Files**: `lib/screens/main/home_screen.dart` (calendar widget), `lib/screens/sub/dday_screen.dart`, `test/schedule_data_test.dart`, `test/dday_manager_test.dart`\n\n## Android Home Widgets\n\n- **Meal widget (4×2)**: today's breakfast/lunch/dinner\n- **Timetable widget (3×2)**: today's schedule, current period highlighted\n- **Combined widget (5×2)**: meal + timetable together\n- System dark/light mode auto-matched\n- **Auto-refresh at midnight** (AlarmManager + Dart background callback)\n- Refresh on app launch; **0 Firestore reads** (uses cached data)\n\n**Files**: `android/app/src/main/java/.../widget/`, Flutter ↔ native bridge via `home_widget`.\n\n## iOS Home Widgets\n\n- **Meal widget (Medium)**: today's breakfast/lunch/dinner\n- **Timetable widget (Medium)**: today's schedule, current period highlighted\n- **Combined widget (Large)**: meal + timetable together\n- **SwiftUI + WidgetKit** native implementation\n- App Groups for Flutter ↔ widget data sharing\n- System dark/light auto-matched\n- Hourly Timeline refresh\n\n**Files**: `ios/Widget*/`. App Groups setup in [DEPLOY_en.md](../../DEPLOY_en.md).\n\n## Urgent Popup Announcements\n\n- Modal popup shown on app launch for high-priority news\n- **3 types**: urgent (red), notice (blue), event (green)\n- **Start/end dates** — automatically dormant outside the window\n- **\"Hide for today\"** supported (admin can disable)\n- Authored via Flutter Admin screen + Admin Web\n\n**Storage**: `app_config/announcement` (Firestore). See [admin-features_en.md](./admin-features_en.md).\n\n## App Update & Offline\n\n- **Update checker**: compares Firestore `app_config/version` against the installed version\n  - **Mandatory**: non-dismissible dialog + store link\n  - **Optional**: dialog with \"Later\"\n  - Version comparison over `major.minor.patch`\n- **Offline banner**: red \"offline\" banner at top when network drops, auto-dismiss on reconnect\n- **Offline cache**: meals/timetable visible offline via local cache\n\n**Files**: `lib/main.dart` (startup check), `lib/data/setting_data.dart`, connectivity via `connectivity_plus`.\n\n## Announcements List\n\n- School announcements section (`lib/screens/main/notice_screen.dart`)\n- Admin-authored official notices (separate from board)\n- Attachments / importance flag supported\n\n## See Also\n- [User Guide](../../USER_GUIDE_en.md)\n- [Community Features](./community-features_en.md)\n- [Personal Features](./personal-features_en.md)\n- [Data Model](../guides/data-model_en.md) — `app_config`, `users` schema\n","guides/account-and-access.md":"# 인증 & 접근 제어\n\n> English: [account-and-access_en.md](./account-and-access_en.md)\n\n한솔고 앱의 인증, 역할, 승인 플로우, 정지/탈퇴 절차를 정리합니다.\n\n## 인증 방식 — 4종 OAuth\n\n| Provider | 구현 방식 |\n|---|---|\n| **Google** | `google_sign_in` + Firebase Auth 직접 |\n| **Apple** | `sign_in_with_apple` + Firebase Auth 직접 |\n| **Kakao** | `kakao_flutter_sdk_user` → 자체 Cloud Function (`kakaoCustomAuth`) → Firebase Custom Token |\n| **GitHub** | Firebase Auth OAuth provider |\n\n비밀번호는 저장하지 않습니다. 각 Provider의 OAuth token만 사용.\n\n### Kakao 커스텀 토큰 플로우\n\n```mermaid\nsequenceDiagram\n    participant App as Flutter App\n    participant Kakao as Kakao OAuth\n    participant CF as Cloud Function<br/>kakaoCustomAuth\n    participant Auth as Firebase Auth\n\n    App->>Kakao: 로그인 → access token\n    App->>CF: POST {token}\n    CF->>Kakao: GET /v2/user/me\n    Kakao-->>CF: profile (id, email, nickname)\n    CF->>Auth: createUser(uid=kakao:ID) if new\n    CF->>Auth: createCustomToken(uid)\n    CF-->>App: {firebaseToken}\n    App->>Auth: signInWithCustomToken(firebaseToken)\n```\n\n- zod 스키마로 입력 검증 (`KakaoAuthSchema`)\n- 프로필 사진은 Firestore `users/{uid}.profilePhotoUrl` 에 저장 (없는 경우만)\n\n## 신분 (`userType`)\n\n가입 시 선택:\n- `student` — 재학생 (학번 입력 필수)\n- `alumni` — 졸업생\n- `teacher` — 교사\n- `parent` — 학부모\n\n신분에 따라 기본 역할 = `user`. 이후 관리자 승인 절차.\n\n## 역할 체계\n\n| `role` | 권한 |\n|---|---|\n| `user` | 일반 기능 (승인 후) |\n| `manager` | 사용자 관리 + 콘텐츠 모더레이션 (정지 권한 제한) |\n| `admin` | 모든 권한 (역할 부여 포함) |\n\n**승급/강등**: `admin`만 가능. 감사 로그(`admin_logs`)에 이전→이후 기록.\n\n## 가입 & 승인 플로우\n\n```mermaid\ngraph LR\n    A[OAuth 로그인] --> B{프로필 존재?}\n    B -->|no| C[프로필 셋업<br/>신분/학번/이름]\n    B -->|yes| D{approved?}\n    C --> E[approved: false로 저장]\n    E --> F[승인 대기 화면]\n    D -->|yes| G[홈 진입]\n    D -->|no| F\n    F -.->|관리자 승인| D\n    F -.->|관리자 거절| H[계정 비활성]\n```\n\n- 승인 대기 중에는 일반 기능 차단 (규칙 + 클라이언트 가드)\n- 관리자가 Admin 화면에서 승인 → `onUserUpdated` 트리거 → 승인 푸시\n\n## 정지 & 해제\n\n- **정지 기간**: 1시간 / 6시간 / 1일 / 3일 / 7일 / 30일 / 영구\n- 필드: `users/{uid}.suspendedUntil` (timestamp)\n- 정지 중에는 글/댓글/채팅 작성 차단 (rules + 클라이언트)\n\n### 자동 해제\n\nCloud Functions 스케줄러 (`checkSuspensionExpiry`, 매시간):\n1. `suspendedUntil <= now` 조회\n2. 필드 삭제\n3. `onUserUpdated` 트리거 → 해제 푸시 발송\n\n## 탈퇴\n\n이중 확인 다이얼로그 → 완전 삭제:\n1. 하위 컬렉션 (`users/{uid}/{subjects,sync,notifications}`) 삭제\n2. `users/{uid}` 문서 삭제 (인증 상태 유지 중)\n3. Cloud Storage 프로필 사진 삭제\n4. `user.delete()` — Auth 계정 삭제\n\n순서가 중요: Auth 먼저 삭제 시 Firestore에서 PERMISSION_DENIED ([기술과제 #10](./technical-challenges.md#10-계정-삭제-순서-문제)).\n\n## 로그인 상태 이슈\n\n### 토큰 전파 지연\n\nOAuth 직후 Firestore 접근 시 PERMISSION_DENIED 가능. `getIdToken(true)`로 강제 갱신 + 최대 3회 재시도 ([기술과제 #1](./technical-challenges.md#1-firebase-auth-토큰-동기화-문제)).\n\n### 새 학기 업데이트\n\n재학생/교사는 3월에 학년/반/번호 입력 팝업 표시. 역할은 변경 불가.\n\n## 역할별 기능 매트릭스\n\n| 기능 | user | manager | admin |\n|---|:---:|:---:|:---:|\n| 글/댓글 작성 | ✅ | ✅ | ✅ |\n| 글/댓글 삭제 (타인) | ❌ | ✅ | ✅ |\n| 사용자 승인 | ❌ | ✅ | ✅ |\n| 사용자 정지 | ❌ | ❌ (설정에 따라) | ✅ |\n| 역할 변경 | ❌ | ❌ | ✅ |\n| 공지 고정 | ❌ | ✅ | ✅ |\n| 긴급 팝업 관리 | ❌ | ❌ | ✅ |\n| Admin Web 접근 | ❌ | ✅ | ✅ |\n| 신고 처리 | ❌ | ✅ | ✅ |\n| 감사 로그 조회 | ❌ | ✅ (읽기) | ✅ |\n\n상세 규칙은 [security.md](./security.md) 참조.\n\n## 관련 문서\n- [보안 모델](./security.md)\n- [관리자 기능](../features/admin-features.md)\n- [데이터 모델](./data-model.md) — `users` 스키마 상세\n- [엔드유저 가이드](../../USER_GUIDE.md)\n","guides/account-and-access_en.md":"# Account & Access Control\n\n> 한국어: [account-and-access.md](./account-and-access.md)\n\nAuthentication, roles, approval flow, and suspension/deletion procedures for the Hansol HS app.\n\n## Authentication — 4 OAuth Providers\n\n| Provider | Implementation |\n|---|---|\n| **Google** | `google_sign_in` + Firebase Auth direct |\n| **Apple** | `sign_in_with_apple` + Firebase Auth direct |\n| **Kakao** | `kakao_flutter_sdk_user` → custom Cloud Function (`kakaoCustomAuth`) → Firebase custom token |\n| **GitHub** | Firebase Auth OAuth provider |\n\nNo passwords are ever stored — only OAuth tokens.\n\n### Kakao Custom Token Flow\n\n```mermaid\nsequenceDiagram\n    participant App as Flutter App\n    participant Kakao as Kakao OAuth\n    participant CF as Cloud Function<br/>kakaoCustomAuth\n    participant Auth as Firebase Auth\n\n    App->>Kakao: Login → access token\n    App->>CF: POST {token}\n    CF->>Kakao: GET /v2/user/me\n    Kakao-->>CF: profile (id, email, nickname)\n    CF->>Auth: createUser(uid=kakao:ID) if new\n    CF->>Auth: createCustomToken(uid)\n    CF-->>App: {firebaseToken}\n    App->>Auth: signInWithCustomToken(firebaseToken)\n```\n\n- Zod schema (`KakaoAuthSchema`) validates input\n- Profile picture saved to Firestore `users/{uid}.profilePhotoUrl` only if missing\n\n## Identity (`userType`)\n\nChosen at signup:\n- `student` — current student (student ID required)\n- `alumni` — graduate\n- `teacher` — teacher\n- `parent` — parent/guardian\n\nDefault `role = user` regardless of identity. Admin approval follows.\n\n## Roles\n\n| `role` | Scope |\n|---|---|\n| `user` | General features (after approval) |\n| `manager` | User management + content moderation (limited suspension) |\n| `admin` | Everything (including granting roles) |\n\n**Promotion/demotion**: admin-only. Each change is logged in `admin_logs` (before → after).\n\n## Signup & Approval Flow\n\n```mermaid\ngraph LR\n    A[OAuth login] --> B{profile exists?}\n    B -->|no| C[profile setup<br/>identity / student ID / name]\n    B -->|yes| D{approved?}\n    C --> E[save with approved: false]\n    E --> F[waiting screen]\n    D -->|yes| G[enter home]\n    D -->|no| F\n    F -.->|admin approves| D\n    F -.->|admin rejects| H[disabled account]\n```\n\n- Un-approved users are blocked from most features (rules + client guards)\n- Admin approval via Admin screen → `onUserUpdated` trigger → approval push\n\n## Suspension & Unsuspension\n\n- **Durations**: 1h / 6h / 1d / 3d / 7d / 30d / permanent\n- Field: `users/{uid}.suspendedUntil` (timestamp)\n- During suspension, post/comment/chat creation is blocked (rules + client)\n\n### Auto-Unsuspension\n\nCloud Functions scheduler (`checkSuspensionExpiry`, hourly):\n1. Query `suspendedUntil <= now`\n2. Delete the field\n3. `onUserUpdated` trigger → unsuspension push\n\n## Deletion\n\nDouble confirmation, then full wipe:\n1. Delete subcollections (`users/{uid}/{subjects,sync,notifications}`)\n2. Delete `users/{uid}` document (while still authed)\n3. Delete profile picture from Cloud Storage\n4. `user.delete()` — delete Auth account\n\nOrder matters: deleting Auth first causes Firestore PERMISSION_DENIED ([Technical Challenge #10](./technical-challenges_en.md#10-account-deletion-ordering-auth--firestore-permission-loss)).\n\n## Login-State Gotchas\n\n### Token Propagation\n\nFirestore access right after OAuth may fail with PERMISSION_DENIED. We force-refresh via `getIdToken(true)` and retry up to 3 times ([Technical Challenge #1](./technical-challenges_en.md#1-firebase-auth-token-propagation-permission-denied)).\n\n### March School-Year Update\n\nStudents/teachers see a popup in March to update year/class/number. Identity is not user-changeable.\n\n## Role-feature Matrix\n\n| Feature | user | manager | admin |\n|---|:---:|:---:|:---:|\n| Create post/comment | ✅ | ✅ | ✅ |\n| Delete others' post/comment | ❌ | ✅ | ✅ |\n| Approve users | ❌ | ✅ | ✅ |\n| Suspend users | ❌ | ❌ (configurable) | ✅ |\n| Change roles | ❌ | ❌ | ✅ |\n| Pin announcements | ❌ | ✅ | ✅ |\n| Manage urgent popup | ❌ | ❌ | ✅ |\n| Admin Web access | ❌ | ✅ | ✅ |\n| Handle reports | ❌ | ✅ | ✅ |\n| View audit logs | ❌ | ✅ (read) | ✅ |\n\nFull rules detail: [security_en.md](./security_en.md).\n\n## See Also\n- [Security Model](./security_en.md)\n- [Admin Features](../features/admin-features_en.md)\n- [Data Model](./data-model_en.md) — full `users` schema\n- [User Guide](../../USER_GUIDE_en.md)\n","guides/architecture-decisions.md":"# 아키텍처 의사결정 일지 (ADR)\n\n> English: [architecture-decisions_en.md](./architecture-decisions_en.md)\n\n각 결정은 *왜 다른 후보가 아니라 이 선택인가* 를 짧게 정리합니다. 새 ADR을 추가할 때는 문서 하단 템플릿을 사용하세요.\n\n## 목차\n\n- [ADR-01. 상태관리: Riverpod 2.5](#adr-01-상태관리-riverpod-25-vs-provider--bloc--getx)\n- [ADR-02. 민감 데이터 저장소: flutter_secure_storage](#adr-02-민감-데이터-저장소-flutter_secure_storage-vs-sharedpreferences)\n- [ADR-03. 게시판 검색: 클라이언트 n-gram 인덱싱](#adr-03-게시판-검색-클라이언트-n-gram-인덱싱-vs-algolia--typesense--클라이언트-필터)\n- [ADR-04. 좋아요 카운터: Map<uid,bool> + 비정규화 int](#adr-04-좋아요-카운터-mapuidbool--비정규화-int-vs-map-only--int-only)\n- [ADR-05. 차트: CustomPainter 직접 구현](#adr-05-차트-custompainter-직접-구현-vs-fl_chart--syncfusion)\n- [ADR-06. 저장소 분담: SQLite / Firestore / SecureStorage / Cloud Storage](#adr-06-저장소-분담-sqlite--firestore--securestorage--cloud-storage)\n- [ADR-07. DI: GetIt + 추상 Repository](#adr-07-di-getit--추상-repository-vs-riverpod-provider만--get_it-직접만)\n- [ADR-08. 테스트 전략: Unit + Provider + Widget + Rules 4계층](#adr-08-테스트-전략-unit--provider--widget--rules-4계층)\n\n---\n\n## ADR-01. 상태관리: Riverpod 2.5 (vs Provider / BLoC / GetX)\n\n- **선택 이유**: 컴파일 타임 안전성(`ref.watch`), `family`/`autoDispose` 조합, AsyncNotifier로 로딩/에러 분기 코드를 줄여줌\n- **버린 옵션**:\n  - *Provider* — 상태가 깊어질수록 `Consumer` boilerplate 증가, AsyncValue 미지원\n  - *BLoC* — Stream 기반이라 단순 CRUD에도 Event/State class 양산, 학습 곡선\n  - *GetX* — DI/네비/i18n까지 한 패키지에 묶여 있어 lock-in 위험\n- **트레이드오프**: `riverpod_generator` 코드 생성 의존, `ref` 객체를 비위젯 코드에 노출하지 않도록 별도 Manager 계층 유지\n- **관련 파일**: `lib/providers/*.dart`, `pubspec.yaml` (`flutter_riverpod`, `riverpod_annotation`, `riverpod_generator`)\n\n---\n\n## ADR-02. 민감 데이터 저장소: flutter_secure_storage (vs SharedPreferences)\n\n- **대상**: 성적 (사용자 식별 가능 + 학교 맥락에서 민감)\n- **선택 이유**: Android Keystore / iOS Keychain 위임으로 OS 수준 암호화. SharedPreferences는 평문 XML/plist\n- **마이그레이션**: 기존 평문 데이터 → 첫 실행 시 1회 자동 이전(`migrateFromPlain`), 구 키 삭제. 회귀 방지용 unit test 8개\n- **버린 옵션**: 전체 Firestore 동기화 — 성적은 *완전 로컬*이 사용자 신뢰에 더 부합\n- **관련 파일**: `lib/data/secure_storage_service.dart`, `test/secure_storage_service_test.dart`\n\n---\n\n## ADR-03. 게시판 검색: 클라이언트 n-gram 인덱싱 (vs Algolia / Typesense / 클라이언트 필터)\n\n- **선택 이유**: Firestore는 LIKE/full-text 미지원. 외부 검색 인프라 추가 없이 글 저장 시 제목+본문을 2-gram으로 분해해 `searchTokens` 배열에 저장 → `array-contains-any` 쿼리. 한국어 단어 구분 모호성에도 강함\n- **상한**: doc당 200 토큰 / query당 10 토큰 (Firestore array-contains-any 한계 = 30)\n- **버린 옵션**:\n  - *Algolia/Typesense* — 월 비용 + 인프라 추가, 학교 앱 규모엔 과도\n  - *클라이언트 필터* — 페이지네이션된 20건만 검색됨 → 전체 검색 불가능\n- **남은 한계**: 토큰 매칭이라 false positive 가능 → fetch 후 클라이언트 substring 1차 필터\n- **관련 파일**: `test/search_tokens_test.dart`, `test/search_history_service_test.dart`\n\n---\n\n## ADR-04. 좋아요 카운터: Map<uid,bool> + 비정규화 int (vs Map only / int only)\n\n- **선택 이유**: 두 표현을 동시에 보유. `likes: {uid: true}` 는 \"내가 눌렀는가\" O(1) 조회용, `likeCount: int` 는 인기글 정렬용 (orderBy 가능)\n- **동기화**: `_toggleLike`에서 `FieldValue.increment(±1)` + Map dot-path 업데이트를 단일 트랜잭션으로 묶음. legacy 글은 `_ensureLikesMap`에서 Map size로 lazy backfill\n- **rules 검증**: `validCounterDelta('likeCount')`에 `resource.data.get(field, 0)` 사용하여 기존 글 호환 + ±1 delta 강제\n- **버린 옵션**:\n  - *Map only* — 카운트 정렬 불가 (Firestore가 array length 기준 orderBy 불가)\n  - *int only* — \"내가 눌렀는가\" 확인용 별도 컬렉션 필요 → 읽기 비용 ↑\n- **관련 파일**: `firestore.rules` (`validCounterDelta`), `firestore.indexes.json` (`likeCount DESC + createdAt DESC`)\n\n---\n\n## ADR-05. 차트: CustomPainter 직접 구현 (vs fl_chart / syncfusion)\n\n- **선택 이유**: 성적 추이 그래프는 등급 스케일 반전(낮을수록 좋음), 영어/한국사 절대평가 분기, 등급컷 점선, 과목별 색상 등 *비표준 요구사항*이 많음. 라이브러리 wrapper에 맞추는 것보다 Canvas로 직접 그리는 것이 간단\n- **장점**: 의존성 0개, APK 사이즈 영향 0\n- **트레이드오프**: 새 차트 추가 시 재사용성 낮음 → 향후 공부 통계 등에서 차트가 늘어나면 fl_chart 도입 재검토\n- **관련 파일**: `lib/screens/sub/grade_screen.dart` (CustomPainter 구현부)\n\n---\n\n## ADR-06. 저장소 분담: SQLite / Firestore / SecureStorage / Cloud Storage\n\n| 저장소 | 용도 | 이유 |\n|---|---|---|\n| **sqflite** | 개인 일정 (시간/색상/연속 일자) | Row 단위 시간 범위 쿼리 + 오프라인 우선 |\n| **Firestore** | 글/댓글/채팅/신고/사용자 프로필 | 실시간 sync + 다중 클라이언트 + Cloud Functions 트리거 |\n| **SecureStorage** | 성적 | OS 암호화 + 완전 로컬 |\n| **Cloud Storage** | 게시글·프로필 이미지 | CDN + 직접 다운로드 URL |\n\n각각 명확한 단일 용도 → 코드에서 \"이 데이터는 어디에 있는가\" 헷갈리지 않음. 상세 스키마는 [data-model.md](./data-model.md) 참조.\n\n---\n\n## ADR-07. DI: GetIt + 추상 Repository (vs Riverpod Provider만 / get_it 직접만)\n\n- **선택 이유**: Riverpod은 위젯 트리 의존, 비위젯 코드(Manager, Cloud Functions 트리거 핸들러)에서 쓰기 어색. GetIt은 service locator로 어디서나 호출 가능\n- **혼용 규칙**: 위젯 → Riverpod, Manager/Repository → GetIt. 테스트는 `setupServiceLocator()` / `resetServiceLocator()` 로 Mock 주입\n- **버린 옵션**:\n  - *Riverpod Provider 단독* — 비위젯 코드에서 ref 전달이 번거로움\n  - *get_it 단독* — 위젯 rebuild가 자동으로 안 됨\n- **관련 파일**: `test/auth_repository_test.dart` (점진적 DI 마이그레이션 데모)\n\n---\n\n## ADR-08. 테스트 전략: Unit + Provider + Widget + Rules 4계층\n\n- **`test()` 단위 (440)**: 모델/유틸/파서/Provider/Repository/Golden 포함. `ProviderContainer`로 위젯 없이 AsyncNotifier 검증, Mock 주입으로 외부 의존 0\n- **`testWidgets()` 위젯 (80)**: `ProviderScope.overrides`로 Mock notifier 주입, 로딩/에러/빈 분기 검증\n- **Golden (`matchesGoldenFile`)**: PostCard 스냅샷 비교 (`fake_cloud_firestore` + tolerance comparator) — `test()` 내부 포함\n- **Integration (4)**: `integration_test/`에서 앱 네비게이션 E2E\n- **Firestore Rules (34)**: `@firebase/rules-unit-testing` + 에뮬레이터로 보안 규칙 자체를 검증. 코드 변경 없이 rules 회귀 방지\n- **버린 옵션**: 통합 테스트 전체 의존 (Firebase Auth 실로그인) — CI 비용 ↑, 플레이크 ↑\n- **합계**: 524 (Flutter) + 34 (Rules) = **558개**. 상세 분류는 [testing.md](./testing.md) 참조.\n\n---\n\n## 새 ADR 추가 템플릿\n\n```md\n## ADR-NN. 결정 제목 (vs 대안1 / 대안2)\n\n- **선택 이유**: 한두 문장 요약\n- **버린 옵션**:\n  - *대안1* — 포기 이유\n  - *대안2* — 포기 이유\n- **트레이드오프**: 선택의 비용\n- **관련 파일**: `path/to/file.dart`, `path/to/other.rules`\n```\n\n- 번호는 기존 최대값 + 1\n- \"왜 이 방향\"보다 \"왜 다른 방향이 아닌가\"에 중점\n","guides/architecture-decisions_en.md":"# Architecture Decision Records (ADRs)\n\n> 한국어: [architecture-decisions.md](./architecture-decisions.md)\n\nEach entry captures *why this option rather than the alternatives*. New ADRs follow the template at the bottom.\n\n## Index\n\n- [ADR-01. State Management: Riverpod 2.5](#adr-01-state-management-riverpod-25)\n- [ADR-02. Sensitive Data Storage: flutter_secure_storage](#adr-02-sensitive-data-storage-flutter_secure_storage)\n- [ADR-03. Board Search: Client-side n-gram Indexing](#adr-03-board-search-client-side-n-gram-indexing)\n- [ADR-04. Like Counter: `Map<uid,bool>` + Denormalized int](#adr-04-like-counter-mapuidbool--denormalized-int)\n- [ADR-05. Charts: CustomPainter Directly](#adr-05-charts-custompainter-directly)\n- [ADR-06. Storage Allocation](#adr-06-storage-allocation)\n- [ADR-07. DI: GetIt + Abstract Repository](#adr-07-di-getit--abstract-repository)\n- [ADR-08. Test Strategy: Unit + Provider + Widget + Rules](#adr-08-test-strategy-unit--provider--widget--rules)\n\n---\n\n## ADR-01. State Management: Riverpod 2.5 (vs Provider / BLoC / GetX)\n\n- **Chosen because**: compile-time safety (`ref.watch`), composition via `family`/`autoDispose`, AsyncNotifier shrinks loading/error branch boilerplate\n- **Rejected**:\n  - *Provider* — `Consumer` boilerplate compounds with depth, no AsyncValue\n  - *BLoC* — stream-based ceremony (Event/State classes) even for simple CRUD, steep curve\n  - *GetX* — bundles DI/navigation/i18n, lock-in risk\n- **Trade-off**: `riverpod_generator` codegen dependency; we keep `ref` out of non-widget code by enforcing a separate Manager layer\n- **Related files**: `lib/providers/*.dart`, `pubspec.yaml` (`flutter_riverpod`, `riverpod_annotation`, `riverpod_generator`)\n\n---\n\n## ADR-02. Sensitive Data Storage: flutter_secure_storage (vs SharedPreferences)\n\n- **Target**: grades (identifiable + sensitive in school context)\n- **Chosen because**: delegates to Android Keystore / iOS Keychain for OS-level encryption. SharedPreferences stores plain XML/plist\n- **Migration**: 1-time `migrateFromPlain` on first launch, old keys cleared; 8 regression tests guard\n- **Rejected**: Firestore sync — grades are more trustworthy as *fully local*\n- **Related files**: `lib/data/secure_storage_service.dart`, `test/secure_storage_service_test.dart`\n\n---\n\n## ADR-03. Board Search: Client-side n-gram Indexing (vs Algolia / Typesense / Client Filter)\n\n- **Chosen because**: Firestore has no LIKE / full-text. On write we 2-gram the title+body into `searchTokens` → query via `array-contains-any`. No external search infra. Robust against Korean word-boundary ambiguity\n- **Caps**: 200 tokens/doc, 10 tokens/query (Firestore `array-contains-any` limit = 30)\n- **Rejected**:\n  - *Algolia/Typesense* — monthly cost + extra infra, overkill at school-app scale\n  - *Client filter* — only the paginated 20 items are searched, full-corpus impossible\n- **Known limit**: token matching can produce false positives → post-fetch substring filter on the client\n- **Related files**: `test/search_tokens_test.dart`, `test/search_history_service_test.dart`\n\n---\n\n## ADR-04. Like Counter: `Map<uid,bool>` + Denormalized int (vs Map-only / int-only)\n\n- **Chosen because**: keep both representations. `likes: {uid: true}` → O(1) \"did I like?\" lookup. `likeCount: int` → sortable for Popular tab (`orderBy`)\n- **Sync**: `_toggleLike` wraps `FieldValue.increment(±1)` + map dot-path write in a single transaction. Legacy docs lazy-backfill via `_ensureLikesMap` reading Map size\n- **Rules**: `validCounterDelta('likeCount')` uses `resource.data.get(field, 0)` for backward compat and enforces ±1 delta\n- **Rejected**:\n  - *Map only* — Firestore can't `orderBy` array length\n  - *int only* — \"did I like?\" needs a separate collection → read cost ↑\n- **Related files**: `firestore.rules` (`validCounterDelta`), `firestore.indexes.json` (`likeCount DESC + createdAt DESC`)\n\n---\n\n## ADR-05. Charts: CustomPainter Directly (vs fl_chart / syncfusion)\n\n- **Chosen because**: grade charts have *non-standard* requirements — inverted grade axis (lower = better), English/KoreanHistory absolute-grade branch, grade-cut dashed lines, per-subject colors. Painting on Canvas is simpler than shoehorning into a library wrapper\n- **Pros**: zero deps, zero APK size impact\n- **Trade-off**: poor reuse. Revisit fl_chart if we add more chart types (study stats, etc.)\n- **Related files**: `lib/screens/sub/grade_screen.dart` (CustomPainter block)\n\n---\n\n## ADR-06. Storage Allocation: SQLite / Firestore / SecureStorage / Cloud Storage\n\n| Store | Purpose | Rationale |\n|---|---|---|\n| **sqflite** | Personal schedules (time/color/span) | row-level range queries + offline-first |\n| **Firestore** | Posts / comments / chats / reports / user profiles | realtime sync + multi-client + Cloud Functions triggers |\n| **SecureStorage** | Grades | OS-level encryption + fully local |\n| **Cloud Storage** | Post / profile images | CDN + direct download URLs |\n\nOne clear purpose per store → \"where does this data live?\" is never ambiguous. Schema details in [data-model_en.md](./data-model_en.md).\n\n---\n\n## ADR-07. DI: GetIt + Abstract Repository (vs Riverpod-only / get_it-only)\n\n- **Chosen because**: Riverpod is widget-tree-bound, awkward in non-widget code (Managers, Cloud Function trigger handlers). GetIt is a service locator usable anywhere\n- **Mixing rule**: widgets → Riverpod; Managers/Repositories → GetIt. Tests use `setupServiceLocator()` / `resetServiceLocator()` for mock injection\n- **Rejected**:\n  - *Riverpod alone* — passing `ref` around non-widget code is awkward\n  - *GetIt alone* — no automatic widget rebuilds\n- **Related files**: `test/auth_repository_test.dart` (gradual DI migration demo)\n\n---\n\n## ADR-08. Test Strategy: Unit + Provider + Widget + Rules (4 layers)\n\n- **`test()` unit (440)**: models / utils / parsers / Provider / Repository / Golden. `ProviderContainer` verifies AsyncNotifier without a widget tree; mock injection keeps external deps at zero\n- **`testWidgets()` widget (80)**: `ProviderScope.overrides` injects mock notifiers; loading / error / empty branches\n- **Golden (`matchesGoldenFile`)**: PostCard snapshot PNG comparison (`fake_cloud_firestore` + tolerance comparator) — counted inside `test()`\n- **Integration (4)**: `integration_test/` for app-level navigation E2E\n- **Firestore Rules (34)**: `@firebase/rules-unit-testing` + emulator — validates rules themselves (regression-proof even without code changes)\n- **Rejected**: full integration with real Firebase Auth — CI cost ↑, flake ↑\n- **Totals**: 524 (Flutter) + 34 (Rules) = **558**. Full breakdown in [testing_en.md](./testing_en.md)\n\n---\n\n## Template for New ADRs\n\n```md\n## ADR-NN. Decision Title (vs alt1 / alt2)\n\n- **Chosen because**: one or two sentences\n- **Rejected**:\n  - *alt1* — why it lost\n  - *alt2* — why it lost\n- **Trade-off**: what the choice costs\n- **Related files**: `path/to/file.dart`, `path/to/other.rules`\n```\n\n- Number = previous max + 1\n- Emphasize *why not the alternative* more than *why this*\n","guides/architecture-overview.md":"# 아키텍처 개요\n\n> English: [architecture-overview_en.md](./architecture-overview_en.md)\n\n한솔고 앱은 **Flutter 모바일 + Next.js 관리자 대시보드** 듀얼 클라이언트가 **Firebase** 공통 백엔드를 공유하는 구조다. 이 문서는 시스템 전체 그림, Riverpod 상태 그래프, 데이터 흐름 계층 모델을 한 곳에서 설명한다.\n\n## 시스템 다이어그램\n\n```mermaid\ngraph TD\n    subgraph Client\n        A[Flutter App<br/>Android / iOS]\n        B[Next.js Admin<br/>TypeScript + Tailwind]\n    end\n\n    subgraph Firebase\n        C[Auth<br/>Google / Apple / Kakao / GitHub]\n        D[Firestore<br/>실시간 DB]\n        E[Storage<br/>이미지 / 프로필]\n        F[FCM<br/>푸시 알림]\n        G[Crashlytics<br/>크래시 모니터링]\n    end\n\n    subgraph Server\n        H[Cloud Functions<br/>Node.js]\n        I[Scheduler<br/>정지 해제 체크]\n    end\n\n    J[NEIS API<br/>급식 / 시간표 / 학사일정]\n\n    A <-->|Riverpod 상태 관리| D\n    A <--> C\n    A <--> E\n    A --> G\n    A <-->|실시간 스트림| F\n    A <-->|REST API| J\n\n    B <-->|동일 Firestore 공유| D\n\n    H -->|댓글 / 채팅 / 계정 이벤트| F\n    H <-->|Firestore 트리거| D\n    H <-->|Kakao OAuth| C\n    I -->|매시간 정지 만료 체크| D\n```\n\n### 컴포넌트별 역할\n\n| 컴포넌트 | 위치 | 역할 |\n|---|---|---|\n| **Flutter App** | `/lib` | 메인 사용자 인터페이스. Android/iOS 동일 바이너리 |\n| **Next.js Admin** | `/admin-web` | 웹 기반 관리자 대시보드. Firestore를 앱과 공유 |\n| **Admin Static** | `/admin-static` | 간단한 정적 관리자 페이지 (현재 레거시) |\n| **Cloud Functions** | `/functions/index.js` | Kakao OAuth 커스텀 토큰, 푸시 알림 트리거, 스케줄러 |\n| **Android Widget** | `/android/.../widget` | 홈 화면 위젯 (급식/시간표/통합) |\n| **iOS Widget** | `/ios/Widget*` | WidgetKit 기반 홈 위젯 |\n\n## 레이어 구조 (Flutter)\n\n```\nlib/\n├── main.dart                # 앱 진입점\n├── api/                     # NEIS 등 외부 REST API 래퍼\n├── data/                    # 정적 상수 / 공용 데이터 (요일, 등급컷 등)\n├── network/                 # Firestore / Storage 접근 레이어\n├── notification/            # FCM 토큰 관리, 인앱 알림, 로컬 알림\n├── providers/               # Riverpod 전역 Provider (auth, grade, settings, theme)\n├── screens/                 # 화면 (auth, board, chat, main, sub)\n├── styles/                  # 테마, 컬러, 텍스트 스타일\n└── widgets/                 # 재사용 Stateless 위젯\n```\n\n### Dependency 방향\n- **screens → providers → network/api** (단방향)\n- **screens는 network를 직접 호출하지 않음** (Provider 경유)\n- **widgets는 데이터 의존 없이 순수 UI** (Stateless)\n\n## Riverpod Provider 의존성 그래프\n\n`riverpod_graph` CLI로 정적 분석 후 자동 생성. 아래는 mermaid 요약본이고, **🔗 [인터랙티브 풀버전 (GitHub Pages)](https://monkshark.github.io/hansol_hs_flutter_app/riverpod_graph.html)** 에서 D3.js 기반 zoom/drag 그래프로 모든 노드 탐색 가능. 원본 HTML은 `docs/riverpod_graph.html`에 보관.\n\n```mermaid\ngraph LR\n    authState[authStateProvider]\n    userProfile[userProfileProvider<br/>UserProfileNotifier]\n    isLoggedIn[isLoggedInProvider]\n    isManager[isManagerProvider]\n    isAdmin[isAdminProvider]\n    isSuspended[isSuspendedProvider]\n    theme[themeProvider]\n    exams[examsProvider]\n    examsByType[examsByTypeProvider]\n    goals[goalsProvider]\n    jeongsiGoals[jeongsiGoalsProvider]\n\n    userProfile -->|watch| authState\n    isLoggedIn -->|watch| authState\n    isManager -->|watch| userProfile\n    isAdmin -->|watch| userProfile\n    isSuspended -->|watch| userProfile\n    examsByType -->|watch| exams\n\n    HansolApp[HansolHighSchool] -.watch.-> theme\n    GradeScreen[GradeScreen] -.watch.-> exams\n    GradeScreen -.watch.-> goals\n    GradeScreen -.watch.-> jeongsiGoals\n\n    classDef provider fill:#007acc,color:#fff,stroke:#005a9e\n    classDef consumer fill:#00b894,color:#fff,stroke:#008264\n    class authState,userProfile,isLoggedIn,isManager,isAdmin,isSuspended,theme,exams,examsByType,goals,jeongsiGoals provider\n    class HansolApp,GradeScreen consumer\n```\n\n### 파생 관계 설명\n- `authStateProvider`를 root로 하는 **인증 상태 트리**: 프로필 → 권한(manager/admin/suspended) 파생\n- `examsProvider` 기반으로 `examsByTypeProvider` (수시/정시 분류) 파생\n- 화면(`Consumer`)은 필요한 leaf provider만 `watch` → 불필요한 rebuild 방지\n- `autoDispose` 적극 사용으로 화면 이탈 시 자동 해제\n\n### Provider 분류\n- **동기 Notifier** (`theme`, `isLoggedIn`): 단순 상태 전환\n- **AsyncNotifier** (`userProfile`, `exams`, `goals`): Firestore/SecureStorage 비동기 로딩\n- **파생 Provider** (`isManager`, `examsByType`): 다른 Provider를 watch하여 변환만 수행\n\n## 데이터 흐름 (계층 모델)\n\n```mermaid\ngraph LR\n    User([사용자]) --> Widget[Widget / Consumer]\n    Widget -->|read/watch| Provider[Riverpod Provider<br/>AsyncNotifier]\n    Provider -->|호출| Manager[Manager / Repository]\n\n    Manager -->|민감 데이터<br/>성적| Secure[(SecureStorage<br/>Keystore/Keychain)]\n    Manager -->|일정·캐시| SQLite[(sqflite)]\n    Manager -->|글·채팅·신고| Firestore[(Firestore)]\n    Manager -->|이미지| Storage[(Cloud Storage)]\n\n    Firestore -.트리거.-> Functions[Cloud Functions]\n    Functions -->|푸시| FCM[FCM]\n    FCM -.->|background| User\n\n    classDef ui fill:#00b894,color:#fff,stroke:#008264\n    classDef state fill:#007acc,color:#fff,stroke:#005a9e\n    classDef store fill:#6c5ce7,color:#fff,stroke:#4834d4\n    classDef server fill:#fdcb6e,color:#000,stroke:#e1b14a\n    class Widget,Provider ui\n    class Manager state\n    class Secure,SQLite,Firestore,Storage store\n    class Functions,FCM server\n```\n\n### 원칙\n- **Widget → Provider**만 직접 의존, Manager/저장소는 Provider 안쪽에 캡슐화\n- 저장소는 **데이터 민감도/접근 패턴**에 따라 4가지로 분담 (→ [architecture-decisions.md#adr-06](./architecture-decisions.md))\n- 쓰기 → Firestore 트리거 → Cloud Functions → FCM 으로 **비동기 푸시 흐름**\n- 위젯은 `ProviderScope.overrides`로 테스트에서 Mock Notifier 주입 가능\n\n## 저장소별 책임 분담\n\n| 저장소 | 용도 | 선택 이유 |\n|---|---|---|\n| **sqflite** | 개인 일정 (시간/색상/연속 일자) | Row 단위 시간 범위 쿼리 + 오프라인 우선 |\n| **Firestore** | 글/댓글/채팅/신고/사용자 프로필 | 실시간 sync + 다중 클라이언트 + Cloud Functions 트리거 |\n| **SecureStorage** | 성적 | OS 암호화 + 완전 로컬 (서버 전송 없음) |\n| **Cloud Storage** | 게시글·프로필 이미지 | CDN + 직접 다운로드 URL |\n| **SharedPreferences** | 설정 / 캐시 / 검색 히스토리 | 단순 key-value, 빠른 읽기 |\n\n각각 명확한 단일 용도 → 코드에서 \"이 데이터는 어디에 있는가\" 헷갈리지 않음.\n\n## 듀얼 클라이언트: Flutter ↔ Admin Web\n\n| 항목 | Flutter (`/lib`) | Admin Web (`/admin-web`) |\n|---|---|---|\n| **언어** | Dart | TypeScript |\n| **UI 프레임워크** | Flutter Material | Next.js 14 + Tailwind CSS |\n| **상태 관리** | Riverpod 2.5 | React hooks + SWR |\n| **인증** | Firebase Auth SDK (모바일) | Firebase Auth (웹) + 역할 검증 |\n| **주요 대상** | 학생/교사/학부모/졸업생 | admin/manager 역할만 |\n| **공유** | Firestore 컬렉션 동일 사용 (`users`, `posts`, ...) | 동일 |\n\n**쓰기 규칙 충돌 방지**: admin-web의 UPDATE 권한은 `firestore.rules`의 `isAdminOrManager()` 헬퍼로 통일 검증. 클라이언트 분리와 무관하게 규칙이 단일 진실 소스(Single Source of Truth).\n\n## Cloud Functions 트리거 맵\n\n| Function | 트리거 | 역할 |\n|---|---|---|\n| `kakaoCustomAuth` | HTTPS onRequest | Kakao access token → Firebase custom token 교환 |\n| `backfillCustomClaims` | HTTPS onRequest | 기존 유저의 커스텀 클레임 일괄 재부여 (관리자 도구) |\n| `postOgRenderer` | HTTPS onRequest | 딥링크용 OG 태그 포함 HTML 렌더링 |\n| `onCommentCreated` | `posts/{pid}/comments/{cid}` onCreate | 글 작성자에게 댓글 푸시 |\n| `onPostCreated` | `posts/{pid}` onCreate | 관리자에게 새 글 푸시 (카테고리별 on/off 고려) |\n| `onPostLikeUpdated` | `posts/{pid}` onUpdate | 좋아요 수 변화 감지, 인기글 카운터 보정 |\n| `onReportCreated` | `reports/{rid}` onCreate | 신고 접수 시 관리자 푸시 + 로그 기록 |\n| `onUserCreated` | `users/{uid}` onCreate | 신규 유저 초기화, 커스텀 클레임 부여 |\n| `onUserUpdated` | `users/{uid}` onUpdate | 승인/역할/정지 변경 시 푸시 + 클레임 갱신 |\n| `onUserDeleted` | `users/{uid}` onDelete | Auth 계정 + Storage 파일 연쇄 삭제 |\n| `onChatMessageCreated` | `chats/{cid}/messages/{mid}` onCreate | 수신자에게 채팅 푸시 |\n| `checkSuspensionExpiry` | onSchedule (매시간) | `suspendedUntil <= now`인 유저 필드 삭제 → `onUserUpdated` 연쇄 |\n| `cleanupOldPosts` | onSchedule (매일 18:00) | TTL 만료된 신고/로그 정리 |\n\n전체 코드는 `functions/index.js` 참조.\n\n## 참고\n- [아키텍처 의사결정 일지](./architecture-decisions.md)\n- [데이터 모델 상세](./data-model.md)\n- [보안 모델](./security.md)\n- [테스트 전략](./testing.md)\n","guides/architecture-overview_en.md":"# Architecture Overview\n\n> 한국어: [architecture-overview.md](./architecture-overview.md)\n\nHansol HS App is a **dual-client** architecture — a Flutter mobile app and a Next.js admin dashboard — sharing a common **Firebase** backend. This document covers the full system picture, the Riverpod state graph, and the layered data-flow model.\n\n## System Diagram\n\n```mermaid\ngraph TD\n    subgraph Client\n        A[Flutter App<br/>Android / iOS]\n        B[Next.js Admin<br/>TypeScript + Tailwind]\n    end\n\n    subgraph Firebase\n        C[Auth<br/>Google / Apple / Kakao / GitHub]\n        D[Firestore<br/>realtime DB]\n        E[Storage<br/>images / profiles]\n        F[FCM<br/>push notifications]\n        G[Crashlytics<br/>crash monitoring]\n    end\n\n    subgraph Server\n        H[Cloud Functions<br/>Node.js]\n        I[Scheduler<br/>unsuspension check]\n    end\n\n    J[NEIS API<br/>meals / timetable / academic calendar]\n\n    A <-->|Riverpod state| D\n    A <--> C\n    A <--> E\n    A --> G\n    A <-->|realtime stream| F\n    A <-->|REST API| J\n\n    B <-->|shared Firestore| D\n\n    H -->|comment / chat / account events| F\n    H <-->|Firestore triggers| D\n    H <-->|Kakao OAuth| C\n    I -->|hourly suspension expiry| D\n```\n\n### Components\n\n| Component | Location | Role |\n|---|---|---|\n| **Flutter App** | `/lib` | Main user UI. Single codebase for Android/iOS |\n| **Next.js Admin** | `/admin-web` | Web-based admin dashboard sharing the same Firestore |\n| **Admin Static** | `/admin-static` | Legacy static admin page |\n| **Cloud Functions** | `/functions/index.js` | Kakao OAuth custom tokens, push triggers, scheduler |\n| **Android Widget** | `/android/.../widget` | Home widgets (meal / timetable / combined) |\n| **iOS Widget** | `/ios/Widget*` | WidgetKit home widgets |\n\n## Flutter Layer Layout\n\n```\nlib/\n├── main.dart                # App entry\n├── api/                     # External REST API wrappers (NEIS, etc.)\n├── data/                    # Static constants / shared data (days, grade cutoffs)\n├── network/                 # Firestore / Storage access layer\n├── notification/            # FCM tokens, in-app notifications, local notifications\n├── providers/               # Riverpod global providers (auth, grade, settings, theme)\n├── screens/                 # Screens (auth, board, chat, main, sub)\n├── styles/                  # Theme, colors, text styles\n└── widgets/                 # Reusable stateless widgets\n```\n\n### Dependency Direction\n- **screens → providers → network/api** (one-way)\n- **screens do not call `network/` directly** (go via provider)\n- **widgets are data-agnostic pure UI** (Stateless)\n\n## Riverpod Provider Graph\n\nAuto-generated via `riverpod_graph` CLI. The mermaid below is a summary — full version at **🔗 [Interactive (GitHub Pages)](https://monkshark.github.io/hansol_hs_flutter_app/riverpod_graph.html)** (D3.js zoom/drag). Source HTML stored at `docs/riverpod_graph.html`.\n\n```mermaid\ngraph LR\n    authState[authStateProvider]\n    userProfile[userProfileProvider<br/>UserProfileNotifier]\n    isLoggedIn[isLoggedInProvider]\n    isManager[isManagerProvider]\n    isAdmin[isAdminProvider]\n    isSuspended[isSuspendedProvider]\n    theme[themeProvider]\n    exams[examsProvider]\n    examsByType[examsByTypeProvider]\n    goals[goalsProvider]\n    jeongsiGoals[jeongsiGoalsProvider]\n\n    userProfile -->|watch| authState\n    isLoggedIn -->|watch| authState\n    isManager -->|watch| userProfile\n    isAdmin -->|watch| userProfile\n    isSuspended -->|watch| userProfile\n    examsByType -->|watch| exams\n\n    HansolApp[HansolHighSchool] -.watch.-> theme\n    GradeScreen[GradeScreen] -.watch.-> exams\n    GradeScreen -.watch.-> goals\n    GradeScreen -.watch.-> jeongsiGoals\n\n    classDef provider fill:#007acc,color:#fff,stroke:#005a9e\n    classDef consumer fill:#00b894,color:#fff,stroke:#008264\n    class authState,userProfile,isLoggedIn,isManager,isAdmin,isSuspended,theme,exams,examsByType,goals,jeongsiGoals provider\n    class HansolApp,GradeScreen consumer\n```\n\n### Derivation Rules\n- `authStateProvider` is the root of the **auth state tree**: profile → roles (manager/admin/suspended) derived downstream\n- `examsByTypeProvider` (susi/jeongsi split) derives from `examsProvider`\n- Consumers `watch` only the leaf providers they need → avoid unnecessary rebuilds\n- `autoDispose` is used aggressively so providers clean up when screens unmount\n\n### Provider Types\n- **Sync Notifier** (`theme`, `isLoggedIn`): simple state transitions\n- **AsyncNotifier** (`userProfile`, `exams`, `goals`): async load from Firestore / SecureStorage\n- **Derived Provider** (`isManager`, `examsByType`): only transforms other providers\n\n## Data Flow (Layered Model)\n\n```mermaid\ngraph LR\n    User([user]) --> Widget[Widget / Consumer]\n    Widget -->|read/watch| Provider[Riverpod Provider<br/>AsyncNotifier]\n    Provider -->|invokes| Manager[Manager / Repository]\n\n    Manager -->|sensitive<br/>grades| Secure[(SecureStorage<br/>Keystore/Keychain)]\n    Manager -->|schedules / cache| SQLite[(sqflite)]\n    Manager -->|posts / chats / reports| Firestore[(Firestore)]\n    Manager -->|images| Storage[(Cloud Storage)]\n\n    Firestore -.trigger.-> Functions[Cloud Functions]\n    Functions -->|push| FCM[FCM]\n    FCM -.->|background| User\n\n    classDef ui fill:#00b894,color:#fff,stroke:#008264\n    classDef state fill:#007acc,color:#fff,stroke:#005a9e\n    classDef store fill:#6c5ce7,color:#fff,stroke:#4834d4\n    classDef server fill:#fdcb6e,color:#000,stroke:#e1b14a\n    class Widget,Provider ui\n    class Manager state\n    class Secure,SQLite,Firestore,Storage store\n    class Functions,FCM server\n```\n\n### Principles\n- **Widgets only depend on Providers** — Managers/stores are encapsulated behind providers\n- Four storage backends chosen by **sensitivity / access pattern** → [ADR-06](./architecture-decisions_en.md)\n- Writes → Firestore triggers → Cloud Functions → FCM form the **async push pipeline**\n- Widgets can mock notifiers via `ProviderScope.overrides` in tests\n\n## Storage Allocation\n\n| Store | Purpose | Rationale |\n|---|---|---|\n| **sqflite** | Personal schedules (time/color/span) | row-level range queries + offline-first |\n| **Firestore** | Posts / comments / chats / reports / user profiles | realtime sync + multi-client + Cloud Functions triggers |\n| **SecureStorage** | Grades | OS-level encryption + fully local (never uploaded) |\n| **Cloud Storage** | Post / profile images | CDN + direct download URLs |\n| **SharedPreferences** | Settings / cache / search history | simple key-value, fast reads |\n\nEach store has one clear responsibility → \"where does this data live?\" is never ambiguous.\n\n## Dual Client: Flutter ↔ Admin Web\n\n| Aspect | Flutter (`/lib`) | Admin Web (`/admin-web`) |\n|---|---|---|\n| **Language** | Dart | TypeScript |\n| **UI framework** | Flutter Material | Next.js 14 + Tailwind CSS |\n| **State** | Riverpod 2.5 | React hooks + SWR |\n| **Auth** | Firebase Auth SDK (mobile) | Firebase Auth (web) + role check |\n| **Audience** | students / teachers / parents / alumni | admin/manager roles only |\n| **Shared** | same Firestore collections (`users`, `posts`, ...) | same |\n\n**Conflict prevention**: Admin Web UPDATE permissions enforce `isAdminOrManager()` from `firestore.rules` — rules remain the single source of truth regardless of client.\n\n## Cloud Functions Trigger Map\n\n| Function | Trigger | Role |\n|---|---|---|\n| `kakaoCustomAuth` | HTTPS onRequest | Kakao access token → Firebase custom token |\n| `backfillCustomClaims` | HTTPS onRequest | Re-grant custom claims to existing users (admin tool) |\n| `postOgRenderer` | HTTPS onRequest | Render OG-tagged HTML for deep links |\n| `onCommentCreated` | `posts/{pid}/comments/{cid}` onCreate | push to post author |\n| `onPostCreated` | `posts/{pid}` onCreate | push to admins (per-category opt-in) |\n| `onPostLikeUpdated` | `posts/{pid}` onUpdate | detect like count changes, correct popular-post counter |\n| `onReportCreated` | `reports/{rid}` onCreate | push to admins on report + write log |\n| `onUserCreated` | `users/{uid}` onCreate | initialize user, grant custom claims |\n| `onUserUpdated` | `users/{uid}` onUpdate | push on approval / role / suspension change + claim refresh |\n| `onUserDeleted` | `users/{uid}` onDelete | cascade delete Auth account + Storage files |\n| `onChatMessageCreated` | `chats/{cid}/messages/{mid}` onCreate | push to recipient |\n| `checkSuspensionExpiry` | onSchedule (hourly) | delete `suspendedUntil` when expired → cascades `onUserUpdated` |\n| `cleanupOldPosts` | onSchedule (daily 18:00) | TTL cleanup for stale reports/logs |\n\nFull code in `functions/index.js`.\n\n## See Also\n- [Architecture Decisions (ADRs)](./architecture-decisions_en.md)\n- [Data Model](./data-model_en.md)\n- [Security Model](./security_en.md)\n- [Testing Strategy](./testing_en.md)\n","guides/cicd-setup.md":"# CI/CD 설정\n\n> English: [cicd-setup_en.md](./cicd-setup_en.md)\n\nGitHub Actions 기반 CI/CD 파이프라인을 정리합니다. 두 워크플로우가 병렬로 돌며, 둘 다 통과해야 master에 머지됩니다.\n\n## 워크플로우 목록\n\n| 파일 | 트리거 | 역할 |\n|---|---|---|\n| `.github/workflows/flutter.yml` | `push`/`pull_request` → `master` | analyze + test + APK 빌드 |\n| `.github/workflows/firestore-rules.yml` | 규칙 경로 변경 시만 | Firestore Rules 단위 테스트 |\n\n두 워크플로우 모두 `concurrency: cancel-in-progress: true` 로 같은 브랜치의 이전 실행을 자동 취소합니다.\n\n## flutter.yml 파이프라인\n\n### Job 1 — `analyze-and-test`\n\n| 단계 | 내용 |\n|---|---|\n| Setup Flutter | `subosito/flutter-action@v2`, stable 채널, 캐시 활성화 |\n| **Create dummy secret files** | `lib/api/nies_api_keys.dart`, `lib/firebase_options.dart`, `lib/api/kakao_keys.dart` 를 더미 값으로 생성 — 실제 키는 CI에 없음 |\n| Install deps | `flutter pub get` |\n| Verify formatting | `dart format --output=none --set-exit-if-changed .` (경고만, 실패는 non-fatal) |\n| **Analyze** | `flutter analyze --no-fatal-infos --no-fatal-warnings` |\n| **Run tests with coverage** | `flutter test --coverage --reporter=expanded` |\n| Upload coverage to Codecov | `codecov/codecov-action@v4`, flag `unittests` |\n| Upload coverage artifact | `coverage/lcov.info` 14일 보관 |\n\n### Job 2 — `build-android` (conditional)\n\n- 조건: `github.event_name == 'push' && github.ref == 'refs/heads/master'` → **master push 시에만**\n- `needs: analyze-and-test` → 선행 Job 성공해야 실행\n- 더미 파일 추가로 `android/app/google-services.json` 생성 (프로젝트 id는 dummy)\n- Java 17, Flutter stable\n- **Debug APK 빌드** (`--debug --target-platform android-arm64`)\n- `build/app/outputs/flutter-apk/app-debug.apk` 를 artifact로 7일 보관\n\n### 더미 시크릿 전략\n\nCI는 실제 NEIS / Firebase / Kakao 키 없이 빌드/테스트만 수행합니다. 핵심 이유:\n- 키를 레포에 커밋하지 않음\n- 테스트는 네트워크 호출 없이 로직 검증\n- APK도 dummy config로 생성 (실제 실행용 아님)\n\n로컬 개발에서는 실제 키 파일을 생성해야 합니다. [DEPLOY.md](../../DEPLOY.md) 참조.\n\n## firestore-rules.yml 파이프라인\n\n경로 트리거 — 다음 파일 변경 시만 실행:\n- `firestore.rules`\n- `tests/firestore-rules/**`\n- `.github/workflows/firestore-rules.yml`\n\n| 단계 | 내용 |\n|---|---|\n| Setup Node | v20 |\n| Setup Java | v21 (Firebase emulator 요구사항) |\n| Install Firebase CLI | `npm install -g firebase-tools` |\n| Install test deps | `cd tests/firestore-rules && npm install` |\n| **Run rules tests** | `firebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"` |\n\n34개 rules 테스트가 약 4초 안에 완료됩니다.\n\n## 배지 연동\n\nREADME 최상단 배지:\n\n```md\n[![Flutter CI](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/flutter.yml/badge.svg)](...)\n[![Firestore Rules Tests](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/firestore-rules.yml/badge.svg)](...)\n```\n\n## 로컬에서 동일하게 재현\n\n```bash\n# CI의 analyze 단계\nflutter analyze --no-fatal-infos --no-fatal-warnings\n\n# CI의 test 단계\nflutter test --coverage\n\n# CI의 rules 단계\ncd tests/firestore-rules\nnpm install\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\n\n# CI의 APK 빌드 단계 (release 키 없이 디버그만)\nflutter build apk --debug --target-platform android-arm64\n```\n\n## Codecov\n\n- `lcov.info` 기반 커버리지 보고\n- `fail_ci_if_error: false` — 업로드 실패가 CI 실패로 이어지지 않음\n- PR에 커버리지 변화 자동 코멘트\n\n## 머지 규칙 (권장)\n\n- **Required checks**: `Flutter CI / Analyze + Test (ubuntu-latest)` 성공\n- **Required when rules path touched**: `Firestore Rules Tests / Firestore Rules Unit Tests` 성공\n- **APK 빌드** 실패는 블로킹 아님 (notification 용도)\n\n## 트러블슈팅\n\n| 증상 | 원인 | 해결 |\n|---|---|---|\n| `Formatting issues found` 경고 | `dart format` 필요 | 로컬에서 `dart format .` 후 커밋 |\n| analyze 실패 | info/warning이 아닌 error | 로컬에서 `flutter analyze` 동일 플래그로 확인 |\n| Rules 테스트 머지 직전 깨짐 | 규칙-앱 로직 동기화 안 됨 | `firestore.rules` 변경 시 `tests/firestore-rules/*.spec.js` 함께 수정 |\n| APK 빌드 실패 `google-services.json` | dummy 파일 생성 누락 | workflow의 heredoc 블록 확인 |\n\n## 관련 문서\n- [테스트 전략](./testing.md)\n- [배포 가이드](../../DEPLOY.md)\n- [기여 가이드](../../CONTRIBUTING.md)\n","guides/cicd-setup_en.md":"# CI/CD Setup\n\n> 한국어: [cicd-setup.md](./cicd-setup.md)\n\nGitHub Actions-based CI/CD pipeline. Two workflows run in parallel; both must pass before merging to master.\n\n## Workflows\n\n| File | Trigger | Role |\n|---|---|---|\n| `.github/workflows/flutter.yml` | `push`/`pull_request` → `master` | analyze + test + APK build |\n| `.github/workflows/firestore-rules.yml` | rules paths changed | Firestore rules unit tests |\n\nBoth use `concurrency: cancel-in-progress: true` so a newer push cancels older runs on the same branch.\n\n## flutter.yml Pipeline\n\n### Job 1 — `analyze-and-test`\n\n| Step | Content |\n|---|---|\n| Setup Flutter | `subosito/flutter-action@v2`, stable channel, cache enabled |\n| **Create dummy secret files** | `lib/api/nies_api_keys.dart`, `lib/firebase_options.dart`, `lib/api/kakao_keys.dart` generated with dummy values — CI has no real keys |\n| Install deps | `flutter pub get` |\n| Verify formatting | `dart format --output=none --set-exit-if-changed .` (warn only, non-fatal) |\n| **Analyze** | `flutter analyze --no-fatal-infos --no-fatal-warnings` |\n| **Run tests with coverage** | `flutter test --coverage --reporter=expanded` |\n| Upload coverage to Codecov | `codecov/codecov-action@v4`, flag `unittests` |\n| Upload coverage artifact | `coverage/lcov.info` retained 14 days |\n\n### Job 2 — `build-android` (conditional)\n\n- Condition: `github.event_name == 'push' && github.ref == 'refs/heads/master'` → **master pushes only**\n- `needs: analyze-and-test` — runs only if prior job succeeds\n- Also generates `android/app/google-services.json` with a dummy project id\n- Java 17, Flutter stable\n- **Debug APK build** (`--debug --target-platform android-arm64`)\n- Artifact: `build/app/outputs/flutter-apk/app-debug.apk`, 7 days\n\n### Dummy Secret Strategy\n\nCI builds/tests without real NEIS / Firebase / Kakao keys. Reasons:\n- No keys committed to the repo\n- Tests validate logic without network calls\n- APK is built with a dummy config (not for real execution)\n\nLocal development needs the real key files — see [DEPLOY_en.md](../../DEPLOY_en.md).\n\n## firestore-rules.yml Pipeline\n\nPath-triggered — only runs if any of these changed:\n- `firestore.rules`\n- `tests/firestore-rules/**`\n- `.github/workflows/firestore-rules.yml`\n\n| Step | Content |\n|---|---|\n| Setup Node | v20 |\n| Setup Java | v21 (Firebase emulator requirement) |\n| Install Firebase CLI | `npm install -g firebase-tools` |\n| Install test deps | `cd tests/firestore-rules && npm install` |\n| **Run rules tests** | `firebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"` |\n\n34 rules tests complete in roughly 4 seconds.\n\n## Badges\n\nREADME top:\n\n```md\n[![Flutter CI](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/flutter.yml/badge.svg)](...)\n[![Firestore Rules Tests](https://github.com/Monkshark/hansol_hs_flutter_app/actions/workflows/firestore-rules.yml/badge.svg)](...)\n```\n\n## Reproduce Locally\n\n```bash\n# CI analyze\nflutter analyze --no-fatal-infos --no-fatal-warnings\n\n# CI test\nflutter test --coverage\n\n# CI rules\ncd tests/firestore-rules\nnpm install\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\n\n# CI APK (debug only — no release key)\nflutter build apk --debug --target-platform android-arm64\n```\n\n## Codecov\n\n- Coverage reporting based on `lcov.info`\n- `fail_ci_if_error: false` — upload failures don't fail the CI\n- Auto-comments coverage delta on PRs\n\n## Merge Rules (recommended)\n\n- **Required checks**: `Flutter CI / Analyze + Test (ubuntu-latest)` passing\n- **When rules paths touched**: `Firestore Rules Tests / Firestore Rules Unit Tests` passing\n- **APK build** failure is non-blocking (notification only)\n\n## Troubleshooting\n\n| Symptom | Cause | Fix |\n|---|---|---|\n| `Formatting issues found` warning | needs `dart format` | run `dart format .` locally and commit |\n| analyze failure | error (not info/warning) | reproduce locally with same flags |\n| Rules test breaks right before merge | rules/app logic out of sync | when changing `firestore.rules`, update `tests/firestore-rules/*.spec.js` together |\n| APK build `google-services.json` missing | workflow dummy block missing | check the heredoc in the workflow |\n\n## See Also\n- [Testing Strategy](./testing_en.md)\n- [Deployment Guide](../../DEPLOY_en.md)\n- [Contributing Guide](../../CONTRIBUTING_en.md)\n","guides/data-model.md":"# 데이터 모델\n\n> English: [data-model_en.md](./data-model_en.md)\n\nFirestore 컬렉션 구조, 필드 스키마, 인덱스, 보안 규칙 연관을 한 곳에 정리합니다.\n\n## ERD\n\n```mermaid\nerDiagram\n    users ||--o{ posts : \"작성\"\n    users ||--o{ notifications : \"수신\"\n    users ||--o{ subjects : \"선택과목\"\n    posts ||--o{ comments : \"포함\"\n    posts ||--o{ reports : \"신고\"\n    chats ||--o{ messages : \"포함\"\n    users }o--o{ chats : \"참여\"\n\n    users {\n        string uid PK\n        string name\n        string studentId\n        string role\n        string userType\n        boolean approved\n        timestamp suspendedUntil\n        string profilePhotoUrl\n        string fcmToken\n        boolean notiComment\n        boolean notiChat\n    }\n\n    posts {\n        string id PK\n        string title\n        string content\n        string category\n        string authorUid FK\n        boolean isAnonymous\n        boolean isPinned\n        int likes\n        int dislikes\n        array bookmarkedBy\n        array pollOptions\n        map pollVotes\n    }\n\n    comments {\n        string id PK\n        string authorUid FK\n        string content\n        boolean isAnonymous\n        string parentId\n        timestamp createdAt\n    }\n\n    chats {\n        string id PK\n        array participants\n        map participantNames\n        string lastMessage\n        map unreadCount\n    }\n\n    messages {\n        string id PK\n        string senderUid FK\n        string content\n        boolean deleted\n        array deletedFor\n    }\n```\n\n## 컬렉션 상세\n\n### `users/{uid}`\n\n| 필드 | 타입 | 설명 |\n|---|---|---|\n| `uid` | string (doc id) | Firebase Auth UID 또는 `kakao:{id}` |\n| `name` | string | 실명 |\n| `studentId` | string | 학번 (재학생/졸업생) |\n| `userType` | string | `student` / `alumni` / `teacher` / `parent` |\n| `role` | string | `user` / `manager` / `admin` |\n| `approved` | boolean | 관리자 승인 여부 |\n| `suspendedUntil` | timestamp \\| null | 정지 만료 시각. 스케줄러가 매시간 청소 |\n| `profilePhotoUrl` | string | Cloud Storage 또는 OAuth 프로필 |\n| `fcmToken` | string | FCM 푸시 타겟 |\n| `notiComment` / `notiReply` / `notiChat` / `notiNewPost` / `notiAccount` | boolean | 카테고리별 알림 on/off |\n| `createdAt` / `updatedAt` | timestamp | 감사용 |\n\n**보안 규칙 요약** (`firestore.rules`):\n- `read`: 본인 또는 manager/admin\n- `update`: 본인(단 `role`, `suspendedUntil`, `approved` 불변) 또는 manager/admin\n- `delete`: 본인 또는 admin\n\n**서브컬렉션**:\n- `users/{uid}/subjects/{doc}` — 선택과목 (본인만 read/write)\n- `users/{uid}/sync/{doc}` — 동기화 메타 (본인만 read/write)\n- `users/{uid}/notifications/{notifId}` — 인앱 알림 (본인만 read/update/delete; create는 누구나 — 관리자 알림 허용)\n\n### `posts/{postId}`\n\n| 필드 | 타입 | 설명 |\n|---|---|---|\n| `title` | string (1~200자) | 제목 |\n| `content` | string (≤5000자) | 본문 |\n| `category` | string | 6카테고리 중 하나 |\n| `authorUid` | string | 작성자 |\n| `isAnonymous` | boolean | 익명 여부 |\n| `isPinned` / `pinnedAt` | boolean / timestamp | 공지 고정 (최대 3개) |\n| `likes` / `dislikes` | map<uid,bool> | 토글용 |\n| `likeCount` / `dislikeCount` | int | 정렬용 비정규화 |\n| `bookmarkedBy` | array<string> | 북마크 사용자 |\n| `pollOptions` | array<string> | 투표 선택지 (최대 6) |\n| `pollVoters` | map<uid,int> | 사용자별 선택 인덱스 |\n| `searchTokens` | array<string> | 2-gram 검색 토큰 (≤200) |\n| `anonymousMapping` / `anonymousCount` | map / int | 익명 번호제 |\n| `commentCount` | int | 댓글 수 비정규화 |\n| `imageUrls` | array<string> | 첨부 이미지 |\n| `createdAt` / `updatedAt` | timestamp | — |\n\n**보안 규칙 요약**:\n- `read`: 모두 허용\n- `create`: 인증 + `authorUid == auth.uid` + 제목/본문 길이 검증\n- `update`: 작성자 자유 수정 OR 비작성자는 `isInteractionUpdate()` 필드만 (`likes`, `dislikes`, `likeCount`, `dislikeCount`, `pollVoters`, `commentCount`, `anonymousMapping`, `anonymousCount`, `bookmarkedBy`) + `validCounterDelta(±1)`\n- `delete`: 작성자 또는 manager/admin (감사 로그 기록)\n\n**서브컬렉션**:\n- `posts/{postId}/comments/{commentId}` — 댓글/대댓글\n\n### `chats/{chatId}`, `chats/{chatId}/messages/{messageId}`\n\n| 필드 | 타입 | 설명 |\n|---|---|---|\n| `participants` | array<string> | 참여자 uid (2명) |\n| `participantNames` | map<uid,string> | 캐시된 이름 |\n| `lastMessage` | string | 목록 미리보기 |\n| `lastMessageAt` | timestamp | 정렬용 |\n| `unreadCount` | map<uid,int> | 사용자별 안 읽은 수 |\n\n메시지:\n- `senderUid`, `content`, `createdAt`, `deleted: boolean`, `deletedFor: array<uid>`\n\n**보안 규칙 요약**: 참여자만 read/write. 메시지 update는 삭제 기능(`deleted`, `deletedFor` 필드만) 허용.\n\n### `reports/{reportId}`\n\n- 필드: `postId`, `reporterUid`, `reason`, `createdAt`, `status`\n- `read`: 관리자 전용\n- `create`: 인증 사용자 (동일 `(postId, reporterUid)` 중복 방지 인덱스)\n\n### `admin_logs/{logId}`\n\n- 관리 행위 감사 로그: `action`, `actorUid`, `targetUid` / `targetPostId`, `createdAt`, `detail`\n- `read/write`: 관리자 전용\n\n### `function_logs/{logId}`\n\n- Cloud Functions 오류 기록 (`function`, `error`, `code`, `stack`, `createdAt`)\n- `write`: Functions만 (admin SDK), `read`: 관리자\n\n### `app_config/{key}`\n\n- `version`: 최소/최신 앱 버전\n- `announcement`: 긴급 팝업 공지 설정\n- `read`: 모두, `write`: 관리자\n\n## 인덱스\n\n`firestore.indexes.json`의 복합 인덱스 총 9개:\n\n| 컬렉션 | 필드 | 용도 |\n|---|---|---|\n| `posts` | `category ASC, createdAt DESC` | 카테고리별 최신 글 |\n| `posts` | `authorUid ASC, createdAt DESC` | 내 글 목록 |\n| `posts` | `bookmarkedBy CONTAINS, createdAt DESC` | 북마크 글 목록 |\n| `posts` | `isPinned ASC, pinnedAt DESC` | 공지 정렬 |\n| `posts` | `likeCount DESC, createdAt DESC` | **인기글 정렬** (ADR-04) |\n| `chats` | `participants CONTAINS, lastMessageAt DESC` | 채팅 목록 |\n| `admin_logs` | `action ASC, createdAt DESC` | 관리 로그 필터 |\n| `reports` | `postId ASC, reporterUid ASC` | 중복 신고 방지 |\n| `reports` | `reporterUid ASC, createdAt ASC` | 내 신고 히스토리 |\n\n## 로컬 저장소\n\n### sqflite (`lib/data/local_database.dart`)\n- `schedules`: `id`, `title`, `startDate`, `endDate`, `color`, `repeatRule`\n- `ddays`: `id`, `title`, `targetDate`, `pinned`\n\n### SecureStorage\n- 키: `exams_json`, `goals_json`, `jeongsi_goals_json`\n- 값: JSON 직렬화된 성적/목표\n- 마이그레이션 로그: `sp_to_secure_migrated: \"1\"`\n\n### SharedPreferences\n- `theme_mode`, `notification_time_breakfast`, `search_history`, `timetable_cache_{YYYYMMDD}` 등\n\n## 관련 문서\n- [보안 모델](./security.md) — rules 헬퍼 함수 상세\n- [ADR-04](./architecture-decisions.md#adr-04-좋아요-카운터) — 카운터 스키마 설계 근거\n","guides/data-model_en.md":"# Data Model\n\n> 한국어: [data-model.md](./data-model.md)\n\nFirestore collection layout, field schema, indexes, and security-rule relationships in one place.\n\n## ERD\n\n```mermaid\nerDiagram\n    users ||--o{ posts : \"authors\"\n    users ||--o{ notifications : \"receives\"\n    users ||--o{ subjects : \"electives\"\n    posts ||--o{ comments : \"contains\"\n    posts ||--o{ reports : \"reported by\"\n    chats ||--o{ messages : \"contains\"\n    users }o--o{ chats : \"participates\"\n\n    users {\n        string uid PK\n        string name\n        string studentId\n        string role\n        string userType\n        boolean approved\n        timestamp suspendedUntil\n        string profilePhotoUrl\n        string fcmToken\n        boolean notiComment\n        boolean notiChat\n    }\n\n    posts {\n        string id PK\n        string title\n        string content\n        string category\n        string authorUid FK\n        boolean isAnonymous\n        boolean isPinned\n        int likes\n        int dislikes\n        array bookmarkedBy\n        array pollOptions\n        map pollVotes\n    }\n\n    comments {\n        string id PK\n        string authorUid FK\n        string content\n        boolean isAnonymous\n        string parentId\n        timestamp createdAt\n    }\n\n    chats {\n        string id PK\n        array participants\n        map participantNames\n        string lastMessage\n        map unreadCount\n    }\n\n    messages {\n        string id PK\n        string senderUid FK\n        string content\n        boolean deleted\n        array deletedFor\n    }\n```\n\n## Collections\n\n### `users/{uid}`\n\n| Field | Type | Notes |\n|---|---|---|\n| `uid` | string (doc id) | Firebase Auth UID, or `kakao:{id}` for Kakao users |\n| `name` | string | real name |\n| `studentId` | string | student number (students/alumni) |\n| `userType` | string | `student` / `alumni` / `teacher` / `parent` |\n| `role` | string | `user` / `manager` / `admin` |\n| `approved` | boolean | admin-approved flag |\n| `suspendedUntil` | timestamp \\| null | expiry; scheduler clears hourly |\n| `profilePhotoUrl` | string | Cloud Storage or OAuth profile |\n| `fcmToken` | string | FCM push target |\n| `notiComment` / `notiReply` / `notiChat` / `notiNewPost` / `notiAccount` | boolean | per-category toggles |\n| `createdAt` / `updatedAt` | timestamp | audit |\n\n**Rules summary** (`firestore.rules`):\n- `read`: self or manager/admin\n- `update`: self (but `role`, `suspendedUntil`, `approved` immutable) or manager/admin\n- `delete`: self or admin\n\n**Subcollections**:\n- `users/{uid}/subjects/{doc}` — electives (self-only read/write)\n- `users/{uid}/sync/{doc}` — sync metadata (self-only)\n- `users/{uid}/notifications/{notifId}` — in-app notifications (self reads/updates/deletes; anyone may create — allows admin alerts)\n\n### `posts/{postId}`\n\n| Field | Type | Notes |\n|---|---|---|\n| `title` | string (1–200) | post title |\n| `content` | string (≤5000) | body |\n| `category` | string | one of 6 categories |\n| `authorUid` | string | author |\n| `isAnonymous` | boolean | anonymous flag |\n| `isPinned` / `pinnedAt` | boolean / timestamp | announcement pin (max 3) |\n| `likes` / `dislikes` | map<uid,bool> | toggle map |\n| `likeCount` / `dislikeCount` | int | denormalized for sorting |\n| `bookmarkedBy` | array<string> | bookmarking users |\n| `pollOptions` | array<string> | poll choices (max 6) |\n| `pollVoters` | map<uid,int> | per-user choice index |\n| `searchTokens` | array<string> | 2-gram tokens (≤200) |\n| `anonymousMapping` / `anonymousCount` | map / int | anonymous numbering |\n| `commentCount` | int | denormalized |\n| `imageUrls` | array<string> | attached images |\n| `createdAt` / `updatedAt` | timestamp | — |\n\n**Rules summary**:\n- `read`: public\n- `create`: authed + `authorUid == auth.uid` + title 1–200 + content ≤5000\n- `update`: author free-form OR non-author limited to `isInteractionUpdate()` fields (`likes`, `dislikes`, `likeCount`, `dislikeCount`, `pollVoters`, `commentCount`, `anonymousMapping`, `anonymousCount`, `bookmarkedBy`) + `validCounterDelta(±1)`\n- `delete`: author or manager/admin (audit-logged)\n\n**Subcollections**:\n- `posts/{postId}/comments/{commentId}` — comments & replies\n\n### `chats/{chatId}`, `chats/{chatId}/messages/{messageId}`\n\n| Field | Type | Notes |\n|---|---|---|\n| `participants` | array<string> | participant UIDs (length 2) |\n| `participantNames` | map<uid,string> | cached names |\n| `lastMessage` | string | list preview |\n| `lastMessageAt` | timestamp | sort key |\n| `unreadCount` | map<uid,int> | per-user unread count |\n\nMessages:\n- `senderUid`, `content`, `createdAt`, `deleted: boolean`, `deletedFor: array<uid>`\n\n**Rules**: participants-only read/write. Message `update` is allowed only for delete-related fields (`deleted`, `deletedFor`).\n\n### `reports/{reportId}`\n\n- Fields: `postId`, `reporterUid`, `reason`, `createdAt`, `status`\n- `read`: admin-only\n- `create`: authed users; duplicate `(postId, reporterUid)` blocked via composite index\n\n### `admin_logs/{logId}`\n\n- Audit log: `action`, `actorUid`, `targetUid` / `targetPostId`, `createdAt`, `detail`\n- `read`/`write`: admin-only\n\n### `function_logs/{logId}`\n\n- Cloud Function errors (`function`, `error`, `code`, `stack`, `createdAt`)\n- `write`: functions only (admin SDK), `read`: admin\n\n### `app_config/{key}`\n\n- `version`: min/latest app version\n- `announcement`: urgent popup config\n- `read`: public, `write`: admin\n\n## Indexes\n\n9 composite indexes in `firestore.indexes.json`:\n\n| Collection | Fields | Purpose |\n|---|---|---|\n| `posts` | `category ASC, createdAt DESC` | per-category feed |\n| `posts` | `authorUid ASC, createdAt DESC` | my posts |\n| `posts` | `bookmarkedBy CONTAINS, createdAt DESC` | bookmarked posts |\n| `posts` | `isPinned ASC, pinnedAt DESC` | pinned order |\n| `posts` | `likeCount DESC, createdAt DESC` | **Popular tab** (ADR-04) |\n| `chats` | `participants CONTAINS, lastMessageAt DESC` | chat list |\n| `admin_logs` | `action ASC, createdAt DESC` | action filter |\n| `reports` | `postId ASC, reporterUid ASC` | dedupe reports |\n| `reports` | `reporterUid ASC, createdAt ASC` | my reports |\n\n## Local Stores\n\n### sqflite (`lib/data/local_database.dart`)\n- `schedules`: `id`, `title`, `startDate`, `endDate`, `color`, `repeatRule`\n- `ddays`: `id`, `title`, `targetDate`, `pinned`\n\n### SecureStorage\n- Keys: `exams_json`, `goals_json`, `jeongsi_goals_json`\n- Values: JSON-serialized grades/targets\n- Migration marker: `sp_to_secure_migrated: \"1\"`\n\n### SharedPreferences\n- `theme_mode`, `notification_time_breakfast`, `search_history`, `timetable_cache_{YYYYMMDD}`, etc.\n\n## See Also\n- [Security Model](./security_en.md) — rules helpers in detail\n- [ADR-04](./architecture-decisions_en.md#adr-04-like-counter-mapuidbool--denormalized-int) — counter schema rationale\n","guides/product-overview.md":"# 제품 개요\n\n> English: [product-overview_en.md](./product-overview_en.md)\n\n## 한 줄 소개\n\n**세종시 한솔고등학교 학생·교사·졸업생·학부모를 위한 통합 학교 플랫폼.** Flutter 기반 모바일 앱 + Next.js 관리자 대시보드로 구성되며, NEIS 공공데이터 API 연동, Firebase 실시간 데이터베이스, 역할 기반 권한 시스템, 푸시 알림, 1:1 채팅 등 실서비스 수준의 기능을 구현했다.\n\n## 왜 만들었는가\n\n학교 공지, 급식, 시간표, 학사일정은 각기 다른 웹사이트/알림 채널에 흩어져 있다. 이 앱은 그것을 **하나의 사용자 맥락 안에서** 조회하고, 학생 커뮤니티(게시판/채팅) 기능까지 포함해 학내 소통을 통합한다.\n\n또한 **성적 관리**는 철저히 로컬에만 저장해 학생 프라이버시를 보호하면서, 추이 그래프와 목표 등급 관리를 제공한다.\n\n## 대상 사용자\n\n| 사용자 | 제공 가치 |\n|---|---|\n| **재학생** | 급식/시간표/학사일정/게시판/채팅/성적/개인일정/홈 위젯 |\n| **교사** | 교사 전용 시간표, 공지 작성, 승인/모더레이션 |\n| **졸업생** | 로그인 + 커뮤니티 접근 (성적/시간표 제한) |\n| **학부모** | 학사일정 / 공지 / 긴급 팝업 구독 |\n| **관리자 (manager/admin)** | Flutter Admin 화면 + Next.js Admin Web |\n\n## 핵심 가치\n\n- **하나의 앱에서 학교 생활 전반** —
