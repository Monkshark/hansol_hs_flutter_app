<script>
const MD_DATA = {"01-overview.md":"# 한솔고등학교 앱 - 프로젝트 개요\n\n## 프로젝트 소개\n\n한솔고등학교 학생, 교사, 졸업생, 학부모를 위한 **풀스택 모바일 앱**이다.\n급식, 시간표, 학사일정 조회부터 커뮤니티 게시판, 1:1 채팅, 성적 관리까지 학교 생활 전반을 지원한다.\n\n| 항목 | 내용 |\n|------|------|\n| 패키지명 | `hansol_high_school` |\n| 플랫폼 | Android / iOS |\n| 프레임워크 | Flutter 3.x (Dart >=2.17) |\n| 백엔드 | Firebase (Firestore, Auth, Storage, Functions, Messaging) |\n| 관리자 도구 | Next.js 웹 대시보드 (`admin-web/`) |\n| 코드 규모 | Dart 22,000+ LOC, TypeScript/JS 4,000+ LOC |\n\n---\n\n## 핵심 기능\n\n### 1. 학교 정보 (NEIS API 연동)\n- **급식**: 주간 조식/중식/석식 조회, 홈 위젯 표시\n- **시간표**: 학년/반별 시간표, 선택과목 관리, 색상 커스터마이징\n- **학사일정**: 캘린더 뷰, 개인 일정 추가, D-day 관리\n\n### 2. 커뮤니티 게시판\n- 6개 카테고리: 자유/질문/정보공유/분실물/학생회/동아리\n- 글 작성 (이미지/투표/일정첨부), 댓글/대댓글, 익명 기능\n- 좋아요/싫어요, 북마크, 인기글 정렬, n-gram 검색\n- 신고/관리 시스템\n\n### 3. 1:1 채팅\n- 실시간 메시지, 이미지 공유\n- 읽지 않은 메시지 카운트\n\n### 4. 성적 관리 (로컬 전용)\n- 내신(중간/기말), 모의고사 기록\n- 수시/정시 목표 설정, 차트 시각화\n- flutter_secure_storage 암호화 저장\n\n### 5. 인증 & 권한\n- 소셜 로그인 4종: Google, Apple, Kakao, GitHub\n- 역할 기반 권한: admin / manager / user\n- 신분 구분: 재학생 / 졸업생 / 교사 / 학부모\n- 학번 검증 (5자리: 학년+반+번호)\n\n### 6. 알림 시스템\n- FCM 푸시 알림 (13종): 댓글, 대댓글, 인기글, 카테고리별 등\n- 로컬 급식 알림 (조식/중식/석식 시간 설정)\n- 인앱 팝업 공지, 앱 업데이트 체크\n\n### 7. 홈 위젯 (Android/iOS)\n- 오늘의 급식 위젯\n- 현재 시간표 위젯\n\n---\n\n## 기술 스택\n\n### Flutter / Dart\n| 라이브러리 | 용도 |\n|-----------|------|\n| `flutter_riverpod` | 상태 관리 (AsyncNotifier/Notifier 패턴) |\n| `get_it` | 의존성 주입 (DI) |\n| `freezed` + `json_serializable` | 불변 데이터 모델 + JSON 직렬화 |\n| `sqflite` | SQLite 로컬 DB (개인 일정) |\n| `flutter_secure_storage` | 암호화 저장소 (성적, D-day 등 개인정보) |\n| `shared_preferences` | 설정값, 캐시 |\n| `table_calendar` | 캘린더 위젯 |\n| `shimmer` | 스켈레톤 로딩 UI |\n| `cached_network_image` | 이미지 캐싱 |\n| `home_widget` | 홈 화면 위젯 |\n\n### Firebase\n| 서비스 | 용도 |\n|--------|------|\n| **Firestore** | 메인 DB (게시글, 유저, 채팅, 알림 등) |\n| **Auth** | 소셜 로그인 인증 |\n| **Storage** | 이미지 업로드 (프로필, 게시글, 채팅) |\n| **Cloud Functions** | Kakao 커스텀 토큰, 푸시 알림 발송 |\n| **Messaging (FCM)** | 푸시 알림 |\n| **Crashlytics** | 크래시 리포팅 |\n| **Performance** | 성능 모니터링 |\n| **App Check** | API 남용 방지 |\n| **Analytics** | 사용자 이벤트 추적 |\n\n### 외부 API\n| API | 용도 |\n|-----|------|\n| NEIS 교육정보 API | 급식, 시간표, 학사일정 |\n| Kakao SDK | 카카오 로그인 |\n\n---\n\n## 디렉토리 구조\n\n```\nhansol_hs_flutter_app/\n├── lib/                          # Flutter 앱 소스\n│   ├── main.dart                 # 앱 진입점\n│   ├── firebase_options.dart     # Firebase 설정 (자동생성)\n│   ├── api/                      # 외부 API 연동\n│   │   ├── meal_data_api.dart    #   NEIS 급식 API\n│   │   ├── notice_data_api.dart  #   NEIS 학사일정 API\n│   │   ├── timetable_data_api.dart # NEIS 시간표 API\n│   │   ├── nies_api_keys.dart    #   NEIS API 키 (gitignore)\n│   │   └── kakao_keys.dart       #   카카오 앱 키 (gitignore)\n│   ├── data/                     # 데이터 레이어\n│   │   ├── auth_service.dart     #   인증 서비스\n│   │   ├── auth_repository.dart  #   인증 레포지토리 (DI)\n│   │   ├── grade_manager.dart    #   성적 관리\n│   │   ├── grade_repository.dart #   성적 레포지토리 (DI)\n│   │   ├── local_database.dart   #   SQLite 일정 DB\n│   │   ├── setting_data.dart     #   설정 싱글톤\n│   │   ├── meal.dart             #   급식 모델 (freezed)\n│   │   ├── subject.dart          #   과목 모델 (freezed)\n│   │   ├── schedule_data.dart    #   일정 모델\n│   │   ├── dday_manager.dart     #   D-day 관리\n│   │   ├── search_tokens.dart    #   검색 토큰화 (n-gram)\n│   │   ├── search_history_service.dart # 검색 기록\n│   │   ├── analytics_service.dart #  Analytics 래퍼\n│   │   ├── secure_storage_service.dart # 암호화 저장소\n│   │   ├── service_locator.dart  #   GetIt DI 설정\n│   │   ├── device.dart           #   디바이스 정보\n│   │   └── subject_data_manager.dart # 선택과목 관리\n│   ├── providers/                # Riverpod 상태 관리\n│   │   ├── auth_provider.dart    #   인증 상태\n│   │   ├── grade_provider.dart   #   성적 상태\n│   │   ├── settings_provider.dart #  설정 상태\n│   │   └── theme_provider.dart   #   테마 상태\n│   ├── screens/                  # 화면 (UI)\n│   │   ├── auth/                 #   로그인/프로필\n│   │   ├── main/                 #   메인 탭 (홈/급식/일정)\n│   │   ├── board/                #   게시판 (글/댓글/관리자)\n│   │   ├── chat/                 #   1:1 채팅\n│   │   └── sub/                  #   설정/성적/시간표/피드백 등\n│   ├── widgets/                  # 재사용 위젯\n│   │   ├── calendar/             #   캘린더 관련\n│   │   ├── meal/                 #   급식 카드\n│   │   ├── grade/                #   성적 차트\n│   │   ├── home/                 #   홈 화면 위젯\n│   │   ├── home_widget/          #   OS 홈 위젯\n│   │   ├── setting/              #   설정 위젯\n│   │   ├── skeleton.dart         #   스켈레톤 로딩\n│   │   └── offline_banner.dart   #   오프라인 배너\n│   ├── styles/                   # 테마/컬러\n│   │   ├── app_colors.dart       #   컬러 추상 + 애니메이션\n│   │   ├── light_app_colors.dart #   라이트 모드 색상\n│   │   └── dark_app_colors.dart  #   다크 모드 색상\n│   ├── network/                  # 네트워크\n│   │   └── network_status.dart   #   연결 상태 체크\n│   └── notification/             # 알림\n│       ├── fcm_service.dart      #   FCM 푸시 알림\n│       ├── daily_meal_notification.dart # 급식 로컬 알림\n│       ├── popup_notice.dart     #   인앱 팝업 공지\n│       └── update_checker.dart   #   앱 업데이트 체크\n├── functions/                    # Firebase Cloud Functions (Node.js)\n│   └── index.js                  #   Kakao 인증, 푸시 발송 등\n├── admin-web/                    # 관리자 웹 대시보드 (Next.js)\n│   ├── app/                      #   페이지 (dashboard/users/posts/...)\n│   ├── components/               #   공통 컴포넌트\n│   └── lib/                      #   유틸리티\n├── assets/                       # 이미지/아이콘/HTML\n├── android/                      # Android 네이티브\n├── ios/                          # iOS 네이티브\n├── test/                         # 단위/위젯/골든 테스트\n├── integration_test/             # 통합 테스트\n├── scripts/                      # 유틸리티 스크립트\n├── firestore.rules               # Firestore 보안 규칙\n├── storage.rules                 # Storage 보안 규칙\n├── firestore.indexes.json        # 복합 인덱스\n└── pubspec.yaml                  # 의존성 매니페스트\n```\n\n---\n\n## 앱 초기화 흐름 (main.dart)\n\n```\nmain()\n  ├── Flutter 바인딩 초기화\n  ├── 세로 고정 (portrait only)\n  ├── Firebase 초기화\n  │   ├── App Check (Play Integrity / debug)\n  │   ├── Performance Monitoring\n  │   ├── Analytics\n  │   └── Crashlytics\n  ├── Kakao SDK 초기화\n  ├── SettingData 초기화 (SharedPreferences)\n  ├── 알림 권한 요청\n  ├── Timezone 설정 (Asia/Seoul)\n  ├── 테마 모드 복원\n  ├── 시간표 과목 프리로드 (2학년, 3학년)\n  ├── GetIt 서비스 로케이터 설정\n  ├── 급식 로컬 알림 스케줄링\n  ├── FCM 초기화\n  ├── 홈 위젯 초기화\n  └── Riverpod ProviderScope → HansolHighSchool 앱 실행\n```\n\n## 메인 화면 구조\n\n```\nMainScreen (3탭 PageView)\n  ├── Tab 0: MealScreen (급식)\n  ├── Tab 1: HomeScreen (홈 대시보드) ← 기본 탭\n  └── Tab 2: NoticeScreen (캘린더/일정)\n\npostFrameCallback:\n  ├── 계정 존재 확인 (삭제된 계정이면 로그아웃)\n  ├── 새 학기 프로필 업데이트 체크\n  ├── 온보딩 (최초 실행)\n  ├── 로그인 화면 (미로그인)\n  ├── Firestore 동기화 (로그인 상태)\n  ├── 앱 업데이트 체크\n  └── 팝업 공지 표시\n```\n\n---\n\n## 테스트 구조\n\n| 종류 | 파일 수 | 위치 |\n|------|---------|------|\n| 단위/위젯 테스트 | 15+ | `test/` |\n| 골든 이미지 테스트 | 1 | `test/post_card_golden_test.dart` |\n| 통합 테스트 | 1 | `integration_test/` |\n| Firestore 규칙 테스트 | 34+ | (별도 프레임워크) |\n\n### 주요 테스트 대상\n- `auth_service_test.dart` - 인증 서비스\n- `grade_manager_test.dart` - 성적 관리\n- `grade_provider_test.dart` - Riverpod 프로바이더\n- `meal_api_test.dart` - NEIS 급식 API\n- `search_tokens_test.dart` - 검색 토큰화\n- `secure_storage_service_test.dart` - 암호화 저장소\n- `post_card_golden_test.dart` - UI 스냅샷 (골든)\n\n---\n\n## 개발 환경 설정\n\n### 필수 요구사항\n- Flutter SDK 3.x\n- Dart SDK >=2.17\n- Firebase CLI\n- Android Studio 또는 VS Code\n- Node.js 20 (Cloud Functions용)\n\n### 시크릿 파일 (gitignore 대상)\n```\nlib/api/nies_api_keys.dart       # NEIS API 키\nlib/api/kakao_keys.dart          # 카카오 앱 키\nlib/firebase_options.dart        # Firebase 설정\nandroid/app/google-services.json # Android Firebase 설정\nios/Runner/GoogleService-Info.plist # iOS Firebase 설정\nadmin-web/.env.local             # 관리자 웹 Firebase 키\nscripts/service-account.json     # Firebase 서비스 계정\n```\n\n### 빌드 & 실행\n```bash\n# 의존성 설치\nflutter pub get\n\n# 코드 생성 (freezed, riverpod_generator 등)\ndart run build_runner build --delete-conflicting-outputs\n\n# 디버그 실행\nflutter run\n\n# 릴리스 빌드 (Android)\nflutter build apk --release\n\n# 테스트\nflutter test\n```\n\n### Firebase 에뮬레이터\n```bash\nfirebase emulators:start  # Firestore(8080), Auth(9099)\n```\n","02-architecture.md":"# 아키텍처 & 설계 패턴\n\n## 전체 아키텍처\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                    Presentation Layer                     │\n│  ┌────────┐  ┌────────┐  ┌────────┐  ┌──────────────┐  │\n│  │Screens │  │Widgets │  │Styles  │  │ Notification  │  │\n│  │(auth/  │  │(calendar│  │(colors)│  │ (FCM/local/  │  │\n│  │ board/ │  │ meal/   │  │        │  │  popup/update)│  │\n│  │ chat/  │  │ grade/  │  │        │  │              │  │\n│  │ main/  │  │ home/   │  │        │  │              │  │\n│  │ sub/)  │  │ setting)│  │        │  │              │  │\n│  └───┬────┘  └───┬────┘  └────────┘  └──────────────┘  │\n│      │           │                                       │\n├──────┼───────────┼───────────────────────────────────────┤\n│      │    State Management Layer                         │\n│  ┌───┴───────────┴────────────────────────────────────┐  │\n│  │  Riverpod Providers (auth/grade/settings/theme)    │  │\n│  │  + Legacy ValueNotifier (themeNotifier)            │  │\n│  └───┬────────────────────────────────────────────────┘  │\n│      │                                                   │\n├──────┼───────────────────────────────────────────────────┤\n│      │    Data Layer                                     │\n│  ┌───┴────────────────────────────────────────────────┐  │\n│  │  Repositories (AuthRepository, GradeRepository)    │  │\n│  │  Services (AuthService, AnalyticsService, ...)     │  │\n│  │  Managers (GradeManager, DDayManager, ...)         │  │\n│  │  Models (UserProfile, Meal, Subject, Exam, ...)    │  │\n│  └───┬────────────────────────────────────────────────┘  │\n│      │                                                   │\n├──────┼───────────────────────────────────────────────────┤\n│      │    Infrastructure Layer                           │\n│  ┌───┴────────────────────────────────────────────────┐  │\n│  │  Firebase (Firestore/Auth/Storage/Functions/FCM)   │  │\n│  │  SQLite (sqflite) · SecureStorage · SharedPrefs    │  │\n│  │  NEIS API (HTTP) · Kakao SDK                       │  │\n│  └────────────────────────────────────────────────────┘  │\n└─────────────────────────────────────────────────────────┘\n```\n\n---\n\n## 상태 관리 전략\n\n이 프로젝트는 **Riverpod 2.5**를 핵심 상태 관리 도구로 사용하되, 레거시 호환을 위해 일부 패턴이 공존한다.\n\n### 1. Riverpod AsyncNotifier / Notifier\n\n가장 권장되는 패턴. 비동기 데이터를 `AsyncValue<T>`로 래핑해 로딩/에러/데이터 상태를 자동 관리한다.\n\n```dart\n// providers/grade_provider.dart\nclass ExamsNotifier extends AsyncNotifier<List<Exam>> {\n  @override\n  Future<List<Exam>> build() async {\n    return GradeManager.loadExams();  // 초기 로드\n  }\n\n  Future<void> add(Exam exam) async {\n    await GradeManager.addExam(exam);\n    state = AsyncData(await GradeManager.loadExams());  // 상태 갱신\n  }\n}\n```\n\n**사용처**: 성적 관리 (`examsProvider`, `goalsProvider`), 인증 상태 (`userProfileProvider`), 테마 (`themeProvider`)\n\n### 2. StreamProvider\n\nFirebase 실시간 데이터에 사용한다.\n\n```dart\n// providers/auth_provider.dart\nfinal authStateProvider = StreamProvider<User?>((ref) {\n  return FirebaseAuth.instance.authStateChanges();\n});\n```\n\n### 3. 파생 Provider\n\n다른 Provider에서 계산된 값을 도출한다.\n\n```dart\nfinal isManagerProvider = Provider<bool>((ref) {\n  return ref.watch(userProfileProvider).valueOrNull?.isManager ?? false;\n});\n```\n\n### 4. StreamBuilder (위젯 내 직접 사용)\n\nFirestore 실시간 스트림은 대부분 위젯에서 직접 `StreamBuilder`로 소비한다.\n게시글 목록, 댓글, 채팅 메시지, 알림 등이 이 패턴이다.\n\n```dart\n// board/post_detail_screen.dart\nStreamBuilder<DocumentSnapshot>(\n  stream: FirebaseFirestore.instance.doc('posts/$postId').snapshots(),\n  builder: (context, snapshot) { ... },\n)\n```\n\n### 5. FutureBuilder\n\n1회성 비동기 데이터 로드에 사용한다.\n\n```dart\n// meal_screen.dart\nFutureBuilder<Meal?>(\n  future: MealDataApi.getMeal(date: selectedDate, mealType: 2),\n  builder: (context, snapshot) { ... },\n)\n```\n\n### 6. 레거시: ValueNotifier + setState\n\n일부 화면은 아직 `setState` 기반이다. `themeNotifier`는 Riverpod `themeProvider`와 양방향 동기화된다.\n\n```dart\n// main.dart (레거시 ↔ Riverpod 동기화)\nfinal ValueNotifier<ThemeMode> themeNotifier = ValueNotifier(ThemeMode.light);\n\nvoid _onThemeChanged() {\n  final idx = ...;\n  ref.read(themeProvider.notifier).setMode(idx);  // 레거시 → Riverpod\n}\n```\n\n### 상태 관리 사용 가이드\n\n| 데이터 유형 | 패턴 | 예시 |\n|------------|------|------|\n| 앱 전역 상태 | Riverpod Notifier/AsyncNotifier | 테마, 인증, 성적 |\n| Firebase 실시간 데이터 | StreamBuilder | 게시글, 댓글, 채팅 |\n| 1회성 API 호출 | FutureBuilder | 급식, 시간표 |\n| 화면 로컬 상태 | setState | 입력 폼, 탭 인덱스 |\n| 전역 이벤트 | ValueNotifier / StreamController | 앱 리프레시, 알림 딥링크 |\n\n---\n\n## 의존성 주입 (DI)\n\n### GetIt 서비스 로케이터\n\n`service_locator.dart`에서 앱 시작 시 싱글톤 서비스를 등록한다.\n\n```dart\nFuture<void> setupServiceLocator() async {\n  GetIt.I.registerSingleton<AuthRepository>(FirebaseAuthRepository());\n  GetIt.I.registerLazySingleton<GradeRepository>(() => LocalGradeRepository());\n  \n  final db = LocalDataBase();\n  await db.migrateFromPrefs();\n  GetIt.I.registerSingleton<LocalDataBase>(db);\n}\n```\n\n**등록된 서비스**:\n- [`AuthRepository`](data/auth_repository.md) → [`FirebaseAuthRepository`](data/auth_repository.md) (싱글톤)\n- [`GradeRepository`](data/grade_repository.md) → [`LocalGradeRepository`](data/grade_repository.md) (레이지 싱글톤)\n- [`LocalDataBase`](data/local_database.md) (싱글톤, 마이그레이션 후 등록)\n\n### Repository 패턴\n\n```\nAuthService (static 메서드)\n    ↑\nAuthRepository (abstract)    ← 테스트에서 mock 가능\n    ↑\nFirebaseAuthRepository       ← 실제 구현체\n    ↑\nGetIt.I<AuthRepository>()    ← 어디서든 접근\n```\n\n**장점**: 테스트 시 `AuthRepository`를 mock으로 교체 가능.\n\n---\n\n## 네비게이션 구조\n\n### 메인 네비게이션 (3탭)\n\n```\nMainScreen\n  └── PageView (스와이프 전환)\n      ├── [0] MealScreen      (급식)\n      ├── [1] HomeScreen       (홈 대시보드) ← 기본\n      └── [2] NoticeScreen     (캘린더/일정)\n```\n\n### 화면 전환 흐름\n\n```\nHomeScreen\n  ├── → AdminScreen (관리자만)\n  │     └── TabBar: 가입대기 / 정지유저 / 승인유저 / 신고 / 삭제로그 / 팝업 / 피드백\n  ├── → NotificationScreen (알림)\n  ├── → SettingScreen (설정)\n  │     ├── → ProfileEditScreen (프로필 수정)\n  │     ├── → TimetableSelectScreen → TimetableViewScreen\n  │     ├── → GradeScreen → GradeInputScreen\n  │     ├── → NotificationSettingScreen\n  │     └── → FeedbackScreen\n  ├── → BoardScreen (게시판)\n  │     ├── → PostDetailScreen (글 상세)\n  │     │     └── → WritePostScreen (수정)\n  │     ├── → WritePostScreen (새 글)\n  │     ├── → MyPostsScreen (내 활동)\n  │     └── → BookmarkedPostsScreen (북마크)\n  ├── → ChatListScreen (채팅 목록)\n  │     └── → ChatRoomScreen (채팅방)\n  ├── → DDayScreen (D-day)\n  └── → GradeScreen (성적)\n\nLoginScreen (미로그인 시)\n  └── → ProfileSetupScreen (최초 가입)\n```\n\n### 딥링크 (FCM 알림 탭)\n\n```\nFCM 알림 탭\n  ├── type=comment/new_post → PostDetailScreen\n  ├── type=chat → ChatRoomScreen\n  └── type=account → 무시 (앱 열기만)\n```\n\n`rootNavigatorKey`를 사용해 어디서든 네비게이션 가능:\n```dart\nrootNavigatorKey.currentState?.push(\n  MaterialPageRoute(builder: (_) => PostDetailScreen(postId: postId)),\n);\n```\n\n---\n\n## 테마 시스템\n\n### 컬러 아키텍처\n\n```\nAppColors (abstract)\n  ├── LightAppColors (싱글톤) - 라이트 모드 색상\n  ├── DarkAppColors (싱글톤) - 다크 모드 색상\n  └── AnimatedAppColors (싱글톤) - 색상 보간(lerp) 애니메이션\n```\n\n[`AnimatedAppColors`](styles/app_colors.md)는 라이트/다크 색상 사이를 0.0~1.0 progress로 보간한다:\n\n```dart\nAppColors.theme.primaryColor    // 현재 테마의 primary 색상\nAppColors.theme.mealCardColor   // 급식 카드 배경색\n```\n\n### 테마 모드 관리\n\n```\nSettingData.themeModeIndex (SharedPreferences)\n         │\n         ├── themeNotifier (ValueNotifier<ThemeMode>) ← 레거시\n         │\n         └── themeProvider (Riverpod) ← 신규\n                │\n                └── AnimatedAppColors.setDark() → 컬러 보간\n```\n\n---\n\n## 데이터 저장 전략\n\n| 데이터 | 저장소 | 이유 |\n|--------|--------|------|\n| 게시글/댓글/채팅 | Firestore | 실시간 동기화 필요 |\n| 유저 프로필/권한 | Firestore | 서버 권한 검증 필요 |\n| 성적/목표/D-day | flutter_secure_storage | 개인정보 → 암호화 |\n| 개인 일정 | SQLite (sqflite) | 복잡한 쿼리, Firestore 동기화 |\n| 앱 설정 | SharedPreferences | 단순 key-value |\n| 검색 기록 | SharedPreferences | 로컬 전용, 비민감 |\n| 시간표 캐시 | SharedPreferences | API 응답 캐싱 |\n| 이미지 | Firebase Storage | 서버 공유 필요 |\n| FCM 토큰 | Firestore (user doc) | 서버에서 푸시 발송 시 필요 |\n\n### 데이터 동기화 패턴\n\n여러 데이터는 **로컬 우선 + Firestore 백업** 전략을 사용한다:\n\n```\n앱 시작\n  ├── 로컬에서 읽기 (빠른 표시)\n  └── Firestore에서 동기화 (최신화)\n\n데이터 저장\n  ├── 로컬에 저장 (즉시)\n  └── Firestore에 동기화 (백그라운드)\n```\n\n적용 대상: 개인 일정 (`LocalDataBase`), D-day ([`DDayManager`](data/dday_manager.md)), 선택과목 ([`SubjectDataManager`](data/subject_data_manager.md))\n\n---\n\n## 코드 생성\n\n### Freezed 모델\n\n불변(immutable) 데이터 클래스를 자동 생성한다:\n\n```dart\n// data/meal.dart\n@freezed\nclass Meal with _$Meal {\n  const factory Meal({\n    String? meal,\n    required DateTime date,\n    required int mealType,\n    required String kcal,\n    @Default('') String ntrInfo,\n  }) = _Meal;\n\n  factory Meal.fromJson(Map<String, dynamic> json) => _$MealFromJson(json);\n}\n```\n\n`build_runner`가 `meal.freezed.dart` + `meal.g.dart`를 생성한다.\n\n### Riverpod Generator\n\n`@Riverpod` 어노테이션으로 Provider를 자동 생성한다:\n\n```dart\n// providers/theme_provider.dart\n@Riverpod(keepAlive: true)\nclass Theme extends _$Theme {\n  @override\n  ThemeMode build() { ... }\n}\n```\n\n→ `theme_provider.g.dart`에 `themeProvider` 자동 생성.\n\n### 코드 생성 실행\n\n```bash\ndart run build_runner build --delete-conflicting-outputs\n```\n\n---\n\n## 에러 처리 전략\n\n### 크래시 리포팅\n\n```\nFlutter 에러 발생\n  ├── Firebase Crashlytics 전송 (자동)\n  └── Firestore crash_logs 컬렉션 기록 (커스텀)\n      └── error, stack, library, uid, createdAt\n```\n\n### 네트워크 에러\n\n- `OfflineBanner`: connectivity_plus로 네트워크 상태 감지, 오프라인 시 배너 표시\n- 각 API 호출은 try/catch로 감싸고, 실패 시 빈 데이터 또는 캐시 반환\n\n### Firebase 초기화 실패\n\nmain.dart에서 Firebase 초기화를 try/catch로 감싸 앱 자체는 항상 실행되도록 한다.\n","03-data-layer.md":"# 데이터 레이어 상세 가이드\n\n`lib/data/` 디렉토리는 앱의 비즈니스 로직과 데이터 접근을 담당한다.\n\n> 각 클래스의 함수별 상세 설명은 [API Reference](api/README.md)�� 참조한다.\n\n---\n\n## 데이터 모델 요약\n\n| 모델 | 파일 | 패턴 | 저장소 | 레퍼런스 |\n|------|------|------|--------|----------|\n| [UserProfile](data/auth_service.md) | `auth_service.dart` | 수동 toMap/fromMap | Firestore `users/{uid}` |\n| [Meal](data/meal.md) | `meal.dart` | freezed + json_serializable | SharedPreferences 캐시 |\n| [Subject](data/subject.md) | `subject.dart` | freezed + 커스텀 == | SharedPreferences + Firestore |\n| [Schedule](data/schedule_data.md) | `schedule_data.dart` | 수동 toMap/fromMap | SQLite + Firestore 동기화 |\n| [Exam / SubjectScore](data/grade_manager.md) | `grade_manager.dart` | 수동 toJson/fromJson | SecureStorage (암호화) |\n| [DDay](data/dday_manager.md) | `dday_manager.dart` | 수동 toJson/fromJson | SecureStorage + Firestore 동기화 |\n\n---\n\n## 서비스 클래스 요약\n\n| 서비스 | 역할 | 저장 방식 | 레퍼런스 |\n|--------|------|-----------|----------|\n| [AuthService](data/auth_service.md) | 소셜 로그인 4종, 프로필 CRUD, 5분 캐시 | Firestore |\n| [GradeManager](data/grade_manager.md) | 성적 CRUD, 목표 관리, 등급 변환 | SecureStorage (로컬 전용) |\n| [DDayManager](data/dday_manager.md) | D-day CRUD, 핀 D-day 조회 | SecureStorage + Firestore |\n| [LocalDataBase](data/local_database.md) | 개인 일정 CRUD (SQLite) | SQLite + Firestore |\n| [SubjectDataManager](data/subject_data_manager.md) | 학년별 선택과목 로드/저장 | SharedPreferences + Firestore |\n| [SearchTokens](data/search_tokens.md) | 한국�� 2-gram 토큰화 | — (순수 유틸) |\n| [SearchHistoryService](data/search_history_service.md) | 검색 기록 (최대 10개, FIFO) | SharedPreferences |\n| [AnalyticsService](data/analytics_service.md) | Firebase Analytics 이벤트 래퍼 | — |\n| [SecureStorageService](data/secure_storage_service.md) | 암호화 저장소 래퍼 | Android Keystore / iOS Keychain |\n| [SettingData](data/setting_data.md) | 사용자 설정 싱글톤 | SharedPreferences |\n\n---\n\n## 레포지토리 패턴\n\n정적 메서드 → 인스턴스 인터페이스 래핑으로 테스트에서 mock 주입을 가능하게 한다.\n\n| Repository | 위임 대상 | 레퍼런스 |\n|------------|-----------|----------|\n| [AuthRepository](data/auth_repository.md) | [`AuthService`](data/auth_service.md) 정적 메서드 |\n| [GradeRepository](data/grade_repository.md) | [`GradeManager`](data/grade_manager.md) 정적 메서드 |\n\n**현재 상태**: GetIt + Riverpod 병행. 신규 코드는 Repository를, 기존 호출처는 정적 메서드를 사용 (점진적 마이그레이션).\n\n---\n\n## 서비스 로케이터\n\n[ServiceLocator](data/service_locator.md) — GetIt 컨테이너에 Repository와 서비스를 등록한다.\n\n```dart\n// 사용 예시\nfinal auth = GetIt.I<AuthRepository>();\nfinal grade = GetIt.I<GradeRepository>();\nfinal db = GetIt.I<LocalDataBase>();\n```\n\n---\n\n## 저장소 전략 요약\n\n```\n┌─────────────────────┐\n│   SecureStorage      │ ← 성적, 목표, D-day (개인정보)\n│   (암호화)           │\n├─────────────────────┤\n│   SharedPreferences  │ ← 설정, 캐시, 검색기록 (비민감)\n│   (평문)             │\n├─────────────────────┤\n│   SQLite (sqflite)   │ ← 개인 일정 (CRUD 빈번)\n├─────────────────────┤\n│   Firestore          │ ← 프로필, 게시글, 채팅 (서버)\n│                      │   + D-day/일정/과목 동기화\n└─────────────────────┘\n```\n\n---\n\n## 기타 유틸리티\n\n| 유틸 | 역할 | 레퍼런스 |\n|------|------|----------|\n| [Device](data/device.md) | 화면 크기 계산, 태블릿 감지 |\n| [NetworkStatus](network/network_status.md) | WiFi/모바일 연결 상태 확인 |\n","04-screens-guide.md":"# 화면별 상세 가이드\n\n---\n\n## 인증 화면 (screens/auth/)\n\n### LoginScreen (`login_screen.dart`)\n\n**역할**: 소셜 로그인 화면. 4개 OAuth 프로바이더 지원.\n\n**로그인 흐름**:\n```\n1. 사용자가 로그인 버튼 탭\n2. AuthService.signInWith{Provider}() 호출\n3. FcmService.onUserLogin() → FCM 토큰 갱신\n4. AuthService.hasProfile() 체크 (최대 3회 재시도)\n5. 프로필 없음 → ProfileSetupScreen으로 이동\n6. 프로필 있음 → pop (메인으로 복귀)\n```\n\n**프로바이더별 특이사항**:\n- **Google**: `google_sign_in` SDK 사용. 가장 기본적인 플로우.\n- **Apple**: nonce 생성 + SHA256 해싱. iOS만 네이티브, 다른 플랫폼은 웹 팝업.\n- **Kakao**: Kakao SDK → Cloud Function (`kakaoCustomAuth`) → Custom Token 발급.\n- **GitHub**: Firebase Auth의 `GithubAuthProvider`를 통한 웹 기반 OAuth.\n\n**UI 특징**: SVG 브랜드 아이콘, 다크/라이트 모드 대응, 로딩 중 버튼 비활성화.\n\n---\n\n### ProfileSetupScreen (`profile_setup_screen.dart`)\n\n**역할**: 최초 가입 시 정보 입력 & 새 학기 업데이트.\n\n**`isUpdate` 파라미터**:\n- `false` (기본): 최초 가입. 뒤로 가기 차단 (`canPop: false`). 개인정보 동의 필수.\n- `true`: 새 학기 업데이트. 신분 변경 불가 (잠금 표시).\n\n**신분별 입력 필드**:\n| 신분 | 필드 |\n|------|------|\n| 재학생 (`student`) | 이름, 학번 (5자리 검증) |\n| 졸업생 (`graduate`) | 이름, 졸업연도 |\n| 교사 (`teacher`) | 이름, 담당과목 (선택) |\n| 학부모 (`parent`) | 이름만 |\n\n**학번 검증 (`_validateStudentId`)**:\n```\n5자리 숫자: GCCNN\n├── G: 학년 (1~3)\n├── CC: 반 (01~12)\n└── NN: 번호 (01~30)\n\n예: \"20301\" → 2학년 3반 1번\n```\n\n**저장 후 동작**:\n1. Firestore `users/{uid}`에 프로필 저장 (merge)\n2. 최초 가입이면 관리자에게 가입 알림 전송\n3. `AuthService.clearProfileCache()` 호출\n4. `Navigator.pop(true)` 반환\n\n---\n\n### ProfileEditScreen (`profile_edit_screen.dart`)\n\n**역할**: 프로필 사진 변경 및 계정 삭제.\n\n**프로필 사진 업로드**:\n```\n1. ImagePicker로 갤러리/카메라 선택\n2. flutter_image_compress로 70% 품질 압축\n3. Firebase Storage `profile_photos/{uid}.jpg` 업로드\n4. Firestore user doc에 profilePhotoUrl 업데이트\n```\n\n**계정 삭제**:\n```\n1. 확인 모달: 이메일 입력 (Kakao는 이름 입력)\n2. Firebase Auth 재인증 시도\n3. Firestore user doc 삭제\n4. Firebase Auth 계정 삭제\n5. 로그아웃 + 앱 리프레시\n```\n\n---\n\n## 메인 탭 화면 (screens/main/)\n\n### HomeScreen (`home_screen.dart`)\n\n**역할**: 홈 대시보드. 오늘의 정보 한눈에 보기.\n\n**표시 정보**:\n- 현재 수업 카드 (`CurrentSubjectCard`)\n- D-day 카운트다운\n- 오늘 중식 미리보기\n- 최근 게시글 (고정글 + 최신 5개)\n- 읽지 않은 알림 수\n- 외부 링크 (NEIS+, 리로스쿨, 학교 홈페이지)\n\n**네비게이션 진입점**:\n```\nHomeScreen\n  ├── 왼쪽 상단: 관리자 방패 아이콘 → AdminScreen\n  ├── 알림 벨 → NotificationScreen\n  ├── 설정 톱니 → SettingScreen\n  ├── 게시판 카드 → BoardScreen\n  ├── 채팅 카드 → ChatListScreen\n  ├── 성적 카드 → GradeScreen\n  └── 외부 링크 → url_launcher\n```\n\n**앱 라이프사이클**: `WidgetsBindingObserver`로 앱이 포그라운드로 돌아올 때 D-day 등 새로고침.\n\n---\n\n### MealScreen (`meal_screen.dart`)\n\n**역할**: 주간 급식 조회.\n\n**데이터 흐름**:\n```\n1. WeeklyCalendar에서 날짜 선택\n2. MealDataApi.getMeal(date, mealType) 호출 (조식/중식/석식)\n3. MealCard 위젯으로 표시\n```\n\n**캐싱**: [MealDataApi](api/meal_data_api.md) 내부에서 응답 캐싱. 주간 데이터 프리페치.\n\n---\n\n### NoticeScreen (`notice_screen.dart`)\n\n**역할**: 캘린더 뷰 + 학사일정 + 개인 일정.\n\n**데이터 소스 2개**:\n1. [`NoticeDataApi`](api/notice_data_api.md) → NEIS 학사일정 (서버)\n2. [`LocalDataBase`](data/local_database.md) → 개인 일정 (SQLite)\n\n**캘린더**: `table_calendar` 위젯 사용. 날짜 마커로 일정 표시.\n\n**일정 추가**: ScheduleBottomSheet에서 시작/종료 시간, 내용, 색상 선택.\n\n**스와이프 삭제**: `Dismissible` 위젯으로 개인 일정 슬라이드 삭제.\n\n---\n\n## 게시판 화면 (screens/board/)\n\n### BoardScreen (`board_screen.dart`)\n\n**역할**: 게시판 메인. 카테고리 탭 + 글 목록 + 검색.\n\n**카테고리** (6개):\n```dart\n['자유', '질문', '정보공유', '분실물', '학생회', '동아리']\n```\n\n**카테고리 전환**: `PageView.builder`로 좌우 스와이프 전환. 상단 칩으로도 선택 가능.\n\n**글 목록 쿼리**:\n```dart\nFirebaseFirestore.instance\n  .collection('posts')\n  .where('category', isEqualTo: category)\n  .orderBy('createdAt', descending: true)\n  .limit(20)\n```\n\n**고정글**: `pinnedAt` 타임스탬프가 있는 글을 상단에 정렬.\n\n**인기글**: `likeCount` 기준 정렬 (별도 쿼리).\n\n**검색 (n-gram)**:\n```dart\n.where('searchTokens', arrayContainsAny: tokens)\n```\n+ 클라이언트 사이드 substring 추가 필터링. 350ms 디바운스.\n\n**페이지네이션**: `lastDoc` 기반 커서 페이지네이션.\n\n---\n\n### PostDetailScreen (`post_detail_screen.dart`)\n\n**역할**: 글 상세 보기, 댓글, 투표, 북마크.\n\n**실시간 스트림** (2개):\n1. 글 본문: `posts/{postId}` 문서 스냅샷\n2. 댓글: `posts/{postId}/comments` 서브컬렉션 스트림\n\n**인터랙션**:\n\n| 기능 | Firestore 필드 | 설명 |\n|------|----------------|------|\n| 좋아요 | `likes` (Map), `likeCount` | UID → true/null |\n| 싫어요 | `dislikes` (Map), `dislikeCount` | UID → true/null |\n| 북마크 | `bookmarkedBy` (Array) | arrayUnion/arrayRemove |\n| 투표 | `pollVoters` (Map) | UID → 선택 인덱스 |\n| 댓글 수 | `commentCount` | ±1 increment |\n\n**댓글 작성**:\n```\n1. FocusScope.unfocus() (키보드 닫기)\n2. Firestore comments 서브컬렉션에 추가\n3. commentCount +1 업데이트\n4. StreamBuilder가 자동으로 새 댓글 표시 (새로고침 불필요)\n```\n\n**익명 시스템**:\n- 글 단위로 `anonymousMapping` (Map<UID, int>) 유지\n- \"익명1\", \"익명2\" 등 순서대로 할당\n- 같은 글 내에서 같은 사용자는 항상 같은 번호\n\n**스와이프 제스처**: 오른쪽 스와이프로 뒤로 가기 (pop).\n\n---\n\n### WritePostScreen (`write_post_screen.dart`)\n\n**역할**: 글 작성 및 수정.\n\n**기능**:\n- 카테고리 선택\n- 제목/본문 입력 (제목 200자, 본문 5000자 제한)\n- 이미지 첨부 (최대 여러 장, 80% 압축, 1080px 리사이즈)\n- 투표 옵션 추가 (동적 추가/삭제)\n- 일정 첨부 (날짜/시간 선택)\n- 익명 토글\n- 고정 토글 (manager 이상, 최대 3개)\n\n**임시저장**: SharedPreferences에 제목/본문 자동 저장. 종료 시 확인 다이얼로그 (저장/삭제/취소).\n\n**글 저장 프로세스**:\n```\n1. 이미지 업로드 → Firebase Storage (posts/{postId}/*.jpg)\n2. SearchTokens 생성 (제목 + 본문 2-gram)\n3. Firestore posts 컬렉션에 문서 생성/업데이트\n4. 레이트 리미팅: 30초 내 재작성 방지\n```\n\n---\n\n### MyPostsScreen (`my_posts_screen.dart`)\n\n**역할**: 내 활동 (내 글/내 댓글/북마크) 3탭.\n\n| 탭 | 쿼리 |\n|----|------|\n| 내 글 | `posts WHERE authorUid == uid` |\n| 내 댓글 | `collectionGroup('comments') WHERE authorUid == uid` |\n| 북마크 | `posts WHERE bookmarkedBy array-contains uid` |\n\n---\n\n### NotificationScreen (`notification_screen.dart`)\n\n**역할**: 실시간 알림 목록.\n\n**알림 타입**:\n| 타입 | 아이콘 | 내용 |\n|------|--------|------|\n| `comment` | 채팅 버블 | \"OO님이 댓글을 남겼습니다\" |\n| `reply` | 리플라이 | \"OO님이 대댓글을 남겼습니다\" |\n| `account` | 사람 | \"OO님이 가입을 요청했습니다\" |\n\n**데이터**: `users/{uid}/notifications` 서브컬렉션 스트림.\n\n---\n\n## 채팅 화면 (screens/chat/)\n\n### ChatListScreen (`chat_list_screen.dart`)\n\n**역할**: 1:1 채팅 목록.\n\n**쿼리**:\n```dart\nchats.where('participants', arrayContains: uid)\n     .orderBy('lastMessageAt', descending: true)\n```\n\n**새 채팅**: 사용자 검색 모달 → 기존 채팅방 있으면 이동, 없으면 새로 생성.\n\n### ChatRoomScreen (`chat_room_screen.dart`)\n\n**역할**: 1:1 채팅 메시지.\n\n**기능**:\n- 실시간 메시지 스트림 (limit 30)\n- 이미지 전송 (압축 + Storage 업로드)\n- 메시지 삭제 (나만/양쪽)\n- 읽음 처리 (unreadCount 업데이트)\n- 자동 스크롤\n\n---\n\n## 설정/부가 화면 (screens/sub/)\n\n### SettingScreen (`setting_screen.dart`)\n\n**역할**: 앱 설정 (테마, 학년/반, 알림, 캐시 등).\n\n**주요 설정**:\n- 테마 모드 (라이트/다크/시스템)\n- 학년/반 선택 → [SettingData](data/setting_data.md) 반영\n- 급식 알림 시간 설정\n- 게시판 알림 on/off\n- 캐시 크기 표시 및 삭제\n- 개인정보 처리방침 (15개 조항)\n\n---\n\n### GradeScreen (`grade_screen.dart`) — Riverpod\n\n**역할**: 성적 관리 (수시/정시 탭).\n\n**Riverpod 프로바이더**:\n- `examsProvider` — 시험 목록\n- `goalsProvider` — 수시 목표\n- `jeongsiGoalsProvider` — 정시 목표\n- `examsByTypeProvider(tab)` — 탭별 필터\n\n**UI**: PageView 2탭 (수시/정시), GradeChart 시각화, 시험 카드 목록.\n\n---\n\n### TimetableViewScreen (`timetable_view_screen.dart`)\n\n**역할**: 주간 시간표 그리드.\n\n**UI**: 5열(월~금) × 7행(1~7교시) 그리드. 셀 탭 시 색상 변경.\n\n**데이터**: [`TimetableDataApi`](api/timetable_data_api.md)에서 fetch, [`SubjectDataManager`](data/subject_data_manager.md)에서 선택과목 관리.\n\n**과목 충돌**: 선택과목이 같은 시간에 겹치면 `ConflictDialog`로 해결.\n\n---\n\n### DDayScreen (`dday_screen.dart`)\n\n**역할**: D-day 관리.\n\n**기능**: 추가/삭제/고정(pin), 캘린더 일정에서 D-day 추천, 드래그 순서 변경.\n\n---\n\n### FeedbackScreen (`feedback_screen.dart`)\n\n**역할**: 사용자 피드백/버그 신고.\n\n**제한**: 내용 1000자, 이미지 최대 3장 (640px 압축).\n\n**저장**: `app_feedbacks` 또는 `council_feedbacks` 컬렉션.\n\n---\n\n### OnboardingScreen (`onboarding_screen.dart`)\n\n**역할**: 최초 실행 시 4페이지 튜토리얼.\n\n`onboarding_done` SharedPreferences 플래그로 1회만 표시.\n\n---\n\n### NotificationSettingScreen (`notification_setting_screen.dart`)\n\n**역할**: 세분화된 알림 설정.\n\n**설정 그룹**:\n1. **급식 알림** — 조식/중식/석식 on/off + 시간 설정\n2. **게시판 알림** — 전체 on/off + 카테고리별 구독\n3. **인기글 알림** — on/off\n\nFCM 토픽 구독/해제와 연동.\n","05-firebase-backend.md":"# Firebase 백엔드 상세 가이드\n\n---\n\n## Firestore 컬렉션 구조\n\n### users/{uid}\n\n사용자 프로필 및 설정.\n\n```\nusers/{uid}\n├── name: string                    # 이름\n├── studentId: string               # 학번 (\"20301\")\n├── grade: number                   # 학년\n├── classNum: number                # 반\n├── email: string                   # 이메일\n├── approved: boolean               # 관리자 승인 여부\n├── role: string                    # \"user\" | \"manager\" | \"admin\"\n├── userType: string                # \"student\" | \"graduate\" | \"teacher\" | \"parent\"\n├── lastProfileUpdate: string       # 마지막 업데이트 연도 (\"2026\")\n├── graduationYear: number?         # 졸업생: 졸업연도\n├── teacherSubject: string?         # 교사: 담당과목\n├── suspendedUntil: timestamp?      # 정지 만료 시각\n├── blockedUsers: array<string>     # 차단한 UID 목록\n├── loginProvider: string           # \"google\" | \"apple\" | \"kakao\" | \"github\"\n├── profilePhotoUrl: string?        # 프로필 사진 URL\n├── fcmToken: string?               # FCM 푸시 토큰\n├── notiComment: boolean            # 댓글 알림 (기본 true)\n├── notiReply: boolean              # 대댓글 알림 (기본 true)\n├── notiMention: boolean            # 멘션 알림 (기본 true)\n├── notiChat: boolean               # 채팅 알림 (기본 true)\n├── notiAccount: boolean            # 계정 알림 (기본 true)\n│\n├── subjects/                       # 서브컬렉션: 선택과목\n│   └── grade_{n}/\n│       ├── subjects: array<Subject>\n│       └── updatedAt: timestamp\n│\n├── notifications/                  # 서브컬렉션: 알림\n│   └── {notifId}/\n│       ├── type: string            # \"comment\" | \"reply\" | \"account\"\n│       ├── postId: string\n│       ├── postTitle: string\n│       ├── senderName: string\n│       ├── content: string\n│       ├── read: boolean\n│       └── createdAt: timestamp\n│\n└── sync/                           # 서브컬렉션: 데이터 동기화\n    ├── ddays/\n    │   └── items: array<DDay>\n    └── schedules/\n        └── items: array<Schedule>\n```\n\n### posts/{postId}\n\n게시판 글.\n\n```\nposts/{postId}\n├── title: string                   # 제목 (1~200자)\n├── content: string                 # 본문 (0~5000자)\n├── category: string                # \"자유\" | \"질문\" | \"정보공유\" | \"분실물\" | \"학생회\" | \"동아리\"\n├── authorUid: string               # 작성자 UID\n├── authorName: string              # 작성자 이름\n├── isAnonymous: boolean            # 익명 여부\n├── createdAt: timestamp            # 작성 시각\n├── updatedAt: timestamp?           # 수정 시각\n│\n├── likes: map<string, boolean>     # UID → true (좋아요)\n├── dislikes: map<string, boolean>  # UID → true (싫어요)\n├── likeCount: number               # 좋아요 수 (비정규화)\n├── dislikeCount: number            # 싫어요 수 (비정규화)\n├── commentCount: number            # 댓글 수 (비정규화)\n│\n├── bookmarkedBy: array<string>     # 북마크한 UID 목록\n├── searchTokens: array<string>     # 2-gram 검색 토큰\n├── imageUrls: array<string>        # 이미지 URL 목록\n│\n├── isPinned: boolean               # 고정글 여부\n├── pinnedAt: timestamp?            # 고정 시각\n│\n├── pollOptions: array<string>?     # 투표 옵션\n├── pollVoters: map<string, number>?# UID → 선택 인덱스\n│\n├── eventDate: string?              # 첨부 일정 날짜\n├── eventStartTime: string?         # 시작 시간\n├── eventEndTime: string?           # 종료 시간\n├── eventContent: string?           # 일정 내용\n│\n├── anonymousMapping: map<string, number>  # UID → 익명 번호\n├── anonymousCount: number                 # 다음 익명 번호\n│\n└── comments/                       # 서브컬렉션: 댓글\n    └── {commentId}/\n        ├── content: string         # 댓글 내용 (1~1000자)\n        ├── authorUid: string\n        ├── authorName: string\n        ├── isAnonymous: boolean\n        ├── parentId: string?       # 대댓글: 부모 댓글 ID\n        ├── mentions: array<string>?# 멘션된 UID 목록 (최대 20)\n        └── createdAt: timestamp\n```\n\n### chats/{chatId}\n\n1:1 채팅방.\n\n```\nchats/{chatId}\n├── participants: array<string>     # 참여자 UID 2명\n├── lastMessage: string             # 마지막 메시지 미리보기\n├── lastMessageAt: timestamp        # 마지막 메시지 시각\n├── unreadCount: map<string, number># UID → 안 읽은 수\n│\n└── messages/                       # 서브컬렉션: 메시지\n    └── {messageId}/\n        ├── content: string         # 메시지 내용 (0~2000자)\n        ├── senderUid: string       # 발신자 UID\n        ├── senderName: string\n        ├── imageUrl: string?       # 이미지 URL\n        ├── type: string?           # \"system\" (시스템 메시지)\n        ├── deleted: boolean?       # 양쪽 삭제\n        ├── deletedFor: array<string>?# 나만 삭제\n        └── createdAt: timestamp\n```\n\n### reports/{reportId}\n\n게시글/댓글 신고.\n\n```\nreports/{reportId}\n├── reporterUid: string             # 신고자 UID\n├── postId: string                  # 신고 대상 글 ID\n├── commentId: string?              # 댓글 신고 시 댓글 ID\n├── reason: string                  # 신고 사유 (1~200자)\n├── createdAt: timestamp\n```\n\n### app_config/\n\n앱 설정 문서들.\n\n```\napp_config/\n├── popup/                          # 팝업 공지 설정\n│   ├── active: boolean\n│   ├── type: string                # \"emergency\" | \"event\" | \"notice\"\n│   ├── title: string\n│   ├── content: string\n│   ├── startDate: timestamp\n│   ├── endDate: timestamp\n│   └── dismissible: boolean\n│\n└── version/                        # 앱 버전 관리\n    ├── min: string                 # 최소 버전 (강제 업데이트)\n    ├── latest: string              # 최신 버전 (선택 업데이트)\n    ├── updateUrl: string           # 기본 업데이트 URL\n    ├── updateUrlAndroid: string?\n    └── updateUrlIOS: string?\n```\n\n### 기타 컬렉션\n\n| 컬렉션 | 용도 |\n|--------|------|\n| `admin_logs/{logId}` | 관리자 작업 로그 (생성만 가능, 수정/삭제 불가) |\n| `function_logs/{logId}` | Cloud Functions 에러 로그 |\n| `crash_logs/{logId}` | 클라이언트 크래시 로그 |\n| `app_feedbacks/{id}` | 앱 피드백 |\n| `council_feedbacks/{id}` | 학생회 피드백 |\n\n---\n\n## Firestore Security Rules\n\n### 헬퍼 함수\n\n```javascript\nisSignedIn()        // request.auth != null\nisAdmin()           // users 문서의 role == 'admin'\nisAdminOrManager()  // role in ['admin', 'manager']\nchangedKeys()       // 변경된 필드 목록\nisInteractionUpdate() // 좋아요/싫어요/투표/댓글수/북마크만 변경\nvalidCounterDelta(field) // 카운터 ±1 범위 검증\n```\n\n### 핵심 규칙\n\n#### users\n| 작업 | 조건 |\n|------|------|\n| read | 로그인 + (본인 또는 admin/manager) |\n| create | 로그인 |\n| update | 본인 (role/suspendedUntil/approved 변경 불가) 또는 admin/manager |\n| delete | 본인 또는 admin |\n\n**중요**: `update` 시 `.get('role', 'user')` 기본값을 사용해 필드 누락 시에도 규칙이 정상 작동.\n\n#### posts\n| 작업 | 조건 |\n|------|------|\n| read | 누구나 (공개) |\n| create | 로그인 + authorUid 일치 + 제목/본문 길이 검증 |\n| update | 작성자 (자유 수정) 또는 인터랙션 필드만 (카운터 ±1 검증) |\n| delete | 작성자 또는 admin/manager |\n\n#### comments (posts 서브컬렉션)\n| 작업 | 조건 |\n|------|------|\n| read | 누구나 |\n| create | 로그인 + authorUid 일치 + 내용 길이 + mentions 배열 검증 |\n| update | admin/manager만 (soft-delete 대비) |\n| delete | 작성자 또는 admin/manager |\n\n#### chats/messages\n- 참여자만 읽기/쓰기 가능\n- 메시지: senderUid 일치 또는 type=='system'\n- 삭제: `deletedFor` (나만) / `deleted` + `content` (양쪽) 필드만 수정 가능\n\n#### reports\n- 로그인 사용자 누구나 생성 (reporterUid 일치 + reason 필수)\n- admin/manager만 읽기/삭제\n\n---\n\n## Firebase Storage Rules\n\n| 경로 | 읽기 | 쓰기 | 크기 제한 |\n|------|------|------|-----------|\n| `profile_photos/{file}` | 누구나 | 로그인 | 2 MB |\n| `posts/{postId}/{file}` | 로그인 | 로그인 | 5 MB |\n| `chats/{chatId}/{file}` | 로그인 | 로그인 | 5 MB |\n| `feedbacks/{type}/{file}` | 로그인 | 로그인 | 5 MB |\n\n모든 업로드는 `image/*` content-type만 허용.\n\n---\n\n## Cloud Functions (functions/index.js)\n\nNode.js 20, Firebase Functions v2 기반. Zod로 입력 검증.\n\n### HTTP 함수\n\n#### `kakaoCustomAuth` (POST)\n카카오 OAuth 토큰 → Firebase Custom Token 변환.\n\n```\n요청: POST { token: \"kakao_access_token\" }\n응답: { firebaseToken: \"firebase_custom_token\" }\n\n흐름:\n1. Zod 스키마로 입력 검증 (10~2000자 문자열)\n2. Kakao API (/v2/user/me)로 토큰 유효성 확인\n3. Firebase Auth에서 \"kakao:{kakaoId}\" UID로 사용자 조회/생성\n4. 카카오 프로필 사진이 있으면 Firestore에 저장\n5. Custom Token 발급 후 반환\n```\n\n#### `backfillCustomClaims` (POST)\n기존 사용자에게 Custom Claims 일괄 적용 (1회성 마이그레이션).\n`x-admin-secret` 헤더로 인증.\n\n### Firestore 트리거\n\n#### `onCommentCreated` (posts/{postId}/comments/{commentId})\n댓글 생성 시 알림 발송.\n\n```\n알림 대상 (중복 제거):\n1. 글 작성자 → \"OO: 댓글내용\" 푸시\n2. 멘션된 사용자들 → \"OO님이 회원님을 언급했습니다\" 푸시\n3. 대댓글 시 부모 댓글 작성자 → \"답글 알림\" 푸시\n\n조건:\n- 작성자가 approved 상태여야 발송\n- 각 수신자의 notiComment/notiMention/notiReply 설정 확인\n- 이미 알림 받은 사용자는 중복 발송 방지\n```\n\n#### `onPostCreated` (posts/{postId})\n새 글 생성 시 FCM 토픽 알림.\n\n```\n공지글 (isPinned) → \"board_new_post\" 토픽 (전체)\n일반글 → \"board_{category}\" 토픽 (카테고리 구독자)\n```\n\n#### `onPostLikeUpdated` (posts/{postId})\n좋아요 수가 10개를 처음 넘으면 인기글 알림.\n\n```\n조건: beforeLikes < 10 && afterLikes >= 10\n토픽: \"board_popular\"\n```\n\n#### `onUserCreated` (users/{userId})\n새 사용자 생성 시 admin/manager에게 가입 알림 발송.\n\n#### `onUserUpdated` (users/{userId})\n사용자 상태 변경 시 처리:\n\n| 변경 | 동작 |\n|------|------|\n| role 변경 | Custom Claims 업데이트 + 권한 변경 알림 |\n| approved 변경 | Custom Claims 업데이트 + 가입 승인 알림 |\n| suspendedUntil 설정 | 정지 알림 |\n| suspendedUntil 해제 | 정지 해제 알림 |\n\n#### `onUserDeleted` (users/{userId})\n사용자 삭제 시:\n1. 거절/삭제 알림 발송\n2. Firebase Auth 계정 삭제\n3. 서브컬렉션 (subjects, notifications) 정리\n\n#### `onChatMessageCreated` (chats/{chatId}/messages/{messageId})\n채팅 메시지 생성 시 상대방에게 푸시 알림.\n이미지 메시지는 \"[사진]\"으로 표시.\n\n#### `onReportCreated` (reports/{reportId})\n신고 레이트 리미팅: 5분 내 3건 초과 시 자동 삭제 + 로그.\n\n### 스케줄러\n\n#### `checkSuspensionExpiry` (매시간)\n정지 만료된 사용자의 `suspendedUntil` 필드 삭제.\n→ `onUserUpdated` 트리거 → 정지 해제 알림 자동 발송.\n\n#### `cleanupOldPosts` (매일 03:00 KST = 18:00 UTC)\n4년 지난 비공지 게시글 자동 삭제:\n1. 하위 댓글 삭제\n2. Storage 이미지 삭제\n3. 게시글 문서 삭제\n4. 삭제 수 로그 기록\n\n---\n\n## FCM 토픽 구조\n\n| 토픽 | 설명 |\n|------|------|\n| `board_new_post` | 전체 새 글 (공지글) |\n| `board_free` | 자유 카테고리 |\n| `board_question` | 질문 카테고리 |\n| `board_info` | 정보공유 카테고리 |\n| `board_lost` | 분실물 카테고리 |\n| `board_council` | 학생회 카테고리 |\n| `board_club` | 동아리 카테고리 |\n| `board_popular` | 인기글 (좋아요 10+) |\n\n**주의**: 한국어 카테고리명은 FCM 토픽으로 사용 불가 (영문 매핑 필요).\n```dart\nstatic const _categoryTopicKey = {\n  '자유': 'free', '질문': 'question', '정보공유': 'info',\n  '분실물': 'lost', '학생회': 'council', '동아리': 'club',\n};\n```\n\n---\n\n## Firestore 복합 인덱스\n\n| 컬렉션 | 필드 | 용도 |\n|--------|------|------|\n| posts | category ↑, createdAt ↓ | 카테고리별 최신글 |\n| posts | authorUid ↑, createdAt ↓ | 내 글 목록 |\n| posts | bookmarkedBy (array), createdAt ↓ | 북마크 목록 |\n| posts | isPinned ↑, createdAt ↓ | 고정글 + 최신글 |\n| posts | category ↑, likeCount ↓, createdAt ↓ | 인기글 정렬 |\n| chats | participants (array), lastMessageAt ↓ | 채팅방 목록 |\n| admin_logs | action ↑, createdAt ↓ | 관리 로그 |\n| reports | postId ↑, reporterUid ↑ | 중복 신고 체크 |\n| reports | reporterUid ↑, createdAt ↓ | 신고 이력 |\n\n---\n\n## Firebase 프로젝트 설정\n\n| 항목 | 값 |\n|------|-----|\n| Project ID | `hansol-high-school-46fc9` |\n| Android 패키지 | (google-services.json 참조) |\n| iOS 번들 ID | `com.monkshark.hansolHighSchool` |\n| Functions Runtime | Node.js 20 |\n| Emulator Ports | Firestore: 8080, Auth: 9099 |\n\n### App Check\n\n```dart\n// Android\nRelease: PlayIntegrity\nDebug: DebugProvider\n\n// iOS (현재)\nDebug: DebugProvider\n// iOS (Apple 개발자 등록 후)\nRelease: AppAttest\n```\n\n---\n\n## 에러 로깅\n\n### function_logs 컬렉션\n모든 Cloud Function 에러가 기록된다:\n\n```javascript\nawait logError(\"functionName\", error, { extra: \"context\" });\n// → function_logs/{auto-id}\n//   { function, error, code, stack, ...extra, createdAt }\n```\n\n### crash_logs 컬렉션\n클라이언트 Flutter 에러가 기록된다 (로그인 상태일 때만):\n\n```dart\n// main.dart\nFirebaseFirestore.instance.collection('crash_logs').add({\n  'error': details.exceptionAsString(),\n  'stack': details.stack?.toString(),\n  'library': details.library,\n  'uid': AuthService.currentUser?.uid,\n  'createdAt': FieldValue.serverTimestamp(),\n});\n```\n","06-api-integration.md":"# 외부 API 연동 가이드\n\n> 각 클래스의 함수별 상세 설명은 [API Reference](api/README.md)를 참조한다.\n\n---\n\n## NEIS 교육정보 API\n\n교육부 [NEIS 교육정보 개방 포털](https://open.neis.go.kr/)에서 제공하는 공개 API이다.\n급식, 시간표, 학사일정 데이터를 조회한다.\n\n### API 키\n\n`lib/api/nies_api_keys.dart` (gitignore 대상)에 저장:\n\n```dart\nclass NiesApiKeys {\n  static const String apiKey = 'YOUR_NEIS_API_KEY';\n}\n```\n\nNEIS API 키는 **공개 API 키**로, 클라이언트에 포함되어도 보안 위험이 낮다.\n(요청 수 제한만 존재, 민감 데이터 접근 없음)\n\n---\n\n### 급식 API → [meal_data_api.md](api/meal_data_api.md)\n\n**엔드포인트**: `https://open.neis.go.kr/hub/mealServiceDietInfo`\n\n| 파라미터 | 설명 |\n|----------|------|\n| `KEY` | API 인증 키 |\n| `ATPT_OFCDC_SC_CODE` | 시도교육청코드 |\n| `SD_SCHUL_CODE` | 표준학교코드 |\n| `MLSV_YMD` | 급식일자 (YYYYMMDD) |\n| `MMEAL_SC_CODE` | 식사코드 (1=조식, 2=중식, 3=석식) |\n\n**핵심 전략**: 월간 프리페치 + 차등 TTL (정상 24h / 빈 데이�� 5min)\n\n---\n\n### 시간표 API → [timetable_data_api.md](api/timetable_data_api.md)\n\n**엔드포인트**: `https://open.neis.go.kr/hub/hisTimetable` (고등학교)\n\n| 파라미터 | 설명 |\n|----------|------|\n| `GRADE` | 학년 |\n| `CLASS_NM` | 반 |\n| `TI_FROM_YMD` | 시작일 |\n| `TI_TO_YMD` | 종료일 |\n\n**핵심 전략**: 이번 주 → 다음 주 → 지난 주 폴백 + 과목 조합 프리로드\n\n---\n\n### 학사일정 API → [notice_data_api.md](api/notice_data_api.md)\n\n**엔드포인트**: `https://open.neis.go.kr/hub/SchoolSchedule`\n\n| 파라미터 | 설명 |\n|----------|------|\n| `AA_FROM_YMD` | 시작일 |\n| `AA_TO_YMD` | 종료일 |\n\n**핵심 전략**: 12h 캐시 + 90일 범위 예정 이벤트 조회\n\n---\n\n## Kakao OAuth 연동\n\n### 아키텍처\n\n```\nFlutter 앱                    Cloud Function                 Kakao 서버\n    │                              │                              │\n    ├── Kakao SDK 로그인 ──────────────────────────────────────→ │\n    │← access_token ─────────────────────────────────────────────┤\n    │                              │                              │\n    ├── POST /kakaoCustomAuth ────→│                              │\n    │   { token: access_token }    ├── GET /v2/user/me ──────────→│\n    │                              │←── 사용자 정보 ──────────────┤\n    │                              │                              │\n    │                              ├── Firebase Auth 사용�� 조회/생성\n    │                              ├── Custom Token 발급\n    │←── { firebaseToken } ────────┤\n    │                              │\n    ├── signInWithCustomToken()    │\n    └── 로그인 완료                │\n```\n\n### Kakao SDK 설정\n\n`lib/api/kakao_keys.dart` (gitignore 대상):\n\n```dart\nclass KakaoKeys {\n  static const String nativeAppKey = 'YOUR_KAKAO_NATIVE_APP_KEY';\n}\n```\n\n### UID 형식\n\nKakao 사용자는 Firebase에서 `kakao:{kakaoUserId}` 형태의 UID를 사용한다.\n\n### 주의사항\n\n- Kakao 계정의 **이메일은 비즈앱 심사 없이는 제공되지 않음**\n- 이메일 없이도 앱 사용 가능 (계정 삭제 시 이름으로 확인)\n- 프로필 사진은 Kakao에서 제공하면 Firestore에 자동 저장\n\n---\n\n## 소셜 로그인 요약\n\n각 로그인 메서드의 코드 레벨 상세는 [auth_service.md](data/auth_service.md) 참조.\n\n| 프로바이더 | 방식 | Cloud Function 필요 |\n|-----------|------|-------------------|\n| Google | `GoogleSignIn` → Firebase credential | X |\n| Apple | nonce + SHA256 → OAuthProvider | X |\n| Kakao | Kakao SDK → Cloud Function → Custom Token | O (`kakaoCustomAuth`) |\n| GitHub | `signInWithProvider` (Firebase 내장) | X |\n\n---\n\n## Firebase Cloud Messaging → [fcm_service.md](notification/fcm_service.md)\n\n### 토픽 구조\n\n```\nboard_new_post      ← 전체 게시판 알림 (마스터 토글)\nboard_free          ← 자유 게시판\nboard_question      ← 질문 게시판\nboard_info          ← 정보공유 게시판\nboard_lost          ← 분실물 게시판\nboard_council       ← 학생회 게시판\nboard_club          ← 동아리 게시판\nboard_popular       ← 인기글 알림\n```\n\n한글 카테고리명은 영문 키로 변환 (FCM 토픽은 영문만 허용).\n\n### 딥링크 타입\n\n| type | 동작 |\n|------|------|\n| `comment` / `new_post` | → `PostDetailScreen(postId)` |\n| `chat` | → Firestore에서 상대 정보 로드 → `ChatRoomScreen` |\n| `account` | 앱만 열림 (무시) |\n\n---\n\n## 로컬 급식 알림 → [daily_meal_notification.md](notification/daily_meal_notification.md)\n\n- 평일(월~금) 반복 알림, 조식/중식/석식 개별 ON/OFF\n- 타임존 처리 (Asia/Seoul)\n- 알림 본문에 당일 메뉴 미리보기 포함\n- 알레르기 번호 자동 제거\n\n---\n\n## 앱 업데이트 체크 → [update_checker.md](notification/update_checker.md)\n\nFirestore `app_config/version` 문서 기반:\n\n| 필드 | 설명 |\n|------|------|\n| `min` | 최소 지원 버전 → 이 미만이면 **필수** 업데이트 (닫기 불가) |\n| `latest` | 최신 버전 → 이 미만이면 **선택** 업데이트 (\"나중에\" 가능) |\n| `updateUrlAndroid` / `updateUrlIOS` | 플랫폼별 스토어 URL |\n\n---\n\n## 인앱 팝업 공지 → [popup_notice.md](notification/popup_notice.md)\n\nFirestore `app_config/popup` 문서 기반. 긴급/이벤트/일반 타입별 색상 분리. \"오늘 안 보기\" 지원.\n","07-admin-system.md":"# 관리자 시스템 가이드\n\n---\n\n## 권한 체계\n\n### 역할 (role)\n\n| 역할 | 권한 |\n|------|------|\n| `admin` | 모든 관리 기능 + 역할 변경 + 계정 삭제 |\n| `manager` | 대부분의 관리 기능 (글/댓글 삭제, 승인, 정지 등) |\n| `user` | 일반 사용자 (게시판 이용, 댓글 작성 등) |\n\n### 승인 (approved)\n\n신규 가입자는 `approved: false` 상태.\nadmin 또는 manager가 승인해야 게시판 등 주요 기능 이용 가능.\n\n```\n가입 → approved: false → 관리자 승인 → approved: true → 모든 기능 이용\n```\n\n### 정지 (suspendedUntil)\n\n관리자가 특정 기간 동안 사용자를 정지할 수 있다.\n\n```\n정지 설정 → suspendedUntil: timestamp → 기능 제한\n매시간 스케줄러 → 만료 확인 → suspendedUntil: null → 자동 해제\n```\n\n### Custom Claims 동기화\n\nFirestore의 role/approved 변경 시 Cloud Function이 Firebase Auth Custom Claims에 자동 동기화:\n\n```javascript\n// onUserUpdated Cloud Function\nawait getAuth().setCustomUserClaims(userId, {\n  role: after.role || \"user\",\n  approved: after.approved === true,\n});\n```\n\n클라이언트에서 ID 토큰 강제 갱신:\n```dart\nstatic Future<void> refreshCustomClaims() async {\n  await FirebaseAuth.instance.currentUser?.getIdToken(true);\n}\n```\n\n---\n\n## 인앱 관리자 화면 (screens/board/admin/)\n\n### AdminScreen (`admin_screen.dart`)\n\nTabBar 기반 관리 대시보드.\n\n**탭 구성**:\n1. 가입 대기 (`UsersTab` - pending)\n2. 정지 유저 (`UsersTab` - suspended)\n3. 승인 유저 (`UsersTab` - approved)\n4. 신고 관리 (`ReportsTab`)\n5. 삭제 로그 (`DeleteLogsTab`)\n6. 팝업 관리 (`PopupNoticeManager`)\n7. 피드백 (`FeedbackListScreen`)\n\n### 탭 간 상태 동기화\n\n`GlobalKey` 패턴으로 한 탭에서의 액션이 다른 탭에도 반영된다:\n\n```dart\n// admin_screen.dart\nfinal _pendingKey = GlobalKey<UsersTabState>();\nfinal _suspendedKey = GlobalKey<UsersTabState>();\nfinal _approvedKey = GlobalKey<UsersTabState>();\n\nvoid _refreshAllTabs() {\n  _pendingKey.currentState?.refresh();\n  _suspendedKey.currentState?.refresh();\n  _approvedKey.currentState?.refresh();\n}\n```\n\n### UsersTab (`admin/users_tab.dart`)\n\n사용자 관리 탭. 필터 모드에 따라 다른 쿼리:\n\n| 모드 | Firestore 쿼리 |\n|------|----------------|\n| pending | `approved == false` (정지 아닌 유저) |\n| suspended | `suspendedUntil != null` |\n| approved | `approved == true` |\n\n**관리 액션**:\n\n| 액션 | 설명 | 대상 역할 |\n|------|------|-----------|\n| 승인 | approved → true | admin, manager |\n| 거절 | 유저 문서 삭제 | admin, manager |\n| 정지 | suspendedUntil 설정 (1일~영구) | admin, manager |\n| 정지 해제 | suspendedUntil → null | admin, manager |\n| 삭제 | 유저 문서 삭제 + Auth 삭제 | admin |\n| 역할 변경 | role 변경 | admin만 |\n\n모든 액션은 `_refreshAll()` 호출 → 3개 탭 모두 새로고침.\n\n### ReportsTab (`admin/reports_tab.dart`)\n\n게시글/댓글 신고 관리.\n\n```\nreports 컬렉션 조회\n  ├── 글 보기 (PostDetailScreen으로 이동)\n  ├── 글 삭제 (posts 문서 삭제)\n  ├── 신고 무시 (reports 문서 삭제)\n  └── 사용자 정지 (suspendedUntil 설정)\n```\n\n### DeleteLogsTab (`admin/delete_logs_tab.dart`)\n\n관리자 작업 로그 조회 (`admin_logs` 컬렉션).\n\n```\nadmin_logs/{id}\n├── action: string     # \"delete_post\" | \"delete_comment\" | \"approve\" | ...\n├── adminUid: string\n├── adminName: string\n├── targetId: string\n├── detail: string\n└── createdAt: timestamp\n```\n\n### PopupNoticeManager (`admin/popup_notice_manager.dart`)\n\n인앱 팝업 공지 관리 (`app_config/popup` 문서).\n\n설정 가능 항목:\n- 활성화/비활성화\n- 타입: emergency (긴급) / event (행사) / notice (공지)\n- 제목, 내용\n- 표시 기간 (시작~종료)\n- 닫기 가능 여부 (dismissible)\n\n---\n\n## 관리자 웹 대시보드 (admin-web/)\n\nNext.js 16 + React 18 + Tailwind CSS 기반 웹 관리 도구.\n\n### 페이지 구성\n\n| 페이지 | 경로 | 기능 |\n|--------|------|------|\n| 대시보드 | `/dashboard` | 통계 개요 (유저 수, 글 수, 신고 수) |\n| 사용자 관리 | `/users` | 승인/거절/정지/역할변경 |\n| 사용자 상세 | `/users/[id]` | 개별 유저 프로필 및 활동 |\n| 게시글 관리 | `/posts` | 글 목록, 검색, 삭제 |\n| 게시글 상세 | `/posts/[id]` | 글 내용 및 댓글 관리 |\n| 댓글 관리 | `/comments` | 전체 댓글 조회/삭제 |\n| 신고 관리 | `/reports` | 신고 처리 |\n| 크래시 로그 | `/crashes` | 클라이언트 에러 로그 |\n| Functions 로그 | `/function-logs` | Cloud Function 에러 로그 |\n| 피드백 | `/feedbacks` | 사용자 피드백 |\n| 설정 | `/settings` | 앱 설정 (버전, 팝업 등) |\n\n### 공통 컴포넌트\n\n- `Sidebar` — 좌측 네비게이션\n- `Badge` — 상태 표시 (승인/미승인/정지 등)\n- `StatsCard` — 통계 카드 (Recharts 차트)\n\n### 환경 설정\n\n`admin-web/.env.local` (gitignore 대상):\n```env\nNEXT_PUBLIC_FIREBASE_API_KEY=...\nNEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=...\nNEXT_PUBLIC_FIREBASE_PROJECT_ID=...\nNEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=...\nNEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=...\nNEXT_PUBLIC_FIREBASE_APP_ID=...\n```\n\n---\n\n## 신고 시스템 흐름\n\n```\n1. 사용자가 글/댓글 신고\n   └── reports 컬렉션에 문서 생성\n       ├── reporterUid, postId, commentId?, reason, createdAt\n\n2. Cloud Function (onReportCreated) 레이트 리미팅\n   └── 5분 내 3건 초과 시 자동 삭제 + 로그\n\n3. 관리자 확인 (인앱 또는 웹)\n   ├── 글 삭제 → posts 문서 삭제\n   ├── 사용자 정지 → suspendedUntil 설정\n   ├── 무시 → reports 문서 삭제\n   └── admin_logs에 작업 기록\n```\n\n---\n\n## 알림 시스템 (관리자 관련)\n\n### 가입 요청 알림\n\n```\n사용자 가입 → ProfileSetupScreen._notifyAdminsNewSignup()\n  └── admin/manager의 notifications 서브컬렉션에 알림 추가\n\n+ Cloud Function (onUserCreated)\n  └── admin/manager에게 FCM 푸시 발송\n```\n\n### 상태 변경 알림\n\n| 이벤트 | 알림 내용 |\n|--------|-----------|\n| 가입 승인 | \"가입이 승인되었습니다\" |\n| 가입 거절 | \"가입이 거절되었습니다\" |\n| 정지 | \"관리자에 의해 계정이 정지되었습니다\" |\n| 정지 해제 | \"계정 정지가 해제되었습니다\" |\n| 역할 변경 | \"{새 역할}(으)로 변경되었습니다\" |\n| 계정 삭제 | \"관리자에 의해 계정이 삭제되었습니다\" |\n\n모든 알림은 `onUserUpdated` / `onUserDeleted` Cloud Function에서 자동 처리.\n사용자의 `notiAccount` 설정이 false면 발송하지 않음.\n","08-phase4-i18n-notifications.md":"# Phase 4: i18n 완성 + 알림 시스템 ���선\n\n> 이 문서는 Phase 4에서 수행한 국제화 완성, 인앱 언어 전환, 알림 딥링크, 버그 수정 작업을 정리한다.\n\n---\n\n## 1. i18n 완전 적용\n\n### 개요\n기존에 ARB 키가 적용되지 않은 모든 하드코딩 한국어 문자열을 `AppLocalizations` 키로 교체했다. 과목명·API 데이터 등 서버에서 오는 값은 제외.\n\n### 변경 범위\n\n| 영역 | 파일 | 주요 변경 |\n|------|------|----------|\n| 게시판 | `post_detail_screen.dart`, `board_screen.dart`, `write_post_screen.dart` | `'익명'` → `l.post_anonymous`, `'관리자 승인 대기 중입니다'` → ARB 키 |\n| 댓글 | `post_comment_item.dart` | `'익명'` fallback → ARB, `_formatTime` 로컬라이즈 |\n| 내 활동 | `my_posts_screen.dart`, `bookmarked_posts_screen.dart` | `'로그인이 필요합니다'` → ARB |\n| 알림 | `notification_screen.dart` | `'로그인이 필요합니다'` → ARB |\n| 성적 입력 | `grade_input_screen.dart` | 정적 `_typeLabels`/`_mockMonths` → 로컬라이즈 메서드, 저장 값은 한국어 유지 (하위 호환) |\n| 날짜 포맷 | `dday_screen.dart`, `home_screen.dart`, `meal_header.dart`, `today_banner.dart`, `main_calendar.dart`, `schedule_bottom_sheet.dart`, `event_attach_card.dart`, `write_event_form_section.dart`, `weekly_calendar.dart` | `DateFormat('M/d (E)', 'ko_KR')` → `DateFormat(l.common_dateMdE, Localizations.localeOf(context).toString())` |\n| 시간표 | `timetable_select_screen.dart`, `teacher_timetable_select_screen.dart` | `'교시'` → `timetable_selectPeriod` ARB 키 |\n| 알림 서비스 | `fcm_service.dart`, `daily_meal_notification.dart` | `'대화상대'` → ARB, 디바이스 로캘 감지 |\n| 업데이트/팝업 | `update_checker.dart`, `popup_notice.dart` | `'필수 업데이트'`, `'공지'`, `'확인'` 등 → ARB |\n\n### 성적 입력 화면 주의점\n- Firestore 저장 값(`'3월'`, `'6월'` 등)은 한국어로 유지 → 기존 데이터 하위 호환\n- UI 표시 레이블만 로컬라이즈 (`_localizedMonths(l)`, `_availableTypes(l)`)\n\n---\n\n## 2. 인앱 언어 전환\n\n### 구현\n\n| 파일 | 변경 |\n|------|------|\n| `main.dart` | `localeNotifier` (`ValueNotifier<Locale?>`) 추가, `MaterialApp`을 `ValueListenableBuilder`로 감싸서 `locale:` 파라미터 동적 전달 |\n| `setting_data.dart` | `localeCode` getter/setter 추가 (SharedPreferences 저장) |\n| `setting_screen.dart` | 테마 섹션 아래 언어 선택 UI 추가 (시스템 / 한국어 / English 3버튼) |\n\n### 동작 방식\n```\n사용자가 버튼 탭\n→ SettingData().localeCode = code ('' / 'ko' / 'en')\n→ localeNotifier.value = code.isEmpty ? null : Locale(code)\n→ ValueListenableBuilder rebuild\n→ MaterialApp(locale: ...) 즉시 반영\n```\n\n- `null` (시스���): OS 설정 언어 따름\n- `Locale('ko')`: 강제 한국어\n- `Locale('en')`: 강제 영어\n\n---\n\n## 3. 알림 딥링크 라우팅\n\n### 이전\n- `type=comment/new_post` → `PostDetailScreen` (백그라운드에서만 동작)\n- `type=chat` → `ChatRoomScreen`\n- `type=account` → 무시 (앱만 열림)\n- **포그라운드 알림 탭** → 아무 동작 없음 (로컬 알림 플러그인 미초기화)\n\n### 이후\n\n| type | 대상 | 이동 화면 |\n|------|------|----------|\n| `comment` / `new_post` | 게시글 작성자 / 구독자 | `PostDetailScreen` |\n| `account` | 관리자 (가입 요청) | `AdminScreen` |\n| `account` | 일반 유저 (승인/정지 등) | `NotificationScreen` |\n| `chat` | 채팅 참여자 | `ChatRoomScreen` |\n\n### 포그라운드 알림 탭 수정\n`FcmService.initialize()`에서 `FlutterLocalNotificationsPlugin.initialize()` 호출 추가:\n```dart\nawait _localNotifications.initialize(\n  const InitializationSettings(android: androidSettings, iOS: iosSettings),\n  onDidReceiveNotificationResponse: onNotificationTap,\n);\n```\n→ 포그라운드에서 받은 FCM 알림 탭 시에도 딥링크 라우팅 동작\n\n### 알림 목록 화면 탭\n`notification_screen.dart`에서 account 타입 알림 탭 시:\n- 관리자 → `AdminScreen` 이동\n- 일반 유저 → 읽음 처리만 (이미 알림 화면에 있음)\n\n---\n\n## 4. 버그 수정\n\n### 4-1. 댓글 중복 알림\n**문제**: 내 익명글에 누군가 댓글 달면 \"답글 알림\" + \"댓글 알림\" 2개가 동시에 옴 (동일 내용)\n\n**원인**: `post_detail_screen.dart`에서 대댓글 알림과 게시글 댓글 알림을 독립적으로 발송\n\n**해결**: `replyNotifiedUid` 변수로 대댓글 알림을 보낸 UID를 추적, 게시글 작성자 알림 발송 시 해당 UID면 스킵:\n```dart\nif (postAuthorUid != myUid && postAuthorUid != replyNotifiedUid) {\n  // 댓글 알림 발송\n}\n```\n\n### 4-2. @멘션 띄어쓰기 이름 하이라이트\n**문제**: `@12121 추희도`처럼 이름에 띄어쓰기가 있으면 `@12121`만 파란색으로 표시\n\n**원인**: 멘션 정규식이 공백에서 끊김\n\n**해결**: 정규식을 `@([\\w가-힣]+(?: [\\w가-힣]+)*)` 로 변경하여 공백 포함 이름 매칭. `post_detail_screen.dart`와 `post_comment_item.dart` 모두 적용.\n\n### 4-3. 관리자 화면 스크롤 시 섹션 오작동\n**문제**: 삭제 로그를 펼친 상태에서 빠르게 스크롤하면 다른 `ExpansionTile`이 의도치 않게 열림\n\n**원인**: `ExpansionTile`의 내부 `InkWell`이 스크롤 중에도 탭 이벤트를 받음\n\n**해결**: `ExpansionTile` → 커스텀 `GestureDetector` + `AnimatedSize` 구현으로 교체. `NotificationListener<ScrollNotification>`으로 스크롤 시점 추적, 스크롤 직후 150ms 이내 탭은 무시.\n\n---\n\n## 5. UX 개선\n\n### 5-1. 알림 권한 요청 타이밍\n**이전**: `main()`에서 앱 시작 즉시 `Permission.notification.request()`\n\n**이후**: 온보딩 4페이지 완료 시 (`OnboardingScreen._finish()`) 요청\n- 사용자가 앱의 기능을 먼저 확인한 후 권한을 결정할 수 있음\n- 이미 온보딩을 완료한 기존 유저에게는 영향 없음\n\n### 5-2. 관리자 화면 기본 접힘\n**이전**: 승인 대기/신고/학생회 건의 섹션이 기본 펼침 (`initiallyExpanded: true`)\n\n**이후**: 모든 섹션 기본 접힘 → 필요한 섹션만 선택적으로 펼치도록 변경\n","api/meal_data_api.md":"# MealDataApi\r\n\r\n> `lib/api/meal_data_api.dart` — NEIS 급식 API 연동\r\n\r\n모든 메서드가 `static`. NEIS 교육정보 API에서 급식 데이터를 조회하고, SharedPreferences에 캐싱한다.\r\n\r\n---\r\n\r\n## 상수\r\n\r\n| 상수 | 값 | 설명 |\r\n|------|----|------|\r\n| `BREAKFAST` | 1 | 조식 코드 |\r\n| `LUNCH` | 2 | 중식 코드 |\r\n| `DINNER` | 3 | 석식 코드 |\r\n\r\n---\r\n\r\n## `getMeal`\r\n\r\n```dart\r\nstatic Future<Meal?> getMeal({\r\n  required DateTime date,\r\n  required int mealType,\r\n  required String type,\r\n})\r\n```\r\n\r\n**설명**: 특정 날짜·식사 유형의 급식 데이터를 반환한다.\r\n\r\n**흐름**:\r\n\r\n1. 캐시 키를 생성한다:\r\n   ```dart\r\n   final cacheKey = _cacheKey(date, mealType);\r\n   // → \"meal_20260410_2\" 형태\r\n   ```\r\n\r\n2. SharedPreferences에서 캐시를 조회. 유효한 데이터면 즉시 반환:\r\n   ```dart\r\n   final cached = _getFromCache(prefs, cacheKey);\r\n   if (cached != null && cached.meal != null && cached.meal != '급식 정보가 없습니다.') {\r\n     return cached;\r\n   }\r\n   ```\r\n\r\n3. 오프라인이면 캐시 데이터 또는 안내 메시지 반환:\r\n   ```dart\r\n   if (await NetworkStatus.isUnconnected()) {\r\n     if (cached != null) return cached;\r\n     return Meal(meal: \"식단 정보를 확인하려면 인터넷에 연결하세요\", ...);\r\n   }\r\n   ```\r\n\r\n4. 월간 프리페치를 시도해 해당 월 전체 급식을 한 번에 캐싱:\r\n   ```dart\r\n   await _prefetchMonth(date);\r\n   ```\r\n\r\n5. 프리페치 후 캐시 재확인. 있으면 반환, 없으면 개별 요청:\r\n   ```dart\r\n   final afterPrefetch = _getFromCache(prefs, cacheKey);\r\n   if (afterPrefetch != null) return afterPrefetch;\r\n   return _fetchSingleMeal(date, mealType, prefs, cacheKey);\r\n   ```\r\n\r\n**반환값**: `Meal?` — 급식 데이터. 없으면 `meal: '급식 정보가 없습니다.'`\r\n\r\n---\r\n\r\n## `_fetchSingleMeal`\r\n\r\n```dart\r\nstatic Future<Meal> _fetchSingleMeal(\r\n  DateTime date, int mealType, SharedPreferences prefs, String cacheKey)\r\n```\r\n\r\n**설명**: 단일 날짜·식사의 급식을 NEIS API로 직접 요청한다.\r\n\r\n1. NEIS API URL을 구성:\r\n   ```dart\r\n   final requestURL = 'https://open.neis.go.kr/hub/mealServiceDietInfo?...'\r\n       '&MMEAL_SC_CODE=$mealType'\r\n       '&MLSV_YMD=$formattedDate';\r\n   ```\r\n\r\n2. `_fetchData`로 HTTP GET 요청:\r\n   ```dart\r\n   final data = await _fetchData(requestURL);\r\n   ```\r\n\r\n3. 응답의 `mealServiceDietInfo > row`를 파싱:\r\n   ```dart\r\n   meal: (row['DDISH_NM'] as String).replaceAll('<br/>', '\\n'),\r\n   kcal: row['CAL_INFO'] as String,\r\n   ntrInfo: (row['NTR_INFO'] as String?)?.replaceAll('<br/>', '\\n') ?? '',\r\n   ```\r\n   `<br/>` 태그를 줄바꿈으로 치환.\r\n\r\n4. 결과를 캐시에 저장 후 반환. 데이터 없으면 '급식 정보가 없습니다.' 반환.\r\n\r\n---\r\n\r\n## `_prefetchMonth`\r\n\r\n```dart\r\nstatic Future<void> _prefetchMonth(DateTime date)\r\n```\r\n\r\n**설명**: 해당 월의 전체 급식을 한 번의 API 호출로 프리페치한다.\r\n\r\n1. 같은 월이 이미 프리페치 중이면 그 Future를 대기:\r\n   ```dart\r\n   if (_prefetchingMonths.containsKey(monthKey)) {\r\n     await _prefetchingMonths[monthKey];\r\n     return;\r\n   }\r\n   ```\r\n   `Completer`로 중복 요청 방지.\r\n\r\n2. 월의 첫날~마지막날 범위로 API 호출:\r\n   ```dart\r\n   '&MLSV_FROM_YMD=$fromDate'\r\n   '&MLSV_TO_YMD=$toDate'\r\n   '&pSize=100'\r\n   ```\r\n\r\n3. 응답의 모든 row를 개별 캐시 키로 저장:\r\n   ```dart\r\n   final key = _cacheKey(mealDate, mealCode);\r\n   _saveToCache(prefs, key, meal);\r\n   ```\r\n\r\n4. `finally`에서 `_prefetchingMonths` 맵에서 제거.\r\n\r\n---\r\n\r\n## `prefetchWeek`\r\n\r\n```dart\r\nstatic Future<void> prefetchWeek(DateTime baseDate)\r\n```\r\n\r\n**설명**: 주간 뷰 진입 시 해당 주의 급식을 프리페치한다.\r\n\r\n- 월~금이 같은 달이면 `_prefetchMonth` 1회\r\n- 달이 걸치면 2개월 병렬 프리페치:\r\n  ```dart\r\n  await Future.wait([_prefetchMonth(monday), _prefetchMonth(friday)]);\r\n  ```\r\n\r\n---\r\n\r\n## `_getFromCache`\r\n\r\n```dart\r\nstatic Meal? _getFromCache(SharedPreferences prefs, String key)\r\n```\r\n\r\n**설명**: 캐시에서 급식 데이터를 읽되, 만료된 데이터는 null 반환한다.\r\n\r\n**캐시 전략 (차등 TTL)**:\r\n- 정상 급식 데이터 → **24시간** 캐시\r\n- '급식 정보가 없습니다.' → **5분** 캐시 (곧 등록될 수 있으므로)\r\n\r\n```dart\r\nif (meal.meal == '급식 정보가 없습니다.') {\r\n  if (age > 5 * 60 * 1000) return null;   // 5분 후 만료\r\n} else {\r\n  if (age > 24 * 60 * 60 * 1000) return null;  // 24시간 후 만료\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_saveToCache`\r\n\r\n```dart\r\nstatic void _saveToCache(SharedPreferences prefs, String key, Meal meal)\r\n```\r\n\r\n[Meal](../data/meal.md) JSON + 타임스탬프를 SharedPreferences에 저장.\r\n\r\n---\r\n\r\n## `clearCacheForDate`\r\n\r\n```dart\r\nstatic Future<void> clearCacheForDate(DateTime date)\r\n```\r\n\r\n특정 날짜의 조식/중식/석식 캐시를 모두 삭제한다.\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\n**설명**: HTTP GET 요청을 수행한다.\r\n\r\n- **타임아웃**: 10초\r\n- NEIS `INFO-200` (데이터 없음) 응답은 `null` 반환\r\n- 에러/타임아웃도 `null` 반환 (silent fail)\r\n\r\n---\r\n\r\n## `isAllMealEmpty`\r\n\r\n```dart\r\nstatic Future<bool> isAllMealEmpty(DateTime date)\r\n```\r\n\r\n**설명**: 특정 날짜에 급식이 하나도 없는지 확인한다.\r\nNEIS `INFO-200` 응답이면 `true` (급식 없음).\r\n홈 위젯에서 \"급식 없음\" 표시 여부 판단에 사용.\r\n","api/notice_data_api.md":"# NoticeDataApi\n\n> `lib/api/notice_data_api.dart` — NEIS 학사일정 API 연동\n\n인스턴스 메서드 (singleton이 아님). NEIS 학사일정 API에서 학교 일정을 조회한다.\n\n---\n\n## `getNotice`\n\n```dart\nFuture<String?> getNotice({required DateTime date})\n```\n\n**설명**: 특정 날짜의 학사일정 이름을 반환한다.\n\n1. 캐시 확인 (12시간 TTL):\n   ```dart\n   final cacheKey = 'notice_$formattedDate';\n   // 12시간 이내면 캐시 반환\n   ```\n\n2. 오프라인이면 안내 메시지 반환\n\n3. NEIS `SchoolSchedule` 엔드포인트 호출 (`AA_YMD` 파라미터)\n\n4. `_processSchoolSchedule`로 일정명 추출:\n   ```dart\n   if (row['EVENT_NM'] == '토요휴업일') return null;\n   return row['EVENT_NM'];\n   ```\n   '토요휴업일'은 의미 없으므로 null 반환.\n\n**반환값**: 일정명 문자열 또는 '학사일정이 없습니다'\n\n---\n\n## `getUpcomingEvent`\n\n```dart\nFuture<UpcomingEvent?> getUpcomingEvent()\n```\n\n**설명**: 가장 가까운 미래 학사 이벤트를 반환한다.\n\n1. 캐시 확인 (6시간 TTL). D-day가 0 이상인지 재계산:\n   ```dart\n   final dDay = eventDate.difference(DateTime(now.year, now.month, now.day)).inDays;\n   if (dDay >= 0) return cached;\n   ```\n\n2. 내일부터 90일 범위로 NEIS API 호출:\n   ```dart\n   final tomorrow = now.add(const Duration(days: 1));\n   final endDate = now.add(const Duration(days: 90));\n   ```\n\n3. '토요휴업일' 제외, D-day > 0인 이벤트만 수집\n\n4. D-day 기준 정렬 → 가장 가까운 이벤트 반환 + 캐시 저장\n\n**반환값**: `UpcomingEvent?` — `name`, `date`, `dDay` 포함\n\n---\n\n## `getEventsInRange`\n\n```dart\nFuture<List<UpcomingEvent>> getEventsInRange({int days = 30})\n```\n\n**설명**: 오늘부터 `days`일 범위 내 모든 학사 이벤트를 반환한다.\n\n캐시 없이 매번 API 호출. D-day 기준 정렬된 리스트 반환.\nD-day 화면에서 \"일정에서 D-day 추가\" 기능에 사용.\n\n---\n\n## `getMonthEvents`\n\n```dart\nFuture<Map<DateTime, String>> getMonthEvents(DateTime month)\n```\n\n**설명**: 월별 학사일정 맵을 반환한다 (캘린더 마커용).\n\n1. 캐시 확인 (12시간 TTL, `month_events_v2_` 키):\n   ```dart\n   final cacheKey = 'month_events_v2_$monthKey';\n   ```\n\n2. 월의 첫날~마지막날 범위로 API 호출\n\n3. `{ DateTime: \"일정명\" }` 맵 구성, '토요휴업일' 제외\n\n4. 캐시 저장 (DateTime을 ISO string 키로 변환)\n\n**반환값**: `Map<DateTime, String>` — 날짜별 일정명\n\n---\n\n## `_processSchoolSchedule`\n\n```dart\nString? _processSchoolSchedule(List<dynamic> schoolScheduleArray)\n```\n\nNEIS 응답의 `SchoolSchedule` 배열에서 첫 번째 `EVENT_NM`을 추출. '토요휴업일'이면 null.\n\n---\n\n## `_fetchData`\n\n```dart\nFuture<Map<String, dynamic>?> _fetchData(String url)\n```\n\nHTTP GET 요청. 10초 타임아웃, 에러 시 null 반환.\n\n---\n\n## UpcomingEvent (데이터 클래스)\n\n```dart\nclass UpcomingEvent {\n  final String name;\n  final DateTime date;\n  final int dDay;\n}\n```\n\n다가오는 학사 이벤트를 나타내는 모델.\n","api/timetable_data_api.md":"# TimetableDataApi\n\n> `lib/api/timetable_data_api.dart` — NEIS 시간표 API 연동\n\n모든 메서드가 `static`. 시간표 데이터 조회, 과목 조합 추출, 캐싱을 담당한다.\n\n---\n\n## `getTimeTable`\n\n```dart\nstatic Future<Map<String, Map<String, List<String>>>> getTimeTable({\n  required DateTime startDate,\n  required DateTime endDate,\n  required String grade,\n  String? classNum,\n})\n```\n\n**설명**: 학년/반별 시간표를 날짜 범위로 조회한다.\n\n**반환 구조**: `{ \"20260410\": { \"3\": [\"국어\",\"수학\",\"영어\",...] } }` — 날짜 → 반 → 교시별 과목 리스트\n\n1. 캐시 확인 (12시간 TTL):\n   ```dart\n   final cacheKey = '$formattedStartDate-$formattedEndDate-$grade${classNum != null ? '-$classNum' : ''}';\n   ```\n\n2. 오프라인이면 에러 맵 반환:\n   ```dart\n   return {\"error\": {\"error\": [\"시간표를 확인하려면 인터넷에 연결하세요\"]}};\n   ```\n\n3. NEIS `hisTimetable` 엔드포인트 호출 (`pSize=1000`):\n   ```dart\n   '&GRADE=$grade'\n   '${classNum != null ? '&CLASS_NM=$classNum' : ''}'\n   ```\n\n4. `_processTimetable`로 응답 파싱 후 캐시에 저장\n\n---\n\n## `_processTimetable`\n\n```dart\nstatic Map<String, Map<String, List<String>>> _processTimetable(\n    List<dynamic> timetableArray)\n```\n\n**설명**: NEIS API 응답을 `{ 날짜 → 반 → 과목리스트 }` 구조로 변환한다.\n\n핵심 로직 — **PERIO 기반 교시 배치**:\n```dart\nfinal perio = int.tryParse(item['PERIO']?.toString() ?? '');\nwhile (classList.length < perio) {\n  classList.add('');  // 빈 교시 채우기\n}\nclassList[perio - 1] = content;  // 1-based → 0-based\n```\n\n반 번호가 없는 경우 `'special'`로 처리 (특별실 과목).\n\n---\n\n## `_getWeekTimetableWithFallback`\n\n```dart\nstatic Future<Map<String, Map<String, List<String>>>> _getWeekTimetableWithFallback(\n    String grade)\n```\n\n**설명**: 이번 주 → 다음 주 → 지난 주 순으로 시간표를 시도한다.\n\n방학 등 데이터가 없는 주를 대비한 폴백:\n```dart\nvar timetable = await getTimeTable(startDate: thisMonday, ...);\nif (_hasData(timetable)) return timetable;\n\n// 이번 주 없으면 다음 주 시도\nfinal nextMonday = thisMonday.add(const Duration(days: 7));\ntimetable = await getTimeTable(startDate: nextMonday, ...);\nif (_hasData(timetable)) return timetable;\n\n// 다음 주도 없으면 지난 주 시도\nfinal prevMonday = thisMonday.subtract(const Duration(days: 7));\nreturn await getTimeTable(startDate: prevMonday, ...);\n```\n\n---\n\n## `getSubjects`\n\n```dart\nstatic Future<List<String>?> getSubjects({required int grade})\n```\n\n**설명**: 학년별 과목명 리스트를 추출한다.\n\n`_getWeekTimetableWithFallback`로 시간표를 가져온 뒤, 모든 과목명을 `Set`으로 수집.\n`[보강]`, `토요휴업일` 제외. 1주일 캐시.\n\n---\n\n## `getAllSubjectCombinations`\n\n```dart\nstatic Future<List<Subject>> getAllSubjectCombinations({\n  required int grade,\n  int maxRetries = 3,\n})\n```\n\n**설명**: 학년의 모든 반에서 가르치는 과목 + 반 번호 조합을 추출한다.\n\n시간표 선택 화면에서 \"어떤 반에서 어떤 과목을 가르치는지\" 파악에 사용.\n\n1. 로컬 캐시 확인 (1주일 TTL):\n   ```dart\n   final cachedSubjects = await _loadCachedSubjects(grade);\n   if (cachedSubjects != null && cachedSubjects.isNotEmpty) return cachedSubjects;\n   ```\n\n2. 최대 3회 재시도로 `_getWeekTimetableWithFallback` 호출:\n   ```dart\n   for (int attempt = 1; attempt <= maxRetries; attempt++) { ... }\n   ```\n\n3. `Subject(subjectName, subjectClass)` 쌍을 Set으로 수집:\n   ```dart\n   subjectSet.add(Subject(\n     subjectName: subjectName,\n     subjectClass: classInt,  // -1이면 특별실\n   ));\n   ```\n\n4. 이름순 정렬 후 캐시 저장\n\n**재시도**: 실패 시 `2 * attempt`초 대기 후 재시도.\n\n---\n\n## `getCustomTimeTable`\n\n```dart\nstatic Future<List<List<String?>>> getCustomTimeTable({\n  required List<Subject> userSubjects,\n  required String grade,\n})\n```\n\n**설명**: 사용자가 선택한 과목으로 커스텀 시간표를 생성한다.\n\n**반환**: `List<List<String?>>` — 인덱스 1~5가 월~금, 각 리스트의 인덱스 1~7이 1~7교시.\n\n1. 전체 학년 시간표를 조회 (반 지정 없이):\n   ```dart\n   final timetable = await getTimeTable(..., classNum: null);\n   ```\n\n2. 사용자 선택 과목을 반 번호로 그룹화:\n   ```dart\n   final classToSubjects = <int, List<Subject>>{};\n   ```\n\n3. 각 반의 시간표에서 선택 과목이 매칭되는 교시를 추출:\n   ```dart\n   if (subjectsList[i] == subject.subjectName) {\n     customTimeTable[weekday][i + 1] = subject.subjectName;\n   }\n   ```\n\n---\n\n## `getClassCount`\n\n```dart\nstatic Future<int> getClassCount(int grade)\n```\n\nNEIS `classInfo` API로 학년의 반 수를 조회한다. 1주일 캐시.\n\n---\n\n## `getSubjectsFromAdminFirestore`\n\n```dart\nstatic Future<List<Subject>> getSubjectsFromAdminFirestore(int grade)\n```\n\nFirestore `grade/{grade}/subject/` 컬렉션에서 관리자가 등록한 과목 목록을 조회한다.\n`category`와 `isOriginal` 필드 포함.\n\n---\n\n## 내부 유틸리티\n\n| 함수 | 설명 |\n|------|------|\n| `_fetchData(url)` | HTTP GET 요청, 에러 시 null |\n| `_hasData(timetable)` | 에러가 아니고 과목 데이터가 있는지 |\n| `_loadCachedSubjects(grade)` | 과목 조합 캐시 로드 (1주일 TTL) |\n| `_saveSubjectsToCache(grade, subjects)` | 과목 조합 캐시 저장 |\n","data/analytics_service.md":"# AnalyticsService\n\n> `lib/data/analytics_service.dart` — Firebase Analytics 이벤트 래퍼\n\n모든 메서드가 `static`. 이벤트 이름 오타/중복 방지를 위해 모든 로깅을 이 클래스로 집중. 내부에서 silent fail 처리 (호출부에서 try/catch 불필요).\n\n---\n\n## `observer`\n\n```dart\nstatic FirebaseAnalyticsObserver get observer\n```\n\n`MaterialApp.navigatorObservers`에 등록하면 화면 전환(`screen_view`) 자동 추적.\n\n---\n\n## `setUserId`\n\n```dart\nstatic Future<void> setUserId(String? uid)\n```\n\n로그인 시 uid 설정, 로그아웃 시 null 전달.\n\n---\n\n## `setUserProperty`\n\n```dart\nstatic Future<void> setUserProperty(String name, String? value)\n```\n\n사용자 속성 설정 (grade, userType 등).\n\n---\n\n## 인증 이벤트\n\n| 메서드 | 이벤트명 | 파라미터 |\n|--------|----------|----------|\n| `logLogin(method)` | `login` | `{method: 'google'\\|'apple'\\|'kakao'\\|'github'}` |\n| `logSignUp(method)` | `sign_up` | `{method}` |\n| `logLogout()` | `logout` | — |\n\n---\n\n## 게시판 이벤트\n\n| 메서드 | 이벤트명 | 파라미터 |\n|--------|----------|----------|\n| `logPostCreate(boardType, isAnonymous)` | `post_create` | `{board_type, is_anonymous}` |\n| `logPostView(postId)` | `post_view` | `{post_id}` |\n| `logCommentCreate(postId, isReply)` | `comment_create` | `{post_id, is_reply}` |\n| `logPostShare(postId)` | `post_share` | `{post_id}` |\n| `logPostReport(postId)` | `post_report` | `{post_id}` |\n\n---\n\n## 성적/일정/검색 이벤트\n\n| 메서드 | 이벤트명 | 파라미터 |\n|--------|----------|----------|\n| `logGradeAdd(examType, subject)` | `grade_add` | `{exam_type, subject}` |\n| `logGradeGoalSet(subject)` | `grade_goal_set` | `{subject}` |\n| `logScheduleAdd()` | `schedule_add` | — |\n| `logDdayAdd()` | `dday_add` | — |\n| `logNotificationToggle(category, enabled)` | `notification_toggle` | `{category, enabled}` |\n| `logSearch(term)` | `search` | `{search_term}` |\n\n---\n\n## 내부 구조\n\n```dart\nstatic Future<void> _log(String name, [Map<String, Object>? params]) async {\n  try {\n    await _instance.logEvent(name: name, parameters: params);\n  } catch (e) {\n    if (kDebugMode) debugPrint('[Analytics] $name failed: $e');\n  }\n}\n```\n\n모든 public 메서드가 `_log`를 통해 이벤트를 발행. 릴리스 빌드에서 실패해도 앱에 영향 없음.\n","data/auth_repository.md":"# AuthRepository\r\n\r\n> `lib/data/auth_repository.dart` — 인증/프로필 Repository 인터페이스\r\n\r\n[`AuthService`](auth_service.md)의 정적 메서드를 인스턴스 메서드로 감싸 GetIt DI에 등록. 테스트에서 mock 주입 가능.\r\n\r\n---\r\n\r\n## 설계 배경\r\n\r\n```\r\nAuthService (정적 메서드, 25개 파일에서 직접 호출)\r\n    ↑\r\nAuthRepository (인스턴스 인터페이스)\r\n    ↑\r\nFirebaseAuthRepository (AuthService에 위임)\r\n```\r\n\r\n정적 메서드를 한 번에 제거하면 25개 파일을 동시에 수정해야 하므로, 두 인터페이스를 **병행**:\r\n- **신규 코드 / Riverpod Provider** → `AuthRepository` 사용\r\n- **기존 호출처** → [`AuthService`](auth_service.md) 직접 호출 (점진적 마이그레이션)\r\n\r\n---\r\n\r\n## `AuthRepository` (추상 클래스)\r\n\r\n```dart\r\nabstract class AuthRepository {\r\n  User? get currentUser;\r\n  bool get isLoggedIn;\r\n\r\n  Future<UserProfile?> getUserProfile();\r\n  Future<UserProfile?> getCachedProfile();\r\n  Future<void> saveUserProfile(UserProfile profile);\r\n  Future<bool> hasProfile();\r\n  Future<bool> isApproved();\r\n  Future<bool> isManager();\r\n  Future<void> signOut();\r\n  void clearProfileCache();\r\n}\r\n```\r\n\r\n`AuthService`의 핵심 메서드만 인터페이스로 추출. 로그인 메서드(signInWithGoogle 등)는 UI에서만 직접 호출하므로 제외.\r\n\r\n---\r\n\r\n## `FirebaseAuthRepository` (기본 구현)\r\n\r\n```dart\r\nclass FirebaseAuthRepository implements AuthRepository {\r\n  const FirebaseAuthRepository();\r\n\r\n  @override\r\n  User? get currentUser => AuthService.currentUser;\r\n\r\n  @override\r\n  Future<UserProfile?> getUserProfile() => AuthService.getUserProfile();\r\n\r\n  @override\r\n  Future<UserProfile?> getCachedProfile() => AuthService.getCachedProfile();\r\n\r\n  // ... 나머지 모두 AuthService 정적 메서드에 위임\r\n}\r\n```\r\n\r\n모든 메서드가 `AuthService`의 정적 메서드를 그대로 호출. `const` 생성자로 인스턴스 생성 비용 없음.\r\n\r\n---\r\n\r\n## GetIt 접근자\r\n\r\n```dart\r\nAuthRepository get authRepository => GetIt.I<AuthRepository>();\r\n```\r\n\r\n전역 getter. `service_locator.dart`에서 `FirebaseAuthRepository`로 등록됨:\r\n```dart\r\ngetIt.registerLazySingleton<AuthRepository>(\r\n  () => const FirebaseAuthRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## 테스트 활용\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n\r\n// 또는 Riverpod overrides\r\nProviderScope(\r\n  overrides: [authRepositoryProvider.overrideWithValue(mockRepo)],\r\n  child: ...,\r\n);\r\n```\r\n\r\n`MockAuthRepository`를 주입해 Firestore/Firebase Auth 의존 없이 단위 테스트 가능.\r\n","data/auth_service.md":"# AuthService\n\n> `lib/data/auth_service.dart` — Firebase 인증 + 프로필 CRUD\n\n`UserProfile` 모델과 `AuthService` 클래스를 포함. 모든 메서드가 `static`.\n\n---\n\n## UserProfile (데이터 모델)\n\n```dart\nclass UserProfile {\n  final String uid;\n  final String name;\n  final String studentId;\n  final int grade;\n  final int classNum;\n  final String email;\n  final bool approved;\n  final String role;           // 'user' | 'manager' | 'admin'\n  final String userType;       // 'student' | 'graduate' | 'teacher' | 'parent'\n  final String lastProfileUpdate;\n  final int? graduationYear;\n  final String? teacherSubject;\n  final DateTime? suspendedUntil;\n  final List<String> blockedUsers;\n  final String loginProvider;\n  final String? profilePhotoUrl;\n}\n```\n\n### 계산 프로퍼티\n\n| 프로퍼티 | 로직 |\n|----------|------|\n| `isManager` | `role == 'manager' \\|\\| role == 'admin'` |\n| `isAdmin` | `role == 'admin'` |\n| `isSuspended` | `suspendedUntil != null && DateTime.now().isBefore(suspendedUntil!)` |\n| `displayName` | userType별 분기: 졸업생/교사/학부모 접두어, 학생은 `studentId + name` |\n| `needsProfileUpdate` | 학생/교사만 해당, 3월 이후 `lastProfileUpdate`가 올해가 아니면 true |\n\n---\n\n## `signInWithGoogle`\n\n```dart\nstatic Future<User?> signInWithGoogle()\n```\n\n**설명**: Google 소셜 로그인으로 Firebase 인증을 수행한다.\n\n1. `GoogleSignIn().signIn()`으로 Google 계정 선택 팝업:\n   ```dart\n   final googleUser = await _googleSignIn.signIn();\n   if (googleUser == null) return null;  // 사용자 취소\n   ```\n\n2. Google OAuth 토큰으로 Firebase credential 생성:\n   ```dart\n   final googleAuth = await googleUser.authentication;\n   final credential = GoogleAuthProvider.credential(\n     accessToken: googleAuth.accessToken,\n     idToken: googleAuth.idToken,\n   );\n   ```\n\n3. Firebase에 로그인 후 Analytics 이벤트 발행:\n   ```dart\n   final result = await _auth.signInWithCredential(credential);\n   unawaited(AnalyticsService.logLogin('google'));\n   unawaited(AnalyticsService.setUserId(result.user!.uid));\n   ```\n\n**반환값**: `User?` — 성공 시 Firebase User, 취소/에러 시 null\n\n---\n\n## `signInWithApple`\n\n```dart\nstatic Future<User?> signInWithApple()\n```\n\n**설명**: Apple 로그인을 수행한다. nonce 기반 보안 처리 포함.\n\n1. 보안용 랜덤 nonce 생성 및 SHA-256 해싱:\n   ```dart\n   final rawNonce = _generateNonce();\n   final nonce = _sha256ofString(rawNonce);\n   ```\n\n2. Apple ID credential 요청 (email, fullName 스코프):\n   ```dart\n   final appleCredential = await SignInWithApple.getAppleIDCredential(\n     scopes: [AppleIDAuthorizationScopes.email, AppleIDAuthorizationScopes.fullName],\n     nonce: nonce,\n   );\n   ```\n\n3. OAuthProvider로 Firebase credential 변환 후 로그인:\n   ```dart\n   final oauthCredential = OAuthProvider('apple.com').credential(\n     idToken: appleCredential.identityToken,\n     rawNonce: rawNonce,\n   );\n   ```\n\n4. 최초 로그인 시 Apple에서 제공한 이름을 displayName에 설정:\n   ```dart\n   if (appleCredential.givenName != null) {\n     await result.user?.updateDisplayName(...);\n   }\n   ```\n\n---\n\n## `signInWithKakao`\n\n```dart\nstatic Future<User?> signInWithKakao(String kakaoAccessToken)\n```\n\n**설명**: 카카오 로그인. Cloud Function을 거쳐 Firebase Custom Token으로 변환한다.\n\n1. 카카오 SDK에서 받은 accessToken을 Cloud Function에 POST:\n   ```dart\n   final response = await http.post(\n     Uri.parse('https://.../kakaoCustomAuth'),\n     body: jsonEncode({'token': kakaoAccessToken}),\n   );\n   ```\n\n2. Cloud Function이 반환한 Firebase Custom Token으로 로그인:\n   ```dart\n   final customToken = jsonDecode(response.body)['firebaseToken'] as String;\n   final result = await _auth.signInWithCustomToken(customToken);\n   ```\n\n**파라미터**: `kakaoAccessToken` — 카카오 SDK `LoginResult`에서 얻은 액세스 토큰\n\n---\n\n## `signInWithGitHub`\n\n```dart\nstatic Future<User?> signInWithGitHub()\n```\n\n**설명**: GitHub 로그인. Firebase 내장 `signInWithProvider`를 사용한다.\n\n```dart\nfinal githubProvider = GithubAuthProvider();\nfinal result = await _auth.signInWithProvider(githubProvider);\n```\n\n별도 서버 없이 Firebase가 OAuth 플로우를 직접 처리.\n\n---\n\n## `signOut`\n\n```dart\nstatic Future<void> signOut()\n```\n\nGoogle과 Firebase 모두 로그아웃. Analytics에 로그아웃 이벤트 발행.\n\n```dart\nunawaited(AnalyticsService.logLogout());\nawait _googleSignIn.signOut();\nawait _auth.signOut();\n```\n\n---\n\n## `getUserProfile`\n\n```dart\nstatic Future<UserProfile?> getUserProfile()\n```\n\nFirestore `users/{uid}` 문서에서 프로필을 조회한다. 캐시 없이 매번 직접 조회.\n\n---\n\n## `saveUserProfile`\n\n```dart\nstatic Future<void> saveUserProfile(UserProfile profile)\n```\n\nFirestore `users/{uid}`에 프로필을 저장한다. `SetOptions(merge: true)`로 기존 필드 보존.\n\n---\n\n## `hasProfile`\n\n```dart\nstatic Future<bool> hasProfile()\n```\n\n프로필 문서가 존재하고 `name` 필드가 있는지 확인. 로그인 직후 프로필 설정 화면 분기에 사용.\n\n---\n\n## `isApproved`\n\n```dart\nstatic Future<bool> isApproved()\n```\n\n**설명**: 사용자가 승인 상태인지 확인한다.\n\n```dart\nif (profile.isSuspended) return false;\nreturn profile.approved || profile.isManager;\n```\n\n정지 상태면 `false`, 매니저/관리자는 승인 불필요.\n\n---\n\n## `getSuspendedMessage`\n\n```dart\nstatic Future<String?> getSuspendedMessage()\n```\n\n**설명**: 정지 잔여 시간을 한국어 문자열로 반환한다.\n\n```dart\nfinal diff = profile.suspendedUntil!.difference(DateTime.now());\n// → \"2일 3시간 15분\" 형태\n```\n\n정지 상태가 아니면 null.\n\n---\n\n## `getCachedProfile`\n\n```dart\nstatic Future<UserProfile?> getCachedProfile()\n```\n\n**설명**: 5분 TTL 메모리 캐시로 프로필을 조회한다.\n\n```dart\nif (_cachedProfile != null && _cacheTime != null &&\n    DateTime.now().difference(_cacheTime!).inMinutes < 5) {\n  return _cachedProfile;\n}\n_cachedProfile = await getUserProfile();\n_cacheTime = DateTime.now();\n```\n\n게시판 작성, 댓글 등 빈번한 프로필 참조 시 Firestore 호출을 줄임.\n\n---\n\n## `clearProfileCache`\n\n```dart\nstatic void clearProfileCache()\n```\n\n프로필 수정 후 호출. `_cachedProfile`과 `_cacheTime`을 null로 초기화.\n\n---\n\n## `refreshCustomClaims`\n\n```dart\nstatic Future<Map<String, dynamic>?> refreshCustomClaims()\n```\n\n**설명**: ID 토큰을 강제 갱신해 최신 Custom Claims를 가져온다.\n\n```dart\nfinal result = await user.getIdTokenResult(true);  // forceRefresh\nreturn result.claims;\n```\n\nCloud Function `onUserUpdated`가 `setCustomUserClaims`를 호출한 뒤, 클라이언트에서 이 메서드를 호출해야 변경된 role/approved가 즉시 반영됨.\n\n---\n\n## 내부 유틸리티\n\n| 함수 | 설명 |\n|------|------|\n| `_generateNonce([length])` | 보안용 랜덤 문자열 생성 (Apple 로그인용) |\n| `_sha256ofString(input)` | SHA-256 해시 (nonce 해싱) |\n| `setCachedProfileForTest(profile)` | `@visibleForTesting` — 테스트용 캐시 주입 |\n","data/dday_manager.md":"# DDayManager\n\n> `lib/data/dday_manager.dart` — D-day CRUD, Firestore 동기화\n\n`DDay` 모델과 `DDayManager` 클래스를 포함. 모든 메서드가 `static`.\n\n---\n\n## DDay (데이터 모델)\n\n```dart\nclass DDay {\n  final String title;\n  final DateTime date;\n  final bool isPinned;\n}\n```\n\n### `dDay` (계산 프로퍼티)\n\n```dart\nint get dDay {\n  final now = DateTime(DateTime.now().year, DateTime.now().month, DateTime.now().day);\n  final target = DateTime(date.year, date.month, date.day);\n  return target.difference(now).inDays;\n}\n```\n\n시간 부분을 제거하고 날짜 차이만 계산. 양수면 미래, 0이면 당일, 음수면 과거.\n\n---\n\n## `loadAll`\n\n```dart\nstatic Future<List<DDay>> loadAll()\n```\n\n**설명**: 전체 D-day 목록을 로드한다.\n\n1. SharedPreferences → SecureStorage 일회성 마이그레이션:\n   ```dart\n   await SecureStorageService.migrateFromPlain(\n     key: SecureStorageService.keyDdays,\n     oldValue: prefs.getString(_key),\n     onMigrated: () async => prefs.remove(_key),\n   );\n   ```\n\n2. SecureStora
