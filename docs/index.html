chitecture-decisions.md#adr-02-лҜјк°җ-лҚ°мқҙн„°-м ҖмһҘмҶҢ-flutter_secure_storage))\r\n- Android Keystore / iOS Keychain мң„мһ„\r\n- кё°мЎҙ нҸүл¬ё лҚ°мқҙн„° вҶ’ мІ« мӢӨн–ү мӢң 1нҡҢ мһҗлҸҷ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/sub/grade_screen.dart`, `grade_input_screen.dart`, `lib/providers/grade_provider.dart`, `test/grade_manager_test.dart`, `test/secure_storage_service_test.dart`\r\n\r\n## к°ңмқёмқјм •\r\n\r\n- **м»ӨмҠӨн…Җ мӣ”к°„ мәҳлҰ°лҚ”**мҷҖ м—°лҸҷ (кіөк°ң кё°лҠҘ м°ёмЎ°)\r\n- н•ҳлЈЁ/м—°мҶҚ мқјм •, 6мғү + мӣҗнҳ• м»¬лҹ¬н”јм»Ө\r\n- **sqflite** м ҖмһҘ вҖ” мҳӨн”„лқјмқё мҡ°м„ , лІ”мң„ мҝјлҰ¬ л№ лҰ„\r\n- NEIS н•ҷмӮ¬мқјм •кіј мӢңк°Ғм Ғ кө¬л¶„ (м җ vs л°”)\r\n\r\n**кҙҖл Ё нҢҢмқј**: `test/schedule_data_test.dart`\r\n\r\n## D-day\r\n\r\n- лӘ©н‘ңмқјк№Ңм§Җ лӮЁмқҖ мқјмҲҳ н‘ңмӢң\r\n- **нҷҲ нҷ”л©ҙ н•Җ кі м •** м§Җмӣҗ\r\n- sqflite м ҖмһҘ (мқјм •кіј лҸҷмқј DB)\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/sub/dday_screen.dart`, `test/dday_manager_test.dart`\r\n\r\n## н”„лЎңн•„ / м„Өм •\r\n\r\n- **н”„лЎңн•„ мӮ¬м§„** (Cloud Storage м—…лЎңл“ң, 256px м••м¶•)\r\n- к°ңмқём •ліҙ лҸҷмқҳ, мҳЁліҙл”© вҶ’ лЎңк·ёмқё н”ҢлЎңмҡ°\r\n- м•ҢлҰј 5м№ҙн…Ңкі лҰ¬ on/off (вҶ’ [м»Өл®ӨлӢҲнӢ° кё°лҠҘмқҳ м•ҢлҰј](./community-features.md#м•ҢлҰј-мӢңмҠӨн…ң))\r\n- н…Ңл§Ҳ (лқјмқҙнҠё/лӢӨнҒ¬/мӢңмҠӨн…ң)\r\n- кёүмӢқ м•ҢлҰј мӢңк°„ м„Өм •\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/auth/profile_edit_screen.dart`, `profile_setup_screen.dart`, `lib/screens/sub/setting_screen.dart`, `notification_setting_screen.dart`, `lib/screens/sub/onboarding_screen.dart`\r\n\r\n## мғҲ н•ҷл…„ н”„лЎңн•„ м—…лҚ°мқҙнҠё\r\n\r\n- мһ¬н•ҷмғқ/көҗмӮ¬л§Ң **3мӣ”м—җ м •ліҙ м—…лҚ°мқҙнҠё нҢқм—…** н‘ңмӢң\r\n- н•ҷл…„/л°ҳ/лІҲнҳё л“ұ мғҲ н•ҷл…„ м •ліҙ мһ…л Ҙ мң лҸ„\r\n- **м—ӯн•  ліҖкІҪ л¶Ҳк°Җ** (кҙҖлҰ¬мһҗл§Ң м—ӯн•  ліҖкІҪ к°ҖлҠҘ вҖ” [security.md](../guides/security.md) м°ёмЎ°)\r\n\r\n## нҡҢмӣҗ нғҲнҮҙ\r\n\r\n- **мқҙмӨ‘ нҷ•мқё** лӢӨмқҙм–јлЎңк·ё\r\n- **мҷ„м „ мӮӯм ң мҲңм„ң** ([кё°мҲ кіјм ң #10](../guides/technical-challenges.md#10-кі„м •-мӮӯм ң-мҲңм„ң-л¬ём ң-auth--firestore-к¶Ңн•ң-мҶҢмӢӨ)):\r\n  1. Firestore `users/{uid}` л¬ём„ң мӮӯм ң (мқёмҰқ мғҒнғң мң м§Җ мӨ‘)\r\n  2. м—°кҙҖ н•ҳмң„ м»¬л үм…ҳ (`subjects`, `notifications`, `sync`) мқјкҙ„ мӮӯм ң\r\n  3. Cloud Storage н”„лЎңн•„ мӮ¬м§„ мӮӯм ң\r\n  4. `user.delete()`лЎң Auth кі„м • мӮӯм ң\r\n- мқҙлҰ„/н”„лЎңн•„ мӮ¬м§„/м„ұм ҒмқҖ лЎңм»¬ нҸ¬н•Ё мҷ„м „ нҢҢкё°\r\n- **мҰүмӢң vs мң мҳҲ нғҲнҮҙ** вҖ” `requestAccountDeletion` нҳём¶ң мӢң 30мқј мң мҳҲ нӣ„ `purgeDeactivatedAccounts`к°Җ мҳҒкө¬ нҢҢкё° (PIPA к¶ҢлҰ¬)\r\n\r\n## PIPA мӮ¬мҡ©мһҗ к¶ҢлҰ¬\r\n\r\nн•ңкөӯ к°ңмқём •ліҙ ліҙнҳёлІ•(PIPA)м—җ л”°лқј мӮ¬мҡ©мһҗк°Җ м§Ғм ‘ н–үмӮ¬н•  мҲҳ мһҲлҠ” к¶ҢлҰ¬лҘј м•ұ нҷ”л©ҙмңјлЎң м ңкіөн•©лӢҲлӢӨ.\r\n\r\n### мқҙмқҳмӢ мІӯ (`appeals`)\r\n- мӢ кі  мІҳлҰ¬, м •м§Җ, кІҢмӢңкёҖ мҲЁк№Җ л“ұ лӘЁлҚ”л Ҳмқҙм…ҳ кІ°м •м—җ лҢҖн•ҙ мӮ¬мң лҘј м Ғм–ҙ 90мқј мқҙлӮҙ м ңм¶ң\r\n- managerк°Җ кІҖнҶ  вҶ’ кІ°кіј н‘ёмӢң м•ҢлҰј\r\n- 90мқј нӣ„ `expiresAt` TTLлЎң мһҗлҸҷ мӮӯм ң\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/appeal/`\r\n\r\n### лҚ°мқҙн„° мҡ”мІӯ (`data_requests`)\r\n- ліёмқёмқҳ кІҢмӢңкёҖ/лҢ“кёҖ/мӢ кі  мқҙл Ҙ/мұ„нҢ… л©”мӢңм§ҖлҘј JSONмңјлЎң мқјкҙ„ мқөмҠӨнҸ¬нҠё\r\n- `createDataExport` Cloud Functionмқҙ Storageм—җ м—…лЎңл“ң вҶ’ лӢӨмҡҙлЎңл“ң л§ҒнҒ¬ мқҙл©”мқј л°ңмҶЎ\r\n- мқөмҠӨнҸ¬нҠё нҢҢмқјмқҖ 30мқј нӣ„ мһҗлҸҷ л§ҢлЈҢ (`purgeExpiredExports`)\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/data_request/`, `functions/index.js` (`createDataExport` / `purgeExpiredExports`)\r\n\r\n### м»Өл®ӨлӢҲнӢ° к·ңм№ҷ (`community_rules`)\r\n- мҡҙмҳҒ м •мұ…мқ„ лӘ…мӢңм ҒмңјлЎң л…ём¶ңн•ҳлҠ” нҷ”л©ҙ\r\n- adminл§Ң мҲҳм • к°ҖлҠҘ, лӘЁл“  мӮ¬мҡ©мһҗк°Җ мқҪкё° к°ҖлҠҘ\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/community_rules/`\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [кіөк°ң кё°лҠҘ](./public-features.md)\r\n- [м»Өл®ӨлӢҲнӢ° кё°лҠҘ](./community-features.md)\r\n- [кҙҖлҰ¬мһҗ кё°лҠҘ](./admin-features.md)\r\n- [мқёмҰқ & м ‘к·ј](../guides/account-and-access.md)\r\n- [ліҙм•Ҳ лӘЁлҚё](../guides/security.md)\r\n","features/personal-features_en.md":"# Personal Features (Grades / Schedule / Profile)\r\n\r\n> н•ңкөӯм–ҙ: [personal-features.md](./personal-features.md)\r\n\r\nFeatures handling personal user data. Grades are fully local, personal schedules live in sqflite, and profiles live in Firestore.\r\n\r\n## Grade Management\r\n\r\n### Tab Layout\r\n\r\n- **Susi (internal) / Jeongsi (standardized)** tabs, swipe-switchable\r\n- **Internal**: 5-grade system + AвҖ“E achievement tiers, per the 2022 curriculum revision\r\n- **Standardized**: 2022-curriculum subjects (Korean / Math / English / Korean History / Integrated Social Studies / Integrated Science + second foreign language)\r\n- **Private practice exams** supported\r\n\r\n### Visualization\r\n\r\n- **Trend chart**: `CustomPainter` line chart ([ADR-05](../guides/architecture-decisions_en.md#adr-05-charts-custompainter-directly))\r\n  - Toggle modes: grade / raw score / percentile / standard score\r\n  - Correctly renders inverted grade axis (lower = better)\r\n- **Per-subject goals** вҖ” grade (0.1 step for susi) / percentile (for jeongsi), managed separately\r\n- **Percentile вҶ’ grade auto-conversion** (with dashed grade-cut lines)\r\n- **English / Korean History** (absolute-grade subjects) exclude percentile goals\r\n- Per-subject colors fixed in `lib/data/`\r\n\r\n### Storage\r\n\r\n- **Grades stored locally only** вҖ” never uploaded (`flutter_secure_storage`, [ADR-02](../guides/architecture-decisions_en.md#adr-02-sensitive-data-storage-flutter_secure_storage))\r\n- Android Keystore / iOS Keychain delegation\r\n- Plain legacy data вҶ’ one-time migration on first launch\r\n\r\n**Files**: `lib/screens/sub/grade_screen.dart`, `grade_input_screen.dart`, `lib/providers/grade_provider.dart`, `test/grade_manager_test.dart`, `test/secure_storage_service_test.dart`\r\n\r\n## Personal Schedule\r\n\r\n- Integrated with the **custom monthly calendar** (see Public Features)\r\n- Single-day / multi-day, 6 presets + circular color picker\r\n- **sqflite** storage вҖ” offline-first, fast range queries\r\n- Visually distinct from NEIS academic events (dot vs bar)\r\n\r\n**Files**: `test/schedule_data_test.dart`\r\n\r\n## D-day\r\n\r\n- Days remaining until a target date\r\n- **Home-screen pinning** supported\r\n- sqflite-backed (same DB as schedules)\r\n\r\n**Files**: `lib/screens/sub/dday_screen.dart`, `test/dday_manager_test.dart`\r\n\r\n## Profile / Settings\r\n\r\n- **Profile picture** (uploaded to Cloud Storage, 256px compression)\r\n- Privacy consent, onboarding вҶ’ login flow\r\n- Notification toggles вҖ” 5 categories (see [Community Features notifications](./community-features_en.md#notifications))\r\n- Theme (light / dark / system)\r\n- Meal notification time\r\n\r\n**Files**: `lib/screens/auth/profile_edit_screen.dart`, `profile_setup_screen.dart`, `lib/screens/sub/setting_screen.dart`, `notification_setting_screen.dart`, `onboarding_screen.dart`\r\n\r\n## New School-Year Update\r\n\r\n- Students/teachers see a March popup to update year/class/number\r\n- **Identity not user-changeable** (admin only вҖ” see [security_en.md](../guides/security_en.md))\r\n\r\n## Deletion\r\n\r\nDouble-confirmation dialog вҶ’ full wipe:\r\n1. Delete subcollections (`users/{uid}/{subjects,sync,notifications}`)\r\n2. Delete `users/{uid}` document (while still authed)\r\n3. Delete Cloud Storage profile picture\r\n4. `user.delete()` вҖ” delete Auth account\r\n\r\nOrder matters вҖ” Auth first causes PERMISSION_DENIED ([Technical Challenge #10](../guides/technical-challenges_en.md#10-account-deletion-ordering-auth--firestore-permission-loss)).\r\n\r\n**Immediate vs deferred deletion** вҖ” `requestAccountDeletion` schedules a 30-day grace period; `purgeDeactivatedAccounts` performs the permanent wipe (PIPA right).\r\n\r\n## PIPA User Rights\r\n\r\nKorea's Personal Information Protection Act (PIPA) requires user-facing screens for these rights:\r\n\r\n### Appeals (`appeals`)\r\n- Submit a reason within 90 days to contest moderation decisions (reports / suspensions / hides)\r\n- Manager reviews вҶ’ push notification with the result\r\n- Auto-deleted after 90 days via `expiresAt` TTL\r\n\r\n**Files**: `lib/screens/appeal/`\r\n\r\n### Data Requests (`data_requests`)\r\n- Bundle the user's own posts / comments / report history / chat messages into a JSON export\r\n- `createDataExport` Cloud Function uploads the file to Storage and emails the download link\r\n- Export files auto-expire after 30 days (`purgeExpiredExports`)\r\n\r\n**Files**: `lib/screens/data_request/`, `functions/index.js` (`createDataExport` / `purgeExpiredExports`)\r\n\r\n### Community Rules (`community_rules`)\r\n- Public-facing screen exposing the operational policy\r\n- Admin-only writes; all users can read\r\n\r\n**Files**: `lib/screens/community_rules/`\r\n\r\n## See Also\r\n- [Public Features](./public-features_en.md)\r\n- [Community Features](./community-features_en.md)\r\n- [Admin Features](./admin-features_en.md)\r\n- [Account & Access](../guides/account-and-access_en.md)\r\n- [Security Model](../guides/security_en.md)\r\n","features/public-features.md":"# кіөк°ң кё°лҠҘ (кёүмӢқ / мӢңк°„н‘ң / мқјм • / мң„м Ҝ / кіөм§Җ)\r\n\r\n> English: [public-features_en.md](./public-features_en.md)\r\n\r\nлЎңк·ёмқё м—¬л¶ҖмҷҖ нҒ¬кІҢ л¬ҙкҙҖн•ҳкІҢ лӘЁл“  мӮ¬мҡ©мһҗк°Җ м ‘н•ҳлҠ” н•өмӢ¬ м •ліҙ кё°лҠҘл“Өмқ„ лӢӨлЈ№лӢҲлӢӨ. лЎңк·ёмқёмқҙ н•„мҡ”н•ң н•ӯлӘ©мқҙ м„һм—¬ мһҲм–ҙлҸ„, н•ҷкөҗмқҳ кіөк°ң м •ліҙ м„ұкІ©мқҙ к°•н•ң кё°лҠҘмқ„ мқҙ л¬ём„ңм—җ л¬¶м—ҲмҠөлӢҲлӢӨ.\r\n\r\n## кёүмӢқ мЎ°нҡҢ\r\n\r\n- **NEIS API** кё°л°ҳ мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ л©”лүҙ мӢӨмӢңк°„ мЎ°нҡҢ\r\n- **мӣ”к°„ н”„лҰ¬нҺҳм№ҳ** мәҗмӢң (24мӢңк°„ / л№Ҳ кІ°кіј 5л¶„), Completer нҢЁн„ҙмңјлЎң лҸҷмӢң мҡ”мІӯ л°©м§Җ ([кё°мҲ кіјм ң #2](../guides/technical-challenges.md#2-кёүмӢқ-api-лҸҷмӢң-мҡ”мІӯ-кІҪн•©-race-condition))\r\n- кёүмӢқ м№ҙл“ң нғӯ вҶ’ мқҙлҜём§Җ кіөмң , **мҳҒм–‘ м„ұл¶„** (нғ„мҲҳнҷ”л¬ј/лӢЁл°ұм§Ҳ/м§Җл°© л“ұ) + м•Ңл ҲлҘҙкё° мң л°ң мӢқн’Ҳ н‘ңмӢң\r\n- кёүмӢқ м•ҢлҰјм—җ л©”лүҙ лҜёлҰ¬ліҙкё° нҸ¬н•Ё (лЎңм»¬ м•ҢлҰј вҖ” мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ к°ңлі„ мӢңк°„)\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/main/meal_screen.dart`, `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`, `test/meal_test.dart`\r\n\r\n### мәҗмӢң м „лһө\r\n\r\n| мғҒнҷ© | TTL |\r\n|---|---|\r\n| м •мғҒ мқ‘лӢө | 24мӢңк°„ |\r\n| л№Ҳ мқ‘лӢө(мЈјл§җ/л°©н•ҷ) | 5л¶„ (кіјлҸ„н•ң мһ¬мҡ”мІӯ л°©м§Җ) |\r\n| мҳӨлҘҳ | мҰүмӢң л§ҢлЈҢ, лӢӨмқҢ м ‘к·ј мӢң мһ¬мӢңлҸ„ |\r\n\r\n## мӢңк°„н‘ң\r\n\r\n- **1н•ҷл…„**: л°ҳлі„ мһҗлҸҷ мЎ°нҡҢ / **2-3н•ҷл…„**: м„ нғқкіјлӘ© кё°л°ҳ л§һм¶Ө мӢңк°„н‘ң\r\n- **көҗмӮ¬ м „мҡ© мӢңк°„н‘ң**: н•ҷл…„ нғӯ(1/2/3н•ҷл…„) вҶ’ кіјлӘ© мҠӨмҷҖмқҙн”„ вҶ’ мӨ‘ліө л°ҳ м„ нғқ\r\n- **м¶©лҸҢ мһҗлҸҷ к°җм§Җ** + н•ҙкІ° нҢқм—…, кіјлӘ©лі„ м»¬лҹ¬ м»ӨмҠӨн„°л§Ҳмқҙм§• (мӣҗнҳ• н”јм»Ө) ([кё°мҲ кіјм ң #4](../guides/technical-challenges.md#4-м„ нғқкіјлӘ©-мӢңк°„н‘ң-м¶©лҸҢ-slot-conflict))\r\n- **нҳ„мһ¬ көҗмӢң** мӢӨмӢңк°„ н‘ңмӢң (1л¶„ к°ұмӢ , н”„лЎңк·ёл ҲмҠӨ л°”), мҳӨлҠҳ мҡ”мқј н•ҳмқҙлқјмқҙнҠё\r\n- м„ нғқкіјлӘ© м ҖмһҘ нҷ•мқё + лҜём ҖмһҘ л’ӨлЎңк°Җкё° кІҪкі \r\n- мғҲ н•ҷкё°(3мӣ”) мӢңк°„н‘ң + м„ нғқкіјлӘ© мһҗлҸҷ лҰ¬м…Ӣ\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/sub/timetable_view_screen.dart`, `lib/screens/sub/timetable_select_screen.dart`, `lib/screens/sub/teacher_timetable_select_screen.dart`, `test/timetable_api_test.dart`\r\n\r\n## н•ҷмӮ¬мқјм • & к°ңмқёмқјм •\r\n\r\n- **м»ӨмҠӨн…Җ мӣ”к°„ мәҳлҰ°лҚ”** (мҠӨмҷҖмқҙн”„ мӣ” мқҙлҸҷ, мң лҸҷм Ғ мЈј мҲҳ, н•ңкөӯм–ҙ)\r\n- **м—°мҶҚ н•ҷмӮ¬мқјм • л°”** (лҒҠк№Җ м—Ҷмқҙ мқҙм–ҙм§ҖлҠ” м»¬лҹ¬ л°” + мқјм •лӘ… н‘ңмӢң)\r\n- **к°ңмқёмқјм •** н•ҳлЈЁ/м—°мҶҚ, **6мғү + мӣҗнҳ• м»¬лҹ¬н”јм»Ө** (л°қкё° мЎ°м Ҳ)\r\n- **NEIS н•ҷмӮ¬мқјм •** мһҗлҸҷ н‘ңмӢң, к°ңмқёмқјм • мғүмғҒ м җ\r\n- **D-day** кҙҖлҰ¬ + нҷҲ нҷ”л©ҙ н•Җ кі м •\r\n\r\n**м ҖмһҘмҶҢ**: к°ңмқё мқјм •мқҖ `sqflite`(лЎңм»¬). н•ҷмӮ¬мқјм •мқҖ NEIS API мәҗмӢң.\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/main/home_screen.dart` (мәҳлҰ°лҚ” мң„м Ҝ), `lib/screens/sub/dday_screen.dart`, `test/schedule_data_test.dart`, `test/dday_manager_test.dart`\r\n\r\n## нҷҲ нҷ”л©ҙ мң„м Ҝ (Android)\r\n\r\n- **кёүмӢқ мң„м Ҝ (4Г—2)**: мҳӨлҠҳмқҳ мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ\r\n- **мӢңк°„н‘ң мң„м Ҝ (3Г—2)**: мҳӨлҠҳмқҳ мӢңк°„н‘ң, нҳ„мһ¬ көҗмӢң к°•мЎ°\r\n- **кёүмӢқ+мӢңк°„н‘ң нҶөн•© мң„м Ҝ (5Г—2)**: кёүмӢқкіј мӢңк°„н‘ңлҘј н•ң нҷ”л©ҙм—җ\r\n- мӢңмҠӨн…ң лӢӨнҒ¬/лқјмқҙнҠё лӘЁл“ң мһҗлҸҷ лҢҖмқ‘\r\n- **мһҗм • мһҗлҸҷ к°ұмӢ ** (AlarmManager + Dart л°ұк·ёлқјмҡҙл“ң мҪңл°ұ)\r\n- м•ұ мӢӨн–ү мӢң мһҗлҸҷ к°ұмӢ , **Firestore мқҪкё° 0** (мәҗмӢң лҚ°мқҙн„° нҷңмҡ©)\r\n\r\n**кҙҖл Ё нҢҢмқј**: `android/app/src/main/java/.../widget/`, `lib/` мқҳ `home_widget` лёҢлҰҝм§Җ вҖ” мһҗм„ён•ң л„ӨмқҙнӢ°лёҢ лҸҷкё°нҷ”лҠ” [кё°мҲ кіјм ң #м°ёкі ](../guides/technical-challenges.md) м°ёмЎ°.\r\n\r\n## нҷҲ нҷ”л©ҙ мң„м Ҝ (iOS)\r\n\r\n- **кёүмӢқ мң„м Ҝ (Medium)**: мҳӨлҠҳмқҳ мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ\r\n- **мӢңк°„н‘ң мң„м Ҝ (Medium)**: мҳӨлҠҳмқҳ мӢңк°„н‘ң, нҳ„мһ¬ көҗмӢң к°•мЎ°\r\n- **кёүмӢқ+мӢңк°„н‘ң нҶөн•© мң„м Ҝ (Large)**: кёүмӢқкіј мӢңк°„н‘ңлҘј н•ң нҷ”л©ҙм—җ\r\n- **SwiftUI + WidgetKit** л„ӨмқҙнӢ°лёҢ кө¬нҳ„\r\n- App GroupsлҘј нҶөн•ң Flutter вҶ” мң„м Ҝ лҚ°мқҙн„° кіөмң \r\n- мӢңмҠӨн…ң лӢӨнҒ¬/лқјмқҙнҠё лӘЁл“ң мһҗлҸҷ лҢҖмқ‘\r\n- 1мӢңк°„ мЈјкё° Timeline к°ұмӢ \r\n\r\n**кҙҖл Ё нҢҢмқј**: `ios/Widget*/`, App Groups м„Өм •мқҖ [DEPLOY.md](../DEPLOY.md) м°ёмЎ°.\r\n\r\n## кёҙкёү нҢқм—… кіөм§Җ\r\n\r\n- м•ұ мӢӨн–ү мӢң **лӘЁлӢ¬ нҢқм—…**мңјлЎң мӨ‘мҡ” кіөм§Җ н‘ңмӢң\r\n- **3мў… нғҖмһ…**: кёҙкёү(л№Ёк°•), кіөм§Җ(нҢҢлһ‘), мқҙлІӨнҠё(мҙҲлЎқ)\r\n- **мӢңмһ‘/мў…лЈҢмқј** м„Өм • вҶ’ кё°к°„ мҷё мһҗлҸҷ л№„нҷңм„ұнҷ”\r\n- **\"мҳӨлҠҳ м•Ҳ ліҙкё°\"** м§Җмӣҗ (кҙҖлҰ¬мһҗ м„Өм •мңјлЎң л№„нҷңм„ұнҷ” к°ҖлҠҘ)\r\n- м•ұ Admin нҷ”л©ҙ + Admin Webм—җм„ң мһ‘м„ұ/кҙҖлҰ¬\r\n\r\n**м ҖмһҘ мң„м№ҳ**: `app_config/announcement` (Firestore). мһҗм„ён•ң кҙҖлҰ¬лҠ” [admin-features.md](./admin-features.md).\r\n\r\n## м•ұ м—…лҚ°мқҙнҠё & мҳӨн”„лқјмқё\r\n\r\n- **м—…лҚ°мқҙнҠё мІҙм»Ө**: Firestore `app_config/version`м—җм„ң мөңмӢ /мөңмҶҢ лІ„м „ л№„көҗ\r\n  - **н•„мҲҳ м—…лҚ°мқҙнҠё**: лӢ«кё° л¶Ҳк°Җ лӢӨмқҙм–јлЎңк·ё + мҠӨнҶ м–ҙ мқҙлҸҷ\r\n  - **м„ нғқ м—…лҚ°мқҙнҠё**: \"лӮҳмӨ‘м—җ\" лІ„нҠј нҸ¬н•Ё м•ҲлӮҙ лӢӨмқҙм–јлЎңк·ё\r\n  - лІ„м „ л№„көҗ лЎңм§Ғ (`major.minor.patch`)\r\n- **мҳӨн”„лқјмқё л°°л„Ҳ**: л„ӨнҠёмӣҢнҒ¬ лҒҠкё°л©ҙ мғҒлӢЁм—җ л№Ёк°„ \"мҳӨн”„лқјмқё мғҒнғңмһ…лӢҲлӢӨ\" н‘ңмӢң, мһ¬м—°кІ° мӢң мһҗлҸҷ мҶҢл©ё\r\n- **мҳӨн”„лқјмқё мәҗмӢң**: кёүмӢқ/мӢңк°„н‘ңлҠ” лЎңм»¬ мәҗмӢңлЎң мҳӨн”„лқјмқём—җм„ңлҸ„ мЎ°нҡҢ к°ҖлҠҘ\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/main.dart` (мҙҲкё°нҷ” мІҙнҒ¬), `lib/data/setting_data.dart`, м—°кІ°м„ұмқҖ `connectivity_plus` нҢЁнӮӨм§Җ.\r\n\r\n## кіөм§Җ лӘ©лЎқ\r\n\r\n- **н•ҷкөҗ кіөм§Җ** м„№м…ҳ (`lib/screens/main/notice_screen.dart`)\r\n- кҙҖлҰ¬мһҗк°Җ мһ‘м„ұн•ҳлҠ” кіөмӢқ кіөм§Җ (кІҢмӢңнҢҗкіј л¶„лҰ¬)\r\n- мІЁл¶Җ нҢҢмқј / мӨ‘мҡ” н‘ңмӢң м§Җмӣҗ\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [м—”л“ңмң м Җ к°Җмқҙл“ң](../USER_GUIDE.md) вҖ” мӢӨм ң мӮ¬мҡ© л°©лІ•\r\n- [м»Өл®ӨлӢҲнӢ° кё°лҠҘ](./community-features.md) вҖ” кІҢмӢңнҢҗ/мұ„нҢ… л“ұ лЎңк·ёмқё н•„мҡ” кё°лҠҘ\r\n- [к°ңмқё кё°лҠҘ](./personal-features.md) вҖ” м„ұм Ғ/к°ңмқёмқјм • л“ұ к°ңмқёнҷ” кё°лҠҘ\r\n- [лҚ°мқҙн„° лӘЁлҚё](../guides/data-model.md) вҖ” `app_config`, `users` мҠӨнӮӨл§Ҳ\r\n","features/public-features_en.md":"# Public Features (Meals / Timetable / Schedule / Widgets / Announcements)\r\n\r\n> н•ңкөӯм–ҙ: [public-features.md](./public-features.md)\r\n\r\nCore information features any user encounters. Some require login, but they all fall under \"public information\" in spirit.\r\n\r\n## Meals\r\n\r\n- **NEIS API**-based real-time breakfast/lunch/dinner lookup\r\n- **Monthly prefetch** cache (24h / 5min for empty results); Completer pattern avoids concurrent duplicate fetches ([Technical Challenge #2](../guides/technical-challenges_en.md#2-meal-api-concurrent-request-race-condition))\r\n- Tap a meal card вҶ’ share as image; shows **nutrition** (carb/protein/fat) + allergen info\r\n- Meal notifications include a menu preview (local notifications, per-meal schedulable)\r\n\r\n**Files**: `lib/screens/main/meal_screen.dart`, `lib/api/meal_data_api.dart`, `test/meal_api_test.dart`, `test/meal_test.dart`\r\n\r\n### Cache Strategy\r\n\r\n| Case | TTL |\r\n|---|---|\r\n| Success response | 24 hours |\r\n| Empty (weekend/break) | 5 minutes (avoid over-refetching) |\r\n| Error | expire immediately, retry on next access |\r\n\r\n## Timetable\r\n\r\n- **1st year**: auto by class. **2nd/3rd year**: custom based on selected electives\r\n- **Teacher view**: year tabs (1/2/3) вҶ’ swipe subjects вҶ’ pick among duplicated classes\r\n- **Auto slot-conflict detection** + resolution dialog; per-subject color customization ([Technical Challenge #4](../guides/technical-challenges_en.md#4-timetable-elective-slot-conflicts))\r\n- **Current period** live highlight (1-min refresh, progress bar); today's column highlighted\r\n- Elective save confirmation + unsaved back-nav warning\r\n- Auto-reset in March (new semester) for timetable + electives\r\n\r\n**Files**: `lib/screens/sub/timetable_view_screen.dart`, `timetable_select_screen.dart`, `teacher_timetable_select_screen.dart`, `test/timetable_api_test.dart`\r\n\r\n## Academic & Personal Schedule\r\n\r\n- **Custom monthly calendar** (swipe to change months, variable week count, Korean locale)\r\n- **Continuous academic-event bar** (unbroken colored bar + event name)\r\n- **Personal events** single/multi-day, **6 presets + circular color picker** (with brightness)\r\n- **NEIS academic events** shown automatically; personal events as colored dots\r\n- **D-day** management + home-screen pinning\r\n\r\n**Storage**: personal events in `sqflite` (local). Academic events cached from NEIS.\r\n\r\n**Files**: `lib/screens/main/home_screen.dart` (calendar widget), `lib/screens/sub/dday_screen.dart`, `test/schedule_data_test.dart`, `test/dday_manager_test.dart`\r\n\r\n## Android Home Widgets\r\n\r\n- **Meal widget (4Г—2)**: today's breakfast/lunch/dinner\r\n- **Timetable widget (3Г—2)**: today's schedule, current period highlighted\r\n- **Combined widget (5Г—2)**: meal + timetable together\r\n- System dark/light mode auto-matched\r\n- **Auto-refresh at midnight** (AlarmManager + Dart background callback)\r\n- Refresh on app launch; **0 Firestore reads** (uses cached data)\r\n\r\n**Files**: `android/app/src/main/java/.../widget/`, Flutter вҶ” native bridge via `home_widget`.\r\n\r\n## iOS Home Widgets\r\n\r\n- **Meal widget (Medium)**: today's breakfast/lunch/dinner\r\n- **Timetable widget (Medium)**: today's schedule, current period highlighted\r\n- **Combined widget (Large)**: meal + timetable together\r\n- **SwiftUI + WidgetKit** native implementation\r\n- App Groups for Flutter вҶ” widget data sharing\r\n- System dark/light auto-matched\r\n- Hourly Timeline refresh\r\n\r\n**Files**: `ios/Widget*/`. App Groups setup in [DEPLOY_en.md](../DEPLOY_en.md).\r\n\r\n## Urgent Popup Announcements\r\n\r\n- Modal popup shown on app launch for high-priority news\r\n- **3 types**: urgent (red), notice (blue), event (green)\r\n- **Start/end dates** вҖ” automatically dormant outside the window\r\n- **\"Hide for today\"** supported (admin can disable)\r\n- Authored via Flutter Admin screen + Admin Web\r\n\r\n**Storage**: `app_config/announcement` (Firestore). See [admin-features_en.md](./admin-features_en.md).\r\n\r\n## App Update & Offline\r\n\r\n- **Update checker**: compares Firestore `app_config/version` against the installed version\r\n  - **Mandatory**: non-dismissible dialog + store link\r\n  - **Optional**: dialog with \"Later\"\r\n  - Version comparison over `major.minor.patch`\r\n- **Offline banner**: red \"offline\" banner at top when network drops, auto-dismiss on reconnect\r\n- **Offline cache**: meals/timetable visible offline via local cache\r\n\r\n**Files**: `lib/main.dart` (startup check), `lib/data/setting_data.dart`, connectivity via `connectivity_plus`.\r\n\r\n## Announcements List\r\n\r\n- School announcements section (`lib/screens/main/notice_screen.dart`)\r\n- Admin-authored official notices (separate from board)\r\n- Attachments / importance flag supported\r\n\r\n## See Also\r\n- [User Guide](../USER_GUIDE_en.md)\r\n- [Community Features](./community-features_en.md)\r\n- [Personal Features](./personal-features_en.md)\r\n- [Data Model](../guides/data-model_en.md) вҖ” `app_config`, `users` schema\r\n","guides/account-and-access.md":"# мқёмҰқ & м ‘к·ј м ңм–ҙ\r\n\r\n> English: [account-and-access_en.md](./account-and-access_en.md)\r\n\r\nн•ңмҶ”кі  м•ұмқҳ мқёмҰқ, м—ӯн• , мҠ№мқё н”ҢлЎңмҡ°, м •м§Җ/нғҲнҮҙ м Ҳм°ЁлҘј м •лҰ¬н•©лӢҲлӢӨ.\r\n\r\n## мқёмҰқ л°©мӢқ вҖ” 4мў… OAuth\r\n\r\n| Provider | кө¬нҳ„ л°©мӢқ |\r\n|---|---|\r\n| **Google** | `google_sign_in` + Firebase Auth м§Ғм ‘ |\r\n| **Apple** | `sign_in_with_apple` + Firebase Auth м§Ғм ‘ |\r\n| **Kakao** | `kakao_flutter_sdk_user` вҶ’ мһҗмІҙ Cloud Function (`kakaoCustomAuth`) вҶ’ Firebase Custom Token |\r\n| **GitHub** | Firebase Auth OAuth provider |\r\n\r\nл№„л°ҖлІҲнҳёлҠ” м ҖмһҘн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ. к°Ғ Providerмқҳ OAuth tokenл§Ң мӮ¬мҡ©.\r\n\r\n### Kakao м»ӨмҠӨн…Җ нҶ нҒ° н”ҢлЎңмҡ°\r\n\r\n```mermaid\r\nsequenceDiagram\r\n    participant App as Flutter App\r\n    participant Kakao as Kakao OAuth\r\n    participant CF as Cloud Function<br/>kakaoCustomAuth\r\n    participant Auth as Firebase Auth\r\n\r\n    App->>Kakao: лЎңк·ёмқё вҶ’ access token\r\n    App->>CF: POST {token}\r\n    CF->>Kakao: GET /v2/user/me\r\n    Kakao-->>CF: profile (id, email, nickname)\r\n    CF->>Auth: createUser(uid=kakao:ID) if new\r\n    CF->>Auth: createCustomToken(uid)\r\n    CF-->>App: {firebaseToken}\r\n    App->>Auth: signInWithCustomToken(firebaseToken)\r\n```\r\n\r\n- zod мҠӨнӮӨл§ҲлЎң мһ…л Ҙ кІҖмҰқ (`KakaoAuthSchema`)\r\n- н”„лЎңн•„ мӮ¬м§„мқҖ Firestore `users/{uid}.profilePhotoUrl` м—җ м ҖмһҘ (м—ҶлҠ” кІҪмҡ°л§Ң)\r\n\r\n## мӢ л¶„ (`userType`)\r\n\r\nк°Җмһ… мӢң м„ нғқ:\r\n- `student` вҖ” мһ¬н•ҷмғқ (н•ҷлІҲ мһ…л Ҙ н•„мҲҳ)\r\n- `graduate` вҖ” мЎём—…мғқ (мЎём—… м—°лҸ„ мһ…л Ҙ)\r\n- `teacher` вҖ” көҗмӮ¬ (лӢҙлӢ№ кіјлӘ© мһ…л Ҙ)\r\n- `parent` вҖ” н•ҷл¶ҖлӘЁ\r\n\r\nмӢ л¶„м—җ л”°лқј кё°ліё м—ӯн•  = `user`. мқҙнӣ„ кҙҖлҰ¬мһҗ мҠ№мқё м Ҳм°Ё.\r\n\r\n## м—ӯн•  мІҙкі„\r\n\r\n| `role` | мқёмӣҗ | лҢҖмғҒ | к¶Ңн•ң |\r\n|---|---|---|---|\r\n| `admin` | 1-2лӘ… | лӢҙлӢ№ көҗмӮ¬ | лӘЁл“  к¶Ңн•ң, м—ӯн•  л¶Җм—¬ |\r\n| `manager` | 2-3лӘ… | н•ҷмғқнҡҢмһҘ/л¶ҖнҡҢмһҘ | мӮ¬мҡ©мһҗ кҙҖлҰ¬, мҪҳн…җмё  мӮӯм ң, мӢ кі  мІҳлҰ¬, м„Өм • |\r\n| `moderator` | 5-7лӘ… | мқјл°ҳ н•ҷмғқнҡҢ мһ„мӣҗ | кІҢмӢңкёҖ/лҢ“кёҖ мӮӯм ң, мӢ кі  мЎ°нҡҢ/мІҳлҰ¬ м „лӢҙ |\r\n| `auditor` | 1лӘ… | мЎём—…мғқ к°ңл°ңмһҗ/лӢҙлӢ№ көҗмӮ¬ | мқҪкё° м „мҡ© к°җмӮ¬мһҗ вҖ” лЎңк·ё/нҶөкі„/мӢ кі /кұҙмқҳмӮ¬н•ӯ мЎ°нҡҢ |\r\n| `user` | вҖ” | мқјл°ҳ мӮ¬мҡ©мһҗ | мқјл°ҳ кё°лҠҘ (мҠ№мқё нӣ„) |\r\n\r\n`admin`, `manager`, `moderator`, `auditor`лҘј нҶөм№ӯн•ҳм—¬ **staff** лқј л¶ҖлҰ…лӢҲлӢӨ.\r\n\r\n**Flutter лӘЁлҚё** (`UserProfile`):\r\n- `isModerator` / `isAuditor` / `isStaff` getter м¶”к°Җ\r\n- `isApproved()` вҖ” staff(`isStaff`)лҠ” мҠ№мқё м Ҳм°Ё мҡ°нҡҢ (кё°мЎҙ `isManager` кё°мӨҖм—җм„ң ліҖкІҪ)\r\n- нҷҲ нҷ”л©ҙ Admin л°©нҢЁ лІ„нҠј вҖ” `isStaff` кё°мӨҖ н‘ңмӢң (кё°мЎҙ `isManager`м—җм„ң ліҖкІҪ)\r\n\r\n**мҠ№кёү/к°•л“ұ**: `admin`л§Ң к°ҖлҠҘ. к°җмӮ¬ лЎңк·ё(`admin_logs`)м—җ мқҙм „вҶ’мқҙнӣ„ кё°лЎқ.\r\n\r\n## к°Җмһ… & мҠ№мқё н”ҢлЎңмҡ°\r\n\r\n```mermaid\r\ngraph LR\r\n    A[OAuth лЎңк·ёмқё] --> B{н”„лЎңн•„ мЎҙмһ¬?}\r\n    B -->|no| C[н”„лЎңн•„ м…Ӣм—…<br/>мӢ л¶„/н•ҷлІҲ/мқҙлҰ„]\r\n    B -->|yes| D{approved?}\r\n    C --> E[approved: falseлЎң м ҖмһҘ]\r\n    E --> F[мҠ№мқё лҢҖкё° нҷ”л©ҙ]\r\n    D -->|yes| G[нҷҲ м§„мһ…]\r\n    D -->|no| F\r\n    F -.->|кҙҖлҰ¬мһҗ мҠ№мқё| D\r\n    F -.->|кҙҖлҰ¬мһҗ кұ°м Ҳ| H[кі„м • л№„нҷңм„ұ]\r\n```\r\n\r\n- мҠ№мқё лҢҖкё° мӨ‘м—җлҠ” мқјл°ҳ кё°лҠҘ м°ЁлӢЁ (к·ңм№ҷ + нҒҙлқјмқҙм–ёнҠё к°Җл“ң)\r\n- кҙҖлҰ¬мһҗк°Җ Admin нҷ”л©ҙм—җм„ң мҠ№мқё вҶ’ `onUserUpdated` нҠёлҰ¬кұ° вҶ’ мҠ№мқё н‘ёмӢң\r\n\r\n## н•ҷкөҗ мқҙл©”мқј мқёмҰқ (OTP)\r\n\r\nPIPA мІӯмҶҢл…„ мЎ°н•ӯ + мҷёл¶Җмқё м°ЁлӢЁмқ„ мң„н•ҙ н•ҷкөҗм—җм„ң л°ңкёүн•ң мқҙл©”мқј лҸ„л©”мқёмңјлЎң ліёмқё нҷ•мқё.\r\n\r\n**н—Ҳмҡ© лҸ„л©”мқё**: `edu.sje.go.kr`, `sjhansol.sjeduhs.kr` (Functions `SCHOOL_EMAIL_DOMAINS` мғҒмҲҳ)\r\n\r\n### н”ҢлЎңмҡ°\r\n\r\n```mermaid\r\nsequenceDiagram\r\n    participant App as Flutter App\r\n    participant CF as Cloud Functions\r\n    participant FS as Firestore\r\n    participant Mail as Gmail SMTP\r\n\r\n    App->>CF: sendSchoolEmailOTP({email})\r\n    CF->>FS: otp_codes/{uid} м ҖмһҘ<br/>(codeHash, expiresAt, dailyCount)\r\n    CF->>Mail: 6мһҗлҰ¬ мҪ”л“ң л°ңмҶЎ\r\n    App->>CF: verifySchoolEmailOTP({code})\r\n    CF->>FS: otp_codes/{uid} мқҪкё° + н•ҙмӢң л№„көҗ\r\n    CF->>FS: users/{uid} к°ұмӢ <br/>(verificationStatus: \"verified\")\r\n    CF->>FS: otp_codes/{uid} мӮӯм ң\r\n```\r\n\r\n### мғҒнғң н•„л“ң (`users/{uid}`)\r\n\r\n| н•„л“ң | к°’ |\r\n|---|---|\r\n| `verificationStatus` | `pending` (к°Җмһ… м§Ғнӣ„) / `verified` (м„ұкіө) |\r\n| `schoolEmail` | мқёмҰқлҗң мқҙл©”мқј мЈјмҶҢ |\r\n| `verifiedAt` | м„ңлІ„ нғҖмһ„мҠӨнғ¬н”„ |\r\n| `verifiedVia` | `otp` |\r\n\r\nмӢ к·ң к°Җмһ… мӢң `ProfileSetupScreen`мқҙ `verificationStatus: 'pending'`мңјлЎң м ҖмһҘн•ҳкі  мқёмҰқ нҷ”л©ҙмқ„ к°•м ң н‘ёмӢң (`dismissible: false`).\r\n\r\n### ліҙм•Ҳ / л ҲмқҙнҠё лҰ¬л°Ӣ\r\n\r\n| н•ӯлӘ© | к°’ | мң„м№ҳ |\r\n|---|---|---|\r\n| мҪ”л“ң кёёмқҙ | 6мһҗлҰ¬ мҲ«мһҗ | `crypto.randomInt(0, 1000000)` |\r\n| м ҖмһҘ л°©мӢқ | sha256 н•ҙмӢң | нҸүл¬ё лҜёліҙкҙҖ |\r\n| л§ҢлЈҢ | 30л¶„ | `expiresAt` |\r\n| мһ¬м „мҶЎ к°„кІ© | 120мҙҲ | `lastSentAt` л№„көҗ |\r\n| мқјмқј л°ңмҶЎ н•ңлҸ„ | 5нҡҢ | `dailyKey` + `dailyCount` |\r\n| мӢңлҸ„ н•ңлҸ„ | 5нҡҢ | `attempts` м№ҙмҡҙнҠё вҶ’ мҙҲкіј мӢң OTP мӮӯм ң |\r\n| мқёмҰқ м„ұкіө/л§ҢлЈҢ | OTP мҰүмӢң мӮӯм ң | мһ¬мӮ¬мҡ© л¶Ҳк°Җ |\r\n\r\n`otp_codes/{uid}` м»¬л үм…ҳмқҖ нҒҙлқјмқҙм–ёнҠё read/write м „л¶Җ кұ°л¶Җ (Cloud Functions м „мҡ©). [security.md#мӢ к·ң-м»¬л үм…ҳ-pipa-лҢҖмқ‘](./security.md#мӢ к·ң-м»¬л үм…ҳ-pipa-лҢҖмқ‘) м°ёмЎ°.\r\n\r\n### `isVerified()` к°Җл“ң\r\n\r\n```js\r\nfunction canWrite() { return isVerified() && isNotSuspended(); }\r\n```\r\n\r\n`posts` / `comments` / `reports` / `chats/messages` createлҠ” `canWrite()` нҶөкіј н•„мҲҳ. лҜёмқёмҰқ мӮ¬мҡ©мһҗлҠ” кёҖ/лҢ“кёҖ/мӢ кі /мұ„нҢ…мқҙ л§үнһҷлӢҲлӢӨ.\r\n\r\n**Grandfathering**: `verificationStatus` н•„л“ңк°Җ м—ҶлҠ” кё°мЎҙ мӮ¬мҡ©мһҗлҠ” `'verified'`лЎң мІҳлҰ¬лҗҳм–ҙ нҶөкіј (`data.get('verificationStatus', 'verified')`). мӢ к·ң к°Җмһ…мһҗл§Ң мқёмҰқ лӢЁкі„лҘј кұ°м№©лӢҲлӢӨ.\r\n\r\n### нҒҙлқјмқҙм–ёнҠё к°Җл“ң\r\n\r\n`VerificationGuard.check()` (`lib/providers/verification_guard.dart`)к°Җ кёҖм“°кё°/лҢ“кёҖ/мӢ кі  м§„мһ…м җм—җм„ң нҳём¶ң:\r\n- м •м§Җ вҶ’ м •м§Җ лӢӨмқҙм–јлЎңк·ё + мқҙмқҳм ңкё° м§„мһ…\r\n- лҜёмқёмҰқ вҶ’ мқёмҰқ м•ҲлӮҙ лӢӨмқҙм–јлЎңк·ё вҶ’ \"мқёмҰқн•ҳкё°\" мӢң `EmailVerificationScreen` н‘ёмӢң вҶ’ м„ұкіө мӢң `userProfileProvider` invalidate\r\n\r\n### Functions Secrets\r\n\r\n`GMAIL_SENDER_EMAIL`, `GMAIL_APP_PASSWORD`лҘј Functions secretsлЎң кҙҖлҰ¬. Gmail м•ұ л№„л°ҖлІҲнҳёлЎң SMTP л°ңмҶЎ. `firebase functions:secrets:set GMAIL_SENDER_EMAIL` / `... GMAIL_APP_PASSWORD`лЎң л“ұлЎқ.\r\n\r\n**кҙҖл Ё нҢҢмқј**: `functions/index.js` (`sendSchoolEmailOTP`, `verifySchoolEmailOTP`), `lib/screens/auth/email_verification_screen.dart`, `lib/providers/verification_guard.dart`\r\n\r\n## м •м§Җ & н•ҙм ң\r\n\r\n- **м •м§Җ кё°к°„**: 1мӢңк°„ / 6мӢңк°„ / 1мқј / 3мқј / 7мқј / 30мқј / мҳҒкө¬\r\n- н•„л“ң: `users/{uid}.suspendedUntil` (timestamp)\r\n- м •м§Җ мӨ‘м—җлҠ” кёҖ/лҢ“кёҖ/мұ„нҢ… мһ‘м„ұ м°ЁлӢЁ (rules + нҒҙлқјмқҙм–ёнҠё)\r\n\r\n### мһҗлҸҷ н•ҙм ң\r\n\r\nCloud Functions мҠӨмјҖмӨ„лҹ¬ (`checkSuspensionExpiry`, л§ӨмӢңк°„):\r\n1. `suspendedUntil <= now` мЎ°нҡҢ\r\n2. н•„л“ң мӮӯм ң\r\n3. `onUserUpdated` нҠёлҰ¬кұ° вҶ’ н•ҙм ң н‘ёмӢң л°ңмҶЎ\r\n\r\n## нғҲнҮҙ\r\n\r\nмқҙмӨ‘ нҷ•мқё лӢӨмқҙм–јлЎңк·ё вҶ’ мҷ„м „ мӮӯм ң:\r\n1. н•ҳмң„ м»¬л үм…ҳ (`users/{uid}/{subjects,sync,notifications}`) мӮӯм ң\r\n2. `users/{uid}` л¬ём„ң мӮӯм ң (мқёмҰқ мғҒнғң мң м§Җ мӨ‘)\r\n3. Cloud Storage н”„лЎңн•„ мӮ¬м§„ мӮӯм ң\r\n4. `user.delete()` вҖ” Auth кі„м • мӮӯм ң\r\n\r\nмҲңм„ңк°Җ мӨ‘мҡ”: Auth лЁјм Җ мӮӯм ң мӢң Firestoreм—җм„ң PERMISSION_DENIED ([кё°мҲ кіјм ң #10](./technical-challenges.md#10-кі„м •-мӮӯм ң-мҲңм„ң-л¬ём ң)).\r\n\r\n## лЎңк·ёмқё мғҒнғң мқҙмҠҲ\r\n\r\n### нҶ нҒ° м „нҢҢ м§Җм—°\r\n\r\nOAuth м§Ғнӣ„ Firestore м ‘к·ј мӢң PERMISSION_DENIED к°ҖлҠҘ. `getIdToken(true)`лЎң к°•м ң к°ұмӢ  + мөңлҢҖ 3нҡҢ мһ¬мӢңлҸ„ ([кё°мҲ кіјм ң #1](./technical-challenges.md#1-firebase-auth-нҶ нҒ°-лҸҷкё°нҷ”-л¬ём ң)).\r\n\r\n### мғҲ н•ҷкё° м—…лҚ°мқҙнҠё\r\n\r\nмһ¬н•ҷмғқ/көҗмӮ¬лҠ” 3мӣ”м—җ н•ҷл…„/л°ҳ/лІҲнҳё мһ…л Ҙ нҢқм—… н‘ңмӢң. м—ӯн• мқҖ ліҖкІҪ л¶Ҳк°Җ.\r\n\r\n## м—ӯн• лі„ кё°лҠҘ л§ӨнҠёлҰӯмҠӨ\r\n\r\n| кё°лҠҘ | user | moderator | auditor | manager | admin |\r\n|---|:---:|:---:|:---:|:---:|:---:|\r\n| кёҖ/лҢ“кёҖ мһ‘м„ұ | вң… | вң… | вқҢ | вң… | вң… |\r\n| кёҖ/лҢ“кёҖ мӮӯм ң (нғҖмқё) | вқҢ | вң… | вқҢ | вң… | вң… |\r\n| мӢ кі  мЎ°нҡҢ/мІҳлҰ¬ | вқҢ | вң… | мЎ°нҡҢл§Ң | вң… | вң… |\r\n| мӮ¬мҡ©мһҗ мҠ№мқё | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| мӮ¬мҡ©мһҗ м •м§Җ | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| м—ӯн•  ліҖкІҪ | вқҢ | вқҢ | вқҢ | вқҢ | вң… |\r\n| кіөм§Җ кі м • | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| кёҙкёү нҢқм—… кҙҖлҰ¬ | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| м„Өм • кҙҖлҰ¬ | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| лЎңк·ё/нҶөкі„ мЎ°нҡҢ | вқҢ | вқҢ | вң… | вң… | вң… |\r\n| кұҙмқҳмӮ¬н•ӯ мЎ°нҡҢ | вқҢ | вқҢ | вң… | вң… | вң… |\r\n| Admin нҷ”л©ҙ м ‘к·ј | вқҢ | вң… | вң… | вң… | вң… |\r\n| к°җмӮ¬ лЎңк·ё мЎ°нҡҢ | вқҢ | вқҢ | вң… | вң… | вң… |\r\n\r\nмғҒм„ё к·ңм№ҷмқҖ [security.md](./security.md) м°ёмЎ°.\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [ліҙм•Ҳ лӘЁлҚё](./security.md)\r\n- [кҙҖлҰ¬мһҗ кё°лҠҘ](../features/admin-features.md)\r\n- [лҚ°мқҙн„° лӘЁлҚё](./data-model.md) вҖ” `users` мҠӨнӮӨл§Ҳ мғҒм„ё\r\n- [м—”л“ңмң м Җ к°Җмқҙл“ң](../USER_GUIDE.md)\r\n","guides/account-and-access_en.md":"# Account & Access Control\r\n\r\n> н•ңкөӯм–ҙ: [account-and-access.md](./account-and-access.md)\r\n\r\nAuthentication, roles, approval flow, and suspension/deletion procedures for the Hansol HS app.\r\n\r\n## Authentication вҖ” 4 OAuth Providers\r\n\r\n| Provider | Implementation |\r\n|---|---|\r\n| **Google** | `google_sign_in` + Firebase Auth direct |\r\n| **Apple** | `sign_in_with_apple` + Firebase Auth direct |\r\n| **Kakao** | `kakao_flutter_sdk_user` вҶ’ custom Cloud Function (`kakaoCustomAuth`) вҶ’ Firebase custom token |\r\n| **GitHub** | Firebase Auth OAuth provider |\r\n\r\nNo passwords are ever stored вҖ” only OAuth tokens.\r\n\r\n### Kakao Custom Token Flow\r\n\r\n```mermaid\r\nsequenceDiagram\r\n    participant App as Flutter App\r\n    participant Kakao as Kakao OAuth\r\n    participant CF as Cloud Function<br/>kakaoCustomAuth\r\n    participant Auth as Firebase Auth\r\n\r\n    App->>Kakao: Login вҶ’ access token\r\n    App->>CF: POST {token}\r\n    CF->>Kakao: GET /v2/user/me\r\n    Kakao-->>CF: profile (id, email, nickname)\r\n    CF->>Auth: createUser(uid=kakao:ID) if new\r\n    CF->>Auth: createCustomToken(uid)\r\n    CF-->>App: {firebaseToken}\r\n    App->>Auth: signInWithCustomToken(firebaseToken)\r\n```\r\n\r\n- Zod schema (`KakaoAuthSchema`) validates input\r\n- Profile picture saved to Firestore `users/{uid}.profilePhotoUrl` only if missing\r\n\r\n## Identity (`userType`)\r\n\r\nChosen at signup:\r\n- `student` вҖ” current student (student ID required)\r\n- `graduate` вҖ” graduate (graduation year required)\r\n- `teacher` вҖ” teacher (subject required)\r\n- `parent` вҖ” parent/guardian\r\n\r\nDefault `role = user` regardless of identity. Admin approval follows.\r\n\r\n## Roles\r\n\r\n| `role` | Headcount | Who | Scope |\r\n|---|---|---|---|\r\n| `admin` | 1-2 | Supervising teacher | Full access, role assignment |\r\n| `manager` | 2-3 | Student council president/VP | User management, content deletion, report handling, settings |\r\n| `moderator` | 5-7 | General student council officers | Post/comment deletion, report review/handling |\r\n| `auditor` | 1 | Graduate developer / supervising teacher | Read-only auditor вҖ” view logs, stats, reports, suggestions |\r\n| `user` | вҖ” | General users | General features (after approval) |\r\n\r\n`admin`, `manager`, `moderator`, and `auditor` are collectively referred to as **staff**.\r\n\r\n**Flutter model** (`UserProfile`):\r\n- New getters: `isModerator`, `isAuditor`, `isStaff`\r\n- `isApproved()` вҖ” staff (`isStaff`) bypass approval (previously checked `isManager`)\r\n- Home screen admin shield button вҖ” shown based on `isStaff` (previously `isManager`)\r\n\r\n**Promotion/demotion**: admin-only. Each change is logged in `admin_logs` (before вҶ’ after).\r\n\r\n## Signup & Approval Flow\r\n\r\n```mermaid\r\ngraph LR\r\n    A[OAuth login] --> B{profile exists?}\r\n    B -->|no| C[profile setup<br/>identity / student ID / name]\r\n    B -->|yes| D{approved?}\r\n    C --> E[save with approved: false]\r\n    E --> F[waiting screen]\r\n    D -->|yes| G[enter home]\r\n    D -->|no| F\r\n    F -.->|admin approves| D\r\n    F -.->|admin rejects| H[disabled account]\r\n```\r\n\r\n- Un-approved users are blocked from most features (rules + client guards)\r\n- Admin approval via Admin screen вҶ’ `onUserUpdated` trigger вҶ’ approval push\r\n\r\n## School Email Verification (OTP)\r\n\r\nPIPA youth-data requirements plus the need to keep outsiders out: identity is confirmed via a school-issued email domain.\r\n\r\n**Allowed domains**: `edu.sje.go.kr`, `sjhansol.sjeduhs.kr` (Functions constant `SCHOOL_EMAIL_DOMAINS`)\r\n\r\n### Flow\r\n\r\n```mermaid\r\nsequenceDiagram\r\n    participant App as Flutter App\r\n    participant CF as Cloud Functions\r\n    participant FS as Firestore\r\n    participant Mail as Gmail SMTP\r\n\r\n    App->>CF: sendSchoolEmailOTP({email})\r\n    CF->>FS: write otp_codes/{uid}<br/>(codeHash, expiresAt, dailyCount)\r\n    CF->>Mail: send 6-digit code\r\n    App->>CF: verifySchoolEmailOTP({code})\r\n    CF->>FS: read otp_codes/{uid} + hash compare\r\n    CF->>FS: update users/{uid}<br/>(verificationStatus: \"verified\")\r\n    CF->>FS: delete otp_codes/{uid}\r\n```\r\n\r\n### State fields (`users/{uid}`)\r\n\r\n| Field | Value |\r\n|---|---|\r\n| `verificationStatus` | `pending` (right after signup) / `verified` (on success) |\r\n| `schoolEmail` | the verified address |\r\n| `verifiedAt` | server timestamp |\r\n| `verifiedVia` | `otp` |\r\n\r\nOn signup, `ProfileSetupScreen` writes `verificationStatus: 'pending'` and immediately pushes the verification screen (`dismissible: false`).\r\n\r\n### Security / rate limits\r\n\r\n| Item | Value | Location |\r\n|---|---|---|\r\n| Code length | 6 digits | `crypto.randomInt(0, 1000000)` |\r\n| Storage | sha256 hash | plaintext never persisted |\r\n| Expiry | 30 minutes | `expiresAt` |\r\n| Resend interval | 120 seconds | compared against `lastSentAt` |\r\n| Daily send cap | 5 | `dailyKey` + `dailyCount` |\r\n| Attempt cap | 5 | `attempts` counter вҶ’ OTP deleted on excess |\r\n| Success / expiry | OTP deleted immediately | non-reusable |\r\n\r\nThe `otp_codes/{uid}` collection denies all client read/write (Cloud Functions only). See [security_en.md#new-collections-pipa](./security_en.md#new-collections-pipa).\r\n\r\n### `isVerified()` guard\r\n\r\n```js\r\nfunction canWrite() { return isVerified() && isNotSuspended(); }\r\n```\r\n\r\n`posts` / `comments` / `reports` / `chats/messages` creates require `canWrite()`. Unverified users cannot post, comment, report, or chat.\r\n\r\n**Grandfathering**: pre-existing users without a `verificationStatus` field are treated as `'verified'` (`data.get('verificationStatus', 'verified')`). Only new signups go through verification.\r\n\r\n### Client guard\r\n\r\n`VerificationGuard.check()` (`lib/providers/verification_guard.dart`) is invoked at write/comment/report entry points:\r\n- Suspended вҶ’ suspension dialog + appeal entry\r\n- Unverified вҶ’ verification prompt вҶ’ \"Verify\" pushes `EmailVerificationScreen` вҶ’ on success, invalidates `userProfileProvider`\r\n\r\n### Functions secrets\r\n\r\n`GMAIL_SENDER_EMAIL` and `GMAIL_APP_PASSWORD` are stored as Functions secrets and used to send via Gmail SMTP (app password). Register via `firebase functions:secrets:set GMAIL_SENDER_EMAIL` and `... GMAIL_APP_PASSWORD`.\r\n\r\n**Files**: `functions/index.js` (`sendSchoolEmailOTP`, `verifySchoolEmailOTP`), `lib/screens/auth/email_verification_screen.dart`, `lib/providers/verification_guard.dart`\r\n\r\n## Suspension & Unsuspension\r\n\r\n- **Durations**: 1h / 6h / 1d / 3d / 7d / 30d / permanent\r\n- Field: `users/{uid}.suspendedUntil` (timestamp)\r\n- During suspension, post/comment/chat creation is blocked (rules + client)\r\n\r\n### Auto-Unsuspension\r\n\r\nCloud Functions scheduler (`checkSuspensionExpiry`, hourly):\r\n1. Query `suspendedUntil <= now`\r\n2. Delete the field\r\n3. `onUserUpdated` trigger вҶ’ unsuspension push\r\n\r\n## Deletion\r\n\r\nDouble confirmation, then full wipe:\r\n1. Delete subcollections (`users/{uid}/{subjects,sync,notifications}`)\r\n2. Delete `users/{uid}` document (while still authed)\r\n3. Delete profile picture from Cloud Storage\r\n4. `user.delete()` вҖ” delete Auth account\r\n\r\nOrder matters: deleting Auth first causes Firestore PERMISSION_DENIED ([Technical Challenge #10](./technical-challenges_en.md#10-account-deletion-ordering-auth--firestore-permission-loss)).\r\n\r\n## Login-State Gotchas\r\n\r\n### Token Propagation\r\n\r\nFirestore access right after OAuth may fail with PERMISSION_DENIED. We force-refresh via `getIdToken(true)` and retry up to 3 times ([Technical Challenge #1](./technical-challenges_en.md#1-firebase-auth-token-propagation-permission-denied)).\r\n\r\n### March School-Year Update\r\n\r\nStudents/teachers see a popup in March to update year/class/number. Identity is not user-changeable.\r\n\r\n## Role-feature Matrix\r\n\r\n| Feature | user | moderator | auditor | manager | admin |\r\n|---|:---:|:---:|:---:|:---:|:---:|\r\n| Create post/comment | вң… | вң… | вқҢ | вң… | вң… |\r\n| Delete others' post/comment | вқҢ | вң… | вқҢ | вң… | вң… |\r\n| View/handle reports | вқҢ | вң… | View only | вң… | вң… |\r\n| Approve users | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| Suspend users | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| Change roles | вқҢ | вқҢ | вқҢ | вқҢ | вң… |\r\n| Pin announcements | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| Manage urgent popup | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| Manage settings | вқҢ | вқҢ | вқҢ | вң… | вң… |\r\n| View logs/stats | вқҢ | вқҢ | вң… | вң… | вң… |\r\n| View suggestions | вқҢ | вқҢ | вң… | вң… | вң… |\r\n| Admin screen access | вқҢ | вң… | вң… | вң… | вң… |\r\n| View audit logs | вқҢ | вқҢ | вң… | вң… | вң… |\r\n\r\nFull rules detail: [security_en.md](./security_en.md).\r\n\r\n## See Also\r\n- [Security Model](./security_en.md)\r\n- [Admin Features](../features/admin-features_en.md)\r\n- [Data Model](./data-model_en.md) вҖ” full `users` schema\r\n- [User Guide](../USER_GUIDE_en.md)\r\n","guides/architecture-decisions.md":"# м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ (ADR)\r\n\r\n> English: [architecture-decisions_en.md](./architecture-decisions_en.md)\r\n\r\nк°Ғ кІ°м •мқҖ *мҷң лӢӨлҘё нӣ„ліҙк°Җ м•„лӢҲлқј мқҙ м„ нғқмқёк°Җ* лҘј м§§кІҢ м •лҰ¬н•©лӢҲлӢӨ.\r\n\r\n---\r\n\r\n## ADR-01. мғҒнғңкҙҖлҰ¬: Riverpod 2.5 (vs Provider / BLoC / GetX)\r\n\r\n- **м„ нғқ мқҙмң **: м»ҙнҢҢмқј нғҖмһ„ м•Ҳм „м„ұ(`ref.watch`), `family`/`autoDispose` мЎ°н•©, AsyncNotifierлЎң лЎңл”©/м—җлҹ¬ л¶„кё° мҪ”л“ңлҘј мӨ„м—¬мӨҢ\r\n- **лІ„лҰ° мҳөм…ҳ**:\r\n  - *Provider* вҖ” мғҒнғңк°Җ к№Ҡм–ҙм§ҲмҲҳлЎқ `Consumer` boilerplate мҰқк°Җ, AsyncValue лҜём§Җмӣҗ\r\n  - *BLoC* вҖ” Stream кё°л°ҳмқҙлқј лӢЁмҲң CRUDм—җлҸ„ Event/State class м–‘мӮ°, н•ҷмҠө кіЎм„ \r\n  - *GetX* вҖ” DI/л„Өл№„/i18nк№Ңм§Җ н•ң нҢЁнӮӨм§Җм—җ л¬¶м—¬ мһҲм–ҙ lock-in мң„н—ҳ\r\n- **нҠёл Ҳмқҙл“ңмҳӨн”„**: `riverpod_generator` мҪ”л“ң мғқм„ұ мқҳмЎҙ, `ref` к°қмІҙлҘј л№„мң„м Ҝ мҪ”л“ңм—җ л…ём¶ңн•ҳм§Җ м•ҠлҸ„лЎқ лі„лҸ„ Manager кі„мёө мң м§Җ\r\n- **кҙҖл Ё нҢҢмқј**: `lib/providers/*.dart`, `pubspec.yaml` (`flutter_riverpod`, `riverpod_annotation`, `riverpod_generator`)\r\n\r\n---\r\n\r\n## ADR-02. лҜјк°җ лҚ°мқҙн„° м ҖмһҘмҶҢ: flutter_secure_storage (vs SharedPreferences)\r\n\r\n- **лҢҖмғҒ**: м„ұм Ғ (мӮ¬мҡ©мһҗ мӢқлі„ к°ҖлҠҘ + н•ҷкөҗ л§ҘлқҪм—җм„ң лҜјк°җ)\r\n- **м„ нғқ мқҙмң **: Android Keystore / iOS Keychain мң„мһ„мңјлЎң OS мҲҳмӨҖ м•”нҳёнҷ”. SharedPreferencesлҠ” нҸүл¬ё XML/plist\r\n- **л§Ҳмқҙк·ёл Ҳмқҙм…ҳ**: кё°мЎҙ нҸүл¬ё лҚ°мқҙн„° вҶ’ мІ« мӢӨн–ү мӢң 1нҡҢ мһҗлҸҷ мқҙм „(`migrateFromPlain`), кө¬ нӮӨ мӮӯм ң. нҡҢк·Җ л°©м§Җмҡ© unit test 8к°ң\r\n- **лІ„лҰ° мҳөм…ҳ**: м „мІҙ Firestore лҸҷкё°нҷ” вҖ” м„ұм ҒмқҖ *мҷ„м „ лЎңм»¬*мқҙ мӮ¬мҡ©мһҗ мӢ лў°м—җ лҚ” л¶Җн•©\r\n- **кҙҖл Ё нҢҢмқј**: `lib/data/secure_storage_service.dart`, `test/secure_storage_service_test.dart`\r\n\r\n---\r\n\r\n## ADR-03. кІҢмӢңнҢҗ кІҖмғү: нҒҙлқјмқҙм–ёнҠё n-gram мқёлҚұмӢұ (vs Algolia / Typesense / нҒҙлқјмқҙм–ёнҠё н•„н„°)\r\n\r\n- **м„ нғқ мқҙмң **: FirestoreлҠ” LIKE/full-text лҜём§Җмӣҗ. мҷёл¶Җ кІҖмғү мқён”„лқј м¶”к°Җ м—Ҷмқҙ кёҖ м ҖмһҘ мӢң м ңлӘ©+ліёл¬ёмқ„ 2-gramмңјлЎң л¶„н•ҙн•ҙ `searchTokens` л°°м—ҙм—җ м ҖмһҘ вҶ’ `array-contains-any` мҝјлҰ¬. н•ңкөӯм–ҙ лӢЁм–ҙ кө¬л¶„ лӘЁнҳём„ұм—җлҸ„ к°•н•Ё\r\n- **мғҒн•ң**: docлӢ№ 200 нҶ нҒ° / queryлӢ№ 10 нҶ нҒ° (Firestore array-contains-any н•ңкі„ = 30)\r\n- **лІ„лҰ° мҳөм…ҳ**:\r\n  - *Algolia/Typesense* вҖ” мӣ” л№„мҡ© + мқён”„лқј м¶”к°Җ, н•ҷкөҗ м•ұ к·ңлӘЁм—” кіјлҸ„\r\n  - *нҒҙлқјмқҙм–ёнҠё н•„н„°* вҖ” нҺҳмқҙм§Җл„Өмқҙм…ҳлҗң 20кұҙл§Ң кІҖмғүлҗЁ вҶ’ м „мІҙ кІҖмғү л¶Ҳк°ҖлҠҘ\r\n- **лӮЁмқҖ н•ңкі„**: нҶ нҒ° л§Өм№ӯмқҙлқј false positive к°ҖлҠҘ вҶ’ fetch нӣ„ нҒҙлқјмқҙм–ёнҠё substring 1м°Ё н•„н„°\r\n- **кҙҖл Ё нҢҢмқј**: `test/search_tokens_test.dart`, `test/search_history_service_test.dart`\r\n\r\n---\r\n\r\n## ADR-04. мўӢм•„мҡ” м№ҙмҡҙн„°: Map<uid,bool> + л№„м •к·ңнҷ” int (vs Map only / int only)\r\n\r\n- **м„ нғқ мқҙмң **: л‘җ н‘ңнҳ„мқ„ лҸҷмӢңм—җ ліҙмң . `likes: {uid: true}` лҠ” \"лӮҙк°Җ лҲҢл ҖлҠ”к°Җ\" O(1) мЎ°нҡҢмҡ©, `likeCount: int` лҠ” мқёкё°кёҖ м •л ¬мҡ© (orderBy к°ҖлҠҘ)\r\n- **лҸҷкё°нҷ”**: `_toggleLike`м—җм„ң `FieldValue.increment(Вұ1)` + Map dot-path м—…лҚ°мқҙнҠёлҘј лӢЁмқј нҠёлһңмһӯм…ҳмңјлЎң л¬¶мқҢ. legacy кёҖмқҖ `_ensureLikesMap`м—җм„ң Map sizeлЎң lazy backfill\r\n- **rules кІҖмҰқ**: `validCounterDelta('likeCount')`м—җ `resource.data.get(field, 0)` мӮ¬мҡ©н•ҳм—¬ кё°мЎҙ кёҖ нҳёнҷҳ + Вұ1 delta к°•м ң\r\n- **лІ„лҰ° мҳөм…ҳ**:\r\n  - *Map only* вҖ” м№ҙмҡҙнҠё м •л ¬ л¶Ҳк°Җ (Firestoreк°Җ array length кё°мӨҖ orderBy л¶Ҳк°Җ)\r\n  - *int only* вҖ” \"лӮҙк°Җ лҲҢл ҖлҠ”к°Җ\" нҷ•мқёмҡ© лі„лҸ„ м»¬л үм…ҳ н•„мҡ” вҶ’ мқҪкё° л№„мҡ© вҶ‘\r\n- **кҙҖл Ё нҢҢмқј**: `firestore.rules` (`validCounterDelta`), `firestore.indexes.json` (`likeCount DESC + createdAt DESC`)\r\n\r\n---\r\n\r\n## ADR-05. м°ЁнҠё: CustomPainter м§Ғм ‘ кө¬нҳ„ (vs fl_chart / syncfusion)\r\n\r\n- **м„ нғқ мқҙмң **: м„ұм Ғ м¶”мқҙ к·ёлһҳн”„лҠ” л“ұкёү мҠӨмјҖмқј л°ҳм „(лӮ®мқ„мҲҳлЎқ мўӢмқҢ), мҳҒм–ҙ/н•ңкөӯмӮ¬ м ҲлҢҖнҸүк°Җ л¶„кё°, л“ұкёүм»· м җм„ , кіјлӘ©лі„ мғүмғҒ л“ұ *л№„н‘ңмӨҖ мҡ”кө¬мӮ¬н•ӯ*мқҙ л§ҺмқҢ. лқјмқҙлёҢлҹ¬лҰ¬ wrapperм—җ л§һм¶”лҠ” кІғліҙлӢӨ CanvasлЎң м§Ғм ‘ к·ёлҰ¬лҠ” кІғмқҙ к°„лӢЁ\r\n- **мһҘм җ**: мқҳмЎҙм„ұ 0к°ң, APK мӮ¬мқҙмҰҲ мҳҒн–Ҙ 0\r\n- **нҠёл Ҳмқҙл“ңмҳӨн”„**: мғҲ м°ЁнҠё м¶”к°Җ мӢң мһ¬мӮ¬мҡ©м„ұ лӮ®мқҢ вҶ’ н–Ҙнӣ„ кіөл¶Җ нҶөкі„ л“ұм—җм„ң м°ЁнҠёк°Җ лҠҳм–ҙлӮҳл©ҙ fl_chart лҸ„мһ… мһ¬кІҖнҶ \r\n- **кҙҖл Ё нҢҢмқј**: `lib/screens/sub/grade_screen.dart` (CustomPainter кө¬нҳ„л¶Җ)\r\n\r\n---\r\n\r\n## ADR-06. м ҖмһҘмҶҢ л¶„лӢҙ: SQLite / Firestore / SecureStorage / Cloud Storage\r\n\r\n| м ҖмһҘмҶҢ | мҡ©лҸ„ | мқҙмң  |\r\n|---|---|---|\r\n| **sqflite** | к°ңмқё мқјм • (мӢңк°„/мғүмғҒ/м—°мҶҚ мқјмһҗ) | Row лӢЁмң„ мӢңк°„ лІ”мң„ мҝјлҰ¬ + мҳӨн”„лқјмқё мҡ°м„  |\r\n| **Firestore** | кёҖ/лҢ“кёҖ/мұ„нҢ…/мӢ кі /мӮ¬мҡ©мһҗ н”„лЎңн•„ | мӢӨмӢңк°„ sync + лӢӨмӨ‘ нҒҙлқјмқҙм–ёнҠё + Cloud Functions нҠёлҰ¬кұ° |\r\n| **SecureStorage** | м„ұм Ғ | OS м•”нҳёнҷ” + мҷ„м „ лЎңм»¬ |\r\n| **Cloud Storage** | кІҢмӢңкёҖВ·н”„лЎңн•„ мқҙлҜём§Җ | CDN + м§Ғм ‘ лӢӨмҡҙлЎңл“ң URL |\r\n\r\nк°Ғк°Ғ лӘ…нҷ•н•ң лӢЁмқј мҡ©лҸ„ вҶ’ мҪ”л“ңм—җм„ң \"мқҙ лҚ°мқҙн„°лҠ” м–ҙл””м—җ мһҲлҠ”к°Җ\" н—·к°ҲлҰ¬м§Җ м•ҠмқҢ. мғҒм„ё мҠӨнӮӨл§ҲлҠ” [data-model.md](./data-model.md) м°ёмЎ°.\r\n\r\n---\r\n\r\n## ADR-07. DI: GetIt + м¶”мғҒ Repository (vs Riverpod Providerл§Ң / get_it м§Ғм ‘л§Ң)\r\n\r\n- **м„ нғқ мқҙмң **: RiverpodмқҖ мң„м Ҝ нҠёлҰ¬ мқҳмЎҙ, л№„мң„м Ҝ мҪ”л“ң(Manager, Cloud Functions нҠёлҰ¬кұ° н•ёл“Өлҹ¬)м—җм„ң м“°кё° м–ҙмғү. GetItмқҖ service locatorлЎң м–ҙл””м„ңлӮҳ нҳём¶ң к°ҖлҠҘ\r\n- **нҳјмҡ© к·ңм№ҷ**: мң„м Ҝ вҶ’ Riverpod, Manager/Repository вҶ’ GetIt. н…ҢмҠӨнҠёлҠ” `setupServiceLocator()` / `resetServiceLocator()` лЎң Mock мЈјмһ…\r\n- **лІ„лҰ° мҳөм…ҳ**:\r\n  - *Riverpod Provider лӢЁлҸ…* вҖ” л№„мң„м Ҝ мҪ”л“ңм—җм„ң ref м „лӢ¬мқҙ лІҲкұ°лЎңмӣҖ\r\n  - *get_it лӢЁлҸ…* вҖ” мң„м Ҝ rebuildк°Җ мһҗлҸҷмңјлЎң м•Ҳ лҗЁ\r\n- **кҙҖл Ё нҢҢмқј**: `test/auth_repository_test.dart` (м җм§„м Ғ DI л§Ҳмқҙк·ёл Ҳмқҙм…ҳ лҚ°лӘЁ)\r\n\r\n---\r\n\r\n## ADR-08. н…ҢмҠӨнҠё м „лһө: Unit + Provider + Widget + Rules 4кі„мёө\r\n\r\n- **`test()` лӢЁмң„ (470)**: лӘЁлҚё/мң нӢё/нҢҢм„ң/Provider/Repository/Golden нҸ¬н•Ё. `ProviderContainer`лЎң мң„м Ҝ м—Ҷмқҙ AsyncNotifier кІҖмҰқ, Mock мЈјмһ…мңјлЎң мҷёл¶Җ мқҳмЎҙ 0\r\n- **`testWidgets()` мң„м Ҝ (89)**: `ProviderScope.overrides`лЎң Mock notifier мЈјмһ…, лЎңл”©/м—җлҹ¬/л№Ҳ л¶„кё° кІҖмҰқ\r\n- **Golden (`matchesGoldenFile`)**: PostCard мҠӨлғ…мғ· л№„көҗ (`fake_cloud_firestore` + tolerance comparator) вҖ” `test()` лӮҙл¶Җ нҸ¬н•Ё\r\n- **Integration (4)**: `integration_test/`м—җм„ң м•ұ л„Өл№„кІҢмқҙм…ҳ E2E\r\n- **Firestore Rules (85)**: `@firebase/rules-unit-testing` + м—җл®¬л Ҳмқҙн„°лЎң ліҙм•Ҳ к·ңм№ҷ мһҗмІҙлҘј кІҖмҰқ. 4лӢЁкі„ м—ӯн• (`user`/`moderator`/`auditor`/`manager`/`admin`) + PIPA м»¬л үм…ҳ(`appeals`/`data_requests`/`community_rules`) к¶Ңн•ң л§ӨнҠёлҰӯмҠӨ нҸ¬н•Ё\r\n- **лІ„лҰ° мҳөм…ҳ**: нҶөн•© н…ҢмҠӨнҠё м „мІҙ мқҳмЎҙ (Firebase Auth мӢӨлЎңк·ёмқё) вҖ” CI л№„мҡ© вҶ‘, н”Ңл ҲмқҙнҒ¬ вҶ‘\r\n- **н•©кі„**: 563 (Flutter) + 85 (Rules) = **648к°ң**. мғҒм„ё л¶„лҘҳлҠ” [testing.md](./testing.md) м°ёмЎ°.\r\n\r\n---\r\n\r\n## ADR-09. к¶Ңн•ң лӘЁлҚё: 4лӢЁкі„ м—ӯн•  + Firebase Auth custom claims (vs Firestore role н•„л“ң лӢЁмқј кІҖмӮ¬)\r\n\r\n- **л°°кІҪ**: мҙҲкё° лӘЁлҚёмқҖ `role: \"user\" | \"manager\"` 2лӢЁкі„. managerлҠ” мӢ кі  мІҳлҰ¬л¶Җн„° м •м§Җк№Ңм§Җ м „л¶Җ к°ҖлҠҘ вҶ’ н•ҷмғқ мҡҙмҳҒмһҗк°Җ \"м •м§Җ\" к°ҷмқҖ л¬ҙкұ°мҡҙ н–үлҸҷмқ„ л– м•ҲкІҢ лҗЁ. лҸҷмӢңм—җ Firestore ліҙм•Ҳ к·ңм№ҷмқҖ л§Ө мҡ”мІӯл§ҲлӢӨ `get(/databases/.../users/$uid).data.role`лЎң мӮ¬мҡ©мһҗ л¬ём„ңлҘј м¶”к°Җ мЎ°нҡҢ вҶ’ кІҢмӢңкёҖ 1кұҙ мқҪмқ„ л•Ңл§ҲлӢӨ мқҪкё° 1нҡҢ м¶”к°Җ\r\n- **м„ нғқ**: м—ӯн• мқ„ `user` / `moderator` / `auditor` / `manager` / `admin` 5лӢЁкі„лЎң л¶„лҰ¬ (мӢӨм§Ҳ 4лӢЁкі„ к¶Ңн•ң + мқјл°ҳ мӮ¬мҡ©мһҗ). к¶Ңн•ңмқҖ Firebase Auth **custom claims**лЎң ID нҶ нҒ°м—җ л°•м•„ `request.auth.token.role`лЎң кІҖмӮ¬ вҶ’ ліҙм•Ҳ к·ңм№ҷ `get()` 0нҡҢ\r\n- **к¶Ңн•ң л§ӨнҠёлҰӯмҠӨ**:\r\n  - `moderator` вҖ” мӢ кі  мІҳлҰ¬, кІҢмӢңкёҖ/лҢ“кёҖ мҲЁк№Җ. м •м§Җ л¶Ҳк°Җ\r\n  - `auditor` вҖ” лӘЁл“  мӢ кі /лЎңк·ё/нҶөкі„ мқҪкё° м „мҡ©. м“°кё° м—ҶмқҢ (көҗмӮ¬ к°җмӮ¬ к¶Ңн•ң мӢңлӮҳлҰ¬мҳӨ)\r\n  - `manager` вҖ” м •м§Җ, кіөм§Җ кі м •, мӮ¬мҡ©мһҗ мҠ№мқё\r\n  - `admin` вҖ” лӘЁл“  к¶Ңн•ң + лӢӨлҘё мӮ¬мҡ©мһҗ к¶Ңн•ң ліҖкІҪ\r\n- **л§Ҳмқҙк·ёл Ҳмқҙм…ҳ**: кё°мЎҙ 28лӘ… мӮ¬мҡ©мһҗм—җ лҢҖн•ҙ `users` м»¬л үм…ҳмқ„ мҲңнҡҢн•ҳл©° `setCustomUserClaims({role, approved})` 1нҡҢ л°ұн•„ (`scripts/backfill-claims.js` лЎңм»¬ admin SDK)\r\n- **нҠёл Ҳмқҙл“ңмҳӨн”„**: к¶Ңн•ң ліҖкІҪ м§Ғнӣ„ нҒҙлқјмқҙм–ёнҠёлҠ” `getIdTokenResult(true)` к°•м ң к°ұмӢ  н•„мҡ” / к¶Ңн•ң кІҖмӮ¬ лЎңм§Ғмқҙ нҶ нҒ° л°ңкёү мӢңм җкіј лҸҷкё°нҷ”лҸјм•ј н•Ё\r\n- **лІ„лҰ° мҳөм…ҳ**: Firestore role н•„л“ң лӢЁмқј кІҖмӮ¬ вҖ” л§Ө мҡ”мІӯ м¶”к°Җ мқҪкё°, к¶Ңн•ң кІҖмӮ¬к°Җ лҚ°мқҙн„° мқҪкё°м—җ л№„лЎҖ\r\n- **кҙҖл Ё нҢҢмқј**: `firestore.rules`, `functions/index.js` (`onUserUpdated`/`backfillCustomClaims`), `tests/firestore-rules/test/rules.test.js`\r\n\r\n---\r\n\r\n## ADR-10. PIPA м»ҙн”Ңлқјмқҙм–ёмҠӨ: TTL м»¬л үм…ҳ + мһҗлҸҷ лқјмқҙн”„мӮ¬мқҙнҒҙ (vs мҲҳлҸҷ мІӯмҶҢ / soft delete н”Ңлһҳк·ё)\r\n\r\n- **л°°кІҪ**: н•ңкөӯ к°ңмқём •ліҙ ліҙнҳёлІ•(PIPA)мқҖ (1) мІҳлҰ¬ кІ°кіј мқҙмқҳмӢ мІӯк¶Ң (2) лҚ°мқҙн„° лӢӨмҡҙлЎңл“ңк¶Ң (3) лӘ…мӢңлҗң м»Өл®ӨлӢҲнӢ° к·ңм№ҷ вҖ” м„ё к°Җм§ҖлҘј ліҙмһҘн•ҳлқјкі  мҡ”кө¬. \"мӮӯм ң лІ„нҠј\"мқҙ м•„лӢҲлқј **ліҙкҙҖ кё°н•ңмқҙ лҒқлӮң лҚ°мқҙн„°лҘј к°ңмһ… м—Ҷмқҙ мӮ¬лқјм§ҖкІҢ л§Ңл“ңлҠ” кІғ**мқҙ м§„м§ң н•өмӢ¬\r\n- **м„ нғқ**: мғҲ м»¬л үм…ҳ 3к°ң (`appeals`, `data_requests`, `community_rules`) м¶”к°Җ + кұ°мқҳ лӘЁл“  мғҲ м»¬л үм…ҳм—җ `expiresAt` н•„л“ң + Firestore TTL м •мұ…. л§ҢлЈҢ мӢңк°Ғмқҙ м§ҖлӮҳл©ҙ Firestoreк°Җ м•Ңм•„м„ң л¬ём„ң мӮӯм ң\r\n- **TTL м •мұ…**:\r\n  - `appeals.expiresAt` вҖ” 90мқј\r\n  - `data_requests.expiresAt` вҖ” 30мқј\r\n  - `admin_logs.expiresAt` вҖ” 1л…„ (к°җмӮ¬ лЎңк·ё)\r\n- **лҚ°мқҙн„° мқөмҠӨнҸ¬нҠё**: `createDataExport` Cloud Functionмқҙ мӮ¬мҡ©мһҗ кІҢмӢңкёҖ/лҢ“кёҖ/мӢ кі /мұ„нҢ…мқ„ JSONмңјлЎң л¬¶м–ҙ Storage м—…лЎңл“ң, лӢӨмҡҙлЎңл“ң л§ҒнҒ¬ мқҙл©”мқј л°ңмҶЎ, л§ҢлЈҢ нӣ„ `purgeExpiredExports` мқјмқј мІӯмҶҢ\r\n- **нҠёл Ҳмқҙл“ңмҳӨн”„**: TTLмқҖ 1нҡҢ/мқј м •лҸ„лЎң л№„кІ°м •м Ғ мӢңм җм—җ мӮӯм ң вҶ’ м •нҷ•н•ң л§ҢлЈҢ мӢңк°Ғ ліҙмһҘ м•Ҳ лҗЁ (PIPA мҡ”кұҙ м¶©мЎұм—” м¶©л¶„)\r\n- **лІ„лҰ° мҳөм…ҳ**:\r\n  - *мҲҳлҸҷ мІӯмҶҢ* вҖ” мӮ¬лһҢмқҙ л§ӨмЈј мІӯмҶҢн•ҳлҠ” мӢңмҠӨн…ңмқҖ кІ°көӯ м•Ҳ мІӯмҶҢлҗЁ\r\n  - *soft delete н”Ңлһҳк·ё* вҖ” лҚ°мқҙн„°к°Җ мӮ¬лқјм§Җм§Җ м•ҠмңјлӢҲ PIPAмқҳ \"ліҙкҙҖ мқҳл¬ҙ мў…лЈҢ нӣ„ нҢҢкё°\" мҡ”кұҙ лҜём¶©мЎұ\r\n- **кҙҖл Ё нҢҢмқј**: `firestore.rules`, `firestore.indexes.json`, `functions/index.js` (`createDataExport`/`purgeExpiredExports`), `lib/screens/appeal/`, `lib/screens/data_request/`, `lib/screens/community_rules/`\r\n\r\n---\r\n\r\n## ADR-11. лҢҖмӢңліҙл“ң м№ҙмҡҙн„°: `app_stats/totals` л№„м •к·ңнҷ” (vs нҒҙлқјмқҙм–ёнҠё collection.count())\r\n\r\n- **л°°кІҪ**: кҙҖлҰ¬мһҗ лҢҖмӢңліҙл“ңлҠ” `posts`, `users`, `reports` м»¬л үм…ҳмқҳ мҙқ к°ңмҲҳмҷҖ мқјлі„ м¶”м„ёлҘј ліҙм—¬мӨҳм•ј н•Ё. нҒҙлқјмқҙм–ёнҠёк°Җ л§ӨлІҲ м»¬л үм…ҳ м „мІҙлҘј fetchн•ҳл©ҙ 1k мӮ¬мҡ©мһҗ кё°мӨҖ л§Ө нҺҳмқҙм§Җ м§„мһ…л§ҲлӢӨ мҲҳмІң нҡҢ мқҪкё°\r\n- **м„ нғқ**: Cloud Functions нҠёлҰ¬кұ°(`onPostCreated`/`onUserCreated`/`onReportCreated`)м—җм„ң `app_stats/totals` лӢЁмқј л¬ём„ңм—җ `FieldValue.increment(1)`. мқјлі„ м¶”м„ёлҠ” `app_stats/daily_<YYYY-MM-DD>` л¬ём„ңм—җ лҸҷмқјн•ҳкІҢ лҲ„м Ғ. лҢҖмӢңліҙл“ңлҠ” м№ҙмҡҙн„° л¬ём„ң 1к°ңл§Ң мқҪмқҢ\r\n- **нҠёл Ҳмқҙл“ңмҳӨн”„**: нҠёлҰ¬кұ°к°Җ лҲ„лқҪлҗҳл©ҙ м№ҙмҡҙн„°к°Җ м–ҙкёӢлӮЁ вҶ’ `backfillStats` HTTP н•ЁмҲҳлЎң 1нҡҢ мһ¬кі„мӮ° к°ҖлҠҘ\r\n- **лІ„лҰ° мҳөм…ҳ**: `collection.count()` aggregation вҖ” л§Ө нҳём¶ңл§ҲлӢӨ м»¬л үм…ҳ мҠӨмә”, л№„мҡ© м Ҳк°җ нҡЁкіј кұ°мқҳ м—ҶмқҢ\r\n- **кҙҖл Ё нҢҢмқј**: `functions/index.js` (`incrementStat`/`backfillStats`), `admin-web/app/page.tsx`\r\n","guides/architecture-decisions_en.md":"# Architecture Decision Records (ADRs)\r\n\r\n> н•ңкөӯм–ҙ: [architecture-decisions.md](./architecture-decisions.md)\r\n\r\nEach entry captures *why this option rather than the alternatives*.\r\n\r\n---\r\n\r\n## ADR-01. State Management: Riverpod 2.5 (vs Provider / BLoC / GetX)\r\n\r\n- **Chosen because**: compile-time safety (`ref.watch`), composition via `family`/`autoDispose`, AsyncNotifier shrinks loading/error branch boilerplate\r\n- **Rejected**:\r\n  - *Provider* вҖ” `Consumer` boilerplate compounds with depth, no AsyncValue\r\n  - *BLoC* вҖ” stream-based ceremony (Event/State classes) even for simple CRUD, steep curve\r\n  - *GetX* вҖ” bundles DI/navigation/i18n, lock-in risk\r\n- **Trade-off**: `riverpod_generator` codegen dependency; we keep `ref` out of non-widget code by enforcing a separate Manager layer\r\n- **Related files**: `lib/providers/*.dart`, `pubspec.yaml` (`flutter_riverpod`, `riverpod_annotation`, `riverpod_generator`)\r\n\r\n---\r\n\r\n## ADR-02. Sensitive Data Storage: flutter_secure_storage (vs SharedPreferences)\r\n\r\n- **Target**: grades (identifiable + sensitive in school context)\r\n- **Chosen because**: delegates to Android Keystore / iOS Keychain for OS-level encryption. SharedPreferences stores plain XML/plist\r\n- **Migration**: 1-time `migrateFromPlain` on first launch, old keys cleared; 8 regression tests guard\r\n- **Rejected**: Firestore sync вҖ” grades are more trustworthy as *fully local*\r\n- **Related files**: `lib/data/secure_storage_service.dart`, `test/secure_storage_service_test.dart`\r\n\r\n---\r\n\r\n## ADR-03. Board Search: Client-side n-gram Indexing (vs Algolia / Typesense / Client Filter)\r\n\r\n- **Chosen because**: Firestore has no LIKE / full-text. On write we 2-gram the title+body into `searchTokens` вҶ’ query via `array-contains-any`. No external search infra. Robust against Korean word-boundary ambiguity\r\n- **Caps**: 200 tokens/doc, 10 tokens/query (Firestore `array-contains-any` limit = 30)\r\n- **Rejected**:\r\n  - *Algolia/Typesense* вҖ” monthly cost + extra infra, overkill at school-app scale\r\n  - *Client filter* вҖ” only the paginated 20 items are searched, full-corpus impossible\r\n- **Known limit**: token matching can produce false positives вҶ’ post-fetch substring filter on the client\r\n- **Related files**: `test/search_tokens_test.dart`, `test/search_history_service_test.dart`\r\n\r\n---\r\n\r\n## ADR-04. Like Counter: `Map<uid,bool>` + Denormalized int (vs Map-only / int-only)\r\n\r\n- **Chosen because**: keep both representations. `likes: {uid: true}` вҶ’ O(1) \"did I like?\" lookup. `likeCount: int` вҶ’ sortable for Popular tab (`orderBy`)\r\n- **Sync**: `_toggleLike` wraps `FieldValue.increment(Вұ1)` + map dot-path write in a single transaction. Legacy docs lazy-backfill via `_ensureLikesMap` reading Map size\r\n- **Rules**: `validCounterDelta('likeCount')` uses `resource.data.get(field, 0)` for backward compat and enforces Вұ1 delta\r\n- **Rejected**:\r\n  - *Map only* вҖ” Firestore can't `orderBy` array length\r\n  - *int only* вҖ” \"did I like?\" needs a separate collection вҶ’ read cost вҶ‘\r\n- **Related files**: `firestore.rules` (`validCounterDelta`), `firestore.indexes.json` (`likeCount DESC + createdAt DESC`)\r\n\r\n---\r\n\r\n## ADR-05. Charts: CustomPainter Directly (vs fl_chart / syncfusion)\r\n\r\n- **Chosen because**: grade charts have *non-standard* requirements вҖ” inverted grade axis (lower = better), English/KoreanHistory absolute-grade branch, grade-cut dashed lines, per-subject colors. Painting on Canvas is simpler than shoehorning into a library wrapper\r\n- **Pros**: zero deps, zero APK size impact\r\n- **Trade-off**: poor reuse. Revisit fl_chart if we add more chart types (study stats, etc.)\r\n- **Related files**: `lib/screens/sub/grade_screen.dart` (CustomPainter block)\r\n\r\n---\r\n\r\n## ADR-06. Storage Allocation: SQLite / Firestore / SecureStorage / Cloud Storage\r\n\r\n| Store | Purpose | Rationale |\r\n|---|---|---|\r\n| **sqflite** | Personal schedules (time/color/span) | row-level range queries + offline-first |\r\n| **Firestore** | Posts / comments / chats / reports / user profiles | realtime sync + multi-client + Cloud Functions triggers |\r\n| **SecureStorage** | Grades | OS-level encryption + fully local |\r\n| **Cloud Storage** | Post / profile images | CDN + direct download URLs |\r\n\r\nOne clear purpose per store вҶ’ \"where does this data live?\" is never ambiguous. Schema details in [data-model_en.md](./data-model_en.md).\r\n\r\n---\r\n\r\n## ADR-07. DI: GetIt + Abstract Repository (vs Riverpod-only / get_it-only)\r\n\r\n- **Chosen because**: Riverpod is widget-tree-bound, awkward in non-widget code (Managers, Cloud Function trigger handlers). GetIt is a service locator usable anywhere\r\n- **Mixing rule**: widgets вҶ’ Riverpod; Managers/Repositories вҶ’ GetIt. Tests use `setupServiceLocator()` / `resetServiceLocator()` for mock injection\r\n- **Rejected**:\r\n  - *Riverpod alone* вҖ” passing `ref` around non-widget code is awkward\r\n  - *GetIt alone* вҖ” no automatic widget rebuilds\r\n- **Related files**: `test/auth_repository_test.dart` (gradual DI migration demo)\r\n\r\n---\r\n\r\n## ADR-08. Test Strategy: Unit + Provider + Widget + Rules (4 layers)\r\n\r\n- **`test()` unit (470)**: models / utils / parsers / Provider / Repository / Golden. `ProviderContainer` verifies AsyncNotifier without a widget tree; mock injection keeps external deps at zero\r\n- **`testWidgets()` widget (89)**: `ProviderScope.overrides` injects mock notifiers; loading / error / empty branches\r\n- **Golden (`matchesGoldenFile`)**: PostCard snapshot PNG comparison (`fake_cloud_firestore` + tolerance comparator) вҖ” counted inside `test()`\r\n- **Integration (4)**: `integration_test/` for app-level navigation E2E\r\n- **Firestore Rules (85)**: `@firebase/rules-unit-testing` + emulator вҖ” validates rules themselves (regression-proof even without code changes); covers the 4-tier role matrix (`user`/`moderator`/`auditor`/`manager`/`admin`) and PIPA collections (`appeals`/`data_requests`/`community_rules`)\r\n- **Rejected**: full integration with real Firebase Auth вҖ” CI cost вҶ‘, flake вҶ‘\r\n- **Totals**: 563 (Flutter) + 85 (Rules) = **648**. Full breakdown in [testing_en.md](./testing_en.md)\r\n\r\n---\r\n\r\n## ADR-09. Role Model: 4 tiers + Firebase Auth Custom Claims (vs Single Firestore `role` Field Check)\r\n\r\n- **Background**: The original model had `role: \"user\" | \"manager\"`. Manager could do everything from triaging reports to suspending users вҖ” meaning a student moderator inevitably ended up pressing the suspend button. Separately, Firestore rules called `get(/databases/.../users/$uid).data.role` on every request вҖ” every post read incurred one extra read for permission checking.\r\n- **Decision**: Split roles into `user` / `moderator` / `auditor` / `manager` / `admin` (effectively 4 privilege tiers + regular user). Move the role into Firebase Auth **custom claims** so it ships in the ID token. Rules check `request.auth.token.role` directly вҶ’ zero `get()` calls.\r\n- **Permission matrix**:\r\n  - `moderator` вҖ” handle reports, hide posts/comments. Cannot suspend.\r\n  - `auditor` вҖ” read-only access to all reports / logs / stats. No writes (teacher audit-access scenario).\r\n  - `manager` вҖ” suspend, pin notices, approve users.\r\n  - `admin` вҖ” everything + change other users' roles.\r\n- **Migration**: One-time backfill iterating all 28 existing users in the `users` collection, calling `setCustomUserClaims({role, approved})` (`scripts/backfill-claims.js`, local admin SDK).\r\n- **Tradeoff**: Right after a role change, the client must call `getIdTokenResult(true)` to refresh the token / permission logic must stay in sync with token issuance.\r\n- **Rejected**: Firestore role-field lookup вҖ” extra read per request; permission checks scale with data reads.\r\n- **Files**: `firestore.rules`, `functions/index.js` (`onUserUpdated` / `backfillCustomClaims`), `tests/firestore-rules/test/rules.test.js`\r\n\r\n---\r\n\r\n## ADR-10. PIPA Compliance: TTL Collections + Automated Lifecycle (vs Manual Cleanup / Soft-Delete Flag)\r\n\r\n- **Background**: Korea's Personal Information Protection Act (PIPA) requires three guarantees: (1) the right to appeal moderation decisions, (2) the right to download one's data, (3) explicit community rules. The hard part isn't the \"Delete\" button вҖ” it's making **expired data disappear without intervention**.\r\n- **Decision**: Add 3 new collections (`appeals`, `data_requests`, `community_rules`). Add an `expiresAt` field to almost every new collection and bind a Firestore TTL policy to it. Once the timestamp passes, Firestore deletes the document on its own.\r\n- **TTL policies**:\r\n  - `appeals.expiresAt` вҖ” 90 days\r\n  - `data_requests.expiresAt` вҖ” 30 days\r\n  - `admin_logs.expiresAt` вҖ” 1 year (audit logs)\r\n- **Data export**: `createDataExport` Cloud Function bundles the user's posts/comments/reports/chats into JSON, uploads to Storage, emails the download link, then `purgeExpiredExports` runs a daily cleanup.\r\n- **Tradeoff**: TTL deletion runs ~once a day at non-deterministic times, so the exact expiry moment isn't guaranteed (sufficient for PIPA).\r\n- **Rejected**:\r\n  - *Manual cleanup* вҖ” a system that requires weekly hand-cleanup eventually doesn't get cleaned.\r\n  - *Soft-delete flag* вҖ” data never actually disappears, failing PIPA's \"destroy after retention\" requirement.\r\n- **Files**: `firestore.rules`, `firestore.indexes.json`, `functions/index.js` (`createDataExport` / `purgeExpiredExports`), `lib/screens/appeal/`, `lib/screens/data_request/`, `lib/screens/community_rules/`\r\n\r\n---\r\n\r\n## ADR-11. Dashboard Counters: Denormalized `app_stats/totals` (vs Client-Side `collection.count()`)\r\n\r\n- **Background**: The admin dashboard shows totals and daily trends for `posts`, `users`, `reports`. Fetching the whole collection client-side meant thousands of reads on every page load (1k users baseline).\r\n- **Decision**: Cloud Functions triggers (`onPostCreated` / `onUserCreated` / `onReportCreated`) call `FieldValue.increment(1)` on a single `app_stats/totals` document. Daily trends accumulate into `app_stats/daily_<YYYY-MM-DD>`. The dashboard reads one counter doc.\r\n- **Tradeoff**: A missed trigger desyncs the counter вҖ” the `backfillStats` HTTP function recomputes from scratch.\r\n- **Rejected**: `collection.count()` aggregation вҖ” still scans the collection per call; little cost reduction.\r\n- **Files**: `functions/index.js` (`incrementStat` / `backfillStats`), `admin-web/app/page.tsx`\r\n","guides/architecture-overview.md":"# м•„нӮӨн…ҚмІҳ к°ңмҡ”\r\n\r\n> English: [architecture-overview_en.md](./architecture-overview_en.md)\r\n\r\nн•ңмҶ”кі  м•ұмқҖ **Flutter лӘЁл°”мқј + Next.js кҙҖлҰ¬мһҗ лҢҖмӢңліҙл“ң** л“Җм–ј нҒҙлқјмқҙм–ёнҠёк°Җ **Firebase** кіөнҶө л°ұм—”л“ңлҘј кіөмң н•ҳлҠ” кө¬мЎ°лӢӨ. мқҙ л¬ём„ңлҠ” мӢңмҠӨн…ң м „мІҙ к·ёлҰј, Riverpod мғҒнғң к·ёлһҳн”„, лҚ°мқҙн„° нқҗлҰ„ кі„мёө лӘЁлҚёмқ„ н•ң кіім—җм„ң м„ӨлӘ…н•ңлӢӨ.\r\n\r\n## мӢңмҠӨн…ң лӢӨмқҙм–ҙк·ёлһЁ\r\n\r\n```mermaid\r\ngraph TD\r\n    subgraph Client\r\n        A[Flutter App<br/>Android / iOS]\r\n        B[Next.js Admin<br/>TypeScript + Tailwind]\r\n    end\r\n\r\n    subgraph Firebase\r\n        C[Auth<br/>Google / Apple / Kakao / GitHub]\r\n        D[Firestore<br/>мӢӨмӢңк°„ DB]\r\n        E[Storage<br/>мқҙлҜём§Җ / н”„лЎңн•„]\r\n        F[FCM<br/>н‘ёмӢң м•ҢлҰј]\r\n        G[Crashlytics<br/>нҒ¬лһҳмӢң лӘЁлӢҲн„°л§Ғ]\r\n    end\r\n\r\n    subgraph Server\r\n        H[Cloud Functions<br/>Node.js]\r\n        I[Scheduler<br/>м •м§Җ н•ҙм ң мІҙнҒ¬]\r\n    end\r\n\r\n    J[NEIS API<br/>кёүмӢқ / мӢңк°„н‘ң / н•ҷмӮ¬мқјм •]\r\n\r\n    A <-->|Riverpod мғҒнғң кҙҖлҰ¬| D\r\n    A <--> C\r\n    A <--> E\r\n    A --> G\r\n    A <-->|мӢӨмӢңк°„ мҠӨнҠёлҰј| F\r\n    A <-->|REST API| J\r\n\r\n    B <-->|лҸҷмқј Firestore кіөмң | D\r\n\r\n    H -->|лҢ“кёҖ / мұ„нҢ… / кі„м • мқҙлІӨнҠё| F\r\n    H <-->|Firestore нҠёлҰ¬кұ°| D\r\n    H <-->|Kakao OAuth| C\r\n    I -->|л§ӨмӢңк°„ м •м§Җ л§ҢлЈҢ мІҙнҒ¬| D\r\n```\r\n\r\n### м»ҙнҸ¬л„ҢнҠёлі„ м—ӯн• \r\n\r\n| м»ҙнҸ¬л„ҢнҠё | мң„м№ҳ | м—ӯн•  |\r\n|---|---|---|\r\n| **Flutter App** | `/lib` | л©”мқё мӮ¬мҡ©мһҗ мқён„°нҺҳмқҙмҠӨ. Android/iOS лҸҷмқј л°”мқҙл„ҲлҰ¬ |\r\n| **Next.js Admin** | `/admin-web` | мӣ№ кё°л°ҳ кҙҖлҰ¬мһҗ лҢҖмӢңліҙл“ң. FirestoreлҘј м•ұкіј кіөмң  |\r\n| **Admin Static** | `/admin-static` | к°„лӢЁн•ң м •м Ғ кҙҖлҰ¬мһҗ нҺҳмқҙм§Җ (нҳ„мһ¬ л Ҳкұ°мӢң) |\r\n| **Cloud Functions** | `/functions/index.js` | Kakao OAuth м»ӨмҠӨн…Җ нҶ нҒ°, н‘ёмӢң м•ҢлҰј нҠёлҰ¬кұ°, мҠӨмјҖмӨ„лҹ¬ |\r\n| **Android Widget** | `/android/.../widget` | нҷҲ нҷ”л©ҙ мң„м Ҝ (кёүмӢқ/мӢңк°„н‘ң/нҶөн•©) |\r\n| **iOS Widget** | `/ios/Widget*` | WidgetKit кё°л°ҳ нҷҲ мң„м Ҝ |\r\n\r\n## л Ҳмқҙм–ҙ кө¬мЎ° (Flutter)\r\n\r\n```\r\nlib/\r\nв”ңв”Җв”Җ main.dart                # м•ұ м§„мһ…м җ\r\nв”ңв”Җв”Җ api/                     # NEIS л“ұ мҷёл¶Җ REST API лһҳнҚј\r\nв”ңв”Җв”Җ data/                    # м •м Ғ мғҒмҲҳ / кіөмҡ© лҚ°мқҙн„° (мҡ”мқј, л“ұкёүм»· л“ұ)\r\nв”ңв”Җв”Җ network/                 # Firestore / Storage м ‘к·ј л Ҳмқҙм–ҙ\r\nв”ңв”Җв”Җ notification/            # FCM нҶ нҒ° кҙҖлҰ¬, мқём•ұ м•ҢлҰј, лЎңм»¬ м•ҢлҰј\r\nв”ңв”Җв”Җ providers/               # Riverpod м „м—ӯ Provider (auth, grade, settings, theme)\r\nв”ңв”Җв”Җ screens/                 # нҷ”л©ҙ (auth, board, chat, main, sub)\r\nв”ңв”Җв”Җ styles/                  # н…Ңл§Ҳ, м»¬лҹ¬, н…ҚмҠӨнҠё мҠӨнғҖмқј\r\nв””в”Җв”Җ widgets/                 # мһ¬мӮ¬мҡ© Stateless мң„м Ҝ\r\n```\r\n\r\n### Dependency л°©н–Ҙ\r\n- **screens вҶ’ providers вҶ’ network/api** (лӢЁл°©н–Ҙ)\r\n- **screensлҠ” networkлҘј м§Ғм ‘ нҳём¶ңн•ҳм§Җ м•ҠмқҢ** (Provider кІҪмң )\r\n- **widgetsлҠ” лҚ°мқҙн„° мқҳмЎҙ м—Ҷмқҙ мҲңмҲҳ UI** (Stateless)\r\n\r\n## Riverpod Provider мқҳмЎҙм„ұ к·ёлһҳн”„\r\n\r\n`riverpod_graph` CLIлЎң м •м Ғ л¶„м„қ нӣ„ мһҗлҸҷ мғқм„ұ. м•„лһҳлҠ” mermaid мҡ”м•Ҫліёмқҙкі , **рҹ”— [мқён„°лһҷнӢ°лёҢ н’ҖлІ„м „ (GitHub Pages)](https://monkshark.github.io/hansol_hs_flutter_app/riverpod_graph.html)** м—җм„ң D3.js кё°л°ҳ zoom/drag к·ёлһҳн”„лЎң лӘЁл“  л…ёл“ң нғҗмғү к°ҖлҠҘ. мӣҗліё HTMLмқҖ `docs/riverpod_graph.html`м—җ ліҙкҙҖ.\r\n\r\n```mermaid\r\ngraph LR\r\n    authState[authStateProvider]\r\n    userProfile[userProfileProvider<br/>UserProfileNotifier]\r\n    isLoggedIn[isLoggedInProvider]\r\n    isManager[isManagerProvider]\r\n    isAdmin[isAdminProvider]\r\n    isSuspended[isSuspendedProvider]\r\n    theme[themeProvider]\r\n    exams[examsProvider]\r\n    examsByType[examsByTypeProvider]\r\n    goals[goalsProvider]\r\n    jeongsiGoals[jeongsiGoalsProvider]\r\n\r\n    userProfile -->|watch| authState\r\n    isLoggedIn -->|watch| authState\r\n    isManager -->|watch| userProfile\r\n    isAdmin -->|watch| userProfile\r\n    isSuspended -->|watch| userProfile\r\n    examsByType -->|watch| exams\r\n\r\n    HansolApp[HansolHighSchool] -.watch.-> theme\r\n    GradeScreen[GradeScreen] -.watch.-> exams\r\n    GradeScreen -.watch.-> goals\r\n    GradeScreen -.watch.-> jeongsiGoals\r\n\r\n    classDef provider fill:#007acc,color:#fff,stroke:#005a9e\r\n    classDef consumer fill:#00b894,color:#fff,stroke:#008264\r\n    class authState,userProfile,isLoggedIn,isManager,isAdmin,isSuspended,theme,exams,examsByType,goals,jeongsiGoals provider\r\n    class HansolApp,GradeScreen consumer\r\n```\r\n\r\n### нҢҢмғқ кҙҖкі„ м„ӨлӘ…\r\n- `authStateProvider`лҘј rootлЎң н•ҳлҠ” **мқёмҰқ мғҒнғң нҠёлҰ¬**: н”„лЎңн•„ вҶ’ к¶Ңн•ң(moderator/auditor/manager/admin/suspended) нҢҢмғқ вҖ” к¶Ңн•ңмқҖ Firebase Auth custom claimsм—җм„ң м§Ғм ‘ мқҪмқҢ\r\n- `examsProvider` кё°л°ҳмңјлЎң `examsByTypeProvider` (мҲҳмӢң/м •мӢң л¶„лҘҳ) нҢҢмғқ\r\n- нҷ”л©ҙ(`Consumer`)мқҖ н•„мҡ”н•ң leaf providerл§Ң `watch` вҶ’ л¶Ҳн•„мҡ”н•ң rebuild л°©м§Җ\r\n- `autoDispose` м Ғк·№ мӮ¬мҡ©мңјлЎң нҷ”л©ҙ мқҙнғҲ мӢң мһҗлҸҷ н•ҙм ң\r\n\r\n### Provider л¶„лҘҳ\r\n- **лҸҷкё° Notifier** (`theme`, `isLoggedIn`): лӢЁмҲң мғҒнғң м „нҷҳ\r\n- **AsyncNotifier** (`userProfile`, `exams`, `goals`): Firestore/SecureStorage л№„лҸҷкё° лЎңл”©\r\n- **нҢҢмғқ Provider** (`isManager`, `examsByType`): лӢӨлҘё ProviderлҘј watchн•ҳм—¬ ліҖнҷҳл§Ң мҲҳн–ү\r\n\r\n## лҚ°мқҙн„° нқҗлҰ„ (кі„мёө лӘЁлҚё)\r\n\r\n```mermaid\r\ngraph LR\r\n    User([мӮ¬мҡ©мһҗ]) --> Widget[Widget / Consumer]\r\n    Widget -->|read/watch| Provider[Riverpod Provider<br/>AsyncNotifier]\r\n    Provider -->|нҳём¶ң| Manager[Manager / Repository]\r\n\r\n    Manager -->|лҜјк°җ лҚ°мқҙн„°<br/>м„ұм Ғ| Secure[(SecureStorage<br/>Keystore/Keychain)]\r\n    Manager -->|мқјм •В·мәҗмӢң| SQLite[(sqflite)]\r\n    Manager -->|кёҖВ·мұ„нҢ…В·мӢ кі | Firestore[(Firestore)]\r\n    Manager -->|мқҙлҜём§Җ| Storage[(Cloud Storage)]\r\n\r\n    Firestore -.нҠёлҰ¬кұ°.-> Functions[Cloud Functions]\r\n    Functions -->|н‘ёмӢң| FCM[FCM]\r\n    FCM -.->|background| User\r\n\r\n    classDef ui fill:#00b894,color:#fff,stroke:#008264\r\n    classDef state fill:#007acc,color:#fff,stroke:#005a9e\r\n    classDef store fill:#6c5ce7,color:#fff,stroke:#4834d4\r\n    classDef server fill:#fdcb6e,color:#000,stroke:#e1b14a\r\n    class Widget,Provider ui\r\n    class Manager state\r\n    class Secure,SQLite,Firestore,Storage store\r\n    class Functions,FCM server\r\n```\r\n\r\n### мӣҗм№ҷ\r\n- **Widget вҶ’ Provider**л§Ң м§Ғм ‘ мқҳмЎҙ, Manager/м ҖмһҘмҶҢлҠ” Provider м•ҲмӘҪм—җ мәЎмҠҗнҷ”\r\n- м ҖмһҘмҶҢлҠ” **лҚ°мқҙн„° лҜјк°җлҸ„/м ‘к·ј нҢЁн„ҙ**м—җ л”°лқј 4к°Җм§ҖлЎң л¶„лӢҙ (вҶ’ [architecture-decisions.md#adr-06](./architecture-decisions.md))\r\n- м“°кё° вҶ’ Firestore нҠёлҰ¬кұ° вҶ’ Cloud Functions вҶ’ FCM мңјлЎң **л№„лҸҷкё° н‘ёмӢң нқҗлҰ„**\r\n- мң„м ҜмқҖ `ProviderScope.overrides`лЎң н…ҢмҠӨнҠём—җм„ң Mock Notifier мЈјмһ… к°ҖлҠҘ\r\n\r\n## м ҖмһҘмҶҢлі„ мұ…мһ„ л¶„лӢҙ\r\n\r\n| м ҖмһҘмҶҢ | мҡ©лҸ„ | м„ нғқ мқҙмң  |\r\n|---|---|---|\r\n| **sqflite** | к°ңмқё мқјм • (мӢңк°„/мғүмғҒ/м—°мҶҚ мқјмһҗ) | Row лӢЁмң„ мӢңк°„ лІ”мң„ мҝјлҰ¬ + мҳӨн”„лқјмқё мҡ°м„  |\r\n| **Firestore** | кёҖ/лҢ“кёҖ/мұ„нҢ…/мӢ кі /мӮ¬мҡ©мһҗ н”„лЎңн•„ | мӢӨмӢңк°„ sync + лӢӨмӨ‘ нҒҙлқјмқҙм–ёнҠё + Cloud Functions нҠёлҰ¬кұ° |\r\n| **SecureStorage** | м„ұм Ғ | OS м•”нҳёнҷ” + мҷ„м „ лЎңм»¬ (м„ңлІ„ м „мҶЎ м—ҶмқҢ) |\r\n| **Cloud Storage** | кІҢмӢңкёҖВ·н”„лЎңн•„ мқҙлҜём§Җ | CDN + м§Ғм ‘ лӢӨмҡҙлЎңл“ң URL |\r\n| **SharedPreferences** | м„Өм • / мәҗмӢң / кІҖмғү нһҲмҠӨнҶ лҰ¬ | лӢЁмҲң key-value, л№ лҘё мқҪкё° |\r\n\r\nк°Ғк°Ғ лӘ…нҷ•н•ң лӢЁмқј мҡ©лҸ„ вҶ’ мҪ”л“ңм—җм„ң \"мқҙ лҚ°мқҙн„°лҠ” м–ҙл””м—җ мһҲлҠ”к°Җ\" н—·к°ҲлҰ¬м§Җ м•ҠмқҢ.\r\n\r\n## л“Җм–ј нҒҙлқјмқҙм–ёнҠё: Flutter вҶ” Admin Web\r\n\r\n| н•ӯлӘ© | Flutter (`/lib`) | Admin Web (`/admin-web`) |\r\n|---|---|---|\r\n| **м–ём–ҙ** | Dart | TypeScript |\r\n| **UI н”„л Ҳмһ„мӣҢнҒ¬** | Flutter Material | Next.js 14 + Tailwind CSS |\r\n| **мғҒнғң кҙҖлҰ¬** | Riverpod 2.5 | React hooks + SWR |\r\n| **мқёмҰқ** | Firebase Auth SDK (лӘЁл°”мқј) | Firebase Auth (мӣ№) + м—ӯн•  кІҖмҰқ |\r\n| **мЈјмҡ” лҢҖмғҒ** | н•ҷмғқ/көҗмӮ¬/н•ҷл¶ҖлӘЁ/мЎём—…мғқ | moderator/auditor/manager/admin м—ӯн• л§Ң (4лӢЁкі„) |\r\n| **кіөмң ** | Firestore м»¬л үм…ҳ лҸҷмқј мӮ¬мҡ© (`users`, `posts`, ...) | лҸҷмқј |\r\n\r\n**м“°кё° к·ңм№ҷ м¶©лҸҢ л°©м§Җ**: admin-webмқҳ UPDATE к¶Ңн•ңмқҖ `firestore.rules`мқҳ `isManager()`/`isAdmin()`/`isAuditor()` н—¬нҚјлЎң нҶөмқј кІҖмҰқ. лӘЁл“  м—ӯн•  кІҖмӮ¬лҠ” `request.auth.token.role` (Firebase Auth custom claims) кё°л°ҳмқҙлқј Firestore м¶”к°Җ мқҪкё° 0нҡҢ. нҒҙлқјмқҙм–ёнҠё л¶„лҰ¬мҷҖ л¬ҙкҙҖн•ҳкІҢ к·ңм№ҷмқҙ лӢЁмқј м§„мӢӨ мҶҢмҠӨ(Single Source of Truth).\r\n\r\n## Cloud Functions нҠёлҰ¬кұ° л§ө\r\n\r\n| Function | нҠёлҰ¬кұ° | м—ӯн•  |\r\n|---|---|---|\r\n| `kakaoCustomAuth` | HTTPS onRequest | Kakao access token вҶ’ Firebase custom token көҗнҷҳ |\r\n| `sendSchoolEmailOTP` / `verifySchoolEmailOTP` | onCall | н•ҷкөҗ мқҙл©”мқј OTP л°ңмҶЎ/кІҖмҰқ (көҗмӮ¬ мқёмҰқ) |\r\n| `redeemTeacherInvite` | onCall | көҗмӮ¬ мҙҲлҢҖ мҪ”л“ң мӮ¬мҡ© (`teacher` userType + мһҗлҸҷ мҠ№мқё) |\r\n| `postOgRenderer` | HTTPS onRequest | л”Ҙл§ҒнҒ¬мҡ© OG нғңк·ё нҸ¬н•Ё HTML л ҢлҚ”л§Ғ |\r\n| `onCommentCreated` | `posts/{pid}/comments/{cid}` onCreate | кёҖ мһ‘м„ұмһҗм—җкІҢ лҢ“кёҖ н‘ёмӢң + нҶөкі„ мҰқл¶„ |\r\n| `onPostCreated` | `posts/{pid}` onCreate | кҙҖлҰ¬мһҗм—җкІҢ мғҲ кёҖ н‘ёмӢң + `app_stats/totals.posts` мҰқл¶„ |\r\n| `onPostLikeUpdated` | `posts/{pid}` onUpdate | мўӢм•„мҡ” мҲҳ ліҖнҷ” к°җм§Җ, мқёкё°кёҖ м№ҙмҡҙн„° ліҙм • |\r\n| `onReportCreated` | `reports/{rid}` onCreate | мӢ кі  м ‘мҲҳ мӢң кҙҖлҰ¬мһҗ н‘ёмӢң + лЎңк·ё кё°лЎқ + нҶөкі„ мҰқл¶„ |\r\n| `aggregateReports` | `reports/{rid}` onCreate | 5л¶„ лӮҙ лҸҷмқј лҢҖмғҒ мӢ кі  лҲ„м Ғ вҶ’ manager м•ҢлҰј к°ҖмҶҚ |\r\n| `onUserCreated` | `users/{uid}` onCreate | мӢ к·ң мң м Җ мҙҲкё°нҷ”, м»ӨмҠӨн…Җ нҒҙл Ҳмһ„ л¶Җм—¬ (`role: \"user\"`, `approved: false`) |\r\n| `onUserUpdated` | `users/{uid}` onUpdate | мҠ№мқё/м—ӯн• /м •м§Җ ліҖкІҪ мӢң н‘ёмӢң + нҒҙл Ҳмһ„ к°ұмӢ  |\r\n| `onUserDeleted` | `users/{uid}` onDelete | Auth кі„м • + Storage нҢҢмқј м—°мҮ„ мӮӯм ң |\r\n| `onChatMessageCreated` | `chats/{cid}/messages/{mid}` onCreate | мҲҳмӢ мһҗм—җкІҢ мұ„нҢ… н‘ёмӢң |\r\n| `checkSuspensionExpiry` | onSchedule (л§ӨмӢңк°„) | `suspendedUntil <= now`мқё мң м Җ н•„л“ң мӮӯм ң вҶ’ `onUserUpdated` м—°мҮ„ |\r\n| `applyProgressiveSuspension` | onCall | лҲ„м§„ м •м§Җ (1м°Ё 1мқј вҶ’ 2м°Ё 7мқј вҶ’ 3м°Ё 30мқј) вҖ” manager м „мҡ© |\r\n| `requestAccountDeletion` | onCall | мӮ¬мҡ©мһҗ ліёмқё нғҲнҮҙ мӢ мІӯ (deferred 30мқј нӣ„ мһҗлҸҷ нҢҢкё°) |\r\n| `purgeDeactivatedAccounts` | onSchedule (л§Өмқј 04:00) | 30мқј м§ҖлӮң нғҲнҮҙ мӢ мІӯ кі„м • мҷ„м „ нҢҢкё° |\r\n| `createDataExport` | onCall | ліёмқё лҚ°мқҙн„° (кІҢмӢңкёҖ/лҢ“кёҖ/мӢ кі /мұ„нҢ…) JSON мқөмҠӨнҸ¬нҠё вҶ’ Storage м—…лЎңл“ң |\r\n| `purgeExpiredExports` | onSchedule (л§Өмқј 05:00) | л§ҢлЈҢлҗң `data_requests` мқөмҠӨнҸ¬нҠё нҢҢмқј мІӯмҶҢ |\r\n| `cleanupOldPosts` | onSchedule (л§Өмқј 18:00) | TTL л§ҢлЈҢлҗң мӢ кі /лЎңк·ё м •лҰ¬ |\r\n| `promoteGradesAnnually` | onSchedule (л§Өл…„ 3/2 0мӢң) | мһ¬н•ҷмғқ н•ҷл…„ мһҗлҸҷ м§„кёү + мЎём—… мІҳлҰ¬ |\r\n| `backfillStats` | HTTPS onRequest | м№ҙмҡҙн„° лҲ„лқҪ мӢң м»¬л үм…ҳ м „мҲҳ мһ¬кі„мӮ° (мҲҳлҸҷ лҸ„кө¬) |\r\n| `backfillCustomClaims` | HTTPS onRequest | кё°мЎҙ мң м Җ м»ӨмҠӨн…Җ нҒҙл Ҳмһ„ мқјкҙ„ мһ¬л¶Җм—¬ (кҙҖлҰ¬мһҗ лҸ„кө¬) |\r\n\r\nм „мІҙ мҪ”л“ңлҠ” `functions/index.js` м°ёмЎ°.\r\n\r\n## м°ёкі \r\n- [м•„нӮӨн…ҚмІҳ мқҳмӮ¬кІ°м • мқјм§Җ](./architecture-decisions.md)\r\n- [лҚ°мқҙн„° лӘЁлҚё мғҒм„ё](./data-model.md)\r\n- [ліҙм•Ҳ лӘЁлҚё](./security.md)\r\n- [н…ҢмҠӨнҠё м „лһө](./testing.md)\r\n","guides/architecture-overview_en.md":"# Architecture Overview\r\n\r\n> н•ңкөӯм–ҙ: [architecture-overview.md](./architecture-overview.md)\r\n\r\nHansol HS App is a **dual-client** architecture вҖ” a Flutter mobile app and a Next.js admin dashboard вҖ” sharing a common **Firebase** backend. This document covers the full system picture, the Riverpod state graph, and the layered data-flow model.\r\n\r\n## System Diagram\r\n\r\n```mermaid\r\ngraph TD\r\n    subgraph Client\r\n        A[Flutter App<br/>Android / iOS]\r\n        B[Next.js Admin<br/>TypeScript + Tailwind]\r\n    end\r\n\r\n    subgraph Firebase\r\n        C[Auth<br/>Google / Apple / Kakao / GitHub]\r\n        D[Firestore<br/>realtime DB]\r\n        E[Storage<br/>images / profiles]\r\n        F[FCM<br/>push notifications]\r\n        G[Crashlytics<br/>crash monitoring]\r\n    end\r\n\r\n    subgraph Server\r\n        H[Cloud Functions<br/>Node.js]\r\n        I[Scheduler<br/>unsuspension check]\r\n    end\r\n\r\n    J[NEIS API<br/>meals / timetable / academic calendar]\r\n\r\n    A <-->|Riverpod state| D\r\n    A <--> C\r\n    A <--> E\r\n    A --> G\r\n    A <-->|realtime stream| F\r\n    A <-->|REST API| J\r\n\r\n    B <-->|shared Firestore| D\r\n\r\n    H -->|comment / chat / account events| F\r\n    H <-->|Firestore triggers| D\r\n    H <-->|Kakao OAuth| C\r\n    I -->|hourly suspension expiry| D\r\n```\r\n\r\n### Components\r\n\r\n| Component | Location | Role |\r\n|---|---|---|\r\n| **Flutter App** | `/lib` | Main user UI. Single codebase for Android/iOS |\r\n| **Next.js Admin** | `/admin-web` | Web-based admin dashboard sharing the same Firestore |\r\n| **Admin Static** | `/admin-static` | Legacy static admin page |\r\n| **Cloud Functions** | `/functions/index.js` | Kakao OAuth custom tokens, push triggers, scheduler |\r\n| **Android Widget** | `/android/.../widget` | Home widgets (meal / timetable / combined) |\r\n| **iOS Widget** | `/ios/Widget*` | WidgetKit home widgets |\r\n\r\n## Flutter Layer Layout\r\n\r\n```\r\nlib/\r\nв”ңв”Җв”Җ main.dart                # App entry\r\nв”ңв”Җв”Җ api/                     # External REST API wrappers (NEIS, etc.)\r\nв”ңв”Җв”Җ data/                    # Static constants / shared data (days, grade cutoffs)\r\nв”ңв”Җв”Җ network/                 # Firestore / Storage access layer\r\nв”ңв”Җв”Җ notification/            # FCM tokens, in-app notifications, local notifications\r\nв”ңв”Җв”Җ providers/               # Riverpod global providers (auth, grade, settings, theme)\r\nв”ңв”Җв”Җ screens/                 # Screens (auth, board, chat, main, sub)\r\nв”ңв”Җв”Җ styles/                  # Theme, colors, text styles\r\nв””в”Җв”Җ widgets/                 # Reusable stateless widgets\r\n```\r\n\r\n### Dependency Direction\r\n- **screens вҶ’ providers вҶ’ network/api** (one-way)\r\n- **screens do not call `network/` directly** (go via provider)\r\n- **widgets are data-agnostic pure UI** (Stateless)\r\n\r\n## Riverpod Provider Graph\r\n\r\nAuto-generated via `riverpod_graph` CLI. The mermaid below is a summary вҖ” full version at **рҹ”— [Interactive (GitHub Pages)](https://monkshark.github.io/hansol_hs_flutter_app/riverpod_graph.html)** (D3.js zoom/drag). Source HTML stored at `docs/riverpod_graph.html`.\r\n\r\n```mermaid\r\ngraph LR\r\n    authState[authStateProvider]\r\n    userProfile[userProfileProvider<br/>UserProfileNotifier]\r\n    isLoggedIn[isLoggedInProvider]\r\n    isManager[isManagerProvider]\r\n    isAdmin[isAdminProvider]\r\n    isSuspended[isSuspendedProvider]\r\n    theme[themeProvider]\r\n    exams[examsProvider]\r\n    examsByType[examsByTypeProvider]\r\n    goals[goalsProvider]\r\n    jeongsiGoals[jeongsiGoalsProvider]\r\n\r\n    userProfile -->|watch| authState\r\n    isLoggedIn -->|watch| authState\r\n    isManager -->|watch| userProfile\r\n    isAdmin -->|watch| userProfile\r\n    isSuspended -->|watch| userProfile\r\n    examsByType -->|watch| exams\r\n\r\n    HansolApp[HansolHighSchool] -.watch.-> theme\r\n    GradeScreen[GradeScreen] -.watch.-> exams\r\n    GradeScreen -.watch.-> goals\r\n    GradeScreen -.watch.-> jeongsiGoals\r\n\r\n    classDef provider fill:#007acc,color:#fff,stroke:#005a9e\r\n    classDef consumer fill:#00b894,color:#fff,stroke:#008264\r\n    class authState,userProfile,isLoggedIn,isManager,isAdmin,isSuspended,theme,exams,examsByType,goals,jeongsiGoals provider\r\n    class HansolApp,GradeScreen consumer\r\n```\r\n\r\n### Derivation Rules\r\n- `authStateProvider` is the root of the **auth state tree**: profile вҶ’ roles (moderator/auditor/manager/admin/suspended) derived downstream вҖ” roles read directly from Firebase Auth custom claims\r\n- `examsByTypeProvider` (susi/jeongsi split) derives from `examsProvider`\r\n- Consumers `watch` only the leaf providers they need вҶ’ avoid unnecessary rebuilds\r\n- `autoDispose` is used aggressively so providers clean up when screens unmount\r\n\r\n### Provider Types\r\n- **Sync Notifier** (`theme`, `isLoggedIn`): simple state transitions\r\n- **AsyncNotifier** (`userProfile`, `exams`, `goals`): async load from Firestore / SecureStorage\r\n- **Derived Provider** (`isManager`, `examsByType`): only transforms other providers\r\n\r\n## Data Flow (Layered Model)\r\n\r\n```mermaid\r\ngraph LR\r\n    User([user]) --> Widget[Widget / Consumer]\r\n    Widget -->|read/watch| Provider[Riverpod Provider<br/>AsyncNotifier]\r\n    Provider -->|invokes| Manager[Manager / Repository]\r\n\r\n    Manager -->|sensitive<br/>grades| Secure[(SecureStorage<br/>Keystore/Keychain)]\r\n    Manager -->|schedules / cache| SQLite[(sqflite)]\r\n    Manager -->|posts / chats / reports| Firestore[(Firestore)]\r\n    Manager -->|images| Storage[(Cloud Storage)]\r\n\r\n    Firestore -.trigger.-> Functions[Cloud Functions]\r\n    Functions -->|push| FCM[FCM]\r\n    FCM -.->|background| User\r\n\r\n    classDef ui fill:#00b894,color:#fff,stroke:#008264\r\n    classDef state fill:#007acc,color:#fff,stroke:#005a9e\r\n    classDef store fill:#6c5ce7,color:#fff,stroke:#4834d4\r\n    classDef server fill:#fdcb6e,color:#000,stroke:#e1b14a\r\n    class Widget,Provider ui\r\n    class Manager state\r\n    class Secure,SQLite,Firestore,Storage store\r\n    class Functions,FCM server\r\n```\r\n\r\n### Principles\r\n- **Widgets only depend on Providers** вҖ” Managers/stores are encapsulated behind providers\r\n- Four storage backends chosen by **sensitivity / access pattern** вҶ’ [ADR-06](./architecture-decisions_en.md)\r\n- Writes вҶ’ Firestore triggers вҶ’ Cloud Functions вҶ’ FCM form the **async push pipeline**\r\n- Widgets can mock notifiers via `ProviderScope.overrides` in tests\r\n\r\n## Storage Allocation\r\n\r\n| Store | Purpose | Rationale |\r\n|---|---|---|\r\n| **sqflite** | Personal schedules (time/color/span) | row-level range queries + offline-first |\r\n| **Firestore** | Posts / comments / chats / reports / user profiles | realtime sync + multi-client + Cloud Functions triggers |\r\n| **SecureStorage** | Grades | OS-level encryption + fully local (never uploaded) |\r\n| **Cloud Storage** | Post / profile images | CDN + direct download URLs |\r\n| **SharedPreferences** | Settings / cache / search history | simple key-value, fast reads |\r\n\r\nEach store has one clear responsibility вҶ’ \"where does this data live?\" is never ambiguous.\r\n\r\n## Dual Client: Flutter вҶ” Admin Web\r\n\r\n| Aspect | Flutter (`/lib`) | Admin Web (`/admin-web`) |\r\n|---|---|---|\r\n| **Language** | Dart | TypeScript |\r\n| **UI framew
