ample: `\"кё°л§җкі мӮ¬ мқјм •\"` вҶ’ `['кё°л§җ', 'л§җкі ', 'кі мӮ¬', 'мқјм •']`\r\n\r\n---\r\n\r\n## `forDocument`\r\n\r\n```dart\r\nstatic List<String> forDocument(String title, String content, {int maxTokens = 200})\r\n```\r\n\r\n**Description**: Used when saving a post. Combines title + body and generates 2-gram tokens.\r\n\r\n```dart\r\nfinal combined = '$title $content';\r\nfinal tokens = _ngrams(combined);\r\nif (tokens.length <= maxTokens) return tokens.toList();\r\nreturn tokens.take(maxTokens).toList();\r\n```\r\n\r\n- Set automatically removes duplicates\r\n- **maxTokens = 200**: Limits Firestore array size and storage cost\r\n\r\n---\r\n\r\n## `forQuery`\r\n\r\n```dart\r\nstatic List<String> forQuery(String query, {int maxTokens = 10})\r\n```\r\n\r\n**Description**: Used at search time. Extracts 2-grams from the user's query.\r\n\r\n```dart\r\nfinal cleaned = _normalize(query);\r\nif (cleaned.length == 1) return [cleaned];  // 1-char: return as-is\r\nfinal tokens = _ngrams(query);\r\nreturn tokens.take(maxTokens).toList();\r\n```\r\n\r\n- **maxTokens = 10**: Firestore's `array-contains-any` limit is 30, but 10 is enough\r\n- 1-character queries cannot form a 2-gram вҶ’ returns a single 1-gram (may yield no results)\r\n\r\n---\r\n\r\n## `_ngrams`\r\n\r\n```dart\r\nstatic Set<String> _ngrams(String text)\r\n```\r\n\r\n**Description**: Produces a Set of all consecutive 2-character combinations (sliding window) from the normalized text.\r\n\r\n```dart\r\nfinal cleaned = _normalize(text);\r\nfor (int i = 0; i + 2 <= cleaned.length; i++) {\r\n  out.add(cleaned.substring(i, i + 2));\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_normalize`\r\n\r\n```dart\r\nstatic String _normalize(String text)\r\n```\r\n\r\n**Description**: Normalizes text for search.\r\n\r\n1. Lowercase: `text.toLowerCase()`\r\n2. Keep only allowed characters; remove the rest:\r\n   - `0x30~0x39`: digits (0вҖ“9)\r\n   - `0x61~0x7A`: lowercase English letters (aвҖ“z)\r\n   - `0xAC00~0xD7A3`: Korean syllables (к°ҖвҖ“нһЈ)\r\n3. Removes spaces, symbols, Chinese characters, emoji, etc.\r\n\r\n```dart\r\nfor (final r in lower.runes) {\r\n  if (r >= 0x30 && r <= 0x39) { buf.writeCharCode(r); continue; }\r\n  if (r >= 0x61 && r <= 0x7A) { buf.writeCharCode(r); continue; }\r\n  if (r >= 0xAC00 && r <= 0xD7A3) { buf.writeCharCode(r); continue; }\r\n}\r\n```\r\n","data/secure_storage_service.md":"# SecureStorageService\r\n\r\n> `lib/data/secure_storage_service.dart` вҖ” м•”нҳёнҷ” м ҖмһҘмҶҢ лһҳнҚј\r\n\r\n`flutter_secure_storage` wrapper. лӘЁл“  л©”м„ңл“ңк°Җ `static`. м—җлҹ¬ мӢң **silent fail** (лҚ°мқҙн„° л°ҳнҷҳ м—Ҷмқҙ лЎңк№…л§Ң)\r\n\r\n---\r\n\r\n## м ҖмһҘ м •мұ…\r\n\r\n| м—¬кё°м—җ м ҖмһҘ | м—¬кё°м—җ м ҖмһҘн•ҳм§Җ м•ҠмқҢ |\r\n|-------------|---------------------|\r\n| н•ҷм—… кё°лЎқ (м„ұм Ғ, лӘ©н‘ң) | мәҗмӢң (мӢңк°„н‘ң/кёүмӢқ/кіөм§Җ) вҖ” л№ лҘё read, нҸүл¬ё OK |\r\n| | Firebase Auth / Kakao SDK нҶ нҒ° вҖ” SDK мһҗмІҙ кҙҖлҰ¬ |\r\n\r\n---\r\n\r\n## нӮӨ мғҒмҲҳ\r\n\r\n```dart\r\nstatic const String keyGradeExams = 'secure_grade_exams';\r\nstatic const String keyGradeGoals = 'secure_grade_goals';\r\nstatic const String keyGradeJeongsiGoals = 'secure_grade_jeongsi_goals';\r\nstatic const String keyDdays = 'secure_ddays';  // legacy вҖ” л§Ҳмқҙк·ёл Ҳмқҙм…ҳ м „мҡ©, DDayManagerк°Җ FirestoreлЎң мқҙм „н•Ё\r\n```\r\n\r\nл„Өмһ„мҠӨнҺҳмқҙмҠӨ prefix(`secure_`)лЎң SharedPreferences нӮӨмҷҖ м¶©лҸҢ л°©м§Җ\r\n\r\n---\r\n\r\n## н”Ңлһ«нҸј м„Өм •\r\n\r\n```dart\r\nstatic const _storage = FlutterSecureStorage(\r\n  aOptions: AndroidOptions(encryptedSharedPreferences: true),\r\n  iOptions: IOSOptions(accessibility: KeychainAccessibility.first_unlock),\r\n);\r\n```\r\n\r\n- **Android**: `EncryptedSharedPreferences` мӮ¬мҡ© (AES-256, Android Keystore кё°л°ҳ)\r\n- **iOS**: Keychain, `first_unlock` вҖ” кё°кё° л¶ҖнҢ… нӣ„ мөңмҙҲ мһ кёҲ н•ҙм ң мқҙнӣ„ м ‘к·ј к°ҖлҠҘ. л°ұк·ёлқјмҡҙл“ң мһ‘м—…м—җм„ңлҸ„ мқҪкё° к°ҖлҠҘ\r\n\r\n---\r\n\r\n## м—җлҹ¬ мІҳлҰ¬ м „лһө\r\n\r\nлӘЁл“  л©”м„ңл“ңм—җ `try/catch` + `log()` м Ғмҡ©. **Silent fail мӣҗм№ҷ**:\r\n\r\n| л©”м„ңл“ң | м—җлҹ¬ мӢң лҸҷмһ‘ | к·јкұ° |\r\n|--------|-------------|------|\r\n| `read` | `null` л°ҳнҷҳ | нҳём¶ңл¶Җк°Җ nullмқ„ \"лҚ°мқҙн„° м—ҶмқҢ\"мңјлЎң мІҳлҰ¬ вҶ’ л№Ҳ лӘ©лЎқ н‘ңмӢң |\r\n| `write` | л¬ҙмӢң (лЎңк№…л§Ң) | лӢӨмқҢ write мӢң мһ¬мӢңлҸ„лҗЁ, м•ұ нҒ¬лһҳмӢңліҙлӢӨ лҚ°мқҙн„° мң мӢӨмқҙ лӮҳмқҢ |\r\n| `delete` | л¬ҙмӢң (лЎңк№…л§Ң) | мӮӯм ң мӢӨнҢЁ мӢң лҚ°мқҙн„°к°Җ лӮЁм•„мһҲмқ„ лҝҗ мң„н—ҳн•ҳм§Җ м•ҠмқҢ |\r\n| `deleteAll` | л¬ҙмӢң (лЎңк№…л§Ң) | нҡҢмӣҗ нғҲнҮҙ мӢң нҳём¶ң вҖ” мӢӨнҢЁн•ҙлҸ„ Auth мӮӯм ңлЎң мһ¬м ‘к·ј л¶Ҳк°Җ |\r\n\r\n```dart\r\nstatic Future<String?> read(String key) async {\r\n  try {\r\n    return await _storage.read(key: key);\r\n  } catch (e) {\r\n    log('SecureStorage read failed for $key: $e', name: 'SecureStorage');\r\n    return null;\r\n  }\r\n}\r\n```\r\n\r\n### м•Ңл Өм§„ н”Ңлһ«нҸј м—җлҹ¬\r\n\r\n- **Android м•ұ мһ¬м„Өм№ҳ нӣ„**: Keystore нӮӨк°Җ лӮЁм•„мһҲм§Җл§Ң EncryptedSharedPreferences нҢҢмқјмқҙ мӮӯм ңлҗЁ вҶ’ `PlatformException` л°ңмғқ. readм—җм„ң null л°ҳнҷҳмңјлЎң мһҗм—° ліөкө¬\r\n- **iOS Keychain м ‘к·ј кұ°л¶Җ**: кё°кё° мһ кёҲ н•ҙм ң м „ л°ұк·ёлқјмҡҙл“ңм—җм„ң мқҪкё° мӢңлҸ„ мӢң мӢӨнҢЁ. `first_unlock` м„Өм •мңјлЎң мөңмҶҢнҷ”н–Ҳм§Җл§Ң к·№лӢЁм Ғ нғҖмқҙл°Қм—җм„ң л°ңмғқ к°ҖлҠҘ\r\n\r\n---\r\n\r\n## `read` / `write` / `delete` / `deleteAll`\r\n\r\n```dart\r\nstatic Future<String?> read(String key)\r\nstatic Future<void> write(String key, String value)\r\nstatic Future<void> delete(String key)\r\nstatic Future<void> deleteAll()\r\n```\r\n\r\nкё°ліё CRUD. лӘЁл“  к°’мқҖ StringмңјлЎң м§Ғл ¬нҷ” (JSON)н•ҳм—¬ м ҖмһҘ. нҳём¶ңл¶Җ([`GradeManager`](grade_manager.md))к°Җ `jsonEncode`/`jsonDecode` лӢҙлӢ№\r\n\r\n---\r\n\r\n## `migrateFromPlain`\r\n\r\n```dart\r\nstatic Future<bool> migrateFromPlain({\r\n  required String key,\r\n  required String? oldValue,\r\n  required Future<void> Function() onMigrated,\r\n})\r\n```\r\n\r\n**м„ӨлӘ…**: SharedPreferences(нҸүл¬ё) вҶ’ SecureStorage(м•”нҳёнҷ”) мқјнҡҢм„ұ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ helper\r\n\r\n```dart\r\nif (oldValue == null || oldValue.isEmpty) return false;  // мҳ®кёё кІҢ м—ҶмқҢ\r\nfinal existing = await read(key);\r\nif (existing != null && existing.isNotEmpty) return false;  // мқҙлҜё мһҲмқҢ\r\nawait write(key, oldValue);      // м•”нҳёнҷ” м ҖмһҘ\r\nawait onMigrated();              // нҳём¶ңл¶Җк°Җ SharedPreferencesм—җм„ң мӮӯм ң\r\n```\r\n\r\n- [`GradeManager`](grade_manager.md)`.loadExams`м—җм„ң мІ« нҳём¶ң мӢң мһҗлҸҷ мӢӨн–ү\r\n- **Idempotent**: мқҙлҜё л§Ҳмқҙк·ёл Ҳмқҙм…ҳлҗң кІҪмҡ° `false` л°ҳнҷҳ, мһ¬мӢӨн–ү м•Ҳм „\r\n- `onMigrated` мҪңл°ұм—җм„ң нҸүл¬ё нӮӨ мӮӯм ң вҶ’ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мҷ„лЈҢ нӣ„ нҸүл¬ё лҚ°мқҙн„° мһ”мЎҙ л°©м§Җ\r\n\r\n**л°ҳнҷҳк°’**: мҳ®кІЁм§„ кІҪмҡ° `true`, м•„лӢҢ кІҪмҡ° `false`\r\n\r\n**нҡҢк·Җ л°©м§Җ**: unit test 8к°ң вҖ” л§Ҳмқҙк·ёл Ҳмқҙм…ҳ м„ұкіө/мӢӨнҢЁ/мқҙлҜё мЎҙмһ¬/л№Ҳ к°’ л“ұ мјҖмқҙмҠӨ кІҖмҰқ\r\n","data/secure_storage_service_en.md":"# SecureStorageService\r\n\r\n> н•ңкөӯм–ҙ: [secure_storage_service.md](./secure_storage_service.md)\r\n\r\n> `lib/data/secure_storage_service.dart` вҖ” Encrypted storage wrapper\r\n\r\n`flutter_secure_storage` wrapper. All methods are `static`. On error, **silent fail** (logs only; returns no data).\r\n\r\n---\r\n\r\n## Storage policy\r\n\r\n| Stored here | Not stored here |\r\n|-------------|----------------|\r\n| Academic records (grades, goals) | Cache (timetable/meal/notice) вҖ” fast reads, plaintext OK |\r\n| | Firebase Auth / Kakao SDK tokens вҖ” managed by the SDKs themselves |\r\n\r\n---\r\n\r\n## Key constants\r\n\r\n```dart\r\nstatic const String keyGradeExams = 'secure_grade_exams';\r\nstatic const String keyGradeGoals = 'secure_grade_goals';\r\nstatic const String keyGradeJeongsiGoals = 'secure_grade_jeongsi_goals';\r\nstatic const String keyDdays = 'secure_ddays';  // legacy вҖ” migration-only, DDayManager moved to Firestore\r\n```\r\n\r\nThe namespace prefix (`secure_`) prevents collisions with SharedPreferences keys.\r\n\r\n---\r\n\r\n## Platform configuration\r\n\r\n```dart\r\nstatic const _storage = FlutterSecureStorage(\r\n  aOptions: AndroidOptions(encryptedSharedPreferences: true),\r\n  iOptions: IOSOptions(accessibility: KeychainAccessibility.first_unlock),\r\n);\r\n```\r\n\r\n- **Android**: Uses `EncryptedSharedPreferences` (AES-256, backed by the Android Keystore)\r\n- **iOS**: Keychain, `first_unlock` вҖ” accessible after the first unlock following boot. Readable even from background tasks\r\n\r\n---\r\n\r\n## Error-handling strategy\r\n\r\nEvery method wraps a `try/catch` + `log()`. **Silent-fail principle**:\r\n\r\n| Method | On error | Rationale |\r\n|--------|----------|-----------|\r\n| `read` | returns `null` | Callers treat null as \"no data\" вҶ’ show an empty list |\r\n| `write` | ignored (log only) | Next write will retry; data loss is preferable to app crash |\r\n| `delete` | ignored (log only) | Failed deletion only leaves data behind; not dangerous |\r\n| `deleteAll` | ignored (log only) | Called on account deletion вҖ” Auth deletion already prevents re-access |\r\n\r\n```dart\r\nstatic Future<String?> read(String key) async {\r\n  try {\r\n    return await _storage.read(key: key);\r\n  } catch (e) {\r\n    log('SecureStorage read failed for $key: $e', name: 'SecureStorage');\r\n    return null;\r\n  }\r\n}\r\n```\r\n\r\n### Known platform errors\r\n\r\n- **After Android reinstall**: The Keystore key remains but the EncryptedSharedPreferences file is wiped вҶ’ `PlatformException`. Self-heals because read returns null\r\n- **iOS Keychain access denied**: Attempting a background read before the device is unlocked fails. Minimized by `first_unlock`, but possible in edge-case timing\r\n\r\n---\r\n\r\n## `read` / `write` / `delete` / `deleteAll`\r\n\r\n```dart\r\nstatic Future<String?> read(String key)\r\nstatic Future<void> write(String key, String value)\r\nstatic Future<void> delete(String key)\r\nstatic Future<void> deleteAll()\r\n```\r\n\r\nBasic CRUD. All values are serialized as String (JSON). Callers ([`GradeManager`](grade_manager.md)) handle `jsonEncode`/`jsonDecode`.\r\n\r\n---\r\n\r\n## `migrateFromPlain`\r\n\r\n```dart\r\nstatic Future<bool> migrateFromPlain({\r\n  required String key,\r\n  required String? oldValue,\r\n  required Future<void> Function() onMigrated,\r\n})\r\n```\r\n\r\n**Description**: One-shot migration helper from SharedPreferences (plaintext) вҶ’ SecureStorage (encrypted).\r\n\r\n```dart\r\nif (oldValue == null || oldValue.isEmpty) return false;  // nothing to migrate\r\nfinal existing = await read(key);\r\nif (existing != null && existing.isNotEmpty) return false;  // already exists\r\nawait write(key, oldValue);      // encrypted write\r\nawait onMigrated();              // caller removes the plaintext from SharedPreferences\r\n```\r\n\r\n- Runs automatically on the first call to [`GradeManager`](grade_manager.md)`.loadExams`\r\n- **Idempotent**: Returns `false` when already migrated; safe to re-run\r\n- The `onMigrated` callback deletes the plaintext key вҶ’ prevents residual plaintext data after migration\r\n\r\n**Returns**: `true` when migrated, `false` otherwise.\r\n\r\n**Regression coverage**: 8 unit tests вҖ” validating cases like successful migration, failure, already-exists, and empty values.\r\n","data/service_locator.md":"# ServiceLocator\r\n\r\n> `lib/data/service_locator.dart` вҖ” GetIt DI м„Өм •\r\n\r\nм•ұ мӢңмһ‘ мӢң н•ң лІҲ нҳём¶ңн•ҳм—¬ мқҳмЎҙм„ұмқ„ л“ұлЎқн•Ё\r\n\r\n---\r\n\r\n## `setupServiceLocator`\r\n\r\n```dart\r\nFuture<void> setupServiceLocator()\r\n```\r\n\r\n**м„ӨлӘ…**: GetIt м»Ён…Ңмқҙл„Ҳм—җ RepositoryмҷҖ м„ңл№„мҠӨлҘј л“ұлЎқн•Ё\r\n\r\n```dart\r\nfinal getIt = GetIt.I;\r\n\r\nif (!getIt.isRegistered<AuthRepository>()) {\r\n  getIt.registerLazySingleton<AuthRepository>(\r\n    () => const FirebaseAuthRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<GradeRepository>()) {\r\n  getIt.registerLazySingleton<GradeRepository>(\r\n    () => const LocalGradeRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<LocalDataBase>()) {\r\n  final localDb = LocalDataBase();\r\n  await localDb.migrateFromPrefs();       // SharedPreferences вҶ’ SQLite л§Ҳмқҙк·ёл Ҳмқҙм…ҳ\r\n  getIt.registerSingleton<LocalDataBase>(localDb);\r\n}\r\n```\r\n\r\n- `isRegistered` мІҙнҒ¬лЎң мӨ‘ліө л“ұлЎқ л°©м§Җ (н…ҢмҠӨнҠём—җм„ң м—¬лҹ¬ лІҲ нҳём¶ңн•ҙлҸ„ м•Ҳм „)\r\n- [`AuthRepository`](auth_repository.md), [`GradeRepository`](grade_repository.md)лҠ” `LazySignleton` (мІҳмқҢ м ‘к·ј мӢң мғқм„ұ)\r\n- [`LocalDataBase`](local_database.md)лҠ” мҰүмӢң мғқм„ұ + л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢӨн–ү\r\n\r\n**нҳём¶ң мң„м№ҳ**: `main()` н•ЁмҲҳм—җм„ң Firebase мҙҲкё°нҷ” нӣ„ нҳём¶ң\r\n\r\n---\r\n\r\n## `resetServiceLocator`\r\n\r\n```dart\r\nFuture<void> resetServiceLocator()\r\n```\r\n\r\nн…ҢмҠӨнҠёмҡ© н—¬нҚј. `GetIt.I.reset()`мңјлЎң лӘЁл“  л“ұлЎқмқ„ мҙҲкё°нҷ”\r\n\r\n```dart\r\n// н…ҢмҠӨнҠё setUpм—җм„ң:\r\nawait resetServiceLocator();\r\n// mock л“ұлЎқ\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n```\r\n\r\n---\r\n\r\n## м„Өкі„ м°ёкі \r\n\r\n> Riverpod Provider лӮҙл¶Җм—җм„ң `GetIt.I<AuthRepository>()`лЎң м ‘к·јн•ҳм§Җ м•Ҡкі ,\r\n> `ref.read(authRepositoryProvider)` нҳ•нғңлЎң лі„лҸ„ ProviderлҘј л‘җлҠ” кІғмқҙ м •м„қмқҙм§Җл§Ң,\r\n> м җм§„м Ғ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ лӢЁкі„лқј GetIt + Riverpod лі‘н–үмқ„ н—Ҳмҡ©\r\n","data/service_locator_en.md":"# ServiceLocator\r\n\r\n> н•ңкөӯм–ҙ: [service_locator.md](./service_locator.md)\r\n\r\n> `lib/data/service_locator.dart` вҖ” GetIt DI configuration\r\n\r\nCalled once at app startup to register dependencies.\r\n\r\n---\r\n\r\n## `setupServiceLocator`\r\n\r\n```dart\r\nFuture<void> setupServiceLocator()\r\n```\r\n\r\n**Description**: Registers Repositories and services into the GetIt container.\r\n\r\n```dart\r\nfinal getIt = GetIt.I;\r\n\r\nif (!getIt.isRegistered<AuthRepository>()) {\r\n  getIt.registerLazySingleton<AuthRepository>(\r\n    () => const FirebaseAuthRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<GradeRepository>()) {\r\n  getIt.registerLazySingleton<GradeRepository>(\r\n    () => const LocalGradeRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<LocalDataBase>()) {\r\n  final localDb = LocalDataBase();\r\n  await localDb.migrateFromPrefs();       // SharedPreferences вҶ’ SQLite migration\r\n  getIt.registerSingleton<LocalDataBase>(localDb);\r\n}\r\n```\r\n\r\n- The `isRegistered` check prevents duplicate registration (safe to call multiple times in tests)\r\n- [`AuthRepository`](auth_repository.md) and [`GradeRepository`](grade_repository.md) are `LazySingleton` (created on first access)\r\n- [`LocalDataBase`](local_database.md) is created eagerly and runs migration\r\n\r\n**Call site**: Called from `main()` after Firebase initialization.\r\n\r\n---\r\n\r\n## `resetServiceLocator`\r\n\r\n```dart\r\nFuture<void> resetServiceLocator()\r\n```\r\n\r\nTest-only helper. Resets all registrations via `GetIt.I.reset()`.\r\n\r\n```dart\r\n// In test setUp:\r\nawait resetServiceLocator();\r\n// register mocks\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n```\r\n\r\n---\r\n\r\n## Design note\r\n\r\n> The canonical approach is to expose repositories through dedicated Providers (e.g., `ref.read(authRepositoryProvider)`) instead of calling `GetIt.I<AuthRepository>()` inside Riverpod Providers,\r\n> but since this project is in a gradual migration phase, coexistence of GetIt + Riverpod is allowed.\r\n","data/setting_data.md":"# SettingData\r\n\r\n> `lib/data/setting_data.dart` вҖ” SharedPreferences м„Өм • мӢұкёҖнҶӨ\r\n\r\nм•ұ м „мІҙ м„Өм •мқ„ SharedPreferencesлЎң кҙҖлҰ¬н•ҳлҠ” мӢұкёҖн„ҙ нҒҙлһҳмҠӨ\r\n\r\n---\r\n\r\n## мӢұкёҖн„ҙ нҢЁн„ҙ\r\n\r\n```dart\r\nstatic final SettingData _instance = SettingData._internal();\r\nfactory SettingData() => _instance;\r\n```\r\n\r\n`SettingData()`лЎң м–ҙл””м„ңл“  к°ҷмқҖ мқёмҠӨн„ҙмҠӨ м ‘к·ј\r\n\r\n---\r\n\r\n## `init`\r\n\r\n```dart\r\nFuture<void> init()\r\n```\r\n\r\n`main()` мӢңмһ‘ мӢң н•ң лІҲ нҳём¶ң. `SharedPreferences.getInstance()` кІ°кіјлҘј лӮҙл¶Җм—җ мәҗмӢң\r\n\r\n---\r\n\r\n## н•ҷл…„/л°ҳ м„Өм •\r\n\r\n| н”„лЎңнҚјнӢ° | SharedPreferences нӮӨ | кё°ліёк°’ |\r\n|----------|---------------------|--------|\r\n| `grade` (get/set) | `'Grade'` | 0 |\r\n| `classNum` (get/set) | `'Class'` | 0 |\r\n| `isGradeSet` (get) | вҖ” | `grade > 0 && classNum > 0` |\r\n\r\n---\r\n\r\n## н…Ңл§Ҳ м„Өм •\r\n\r\n| н”„лЎңнҚјнӢ° | нӮӨ | кё°ліёк°’ | м„ӨлӘ… |\r\n|----------|----|--------|------|\r\n| `isDarkMode` | `'isDarkMode'` | false | л Ҳкұ°мӢң (themeModeIndexлЎң лҢҖмІҙ) |\r\n| `themeModeIndex` | `'themeModeIndex'` | 2 | 0=лқјмқҙнҠё, 1=лӢӨнҒ¬, 2=мӢңмҠӨн…ң |\r\n\r\n---\r\n\r\n## м•ҢлҰј м„Өм •\r\n\r\n| н”„лЎңнҚјнӢ° | нӮӨ | кё°ліёк°’ |\r\n|----------|----|--------|\r\n| `isBreakfastNotificationOn` | `'isBreakfastNotificationOn'` | true |\r\n| `breakfastTime` | `'breakfastTime'` | `'06:30'` |\r\n| `isLunchNotificationOn` | `'isLunchNotificationOn'` | true |\r\n| `lunchTime` | `'lunchTime'` | `'12:00'` |\r\n| `isDinnerNotificationOn` | `'isDinnerNotificationOn'` | true |\r\n| `dinnerTime` | `'dinnerTime'` | `'17:00'` |\r\n| `isBoardNotificationOn` | `'isBoardNotificationOn'` | true |\r\n\r\n---\r\n\r\n## лІ”мҡ© м ‘к·јмһҗ\r\n\r\n```dart\r\nbool getBool(String key, {bool defaultValue = false})\r\nvoid setBool(String key, bool value)\r\n```\r\n\r\nм№ҙн…Ңкі лҰ¬лі„ м•ҢлҰј нҶ кёҖ л“ұ лҸҷм Ғ нӮӨм—җ мӮ¬мҡ©. мҳҲ: `getBool('noti_board_мһҗмң ', defaultValue: true)`\r\n","data/setting_data_en.md":"# SettingData\r\n\r\n> н•ңкөӯм–ҙ: [setting_data.md](./setting_data.md)\r\n\r\n> `lib/data/setting_data.dart` вҖ” SharedPreferences settings singleton\r\n\r\nSingleton class that manages app-wide settings through SharedPreferences.\r\n\r\n---\r\n\r\n## Singleton pattern\r\n\r\n```dart\r\nstatic final SettingData _instance = SettingData._internal();\r\nfactory SettingData() => _instance;\r\n```\r\n\r\n`SettingData()` provides access to the same instance from anywhere.\r\n\r\n---\r\n\r\n## `init`\r\n\r\n```dart\r\nFuture<void> init()\r\n```\r\n\r\nCalled once at the start of `main()`. Caches the result of `SharedPreferences.getInstance()` internally.\r\n\r\n---\r\n\r\n## Grade/class settings\r\n\r\n| Property | SharedPreferences key | Default |\r\n|----------|----------------------|---------|\r\n| `grade` (get/set) | `'Grade'` | 0 |\r\n| `classNum` (get/set) | `'Class'` | 0 |\r\n| `isGradeSet` (get) | вҖ” | `grade > 0 && classNum > 0` |\r\n\r\n---\r\n\r\n## Theme settings\r\n\r\n| Property | Key | Default | Description |\r\n|----------|-----|---------|-------------|\r\n| `isDarkMode` | `'isDarkMode'` | false | Legacy (superseded by themeModeIndex) |\r\n| `themeModeIndex` | `'themeModeIndex'` | 2 | 0=light, 1=dark, 2=system |\r\n\r\n---\r\n\r\n## Notification settings\r\n\r\n| Property | Key | Default |\r\n|----------|-----|---------|\r\n| `isBreakfastNotificationOn` | `'isBreakfastNotificationOn'` | true |\r\n| `breakfastTime` | `'breakfastTime'` | `'06:30'` |\r\n| `isLunchNotificationOn` | `'isLunchNotificationOn'` | true |\r\n| `lunchTime` | `'lunchTime'` | `'12:00'` |\r\n| `isDinnerNotificationOn` | `'isDinnerNotificationOn'` | true |\r\n| `dinnerTime` | `'dinnerTime'` | `'17:00'` |\r\n| `isBoardNotificationOn` | `'isBoardNotificationOn'` | true |\r\n\r\n---\r\n\r\n## Generic accessors\r\n\r\n```dart\r\nbool getBool(String key, {bool defaultValue = false})\r\nvoid setBool(String key, bool value)\r\n```\r\n\r\nUsed for dynamic keys such as per-category notification toggles. Example: `getBool('noti_board_мһҗмң ', defaultValue: true)`.\r\n","data/subject.md":"# Subject\r\n\r\n> `lib/data/subject.dart` вҖ” кіјлӘ© лҚ°мқҙн„° лӘЁлҚё (freezed)\r\n\r\n`@freezed` кё°л°ҳмқҙм§Җл§Ң м»ӨмҠӨн…Җ `==`/`hashCode`лҘј мҳӨлІ„лқјмқҙл“ң. JSON м§Ғл ¬нҷ”лҠ” мҪ”л“ң мғқм„ұ(`subject.g.dart`)\r\n\r\n---\r\n\r\n## н•„л“ң\r\n\r\n```dart\r\n@freezed\r\nclass Subject with _$Subject {\r\n  const factory Subject({\r\n    required String subjectName,   // кіјлӘ©лӘ… (мҳҲ: 'көӯм–ҙ', 'мҲҳн•ҷ')\r\n    required int subjectClass,     // л°ҳ лІҲнҳё. -1мқҙл©ҙ нҠ№лі„мӢӨ кіјлӘ©\r\n    String? category,              // кіјлӘ© м№ҙн…Ңкі лҰ¬ (кҙҖлҰ¬мһҗ Firestoreм—җм„ң м„Өм •)\r\n    @Default(false) bool isOriginal, // кҙҖлҰ¬мһҗк°Җ л“ұлЎқн•ң мӣҗліё кіјлӘ© м—¬л¶Җ\r\n  }) = _Subject;\r\n}\r\n```\r\n\r\n- `subjectClass`: NEIS мӢңк°„н‘ңм—җм„ң `CLASS_NM` к°’. нҠ№лі„мӢӨ(л°ҳ лІҲнҳё м—ҶмқҢ)мқҙл©ҙ `-1`\r\n- `category`: `TimetableDataApi.getSubjectsFromAdminFirestore`м—җм„ң к°Җм ёмҳӨлҠ” л¶„лҘҳ\r\n- `isOriginal`: кҙҖлҰ¬мһҗ л“ұлЎқ кіјлӘ©мқҙл©ҙ true, NEIS мһҗлҸҷ м¶”м¶ңмқҙл©ҙ false\r\n\r\n---\r\n\r\n## лҸҷл“ұм„ұ л№„көҗ (м»ӨмҠӨн…Җ)\r\n\r\n```dart\r\n@override\r\nbool operator ==(Object other) =>\r\n    identical(this, other) ||\r\n    other is Subject &&\r\n        runtimeType == other.runtimeType &&\r\n        subjectName == other.subjectName &&\r\n        subjectClass == other.subjectClass;\r\n\r\n@override\r\nint get hashCode => subjectName.hashCode ^ subjectClass.hashCode;\r\n```\r\n\r\n`subjectName` + `subjectClass` мЎ°н•©мңјлЎң лҸҷл“ұм„ұ нҢҗлӢЁ. `category`мҷҖ `isOriginal`мқҖ л№„көҗм—җм„ң м ңмҷё\r\n\r\n**мқҙмң **: `TimetableDataApi.getAllSubjectCombinations`м—җм„ң Setм—җ SubjectлҘј л„Јм–ҙ мӨ‘ліө м ңкұ° мӢң, к°ҷмқҖ кіјлӘ©+л°ҳ мЎ°н•©мқҙл©ҙ к°ҷмқҖ кіјлӘ©мңјлЎң м·Ёкёүн•ҙм•ј н•ҳлҜҖлЎң\r\n\r\n---\r\n\r\n## JSON м§Ғл ¬нҷ”\r\n\r\n```dart\r\nfactory Subject.fromJson(Map<String, dynamic> json) => _$SubjectFromJson(json);\r\n```\r\n\r\n[`SubjectDataManager`](subject_data_manager.md)м—җм„ң SharedPreferences/Firestoreм—җ м ҖмһҘ/ліөмӣҗн•  л•Ң мӮ¬мҡ©\r\n\r\n---\r\n\r\n## мӮ¬мҡ©мІҳ\r\n\r\n| мң„м№ҳ | мҡ©лҸ„ |\r\n|------|------|\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getAllSubjectCombinations` | NEIS мӢңк°„н‘ңм—җм„ң кіјлӘ©+л°ҳ мЎ°н•© м¶”м¶ң, SetмңјлЎң мӨ‘ліө м ңкұ° |\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getCustomTimeTable` | мӮ¬мҡ©мһҗ м„ нғқ Subject лҰ¬мҠӨнҠёлЎң м»ӨмҠӨн…Җ мӢңк°„н‘ң мғқм„ұ |\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getSubjectsFromAdminFirestore` | Firestoreм—җм„ң кҙҖлҰ¬мһҗ л“ұлЎқ кіјлӘ© мЎ°нҡҢ |\r\n| [`SubjectDataManager`](subject_data_manager.md) | м„ нғқкіјлӘ© лЎңм»¬/Firestore м ҖмһҘ |\r\n| `TimetableSelectScreen` | кіјлӘ© м„ нғқ UIм—җм„ң Subject лҰ¬мҠӨнҠё н‘ңмӢң |\r\n","data/subject_data_manager.md":"# SubjectDataManager\r\n\r\n> `lib/data/subject_data_manager.dart` вҖ” м„ нғқкіјлӘ© лЎңл“ң/м ҖмһҘ, Firestore лҸҷкё°нҷ”\r\n\r\nлӘЁл“  л©”м„ңл“ңк°Җ `static`. н•ҷл…„лі„ м„ нғқкіјлӘ©мқ„ SharedPreferences(лЎңм»¬)мҷҖ Firestore(нҒҙлқјмҡ°л“ң) м–‘мӘҪм—җ кҙҖлҰ¬\r\n\r\n---\r\n\r\n## `loadSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<List<Subject>> loadSelectedSubjects(int grade)\r\n```\r\n\r\n**м„ӨлӘ…**: н•ҷл…„лі„ м„ нғқкіјлӘ© лӘ©лЎқмқ„ лЎңл“ңн•Ё\r\n\r\n1. SharedPreferencesм—җм„ң лЎңм»¬ лҚ°мқҙн„° нҷ•мқё:\r\n   ```dart\r\n   final jsonString = prefs.getString('$_selectedSubjectsKeyPrefix$grade');\r\n   // нӮӨ: 'selected_subjects_grade_1', 'selected_subjects_grade_2', ...\r\n   ```\r\n\r\n2. лЎңм»¬ лҚ°мқҙн„°к°Җ м—Ҷкі  лЎңк·ёмқё мғҒнғңл©ҙ Firestoreм—җм„ң ліөмӣҗ:\r\n   ```dart\r\n   if (localSubjects.isEmpty && AuthService.isLoggedIn) {\r\n     final doc = await FirebaseFirestore.instance\r\n         .collection('users').doc(uid)\r\n         .collection('subjects').doc('grade_$grade')\r\n         .get();\r\n   }\r\n   ```\r\n\r\n3. Firestoreм—җм„ң ліөмӣҗн•ң лҚ°мқҙн„°лҠ” лЎңм»¬м—җлҸ„ м ҖмһҘ:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, localSubjects);\r\n   ```\r\n\r\n---\r\n\r\n## `saveSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<void> saveSelectedSubjects(int grade, List<Subject> selectedSubjects)\r\n```\r\n\r\n**м„ӨлӘ…**: м„ нғқкіјлӘ©мқ„ лЎңм»¬кіј Firestore м–‘мӘҪм—җ м ҖмһҘн•Ё\r\n\r\n1. лЎңм»¬ SharedPreferencesм—җ мҰүмӢң м ҖмһҘ:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, selectedSubjects);\r\n   ```\r\n\r\n2. лЎңк·ёмқё мғҒнғңл©ҙ Firestoreм—җлҸ„ лҸҷкё°нҷ”:\r\n   ```dart\r\n   await FirebaseFirestore.instance\r\n       .collection('users').doc(uid)\r\n       .collection('subjects').doc('grade_$grade')\r\n       .set({\r\n     'subjects': selectedSubjects.map((s) => s.toJson()).toList(),\r\n     'updatedAt': FieldValue.serverTimestamp(),\r\n   });\r\n   ```\r\n\r\n---\r\n\r\n## `_saveLocal`\r\n\r\n```dart\r\nstatic Future<void> _saveLocal(SharedPreferences prefs, int grade, List<Subject> subjects)\r\n```\r\n\r\nлӮҙл¶Җ н—¬нҚј. [Subject](subject.md) лҰ¬мҠӨнҠёлҘј JSON мқёмҪ”л”© нӣ„ SharedPreferencesм—җ м ҖмһҘ\r\n","data/subject_data_manager_en.md":"# SubjectDataManager\r\n\r\n> н•ңкөӯм–ҙ: [subject_data_manager.md](./subject_data_manager.md)\r\n\r\n> `lib/data/subject_data_manager.dart` вҖ” Loads/saves elective subjects, syncs with Firestore\r\n\r\nAll methods are `static`. Manages per-grade elective subjects across both SharedPreferences (local) and Firestore (cloud).\r\n\r\n---\r\n\r\n## `loadSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<List<Subject>> loadSelectedSubjects(int grade)\r\n```\r\n\r\n**Description**: Loads the list of elective subjects for a given grade.\r\n\r\n1. Check local data from SharedPreferences:\r\n   ```dart\r\n   final jsonString = prefs.getString('$_selectedSubjectsKeyPrefix$grade');\r\n   // keys: 'selected_subjects_grade_1', 'selected_subjects_grade_2', ...\r\n   ```\r\n\r\n2. If no local data and the user is signed in, restore from Firestore:\r\n   ```dart\r\n   if (localSubjects.isEmpty && AuthService.isLoggedIn) {\r\n     final doc = await FirebaseFirestore.instance\r\n         .collection('users').doc(uid)\r\n         .collection('subjects').doc('grade_$grade')\r\n         .get();\r\n   }\r\n   ```\r\n\r\n3. Data restored from Firestore is also written locally:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, localSubjects);\r\n   ```\r\n\r\n---\r\n\r\n## `saveSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<void> saveSelectedSubjects(int grade, List<Subject> selectedSubjects)\r\n```\r\n\r\n**Description**: Saves the selected subjects to both local storage and Firestore.\r\n\r\n1. Immediately save to local SharedPreferences:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, selectedSubjects);\r\n   ```\r\n\r\n2. If signed in, also sync to Firestore:\r\n   ```dart\r\n   await FirebaseFirestore.instance\r\n       .collection('users').doc(uid)\r\n       .collection('subjects').doc('grade_$grade')\r\n       .set({\r\n     'subjects': selectedSubjects.map((s) => s.toJson()).toList(),\r\n     'updatedAt': FieldValue.serverTimestamp(),\r\n   });\r\n   ```\r\n\r\n---\r\n\r\n## `_saveLocal`\r\n\r\n```dart\r\nstatic Future<void> _saveLocal(SharedPreferences prefs, int grade, List<Subject> subjects)\r\n```\r\n\r\nInternal helper. JSON-encodes the [Subject](subject.md) list and writes it to SharedPreferences.\r\n","data/subject_en.md":"# Subject\r\n\r\n> н•ңкөӯм–ҙ: [subject.md](./subject.md)\r\n\r\n> `lib/data/subject.dart` вҖ” Subject data model (freezed)\r\n\r\nBased on `@freezed`, but overrides `==`/`hashCode` with custom implementations. JSON serialization is code-generated (`subject.g.dart`).\r\n\r\n---\r\n\r\n## Fields\r\n\r\n```dart\r\n@freezed\r\nclass Subject with _$Subject {\r\n  const factory Subject({\r\n    required String subjectName,   // Subject name (e.g., 'Korean', 'Math')\r\n    required int subjectClass,     // Class number. -1 for special-room subjects\r\n    String? category,              // Subject category (configured in admin Firestore)\r\n    @Default(false) bool isOriginal, // Whether the subject was registered by an admin\r\n  }) = _Subject;\r\n}\r\n```\r\n\r\n- `subjectClass`: `CLASS_NM` value from the NEIS timetable. `-1` for special rooms (no class number)\r\n- `category`: Classification fetched by `TimetableDataApi.getSubjectsFromAdminFirestore`\r\n- `isOriginal`: true for admin-registered subjects, false for NEIS auto-extracted ones\r\n\r\n---\r\n\r\n## Equality (custom)\r\n\r\n```dart\r\n@override\r\nbool operator ==(Object other) =>\r\n    identical(this, other) ||\r\n    other is Subject &&\r\n        runtimeType == other.runtimeType &&\r\n        subjectName == other.subjectName &&\r\n        subjectClass == other.subjectClass;\r\n\r\n@override\r\nint get hashCode => subjectName.hashCode ^ subjectClass.hashCode;\r\n```\r\n\r\nEquality is determined by the combination of `subjectName` + `subjectClass`. `category` and `isOriginal` are excluded from comparison.\r\n\r\n**Reason**: When `TimetableDataApi.getAllSubjectCombinations` puts Subjects into a Set to deduplicate, any two with the same subject+class should be treated as the same subject.\r\n\r\n---\r\n\r\n## JSON serialization\r\n\r\n```dart\r\nfactory Subject.fromJson(Map<String, dynamic> json) => _$SubjectFromJson(json);\r\n```\r\n\r\nUsed by [`SubjectDataManager`](subject_data_manager.md) when saving/restoring to SharedPreferences/Firestore.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|----------|---------|\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getAllSubjectCombinations` | Extracts subject+class combinations from the NEIS timetable and deduplicates with a Set |\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getCustomTimeTable` | Builds a custom timetable from a user-selected Subject list |\r\n| [`TimetableDataApi`](../api/timetable_data_api.md)`.getSubjectsFromAdminFirestore` | Queries admin-registered subjects from Firestore |\r\n| [`SubjectDataManager`](subject_data_manager.md) | Local/Firestore storage for elective subjects |\r\n| `TimetableSelectScreen` | Displays the Subject list in the subject-selection UI |\r\n","DEPLOY.md":"# л°°нҸ¬ к°Җмқҙл“ң\r\n\r\n> English: [DEPLOY_en.md](./DEPLOY_en.md)\r\n\r\nFirebase л°ұм—”л“ң + Flutter лӘЁл°”мқј м•ұ + Next.js Admin Web + нҷҲ мң„м Ҝ(Android/iOS)к№Ңм§Җ л„Ө к°Ҳлһҳ л°°нҸ¬лҘј лӢӨлЈ№лӢҲлӢӨ. лӘЁл“  лӘ…л №мқҖ л ҲнҸ¬ лЈЁнҠём—җм„ң мӢӨн–ү кё°мӨҖмһ…лӢҲлӢӨ.\r\n\r\n## мӮ¬м „ мӨҖл№„\r\n\r\n### н•„мҲҳ лҸ„кө¬\r\n- Firebase CLI: `npm install -g firebase-tools` вҶ’ `firebase login`\r\n- Flutter stable + Xcode (iOS) + Android Studio / JDK 17\r\n- Node 20+\r\n- (м„ нғқ) Vercel CLI: Admin Web нҳёмҠӨнҢ…мҡ©\r\n\r\n### Firebase н”„лЎңм қнҠё м„Өм •\r\n\r\n`firebase.json` н•өмӢ¬ кө¬м„ұ:\r\n\r\n```json\r\n{\r\n  \"storage\":   { \"rules\": \"storage.rules\" },\r\n  \"firestore\": { \"rules\": \"firestore.rules\", \"indexes\": \"firestore.indexes.json\" },\r\n  \"functions\": [{ \"source\": \"functions\", \"codebase\": \"default\" }],\r\n  \"emulators\": { \"firestore\": { \"port\": 8080 }, \"auth\": { \"port\": 9099 } }\r\n}\r\n```\r\n\r\n`firebase use <project-id>` лЎң лҢҖмғҒ н”„лЎңм қнҠё м„ нғқ.\r\n\r\n## 1. Firestore Rules & Indexes\r\n\r\n```bash\r\n# лЎңм»¬ м—җл®¬л Ҳмқҙн„° нҷ•мқё\r\nfirebase emulators:start --only firestore,auth\r\n\r\n# к·ңм№ҷ н…ҢмҠӨнҠё (CIмҷҖ лҸҷмқј)\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\ncd ..\r\n\r\n# л°°нҸ¬\r\nfirebase deploy --only firestore:rules,firestore:indexes\r\n```\r\n\r\n**мЈјмқҳ**: к·ңм№ҷ ліҖкІҪмқҖ мӢӨл°°нҸ¬ мҰүмӢң л°ҳмҳҒлҗ©лӢҲлӢӨ. л°ҳл“ңмӢң [testing.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing.md)мқҳ 34к°ң rules н…ҢмҠӨнҠё нҶөкіј нҷ•мқё нӣ„ л°°нҸ¬н•ҳм„ёмҡ”. кҙҖл Ё л°°кІҪ: [security.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/security.md).\r\n\r\n## 2. Cloud Storage Rules\r\n\r\n```bash\r\nfirebase deploy --only storage\r\n```\r\n\r\nStorage к·ңм№ҷмқҖ `storage.rules` нҢҢмқј. мӮ¬мҡ©мһҗ м—…лЎңл“ң(н”„лЎңн•„ мӮ¬м§„, кІҢмӢңкёҖ мқҙлҜём§Җ) кІҪлЎңлҘј кҙҖлҰ¬н•©лӢҲлӢӨ.\r\n\r\n## 3. Cloud Functions\r\n\r\n```bash\r\ncd functions\r\nnpm install\r\ncd ..\r\n\r\nfirebase deploy --only functions\r\n# нҠ№м • н•ЁмҲҳл§Ң\r\nfirebase deploy --only functions:kakaoCustomAuth\r\n```\r\n\r\nл°°нҸ¬ м „ мІҙнҒ¬:\r\n- `functions/index.js` м—җм„ң нҷҳкІҪ ліҖмҲҳ н•„мҡ” м—¬л¶Җ (мҳҲ: `firebase functions:config:set kakao.secret=\"...\"`). лӢЁ, v2 FunctionsлҠ” `secrets`/`params` л°©мӢқлҸ„ к°ҖлҠҘ.\r\n- Blaze мҡ”кёҲм ң н•„мҲҳ (мҷёл¶Җ л„ӨнҠёмӣҢнҒ¬ нҳём¶ң вҖ” Kakao API л“ұ)\r\n\r\nFunctions лӘ©лЎқмқҖ [architecture-overview.md](./docs/guides/architecture-overview.md#cloud-functions-нҠёлҰ¬кұ°-л§ө) м°ёмЎ°.\r\n\r\n## 4. Flutter лӘЁл°”мқј м•ұ\r\n\r\n### 4.1 лЎңм»¬ мӢӨн–үмҡ© нҢҢмқј мғқм„ұ\r\n\r\nCIк°Җ лҚ”лҜёлЎң лҢҖмІҙн•ҳлҠ” м„ё нҢҢмқјм—җ мӢӨм ң к°’ мЈјмһ…:\r\n\r\n- `lib/api/nies_api_keys.dart` вҖ” NEIS API нӮӨ\r\n- `lib/firebase_options.dart` вҖ” `flutterfire configure` лЎң мһҗлҸҷ мғқм„ұ\r\n- `lib/api/kakao_keys.dart` вҖ” Kakao л„ӨмқҙнӢ°лёҢ м•ұ нӮӨ\r\n- `android/app/google-services.json`\r\n- `ios/Runner/GoogleService-Info.plist`\r\n\r\n### 4.2 Android лҰҙлҰ¬мҰҲ\r\n\r\n```bash\r\n# л””лІ„к·ё APK\r\nflutter build apk --debug --target-platform android-arm64\r\n\r\n# лҰҙлҰ¬мҰҲ APK (м„ңлӘ… н•„мҡ”)\r\nflutter build apk --release\r\n\r\n# App Bundle (Play Store м—…лЎңл“ң)\r\nflutter build appbundle --release\r\n```\r\n\r\n**м„ңлӘ…**: `android/key.properties` + нӮӨмҠӨнҶ м–ҙ нҢҢмқј мӨҖл№„. Play Consoleм—җм„ң \"Internal testing вҶ’ Production\" мҲңм„ңлЎң мҠ№кІ©.\r\n\r\n**APK нҒ¬кё°**: м•Ҫ 27 MB (universal).\r\n\r\n### 4.3 iOS лҰҙлҰ¬мҰҲ\r\n\r\n```bash\r\n# лІҲнҳё мҳ¬лҰ¬кё°\r\n# pubspec.yaml: version: 1.0.0+2 вҶ’ 1.0.1+3\r\n\r\nflutter build ipa --release\r\n```\r\n\r\nXcode Archive вҶ’ App Store Connect м—…лЎңл“ң. TestFlight нҷ•мқё нӣ„ App Store мӢ¬мӮ¬.\r\n\r\n**App Groups**: iOS нҷҲ мң„м Ҝ лҚ°мқҙн„° кіөмң м—җ н•„мҡ”. `Runner` + `Widget*` нғҖкІҹ лӘЁл‘җ лҸҷмқј App Group м¶”к°Җ.\r\n\r\n### 4.4 лІ„м „ м •мұ…\r\n\r\n`pubspec.yaml` мқҳ `version: X.Y.Z+B` лҘј мҳ¬лҰ¬кі , Firestore `app_config/version` л¬ём„ңлҘј н•Ёк»ҳ м—…лҚ°мқҙнҠё:\r\n\r\n```json\r\n{\r\n  \"latest\": \"1.0.3+10\",\r\n  \"minimum\": \"1.0.1+5\",\r\n  \"requiredNote\": \"мЈјмҡ” ліҙм•Ҳ м—…лҚ°мқҙнҠё\"\r\n}\r\n```\r\n\r\n`minimum` лҜёл§ҢмқҖ н•„мҲҳ м—…лҚ°мқҙнҠё лӢӨмқҙм–јлЎңк·ё н‘ңмӢң ([public-features.md#м•ұ-м—…лҚ°мқҙнҠё--мҳӨн”„лқјмқё](./docs/features/public-features.md#м•ұ-м—…лҚ°мқҙнҠё--мҳӨн”„лқјмқё)).\r\n\r\n## 5. Admin Web (`/admin-web`)\r\n\r\n```bash\r\ncd admin-web\r\nnpm install\r\nnpm run dev   # лЎңм»¬\r\nnpm run build # н”„лЎңлҚ•м…ҳ л№Ңл“ң\r\nnpm start     # лЎңм»¬ мӢӨн–ү\r\n```\r\n\r\n### нҳёмҠӨнҢ… мҳөм…ҳ\r\n- **Vercel** (к¶ҢмһҘ): GitHub м—°лҸҷ вҶ’ мһҗлҸҷ л°°нҸ¬\r\n- **Firebase Hosting**: `firebase.json`м—җ `hosting` м„№м…ҳ м¶”к°Җ н•„мҡ” (нҳ„мһ¬ лҜём„Өм •)\r\n- **м…Җн”„ нҳёмҠӨнҢ…**: `npm run build` вҶ’ Node.js м„ңлІ„\r\n\r\n### нҷҳкІҪ ліҖмҲҳ\r\n- Firebase Client SDK м„Өм • (`NEXT_PUBLIC_FIREBASE_*`)\r\n- мқёмҰқлҗң admin мӮ¬мҡ©мһҗл§Ң м ‘к·јн•ҳлҸ„лЎқ нҺҳмқҙм§Җ к°Җл“ң кө¬нҳ„\r\n\r\n## 6. нҷҲ мң„м Ҝ\r\n\r\n### Android\r\n- `android/app/src/main/` н•ҳмң„м—җ AppWidgetProvider нҒҙлһҳмҠӨ\r\n- `home_widget` нҢЁнӮӨм§Җк°Җ Flutter вҶ” SharedPreferences вҶ” Java лёҢлҰҝм§Җ м ңкіө\r\n- мһҗм • к°ұмӢ : `AlarmManager` + `HomeWidgetBackgroundIntent`\r\n\r\n### iOS\r\n- `ios/Widget*` л””л үн„°лҰ¬ (WidgetKit)\r\n- App Groups м„Өм • н•„мҲҳ\r\n- Timeline 1мӢңк°„ мЈјкё° к°ұмӢ \r\n\r\nлі„лҸ„ л°°нҸ¬ л¶Ҳн•„мҡ” вҖ” м•ұ л№Ңл“ңм—җ нҸ¬н•Ёлҗ©лӢҲлӢӨ.\r\n\r\n## 7. нҷҳкІҪ ліҖмҲҳ / мӢңнҒ¬лҰҝ кҙҖлҰ¬\r\n\r\n| мҡ©лҸ„ | м ҖмһҘ мң„м№ҳ | л°°нҸ¬ мӢңм җ |\r\n|---|---|---|\r\n| NEIS API нӮӨ | `lib/api/nies_api_keys.dart` (лЎңм»¬) | м•ұ л№Ңл“ңм—җ м»ҙнҢҢмқј |\r\n| Firebase м„Өм • | `firebase_options.dart`, `google-services.json`, `GoogleService-Info.plist` | м•ұ л№Ңл“ң |\r\n| Kakao м•ұ нӮӨ | `lib/api/kakao_keys.dart` | м•ұ л№Ңл“ң |\r\n| Kakao кҙҖлҰ¬мһҗ нӮӨ (CF) | `firebase functions:config` лҳҗлҠ” Secret Manager | Functions л°°нҸ¬ |\r\n| Android м„ңлӘ… | `android/key.properties`, `.jks` | лЎңм»¬ л№Ңл“ң лЁёмӢ  |\r\n| iOS м„ңлӘ… | Xcode Automatic Signing / н”„лЎңл№„м ҖлӢқ н”„лЎңнҢҢмқј | лЎңм»¬ л№Ңл“ң лЁёмӢ  |\r\n\r\n**м ҲлҢҖ м»Өл°Ӣ кёҲм§Җ**: мӢӨм ң нӮӨ нҢҢмқјмқҖ `.gitignore` мІҳлҰ¬ нҷ•мқё. CIлҠ” лҚ”лҜё к°’мңјлЎң л№Ңл“ңл§Ң кІҖмҰқн•©лӢҲлӢӨ ([cicd-setup.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/cicd-setup.md)).\r\n\r\n## 8. мҲңм°Ё л°°нҸ¬ к¶ҢмһҘ мҲңм„ң\r\n\r\n```mermaid\r\ngraph LR\r\n    A[rules + indexes н…ҢмҠӨнҠё] --> B[rules + indexes л°°нҸ¬]\r\n    B --> C[Functions л°°нҸ¬]\r\n    C --> D[Storage к·ңм№ҷ л°°нҸ¬]\r\n    D --> E[Flutter м•ұ л№Ңл“ң]\r\n    E --> F[TestFlight / Internal Test]\r\n    F --> G[Production мҠ№кІ©]\r\n    D --> H[Admin Web л°°нҸ¬]\r\n    G --> I[app_config/version м—…лҚ°мқҙнҠё]\r\n```\r\n\r\nк·ңм№ҷ/FunctionsлҘј м•ұліҙлӢӨ **лЁјм Җ** л°°нҸ¬н•ҙм•ј кө¬ лІ„м „ м•ұмқҙ мғҲ к·ңм№ҷ н•ҳм—җм„ң к№Ём§Җм§Җ м•ҠмҠөлӢҲлӢӨ.\r\n\r\n## 9. 4лӢЁкі„ м—ӯн•  + кҙҖлҰ¬мһҗ лЎңк·ё л§Ҳмқҙк·ёл Ҳмқҙм…ҳ (1нҡҢм„ұ)\r\n\r\nмқҙлІҲ лҰҙлҰ¬мҰҲм—җм„ң лҸ„мһ…лҗң л°ұм—”л“ң ліҖкІҪ:\r\n\r\n- м—ӯн•  мІҙкі„: 3лӢЁкі„(user / manager / admin) вҶ’ 5лӢЁкі„(user / moderator / auditor / manager / admin)\r\n- `admin_logs`: `change_role`, `delete_comment` л“ұ 7мў… мӢ к·ң м•Ўм…ҳ + Admin Web `/admin-logs` л·°м–ҙ\r\n- мӢ к·ң м»¬л үм…ҳ: `appeals`, `data_requests`, `community_rules`\r\n\r\n### 9.1 л°°нҸ¬ мҲңм„ң\r\n\r\n1. `firestore.rules` л°°нҸ¬ вҖ” 4лӢЁкі„ н—¬нҚј(`isModerator` / `isAuditor` / `isStaff`) + мӢ к·ң м»¬л үм…ҳ к·ңм№ҷ\r\n2. `firestore.indexes.json` л°°нҸ¬ вҖ” `admin_logs` / `appeals` / `data_requests` мқёлҚұмҠӨ\r\n3. Cloud Functions л°°нҸ¬ (ліҖкІҪмқҙ мһҲлҠ” кІҪмҡ°)\r\n4. Flutter м•ұ л№Ңл“ң вҶ’ TestFlight / Internal вҶ’ Production мҠ№кІ©\r\n5. Admin Web л°°нҸ¬ (Vercel мһҗлҸҷ)\r\n\r\nмҲңм„ңлҘј м§ҖнӮӨм§Җ м•Ҡмңјл©ҙ кө¬лІ„м „ м•ұмқҙ мӢ к·ң к·ңм№ҷ н•ҳм—җм„ң к№Ём§Ҳ мҲҳ мһҲмҠөлӢҲлӢӨ.\r\n\r\n### 9.2 кё°мЎҙ мӮ¬мҡ©мһҗ мІҳлҰ¬\r\n\r\n- `role` лҲ„лқҪ мӮ¬мҡ©мһҗлҠ” Firestore Rulesм—җм„ң мһҗлҸҷмңјлЎң `'user'`лЎң мІҳлҰ¬лҗҳлҜҖлЎң л°ұн•„ л¶Ҳн•„мҡ”\r\n- н•ҷмғқнҡҢ мһ„мӣҗ/к°җмӮ¬мһҗм—җкІҢ мӢ к·ң м—ӯн•  л¶Җм—¬:\r\n  - admin кі„м •мңјлЎң Admin Web `/users` м ‘мҶҚ вҶ’ мӮ¬мҡ©мһҗ н–үмқҳ л“ңлЎӯлӢӨмҡҙм—җм„ң `moderator` / `auditor` м§Җм •\r\n  - ліҖкІҪ мӢң `admin_logs`м—җ `change_role` м•Ўм…ҳмқҙ мһҗлҸҷмңјлЎң кё°лЎқлҗЁ (`previousRole` / `newRole` нҸ¬н•Ё)\r\n\r\n### 9.3 Blaze мҡ”кёҲм ң + TTL м •мұ…\r\n\r\n`admin_logs`, `appeals`, `data_requests` л¬ём„ңлҠ” лӘЁл‘җ `expiresAt` н•„л“ң(мғқм„ұ + 30мқј)лҘј нҸ¬н•Ён•©лӢҲлӢӨ. Blaze мҡ”кёҲм ңм—җм„ңлҠ” Firestore TTL м •мұ…мңјлЎң мһҗлҸҷ мӮӯм ң к°ҖлҠҘ:\r\n\r\n- Firebase Console вҶ’ Firestore вҶ’ мқёлҚұмҠӨ вҶ’ TTL нғӯ\r\n- м»¬л үм…ҳлі„ `expiresAt` н•„л“ң м§Җм •\r\n\r\nSpark мҡ”кёҲм ңм—җм„ңлҠ” TTLмқҙ мһ‘лҸҷн•ҳм§Җ м•ҠмңјлҜҖлЎң мЈјкё°м Ғ мҲҳлҸҷ м •лҰ¬ лҳҗлҠ” Cloud Functions мҠӨмјҖмӨ„лҹ¬ н•„мҡ”.\r\n\r\n### 9.4 кІҖмҰқ мӢңлӮҳлҰ¬мҳӨ\r\n\r\nл°°нҸ¬ нӣ„ лӢӨмқҢмқ„ нҷ•мқё:\r\n\r\n- **moderator кі„м •**: кІҢмӢңкёҖ/лҢ“кёҖ мӮӯм ң к°ҖлҠҘ, `/users` л©”лүҙ л№„н‘ңмӢң, `admin_logs`м—җ м•Ўм…ҳ кё°лЎқ нҷ•мқё\r\n- **auditor кі„м •**: `/admin-logs`, `/dashboard`, `/crashes` мқҪкё° к°ҖлҠҘ, лӘЁл“  м“°кё° лҸҷмһ‘ м°ЁлӢЁ нҷ•мқё\r\n- **admin м—ӯн•  ліҖкІҪ**: мқјл°ҳ мӮ¬мҡ©мһҗ вҶ’ moderatorлЎң ліҖкІҪ вҶ’ `admin_logs`м—җ `change_role` + `previousRole='user'` / `newRole='moderator'` кё°лЎқ нҷ•мқё\r\n- **Admin Web `/admin-logs`**: м•Ўм…ҳ к·ёлЈ№ н•„н„°(м „мІҙ / м—ӯн•  ліҖкІҪ / мӮӯм ң / кі„м • / кё°нғҖ) м •мғҒ лҸҷмһ‘, кІҖмғүмңјлЎң кҙҖлҰ¬мһҗ/лҢҖмғҒмһҗ мқҙлҰ„ н•„н„°л§Ғ\r\n\r\n## 10. лЎӨл°ұ\r\n\r\n- **Rules**: `git revert` + `firebase deploy --only firestore:rules` мһ¬л°°нҸ¬\r\n- **Functions**: мқҙм „ м»Өл°Ӣ checkout нӣ„ `firebase deploy --only functions:<name>`\r\n- **App**: мҠӨнҶ м–ҙ мӢ¬мӮ¬ кұ°м Ҳ мғҒнғңлқјл©ҙ л№Ңл“ң лІ„м „ лӮҙлҰј. мқҙлҜё лҰҙлҰ¬мҰҲлҗң кІҪмҡ° кёҙкёү нҢЁм№ҳ лҰҙлҰ¬мҰҲ н•„мҡ”\r\n- **Admin Web**: VercelмқҖ мқҙм „ л°°нҸ¬ promote к°ҖлҠҘ\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [CI/CD м„Өм •](https://monkshark.github.io/hansol_hs_flutter_app/#guides/cicd-setup.md)\r\n- [ліҙм•Ҳ лӘЁлҚё](https://monkshark.github.io/hansol_hs_flutter_app/#guides/security.md)\r\n- [м•„нӮӨн…ҚмІҳ к°ңмҡ”](https://monkshark.github.io/hansol_hs_flutter_app/#guides/architecture-overview.md)\r\n- [кё°м—¬ к°Җмқҙл“ң](./CONTRIBUTING.md)\r\n","DEPLOY_en.md":"# Deployment Guide\r\n\r\n> н•ңкөӯм–ҙ: [DEPLOY.md](./DEPLOY.md)\r\n\r\nCovers four deployment tracks: Firebase backend, Flutter mobile app, Next.js Admin Web, and home widgets (Android/iOS). All commands assume the repo root as CWD.\r\n\r\n## Prerequisites\r\n\r\n### Required Tools\r\n- Firebase CLI: `npm install -g firebase-tools` вҶ’ `firebase login`\r\n- Flutter stable + Xcode (iOS) + Android Studio / JDK 17\r\n- Node 20+\r\n- (Optional) Vercel CLI for Admin Web hosting\r\n\r\n### Firebase Project Setup\r\n\r\n`firebase.json` core:\r\n\r\n```json\r\n{\r\n  \"storage\":   { \"rules\": \"storage.rules\" },\r\n  \"firestore\": { \"rules\": \"firestore.rules\", \"indexes\": \"firestore.indexes.json\" },\r\n  \"functions\": [{ \"source\": \"functions\", \"codebase\": \"default\" }],\r\n  \"emulators\": { \"firestore\": { \"port\": 8080 }, \"auth\": { \"port\": 9099 } }\r\n}\r\n```\r\n\r\nSelect target project via `firebase use <project-id>`.\r\n\r\n## 1. Firestore Rules & Indexes\r\n\r\n```bash\r\n# local emulator\r\nfirebase emulators:start --only firestore,auth\r\n\r\n# rules tests (same as CI)\r\ncd tests/firestore-rules\r\nnpm install\r\nfirebase emulators:exec --only firestore,auth --project hansol-test \"npm test\"\r\ncd ..\r\n\r\n# deploy\r\nfirebase deploy --only firestore:rules,firestore:indexes\r\n```\r\n\r\n**Warning**: Rules changes take effect immediately. Always run the 34 rules tests ([testing_en.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/testing_en.md)) before deploying. Background: [security_en.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/security_en.md).\r\n\r\n## 2. Cloud Storage Rules\r\n\r\n```bash\r\nfirebase deploy --only storage\r\n```\r\n\r\nRules live in `storage.rules`. They govern user uploads (profile pictures, post images).\r\n\r\n## 3. Cloud Functions\r\n\r\n```bash\r\ncd functions\r\nnpm install\r\ncd ..\r\n\r\nfirebase deploy --only functions\r\n# specific function\r\nfirebase deploy --only functions:kakaoCustomAuth\r\n```\r\n\r\nPre-flight:\r\n- Check if `functions/index.js` needs env vars (e.g. `firebase functions:config:set kakao.secret=\"...\"`, or use v2 `secrets`/`params`)\r\n- **Blaze plan required** (outbound network вҖ” Kakao API)\r\n\r\nFunction list вҶ’ [architecture-overview_en.md](./docs/guides/architecture-overview_en.md#cloud-functions-trigger-map).\r\n\r\n## 4. Flutter Mobile App\r\n\r\n### 4.1 Local Secret Files\r\n\r\nThree files the CI stubs out with dummies вҖ” inject real values:\r\n\r\n- `lib/api/nies_api_keys.dart` вҖ” NEIS API key\r\n- `lib/firebase_options.dart` вҖ” generated by `flutterfire configure`\r\n- `lib/api/kakao_keys.dart` вҖ” Kakao native app key\r\n- `android/app/google-services.json`\r\n- `ios/Runner/GoogleService-Info.plist`\r\n\r\n### 4.2 Android Release\r\n\r\n```bash\r\n# debug APK\r\nflutter build apk --debug --target-platform android-arm64\r\n\r\n# release APK (signed)\r\nflutter build apk --release\r\n\r\n# App Bundle (Play Store upload)\r\nflutter build appbundle --release\r\n```\r\n\r\n**Signing**: set up `android/key.properties` + keystore. Promote through Play Console \"Internal testing вҶ’ Production\".\r\n\r\n**APK size**: ~27 MB (universal).\r\n\r\n### 4.3 iOS Release\r\n\r\n```bash\r\n# bump version, e.g. pubspec.yaml: 1.0.0+2 вҶ’ 1.0.1+3\r\nflutter build ipa --release\r\n```\r\n\r\nXcode Archive вҶ’ upload to App Store Connect вҶ’ TestFlight вҶ’ App Review.\r\n\r\n**App Groups**: required for iOS home widget data sharing. Add the same App Group to both `Runner` and `Widget*` targets.\r\n\r\n### 4.4 Versioning\r\n\r\nBump `version: X.Y.Z+B` in `pubspec.yaml` and update Firestore `app_config/version`:\r\n\r\n```json\r\n{\r\n  \"latest\": \"1.0.3+10\",\r\n  \"minimum\": \"1.0.1+5\",\r\n  \"requiredNote\": \"Important security update\"\r\n}\r\n```\r\n\r\nAnything below `minimum` shows a blocking update dialog ([public-features_en.md#app-update--offline](./docs/features/public-features_en.md#app-update--offline)).\r\n\r\n## 5. Admin Web (`/admin-web`)\r\n\r\n```bash\r\ncd admin-web\r\nnpm install\r\nnpm run dev   # local\r\nnpm run build # production build\r\nnpm start     # run locally\r\n```\r\n\r\n### Hosting Options\r\n- **Vercel** (recommended): GitHub integration, auto-deploy\r\n- **Firebase Hosting**: add `hosting` section to `firebase.json` (currently unset)\r\n- **Self-hosted**: `npm run build` вҶ’ Node.js server\r\n\r\n### Environment Variables\r\n- Firebase client SDK (`NEXT_PUBLIC_FIREBASE_*`)\r\n- Page guards enforce admin-only access\r\n\r\n## 6. Home Widgets\r\n\r\n### Android\r\n- `AppWidgetProvider` classes under `android/app/src/main/`\r\n- `home_widget` package bridges Flutter вҶ” SharedPreferences вҶ” Java\r\n- Midnight refresh: `AlarmManager` + `HomeWidgetBackgroundIntent`\r\n\r\n### iOS\r\n- `ios/Widget*` directory (WidgetKit)\r\n- App Groups required\r\n- 1-hour Timeline refresh\r\n\r\nNo separate deployment вҖ” widgets ship with the app.\r\n\r\n## 7. Secrets Management\r\n\r\n| Purpose | Location | Injection point |\r\n|---|---|---|\r\n| NEIS API key | `lib/api/nies_api_keys.dart` (local) | compiled into app build |\r\n| Firebase config | `firebase_options.dart`, `google-services.json`, `GoogleService-Info.plist` | app build |\r\n| Kakao app key | `lib/api/kakao_keys.dart` | app build |\r\n| Kakao admin key (CF) | `firebase functions:config` or Secret Manager | Functions deploy |\r\n| Android signing | `android/key.properties`, `.jks` | local build machine |\r\n| iOS signing | Xcode Automatic Signing / provisioning profile | local build machine |\r\n\r\n**Never commit real keys.** Verify `.gitignore`. CI only validates builds with dummy values ([cicd-setup_en.md](https://monkshark.github.io/hansol_hs_flutter_app/#guides/cicd-setup_en.md)).\r\n\r\n## 8. Recommended Deploy Order\r\n\r\n```mermaid\r\ngraph LR\r\n    A[test rules + indexes] --> B[deploy rules + indexes]\r\n    B --> C[deploy Functions]\r\n    C --> D[deploy Storage rules]\r\n    D --> E[build Flutter app]\r\n    E --> F[TestFlight / Internal Test]\r\n    F --> G[promote to Production]\r\n    D --> H[deploy Admin Web]\r\n    G --> I[update app_config/version]\r\n```\r\n\r\nDeploy rules and Functions **before** the app so old clients don't break under new rules.\r\n\r\n## 9. Four-Tier Role + Admin Logs Migration (one-time)\r\n\r\nThis release introduces several backend changes:\r\n\r\n- Role tiers: 3-tier (user / manager / admin) вҶ’ 5-tier (user / moderator / auditor / manager / admin)\r\n- `admin_logs`: 7 new action types (`change_role`, `delete_comment`, etc.) plus a new Admin Web `/admin-logs` viewer\r\n- New collections: `appeals`, `data_requests`, `community_rules`\r\n\r\n### 9.1 Deploy order\r\n\r\n1. `firestore.rules` вҖ” adds 4-tier helpers (`isModerator` / `isAuditor` / `isStaff`) and rules for the new collections\r\n2. `firestore.indexes.json` вҖ” indexes for `admin_logs` / `appeals` / `data_requests`\r\n3. Cloud Functions (if changed)\r\n4. Flutter app: TestFlight / Internal вҶ’ promote to Production\r\n5. Admin Web (Vercel auto-deploy)\r\n\r\nDeploy in this order вҖ” old clients can break under new rules if you skip ahead.\r\n\r\n### 9.2 Existing user handling\r\n\r\n- Users without a `role` field are treated as `'user'` by Firestore Rules вҖ” no backfill required\r\n- Granting new roles to student council officers / auditors:\r\n  - As `admin`, open Admin Web `/users` вҶ’ use the dropdown on each user row to assign `moderator` / `auditor`\r\n  - The change is auto-logged in `admin_logs` as `change_role` (with `previousRole` / `newRole`)\r\n\r\n### 9.3 Blaze plan + TTL policy\r\n\r\n`admin_logs`, `appeals`, `data_requests` documents all carry an `expiresAt` field set to creation + 30 days. On the Blaze plan you can have Firestore auto-delete them via TTL:\r\n\r\n- Firebase Console вҶ’ Firestore вҶ’ Indexes вҶ’ TTL tab\r\n- Specify the `expiresAt` field per collection\r\n\r\nTTL does not run on the Spark plan вҖ” fall back to periodic manual cleanup or a Cloud Functions scheduler.\r\n\r\n### 9.4 Verification scenarios\r\n\r\nAfter deploy, confirm:\r\n\r\n- **moderator account**: can delete posts/comments, `/users` menu hidden, action recorded in `admin_logs`\r\n- **auditor account**: can read `/admin-logs`, `/dashboard`, `/crashes`; all writes blocked\r\n- **admin role change**: change a regular user вҶ’ moderator вҶ’ `admin_logs` shows `change_role` with `previousRole='user'` / `newRole='moderator'`\r\n- **Admin Web `/admin-logs`**: action group filter (all / role / delete / account / other) works; search filters by admin/target name\r\n\r\n## 10. Rollback\r\n\r\n- **Rules**: `git revert` + `firebase deploy --only firestore:rules`\r\n- **Functions**: checkout previous commit вҶ’ `firebase deploy --only functions:<name>`\r\n- **App**: pull build from review if still pending. Released builds need an emergency patch release.\r\n- **Admin Web**: Vercel lets you promote a previous deploy.\r\n\r\n## Related Docs\r\n- [CI/CD Setup](https://monkshark.github.io/hansol_hs_flutter_app/#guides/cicd-setup_en.md)\r\n- [Security Model](https://monkshark.github.io/hansol_hs_flutter_app/#guides/security_en.md)\r\n- [Architecture Overview](https://monkshark.github.io/hansol_hs_flutter_app/#guides/architecture-overview_en.md)\r\n- [Contributing Guide](./CONTRIBUTING_en.md)\r\n","features/admin-features.md":"# кҙҖлҰ¬мһҗ кё°лҠҘ (Flutter Admin + Next.js Admin Web)\r\n\r\n> English: [admin-features_en.md](./admin-features_en.md)\r\n\r\n`manager` / `admin` / `moderator` / `auditor` м—ӯн•  мӮ¬мҡ©мһҗлҘј мң„н•ң кҙҖлҰ¬ кё°лҠҘмһ…лӢҲлӢӨ. Flutter м•ұ лӮҙ Admin нҷ”л©ҙкіј лі„лҸ„ Next.js лҢҖмӢңліҙл“ң л‘җ мұ„л„җлЎң м ңкіөлҗ©лӢҲлӢӨ.\r\n\r\n## м—ӯн•  мІҙкі„\r\n\r\n| м—ӯн•  | к¶Ңн•ң лІ”мң„ |\r\n|---|---|\r\n| `user` | мқјл°ҳ кё°лҠҘ |\r\n| `moderator` | кІҢмӢңкёҖ/лҢ“кёҖ мӮӯм ң, мӢ кі  мқҪкё°/мІҳлҰ¬, `admin_logs` кё°лЎқ. мӮ¬мҡ©мһҗ кҙҖлҰ¬В·лҢҖмӢңліҙл“ң/нҶөкі„В·м„Өм •В·кұҙмқҳмӮ¬н•ӯ м ‘к·ј л¶Ҳк°Җ |\r\n| `auditor` | мқҪкё° м „мҡ©. `admin_logs`, нҶөкі„, мӢ кі , кұҙмқҳмӮ¬н•ӯ, `crash_logs`, `function_logs` м—ҙлһҢ к°ҖлҠҘ. мӮӯм ң л°Ҹ `admin_logs` кё°лЎқ л¶Ҳк°Җ |\r\n| `manager` | мӮ¬мҡ©мһҗ кҙҖлҰ¬ + лӘЁл“  мқјл°ҳ кё°лҠҘ (admin мһ„лӘ… м ңмҷё) |\r\n| `admin` | лӘЁл“  к¶Ңн•ң (лӢӨлҘё admin мһ„лӘ… нҸ¬н•Ё) |\r\n\r\n**кІҖмҰқ мң„м№ҳ**: `firestore.rules`мқҳ `isAdmin()` / `isAdminOrManager()` / `isModerator()` / `isAuditor()` / `isStaff()` н—¬нҚј. Cloud FunctionsлҠ” нҳём¶ң мӢң Firestore `role` н•„л“ң мһ¬нҷ•мқё.\r\n\r\n## Flutter Admin нҷ”л©ҙ\r\n\r\n**м§„мһ…**: м„Өм • вҶ’ кҙҖлҰ¬мһҗ (staff м—ӯн• л§Ң н‘ңмӢң)\r\n\r\n### ExpansionTile кё°л°ҳ нғӯ кө¬мЎ°\r\n\r\nм—ӯн• лі„лЎң м ‘к·ј к°ҖлҠҘн•ң м„№м…ҳмқҙ лӢӨлҰ…лӢҲлӢӨ. лӢ«нһҢ нғӯмқҖ child л ҢлҚ” м•Ҳ н•ЁмңјлЎң Firestore мқҪкё° 0 ([кё°мҲ кіјм ң #9](../guides/technical-challenges.md#9-кҙҖлҰ¬мһҗ-нҷ”л©ҙ-firestore-мқҪкё°-кіјлӢӨ-stream--future-м „нҷҳ))\r\n\r\n| нғӯ | лӮҙмҡ© | м ‘к·ј к°ҖлҠҘ м—ӯн•  |\r\n|---|---|---|\r\n| **мҠ№мқё лҢҖкё°** | `approved: false` мӮ¬мҡ©мһҗ лӘ©лЎқ вҶ’ мҠ№мқё/кұ°м Ҳ | manager, admin |\r\n| **м •м§Җ** | м •м§Җ кё°к°„ м„Өм • (1мӢңк°„~30мқј) / мҰүмӢң н•ҙм ң | manager, admin |\r\n| **мӮ¬мҡ©мһҗ** | м „мІҙ кІҖмғү, м—ӯн•  ліҖкІҪ, мғҒм„ё ліҙкё° | manager, admin |\r\n| **мӢ кі ** | мӢ кі лҗң кёҖ/лҢ“кёҖ лӘ©лЎқ, мӮӯм ң мІҳлҰ¬ | moderator, auditor (мқҪкё° м „мҡ©), manager, admin |\r\n| **мӮӯм ң лЎңк·ё** | `admin_logs` мөңк·ј м•Ўм…ҳ | moderator, auditor (мқҪкё° м „мҡ©), manager, admin |\r\n| **кұҙмқҳмӮ¬н•ӯ** | мғҒнғң ліҖкІҪ (лҢҖкё° вҶ’ нҷ•мқё вҶ’ н•ҙкІ°) | auditor (мқҪкё° м „мҡ©), manager, admin |\r\n| **мқҙмқҳм ңкё°** | м •м§Җ мӮ¬мҡ©мһҗк°Җ м ңм¶ңн•ң мқҙмқҳм ңкё°(`appeals`) кІҖнҶ /мғҒнғң ліҖкІҪ | manager, admin |\r\n| **лҚ°мқҙн„° мҡ”мІӯ** | мӮ¬мҡ©мһҗк°Җ м ңм¶ңн•ң лҚ°мқҙн„° мқҙм „к¶Ң/м—ҙлһҢк¶Ң мҡ”мІӯ(`data_requests`) мІҳлҰ¬ | manager, admin |\r\n| **м»Өл®ӨлӢҲнӢ° к·ңм •** | `community_rules` лІ„м „ л°ңн–ү/мҲҳм • | manager, admin |\r\n\r\n### м•Ўм…ҳ нӣ„ мҲҳлҸҷ к°ұмӢ \r\n\r\n- `StreamBuilder` лҢҖмӢ  `FutureBuilder` вҶ’ м•Ўм…ҳ нӣ„ `_refresh()` нҳём¶ң\r\n- **кІ°кіј**: нҷ”л©ҙ м—ҙ л•Ң 130+ мқҪкё° вҶ’ 20~30мңјлЎң к°җмҶҢ\r\n\r\n**м—ӯн•  л°°м§Җ мғүмғҒ**: moderator = teal, auditor = purple\r\n\r\n**м—ӯн•  ліҖкІҪ UI**: `users_tab.dart`м—җм„ң нҶ кёҖ лІ„нҠј лҢҖмӢ  л“ңлЎӯлӢӨмҡҙмңјлЎң м—ӯн•  м„ нғқ\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/board/admin_screen.dart`, `lib/screens/board/admin/users_tab.dart`\r\n\r\n## Next.js Admin Web (`/admin-web`)\r\n\r\nмӣ№ лёҢлқјмҡ°м Җм—җм„ң м ‘мҶҚ к°ҖлҠҘн•ң лі„лҸ„ лҢҖмӢңліҙл“ң. лҸҷмқј FirestoreлҘј кіөмң н•ҳл©° лӘЁл“  staff м—ӯн• (admin/manager/moderator/auditor)мқҙ лЎңк·ёмқё к°ҖлҠҘ. мӮ¬мқҙл“ңл°” л©”лүҙлҠ” `canAccess()`лҘј нҶөн•ҙ м—ӯн• лі„лЎң н•„н„°л§Ғлҗ©лӢҲлӢӨ.\r\n\r\n### нҺҳмқҙм§Җ кө¬м„ұ\r\n\r\n`admin-web/app/` н•ҳмң„:\r\n\r\n| кІҪлЎң | лӮҙмҡ© |\r\n|---|---|\r\n| `dashboard/` | нҶөкі„ м№ҙл“ң (мӮ¬мҡ©мһҗ мҲҳ, мӢ кі  мҲҳ, лҢҖкё° кұҙ л“ұ) |\r\n| `users/` | мӮ¬мҡ©мһҗ кІҖмғү/н•„н„°/мҠ№мқё/м •м§Җ/м—ӯн•  ліҖкІҪ |\r\n| `posts/` | кІҢмӢңкёҖ кІҖмғү/мӮӯм ң |\r\n| `comments/` | лҢ“кёҖ лӘЁлҚ”л Ҳмқҙм…ҳ |\r\n| `reports/` | мӢ кі  нҒҗ мІҳлҰ¬ |\r\n| `feedbacks/` | кұҙмқҳмӮ¬н•ӯ мғҒнғң ліҖкІҪ |\r\n| `crashes/` | Crashlytics лЎңк·ё Firestore лҜёлҹ¬ мЎ°нҡҢ |\r\n| `function-logs/` | Cloud Functions мҳӨлҘҳ лЎңк·ё (`function_logs` м»¬л үм…ҳ) |\r\n| `appeals/` | мқҙмқҳм ңкё° кІҖнҶ  (`appeals`) |\r\n| `data-requests/` | лҚ°мқҙн„° мқҙм „к¶Ң/м—ҙлһҢк¶Ң мҡ”мІӯ (`data_requests`) |\r\n| `community-rules/` | к·ңм • лІ„м „ л°ңн–ү (`community_rules`) |\r\n| `admin-logs/` | `admin_logs` м „мІҙ мЎ°нҡҢ вҖ” м•Ўм…ҳ к·ёлЈ№ н•„н„°(м—ӯн•  ліҖкІҪ/мӮӯм ң/кі„м •/кё°нғҖ) + кІҖмғү (лӘЁл“  staff м—ҙлһҢ) |\r\n| `settings/` | кёҙкёү нҢқм—… кіөм§Җ, м•ұ лІ„м „ (`app_config`) |\r\n\r\n### кіөнҶө UX\r\n\r\n- **лӢӨнҒ¬ лӘЁл“ң** нҶ кёҖ, лӘЁл°”мқј л°ҳмқ‘нҳ•\r\n- **мқөлӘ… вҶ’ мӢӨлӘ… нҷ•мқё** (adminл§Ң, к°җмӮ¬ лЎңк·ё лӮЁк№Җ)\r\n- **к°җмӮ¬ лЎңк·ё кё°лЎқ**: лӘЁл“  кҙҖлҰ¬ н–үмң„ (`admin_logs`)\r\n\r\n### AdminShell л Ҳмқҙм•„мӣғ\r\n\r\n`AdminShell` (`admin-web/components/AdminShell.tsx`)мқҙ мӮ¬мқҙл“ңл°” + мҪҳн…җмё  мҳҒм—ӯмқ„ нҶөн•© лһҳн•‘н•©лӢҲлӢӨ. лЎңк·ёмқё/нҷҲ кІҪлЎң(`/`, `/login`)лҠ” мһҗлҸҷмңјлЎң мҡ°нҡҢлҗҳм–ҙ мқёмҰқ нҷ”л©ҙм—җм„ңлҠ” мӮ¬мқҙл“ңл°”к°Җ мҲЁкІЁм§‘лӢҲлӢӨ. лӘЁл“  кҙҖлҰ¬ нҺҳмқҙм§ҖлҠ” `app/layout.tsx`м—җм„ң н•ң лІҲл§Ң лһҳн•‘лҗҳлҜҖлЎң нҺҳмқҙм§Җлі„лЎң мӮ¬мқҙл“ңл°” importк°Җ н•„мҡ” м—ҶмҠөлӢҲлӢӨ.\r\n\r\n### мәҗмӢң л Ҳмқҙм–ҙ (`lib/cache.ts`)\r\n\r\nнҺҳмқҙм§Җ м „нҷҳ мӢң лҸҷмқј Firestore мҝјлҰ¬лҘј мһ¬мӢӨн–үн•ҳм§Җ м•ҠлҸ„лЎқ мқёл©”лӘЁлҰ¬ мәҗмӢң + м§„н–ү мӨ‘ мҡ”мІӯ dedupмқ„ м ңкіөн•©лӢҲлӢӨ.\r\n\r\n- `useCached(key, fetcher, { ttlMs })` вҖ” TTL(кё°ліё 60мҙҲ) лӮҙм—җлҠ” мәҗмӢң нһҲнҠё, л§ҢлЈҢ мӢң мһ¬мҡ”мІӯ\r\n- **In-flight dedup** вҖ” к°ҷмқҖ нӮӨлЎң лҸҷмӢңм—җ м—¬лҹ¬ нҳём¶ңмқҙ л°ңмғқн•ҙлҸ„ лӢЁмқј fetchл§Ң мӢӨн–үлҗҳкі  кІ°кіјлҘј кіөмң  (мҳҲ: мӮ¬мқҙл“ңл°” мӮ¬мҡ©мһҗ м№ҙмҡҙнҠёмҷҖ лҢҖмӢңліҙл“ң м№ҙл“ңк°Җ лҸҷмқј нӮӨ мӮ¬мҡ© мӢң 1нҡҢл§Ң мқҪмқҢ)\r\n- `invalidateCache(prefix)` вҖ” м•Ўм…ҳ нӣ„ нҠ№м • prefixл§Ң л¬ҙнҡЁнҷ” (мҳҲ: м •м§Җ нӣ„ `users` мәҗмӢңл§Ң л№„мҡ°кё°)\r\n- `setData(updater)` вҖ” лӮҷкҙҖм Ғ м—…лҚ°мқҙнҠё мӢң мәҗмӢңк№Ңм§Җ н•Ёк»ҳ к°ұмӢ \r\n\r\n**нҡЁкіј**: мӮ¬мқҙл“ңл°”/лҢҖмӢңліҙл“ң лҸҷмӢң м ‘к·ј мӢң Firestore мқҪкё° м•Ҫ м Ҳл°ҳ м Ҳк°җ. 5л¶„ мқҙлӮҙ мһ¬л°©л¬ёмқҖ кұ°мқҳ 0нҡҢ м¶”к°Җ мқҪкё°.\r\n\r\n**кҙҖл Ё нҢҢмқј**: `admin-web/app/`, `admin-web/components/AdminShell.tsx`, `admin-web/components/Sidebar.tsx`, `admin-web/lib/cache.ts`\r\n\r\n## к°җмӮ¬ лЎңк·ё (`admin_logs`)\r\n\r\nлӘЁл“  кҙҖлҰ¬ м•Ўм…ҳмқҖ `admin_logs` м»¬л үм…ҳм—җ кё°лЎқлҗ©лӢҲлӢӨ. н•„л“ңлҠ” м•Ўм…ҳ мў…лҘҳлі„лЎң лӢӨлҘҙл©°, 30мқј нӣ„ мһҗлҸҷ мӮӯм ң(`expiresAt` TTL).\r\n\r\n### кіөнҶө н•„л“ң\r\n\r\n| н•„л“ң | м„ӨлӘ… |\r\n|---|---|\r\n| `action` | м•„лһҳ м•Ўм…ҳ мў…лҘҳ |\r\n| `adminUid`, `adminName` | м•Ўм…ҳ мҲҳн–үмһҗ |\r\n| `createdAt` | м„ңлІ„ нғҖмһ„мҠӨнғ¬н”„ |\r\n| `expiresAt` | `createdAt + 30мқј` (TTL м •мұ…) |\r\n\r\n### м•Ўм…ҳ мў…лҘҳлі„ м¶”к°Җ н•„л“ң\r\n\r\n| `action` | м¶”к°Җ н•„л“ң | кё°лЎқ мң„м№ҳ |\r\n|---|---|---|\r\n| `change_role` | `targetUid`, `targetName`, `previousRole`, `newRole` | Flutter `users_tab.dart`, Web `users/page.tsx` |\r\n| `approve_user` / `reject_user` | `targetUid`, `targetName` | Flutter, Web |\r\n| `suspend_user` | `targetUid`, `targetName`, `hours` | Flutter, Web |\r\n| `unsuspend_user` | `targetUid`, `targetName` | Flutter, Web |\r\n| `delete_user` | `targetUid`, `targetName` | Flutter, Web |\r\n| `delete_post` | `postId`, `postTitle`, `postAuthorUid`, `postAuthorName` | Flutter `post_detail_actions_mixin.dart`, Web `posts/` |\r\n| `delete_comment` | `postId`, `postTitle`, `commentId`, `commentContent`, `commentAuthorUid`, `commentAuthorName` | Web `comments/page.tsx` |\r\n| `delete_feedback` | `feedbackType`, `feedbackContent`, `feedbackAuthorName` | Flutter `feedback_list_screen.dart` |\r\n| `suspend` | `targetUid`, `reason`, `suspensionCount`, `days`, `actorUid` | Cloud Functions мһҗлҸҷ м •м§Җ |\r\n\r\n### мЎ°нҡҢ л°©лІ•\r\n\r\n- **Flutter**: кҙҖлҰ¬мһҗ нҷ”л©ҙ вҶ’ мӮӯм ң лЎңк·ё нғӯ (`delete_post`, `delete_feedback`л§Ң н‘ңмӢң)\r\n- **Admin Web**: `/admin-logs` вҖ” м „мІҙ м•Ўм…ҳмқ„ к·ёлЈ№ н•„н„°(м „мІҙ/м—ӯн•  ліҖкІҪ/мӮӯм ң/кі„м •/кё°нғҖ)мҷҖ кІҖмғүмңјлЎң мЎ°нҡҢ. мөңк·ј 200кұҙ н‘ңмӢң\r\n- **л Ҳкұ°мӢң нҳёнҷҳ**: н•ңкөӯм–ҙ м•Ўм…ҳ л¬ёмһҗм—ҙ(`'мҠ№мқё'`, `'кұ°м Ҳ'`, `'м •м§Җ'`, `'м •м§Җ н•ҙм ң'`, `'мӮӯм ң'`, `'м—ӯн•  ліҖкІҪ: xxx'`)лЎң кё°лЎқлҗң кіјкұ° н•ӯлӘ©лҸ„ Admin Web л·°м–ҙм—җм„ң м •мғҒ л ҢлҚ”\r\n\r\n### к¶Ңн•ң\r\n\r\n- мһ‘м„ұ: `isModerator()` (admin/manager/moderator)\r\n- мқҪкё°: `isStaff()` (admin/manager/moderator/auditor)\r\n- мҲҳм •/мӮӯм ң: л¶Ҳк°Җ\r\n\r\n## нҒ¬лһҳмӢң лӘЁлӢҲн„°л§Ғ\r\n\r\n- **Crashlytics** кё°ліё лҢҖмӢңліҙл“ңлҠ” Firebase мҪҳмҶ”м—җм„ң нҷ•мқё\r\n- м¶”к°ҖлЎң `function_logs` м»¬л үм…ҳм—җ Cloud Functions мҳӨлҘҳ м ҖмһҘ\r\n- Admin Web `crashes/`м—җм„ң Firestore лҜёлҹ¬ мЎ°нҡҢ (л№ лҘё мҝјлҰ¬ / н•„н„° / мӮӯм ң)\r\n\r\n## кёҙкёү нҢқм—… кіөм§Җ кҙҖлҰ¬\r\n\r\n- `app_config/announcement` л¬ём„ң мҲҳм •\r\n- н•„л“ң: `title`, `body`, `type` (`urgent`/`notice`/`event`), `startAt`, `endAt`, `hideToday`\r\n- мӮ¬мҡ©мһҗ лҸҷмһ‘мқҖ [кіөк°ң кё°лҠҘ > кёҙкёү нҢқм—… кіөм§Җ](./public-features.md#кёҙкёү-нҢқм—…-кіөм§Җ) м°ёмЎ°\r\n\r\n## мӮ¬мҡ©мһҗ кҙҖлҰ¬ н”ҢлЎңмҡ°\r\n\r\n```mermaid\r\ngraph LR\r\n    A[мӢ к·ң к°Җмһ…] --> B{кҙҖлҰ¬мһҗ мҠ№мқё}\r\n    B -->|мҠ№мқё| C[мқјл°ҳ мӮ¬мҡ©]\r\n    B -->|кұ°м Ҳ| D[кі„м • л№„нҷңм„ұ]\r\n    C --> E{мң„л°ҳ мӢ кі }\r\n    E -->|кІҪлҜё| F[кҙҖлҰ¬мһҗ л©”лӘЁ]\r\n    E -->|мӨ‘лҢҖ| G[м •м§Җ 1мӢңк°„~30мқј]\r\n    G -->|л§ҢлЈҢ| C\r\n    G -->|мҳҒкө¬| H[мҳҒкө¬ м •м§Җ = нғҲнҮҙ]\r\n```\r\n\r\n- **мһҗлҸҷ м •м§Җ н•ҙм ң**: Cloud Functions мҠӨмјҖмӨ„лҹ¬к°Җ л§ӨмӢңк°„ `suspendedUntil <= now` мЎ°нҡҢ вҶ’ н•„л“ң мӮӯм ң вҶ’ `onUserUpdated` нҠёлҰ¬кұ° вҶ’ н•ҙм ң н‘ёмӢң\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [мқёмҰқ & м ‘к·ј](../guides/account-and-access.md)\r\n- [ліҙм•Ҳ лӘЁлҚё](../guides/security.md) вҖ” rules н—¬нҚј н•ЁмҲҳ, н•„л“ң лӢЁмң„ кІҖмҰқ\r\n- [CI/CD & л°°нҸ¬](../guides/cicd-setup.md)\r\n- [л°°нҸ¬ к°Җмқҙл“ң](../DEPLOY.md)\r\n","features/admin-features_en.md":"# Admin Features (Flutter Admin + Next.js Admin Web)\r\n\r\n> н•ңкөӯм–ҙ: [admin-features.md](./admin-features.md)\r\n\r\nManagement functionality for `manager` / `admin` / `moderator` / `auditor` roles. Delivered through two channels: an in-app Flutter Admin screen, and a separate Next.js dashboard.\r\n\r\n## Role System\r\n\r\n| Role | Scope |\r\n|---|---|\r\n| `user` | General features |\r\n| `moderator` | Delete posts/comments, read/process reports, write `admin_logs`. No access to user management, dashboard/stats, settings, or feedbacks |\r\n| `auditor` | Read-only. Can read `admin_logs`, stats, reports, feedbacks, `crash_logs`, `function_logs`. Cannot delete anything or write `admin_logs` |\r\n| `manager` | User management + all general features (cannot promote admins) |\r\n| `admin` | Everything (can promote other admins) |\r\n\r\n**Validation**: `isAdmin()` / `isAdminOrManager()` / `isModerator()` / `isAuditor()` / `isStaff()` helpers in `firestore.rules`. Cloud Functions re-check the Firestore `role` field at call time.\r\n\r\n## Flutter Admin Screen\r\n\r\n**Entry**: Settings вҶ’ Admin (visible to staff roles only)\r\n\r\n### ExpansionTile-Based Tabs\r\n\r\nSections are shown conditionally based on the user's role. Collapsed tabs render nothing, so Firestore reads are 0 ([Technical Challenge #9](../guides/technical-challenges_en.md#9-admin-screen-firestore-read-overload-stream--future-transition)).\r\n\r\n| Tab | Content | Accessible By |\r\n|---|---|---|\r\n| **Pending approval** | Users with `approved: false` вҶ’ approve/reject | manager, admin |\r\n| **Suspension** | Set duration (1hвҖ“30d) / immediate release | manager, admin |\r\n| **Users** | Full search, role change, detail view | manager, admin |\r\n| **Reports** | Reported posts/comments queue, moderation | moderator, auditor (read-only), manager, admin |\r\n| **Deletion log** | Recent entries in `admin_logs` | moderator, auditor (read-only), manager, admin |\r\n| **Feedback** | Change state (pending вҶ’ acknowledged вҶ’ resolved) | auditor (read-only), manager, admin |\r\n| **Appeals** | Review appeals (`appeals`) submitted by suspended users | manager, admin |\r\n| **Data Requests** | Process data portability / access requests (`data_requests`) | manager, admin |\r\n| **Community Rules** | Publish/edit `community_rules` versions | manager, admin |\r\n\r\n### Manual Refresh After Actions\r\n\r\n- Uses `FutureBuilder` (not `StreamBuilder`) вҶ’ call `_refresh()` after each action\r\n- **Result**: opening the screen dropped from 130+ reads to 20вҖ“30\r\n\r\n**Role badge colors**: moderator = teal, auditor = purple\r\n\r\n**Role change UI**: `users_tab.dart` uses a dropdown instead of toggle buttons for role assignment\r\n\r\n**Files**: `lib/screens/board/admin_screen.dart`, `lib/screens/board/admin/users_tab.dart`\r\n\r\n## Next.js Admin Web (`/admin-web`)\r\n\r\nA browser-based dashboard sharing the same Firestore. All staff roles (admin/manager/moderator/auditor) can log in. The sidebar filters menu items by role via `canAccess()`.\r\n\r\n### Pages\r\n\r\nUnder `admin-web/app/`:\r\n\r\n| Path | Content |\r\n|---|---|\r\n| `dashboard/` | Stats cards (user count, reports, pending, etc.) |\r\n| `users/` | User search / filter / approve / suspend / role change |\r\n| `posts/` | Post search / delete |\r\n| `comments/` | Comment moderation |\r\n| `reports/` | Report queue |\r\n| `feedbacks/` | Feedback state change |\r\n| `crashes/` | Crashlytics log mirror in Firestore |\r\n| `function-logs/` | Cloud Function error logs (`function_logs` collection) |\r\n| `appeals/` | Suspension appeal review (`appeals`) |\r\n| `data-requests/` | Data portability / access request handling (`data_requests`) |\r\n| `community-rules/` | Publish rule versions (`community_rules`) |\r\n| `admin-logs/` | Full `admin_logs` viewer вҖ” action group filter (role / delete / account / other) + search (all staff) |\r\n| `settings/` | Urgent popup, app version (`app_config`) |\r\n\r\n### Common UX\r\n\r\n- **Dark mode** toggle, mobile-responsive\r\n- **Anonymous вҶ’ real-name reveal** (admin-only, audit-logged)\r\n- **Audit logging**: every admin action recorded in `admin_logs`\r\n\r\n### AdminShell layout\r\n\r\n`AdminShell` (`admin-web/components/AdminShell.tsx`) wraps the sidebar + content area uniformly. Auth routes (`/`, `/login`) are auto-bypassed so the sidebar stays hidden on auth screens. All admin pages are wrapped once via `app/layout.tsx` вҖ” individual pages don't import the sidebar.\r\n\r\n### Cache layer (`lib/cache.ts`)\r\n\r\nTo avoid re-running identical Firestore queries across page transitions, an in-memory cache + in-flight request dedup hook is provided.\r\n\r\n- `useCached(key, fetcher, { ttlMs })` вҖ” TTL (default 60s) cache hit; refetch on expiry\r\n- **In-flight dedup** вҖ” concurrent calls with the same key collapse into a single fetch and share the result (e.g., sidebar user count + dashboard card sharing one key reads only once)\r\n- `invalidateCache(prefix)` вҖ” invalidate only a prefix after an action (e.g., clear `users` cache after a suspension)\r\n- `setData(updater)` вҖ” optimistic updates that also patch the cache\r\n\r\n**Effect**: roughly half the Firestore reads when sidebar + dashboard load together. Revisits within 5 minutes incur near-zero extra reads.\r\n\r\n**Files**: `admin-web/app/`, `admin-web/components/AdminShell.tsx`, `admin-web/components/Sidebar.tsx`, `admin-web/lib/cache.ts`\r\n\r\n## Audit Log (`admin_logs`)\r\n\r\nEvery admin action is recorded in `admin_logs`. Fields vary by action type; entries are auto-deleted after 30 days (`expiresAt` TTL).\r\n\r\n### Common fields\r\n\r\n| Field | Description |\r\n|---|---|\r\n| `action` | One of the action types below |\r\n| `adminUid`, `adminName` | Actor |\r\n| `createdAt` | Server timestamp |\r\n| `expiresAt` | `createdAt + 30 days` (TTL policy) |\r\n\r\n### Per-action extra fields\r\n\r\n| `action` | Extra fields | Written by |\r\n|---|---|---|\r\n| `change_role` | `targetUid`, `targetName`, `previousRole`, `newRole` | Flutter `users_tab.dart`, Web `users/page.tsx` |\r\n| `approve_user` / `reject_user` | `targetUid`, `targetName` | Flutter, Web |\r\n| `suspend_user` | `targetUid`, `targetName`, `hours` | Flutter, Web |\r\n| `unsuspend_user` | `targetUid`, `targetName` | Flutter, Web |\r\n| `delete_user` | `targetUid`, `targetName` | Flutter, Web |\r\n| `delete_post` | `postId`, `postTitle`, `postAuthorUid`, `postAuthorName` | Flutter `post_detail_actions_mixin.dart`, Web `posts/` |\r\n| `delete_comment` | `postId`, `postTitle`, `commentId`, `commentContent`, `commentAuthorUid`, `commentAuthorName` | Web `comments/page.tsx` |\r\n| `delete_feedback` | `feedbackType`, `feedbackContent`, `feedbackAuthorName` | Flutter `feedback_list_screen.dart` |\r\n| `suspend` | `targetUid`, `reason`, `suspensionCount`, `days`, `actorUid` | Cloud Functions auto-suspend |\r\n\r\n### How to view\r\n\r\n- **Flutter**: Admin screen вҶ’ Delete Logs tab (only `delete_post`, `delete_feedback`)\r\n- **Admin Web**: `/admin-logs` вҖ” full action history with group filter (all / role / delete / account / other) and search; latest 200\r\n- **Legacy compatibility**: Korean action strings (`'мҠ№мқё'`, `'кұ°м Ҳ'`, `'м •м§Җ'`, `'м •м§Җ н•ҙм ң'`, `'мӮӯм ң'`, `'м—ӯн•  ліҖкІҪ: xxx'`) from earlier entries still render correctly in the Admin Web viewer\r\n\r\n### Permissions\r\n\r\n- Create: `isModerator()` (admin / manager / moderator)\r\n- Read: `isStaff()` (admin / manager / moderator / auditor)\r\n- Update / delete: not allowed\r\n\r\n## Crash Monitoring\r\n\r\n- **Crashlytics** baseline in Firebase Console\r\n- Additionally, Cloud Functions errors are persisted in `function_logs`\r\n- Admin Web `crashes/` pulls from Firestore for fast query / filter / delete\r\n\r\n## Urgent Popup Management\r\n\r\n- Edit `app_config/announcement` document\r\n- Fields: `title`, `body`, `type` (`urgent` / `notice` / `event`), `startAt`, `endAt`, `hideToday`\r\n- User-facing behavior вҶ’ [public-features_en.md#urgent-popup-announcements](./public-features_en.md#urgent-popup-announcements)\r\n\r\n## User-Management Flow\r\n\r\n```mermaid\r\ngraph LR\r\n    A[signup] --> B{admin approval}\r\n    B -->|approve| C[general use]\r\n    B -->|reject| D[disabled]\r\n    C --> E{violation report}\r\n    E -->|minor| F[admin note]\r\n    E -->|serious| G[suspension 1hвҖ“30d]\r\n    G -->|expires| C\r\n    G -->|permanent| H[permanent = deletion]\r\n```\r\n\r\n- **Auto-unsuspension**: Cloud Functions scheduler checks `suspendedUntil <= now` hourly вҶ’ deletes the field вҶ’ `onUserUpdated` trigger вҶ’ unsuspension push\r\n\r\n## See Also\r\n- [Account & Access](../guides/account-and-access_en.md)\r\n- [Security Model](../guides/security_en.md) вҖ” rules helpers, field validation\r\n- [CI/CD Setup](../guides/cicd-setup_en.md)\r\n- [Deployment Guide](../DEPLOY_en.md)\r\n","features/community-features.md":"# м»Өл®ӨлӢҲнӢ° кё°лҠҘ (кІҢмӢңнҢҗ / мұ„нҢ… / м•ҢлҰј)\r\n\r\n> English: [community-features_en.md](./community-features_en.md)\r\n\r\nн•ҷмғқВ·көҗмӮ¬В·мЎём—…мғқВ·н•ҷл¶ҖлӘЁк°Җ м„ңлЎң мҶҢнҶөн•ҳлҠ” кё°лҠҘмқ„ л¬¶м—ҲмҠөлӢҲлӢӨ. кІҢмӢңнҢҗ, 1:1 мұ„нҢ…, м•ҢлҰј мӢңмҠӨн…ңмқҙ м—¬кё° нҸ¬н•Ёлҗ©лӢҲлӢӨ.\r\n\r\n## кІҢмӢңнҢҗ\r\n\r\n### м№ҙн…Ңкі лҰ¬ & нғҗмғү\r\n\r\n- **6к°ң м№ҙн…Ңкі лҰ¬** + **мқёкё°кёҖ** нғӯ: мһҗмң  / м§Ҳл¬ё / м •ліҙкіөмң  / л¶„мӢӨл¬ј / н•ҷмғқнҡҢ / лҸҷм•„лҰ¬\r\n- **мқёкё°кёҖ м •л ¬**: `likeCount` л№„м •к·ңнҷ” м№ҙмҡҙн„° + composite index `(likeCount desc, createdAt desc)` ([ADR-04](../guides/architecture-decisions.md#adr-04-мўӢм•„мҡ”-м№ҙмҡҙн„°))\r\n- **м»Өм„ң кё°л°ҳ нҺҳмқҙм§Җл„Өмқҙм…ҳ** (20к°ңм”©, л¬ҙн•ң мҠӨнҒ¬лЎӨ, лӢ№кІЁм„ң мғҲлЎңкі м№Ё)\r\n- **кіөм§Җ мӢңмҠӨн…ң** (мөңлҢҖ 3к°ң, мғҒлӢЁ кі м •, кҙҖлҰ¬мһҗ м „мҡ©)\r\n\r\n### мһ‘м„ұ / ліёл¬ё\r\n\r\n- **мқҙлҜём§Җ мІЁл¶Җ**: 1080px м••м¶• + EXIF/GPS м ңкұ°, PageView swipe viewer + Hero animation + pinch-zoom\r\n- **нҲ¬н‘ң** мІЁл¶Җ (мөңлҢҖ 6м„ нғқм§Җ, мӢӨмӢңк°„ кІ°кіј л°”)\r\n- **мқјм • кіөмң ** (н•ҷмӮ¬мқјм • л§ҒнҒ¬)\r\n- **мқөлӘ… лІҲнҳём ң**: мқөлӘ…1/мқөлӘ…2/мқөлӘ…(кёҖм“ҙмқҙ), Firestore Transaction ([кё°мҲ кіјм ң #3](../guides/technical-challenges.md#3-мқөлӘ…-кІҢмӢңнҢҗ-лІҲнҳё-мқјкҙҖм„ұ-concurrent-write))\r\n\r\n### мқён„°лһҷм…ҳ\r\n\r\n- **м¶”мІң/л№„м¶”мІң**: `Map<uid,bool>` + `likeCount` int counter, rules лӢЁкі„ Вұ1 delta кІҖмҰқ ([ADR-04](../guides/architecture-decisions.md#adr-04-мўӢм•„мҡ”-м№ҙмҡҙн„°))\r\n- **л¶Ғл§ҲнҒ¬** (лӮҙ нҷңлҸҷ вҶ’ м ҖмһҘн•ң кёҖм—җм„ң мһ¬мЎ°нҡҢ)\r\n- **лҢ“кёҖ + лҢҖлҢ“кёҖ** (л“Өм—¬м“°кё°), кёҖм“ҙмқҙ лҢ“кёҖ кө¬л¶„ (нҢҢлһҖ л°°кІҪ + лұғм§Җ)\r\n\r\n### кІҖмғү\r\n\r\n- **n-gram кІҖмғү**: м ңлӘ©+ліёл¬ё 2-gramмқ„ `searchTokens` л°°м—ҙм—җ мқёлҚұмӢұ, `array-contains-any` мҝјлҰ¬ ([ADR-03](../guides/architecture-decisions.md#adr-03-кІҢмӢңнҢҗ-кІҖмғү-нҒҙлқјмқҙм–ёнҠё-n-gram-мқёлҚұмӢұ))\r\n- **350ms debounce**, 50к°ң fetch + client substring н•„н„°лЎң false positive мӨ„мһ„\r\n- **кІҖмғү history**: мөңк·ј 10к°ң кІҖмғүм–ҙ chip, к°ңлі„/м „мІҙ мӮӯм ң\r\n\r\n### UX\r\n\r\n- Shimmer мҠӨмјҲл ҲнҶӨ лЎңл”©\r\n- **л°”н…ҖмӢңнҠё л©”лүҙ** (м•„мқҙмҪҳ + н…ҚмҠӨнҠё, мӮӯм ң/мӢ кі  л№Ёк°„мғү к°•мЎ°)\r\n- мӢ кі , мӮ¬мҡ©мһҗ м°ЁлӢЁ, кёҖ мһҗлҸҷ мӮӯм ң (TTL), Rate Limiting\r\n\r\n### лӮҙ нҷңлҸҷ\r\n\r\n- лӮҙк°Җ м“ҙ кёҖ / лӮҙк°Җ м“ҙ лҢ“кёҖ / м ҖмһҘн•ң кёҖ нғӯ л¶„лҰ¬\r\n- `authorUid + createdAt` composite index мӮ¬мҡ©\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/board/board_screen.dart`, `post_detail_screen.dart`, `write_post_screen.dart`, `my_posts_screen.dart`, `bookmarked_posts_screen.dart`, `search_history_service_test.dart`, `search_tokens_test.dart`\r\n\r\n## 1:1 мұ„нҢ…\r\n\r\n- **мң м Җ кІҖмғү**мңјлЎң мғҲ мұ„нҢ… мӢңмһ‘ (мқҙлҰ„/н•ҷлІҲ кІҖмғү, кҙҖлҰ¬мһҗ кё°ліё н‘ңмӢң)\r\n- **мӢӨмӢңк°„ л©”мӢңм§Җ** (Firestore onSnapshot, limit 30)\r\n- **мқҪмқҢ н‘ңмӢң** + мқҪм§Җ м•ҠмқҖ л©”мӢңм§Җ мҲҳ лұғм§Җ ([кё°мҲ кіјм ң #6](../guides/technical-challenges.md#6-мұ„нҢ…-мқҪмқҢ-нҷ•мқё-мӢӨмӢңк°„-лҸҷкё°нҷ”-dual-stream))\r\n- **л©”мӢңм§Җ мӮӯм ң**: лӮҳл§Ң мӮӯм ң / к°ҷмқҙ мӮӯм ң (м•Ҳ мқҪм—Ҳкі  1мӢңк°„ мқҙлӮҙ)\r\n- **мұ„нҢ…л°© лӮҳк°Җкё°**: мӢңмҠӨн…ң л©”мӢңм§Җ + мғҒлҢҖл°© мұ„нҢ… мң м§Җ\r\n- мҠӨмјҲл ҲнҶӨ лЎңл”© UI\r\n\r\n**ліҙм•Ҳ**: `chats/{chatId}`мқҳ `participants` л°°м—ҙ кё°л°ҳ rules кІҖмҰқ. м°ём—¬мһҗл§Ң read/write.\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/chat/chat_list_screen.dart`, `chat_room_screen.dart`, `chat_utils.dart`\r\n\r\n## м•ҢлҰј мӢңмҠӨн…ң\r\n\r\n### м„Өм • нҷ”л©ҙ\r\n\r\n**5к°ң м№ҙн…Ңкі лҰ¬** к°ңлі„ on/off:\r\n\r\n| м№ҙн…Ңкі лҰ¬ | нҠёлҰ¬кұ° | кІҪлЎң |\r\n|---|---|---|\r\n| **лҢ“кёҖ/лӢөкёҖ** | лӮҙ кёҖм—җ лҢ“кёҖ / лӮҙ лҢ“кёҖм—җ лӢөкёҖ | Cloud Functions вҶ’ FCM |\r\n| **мұ„нҢ…** | мғҲ л©”мӢңм§Җ | Cloud Functions вҶ’ FCM |\r\n| **мғҲ кёҖ** | кҙҖмӢ¬ м№ҙн…Ңкі лҰ¬ мғҲ кёҖ | Cloud Functions вҶ’ FCM |\r\n| **кі„м •** | мҠ№мқё/м •м§Җ/н•ҙм ң/м—ӯн• ліҖкІҪ | Cloud Functions вҶ’ FCM |\r\n| **кёүмӢқ** | мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ | лЎңм»¬ м•ҢлҰј (мӢңк°„ м„Өм •) |\r\n\r\n### кө¬нҳ„\r\n\r\n- **мқём•ұ м•ҢлҰј**: лІЁ м•„мқҙмҪҳ + м•Ҳ мқҪмқҖ лұғм§Җ (`users/{uid}/notifications/{id}`)\r\n- **FCM н‘ёмӢң**: FCM 4мў… (`account` / `comment` / `new_post` / `chat`) + лЎңм»¬ 3мў… (мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ)\r\n- **м„ңлІ„ н•„н„°л§Ғ**: `users/{uid}`мқҳ `notiXxx` н•„л“ңлҘј Cloud Functionsм—җм„ң л°ңмҶЎ м „ мІҙнҒ¬ ([кё°мҲ кіјм ң #7](../guides/technical-challenges.md#7-cloud-functions-м•ҢлҰј-м„Өм •-к°ңлі„-м ңм–ҙ-server-side-filtering))\r\n- **м •м§Җ л§ҢлЈҢ мһҗлҸҷ н•ҙм ң**: Cloud Functions мҠӨмјҖмӨ„лҹ¬ (л§ӨмӢңк°„) ([кё°мҲ кіјм ң #8](../guides/technical-challenges.md#8-м •м§Җ-л§ҢлЈҢ-мһҗлҸҷ-н•ҙм ң-scheduler-trigger))\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/notification/fcm_service.dart`, `lib/screens/sub/notification_setting_screen.dart`, `lib/screens/board/notification_screen.dart`, `functions/index.js`\r\n\r\n## кұҙмқҳмӮ¬н•ӯ\r\n\r\n- **м•ұ кұҙмқҳмӮ¬н•ӯ & лІ„к·ё м ңліҙ** + **н•ҷмғқнҡҢ кұҙмқҳмӮ¬н•ӯ** л‘җ мұ„л„җ\r\n- н…ҚмҠӨнҠё(1000мһҗ) + мӮ¬м§„ мІЁл¶Җ(мөңлҢҖ 3мһҘ)\r\n- мғҒнғң кҙҖлҰ¬: лҢҖкё°мӨ‘ вҶ’ нҷ•мқёлҗЁ вҶ’ н•ҙкІ°лҗЁ вҶ’ мӮӯм ң (лЎңк·ё кё°лЎқ)\r\n- кҙҖлҰ¬мһҗ Admin Webм—җм„ң мғҒнғң ліҖкІҪ\r\n\r\n**кҙҖл Ё нҢҢмқј**: `lib/screens/sub/feedback_screen.dart`, `feedback_list_screen.dart`\r\n\r\n## Rate Limiting\r\n\r\n| лҢҖмғҒ | м ңн•ң |\r\n|---|---|\r\n| кёҖ мһ‘м„ұ | 30мҙҲ мҝЁнғҖмһ„ |\r\n| лҢ“кёҖ мһ‘м„ұ | 10мҙҲ мҝЁнғҖмһ„ |\r\n| мӢ кі  | лҸҷмқј `(postId, reporterUid)` мӨ‘ліө л°©м§Җ (мқёлҚұмҠӨ) |\r\n| мұ„нҢ… л©”мӢңм§Җ | (кё°ліё нҒҙлқјмқҙм–ёнҠё debounce) |\r\n\r\nRate LimitмқҖ нҒҙлқјмқҙм–ёнҠё м„ л°©м–ҙ + Firestore Rulesм—җм„ң мөңмҶҢ кІҖмҰқ.\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [кіөк°ң кё°лҠҘ](./public-features.md)\r\n- [к°ңмқё кё°лҠҘ](./personal-features.md)\r\n- [кҙҖлҰ¬мһҗ кё°лҠҘ](./admin-features.md)\r\n- [ліҙм•Ҳ лӘЁлҚё](../guides/security.md)\r\n- [лҚ°мқҙн„° лӘЁлҚё](../guides/data-model.md) вҖ” `posts`, `comments`, `chats`, `reports` мҠӨнӮӨл§Ҳ\r\n","features/community-features_en.md":"# Community Features (Board / Chat / Notifications)\r\n\r\n> н•ңкөӯм–ҙ: [community-features.md](./community-features.md)\r\n\r\nFeatures where students, teachers, alumni, and parents communicate вҖ” board, 1:1 chat, notification system.\r\n\r\n## Board\r\n\r\n### Categories & Browsing\r\n\r\n- **6 categories** + **Popular** tab: Free / Question / Info-share / Lost & Found / Student Council / Clubs\r\n- **Popular sorted** by denormalized `likeCount` + composite index `(likeCount desc, createdAt desc)` ([ADR-04](../guides/architecture-decisions_en.md#adr-04-like-counter-mapuidbool--denormalized-int))\r\n- **Cursor-based pagination** (20 per page, infinite scroll, pull-to-refresh)\r\n- **Pinned announcements** (up to 3, admin-only, always on top)\r\n\r\n### Composition / Body\r\n\r\n- **Image attachment**: 1080px compressed + EXIF/GPS stripped, PageView swipe viewer + Hero animation + pinch-zoom\r\n- **Polls** (up to 6 options, real-time result bars)\r\n- **Schedule sharing** (links to academic events)\r\n- **Anonymous numbering**: мқөлӘ…1/мқөлӘ…2/мқөлӘ…(кёҖм“ҙмқҙ), via Firestore Transaction ([Technical Challenge #3](../guides/technical-challenges_en.md#3-anonymous-number-consistency-concurrent-write))\r\n\r\n### Interactions\r\n\r\n- **Upvote/downvote**: `Map<uid,bool>` + `likeCount` int counter, Вұ1 delta enforced in rules ([ADR-04](../guides/architecture-decisions_en.md#adr-04-like-counter-mapuidbool--denormalized-int))\r\n- **Bookmark** (re-accessible under My Activity вҶ’ Saved)\r\n- **Comments + replies** (indented), author-of-post comments badged blue\r\n\r\n### Search\r\n\r\n- **n-gram search**: title+body 2-gram indexed into `searchTokens`, `array-contains-any` query ([ADR-03](../guides/architecture-decisions_en.md#adr-03-board-search-client-side-n-gram-indexing))\r\n- **350ms debounce**, 50-result fetch + client substring filter reduces false positives\r\n- **Search history**: last 10 keyword chips, delete individually or all\r\n\r\n### UX\r\n\r\n- Shimmer skeleton loading\r\n- **Bottom-sheet menu** (icon + text, delete/report highlighted red)\r\n- Reports, user blocking, auto-delete (TTL), rate limiting\r\n\r\n### My Activity\r\n\r\n- My posts / my comments / saved tabs\r\n- Uses `authorUid + createdAt` composite index\r\n\r\n**Files**: `lib/screens/board/board_screen.dart`, `post_detail_screen.dart`, `write_post_screen.dart`, `my_posts_screen.dart`, `bookmarked_posts_screen.dart`, `search_history_service_test.dart`, `search_tokens_test.dart`\r\n\r\n## 1:1 Chat\r\n\r\n- **User search** to start a chat (by name/student ID; admins shown by default)\r\n- **Realtime messages** (Firestore `onSnapshot`, limit 30)\r\n- **Read receipts** + unread badge ([Technical Challenge #6](../guides/technical-challenges_en.md#6-chat-read-receipt-realtime-sync-dual-stream))\r\n- **Message deletion**: self only / for both (if unread and вүӨ1h old)\r\n- **Leave chat**: system message + other party's view retained\r\n- Skeleton loading UI\r\n\r\n**Security**: rules enforce `participants` array вҶ’ read/write participants only.\r\n\r\n**Files**: `lib/screens/chat/chat_list_screen.dart`, `chat_room_screen.dart`, `chat_utils.dart`\r\n\r\n## Notifications\r\n\r\n### Settings Screen\r\n\r\nFive independent toggles:\r\n\r\n| Category | Trigger | Path |\r\n|---|---|---|\r\n| **Comments/replies** | Comment on my post / reply to my comment | Cloud Functions вҶ’ FCM |\r\n| **Chat** | New message | Cloud Functions вҶ’ FCM |\r\n| **New posts** | New post in subscribed categories | Cloud Functions вҶ’ FCM |\r\n| **Account** | Approval / suspension / unsuspension / role change | Cloud Functions вҶ’ FCM |\r\n| **Meals** | Breakfast/lunch/dinner | Local notifications (per-meal time) |\r\n\r\n### Implementation\r\n\r\n- **In-app notifications**: bell icon + unread badge (`users/{uid}/notifications/{id}`)\r\n- **FCM push**: 4 FCM topics (`account` / `comment` / `new_post` / `chat`) + 3 local (breakfast/lunch/dinner)\r\n- **Server-side filtering**: Cloud Functions check `users/{uid}.notiXxx` before sending ([Technical Challenge #7](../guides/technical-challenges_en.md#7-per-category-push-toggles-server-side-filter))\r\n- **Auto-unsuspension**: Cloud Functions scheduler (hourly) ([Technical Challenge #8](../guides/technical-challenges_en.md#8-auto-expiring-suspensions-scheduler-trigger))\r\n\r\n**Files**: `lib/notification/fcm_service.dart`, `lib/screens/sub/notification_setting_screen.dart`, `lib/screens/board/notification_screen.dart`, `functions/index.js`\r\n\r\n## Feedback\r\n\r\n- **App feedback & bug reports** + **student-council feedback** (two channels)\r\n- Text (1000 chars) + up to 3 photos\r\n- State machine: pending вҶ’ acknowledged вҶ’ resolved вҶ’ deleted (logged)\r\n- Admin Web changes state\r\n\r\n**Files**: `lib/screens/sub/feedback_screen.dart`, `feedback_list_screen.dart`\r\n\r\n## Rate Limiting\r\n\r\n| Target | Limit |\r\n|---|---|\r\n| Post creation | 30s cooldown |\r\n| Comment creation | 10s cooldown |\r\n| Report | dedup index on `(postId, reporterUid)` |\r\n| Chat messages | (client-side debounce) |\r\n\r\nClient-side front-loaded; Firestore rules carry only minimal validation.\r\n\r\n## See Also\r\n- [Public Features](./public-features_en.md)\r\n- [Personal Features](./personal-features_en.md)\r\n- [Admin Features](./admin-features_en.md)\r\n- [Security Model](../guides/security_en.md)\r\n- [Data Model](../guides/data-model_en.md) вҖ” `posts`, `comments`, `chats`, `reports`\r\n","features/personal-features.md":"# к°ңмқё кё°лҠҘ (м„ұм Ғ / к°ңмқёмқјм • / н”„лЎңн•„)\r\n\r\n> English: [personal-features_en.md](./personal-features_en.md)\r\n\r\nмӮ¬мҡ©мһҗ к°ңмқё лҚ°мқҙн„°лҘј лӢӨлЈЁлҠ” кё°лҠҘмқ„ л¬¶м—ҲмҠөлӢҲлӢӨ. м„ұм ҒмқҖ мҷ„м „ лЎңм»¬, к°ңмқёмқјм •мқҖ sqflite, н”„лЎңн•„мқҖ Firestoreм—җ м ҖмһҘлҗ©лӢҲлӢӨ.\r\n\r\n## м„ұм Ғ кҙҖлҰ¬\r\n\r\n### нғӯ кө¬мЎ°\r\n\r\n- **мҲҳмӢң(лӮҙмӢ ) / м •мӢң(лӘЁмқҳкі мӮ¬)** нғӯ л¶„лҰ¬, мҠӨмҷҖмқҙн”„ м „нҷҳ\r\n- **лӮҙмӢ **: 5л“ұкёүм ң + м„ұм·ЁлҸ„(A~E) лі‘кё°, 2022 к°ңм • көҗмңЎкіјм • м Ғмҡ©\r\n- **лӘЁмқҳкі мӮ¬**: 2022 к°ңм • мҲҳлҠҘ кіјлӘ© (көӯ/мҲҳ/мҳҒ/н•ңкөӯмӮ¬/нҶөн•©мӮ¬нҡҢ/нҶөн•©кіјн•ҷ + м ң2мҷёкөӯм–ҙ)\r\n- **мӮ¬м„Ө лӘЁмқҳкі мӮ¬** м¶”к°Җ к°ҖлҠҘ\r\n\r\n### мӢңк°Ғнҷ”\r\n\r\n- **м¶”мқҙ к·ёлһҳн”„**: CustomPainter кәҫмқҖм„  ([ADR-05](../guides/architecture-decisions.md#adr-05-м°ЁнҠё-custompainter-м§Ғм ‘-кө¬нҳ„))\r\n  - лӘЁл“ң нҶ кёҖ: л“ұкёү / мӣҗм җмҲҳ / л°ұл¶„мң„ / н‘ңмӨҖм җмҲҳ\r\n  - л“ұкёү мҠӨмјҖмқј л°ҳм „(лӮ®мқ„мҲҳлЎқ мўӢмқҢ) мҳ¬л°”лҘҙкІҢ н‘ңмӢң\r\n- **кіјлӘ©лі„ лӘ©н‘ң** л“ұкёү(мҲҳмӢң 0.1лӢЁмң„) / лӘ©н‘ң л°ұл¶„мң„(м •мӢң) л¶„лҰ¬ м„Өм •\r\n- **л°ұл¶„мң„ вҶ’ л“ұкёү мһҗлҸҷ ліҖнҷҳ** (л“ұкёүм»· кё°мӨҖ м җм„  н‘ңмӢң)\r\n- **мҳҒм–ҙ/н•ңкөӯмӮ¬** м ҲлҢҖнҸүк°Җ кіјлӘ© л°ұл¶„мң„ лӘ©н‘ң м ңмҷё\r\n- кіјлӘ©лі„ кі м • мғүмғҒ (`lib/data/` м •мқҳ)\r\n\r\n### м ҖмһҘмҶҢ\r\n\r\n- **м„ұм Ғ лЎңм»¬ м „мҡ© м ҖмһҘ** вҖ” м„ңлІ„ м „мҶЎ м—ҶмқҢ (`flutter_secure_storage`, [ADR-02](../guides/ar
