ge에서 JSON 읽기:\n   ```dart\n   final json = await SecureStorageService.read(SecureStorageService.keyDdays);\n   ```\n\n3. 로컬 데이터가 없고 로그인 상태면 Firestore에서 복원:\n   ```dart\n   if (json == null || json.isEmpty) {\n     if (AuthService.isLoggedIn) {\n       return _loadFromFirestore();\n     }\n     return [];\n   }\n   ```\n\n---\n\n## `saveAll`\n\n```dart\nstatic Future<void> saveAll(List<DDay> list)\n```\n\n**설명**: D-day 목록 전체를 저장하고 Firestore에 동기화한다.\n\n```dart\nawait SecureStorageService.write(\n  SecureStorageService.keyDdays,\n  jsonEncode(list.map((e) => e.toJson()).toList()),\n);\n_syncToFirestore(list);  // fire-and-forget\n```\n\nFirestore 동기화는 비동기로 실행 (실패해도 로컬은 저장됨).\n\n---\n\n## `getPinned`\n\n```dart\nstatic Future<DDay?> getPinned()\n```\n\n**설명**: 핀 된 D-day 중 가장 가까운 미래 항목을 반환한다.\n\n```dart\nfinal pinned = list.where((d) => d.isPinned && d.dDay >= 0).toList();\npinned.sort((a, b) => a.dDay.compareTo(b.dDay));\nreturn pinned.first;\n```\n\n홈 화면 상단 D-day 위젯에 표시되는 항목.\n\n---\n\n## `_loadFromFirestore`\n\n```dart\nstatic Future<List<DDay>> _loadFromFirestore()\n```\n\n**설명**: Firestore `users/{uid}/sync/ddays` 문서에서 D-day 목록을 복원한다.\n\n```dart\nfinal doc = await FirebaseFirestore.instance\n    .collection('users').doc(uid)\n    .collection('sync').doc('ddays')\n    .get();\n```\n\n복원 후 SecureStorage에도 저장하여 다음 로드 시 로컬에서 읽히도록 함.\n\n---\n\n## `_syncToFirestore`\n\n```dart\nstatic Future<void> _syncToFirestore(List<DDay> list)\n```\n\n**설명**: D-day 목록을 Firestore에 동기화한다.\n\n```dart\nawait FirebaseFirestore.instance\n    .collection('users').doc(uid)\n    .collection('sync').doc('ddays')\n    .set({\n  'items': list.map((e) => e.toJson()).toList(),\n  'updatedAt': FieldValue.serverTimestamp(),\n});\n```\n\n비로그인 상태면 즉시 return. 에러는 로깅만 (silent fail).\n","data/device.md":"# Device\n\n> `lib/data/device.dart` — 디바이스 크기 계산 유틸리티\n\n모든 메서드가 `static`. 화면 크기를 퍼센트 기반으로 계산하는 반응형 레이아웃 헬퍼.\n\n---\n\n## `init`\n\n```dart\nstatic void init(BuildContext context) {\n  final size = MediaQuery.of(context).size;\n  width = size.width;\n  height = size.height;\n  isTablet = width > 500;\n}\n```\n\n**설명**: 디바이스 크기를 초기화한다.\n\n`MainScreen.build`에서 매 빌드마다 호출:\n```dart\nDevice.init(context);\n```\n\n- `width`/`height`: `MediaQuery.of(context).size`에서 추출\n- `isTablet`: 너비 500px 초과 시 태블릿으로 판정\n\n---\n\n## `getWidth`\n\n```dart\nstatic double getWidth(double percent) {\n  return width / 100 * percent;\n}\n```\n\n**설명**: 화면 너비의 퍼센트를 픽셀로 변환한다.\n\n```dart\n// 예: 화면 너비가 400px일 때\nDevice.getWidth(50)  // → 200.0\nDevice.getWidth(90)  // → 360.0\n```\n\n---\n\n## `getHeight`\n\n```dart\nstatic double getHeight(double percent) {\n  return height / 100 * percent;\n}\n```\n\n화면 높이의 퍼센트를 픽셀로 변환. `getWidth`와 동일한 계산 방식.\n\n---\n\n## 정적 필드\n\n| 필드 | 타입 | 설명 |\n|------|------|------|\n| `width` | `double` | 화면 너비 (px) |\n| `height` | `double` | 화면 높이 (px) |\n| `isTablet` | `bool` | 태블릿 여부 (`width > 500`) |\n\n---\n\n## 사용처\n\n위젯 크기/패딩을 화면 비율로 지정할 때 사용:\n```dart\nContainer(\n  width: Device.getWidth(90),   // 화면 너비의 90%\n  height: Device.getHeight(5),  // 화면 높이의 5%\n)\n```\n","data/grade_manager.md":"# GradeManager\r\n\r\n> `lib/data/grade_manager.dart` — 성적 CRUD, 목표 관리, 등급 변환\r\n\r\n`SubjectScore`, `Exam` 모델과 `GradeManager` 클래스를 포함. 모든 메서드가 `static`. 데이터는 [`SecureStorageService`](secure_storage_service.md)에 JSON으로 암호화 저장 (서버 저장 안 함).\r\n\r\n---\r\n\r\n## SubjectScore (데이터 모델)\r\n\r\n```dart\r\nclass SubjectScore {\r\n  final String subject;\r\n  final int? rawScore;        // 원점수\r\n  final int? rank;            // 등급 (1~9)\r\n  final double? percentile;   // 백분위\r\n  final double? standardScore; // 표준점수\r\n  final double? average;       // 평균\r\n  final String? achievement;   // 성취도 A~E\r\n}\r\n```\r\n\r\n내신(rawScore/average/rank/achievement)과 모의고사(percentile/standardScore/rank)를 하나의 구조체로 통합.\r\n\r\n### 상수\r\n\r\n| 상수 | 값 |\r\n|------|----|\r\n| `rankCutoffs` | `{1: '상위 10%', 2: '상위 34%', ...}` — 내신 5등급 비율 |\r\n| `achievements` | `['A', 'B', 'C', 'D', 'E']` |\r\n\r\n---\r\n\r\n## Exam (데이터 모델)\r\n\r\n```dart\r\nclass Exam {\r\n  final String id;\r\n  final String type;        // 'midterm' | 'final' | 'mock' | 'private_mock'\r\n  final int year;\r\n  final int semester;       // 1 or 2\r\n  final int grade;          // 1, 2, 3\r\n  final String? mockLabel;  // 모의: '3월', '6월' / 사설: 직접 입력\r\n  final List<SubjectScore> scores;\r\n  final DateTime createdAt;\r\n}\r\n```\r\n\r\n`displayName` 프로퍼티: type별 한국어 표시명 생성.\r\n```dart\r\n'midterm' → '$year ${semester}학기 중간고사'\r\n'mock'    → '$year $mockLabel 모의고사'\r\n```\r\n\r\n---\r\n\r\n## `percentileToRank`\r\n\r\n```dart\r\nstatic int percentileToRank(double percentile)\r\n```\r\n\r\n**설명**: 수능 백분위를 등급으로 변환한다 (9등급제).\r\n\r\n```dart\r\nif (percentile >= 96) return 1;\r\nif (percentile >= 89) return 2;\r\nif (percentile >= 77) return 3;\r\n// ... 4~8등급\r\nreturn 9;\r\n```\r\n\r\n---\r\n\r\n## `loadExams`\r\n\r\n```dart\r\nstatic Future<List<Exam>> loadExams()\r\n```\r\n\r\n**설명**: 저장된 시험 목록을 로드한다.\r\n\r\n1. SharedPreferences → SecureStorage 일회성 마이그레이션:\r\n   ```dart\r\n   await SecureStorageService.migrateFromPlain(\r\n     key: SecureStorageService.keyGradeExams,\r\n     oldValue: prefs.getString(_examsKey),\r\n     onMigrated: () async => prefs.remove(_examsKey),\r\n   );\r\n   ```\r\n\r\n2. SecureStorage에서 JSON 읽기 후 `Exam.fromJson`으로 디코딩:\r\n   ```dart\r\n   final json = await SecureStorageService.read(SecureStorageService.keyGradeExams);\r\n   final list = jsonDecode(json) as List<dynamic>;\r\n   return list.map((e) => Exam.fromJson(e)).toList()\r\n     ..sort((a, b) => a.createdAt.compareTo(b.createdAt));\r\n   ```\r\n\r\n**마이그레이션**: 기존 SharedPreferences(평문)에서 SecureStorage(암호화)로 자동 이전. 한 번 옮기면 이전 데이터 삭제.\r\n\r\n---\r\n\r\n## `saveExams`\r\n\r\n```dart\r\nstatic Future<void> saveExams(List<Exam> exams)\r\n```\r\n\r\n시험 목록 전체를 SecureStorage에 JSON으로 저장.\r\n\r\n---\r\n\r\n## `addExam` / `updateExam` / `deleteExam`\r\n\r\n```dart\r\nstatic Future<void> addExam(Exam exam)\r\nstatic Future<void> updateExam(Exam exam)\r\nstatic Future<void> deleteExam(String id)\r\n```\r\n\r\n각각 `loadExams()` → 수정 → `saveExams()` 패턴. `updateExam`은 id 매칭, `deleteExam`은 `removeWhere`.\r\n\r\n---\r\n\r\n## `loadGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadGoals()\r\n```\r\n\r\n**설명**: 수시 목표 등급(과목명 → 등급)을 로드한다.\r\n\r\n`loadExams`와 동일한 마이그레이션 + SecureStorage 패턴. 키: `SecureStorageService.keyGradeGoals`.\r\n\r\n---\r\n\r\n## `saveGoals`\r\n\r\n```dart\r\nstatic Future<void> saveGoals(Map<String, double> goals)\r\n```\r\n\r\n수시 목표를 SecureStorage에 JSON 저장.\r\n\r\n---\r\n\r\n## `loadJeongsiGoals` / `saveJeongsiGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadJeongsiGoals()\r\nstatic Future<void> saveJeongsiGoals(Map<String, double> goals)\r\n```\r\n\r\n정시 목표(백분위 기준). 키: `SecureStorageService.keyGradeJeongsiGoals`. 로직은 `loadGoals`/`saveGoals`와 동일.\r\n\r\n---\r\n\r\n## 상수 데이터\r\n\r\n### `mockSubjects`\r\n\r\n2022 개정 교육과정 수능 과목 맵:\r\n```dart\r\n{\r\n  '공통': ['국어', '수학', '영어', '한국사', '통합사회', '통합과학'],\r\n  '직업탐구': ['성공적인 직업생활'],\r\n  '제2외국어/한문 (택 1)': ['독일어', '프랑스어', ... '한문'],\r\n}\r\n```\r\n\r\n### `subjectColors`\r\n\r\n과목별 고정 색상 (차트용):\r\n```dart\r\n{'국어': 0xFFE53935, '수학': 0xFF1E88E5, '영어': 0xFF43A047, ...}\r\n```\r\n\r\n### `getSubjectColor`\r\n\r\n```dart\r\nstatic int getSubjectColor(String subject)\r\n```\r\n\r\n`subjectColors`에 없는 과목은 `subject.hashCode | 0xFF000000`로 결정론적 색상 생성.\r\n","data/grade_repository.md":"# GradeRepository\r\n\r\n> `lib/data/grade_repository.dart` — 성적 관리 Repository 인터페이스\r\n\r\n[`GradeManager`](grade_manager.md)의 정적 메서드를 인스턴스 메서드로 감싸 GetIt DI에 등록. 테스트에서 mock 주입 가능.\r\n\r\n---\r\n\r\n## 설계 배경\r\n\r\n[`AuthRepository`](auth_repository.md)와 동일한 패턴:\r\n```\r\nGradeManager (정적 메서드, SecureStorage 의존)\r\n    ↑\r\nGradeRepository (인스턴스 인터페이스)\r\n    ↑\r\nLocalGradeRepository (GradeManager에 위임)\r\n```\r\n\r\nRiverpod Provider 테스트에서 `MockGradeRepository`로 교체하면 sqflite/SharedPreferences/SecureStorage 의존을 제거할 수 있음.\r\n\r\n---\r\n\r\n## `GradeRepository` (추상 클래스)\r\n\r\n```dart\r\nabstract class GradeRepository {\r\n  Future<List<Exam>> loadExams();\r\n  Future<void> saveExams(List<Exam> exams);\r\n  Future<void> addExam(Exam exam);\r\n  Future<void> updateExam(Exam exam);\r\n  Future<void> deleteExam(String id);\r\n  Future<Map<String, double>> loadGoals();\r\n  Future<void> saveGoals(Map<String, double> goals);\r\n  Future<Map<String, double>> loadJeongsiGoals();\r\n  Future<void> saveJeongsiGoals(Map<String, double> goals);\r\n}\r\n```\r\n\r\n[`GradeManager`](grade_manager.md)의 모든 public 메서드를 인터페이스로 추출. 시험 CRUD + 수시/정시 목표 관리.\r\n\r\n---\r\n\r\n## `LocalGradeRepository` (기본 구현)\r\n\r\n```dart\r\nclass LocalGradeRepository implements GradeRepository {\r\n  const LocalGradeRepository();\r\n\r\n  @override\r\n  Future<List<Exam>> loadExams() => GradeManager.loadExams();\r\n\r\n  @override\r\n  Future<void> addExam(Exam exam) => GradeManager.addExam(exam);\r\n\r\n  @override\r\n  Future<void> deleteExam(String id) => GradeManager.deleteExam(id);\r\n\r\n  // ... 나머지 모두 GradeManager 정적 메서드에 위임\r\n}\r\n```\r\n\r\n`const` 생성자. 모든 메서드가 `GradeManager` 정적 메서드를 그대로 호출.\r\n\r\n---\r\n\r\n## GetIt 접근자\r\n\r\n```dart\r\nGradeRepository get gradeRepository => GetIt.I<GradeRepository>();\r\n```\r\n\r\n`service_locator.dart`에서 등록:\r\n```dart\r\ngetIt.registerLazySingleton<GradeRepository>(\r\n  () => const LocalGradeRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## 테스트 활용\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<GradeRepository>(MockGradeRepository());\r\n```\r\n\r\n`MockGradeRepository`에서 인메모리 리스트로 시험 데이터를 관리하면 SecureStorage 없이 [`ExamsNotifier`](../providers/providers.md) 테스트 가능.\r\n","data/local_database.md":"# LocalDataBase\n\n> `lib/data/local_database.dart` — SQLite 일정 DB, Firestore 동기화\n\n인스턴스 메서드 (GetIt에 싱글턴 등록). sqflite 기반 개인 일정 CRUD.\n\n---\n\n## 데이터베이스 스키마\n\n```sql\nCREATE TABLE schedules (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  startTime INTEGER NOT NULL,\n  endTime INTEGER NOT NULL,\n  content TEXT NOT NULL,\n  date TEXT NOT NULL,\n  endDate TEXT,\n  color INTEGER DEFAULT 4284811951\n)\n```\n\n- `date`: `'2026-04-10'` 형식\n- `endDate`: 여러 날에 걸치는 일정용 (v2에서 추가)\n- `color`: ARGB 정수값 (기본값 = 회색)\n\n---\n\n## `database` (getter)\n\n```dart\nFuture<Database> get database async {\n  if (_db != null) return _db!;\n  _db = await _initDB();\n  return _db!;\n}\n```\n\nLazy singleton 패턴. 최초 호출 시 DB 생성/열기.\n\n---\n\n## `_initDB`\n\n```dart\nFuture<Database> _initDB()\n```\n\n**설명**: SQLite DB를 열고 스키마를 생성한다.\n\n```dart\nreturn openDatabase(\n  path,\n  version: 2,\n  onCreate: (db, version) async { /* CREATE TABLE */ },\n  onUpgrade: (db, oldVersion, newVersion) async {\n    if (oldVersion < 2) {\n      await db.execute('ALTER TABLE schedules ADD COLUMN endDate TEXT');\n      await db.execute('ALTER TABLE schedules ADD COLUMN color INTEGER DEFAULT 4284811951');\n    }\n  },\n);\n```\n\nv1→v2 마이그레이션: `endDate`, `color` 컬럼 추가.\n\n---\n\n## `migrateFromPrefs`\n\n```dart\nFuture<void> migrateFromPrefs()\n```\n\n**설명**: SharedPreferences의 레거시 일정 데이터를 SQLite로 마이그레이션한다.\n\n```dart\nfinal old = prefs.getStringList('schedules');\nfinal batch = db.batch();\nfor (var json in old) {\n  batch.insert('schedules', {...});\n}\nawait batch.commit(noResult: true);\nawait prefs.remove('schedules');\n```\n\n배치 삽입으로 성능 최적화. 마이그레이션 후 원본 삭제.\n\n---\n\n## `insertSchedule`\n\n```dart\nFuture<int> insertSchedule(Schedule schedule)\n```\n\n일정 삽입 후 `syncToFirestore()` 호출. 반환값은 auto-increment ID.\n\n---\n\n## `deleteSchedule`\n\n```dart\nFuture<void> deleteSchedule(Schedule schedule)\n```\n\n**설명**: 일정을 삭제한다. ID가 있으면 ID로, 없으면 복합 조건으로 매칭한다.\n\n```dart\nif (schedule.id != null) {\n  await db.delete('schedules', where: 'id = ?', whereArgs: [schedule.id]);\n} else {\n  await db.delete('schedules',\n    where: 'startTime = ? AND endTime = ? AND content = ? AND date = ?',\n    whereArgs: [...],\n  );\n}\n```\n\n삭제 후 `syncToFirestore()` 호출.\n\n---\n\n## `watchSchedules`\n\n```dart\nStream<List<Schedule>> watchSchedules(DateTime date)\n```\n\n**설명**: 특정 날짜의 일정 목록을 스트림으로 반환한다.\n\n```dart\nfinal results = await db.query(\n  'schedules',\n  where: \"date LIKE ? OR (endDate IS NOT NULL AND date <= ? AND endDate >= ?)\",\n  whereArgs: ['$dateStr%', '$dateStr', '$dateStr'],\n  orderBy: 'startTime ASC',\n);\n```\n\n여러 날 일정도 포함: `date <= 조회일 <= endDate` 조건.\n\n> **참고**: 현재 `async*`로 한 번만 yield 후 종료. 실시간 갱신이 아닌 일회성 쿼리.\n\n---\n\n## `getSchedulesForDateRange`\n\n```dart\nFuture<List<Schedule>> getSchedulesForDateRange(DateTime start, int days)\n```\n\n`start`부터 `days`일간의 일정을 조회. 날짜별로 개별 쿼리 실행.\n\n---\n\n## `syncToFirestore`\n\n```dart\nFuture<void> syncToFirestore()\n```\n\n**설명**: 전체 일정 목록을 Firestore에 동기화한다.\n\n```dart\nfinal all = await _getAllSchedules();\nawait FirebaseFirestore.instance\n    .collection('users').doc(uid)\n    .collection('sync').doc('schedules')\n    .set({\n  'items': all.map((s) => s.toMap()).toList(),\n  'updatedAt': FieldValue.serverTimestamp(),\n});\n```\n\n매 CRUD 작업 후 자동 호출. 비로그인 시 skip.\n\n---\n\n## `loadFromFirestore`\n\n```dart\nFuture<void> loadFromFirestore()\n```\n\n**설명**: Firestore에서 일정을 복원한다 (로컬 DB가 비어있을 때만).\n\n```dart\nfinal existing = await db.query('schedules');\nif (existing.isNotEmpty) return;  // 로컬 데이터가 있으면 skip\n```\n\n기기 변경/재설치 시 복원 용도. 배치 삽입으로 성능 최적화.\n","data/meal.md":"# Meal\r\n\r\n> `lib/data/meal.dart` — 급식 데이터 모델 (freezed)\r\n\r\n`@freezed` 기반 불변 데이터 클래스. JSON 직렬화(`meal.g.dart`), 동등성/copyWith(`meal.freezed.dart`)는 코드 생성으로 자동 처리.\r\n\r\n---\r\n\r\n## 필드\r\n\r\n```dart\r\n@freezed\r\nclass Meal with _$Meal {\r\n  const factory Meal({\r\n    required String? meal,      // 메뉴 텍스트 (줄바꿈 구분). null이면 급식 없음\r\n    required DateTime date,     // 급식 날짜\r\n    required int mealType,      // 1=조식, 2=중식, 3=석식\r\n    required String kcal,       // 칼로리 (예: '823.4 Kcal')\r\n    @Default('') String ntrInfo, // 영양정보 (탄수화물/단백질/지방 등, 줄바꿈 구분)\r\n  }) = _Meal;\r\n}\r\n```\r\n\r\n- `meal` 필드: NEIS API 응답의 `DDISH_NM`에서 `<br/>`을 `\\n`으로 치환한 결과\r\n- `ntrInfo` 필드: `NTR_INFO`에서 동일하게 치환. 없으면 빈 문자열\r\n\r\n---\r\n\r\n## `getMealType`\r\n\r\n```dart\r\nString getMealType() {\r\n  switch (mealType) {\r\n    case 1: return '조식';\r\n    case 2: return '중식';\r\n    case 3: return '석식';\r\n    default: return '중식';\r\n  }\r\n}\r\n```\r\n\r\n`mealType` 정수를 한국어 문자열로 변환. 급식 카드 UI에서 식사 유형 라벨에 사용.\r\n\r\n---\r\n\r\n## `toString`\r\n\r\n```dart\r\n@override\r\nString toString() => meal ?? '';\r\n```\r\n\r\n`meal`이 null이면 빈 문자열. 디버그 출력 및 위젯 텍스트 바인딩에 활용.\r\n\r\n---\r\n\r\n## JSON 직렬화\r\n\r\n```dart\r\nfactory Meal.fromJson(Map<String, dynamic> json) => _$MealFromJson(json);\r\n```\r\n\r\n`_$MealFromJson`/`_$MealToJson`은 `meal.g.dart`에 자동 생성. `MealDataApi._saveToCache`/`_getFromCache`에서 SharedPreferences JSON 저장/복원에 사용.\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|------|------|\r\n| `MealDataApi.getMeal` | API 응답을 Meal 객체로 변환 후 반환 |\r\n| `MealDataApi._saveToCache` | Meal을 JSON으로 직렬화해 SharedPreferences에 캐시 |\r\n| `MealScreen` | Meal.meal을 줄바꿈 기준으로 split해 메뉴 리스트 표시 |\r\n| `WidgetService.updateMealWidget` | Meal.meal에서 알레르기 정보 제거 후 홈 위젯에 전달 |\r\n| [`DailyMealNotification`](../notification/daily_meal_notification.md) | Meal.meal을 한 줄로 합쳐 알림 본문에 사용 |\r\n","data/schedule_data.md":"# Schedule\n\n> `lib/data/schedule_data.dart` — 개인일정 데이터 모델\n\nSQLite `schedules` 테이블과 1:1 매핑되는 순수 Dart 클래스. freezed를 사용하지 않고 수동 `toMap`/`fromMap` 제공.\n\n---\n\n## 필드\n\n```dart\nclass Schedule {\n  final int? id;          // SQLite auto-increment PK. 새 일정은 null\n  final int startTime;    // 시작 시간 (0~23, 시 단위)\n  final int endTime;      // 종료 시간 (0~23, 시 단위)\n  final String content;   // 일정 내용\n  final String date;      // 시작 날짜 ('2026-04-10' 형식)\n  final String? endDate;  // 종료 날짜 (연속일정용. null이면 하루일정)\n  final int color;        // 0xFFRRGGBB 형태. 기본값 0xFF3F72AF (파란색)\n}\n```\n\n- `startTime`/`endTime`: 시(hour) 단위 정수. 예: 9시~12시 → `startTime: 9, endTime: 12`\n- `endDate`: v2 스키마에서 추가. 여러 날에 걸치는 일정 지원\n- `color`: 사용자가 캘린더에서 선택한 색상. 기본값은 앱 primaryColor\n\n---\n\n## `toMap`\n\n```dart\nMap<String, dynamic> toMap() => {\n  if (id != null) 'id': id,\n  'startTime': startTime,\n  'endTime': endTime,\n  'content': content,\n  'date': date,\n  'endDate': endDate,\n  'color': color,\n};\n```\n\nSQLite 삽입용. `id`가 null이면 맵에서 제외 → auto-increment로 자동 생성.\n\n---\n\n## `fromMap`\n\n```dart\nfactory Schedule.fromMap(Map<String, dynamic> map) => Schedule(\n  id: map['id'] as int?,\n  startTime: map['startTime'] as int,\n  endTime: map['endTime'] as int,\n  content: map['content'] as String,\n  date: map['date'] as String,\n  endDate: map['endDate'] as String?,\n  color: map['color'] as int? ?? 0xFF3F72AF,\n);\n```\n\nSQLite 쿼리 결과에서 Schedule 객체 생성. `color`가 null(v1 데이터)이면 기본 파란색.\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|------|------|\n| `LocalDataBase.insertSchedule` | Schedule → toMap → SQLite insert |\n| `LocalDataBase.watchSchedules` | SQLite row → fromMap → Schedule 리스트 |\n| `LocalDataBase.syncToFirestore` | Schedule → toMap → Firestore 동기화 |\n| `ScheduleBottomSheet` | 사용자 입력으로 Schedule 객체 생성 |\n| `ScheduleCard` | Schedule 필드를 캘린더 카드에 표시 |\n","data/search_history_service.md":"# SearchHistoryService\n\n> `lib/data/search_history_service.dart` — 검색 기록 (최대 10개)\n\n모든 메서드가 `static`. SharedPreferences에 JSON 배열로 저장. 로컬 전용 (Firestore 동기화 없음).\n\n---\n\n## `load`\n\n```dart\nstatic Future<List<String>> load()\n```\n\n**설명**: 저장된 검색 기록을 로드한다.\n\n```dart\nfinal raw = prefs.getString(_key);  // 'board_search_history'\nfinal decoded = jsonDecode(raw);\nreturn decoded.whereType<String>().toList();\n```\n\n파싱 실패 시 빈 리스트 반환 (silent fail).\n\n---\n\n## `add`\n\n```dart\nstatic Future<void> add(String query)\n```\n\n**설명**: 검색어를 기록에 추가한다. 중복 제거 + FIFO.\n\n```dart\nfinal trimmed = query.trim();\nif (trimmed.isEmpty) return;\ncurrent.removeWhere((e) => e == trimmed);  // 기존 중복 제거\ncurrent.insert(0, trimmed);                // 맨 앞에 추가\nfinal capped = current.take(_maxEntries).toList();  // 최대 10개\n```\n\n같은 검색어를 다시 입력하면 맨 앞으로 이동.\n\n---\n\n## `remove`\n\n```dart\nstatic Future<void> remove(String query)\n```\n\n특정 검색어 한 개를 기록에서 삭제.\n\n---\n\n## `clear`\n\n```dart\nstatic Future<void> clear()\n```\n\n검색 기록 전체 삭제. `prefs.remove(_key)`.\n","data/search_tokens.md":"# SearchTokens\n\n> `lib/data/search_tokens.dart` — 한국어 2-gram 토큰화\n\nFirestore는 LIKE/full-text 검색이 없으므로, 글 작성 시 제목+본문을 2-gram으로 분해해 `searchTokens` 배열에 저장하고, 검색 시 `array-contains-any` 쿼리로 매칭한다.\n\n예) `\"기말고사 일정\"` → `['기말', '말고', '고사', '일정']`\n\n---\n\n## `forDocument`\n\n```dart\nstatic List<String> forDocument(String title, String content, {int maxTokens = 200})\n```\n\n**설명**: 글 저장 시 사용. 제목+본문을 합쳐 2-gram 토큰을 생성한다.\n\n```dart\nfinal combined = '$title $content';\nfinal tokens = _ngrams(combined);\nif (tokens.length <= maxTokens) return tokens.toList();\nreturn tokens.take(maxTokens).toList();\n```\n\n- Set으로 자동 중복 제거\n- **maxTokens = 200**: Firestore 배열 크기 + 저장 비용 제한\n\n---\n\n## `forQuery`\n\n```dart\nstatic List<String> forQuery(String query, {int maxTokens = 10})\n```\n\n**설명**: 검색 시 사용. 사용자 쿼리에서 2-gram을 추출한다.\n\n```dart\nfinal cleaned = _normalize(query);\nif (cleaned.length == 1) return [cleaned];  // 1글자는 그대로 반환\nfinal tokens = _ngrams(query);\nreturn tokens.take(maxTokens).toList();\n```\n\n- **maxTokens = 10**: Firestore `array-contains-any` 한계는 30이지만 10개면 충분\n- 1글자 쿼리는 2-gram 생성 불가 → 1-gram 한 개 반환 (결과 없음 가능)\n\n---\n\n## `_ngrams`\n\n```dart\nstatic Set<String> _ngrams(String text)\n```\n\n**설명**: 정규화된 텍스트에서 연속 2글자 조합(sliding window)을 Set으로 생성한다.\n\n```dart\nfinal cleaned = _normalize(text);\nfor (int i = 0; i + 2 <= cleaned.length; i++) {\n  out.add(cleaned.substring(i, i + 2));\n}\n```\n\n---\n\n## `_normalize`\n\n```dart\nstatic String _normalize(String text)\n```\n\n**설명**: 텍스트를 검색용으로 정규화한다.\n\n1. 소문자 변환: `text.toLowerCase()`\n2. 허용 문자만 남기고 나머지 제거:\n   - `0x30~0x39`: 숫자 (0-9)\n   - `0x61~0x7A`: 영소문자 (a-z)\n   - `0xAC00~0xD7A3`: 한글 음절 (가~힣)\n3. 공백, 기호, 한자, 이모지 등 모두 제거\n\n```dart\nfor (final r in lower.runes) {\n  if (r >= 0x30 && r <= 0x39) { buf.writeCharCode(r); continue; }\n  if (r >= 0x61 && r <= 0x7A) { buf.writeCharCode(r); continue; }\n  if (r >= 0xAC00 && r <= 0xD7A3) { buf.writeCharCode(r); continue; }\n}\n```\n","data/secure_storage_service.md":"# SecureStorageService\n\n> `lib/data/secure_storage_service.dart` — 암호화 저장소 래퍼\n\n`flutter_secure_storage` wrapper. 모든 메서드가 `static`. Silent fail (에러 시 로깅만).\n\n---\n\n## 저장 정책\n\n| 여기에 저장 | 여기에 저장하지 않음 |\n|-------------|---------------------|\n| 학업 기록 (성적, 목표) | 캐시 (시간표/급식/공지) — 빠른 read, 평문 OK |\n| D-day 등 개인 식별 정보 | Firebase Auth / Kakao SDK 토큰 — SDK 자체 관리 |\n\n---\n\n## 키 상수\n\n```dart\nstatic const String keyGradeExams = 'secure_grade_exams';\nstatic const String keyGradeGoals = 'secure_grade_goals';\nstatic const String keyGradeJeongsiGoals = 'secure_grade_jeongsi_goals';\nstatic const String keyDdays = 'secure_ddays';\n```\n\n네임스페이스 prefix(`secure_`)로 충돌 방지.\n\n---\n\n## 플랫폼 설정\n\n```dart\nstatic const _storage = FlutterSecureStorage(\n  aOptions: AndroidOptions(encryptedSharedPreferences: true),\n  iOptions: IOSOptions(accessibility: KeychainAccessibility.first_unlock),\n);\n```\n\n- **Android**: `EncryptedSharedPreferences` 사용 (AES-256)\n- **iOS**: Keychain, `first_unlock` — 기기 잠금 해제 후 접근 가능\n\n---\n\n## `read`\n\n```dart\nstatic Future<String?> read(String key)\n```\n\n키에 해당하는 값을 읽음. 에러 시 null 반환 (로깅만).\n\n---\n\n## `write`\n\n```dart\nstatic Future<void> write(String key, String value)\n```\n\n키-값 쌍을 암호화 저장. 에러 시 silent fail.\n\n---\n\n## `delete` / `deleteAll`\n\n```dart\nstatic Future<void> delete(String key)\nstatic Future<void> deleteAll()\n```\n\n단일/전체 키 삭제. 에러 시 silent fail.\n\n---\n\n## `migrateFromPlain`\n\n```dart\nstatic Future<bool> migrateFromPlain({\n  required String key,\n  required String? oldValue,\n  required Future<void> Function() onMigrated,\n})\n```\n\n**설명**: SharedPreferences(평문) → SecureStorage(암호화) 일회성 마이그레이션 helper.\n\n```dart\nif (oldValue == null || oldValue.isEmpty) return false;  // 옮길 게 없음\nfinal existing = await read(key);\nif (existing != null && existing.isNotEmpty) return false;  // 이미 있음\nawait write(key, oldValue);      // 암호화 저장\nawait onMigrated();              // 호출부가 SharedPreferences에서 삭제\n```\n\n- `GradeManager.loadExams`, `DDayManager.loadAll` 등에서 첫 호출 시 자동 실행\n- 한 번 마이그레이션되면 다시 실행되지 않음 (idempotent)\n\n**반환값**: 옮겨진 경우 true, 아닌 경우 false\n","data/service_locator.md":"# ServiceLocator\r\n\r\n> `lib/data/service_locator.dart` — GetIt DI 설정\r\n\r\n앱 시작 시 한 번 호출하여 의존성을 등록한다.\r\n\r\n---\r\n\r\n## `setupServiceLocator`\r\n\r\n```dart\r\nFuture<void> setupServiceLocator()\r\n```\r\n\r\n**설명**: GetIt 컨테이너에 Repository와 서비스를 등록한다.\r\n\r\n```dart\r\nfinal getIt = GetIt.I;\r\n\r\nif (!getIt.isRegistered<AuthRepository>()) {\r\n  getIt.registerLazySingleton<AuthRepository>(\r\n    () => const FirebaseAuthRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<GradeRepository>()) {\r\n  getIt.registerLazySingleton<GradeRepository>(\r\n    () => const LocalGradeRepository(),\r\n  );\r\n}\r\n\r\nif (!getIt.isRegistered<LocalDataBase>()) {\r\n  final localDb = LocalDataBase();\r\n  await localDb.migrateFromPrefs();       // SharedPreferences → SQLite 마이그레이션\r\n  getIt.registerSingleton<LocalDataBase>(localDb);\r\n}\r\n```\r\n\r\n- `isRegistered` 체크로 중복 등록 방지 (테스트에서 여러 번 호출해도 안전)\r\n- [`AuthRepository`](auth_repository.md), [`GradeRepository`](grade_repository.md)는 `LazySignleton` (처음 접근 시 생성)\r\n- [`LocalDataBase`](local_database.md)는 즉시 생성 + 마이그레이션 실행\r\n\r\n**호출 위치**: `main()` 함수에서 Firebase 초기화 후 호출.\r\n\r\n---\r\n\r\n## `resetServiceLocator`\r\n\r\n```dart\r\nFuture<void> resetServiceLocator()\r\n```\r\n\r\n테스트용 헬퍼. `GetIt.I.reset()`으로 모든 등록을 초기화.\r\n\r\n```dart\r\n// 테스트 setUp에서:\r\nawait resetServiceLocator();\r\n// mock 등록\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n```\r\n\r\n---\r\n\r\n## 설계 참고\r\n\r\n> Riverpod Provider 내부에서 `GetIt.I<AuthRepository>()`로 접근하지 않고,\r\n> `ref.read(authRepositoryProvider)` 형태로 별도 Provider를 두는 것이 정석이지만,\r\n> 점진적 마이그레이션 단계라 GetIt + Riverpod 병행을 허용.\r\n","data/setting_data.md":"# SettingData\n\n> `lib/data/setting_data.dart` — SharedPreferences 설정 싱글톤\n\n앱 전체 설정을 SharedPreferences로 관리하는 싱글턴 클래스.\n\n---\n\n## 싱글턴 패턴\n\n```dart\nstatic final SettingData _instance = SettingData._internal();\nfactory SettingData() => _instance;\n```\n\n`SettingData()`로 어디서든 같은 인스턴스 접근.\n\n---\n\n## `init`\n\n```dart\nFuture<void> init()\n```\n\n`main()` 시작 시 한 번 호출. `SharedPreferences.getInstance()` 결과를 내부에 캐시.\n\n---\n\n## 학년/반 설정\n\n| 프로퍼티 | SharedPreferences 키 | 기본값 |\n|----------|---------------------|--------|\n| `grade` (get/set) | `'Grade'` | 0 |\n| `classNum` (get/set) | `'Class'` | 0 |\n| `isGradeSet` (get) | — | `grade > 0 && classNum > 0` |\n\n---\n\n## 테마 설정\n\n| 프로퍼티 | 키 | 기본값 | 설명 |\n|----------|----|--------|------|\n| `isDarkMode` | `'isDarkMode'` | false | 레거시 (themeModeIndex로 대체) |\n| `themeModeIndex` | `'themeModeIndex'` | 2 | 0=라이트, 1=다크, 2=시스템 |\n\n---\n\n## 알림 설정\n\n| 프로퍼티 | 키 | 기본값 |\n|----------|----|--------|\n| `isBreakfastNotificationOn` | `'isBreakfastNotificationOn'` | true |\n| `breakfastTime` | `'breakfastTime'` | `'06:30'` |\n| `isLunchNotificationOn` | `'isLunchNotificationOn'` | true |\n| `lunchTime` | `'lunchTime'` | `'12:00'` |\n| `isDinnerNotificationOn` | `'isDinnerNotificationOn'` | true |\n| `dinnerTime` | `'dinnerTime'` | `'17:00'` |\n| `isBoardNotificationOn` | `'isBoardNotificationOn'` | true |\n\n---\n\n## 범용 접근자\n\n```dart\nbool getBool(String key, {bool defaultValue = false})\nvoid setBool(String key, bool value)\n```\n\n카테고리별 알림 토글 등 동적 키에 사용. 예: `getBool('noti_board_자유', defaultValue: true)`.\n","data/subject.md":"# Subject\r\n\r\n> `lib/data/subject.dart` — 과목 데이터 모델 (freezed)\r\n\r\n`@freezed` 기반이지만 커스텀 `==`/`hashCode`를 오버라이드. JSON 직렬화는 코드 생성(`subject.g.dart`).\r\n\r\n---\r\n\r\n## 필드\r\n\r\n```dart\r\n@freezed\r\nclass Subject with _$Subject {\r\n  const factory Subject({\r\n    required String subjectName,   // 과목명 (예: '국어', '수학')\r\n    required int subjectClass,     // 반 번호. -1이면 특별실 과목\r\n    String? category,              // 과목 카테고리 (관리자 Firestore에서 설정)\r\n    @Default(false) bool isOriginal, // 관리자가 등록한 원본 과목 여부\r\n  }) = _Subject;\r\n}\r\n```\r\n\r\n- `subjectClass`: NEIS 시간표에서 `CLASS_NM` 값. 특별실(반 번호 없음)이면 `-1`\r\n- `category`: `TimetableDataApi.getSubjectsFromAdminFirestore`에서 가져오는 분류\r\n- `isOriginal`: 관리자 등록 과목이면 true, NEIS 자동 추출이면 false\r\n\r\n---\r\n\r\n## 동등성 비교 (커스텀)\r\n\r\n```dart\r\n@override\r\nbool operator ==(Object other) =>\r\n    identical(this, other) ||\r\n    other is Subject &&\r\n        runtimeType == other.runtimeType &&\r\n        subjectName == other.subjectName &&\r\n        subjectClass == other.subjectClass;\r\n\r\n@override\r\nint get hashCode => subjectName.hashCode ^ subjectClass.hashCode;\r\n```\r\n\r\n`subjectName` + `subjectClass` 조합으로 동등성 판단. `category`와 `isOriginal`은 비교에서 제외.\r\n\r\n**이유**: `TimetableDataApi.getAllSubjectCombinations`에서 Set에 Subject를 넣어 중복 제거 시, 같은 과목+반 조합이면 같은 과목으로 취급해야 하므로.\r\n\r\n---\r\n\r\n## JSON 직렬화\r\n\r\n```dart\r\nfactory Subject.fromJson(Map<String, dynamic> json) => _$SubjectFromJson(json);\r\n```\r\n\r\n[`SubjectDataManager`](subject_data_manager.md)에서 SharedPreferences/Firestore에 저장/복원할 때 사용.\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|------|------|\r\n| `TimetableDataApi.getAllSubjectCombinations` | NEIS 시간표에서 과목+반 조합 추출, Set으로 중복 제거 |\r\n| `TimetableDataApi.getCustomTimeTable` | 사용자 선택 Subject 리스트로 커스텀 시간표 생성 |\r\n| `TimetableDataApi.getSubjectsFromAdminFirestore` | Firestore에서 관리자 등록 과목 조회 |\r\n| [`SubjectDataManager`](subject_data_manager.md) | 선택과목 로컬/Firestore 저장 |\r\n| `TimetableSelectScreen` | 과목 선택 UI에서 Subject 리스트 표시 |\r\n","data/subject_data_manager.md":"# SubjectDataManager\r\n\r\n> `lib/data/subject_data_manager.dart` — 선택과목 로드/저장, Firestore 동기화\r\n\r\n모든 메서드가 `static`. 학년별 선택과목을 SharedPreferences(로컬)와 Firestore(클라우드) 양쪽에 관리.\r\n\r\n---\r\n\r\n## `loadSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<List<Subject>> loadSelectedSubjects(int grade)\r\n```\r\n\r\n**설명**: 학년별 선택과목 목록을 로드한다.\r\n\r\n1. SharedPreferences에서 로컬 데이터 확인:\r\n   ```dart\r\n   final jsonString = prefs.getString('$_selectedSubjectsKeyPrefix$grade');\r\n   // 키: 'selected_subjects_grade_1', 'selected_subjects_grade_2', ...\r\n   ```\r\n\r\n2. 로컬 데이터가 없고 로그인 상태면 Firestore에서 복원:\r\n   ```dart\r\n   if (localSubjects.isEmpty && AuthService.isLoggedIn) {\r\n     final doc = await FirebaseFirestore.instance\r\n         .collection('users').doc(uid)\r\n         .collection('subjects').doc('grade_$grade')\r\n         .get();\r\n   }\r\n   ```\r\n\r\n3. Firestore에서 복원한 데이터는 로컬에도 저장:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, localSubjects);\r\n   ```\r\n\r\n---\r\n\r\n## `saveSelectedSubjects`\r\n\r\n```dart\r\nstatic Future<void> saveSelectedSubjects(int grade, List<Subject> selectedSubjects)\r\n```\r\n\r\n**설명**: 선택과목을 로컬과 Firestore 양쪽에 저장한다.\r\n\r\n1. 로컬 SharedPreferences에 즉시 저장:\r\n   ```dart\r\n   await _saveLocal(prefs, grade, selectedSubjects);\r\n   ```\r\n\r\n2. 로그인 상태면 Firestore에도 동기화:\r\n   ```dart\r\n   await FirebaseFirestore.instance\r\n       .collection('users').doc(uid)\r\n       .collection('subjects').doc('grade_$grade')\r\n       .set({\r\n     'subjects': selectedSubjects.map((s) => s.toJson()).toList(),\r\n     'updatedAt': FieldValue.serverTimestamp(),\r\n   });\r\n   ```\r\n\r\n---\r\n\r\n## `_saveLocal`\r\n\r\n```dart\r\nstatic Future<void> _saveLocal(SharedPreferences prefs, int grade, List<Subject> subjects)\r\n```\r\n\r\n내부 헬퍼. [Subject](subject.md) 리스트를 JSON 인코딩 후 SharedPreferences에 저장.\r\n","main.md":"# Main\r\n\r\n> `lib/main.dart` — 앱 진입점, MainScreen\r\n\r\n---\r\n\r\n## `main()`\r\n\r\n```dart\r\nFuture<void> main() async\r\n```\r\n\r\n**설명**: 앱 초기화를 수행한다.\r\n\r\n1. **Firebase 초기화**: 중복 방지 체크 후 초기화:\r\n   ```dart\r\n   if (Firebase.apps.isEmpty) {\r\n     await Firebase.initializeApp(options: DefaultFirebaseOptions.currentPlatform);\r\n   }\r\n   ```\r\n\r\n2. **App Check**: 릴리스 빌드는 Play Integrity, 디버그는 debug provider:\r\n   ```dart\r\n   androidProvider: const bool.fromEnvironment('dart.vm.product')\r\n       ? AndroidProvider.playIntegrity\r\n       : AndroidProvider.debug,\r\n   ```\r\n\r\n3. **Performance Monitoring** + **Analytics** 활성화\r\n\r\n4. **Crashlytics**: FlutterError 핸들러 + Firestore `crash_logs` 컬렉션에 에러 기록:\r\n   ```dart\r\n   FlutterError.onError = (details) {\r\n     FirebaseCrashlytics.instance.recordFlutterFatalError(details);\r\n     _logCrashToFirestore(details);\r\n   };\r\n   ```\r\n\r\n5. **Kakao SDK** 초기화\r\n\r\n6. **[SettingData](data/setting_data.md)** 초기화 (알림 권한은 온보딩 완료 시 요청)\r\n\r\n7. **Timezone** 초기화 (`Asia/Seoul`)\r\n\r\n8. **테마 모드** 복원: `SettingData().themeModeIndex` → `ThemeMode`\r\n\r\n9. **과목 데이터 프리로드** (2학년, 3학년 병렬):\r\n   ```dart\r\n   unawaited(_preloadSubjects(2));\r\n   unawaited(_preloadSubjects(3));\r\n   ```\r\n\r\n10. **[ServiceLocator](data/service_locator.md)** 설정 (GetIt DI)\r\n\r\n11. **로컬 급식 알림** 초기화 + 스케줄링\r\n\r\n12. **FCM** 초기화 + **위젯 서비스** 초기화 (fire-and-forget)\r\n\r\n13. `ProviderScope`로 감싼 `HansolHighSchool` 위젯 실행\r\n\r\n---\r\n\r\n## 전역 상태\r\n\r\n| 변수 | 타입 | 용도 |\r\n|------|------|------|\r\n| `themeNotifier` | `ValueNotifier<ThemeMode>` | 레거시 테마 전환 (Riverpod으로 점진 마이그레이션) |\r\n| `localeNotifier` | `ValueNotifier<Locale?>` | 인앱 언어 전환 (null=시스템, `Locale('ko')`, `Locale('en')`) |\r\n| `appRefreshNotifier` | `ValueNotifier<int>` | 값 변경 시 MainScreen 전체 리빌드 |\r\n| `rootNavigatorKey` | `GlobalKey<NavigatorState>` | FCM 딥링크에서 Navigator 접근용 |\r\n| `notificationStream` | `StreamController<String?>` | 알림 탭 → MealScreen 전환용 |\r\n\r\n---\r\n\r\n## `HansolHighSchool` (루트 위젯)\r\n\r\n```dart\r\nclass HansolHighSchool extends ConsumerStatefulWidget\r\n```\r\n\r\n**설명**: 앱의 루트 위젯. 테마 모드 전환과 MaterialApp 설정을 담당.\r\n\r\n1. `initState`에서 [`AnimatedAppColors`](styles/app_colors.md) 초기화 + `themeNotifier` 리스너 등록\r\n2. `_resolveIsDark`: ThemeMode.system일 때 platformBrightness 확인\r\n3. `build`: `ref.watch(themeProvider)` → `MaterialApp` 테마 적용\r\n4. `localeNotifier` 기반 `ValueListenableBuilder<Locale?>` 로 즉시 언어 전환\r\n\r\n```dart\r\nreturn ValueListenableBuilder<Locale?>(\r\n  valueListenable: localeNotifier,\r\n  builder: (_, locale, __) => MaterialApp(\r\n    navigatorKey: rootNavigatorKey,\r\n    locale: locale,  // null이면 시스템 로캘 사용\r\n    theme: _lightTheme,\r\n    darkTheme: _darkTheme,\r\n    themeMode: mode,\r\n    home: ...,\r\n  ),\r\n);\r\n```\r\n\r\n`appRefreshNotifier` 값 변경 → `ValueKey` 변경 → MainScreen 재생성.\r\n\r\n---\r\n\r\n## `MainScreen`\r\n\r\n```dart\r\nclass MainScreen extends StatefulWidget\r\n```\r\n\r\n**설명**: 급식/홈/일정 3탭 하단 네비게이션 + 초기 체크 로직.\r\n\r\n### `initState` 체크 순서\r\n\r\n1. `_checkAccountExists()`: 프로필이 없으면 로그아웃 (삭제된 계정 처리)\r\n2. `_checkNewSemester()`: 학기 변경 시 프로필 업데이트 안내 + 선택과목/시간표 캐시 초기화\r\n3. 온보딩 미완료 시 → `OnboardingScreen`\r\n4. 비로그인 시 → `LoginScreen`\r\n5. 로그인 상태면 Firestore에서 일정 복원: `GetIt.I<LocalDataBase>().loadFromFirestore()`\r\n6. `UpdateChecker.check()` + `PopupNotice.check()`\r\n\r\n### 네비게이션\r\n\r\n```dart\r\n_pages = [const MealScreen(), HomeScreen(key: _homeKey), const NoticeScreen()];\r\n```\r\n\r\n- `PageView` + `NavigationBar` (아이콘 only, 라벨 숨김)\r\n- 홈 탭 전환 시 `_homeKey.currentState?.refresh()` 호출\r\n- 알림 탭 (`meal_screen` payload) → 급식 탭으로 이동\r\n\r\n---\r\n\r\n## `_logCrashToFirestore`\r\n\r\n```dart\r\nvoid _logCrashToFirestore(FlutterErrorDetails details)\r\n```\r\n\r\nFirestore `crash_logs` 컬렉션에 에러 정보 저장. 에러 메시지 500자, 스택 1000자로 절삭.\r\n","network/network_status.md":"# NetworkStatus\r\n\r\n> `lib/network/network_status.dart` — 네트워크 연결 상태\r\n\r\n`connectivity_plus` 플러그인으로 현재 연결 상태를 확인한다.\r\n\r\n---\r\n\r\n## `isUnconnected`\r\n\r\n```dart\r\nstatic Future<bool> isUnconnected()\r\n```\r\n\r\n**설명**: WiFi/모바일 데이터 미연결 시 `true`를 반환한다.\r\n\r\n```dart\r\nfinal results = await Connectivity().checkConnectivity();\r\nreturn results.isEmpty || results.contains(ConnectivityResult.none);\r\n```\r\n\r\n- `results`가 비어있거나 `none`을 포함하면 오프라인\r\n- API 호출 전 오프라인 체크에 사용 ([MealDataApi](../api/meal_data_api.md), [TimetableDataApi](../api/timetable_data_api.md), [NoticeDataApi](../api/notice_data_api.md))\r\n- 오프라인이면 캐시 데이터 반환 또는 안내 메시지 표시\r\n","notification/daily_meal_notification.md":"# DailyMealNotification\r\n\r\n> `lib/notification/daily_meal_notification.dart` — 로컬 급식 알림 스케줄링\r\n\r\n인스턴스 메서드. 조식/중식/석식 평일 반복 알림을 `flutter_local_notifications` + `timezone`으로 스케줄링.\r\n\r\n---\r\n\r\n## `initializeNotifications`\r\n\r\n```dart\r\nFuture<void> initializeNotifications()\r\n```\r\n\r\n**설명**: 로컬 알림 플러그인을 초기화한다.\r\n\r\n1. Android/iOS 초기화 설정:\r\n   ```dart\r\n   const androidSettings = AndroidInitializationSettings('@mipmap/ic_launcher');\r\n   final iosSettings = DarwinInitializationSettings(...);\r\n   ```\r\n\r\n2. 알림 탭 콜백 등록:\r\n   ```dart\r\n   await _localNotificationsPlugin.initialize(\r\n     InitializationSettings(...),\r\n     onDidReceiveNotificationResponse: _onNotificationTap,\r\n     onDidReceiveBackgroundNotificationResponse: _onBackgroundNotification,\r\n   );\r\n   ```\r\n\r\n3. 플랫폼별 권한 요청:\r\n   ```dart\r\n   if (Platform.isIOS) { ... requestPermissions(...) }\r\n   else if (Platform.isAndroid) { await Permission.notification.request(); }\r\n   ```\r\n\r\n---\r\n\r\n## `scheduleDailyNotifications`\r\n\r\n```dart\r\nFuture<void> scheduleDailyNotifications()\r\n```\r\n\r\n**설명**: [SettingData](../data/setting_data.md) 설정에 따라 평일(월~금) 반복 알림을 등록한다.\r\n\r\n```dart\r\nif (settings.isBreakfastNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 1, mealLabel: '조식', time: ...);\r\n}\r\nif (settings.isLunchNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 2, mealLabel: '중식', time: ...);\r\n}\r\nif (settings.isDinnerNotificationOn) {\r\n  await _scheduleWeeklyNotification(id: 3, mealLabel: '석식', time: ...);\r\n}\r\n```\r\n\r\n기존 알림을 모두 취소 후 재등록 (`cancelAllNotifications` 먼저 호출).\r\n\r\n---\r\n\r\n## `_scheduleWeeklyNotification`\r\n\r\n```dart\r\nFuture<void> _scheduleWeeklyNotification({\r\n  required int id, required String mealLabel,\r\n  required TimeOfDay time, required List<int> weekdays,\r\n})\r\n```\r\n\r\n**설명**: 특정 식사의 요일별 반복 알림을 등록한다.\r\n\r\n1. 오늘의 급식 메뉴를 미리 조회해 알림 본문에 포함:\r\n   ```dart\r\n   final meal = await MealDataApi.getMeal(date: DateTime.now(), mealType: mealType, ...);\r\n   menuPreview = _cleanMenu(meal?.meal);\r\n   ```\r\n\r\n2. 월~금 각 요일에 대해 개별 알림 등록:\r\n   ```dart\r\n   for (int weekday in weekdays) {\r\n     final notificationId = id * 10 + weekday;  // 예: 중식+화요일 = 22\r\n     await _localNotificationsPlugin.zonedSchedule(\r\n       notificationId, ...,\r\n       matchDateTimeComponents: DateTimeComponents.dayOfWeekAndTime,  // 매주 반복\r\n     );\r\n   }\r\n   ```\r\n\r\n3. `BigTextStyleInformation`으로 메뉴 미리보기 표시.\r\n\r\n---\r\n\r\n## `sendTestNotification`\r\n\r\n```dart\r\nFuture<void> sendTestNotification()\r\n```\r\n\r\n5초 후 테스트 알림 전송. 알림 설정 화면에서 \"테스트 알림 보내기\" 버튼에 연결.\r\n\r\n---\r\n\r\n## `updateNotifications`\r\n\r\n```dart\r\nFuture<void> updateNotifications()\r\n```\r\n\r\n설정 변경 시 호출. `cancelAllNotifications()` + `scheduleDailyNotifications()`.\r\n\r\n---\r\n\r\n## `_cleanMenu`\r\n\r\n```dart\r\nString _cleanMenu(String? menu)\r\n```\r\n\r\n급식 메뉴에서 알레르기 정보 번호를 제거하고 한 줄로 합침:\r\n\r\n```dart\r\nmenu.split('\\n')\r\n    .map((e) => e.replaceAll(RegExp(r'\\([0-9.,\\s]+\\)'), '').trim())\r\n    .where((e) => e.isNotEmpty)\r\n    .join(' · ');\r\n// \"치킨까스 (1.2.5) \\n 된장국 (5.6)\" → \"치킨까스 · 된장국\"\r\n```\r\n\r\n---\r\n\r\n## 내부 유틸리티\r\n\r\n| 함수 | 설명 |\r\n|------|------|\r\n| `_parseTimeOfDay(timeString)` | `'12:00'` → `TimeOfDay(hour: 12, minute: 0)` |\r\n| `_nextInstanceOfWeekday(time, weekday)` | 다음 해당 요일+시간의 `TZDateTime` 계산 |\r\n| `_nextInstanceOfTime(timeOfDay)` | 오늘/내일 중 해당 시간이 미래인 `TZDateTime` |\r\n","notification/fcm_service.md":"# FcmService\r\n\r\n> `lib/notification/fcm_service.dart` — FCM 푸시 알림, 토픽, 딥링크\r\n\r\n모든 메서드가 `static`. Firebase Cloud Messaging 초기화, 토큰 관리, 토픽 구독, 딥링크 라우팅을 담당.\r\n\r\n---\r\n\r\n## `initialize`\r\n\r\n```dart\r\nstatic Future<void> initialize()\r\n```\r\n\r\n**설명**: FCM 서비스를 초기화한다. `main()` 에서 한 번 호출.\r\n\r\n1. Android 알림 채널 생성 (`_initChannel`)\r\n\r\n2. **로컬 알림 플러그인 초기화** (포그라운드 FCM 알림 탭 콜백 등록):\r\n   ```dart\r\n   await _localNotifications.initialize(\r\n     const InitializationSettings(android: androidSettings, iOS: iosSettings),\r\n     onDidReceiveNotificationResponse: onNotificationTap,\r\n   );\r\n   ```\r\n   > `onNotificationTap`은 `main.dart`에서 import. 탭 시 `notificationStream` 전달 + `handleLocalNotificationTap` → `_handleDeepLink` 호출\r\n\r\n3. Android 알림 채널 등록\r\n\r\n4. 알림 권한 요청:\r\n   ```dart\r\n   await _messaging.requestPermission(alert: true, badge: true, sound: true);\r\n   ```\r\n\r\n5. 포그라운드 알림 표시 옵션 설정\r\n\r\n6. FCM 토큰 저장 + 토큰 갱신 리스너 등록:\r\n   ```dart\r\n   await _saveToken();\r\n   _messaging.onTokenRefresh.listen(_onTokenRefresh);\r\n   ```\r\n\r\n7. 토픽 구독 (설정에 따라):\r\n   ```dart\r\n   await _subscribeTopics();\r\n   ```\r\n\r\n8. 메시지 핸들러 등록:\r\n   ```dart\r\n   FirebaseMessaging.onMessage.listen(_onForegroundMessage);        // 포그라운드\r\n   FirebaseMessaging.onMessageOpenedApp.listen(_onMessageOpenedApp); // 백그라운드 탭\r\n   final initialMessage = await _messaging.getInitialMessage();      // 종료 상태 탭\r\n   ```\r\n\r\n---\r\n\r\n## `_saveToken` / `_onTokenRefresh`\r\n\r\n```dart\r\nstatic Future<void> _saveToken()\r\nstatic Future<void> _onTokenRefresh(String token)\r\n```\r\n\r\nFCM 토큰을 Firestore `users/{uid}` 문서의 `fcmToken` 필드에 저장. Cloud Function이 이 토큰으로 개인 알림 전송.\r\n\r\n---\r\n\r\n## 토픽 관리\r\n\r\n### `_subscribeTopics`\r\n\r\n```dart\r\nstatic Future<void> _subscribeTopics()\r\n```\r\n\r\n[SettingData](../data/setting_data.md) 설정에 따라 토픽을 구독한다:\r\n\r\n- `board_new_post`: 전체 게시판 알림\r\n- 카테고리별: `board_free`, `board_question`, `board_info`, `board_lost`, `board_council`, `board_club`\r\n- `board_popular`: 인기글 알림\r\n\r\n### 한글→영문 토픽 매핑\r\n\r\n```dart\r\nstatic const _categoryTopicKey = {\r\n  '자유': 'free', '질문': 'question', '정보공유': 'info',\r\n  '분실물': 'lost', '학생회': 'council', '동아리': 'club',\r\n};\r\n```\r\n\r\nFCM 토픽명에 한글 불가 → 영문 변환.\r\n\r\n### `toggleBoardNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleBoardNotification(bool enabled)\r\n```\r\n\r\n전체 게시판 알림 토글. `board_new_post` 토픽 구독/해제 + [SettingData](../data/setting_data.md) 저장.\r\n\r\n### `toggleCategoryNotification`\r\n\r\n```dart\r\nstatic Future<void> toggleCategoryNotification(String category, bool enabled)\r\n```\r\n\r\n카테고리별 알림 토글. 예: `toggleCategoryNotification('자유', false)`.\r\n\r\n### `togglePopularNotification`\r\n\r\n```dart\r\nstatic Future<void> togglePopularNotification(bool enabled)\r\n```\r\n\r\n인기글 알림 토글. `board_popular` 토픽.\r\n\r\n---\r\n\r\n## `_onForegroundMessage`\r\n\r\n```dart\r\nstatic void _onForegroundMessage(RemoteMessage message)\r\n```\r\n\r\n**설명**: 포그라운드에서 FCM 메시지 수신 시 로컬 알림으로 표시한다.\r\n\r\n```dart\r\n_localNotifications.show(\r\n  notification.hashCode,\r\n  notification.title,\r\n  notification.body,\r\n  NotificationDetails(...),\r\n  payload: payload,  // key=value;key=value 형태\r\n);\r\n```\r\n\r\n---\r\n\r\n## `_handleDeepLink`\r\n\r\n```dart\r\nstatic Future<void> _handleDeepLink(Map<String, dynamic> data)\r\n```\r\n\r\n**설명**: 알림 탭 시 data payload 기반으로 화면을 라우팅한다.\r\n\r\n```dart\r\nswitch (type) {\r\n  case 'comment':\r\n  case 'new_post':\r\n    navigator.push(...PostDetailScreen(postId: postId));\r\n  case 'account':\r\n    if (isManager) navigator.push(...AdminScreen());\r\n    else navigator.push(...NotificationScreen());\r\n  case 'chat':\r\n    // chatId로 chat 문서 조회 → 상대방 정보 로드 → ChatRoomScreen 이동\r\n}\r\n```\r\n\r\n| type | 대상 | 이동 화면 |\r\n|------|------|----------|\r\n| `comment` | 게시글 작성자 / 멘션 대상 | `PostDetailScreen` |\r\n| `new_post` | 토픽 구독자 | `PostDetailScreen` |\r\n| `account` | 관리자 (가입 요청) | `AdminScreen` |\r\n| `account` | 일반 유저 (승인/정지 등) | `NotificationScreen` |\r\n| `chat` | 채팅 참여자 | `ChatRoomScreen` |\r\n\r\n> 관리자/일반 유저 구분은 `AuthService.cachedProfile?.isManager`로 판별\r\n\r\n---\r\n\r\n## payload 인코딩/디코딩\r\n\r\n```dart\r\nstatic String _encodePayload(Map<String, dynamic> data)\r\n// → \"type=comment;postId=abc123\"\r\n\r\nstatic Map<String, dynamic> decodePayload(String payload)\r\n// \"type=comment;postId=abc123\" → {type: 'comment', postId: 'abc123'}\r\n```\r\n\r\n포그라운드 로컬 알림의 payload 전달용. `=`로 key-value 분리, `;`로 쌍 분리.\r\n\r\n---\r\n\r\n## `onUserLogin`\r\n\r\n```dart\r\nstatic Future<void> onUserLogin()\r\n```\r\n\r\n로그인 직후 호출. 토큰 저장 + 토픽 재구독.\r\n\r\n---\r\n\r\n## `firebaseMessagingBackgroundHandler`\r\n\r\n```dart\r\n@pragma('vm:entry-point')\r\nFuture<void> firebaseMessagingBackgroundHandler(RemoteMessage message) async {}\r\n```\r\n\r\n백그라운드 메시지 핸들러. 현재 빈 구현 (시스템 알림은 자동 표시).\r\n`@pragma('vm:entry-point')`로 tree-shaking 방지.\r\n","notification/popup_notice.md":"# PopupNotice\n\n> `lib/notification/popup_notice.dart` — 인앱 팝업 공지\n\nFirestore `app_config/popup` 문서 기반 긴급/이벤트 팝업.\n\n---\n\n## `check`\n\n```dart\nstatic Future<void> check(BuildContext context)\n```\n\n**설명**: 활성 팝업이 있으면 다이얼로그를 표시한다. `MainScreen.initState`에서 호출.\n\n1. Firestore에서 팝업 설정 조회:\n   ```dart\n   final doc = await FirebaseFirestore.instance\n       .collection('app_config').doc('popup').get();\n   if (data['active'] != true) return;\n   ```\n\n2. 날짜 범위 체크 (`startDate` ~ `endDate`):\n   ```dart\n   if (startDate.isNotEmpty && todayStr.compareTo(startDate) < 0) return;\n   if (endDate.isNotEmpty && todayStr.compareTo(endDate) > 0) return;\n   ```\n\n3. \"오늘 안 보기\" 체크:\n   ```dart\n   final dismissKey = 'popup_dismissed_$todayStr';\n   if (prefs.getBool(dismissKey) == true) return;\n   ```\n\n4. 타입별 색상/아이콘 결정:\n   ```dart\n   'emergency' → Colors.red + Icons.warning_amber_rounded\n   'event'     → Color(0xFF4CAF50) + Icons.celebration\n   'notice'    → AppColors.theme.primaryColor + Icons.campaign\n   ```\n\n5. 다이얼로그 표시:\n   - **필수 팝업** (`dismissible: false`): 닫기 불가, 확인만 가능\n   - **일반 팝업** (`dismissible: true`): 확인 + \"오늘 하루 안 보기\" 버튼\n\n6. \"오늘 하루 안 보기\" 탭 시:\n   ```dart\n   prefs.setBool(dismissKey, true);  // 당일 키로 저장\n   ```\n\n---\n\n## Firestore 문서 구조 (`app_config/popup`)\n\n| 필드 | 타입 | 설명 |\n|------|------|------|\n| `active` | bool | 팝업 활성화 여부 |\n| `title` | String | 팝업 제목 |\n| `content` | String | 팝업 본문 |\n| `type` | String | `'emergency'` / `'event'` / `'notice'` |\n| `startDate` | String | 시작일 (`'2026-04-01'`) |\n| `endDate` | String | 종료일 |\n| `dismissible` | bool | 닫기 가능 여부 |\n","notification/update_checker.md":"# UpdateChecker\n\n> `lib/notification/update_checker.dart` — Firestore 기반 앱 버전 체크\n\n---\n\n## `check`\n\n```dart\nstatic Future<void> check(BuildContext context)\n```\n\n**설명**: 앱 버전을 체크하고 업데이트 다이얼로그를 표시한다. `MainScreen.initState`에서 호출.\n\n1. Firestore에서 버전 정보 조회:\n   ```dart\n   final doc = await FirebaseFirestore.instance\n       .collection('app_config').doc('version').get();\n   ```\n\n2. 현재 앱 버전 확인:\n   ```dart\n   final packageInfo = await PackageInfo.fromPlatform();\n   final currentVersion = packageInfo.version;\n   ```\n\n3. 버전 비교:\n   ```dart\n   final forceUpdate = _compareVersions(currentVersion, minVersion) < 0;   // 최소 버전 미만\n   final optionalUpdate = _compareVersions(currentVersion, latestVersion) < 0;  // 최신 미만\n   ```\n\n4. 다이얼로그 분기:\n   - **필수 업데이트** (`forceUpdate`): 닫기 불가 (`PopScope.canPop: false`), \"업데이트\"만 가능\n   - **선택 업데이트** (`optionalUpdate`): \"업데이트\" + \"나중에\" 버튼\n\n5. 업데이트 버튼 탭 시 스토어 URL로 이동:\n   ```dart\n   launchUrl(Uri.parse(updateUrl), mode: LaunchMode.externalApplication);\n   ```\n\n6. 플랫폼별 URL 분기:\n   ```dart\n   final updateUrl = (isIOS ? data['updateUrlIOS'] : data['updateUrlAndroid'])\n       ?? data['updateUrl'] ?? '';\n   ```\n\n---\n\n## `_compareVersions`\n\n```dart\nstatic int _compareVersions(String a, String b)\n```\n\n**설명**: 시맨틱 버전을 비교한다 (major.minor.patch).\n\n```dart\nfinal aParts = a.split('.').map(int.parse).toList();\nfinal bParts = b.split('.').map(int.parse).toList();\n// 왼쪽부터 비교, a < b → -1, a > b → 1, 같으면 0\n```\n\n빈 문자열이면 0 반환 (비교 건너뜀).\n\n---\n\n## Firestore 문서 구조 (`app_config/version`)\n\n| 필드 | 타입 | 설명 |\n|------|------|------|\n| `latest` | String | 최신 버전 (예: `'2.1.0'`) |\n| `min` | String | 최소 지원 버전 (이 미만이면 필수 업데이트) |\n| `updateUrl` | String | 기본 스토어 URL |\n| `updateUrlAndroid` | String? | Android 전용 URL |\n| `updateUrlIOS` | String? | iOS 전용 URL |\n| `message` | String | 업데이트 안내 메시지 |\n","providers/providers.md":"# Providers\r\n\r\n> `lib/providers/` — Riverpod Notifier/AsyncNotifier 전체\r\n\r\n---\r\n\r\n## auth_provider.dart\r\n\r\n### `authStateProvider`\r\n\r\n```dart\r\nfinal authStateProvider = StreamProvider<User?>((ref) {\r\n  return FirebaseAuth.instance.authStateChanges();\r\n});\r\n```\r\n\r\nFirebase Auth 상태 스트림. 로그인/로그아웃 시 자동 갱신.\r\n\r\n### `UserProfileNotifier` / `userProfileProvider`\r\n\r\n```dart\r\nclass UserProfileNotifier extends AsyncNotifier<UserProfile?> {\r\n  @override\r\n  Future<UserProfile?> build() async {\r\n    final auth = ref.watch(authStateProvider);\r\n    return auth.when(\r\n      data: (user) async => user == null ? null : AuthService.getUserProfile(),\r\n      loading: () => null,\r\n      error: (_, __) => null,\r\n    );\r\n  }\r\n}\r\n```\r\n\r\n`authStateProvider`를 watch → 로그인 상태 변경 시 자동 재조회.\r\n\r\n#### `refresh()`\r\n\r\n```dart\r\nFuture<void> refresh() async {\r\n  state = const AsyncLoading();\r\n  AuthService.clearProfileCache();\r\n  state = await AsyncValue.guard(() => AuthService.getUserProfile());\r\n}\r\n```\r\n\r\n프로필 수정 후 호출. 캐시 초기화 + Firestore에서 새로 조회.\r\n\r\n#### `save(profile)`\r\n\r\n```dart\r\nFuture<void> save(UserProfile profile) async {\r\n  state = AsyncData(profile);                    // 낙관적 UI 업데이트\r\n  await AuthService.saveUserProfile(profile);    // 서버 저장\r\n  AuthService.clearProfileCache();\r\n}\r\n```\r\n\r\n### 파생 Provider\r\n\r\n| Provider | 타입 | 설명 |\r\n|----------|------|------|\r\n| `isLoggedInProvider` | `Provider<bool>` | `authStateProvider.user != null` |\r\n| `isManagerProvider` | `Provider<bool>` | `profile?.isManager ?? false` |\r\n| `isAdminProvider` | `Provider<bool>` | `profile?.isAdmin ?? false` |\r\n| `isSuspendedProvider` | `Provider<bool>` | `profile?.isSuspended ?? false` |\r\n\r\n---\r\n\r\n## grade_provider.dart\r\n\r\n### `ExamsNotifier` / `examsProvider`\r\n\r\n```dart\r\nclass ExamsNotifier extends AsyncNotifier<List<Exam>> {\r\n  @override\r\n  Future<List<Exam>> build() => GradeManager.loadExams();\r\n}\r\n```\r\n\r\n모든 mutator는 `await future`로 초기 build 완료를 보장한 뒤 직접 state를 갱신 (`invalidateSelf` race condition 회피).\r\n\r\n#### `add(exam)`\r\n\r\n```dart\r\nFuture<void> add(Exam exam) async {\r\n  final current = await future;\r\n  await GradeManager.addExam(exam);\r\n  state = AsyncData([...current, exam]);\r\n}\r\n```\r\n\r\n#### `updateExam(exam)`\r\n\r\n```dart\r\nstate = AsyncData([\r\n  for (final e in current) if (e.id == exam.id) exam else e,\r\n]);\r\n```\r\n\r\n#### `delete(id)`\r\n\r\n```dart\r\nstate = AsyncData(current.where((e) => e.id != id).toList());\r\nawait GradeManager.deleteExam(id);  // 낙관적: UI 먼저 갱신, 저장은 후처리\r\n```\r\n\r\n### `examsByTypeProvider`\r\n\r\n```dart\r\nfinal examsByTypeProvider = Provider.family<List<Exam>, ExamTab>((ref, tab) {\r\n  final exams = ref.watch(examsProvider).valueOrNull ?? [];\r\n  if (tab == 0) return exams.where((e) => e.type == 'midterm' || e.type == 'final').toList();\r\n  return exams.where((e) => e.type == 'mock' || e.type == 'private_mock').toList();\r\n});\r\n```\r\n\r\n탭 0 = 수시 (중간/기말), 탭 1 = 정시 (모의/사설).\r\n\r\n### `GoalsNotifier` / `goalsProvider`\r\n\r\n```dart\r\nclass GoalsNotifier extends AsyncNotifier<Map<String, double>> {\r\n  @override\r\n  Future<Map<String, double>> build() => GradeManager.loadGoals();\r\n\r\n  Future<void> save(Map<String, double> goals) async {\r\n    await future;\r\n    await GradeManager.saveGoals(goals);\r\n    state = AsyncData(goals);\r\n  }\r\n}\r\n```\r\n\r\n수시 목표 등급 (과목명 → 등급 double).\r\n\r\n### `JeongsiGoalsNotifier` / `jeongsiGoalsProvider`\r\n\r\n정시 목표 백분위. `GoalsNotifier`와 동일 구조, `GradeManager.loadJeongsiGoals()` 사용.\r\n\r\n---\r\n\r\n## settings_provider.dart\r\n\r\n### `GradeClassNotifier` / `gradeClassProvider`\r\n\r\n```dart\r\nclass GradeClassNotifier extends Notifier<GradeClassState> {\r\n  @override\r\n  GradeClassState build() => GradeClassState(\r\n    grade: SettingData().grade,\r\n    classNum: SettingData().classNum,\r\n  );\r\n}\r\n```\r\n\r\n동기 `Notifier`. [SettingData](../data/setting_data.md) 싱글톤과 양방향 동기화.\r\n\r\n#### 메서드\r\n\r\n| 메서드 | 설명 |\r\n|--------|------|\r\n| `setGrade(grade)` | 학년만 변경 |\r\n| `setClassNum(classNum)` | 반만 변경 |\r\n| `setBoth(grade, classNum)` | 학년+반 동시 변경 |\r\n\r\n### `NotificationSettingsNotifier` / `notificationSettingsProvider`\r\n\r\n```dart\r\nclass NotificationSettingsNotifier extends Notifier<NotificationSettings> {\r\n  @override\r\n  NotificationSettings build() {\r\n    final s = SettingData();\r\n    return NotificationSettings(\r\n      breakfast: s.isBreakfastNotificationOn,\r\n      breakfastTime: s.breakfastTime,\r\n      // ... lunch, dinner, board\r\n    );\r\n  }\r\n}\r\n```\r\n\r\n알림 설정 통합 상태. 각 setter(`setBreakfast`, `setLunch`, `setDinner`, `setBoard`)가 [SettingData](../data/setting_data.md)와 state를 동시에 갱신.\r\n\r\n---\r\n\r\n## theme_provider.dart\r\n\r\n### `Theme` / `themeProvider`\r\n\r\n```dart\r\n@Riverpod(keepAlive: true)\r\nclass Theme extends _$Theme {\r\n  @override\r\n  ThemeMode build() => _indexToMode(SettingData().themeModeIndex);\r\n\r\n  void setMode(int index) {\r\n    SettingData().themeModeIndex = index;\r\n    state = _indexToMode(index);\r\n  }\r\n}\r\n```\r\n\r\n`riverpod_annotation` (코드 생성) 기반. `keepAlive: true`로 Provider가 dispose되지 않음.\r\n\r\n인덱스 매핑: 0 = 라이트, 1 = 다크, 2 = 시스템.\r\n","README.md":"# API Reference - 목차\n\n## API 계층 (lib/api/)\n- [meal_data_api](api/meal_data_api.md) — NEIS 급식 API, 월간 프리페치, 24h/5min 캐시\n- [notice_data_api](api/notice_data_api.md) — NEIS 학사일정 API, 예정 이벤트, 12h 캐시\n- [timetable_data_api](api/timetable_data_api.md) — NEIS 시간표 API, 과목 조합, 12h 캐시\n\n## 데이터 계층 (lib/data/)\n- [auth_service](data/auth_service.md) — 소셜 로그인 4종, 프로필 CRUD, 5분 캐시\n- [auth_repository](data/auth_repository.md) — AuthRepository 인터페이스, GetIt DI\n- [grade_manager](data/grade_manager.md) — 성적 CRUD, 목표 관리, 등급 변환\n- [grade_repository](data/grade_repository.md) — GradeRepository 인터페이스, GetIt DI\n- [dday_manager](data/dday_manager.md) — D-day CRUD, Firestore 동기화\n- [local_database](data/local_database.md) — SQLite 일정 DB, Firestore 동기화\n- [subject_data_manager](data/subject_data_manager.md) — 선택과목 로드/저장\n- [search_tokens](data/search_tokens.md) — 한국어 2-gram 토큰화\n- [search_history_service](data/search_history_service.md) — 검색 기록 (최대 10개)\n- [secure_storage_service](data/secure_storage_service.md) — 암호화 저장소 래퍼\n- [analytics_service](data/analytics_service.md) — Firebase Analytics 이벤트 래퍼\n- [setting_data](data/setting_data.md) — SharedPreferences 설정 싱글톤\n- [service_locator](data/service_locator.md) — GetIt DI 설정\n- [meal](data/meal.md) — Meal 데이터 모델 (freezed)\n- [schedule_data](data/schedule_data.md) — Schedule 데이터 모델\n- [subject](data/subject.md) — Subject 데이터 모델 (freezed)\n- [device](data/device.md) — 디바이스 크기 계산 유틸리티\n\n## 알림 (lib/notification/)\n- [fcm_service](notification/fcm_service.md) — FCM 푸시 알림, 토픽, 딥링크\n- [daily_meal_notification](notification/daily_meal_notification.md) — 로컬 급식 알림 스케줄링\n- [popup_notice](notification/popup_notice.md) — 인앱 팝업 공지\n- [update_checker](notification/update_checker.md) — 앱 버전 체크\n\n## 상태 관리 (lib/providers/)\n- [providers](providers/providers.md) — Riverpod Notifier/AsyncNotifier 전체\n\n## 스타일 (lib/styles/)\n- [app_colors](styles/app_colors.md) — 테마 컬러 + AnimatedAppColors\n- [dark_app_colors](styles/dark_app_colors.md) — 다크 테마 색상 구현체\n- [light_app_colors](styles/light_app_colors.md) — 라이트 테마 색상 구현체\n\n## 변경 이력\n- [08-phase4-i18n-notifications](08-phase4-i18n-notifications.md) — Phase 4: i18n 완성, 인앱 언어 전환, 알림 딥링크, 버그 수정\n\n## 유틸\n- [widget_service](widgets/home_widget/widget_service.md) — 홈 화면 위젯 데이터 갱신\n- [chat_utils](screens/chat/chat_utils.md) — 1:1 채팅 시작 유틸리티\n- [main](main.md) — 앱 진입점, MainScreen\n- [network_status](network/network_status.md) — 네트워크 연결 상태\n","screens/chat/chat_utils.md":"# ChatUtils\n\n> `lib/screens/chat/chat_utils.dart` — 1:1 채팅 시작 유틸리티\n\n---\n\n## `startChat`\n\n```dart\nFuture<void> startChat(BuildContext context, String otherUid, String otherName)\n```\n\n**설명**: 두 유저 간 1:1 채팅방을 열거나 생성한다.\n\n1. 자기 자신과의 채팅 방지:\n   ```dart\n   if (myUid == otherUid) return;\n   ```\n\n2. 결정론적 chatId 생성 (uid 정렬):\n   ```dart\n   String _getChatId(String uid1, String uid2) {\n     final sorted = [uid1, uid2]..sort();\n     return '${sorted[0]}_${sorted[1]}';\n   }\n   ```\n\n3. 기존 채팅방 확인, 없으면 새로 생성:\n   ```dart\n   final chatRef = FirebaseFirestore.instance.collection('chats').doc(chatId);\n   final snap = await chatRef.get();\n   if (!snap.exists) {\n     await chatRef.set({\n       'participants': [myUid, otherUid],\n       'participantNames': {myUid: myName, otherUid: otherName},\n       'lastMessage': '',\n       'lastMessageAt': FieldValue.serverTimestamp(),\n       'unreadCount': {myUid: 0, otherUid: 0},\n     });\n   }\n   ```\n\n4. `ChatRoomScreen`으로 이동:\n   ```dart\n   Navigator.push(context, MaterialPageRoute(\n     builder: (_) => ChatRoomScreen(chatId: chatId, otherName: otherName, otherUid: otherUid),\n   ));\n   ```\n\n**참고**: 게시글 작성자 프로필 탭 → \"1:1 채팅\" 버튼에서 호출됨. 익명 게시글의 경우 호출부에서 차단.\n","styles/app_colors.md":"# AppColors\n\n> `lib/styles/app_colors.dart` — 테마 컬러 + AnimatedAppColors\n\n---\n\n## `AppColors` (추상 클래스)\n\n```dart\nabstract class AppColors {\n  Color get primaryColor;\n  Color get secondaryColor;\n  Color get tertiaryColor;\n  Color get lighterColor;\n  Color get lightGreyColor;\n  Color get darkGreyColor;\n  Color get textFiledFillColor;\n  Color get settingScreenBackgroundColor;\n  Color get mealCardBackgroundColor;\n  Color get mealTypeTextColor;\n  Color get mealHeaderIconColor;\n  // ...\n}\n```\n\n라이트/다크 테마의 색상 속성을 추상으로 정의.\n\n### 정적 접근자\n\n| 접근자 | 설명 |\n|--------|------|\n| `AppColors.theme` | `AnimatedAppColors.instance` — 현재 보간된 색상 |\n| `AppColors.lightTheme` | `LightAppColors()` — 라이트 테마 고정 색상 |\n| `AppColors.darkTheme` | `DarkAppColors()` — 다크 테마 고정 색상 |\n\n---\n\n## `AnimatedAppColors` (싱글톤)\n\n```dart\nclass AnimatedAppColors extends AppColors {\n  static final AnimatedAppColors instance = AnimatedAppColors._();\n}\n```\n\n라이트↔다크 전환 시 색상 보간(lerp)을 지원하는 싱글톤.\n\n### `setDark(dark, {animate})`\n\n```dart\nvoid setDark(bool dark, {bool animate = true}) {\n  _isDark = dark;\n  if (!animate) _t = dark ? 1.0 : 0.0;\n}\n```\n\n테마 방향 설정. `animate: false`면 즉시 전환 (초기화 시).\n\n### `tick(t)`\n\n```dart\nvoid tick(double t) => _t = t;\n```\n\n`AnimationController`에서 호출. `_t`는 0.0(라이트)~1.0(다크) 보간 진행도.\n\n### 색상 보간\n\n```dart\nColor _lerp(Color light, Color dark) => Color.lerp(light, dark, _t)!;\n\n@override Color get primaryColor =>\n    _lerp(AppColors.lightTheme.primaryColor, AppColors.darkTheme.primaryColor);\n```\n\n모든 색상 프로퍼티가 `_lerp`를 통해 현재 `_t` 값에 따라 라이트/다크 사이를 보간. 테마 전환 애니메이션 시 부드러운 색상 전환 구현.\n","styles/dark_app_colors.md":"# DarkAppColors\r\n\r\n> `lib/styles/dark_app_colors.dart` — 다크 테마 색상 구현체\r\n\r\n[`AppColors`](app_colors.md) 추상 클래스를 구현. 싱글턴 패턴. 토스(Toss) 스타일 네이비 계열 배경색 사용.\r\n\r\n---\r\n\r\n## 싱글턴\r\n\r\n```dart\r\nclass DarkAppColors extends AppColors {\r\n  static final DarkAppColors _instance = DarkAppColors._internal();\r\n  factory DarkAppColors() => _instance;\r\n  DarkAppColors._internal();\r\n}\r\n```\r\n\r\n`AppColors._dark`에서 `DarkAppColors()`로 접근.\r\n\r\n---\r\n\r\n## 색상 정의\r\n\r\n| 프로퍼티 | 색상값 | 용도 |\r\n|----------|--------|------|\r\n| `black` | `0xFFEEEEEE` | 다크 모드의 \"검정\" = 밝은 회색 (텍스트용) |\r\n| `white` | `0xFF191B20` | 다크 모드의 \"흰색\" = 진한 네이비 (배경용) |\r\n| `primaryColor` | `0xFF3D5A80` | 주 색상 — 네이비 블루 |\r\n| `secondaryColor` | `0xFF4CAF50` | 보조 색상 — 초록 |\r\n| `tertiaryColor` | `0xFF7EB8DA` | 3차 색상 — 밝은 하늘색 |\r\n| `lighterColor` | `rgba(61,90,128, 0.5)` | 반투명 주 색상 |\r\n| `lightGreyColor` | `0xFF252830` | 밝은 회색 → 진한 회색 (카드 배경 등) |\r\n| `darkGreyColor` | `0xFF8B8F99` | 어두운 회색 (보조 텍스트) |\r\n| `textFiledFillColor` | `0xFF2A2D35` | 텍스트필드 배경 |\r\n| `settingScreenBackgroundColor` | `0xFF17191E` | 설정 화면 배경 (가장 어두운 색) |\r\n| `mealCardBackgroundColor` | `0xFF1E2028` | 급식 카드 배경 |\r\n| `mealTypeTextColor` | `0xFF8B8F99` | 급식 유형 라벨 색상 |\r\n| `mealHeaderIconColor` | `0xFF2A2D35` | 급식 헤더 아이콘 배경 |\r\n\r\n---\r\n\r\n## 디자인 특징\r\n\r\n- **반전 패턴**: `black`이 밝은색, `white`가 어두운색. `AnimatedAppColors._lerp`에서 라이트↔다크 보간 시 자연스럽게 전환됨\r\n- **네이비 계열**: 순수 검정(`#000000`) 대신 `0xFF191B20`, `0xFF1E2028` 등 약간의 파란 기가 있는 어두운 색 사용 — 눈의 피로 감소\r\n- `darkGreyColor`(`0xFF8B8F99`)는 라이트/다크 모두 비슷한 톤으로 보조 텍스트에 일관성 유지\r\n","styles/light_app_colors.md":"# LightAppColors\r\n\r\n> `lib/styles/light_app_colors.dart` — 라이트 테마 색상 구현체\r\n\r\n[`AppColors`](app_colors.md) 추상 클래스를 구현. 싱글턴 패턴. 블루 계열 primaryColor와 밝은 배경색 사용.\r\n\r\n---\r\n\r\n## 싱글턴\r\n\r\n```dart\r\nclass LightAppColors extends AppColors {\r\n  static final LightAppColors _instance = LightAppColors._internal();\r\n  factory LightAppColors() => _instance;\r\n  LightAppColors._internal();\r\n}\r\n```\r\n\r\n`AppColors._light`에서 `LightAppColors()`로 접근.\r\n\r\n---\r\n\r\n## 색상 정의\r\n\r\n| 프로퍼티 | 색상값 | 용도 |\r\n|----------|--------|------|\r\n| `black` | `Colors.black` | 기본 텍스트 색상 |\r\n| `white` | `Colors.white` | 기본 배경 색상 |\r\n| `primaryColor` | `0xFF3F72AF` | 주 색상 — 차분한 블루 |\r\n| `secondaryColor` | `0xFF198A43` | 보조 색상 — 진한 초록 |\r\n| `tertiaryColor` | `0xFF4D99F4` | 3차 색상 — 밝은 파랑 |\r\n| `lighterColor` | `rgba(63,114,175, 0.6)` | 반투명 주 색상 |\r\n| `lightGreyColor` | `Colors.grey[200]` | 밝은 회색 (카드 배경, 구분선) |\r\n| `darkGreyColor` | `Colors.grey[600]` | 어두운 회색 (보조 텍스트) |\r\n| `textFiledFillColor` | `Colors.grey[300]` | 텍스트필드 배경 |\r\n| `settingScreenBackgroundColor` | `0xFFF8F6F6` | 설정 화면 배경 (약간 따뜻한 회색) |\r\n| `mealCardBackgroundColor` | `0xFFDBE2EF` | 급식 카드 배경 (연한 파란 회색) |\r\n| `mealTypeTextColor` | `0xFF848484` | 급식 유형 라벨 색상 |\r\n| `mealHeaderIconColor` | `0xFFDBE2EF` | 급식 헤더 아이콘 배경 |\r\n\r\n---\r\n\r\n## 디자인 특징\r\n\r\n- **블루 톤**: `primaryColor`(`0xFF3F72AF`)가 앱 전체의 기조 — AppBar, 버튼, 링크, 선택 인디케이터\r\n- **급식 카드**: `mealCardBackgroundColor`(`0xFFDBE2EF`)는 primaryColor의 연한 변형으로 시각적 통일감\r\n- `lightGreyColor` / `darkGreyColor`는 Flutter 기본 `Colors.grey` 팔레트 사용 — 플랫폼 친화적\r\n- `settingScreenBackgroundColor`(`0xFFF8F6F6`)는 순수 흰색보다 약간 따뜻한 톤으로 설정 화면 구분\r\n","widgets/home_widget/widget_service.md":"# WidgetService\n\n> `lib/widgets/home_widget/widget_service.dart` — 홈 화면 위젯 데이터 갱신\n\n`home_widget` 패키지를 사용해 Android/iOS 홈 화면 위젯에 급식/시간표 데이터를 전달한다.\n\n---\n\n## `initialize`\n\n```dart\nstatic Future<void> initialize()\n```\n\nApp Group ID를 설정한다 (`group.com.monkshark.hansol_high_school`). iOS 위젯 공유에 필요.\n\n---\n\n## `updateAll`\n\n```dart\nstatic Future<void> updateAll()\n```\n\n급식 + 시간표 위젯을 병렬로 갱신:\n```dart\nawait Future.wait([updateMealWidget(), updateTimetableWidget()]);\n```\n\n---\n\n## `updateMealWidget`\n\n```dart\nstatic Future<void> updateMealWidget()\n```\n\n**설명**: 오늘의 급식 데이터를 위젯에 전달한다.\n\n1. 조식/중식/석식 병렬 조회:\n   ```dart\n   final meals = await Future.wait([\n     MealDataApi.getMeal(date: now, mealType: MealDataApi.BREAKFAST, ...),\n     MealDataApi.getMeal(date: now, mealType: MealDataApi.LUNCH, ...),\n     MealDataApi.getMeal(date: now, mealType: MealDataApi.DINNER, ...),\n   ]);\n   ```\n\n2. 알레르기 정보 제거 후 위젯 데이터 저장:\n   ```dart\n   await HomeWidget.saveWidgetData<String>('meal_date', dateStr);\n   await HomeWidget.saveWidgetData<String>('meal_breakfast', breakfast);\n   await HomeWidget.saveWidgetData<String>('meal_lunch', lunch);\n   await HomeWidget.saveWidgetData<String>('meal_dinner', dinner);\n   ```\n\n3. Android 위젯 갱신 트리거:\n   ```dart\n   await HomeWidget.updateWidget(androidName: 'MealWidgetProvider');\n   await HomeWidget.updateWidget(androidName: 'CombinedWidgetProvider');\n   ```\n\n---\n\n## `updateTimetableWidget`\n\n```dart\nstatic Future<void> updateTimetableWidget()\n```\n\n**설명**: 오늘의 시간표 데이터를 위젯에 전달한다.\n\n1. 학년/반 미설정 시 안내 메시지:\n   ```dart\n   if (grade == 0 || classNum == 0) {\n     await HomeWidget.saveWidgetData<String>('timetable_date', '학년/반을 설정해주세요');\n   }\n   ```\n\n2. SharedPreferences에서 시간표 그리드 읽기:\n   ```dart\n   final gridData = prefs.getStringList('widget_timetable_grid');\n   final daySubjects = gridData[weekday - 1].split(',');\n   ```\n\n3. 뒤에서부터 빈 교시 제거 후 위젯 데이터 저장:\n   ```dart\n   while (subjects.isNotEmpty && subjects.last.isEmpty) {\n     subjects.removeLast();\n   }\n   await HomeWidget.saveWidgetData<String>('timetable_data', subjects.join(','));\n   await HomeWidget.saveWidgetData<int>('timetable_current', _getCurrentPeriod(now));\n   ```\n\n---\n\n## `_cleanMealText`\n\n```dart\nstatic String _cleanMealText(String? text)\n```\n\n급식 없음/오프라인 → `'정보 없음'`. 알레르기 번호 제거: `replaceAll(RegExp(r'\\s*\\([\\d.]+\\)'), '')`.\n\n---\n\n## `_getCurrentPeriod`\n\n```dart\nstatic int _getCurrentPeriod(DateTime now)\n```\n\n**설명**: 현재 교시를 계산한다.\n\n```dart\nconst starts = [500, 560, 620, 680, 750, 810, 870];  // 08:20, 09:20, ...\nconst ends = [550, 610, 670, 740, 800, 860, 920];     // 09:10, 10:10, ...\n```\n\n- 수업 시간 내 → 해당 교시 번호 (1~7)\n- 마지막 수업 후 → -1\n- 수업 전 → 0\n\n---\n\n## `widgetBackgroundCallback`\n\n```dart\n@pragma('vm:entry-point')\nFuture<void> widgetBackgroundCallback(Uri? uri) async {\n  await WidgetService.initialize();\n  await WidgetService.updateAll();\n}\n```\n\n홈 위젯 인터랙션 콜백. 위젯 탭/자정 알람에서 데이터 갱신 트리거.\n"};

(function(){
  try {
    if(globalThis.markedHighlight && globalThis.hljs){
      marked.use(globalThis.markedHighlight.markedHighlight({
        langPrefix:'hljs language-',
        highlight:function(code,lang){
          try{
            if(lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
            return hljs.highlightAuto(code).value;
          }catch(e){return code;}
        }
      }));
    }
  }catch(e){ console.warn('Highlight init skipped:', e); }
  marked.use({breaks:false,gfm:true});

  var navList = document.getElementById('navList');
  var allItems = [];

  Object.keys(FILES).forEach(function(group){
    var g = document.createElement('div');
    g.className = 'nav-group';
    g.innerHTML = '<div class="nav-group-title">' + group + '</div>';
    FILES[group].forEach(function(f){
      var a = document.createElement('a');
      a.className = 'nav-item';
      a.textContent = f.name;
      a.dataset.path = f.path;
      a.onclick = function(){ loadFile(f.path, f.name); };
      g.appendChild(a);
      allItems.push({el:a, name:f.name.toLowerCase(), path:f.path.toLowerCase()});
    });
    navList.appendChild(g);
  });

  document.getElementById('search').addEventListener('input', function(e){
    var q = e.target.value.toLowerCase().trim();
    allItems.forEach(function(i){
      i.el.style.display = (!q || i.name.indexOf(q)!==-1 || i.path.indexOf(q)!==-1) ? '' : 'none';
    });
    navList.querySelectorAll('.nav-group').forEach(function(g){
      var vis = Array.from(g.querySelectorAll('.nav-item')).some(function(i){ return i.style.display !== 'none'; });
      g.style.display = vis ? '' : 'none';
    });
  });

  var history = [];
  var historyIndex = -1;
  var navigating = false; // popstate에서 재진입 방지

  function loadFile(p, name, fromPopState){
    allItems.forEach(function(i){ i.el.classList.toggle('active', i.el.dataset.path === p); });
    var inner = document.getElementById('contentInner');
    var text = MD_DATA[p];
    if(!text){
      inner.innerHTML = '<div class="welcome"><h2>문서를 찾을 수 없습니다</h2><p>' + p + '</p></div>';
      return;
    }

    // history 관리
    if(!fromPopState){
      // 현재 위치 이후 기록 삭제 (새 탐색)
      history = history.slice(0, historyIndex + 1);
      history.push(p);
      historyIndex = history.length - 1;
    }

    var html = marked.parse(text);
    var dir = p.indexOf('/') !== -1 ? p.substring(0, p.lastIndexOf('/')) : '';
    var fileName = p.split('/').pop();

    // 뒤로/앞으로 버튼 + breadcrumb
    var canBack = historyIndex > 0;
    var canFwd = historyIndex < history.length - 1;
    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="뒤로">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="앞으로">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'README.md\',\'README\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong></div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    // Rewrite .md links to in-viewer navigation
    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || !href.endsWith('.md') || href.indexOf('http') === 0) return;
      var resolved = href;
      if(dir && href.indexOf('/') !== 0 && href.indexOf('..') !== 0){
        resolved = dir + '/' + href;
      } else if(href.indexOf('../') === 0){
        var parts = dir.split('/'); parts.pop();
        resolved = (parts.length ? parts.join('/') + '/' : '') + href.replace('../','');
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved, resolved.split('/').pop().replace('.md','')); };
      }
    });

    document.getElementById('content').scrollTop = 0;
    closeSidebar();
    if(!fromPopState) window.history.pushState({path:p}, '', '#' + p);
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, p.split('/').pop().replace('.md',''), true);
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, p.split('/').pop().replace('.md',''), true);
      window.history.pushState({path:p}, '', '#' + p);
    }
  };

  // expose for breadcrumb onclick
  window._loadFile = loadFile;

  // 브라우저 뒤로/앞으로 버튼
  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var p = (e.state && e.state.path) || location.hash.slice(1) || 'README.md';
    if(MD_DATA[p]){
      navigating = true;
      // history 배열에서 해당 항목 찾기
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, p.split('/').pop().replace('.md',''), true);
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    // Alt+Left/Right for back/forward
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  var hash = location.hash.slice(1);
  if(hash && MD_DATA[hash]){
    loadFile(hash, hash.split('/').pop().replace('.md',''));
  } else {
    loadFile('README.md', 'README');
  }
})();
</script>
