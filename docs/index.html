n and displays an update dialog. Called from `MainScreen.initState`.\r\n\r\n1. Fetch version info from Firestore:\r\n   ```dart\r\n   final doc = await FirebaseFirestore.instance\r\n       .collection('app_config').doc('version').get();\r\n   ```\r\n\r\n2. Check the current app version:\r\n   ```dart\r\n   final packageInfo = await PackageInfo.fromPlatform();\r\n   final currentVersion = packageInfo.version;\r\n   ```\r\n\r\n3. Version comparison:\r\n   ```dart\r\n   final forceUpdate = _compareVersions(currentVersion, minVersion) < 0;   // below minimum\r\n   final optionalUpdate = _compareVersions(currentVersion, latestVersion) < 0;  // below latest\r\n   ```\r\n\r\n4. Dialog branching:\r\n   - **Forced update** (`forceUpdate`): cannot be dismissed (`PopScope.canPop: false`), only \"Update\" available\r\n   - **Optional update** (`optionalUpdate`): \"Update\" + \"Later\" buttons\r\n\r\n5. When the Update button is tapped, open the store URL:\r\n   ```dart\r\n   launchUrl(Uri.parse(updateUrl), mode: LaunchMode.externalApplication);\r\n   ```\r\n\r\n6. Per-platform URL branching:\r\n   ```dart\r\n   final updateUrl = (isIOS ? data['updateUrlIOS'] : data['updateUrlAndroid'])\r\n       ?? data['updateUrl'] ?? '';\r\n   ```\r\n\r\n---\r\n\r\n## `_compareVersions`\r\n\r\n```dart\r\nstatic int _compareVersions(String a, String b)\r\n```\r\n\r\n**Description**: Compares semantic versions (major.minor.patch).\r\n\r\n```dart\r\nfinal aParts = a.split('.').map(int.parse).toList();\r\nfinal bParts = b.split('.').map(int.parse).toList();\r\n// Compare from the left: a < b вҶ’ -1, a > b вҶ’ 1, equal вҶ’ 0\r\n```\r\n\r\nReturns 0 for an empty string (comparison skipped).\r\n\r\n---\r\n\r\n## Firestore document structure (`app_config/version`)\r\n\r\n| Field | Type | Description |\r\n|-------|------|-------------|\r\n| `latest` | String | Latest version (e.g., `'2.1.0'`) |\r\n| `min` | String | Minimum supported version (below this вҶ’ forced update) |\r\n| `updateUrl` | String | Default store URL |\r\n| `updateUrlAndroid` | String? | Android-specific URL |\r\n| `updateUrlIOS` | String? | iOS-specific URL |\r\n| `message` | String | Update notice message |\r\n","providers/providers.md":"# Providers\r\n\r\n> `lib/providers/` вҖ” Riverpod Notifier/AsyncNotifier м „мІҙ\r\n\r\n---\r\n\r\n## auth_provider.dart\r\n\r\n### `authStateProvider`\r\n\r\n```dart\r\nfinal authStateProvider = StreamProvider<User?>((ref) {\r\n  return FirebaseAuth.instance.authStateChanges();\r\n});\r\n```\r\n\r\nFirebase Auth мғҒнғң мҠӨнҠёлҰј. лЎңк·ёмқё/лЎңк·ём•„мӣғ мӢң мһҗлҸҷ к°ұмӢ \r\n\r\n### `UserProfileNotifier` / `userProfileProvider`\r\n\r\n```dart\r\nclass UserProfileNotifier extends AsyncNotifier<UserProfile?> {\r\n  @override\r\n  Future<UserProfile?> build() async {\r\n    final auth = ref.watch(authStateProvider);\r\n    return auth.when(\r\n      data: (user) async => user == null ? null : AuthService.getUserProfile(),\r\n      loading: () => null,\r\n      error: (_, __) => null,\r\n    );\r\n  }\r\n}\r\n```\r\n\r\n`authStateProvider`лҘј watch вҶ’ лЎңк·ёмқё мғҒнғң ліҖкІҪ мӢң мһҗлҸҷ мһ¬мЎ°нҡҢ\r\n\r\n#### `refresh()`\r\n\r\n```dart\r\nFuture<void> refresh() async {\r\n  state = const AsyncLoading();\r\n  AuthService.clearProfileCache();\r\n  state = await AsyncValue.guard(() => AuthService.getUserProfile());\r\n}\r\n```\r\n\r\nн”„лЎңн•„ мҲҳм • нӣ„ нҳём¶ң. мәҗмӢң мҙҲкё°нҷ” + Firestoreм—җм„ң мғҲлЎң мЎ°нҡҢ\r\n\r\n#### `save(profile)`\r\n\r\n```dart\r\nFuture<void> save(UserProfile profile) async {\r\n  state = AsyncData(profile);                    // лӮҷкҙҖм Ғ UI м—…лҚ°мқҙнҠё\r\n  await AuthService.saveUserProfile(profile);    // м„ңлІ„ м ҖмһҘ\r\n  AuthService.clearProfileCache();\r\n}\r\n```\r\n\r\n### нҢҢмғқ Provider\r\n\r\n| Provider | нғҖмһ… | м„ӨлӘ… |\r\n|----------|------|------|\r\n| `isLoggedInProvider` | `Provider<bool>` | `authStateProvider.user != null` |\r\n| `isManagerProvider` | `Provider<bool>` | `profile?.isManager ?? false` (manager + admin) |\r\n| `isAdminProvider` | `Provider<bool>` | `profile?.isAdmin ?? false` |\r\n| `isStaffProvider` | `Provider<bool>` | `profile?.isStaff ?? false` (admin + manager + moderator + auditor) |\r\n| `isSuspendedProvider` | `Provider<bool>` | `profile?.isSuspended ?? false` |\r\n| `isVerifiedProvider` | `Provider<bool>` | `profile?.isVerified ?? false` |\r\n| `canWriteProvider` | `Provider<bool>` | `profile?.canWrite ?? false` (verified && !suspended) |\r\n\r\n---\r\n\r\n## grade_provider.dart\r\n\r\n### `ExamsNotifier` / `examsProvider`\r\n\r\n```dart\r\nclass ExamsNotifier extends AsyncNotifier<List<Exam>> {\r\n  @override\r\n  Future<List<Exam>> build() => GradeManager.loadExams();\r\n}\r\n```\r\n\r\nлӘЁл“  mutatorлҠ” `await future`лЎң мҙҲкё° build мҷ„лЈҢлҘј ліҙмһҘн•ң л’Ө м§Ғм ‘ stateлҘј к°ұмӢ  (`invalidateSelf` race condition нҡҢн”ј). лҚ°мқҙн„° м ҖмһҘмқҖ [`GradeManager`](../data/grade_manager.md) м •м Ғ л©”м„ңл“ңм—җ мң„мһ„\r\n\r\n#### `add(exam)`\r\n\r\n```dart\r\nFuture<void> add(Exam exam) async {\r\n  final current = await future;\r\n  await GradeManager.addExam(exam);\r\n  state = AsyncData([...current, exam]);\r\n}\r\n```\r\n\r\n#### `updateExam(exam)`\r\n\r\n```dart\r\nstate = AsyncData([\r\n  for (final e in current) if (e.id == exam.id) exam else e,\r\n]);\r\n```\r\n\r\n#### `delete(id)`\r\n\r\n```dart\r\nstate = AsyncData(current.where((e) => e.id != id).toList());\r\nawait GradeManager.deleteExam(id);  // лӮҷкҙҖм Ғ: UI лЁјм Җ к°ұмӢ , м ҖмһҘмқҖ нӣ„мІҳлҰ¬\r\n```\r\n\r\n### `examsByTypeProvider`\r\n\r\n```dart\r\nfinal examsByTypeProvider = Provider.family<List<Exam>, ExamTab>((ref, tab) {\r\n  final exams = ref.watch(examsProvider).valueOrNull ?? [];\r\n  if (tab == 0) return exams.where((e) => e.type == 'midterm' || e.type == 'final').toList();\r\n  return exams.where((e) => e.type == 'mock' || e.type == 'private_mock').toList();\r\n});\r\n```\r\n\r\nнғӯ 0 = мҲҳмӢң (мӨ‘к°„/кё°л§җ), нғӯ 1 = м •мӢң (лӘЁмқҳ/мӮ¬м„Ө)\r\n\r\n### `GoalsNotifier` / `goalsProvider`\r\n\r\n```dart\r\nclass GoalsNotifier extends AsyncNotifier<Map<String, double>> {\r\n  @override\r\n  Future<Map<String, double>> build() => GradeManager.loadGoals();\r\n\r\n  Future<void> save(Map<String, double> goals) async {\r\n    await future;\r\n    await GradeManager.saveGoals(goals);\r\n    state = AsyncData(goals);\r\n  }\r\n}\r\n```\r\n\r\nмҲҳмӢң лӘ©н‘ң л“ұкёү (кіјлӘ©лӘ… вҶ’ л“ұкёү double)\r\n\r\n### `JeongsiGoalsNotifier` / `jeongsiGoalsProvider`\r\n\r\nм •мӢң лӘ©н‘ң л°ұл¶„мң„. `GoalsNotifier`мҷҖ лҸҷмқј кө¬мЎ°, `GradeManager.loadJeongsiGoals()` мӮ¬мҡ©\r\n\r\n---\r\n\r\n## settings_provider.dart\r\n\r\n### `GradeClassNotifier` / `gradeClassProvider`\r\n\r\n```dart\r\nclass GradeClassNotifier extends Notifier<GradeClassState> {\r\n  @override\r\n  GradeClassState build() => GradeClassState(\r\n    grade: SettingData().grade,\r\n    classNum: SettingData().classNum,\r\n  );\r\n}\r\n```\r\n\r\nлҸҷкё° `Notifier`. [SettingData](../data/setting_data.md) мӢұкёҖнҶӨкіј м–‘л°©н–Ҙ лҸҷкё°нҷ”\r\n\r\n#### л©”м„ңл“ң\r\n\r\n| л©”м„ңл“ң | м„ӨлӘ… |\r\n|--------|------|\r\n| `setGrade(grade)` | н•ҷл…„л§Ң ліҖкІҪ |\r\n| `setClassNum(classNum)` | л°ҳл§Ң ліҖкІҪ |\r\n| `setBoth(grade, classNum)` | н•ҷл…„+л°ҳ лҸҷмӢң ліҖкІҪ |\r\n\r\n### `NotificationSettingsNotifier` / `notificationSettingsProvider`\r\n\r\n```dart\r\nclass NotificationSettingsNotifier extends Notifier<NotificationSettings> {\r\n  @override\r\n  NotificationSettings build() {\r\n    final s = SettingData();\r\n    return NotificationSettings(\r\n      breakfast: s.isBreakfastNotificationOn,\r\n      breakfastTime: s.breakfastTime,\r\n      // ... lunch, dinner, board\r\n    );\r\n  }\r\n}\r\n```\r\n\r\nм•ҢлҰј м„Өм • нҶөн•© мғҒнғң. к°Ғ setter(`setBreakfast`, `setLunch`, `setDinner`, `setBoard`)к°Җ [SettingData](../data/setting_data.md)мҷҖ stateлҘј лҸҷмӢңм—җ к°ұмӢ \r\n\r\n### `LocaleNotifier` / `localeProvider`\r\n\r\n```dart\r\nclass LocaleNotifier extends Notifier<Locale?> {\r\n  @override\r\n  Locale? build() {\r\n    final code = SettingData().localeCode;\r\n    return code.isEmpty ? null : Locale(code);\r\n  }\r\n\r\n  void setLocale(Locale? locale) {\r\n    SettingData().localeCode = locale?.languageCode ?? '';\r\n    state = locale;\r\n  }\r\n}\r\n```\r\n\r\nмқём•ұ м–ём–ҙ м „нҷҳ. `null` = мӢңмҠӨн…ң лЎңмәҳ, `Locale('ko')` = н•ңкөӯм–ҙ, `Locale('en')` = мҳҒм–ҙ. `HansolHighSchool` лЈЁнҠё мң„м Ҝм—җм„ң `ref.watch(localeProvider)` вҶ’ `MaterialApp.locale`м—җ м „лӢ¬\r\n\r\n### `AppRefreshNotifier` / `appRefreshProvider`\r\n\r\n```dart\r\nclass AppRefreshNotifier extends Notifier<int> {\r\n  @override\r\n  int build() => 0;\r\n\r\n  void refresh() => state++;\r\n}\r\n```\r\n\r\n`refresh()` нҳём¶ң мӢң м№ҙмҡҙн„° мҰқк°Җ вҶ’ `ValueKey(refreshKey)` ліҖкІҪ вҶ’ MainScreen м „мІҙ мһ¬мғқм„ұ. лЎңк·ёмқё/лЎңк·ём•„мӣғ/н”„лЎңн•„ ліҖкІҪ нӣ„ нҳём¶ң\r\n\r\n**л№„мң„м Ҝ мҪ”л“ңм—җм„ң м ‘к·ј**: `providerContainer.read(appRefreshProvider.notifier).refresh()`\r\n\r\n---\r\n\r\n## theme_provider.dart\r\n\r\n### `Theme` / `themeProvider`\r\n\r\n```dart\r\n@Riverpod(keepAlive: true)\r\nclass Theme extends _$Theme {\r\n  @override\r\n  ThemeMode build() => _indexToMode(SettingData().themeModeIndex);\r\n\r\n  void setMode(int index) {\r\n    SettingData().themeModeIndex = index;\r\n    state = _indexToMode(index);\r\n  }\r\n}\r\n```\r\n\r\n`riverpod_annotation` (мҪ”л“ң мғқм„ұ) кё°л°ҳ. `keepAlive: true`лЎң Providerк°Җ disposeлҗҳм§Җ м•ҠмқҢ\r\n\r\nмқёлҚұмҠӨ л§Өн•‘: 0 = лқјмқҙнҠё, 1 = лӢӨнҒ¬, 2 = мӢңмҠӨн…ң\r\n","providers/providers_en.md":"# Providers\r\n\r\n> н•ңкөӯм–ҙ: [providers.md](./providers.md)\r\n\r\n> `lib/providers/` вҖ” All Riverpod Notifier / AsyncNotifier providers\r\n\r\n---\r\n\r\n## auth_provider.dart\r\n\r\n### `authStateProvider`\r\n\r\n```dart\r\nfinal authStateProvider = StreamProvider<User?>((ref) {\r\n  return FirebaseAuth.instance.authStateChanges();\r\n});\r\n```\r\n\r\nFirebase Auth state stream. Automatically refreshes on login/logout.\r\n\r\n### `UserProfileNotifier` / `userProfileProvider`\r\n\r\n```dart\r\nclass UserProfileNotifier extends AsyncNotifier<UserProfile?> {\r\n  @override\r\n  Future<UserProfile?> build() async {\r\n    final auth = ref.watch(authStateProvider);\r\n    return auth.when(\r\n      data: (user) async => user == null ? null : AuthService.getUserProfile(),\r\n      loading: () => null,\r\n      error: (_, __) => null,\r\n    );\r\n  }\r\n}\r\n```\r\n\r\nWatches `authStateProvider` вҶ’ automatically re-fetches whenever the login state changes.\r\n\r\n#### `refresh()`\r\n\r\n```dart\r\nFuture<void> refresh() async {\r\n  state = const AsyncLoading();\r\n  AuthService.clearProfileCache();\r\n  state = await AsyncValue.guard(() => AuthService.getUserProfile());\r\n}\r\n```\r\n\r\nCalled after editing the profile. Clears the cache + re-fetches from Firestore.\r\n\r\n#### `save(profile)`\r\n\r\n```dart\r\nFuture<void> save(UserProfile profile) async {\r\n  state = AsyncData(profile);                    // optimistic UI update\r\n  await AuthService.saveUserProfile(profile);    // save to server\r\n  AuthService.clearProfileCache();\r\n}\r\n```\r\n\r\n### Derived providers\r\n\r\n| Provider | Type | Description |\r\n|----------|------|-------------|\r\n| `isLoggedInProvider` | `Provider<bool>` | `authStateProvider.user != null` |\r\n| `isManagerProvider` | `Provider<bool>` | `profile?.isManager ?? false` (manager + admin) |\r\n| `isAdminProvider` | `Provider<bool>` | `profile?.isAdmin ?? false` |\r\n| `isStaffProvider` | `Provider<bool>` | `profile?.isStaff ?? false` (admin + manager + moderator + auditor) |\r\n| `isSuspendedProvider` | `Provider<bool>` | `profile?.isSuspended ?? false` |\r\n| `isVerifiedProvider` | `Provider<bool>` | `profile?.isVerified ?? false` |\r\n| `canWriteProvider` | `Provider<bool>` | `profile?.canWrite ?? false` (verified && !suspended) |\r\n\r\n---\r\n\r\n## grade_provider.dart\r\n\r\n### `ExamsNotifier` / `examsProvider`\r\n\r\n```dart\r\nclass ExamsNotifier extends AsyncNotifier<List<Exam>> {\r\n  @override\r\n  Future<List<Exam>> build() => GradeManager.loadExams();\r\n}\r\n```\r\n\r\nAll mutators use `await future` to guarantee initial build completion, then update state directly (avoiding the `invalidateSelf` race condition). Data storage is delegated to [`GradeManager`](../data/grade_manager.md) static methods.\r\n\r\n#### `add(exam)`\r\n\r\n```dart\r\nFuture<void> add(Exam exam) async {\r\n  final current = await future;\r\n  await GradeManager.addExam(exam);\r\n  state = AsyncData([...current, exam]);\r\n}\r\n```\r\n\r\n#### `updateExam(exam)`\r\n\r\n```dart\r\nstate = AsyncData([\r\n  for (final e in current) if (e.id == exam.id) exam else e,\r\n]);\r\n```\r\n\r\n#### `delete(id)`\r\n\r\n```dart\r\nstate = AsyncData(current.where((e) => e.id != id).toList());\r\nawait GradeManager.deleteExam(id);  // optimistic: update UI first, persist afterwards\r\n```\r\n\r\n### `examsByTypeProvider`\r\n\r\n```dart\r\nfinal examsByTypeProvider = Provider.family<List<Exam>, ExamTab>((ref, tab) {\r\n  final exams = ref.watch(examsProvider).valueOrNull ?? [];\r\n  if (tab == 0) return exams.where((e) => e.type == 'midterm' || e.type == 'final').toList();\r\n  return exams.where((e) => e.type == 'mock' || e.type == 'private_mock').toList();\r\n});\r\n```\r\n\r\nTab 0 = Susi (midterm/final), Tab 1 = Jeongsi (mock/private mock).\r\n\r\n### `GoalsNotifier` / `goalsProvider`\r\n\r\n```dart\r\nclass GoalsNotifier extends AsyncNotifier<Map<String, double>> {\r\n  @override\r\n  Future<Map<String, double>> build() => GradeManager.loadGoals();\r\n\r\n  Future<void> save(Map<String, double> goals) async {\r\n    await future;\r\n    await GradeManager.saveGoals(goals);\r\n    state = AsyncData(goals);\r\n  }\r\n}\r\n```\r\n\r\nSusi target grades (subject name вҶ’ grade double).\r\n\r\n### `JeongsiGoalsNotifier` / `jeongsiGoalsProvider`\r\n\r\nJeongsi target percentiles. Same structure as `GoalsNotifier`, using `GradeManager.loadJeongsiGoals()`.\r\n\r\n---\r\n\r\n## settings_provider.dart\r\n\r\n### `GradeClassNotifier` / `gradeClassProvider`\r\n\r\n```dart\r\nclass GradeClassNotifier extends Notifier<GradeClassState> {\r\n  @override\r\n  GradeClassState build() => GradeClassState(\r\n    grade: SettingData().grade,\r\n    classNum: SettingData().classNum,\r\n  );\r\n}\r\n```\r\n\r\nSynchronous `Notifier`. Bidirectionally synced with the [SettingData](../data/setting_data.md) singleton.\r\n\r\n#### Methods\r\n\r\n| Method | Description |\r\n|--------|-------------|\r\n| `setGrade(grade)` | Changes the grade only |\r\n| `setClassNum(classNum)` | Changes the class number only |\r\n| `setBoth(grade, classNum)` | Changes both grade and class number at once |\r\n\r\n### `NotificationSettingsNotifier` / `notificationSettingsProvider`\r\n\r\n```dart\r\nclass NotificationSettingsNotifier extends Notifier<NotificationSettings> {\r\n  @override\r\n  NotificationSettings build() {\r\n    final s = SettingData();\r\n    return NotificationSettings(\r\n      breakfast: s.isBreakfastNotificationOn,\r\n      breakfastTime: s.breakfastTime,\r\n      // ... lunch, dinner, board\r\n    );\r\n  }\r\n}\r\n```\r\n\r\nUnified notification settings state. Each setter (`setBreakfast`, `setLunch`, `setDinner`, `setBoard`) updates both [SettingData](../data/setting_data.md) and state at the same time.\r\n\r\n### `LocaleNotifier` / `localeProvider`\r\n\r\n```dart\r\nclass LocaleNotifier extends Notifier<Locale?> {\r\n  @override\r\n  Locale? build() {\r\n    final code = SettingData().localeCode;\r\n    return code.isEmpty ? null : Locale(code);\r\n  }\r\n\r\n  void setLocale(Locale? locale) {\r\n    SettingData().localeCode = locale?.languageCode ?? '';\r\n    state = locale;\r\n  }\r\n}\r\n```\r\n\r\nIn-app language switcher. `null` = system locale, `Locale('ko')` = Korean, `Locale('en')` = English. The root `HansolHighSchool` widget does `ref.watch(localeProvider)` вҶ’ passes it to `MaterialApp.locale`.\r\n\r\n### `AppRefreshNotifier` / `appRefreshProvider`\r\n\r\n```dart\r\nclass AppRefreshNotifier extends Notifier<int> {\r\n  @override\r\n  int build() => 0;\r\n\r\n  void refresh() => state++;\r\n}\r\n```\r\n\r\nWhen `refresh()` is called, the counter increments вҶ’ `ValueKey(refreshKey)` changes вҶ’ the entire MainScreen is rebuilt. Called after login/logout/profile changes.\r\n\r\n**Access from non-widget code**: `providerContainer.read(appRefreshProvider.notifier).refresh()`.\r\n\r\n---\r\n\r\n## theme_provider.dart\r\n\r\n### `Theme` / `themeProvider`\r\n\r\n```dart\r\n@Riverpod(keepAlive: true)\r\nclass Theme extends _$Theme {\r\n  @override\r\n  ThemeMode build() => _indexToMode(SettingData().themeModeIndex);\r\n\r\n  void setMode(int index) {\r\n    SettingData().themeModeIndex = index;\r\n    state = _indexToMode(index);\r\n  }\r\n}\r\n```\r\n\r\nBased on `riverpod_annotation` (code generation). `keepAlive: true` ensures the provider is not disposed.\r\n\r\nIndex mapping: 0 = Light, 1 = Dark, 2 = System.\r\n","README.md":"# API Reference - лӘ©м°Ё\r\n\r\n> нҷ”л©ҙ(Screen)В·мң„м Ҝ(Widget) л¬ём„ңлҠ” м ңмҷё. м„ңл№„мҠӨВ·лӘЁлҚёВ·APIВ·м•ҢлҰј л“ұ н•өмӢ¬ кі„мёөл§Ң м •лҰ¬\r\n>\r\n> мЈјм ңлі„ к°Җмқҙл“ң(м•„нӮӨн…ҚмІҳ, лҚ°мқҙн„° лӘЁлҚё, н…ҢмҠӨнҠё, ліҙм•Ҳ л“ұ)лҠ” [`guides/`](./guides/), кё°лҠҘлі„ мғҒм„ёлҠ” [`features/`](./features/) м°ёмЎ°\r\n\r\n## м•ұ м§„мһ…м җ\r\n- [main](main.md) вҖ” м•ұ мҙҲкё°нҷ”, MainScreen, м „м—ӯ мғҒнғң\r\n\r\n## API кі„мёө (lib/api/)\r\n- [meal_data_api](api/meal_data_api.md) вҖ” NEIS кёүмӢқ API, мӣ”к°„ н”„лҰ¬нҺҳм№ҳ, 24h/5min мәҗмӢң\r\n- [notice_data_api](api/notice_data_api.md) вҖ” NEIS н•ҷмӮ¬мқјм • API, мҳҲм • мқҙлІӨнҠё, 12h мәҗмӢң\r\n- [timetable_data_api](api/timetable_data_api.md) вҖ” NEIS мӢңк°„н‘ң API, кіјлӘ© мЎ°н•©, 12h мәҗмӢң\r\n\r\n## лҚ°мқҙн„° кі„мёө (lib/data/)\r\n- [auth_service](data/auth_service.md) вҖ” мҶҢм…ң лЎңк·ёмқё 4мў…, н”„лЎңн•„ CRUD, 5л¶„ мәҗмӢң\r\n- [auth_repository](data/auth_repository.md) вҖ” AuthRepository мқён„°нҺҳмқҙмҠӨ, GetIt DI\r\n- [grade_manager](data/grade_manager.md) вҖ” м„ұм Ғ CRUD, лӘ©н‘ң кҙҖлҰ¬, л“ұкёү ліҖнҷҳ\r\n- [grade_repository](data/grade_repository.md) вҖ” GradeRepository мқён„°нҺҳмқҙмҠӨ, GetIt DI\r\n- [dday_manager](data/dday_manager.md) вҖ” D-day CRUD, Firestore лҸҷкё°нҷ”\r\n- [local_database](data/local_database.md) вҖ” SQLite мқјм • DB, Firestore лҸҷкё°нҷ”\r\n- [subject_data_manager](data/subject_data_manager.md) вҖ” м„ нғқкіјлӘ© лЎңл“ң/м ҖмһҘ\r\n- [search_tokens](data/search_tokens.md) вҖ” н•ңкөӯм–ҙ 2-gram нҶ нҒ°нҷ”\r\n- [search_history_service](data/search_history_service.md) вҖ” кІҖмғү кё°лЎқ (мөңлҢҖ 10к°ң)\r\n- [secure_storage_service](data/secure_storage_service.md) вҖ” м•”нҳёнҷ” м ҖмһҘмҶҢ лһҳнҚј\r\n- [analytics_service](data/analytics_service.md) вҖ” Firebase Analytics мқҙлІӨнҠё лһҳнҚј\r\n- [setting_data](data/setting_data.md) вҖ” SharedPreferences м„Өм • мӢұкёҖнҶӨ\r\n- [service_locator](data/service_locator.md) вҖ” GetIt DI м„Өм •\r\n- [meal](data/meal.md) вҖ” Meal лҚ°мқҙн„° лӘЁлҚё (freezed)\r\n- [schedule_data](data/schedule_data.md) вҖ” Schedule лҚ°мқҙн„° лӘЁлҚё\r\n- [subject](data/subject.md) вҖ” Subject лҚ°мқҙн„° лӘЁлҚё (freezed)\r\n- [device](data/device.md) вҖ” л””л°”мқҙмҠӨ нҒ¬кё° кі„мӮ° мң нӢёлҰ¬нӢ°\r\n- [api_strings](data/api_strings.md) вҖ” API м„јнӢ°л„җ л¬ёмһҗм—ҙ мғҒмҲҳ (лҚ°мқҙн„° мң л¬ҙ нҢҗлі„мҡ©)\r\n- [board_categories](data/board_categories.md) вҖ” кІҢмӢңнҢҗ м№ҙн…Ңкі лҰ¬ мғҒмҲҳ + l10n/мғүмғҒ/FCM нҶ н”Ҫ н—¬нҚј\r\n- [post_repository](data/post_repository.md) вҖ” кІҢмӢңнҢҗ Firestore CRUD мӢұкёҖн„ҙ\r\n\r\n## м•ҢлҰј (lib/notification/)\r\n- [fcm_service](notification/fcm_service.md) вҖ” FCM н‘ёмӢң м•ҢлҰј, нҶ н”Ҫ, л”Ҙл§ҒнҒ¬\r\n- [daily_meal_notification](notification/daily_meal_notification.md) вҖ” лЎңм»¬ кёүмӢқ м•ҢлҰј мҠӨмјҖмӨ„л§Ғ\r\n- [popup_notice](notification/popup_notice.md) вҖ” мқём•ұ нҢқм—… кіөм§Җ\r\n- [update_checker](notification/update_checker.md) вҖ” м•ұ лІ„м „ мІҙнҒ¬\r\n\r\n## мғҒнғң кҙҖлҰ¬ (lib/providers/)\r\n- [providers](providers/providers.md) вҖ” Riverpod Notifier/AsyncNotifier м „мІҙ\r\n\r\n## мҠӨнғҖмқј (lib/styles/)\r\n- [app_colors](styles/app_colors.md) вҖ” н…Ңл§Ҳ м»¬лҹ¬ + AnimatedAppColors\r\n- [dark_app_colors](styles/dark_app_colors.md) вҖ” лӢӨнҒ¬ н…Ңл§Ҳ мғүмғҒ кө¬нҳ„мІҙ\r\n- [light_app_colors](styles/light_app_colors.md) вҖ” лқјмқҙнҠё н…Ңл§Ҳ мғүмғҒ кө¬нҳ„мІҙ\r\n\r\n## л„ӨнҠёмӣҢнҒ¬ (lib/network/)\r\n- [network_status](network/network_status.md) вҖ” л„ӨнҠёмӣҢнҒ¬ м—°кІ° мғҒнғң мҠӨнҠёлҰј\r\n- [offline_queue_manager](network/offline_queue_manager.md) вҖ” мҳӨн”„лқјмқё м“°кё° нҒҗ (sqflite)\r\n","README_en.md":"# API Reference - Table of Contents\r\n\r\n> н•ңкөӯм–ҙ: [README.md](./README.md)\r\n>\r\n> Screen and Widget documentation is excluded. Only core layers (services, models, APIs, notifications, etc.) are organized here.\r\n>\r\n> For topic-based guides (architecture, data models, tests, security, etc.), see [`guides/`](./guides/). For feature-level details, see [`features/`](./features/).\r\n\r\n## App Entry Point\r\n- [main](main_en.md) вҖ” App initialization, MainScreen, global state\r\n\r\n## API Layer (lib/api/)\r\n- [meal_data_api](api/meal_data_api_en.md) вҖ” NEIS meal API, monthly prefetch, 24h/5min cache\r\n- [notice_data_api](api/notice_data_api_en.md) вҖ” NEIS school schedule API, upcoming events, 12h cache\r\n- [timetable_data_api](api/timetable_data_api_en.md) вҖ” NEIS timetable API, subject combinations, 12h cache\r\n\r\n## Data Layer (lib/data/)\r\n- [auth_service](data/auth_service_en.md) вҖ” 4 social login providers, profile CRUD, 5-minute cache\r\n- [auth_repository](data/auth_repository_en.md) вҖ” AuthRepository interface, GetIt DI\r\n- [grade_manager](data/grade_manager_en.md) вҖ” Grade CRUD, goal management, grade conversion\r\n- [grade_repository](data/grade_repository_en.md) вҖ” GradeRepository interface, GetIt DI\r\n- [dday_manager](data/dday_manager_en.md) вҖ” D-day CRUD, Firestore sync\r\n- [local_database](data/local_database_en.md) вҖ” SQLite schedule DB, Firestore sync\r\n- [subject_data_manager](data/subject_data_manager_en.md) вҖ” Elective subject load/save\r\n- [search_tokens](data/search_tokens_en.md) вҖ” Korean 2-gram tokenization\r\n- [search_history_service](data/search_history_service_en.md) вҖ” Search history (up to 10 entries)\r\n- [secure_storage_service](data/secure_storage_service_en.md) вҖ” Encrypted storage wrapper\r\n- [analytics_service](data/analytics_service_en.md) вҖ” Firebase Analytics event wrapper\r\n- [setting_data](data/setting_data_en.md) вҖ” SharedPreferences settings singleton\r\n- [service_locator](data/service_locator_en.md) вҖ” GetIt DI setup\r\n- [meal](data/meal_en.md) вҖ” Meal data model (freezed)\r\n- [schedule_data](data/schedule_data_en.md) вҖ” Schedule data model\r\n- [subject](data/subject_en.md) вҖ” Subject data model (freezed)\r\n- [device](data/device_en.md) вҖ” Device size calculation utility\r\n- [api_strings](data/api_strings_en.md) вҖ” API sentinel string constants (for determining data presence)\r\n- [board_categories](data/board_categories_en.md) вҖ” Board category constants + l10n/color/FCM topic helpers\r\n- [post_repository](data/post_repository_en.md) вҖ” Board Firestore CRUD singleton\r\n\r\n## Notifications (lib/notification/)\r\n- [fcm_service](notification/fcm_service_en.md) вҖ” FCM push notifications, topics, deep links\r\n- [daily_meal_notification](notification/daily_meal_notification_en.md) вҖ” Local meal notification scheduling\r\n- [popup_notice](notification/popup_notice_en.md) вҖ” In-app popup notices\r\n- [update_checker](notification/update_checker_en.md) вҖ” App version check\r\n\r\n## State Management (lib/providers/)\r\n- [providers](providers/providers_en.md) вҖ” All Riverpod Notifier/AsyncNotifier definitions\r\n\r\n## Styles (lib/styles/)\r\n- [app_colors](styles/app_colors_en.md) вҖ” Theme colors + AnimatedAppColors\r\n- [dark_app_colors](styles/dark_app_colors_en.md) вҖ” Dark theme color implementation\r\n- [light_app_colors](styles/light_app_colors_en.md) вҖ” Light theme color implementation\r\n\r\n## Network (lib/network/)\r\n- [network_status](network/network_status_en.md) вҖ” Network connection status stream\r\n- [offline_queue_manager](network/offline_queue_manager_en.md) вҖ” Offline write queue (sqflite)\r\n","styles/app_colors.md":"# AppColors\n\n> `lib/styles/app_colors.dart` вҖ” н…Ңл§Ҳ м»¬лҹ¬ + AnimatedAppColors\n\n---\n\n## `AppColors` (м¶”мғҒ нҒҙлһҳмҠӨ)\n\nлқјмқҙнҠё/лӢӨнҒ¬ н…Ңл§Ҳмқҳ мғүмғҒ мҶҚм„ұмқ„ м¶”мғҒмңјлЎң м •мқҳ. мҙқ 13к°ң мғүмғҒ н”„лЎңнҚјнӢ°\n\n### м •м Ғ м ‘к·јмһҗ\n\n| м ‘к·јмһҗ | м„ӨлӘ… |\n|--------|------|\n| `AppColors.theme` | `AnimatedAppColors.instance` вҖ” нҳ„мһ¬ ліҙк°„лҗң мғүмғҒ |\n| `AppColors.lightTheme` | [`LightAppColors`](light_app_colors.md)`()` вҖ” лқјмқҙнҠё н…Ңл§Ҳ кі м • мғүмғҒ |\n| `AppColors.darkTheme` | [`DarkAppColors`](dark_app_colors.md)`()` вҖ” лӢӨнҒ¬ н…Ңл§Ҳ кі м • мғүмғҒ |\n\n---\n\n## мғүмғҒ нҢ”л ҲнҠё\n\n| н”„лЎңнҚјнӢ° | лқјмқҙнҠё (hex) | лӢӨнҒ¬ (hex) | мҡ©лҸ„ |\n|----------|-------------|-----------|------|\n| `primaryColor` | `#3F72AF` | `#3D5A80` | м•ұл°”, кІҢмӢңнҢҗ мһҗмң  лұғм§Җ, мЈјмҡ” к°•мЎ°мғү |\n| `secondaryColor` | `#198A43` | `#4CAF50` | кІҢмӢңнҢҗ м§Ҳл¬ё лұғм§Җ |\n| `tertiaryColor` | `#4D99F4` | `#7EB8DA` | кІҢмӢңнҢҗ м •ліҙкіөмң  лұғм§Җ, ліҙмЎ° к°•мЎ°мғү |\n| `lighterColor` | `rgba(63,114,175,0.6)` | `rgba(61,90,128,0.5)` | primaryColorмқҳ нҲ¬лӘ…лҸ„ ліҖнҳ• |\n| `lightGreyColor` | `grey[200]` | `#252830` | кө¬л¶„м„ , л°°кІҪ л°•мҠӨ |\n| `darkGreyColor` | `grey[600]` | `#8B8F99` | ліҙмЎ° н…ҚмҠӨнҠё, кё°ліё лұғм§Җ |\n| `textFiledFillColor` | `grey[300]` | `#2A2D35` | н…ҚмҠӨнҠё мһ…л Ҙ н•„л“ң л°°кІҪ |\n| `settingScreenBackgroundColor` | `#F8F6F6` | `#17191E` | м„Өм • нҷ”л©ҙ л°°кІҪ |\n| `mealCardBackgroundColor` | `#DBE2EF` | `#1E2028` | кёүмӢқ м№ҙл“ң л°°кІҪ |\n| `mealTypeTextColor` | `#666666` | `#9EA2AC` | кёүмӢқ нғҖмһ… лқјлІЁ (мЎ°мӢқ/мӨ‘мӢқ/м„қмӢқ) |\n| `mealHeaderIconColor` | `#DBE2EF` | `#2A2D35` | кёүмӢқ н—ӨлҚ” м•„мқҙмҪҳ |\n| `black` | `#000000` | `#EEEEEE` | мЈјмҡ” н…ҚмҠӨнҠё (лӢӨнҒ¬м—җм„ңлҠ” л°ҳм „) |\n| `white` | `#FFFFFF` | `#191B20` | м№ҙл“ң л°°кІҪ (лӢӨнҒ¬м—җм„ңлҠ” л°ҳм „) |\n\n### л””мһҗмқё мқҳлҸ„\n\n- **black/white л°ҳм „**: лӢӨнҒ¬ лӘЁл“ңм—җм„ң `black`мқҖ л°қмқҖ н…ҚмҠӨнҠёмғү(`#EEEEEE`), `white`лҠ” м–ҙл‘җмҡҙ л°°кІҪ(`#191B20`)мңјлЎң л§Өн•‘. мӢңл§ЁнӢұ л„Өмқҙл°Қмқҙ м•„лӢҢ м—ӯн•  л„Өмқҙл°Қ вҖ” \"мЈјмҡ” н…ҚмҠӨнҠёмғү\"кіј \"мЈјмҡ” л°°кІҪмғү\"мңјлЎң мқҙн•ҙн•ҙм•ј н•Ё\n- **кІҢмӢңнҢҗ м№ҙн…Ңкі лҰ¬ мғүмғҒ**: `primaryColor`(мһҗмң ) В· `secondaryColor`(м§Ҳл¬ё) В· `tertiaryColor`(м •ліҙкіөмң )мқҖ [`BoardCategories.color()`](../data/board_categories.md)м—җм„ң мӮ¬мҡ©. л¶„мӢӨл¬ј/н•ҷмғқнҡҢ/лҸҷм•„лҰ¬лҠ” н•ҳл“ңмҪ”л”© hex мӮ¬мҡ©\n- **м ‘к·јм„ұ**: лқјмқҙнҠё лӘЁл“ң н…ҚмҠӨнҠё(`#000000`) on л°°кІҪ(`#F2F3F5`)мқҖ лҢҖл№„мңЁ 16.1:1 (WCAG AAA). лӢӨнҒ¬ лӘЁл“ң н…ҚмҠӨнҠё(`#EEEEEE`) on л°°кІҪ(`#17191E`)мқҖ лҢҖл№„мңЁ 14.4:1 (WCAG AAA). ліҙмЎ° н…ҚмҠӨнҠё(`darkGreyColor`)лҠ” к°Ғк°Ғ 5.7:1 / 4.6:1 (WCAG AA)\n\n---\n\n## `AnimatedAppColors` (мӢұкёҖнҶӨ)\n\n```dart\nclass AnimatedAppColors extends AppColors {\n  static final AnimatedAppColors instance = AnimatedAppColors._();\n}\n```\n\nлқјмқҙнҠёвҶ”лӢӨнҒ¬ м „нҷҳ мӢң мғүмғҒ ліҙк°„(lerp)мқ„ м§Җмӣҗн•ҳлҠ” мӢұкёҖнҶӨ\n\n### `setDark(dark, {animate})`\n\n```dart\nvoid setDark(bool dark, {bool animate = true}) {\n  _isDark = dark;\n  if (!animate) _t = dark ? 1.0 : 0.0;\n}\n```\n\nн…Ңл§Ҳ л°©н–Ҙ м„Өм •. `animate: false`л©ҙ мҰүмӢң м „нҷҳ (м•ұ мҙҲкё°нҷ” мӢң)\n\n### `tick(t)`\n\n```dart\nvoid tick(double t) => _t = t;\n```\n\n`AnimationController`м—җм„ң нҳём¶ң. `_t`лҠ” 0.0(лқјмқҙнҠё)~1.0(лӢӨнҒ¬) ліҙк°„ м§„н–үлҸ„\n\n### мғүмғҒ ліҙк°„\n\n```dart\nColor _lerp(Color light, Color dark) => Color.lerp(light, dark, _t)!;\n\n@override Color get primaryColor =>\n    _lerp(AppColors.lightTheme.primaryColor, AppColors.darkTheme.primaryColor);\n```\n\nлӘЁл“  мғүмғҒ н”„лЎңнҚјнӢ°к°Җ `_lerp`лҘј нҶөн•ҙ нҳ„мһ¬ `_t` к°’м—җ л”°лқј лқјмқҙнҠё/лӢӨнҒ¬ мӮ¬мқҙлҘј ліҙк°„. н…Ңл§Ҳ м „нҷҳ м• лӢҲл©”мқҙм…ҳ мӢң л¶Җл“ңлҹ¬мҡҙ мғүмғҒ м „нҷҳ кө¬нҳ„\n\n### нҳём¶ң нқҗлҰ„\n\n```\nthemeProvider ліҖкІҪ\n  вҶ’ HansolHighSchool.build()\n    вҶ’ AnimatedAppColors.setDark(isDark, animate: false)\n    вҶ’ AnimatedAppColors.tick(isDark ? 1.0 : 0.0)\n      вҶ’ лӘЁл“  AppColors.theme.xxx к°ұмӢ \n```\n\nнҳ„мһ¬лҠ” `animate: false`лЎң мҰүмӢң м „нҷҳл§Ң мӮ¬мҡ©. н–Ҙнӣ„ `AnimationController`мҷҖ м—°кІ° мӢң 0.0вҶ’1.0 м• лӢҲл©”мқҙм…ҳмңјлЎң л¶Җл“ңлҹ¬мҡҙ м „нҷҳ к°ҖлҠҘ\n","styles/app_colors_en.md":"# AppColors\r\n\r\n> н•ңкөӯм–ҙ: [app_colors.md](./app_colors.md)\r\n\r\n> `lib/styles/app_colors.dart` вҖ” Theme colors + AnimatedAppColors\r\n\r\n---\r\n\r\n## `AppColors` (abstract class)\r\n\r\nAbstractly defines color properties for the light/dark themes. Total of 13 color properties.\r\n\r\n### Static accessors\r\n\r\n| Accessor | Description |\r\n|----------|-------------|\r\n| `AppColors.theme` | `AnimatedAppColors.instance` вҖ” current interpolated colors |\r\n| `AppColors.lightTheme` | [`LightAppColors`](light_app_colors.md)`()` вҖ” fixed light-theme colors |\r\n| `AppColors.darkTheme` | [`DarkAppColors`](dark_app_colors.md)`()` вҖ” fixed dark-theme colors |\r\n\r\n---\r\n\r\n## Color palette\r\n\r\n| Property | Light (hex) | Dark (hex) | Usage |\r\n|----------|-------------|------------|-------|\r\n| `primaryColor` | `#3F72AF` | `#3D5A80` | App bar, free-board badge, primary accent |\r\n| `secondaryColor` | `#198A43` | `#4CAF50` | Question-board badge |\r\n| `tertiaryColor` | `#4D99F4` | `#7EB8DA` | Info-sharing board badge, secondary accent |\r\n| `lighterColor` | `rgba(63,114,175,0.6)` | `rgba(61,90,128,0.5)` | Translucent variant of primaryColor |\r\n| `lightGreyColor` | `grey[200]` | `#252830` | Dividers, background boxes |\r\n| `darkGreyColor` | `grey[600]` | `#8B8F99` | Secondary text, default badges |\r\n| `textFiledFillColor` | `grey[300]` | `#2A2D35` | Text-field background |\r\n| `settingScreenBackgroundColor` | `#F8F6F6` | `#17191E` | Settings screen background |\r\n| `mealCardBackgroundColor` | `#DBE2EF` | `#1E2028` | Meal card background |\r\n| `mealTypeTextColor` | `#666666` | `#9EA2AC` | Meal type label (breakfast/lunch/dinner) |\r\n| `mealHeaderIconColor` | `#DBE2EF` | `#2A2D35` | Meal header icon |\r\n| `black` | `#000000` | `#EEEEEE` | Primary text (inverted in dark mode) |\r\n| `white` | `#FFFFFF` | `#191B20` | Card background (inverted in dark mode) |\r\n\r\n### Design intent\r\n\r\n- **black/white inversion**: In dark mode, `black` maps to a light text color (`#EEEEEE`) and `white` maps to a dark background (`#191B20`). These are role-based names, not semantic вҖ” think of them as \"primary text color\" and \"primary background color\".\r\n- **Board category colors**: `primaryColor` (Free) В· `secondaryColor` (Question) В· `tertiaryColor` (Info-sharing) are used by [`BoardCategories.color()`](../data/board_categories.md). Lost-and-found/student council/clubs use hard-coded hex.\r\n- **Accessibility**: Light-mode text (`#000000`) on background (`#F2F3F5`) has a contrast ratio of 16.1:1 (WCAG AAA). Dark-mode text (`#EEEEEE`) on background (`#17191E`) has a contrast ratio of 14.4:1 (WCAG AAA). Secondary text (`darkGreyColor`) measures 5.7:1 / 4.6:1 respectively (WCAG AA).\r\n\r\n---\r\n\r\n## `AnimatedAppColors` (singleton)\r\n\r\n```dart\r\nclass AnimatedAppColors extends AppColors {\r\n  static final AnimatedAppColors instance = AnimatedAppColors._();\r\n}\r\n```\r\n\r\nA singleton supporting color interpolation (lerp) during lightвҶ”dark transitions.\r\n\r\n### `setDark(dark, {animate})`\r\n\r\n```dart\r\nvoid setDark(bool dark, {bool animate = true}) {\r\n  _isDark = dark;\r\n  if (!animate) _t = dark ? 1.0 : 0.0;\r\n}\r\n```\r\n\r\nSets the theme direction. `animate: false` switches instantly (used during app init).\r\n\r\n### `tick(t)`\r\n\r\n```dart\r\nvoid tick(double t) => _t = t;\r\n```\r\n\r\nCalled from `AnimationController`. `_t` is the interpolation progress 0.0 (light) ~ 1.0 (dark).\r\n\r\n### Color interpolation\r\n\r\n```dart\r\nColor _lerp(Color light, Color dark) => Color.lerp(light, dark, _t)!;\r\n\r\n@override Color get primaryColor =>\r\n    _lerp(AppColors.lightTheme.primaryColor, AppColors.darkTheme.primaryColor);\r\n```\r\n\r\nEvery color property is interpolated between light and dark via `_lerp` based on the current `_t`. This produces smooth color transitions during theme-switch animations.\r\n\r\n### Call flow\r\n\r\n```\r\nthemeProvider change\r\n  вҶ’ HansolHighSchool.build()\r\n    вҶ’ AnimatedAppColors.setDark(isDark, animate: false)\r\n    вҶ’ AnimatedAppColors.tick(isDark ? 1.0 : 0.0)\r\n      вҶ’ all AppColors.theme.xxx refreshed\r\n```\r\n\r\nCurrently only uses `animate: false` (instant switch). If later connected to an `AnimationController`, a 0.0вҶ’1.0 animation would enable smooth transitions.\r\n","styles/dark_app_colors.md":"# DarkAppColors\r\n\r\n> `lib/styles/dark_app_colors.dart` вҖ” лӢӨнҒ¬ н…Ңл§Ҳ мғүмғҒ кө¬нҳ„мІҙ\r\n\r\n[`AppColors`](app_colors.md) м¶”мғҒ нҒҙлһҳмҠӨлҘј кө¬нҳ„. мӢұкёҖн„ҙ нҢЁн„ҙ. нҶ мҠӨ(Toss) мҠӨнғҖмқј л„Өмқҙл№„ кі„м—ҙ л°°кІҪмғү мӮ¬мҡ©\r\n\r\n---\r\n\r\n## мӢұкёҖн„ҙ\r\n\r\n```dart\r\nclass DarkAppColors extends AppColors {\r\n  static final DarkAppColors _instance = DarkAppColors._internal();\r\n  factory DarkAppColors() => _instance;\r\n  DarkAppColors._internal();\r\n}\r\n```\r\n\r\n`AppColors._dark`м—җм„ң `DarkAppColors()`лЎң м ‘к·ј\r\n\r\n---\r\n\r\n## мғүмғҒ м •мқҳ\r\n\r\n| н”„лЎңнҚјнӢ° | мғүмғҒк°’ | мҡ©лҸ„ |\r\n|----------|--------|------|\r\n| `black` | `0xFFEEEEEE` | лӢӨнҒ¬ лӘЁл“ңмқҳ \"кІҖм •\" = л°қмқҖ нҡҢмғү (н…ҚмҠӨнҠёмҡ©) |\r\n| `white` | `0xFF191B20` | лӢӨнҒ¬ лӘЁл“ңмқҳ \"нқ°мғү\" = м§„н•ң л„Өмқҙл№„ (л°°кІҪмҡ©) |\r\n| `primaryColor` | `0xFF3D5A80` | мЈј мғүмғҒ вҖ” л„Өмқҙл№„ лё”лЈЁ |\r\n| `secondaryColor` | `0xFF4CAF50` | ліҙмЎ° мғүмғҒ вҖ” мҙҲлЎқ |\r\n| `tertiaryColor` | `0xFF7EB8DA` | 3м°Ё мғүмғҒ вҖ” л°қмқҖ н•ҳлҠҳмғү |\r\n| `lighterColor` | `rgba(61,90,128, 0.5)` | л°ҳнҲ¬лӘ… мЈј мғүмғҒ |\r\n| `lightGreyColor` | `0xFF252830` | л°қмқҖ нҡҢмғү вҶ’ м§„н•ң нҡҢмғү (м№ҙл“ң л°°кІҪ л“ұ) |\r\n| `darkGreyColor` | `0xFF8B8F99` | м–ҙл‘җмҡҙ нҡҢмғү (ліҙмЎ° н…ҚмҠӨнҠё) |\r\n| `textFiledFillColor` | `0xFF2A2D35` | н…ҚмҠӨнҠён•„л“ң л°°кІҪ |\r\n| `settingScreenBackgroundColor` | `0xFF17191E` | м„Өм • нҷ”л©ҙ л°°кІҪ (к°ҖмһҘ м–ҙл‘җмҡҙ мғү) |\r\n| `mealCardBackgroundColor` | `0xFF1E2028` | кёүмӢқ м№ҙл“ң л°°кІҪ |\r\n| `mealTypeTextColor` | `0xFF8B8F99` | кёүмӢқ мң нҳ• лқјлІЁ мғүмғҒ |\r\n| `mealHeaderIconColor` | `0xFF2A2D35` | кёүмӢқ н—ӨлҚ” м•„мқҙмҪҳ л°°кІҪ |\r\n\r\n---\r\n\r\n## л””мһҗмқё нҠ№м§•\r\n\r\n- **л°ҳм „ нҢЁн„ҙ**: `black`мқҙ л°қмқҖмғү, `white`к°Җ м–ҙл‘җмҡҙмғү. `AnimatedAppColors._lerp`м—җм„ң лқјмқҙнҠёвҶ”лӢӨнҒ¬ ліҙк°„ мӢң мһҗм—°мҠӨлҹҪкІҢ м „нҷҳлҗЁ\r\n- **л„Өмқҙл№„ кі„м—ҙ**: мҲңмҲҳ кІҖм •(`#000000`) лҢҖмӢ  `0xFF191B20`, `0xFF1E2028` л“ұ м•Ҫк°„мқҳ нҢҢлһҖ кё°к°Җ мһҲлҠ” м–ҙл‘җмҡҙ мғү мӮ¬мҡ© вҖ” лҲҲмқҳ н”јлЎң к°җмҶҢ\r\n- `darkGreyColor`(`0xFF8B8F99`)лҠ” лқјмқҙнҠё/лӢӨнҒ¬ лӘЁл‘җ л№„мҠ·н•ң нҶӨмңјлЎң ліҙмЎ° н…ҚмҠӨнҠём—җ мқјкҙҖм„ұ мң м§Җ\r\n","styles/dark_app_colors_en.md":"# DarkAppColors\r\n\r\n> н•ңкөӯм–ҙ: [dark_app_colors.md](./dark_app_colors.md)\r\n\r\n> `lib/styles/dark_app_colors.dart` вҖ” Dark theme color implementation\r\n\r\nImplements the [`AppColors`](app_colors.md) abstract class. Singleton pattern. Uses Toss-style navy-tinted background colors.\r\n\r\n---\r\n\r\n## Singleton\r\n\r\n```dart\r\nclass DarkAppColors extends AppColors {\r\n  static final DarkAppColors _instance = DarkAppColors._internal();\r\n  factory DarkAppColors() => _instance;\r\n  DarkAppColors._internal();\r\n}\r\n```\r\n\r\nAccessed via `DarkAppColors()` inside `AppColors._dark`.\r\n\r\n---\r\n\r\n## Color definitions\r\n\r\n| Property | Color value | Usage |\r\n|----------|-------------|-------|\r\n| `black` | `0xFFEEEEEE` | Dark mode \"black\" = light grey (for text) |\r\n| `white` | `0xFF191B20` | Dark mode \"white\" = deep navy (for backgrounds) |\r\n| `primaryColor` | `0xFF3D5A80` | Primary color вҖ” navy blue |\r\n| `secondaryColor` | `0xFF4CAF50` | Secondary color вҖ” green |\r\n| `tertiaryColor` | `0xFF7EB8DA` | Tertiary color вҖ” light sky blue |\r\n| `lighterColor` | `rgba(61,90,128, 0.5)` | Translucent primary color |\r\n| `lightGreyColor` | `0xFF252830` | Light grey вҶ’ dark grey (card background, etc.) |\r\n| `darkGreyColor` | `0xFF8B8F99` | Dark grey (secondary text) |\r\n| `textFiledFillColor` | `0xFF2A2D35` | Text-field background |\r\n| `settingScreenBackgroundColor` | `0xFF17191E` | Settings screen background (darkest color) |\r\n| `mealCardBackgroundColor` | `0xFF1E2028` | Meal card background |\r\n| `mealTypeTextColor` | `0xFF8B8F99` | Meal type label color |\r\n| `mealHeaderIconColor` | `0xFF2A2D35` | Meal header icon background |\r\n\r\n---\r\n\r\n## Design traits\r\n\r\n- **Inversion pattern**: `black` is the light color and `white` is the dark color. This transitions naturally in `AnimatedAppColors._lerp` when interpolating between lightвҶ”dark.\r\n- **Navy palette**: Instead of pure black (`#000000`), uses slightly blue-tinted dark tones such as `0xFF191B20` and `0xFF1E2028` вҖ” reduces eye strain.\r\n- `darkGreyColor` (`0xFF8B8F99`) keeps a similar tone in both light and dark modes, maintaining consistency for secondary text.\r\n","styles/light_app_colors.md":"# LightAppColors\r\n\r\n> `lib/styles/light_app_colors.dart` вҖ” лқјмқҙнҠё н…Ңл§Ҳ мғүмғҒ кө¬нҳ„мІҙ\r\n\r\n[`AppColors`](app_colors.md) м¶”мғҒ нҒҙлһҳмҠӨлҘј кө¬нҳ„. мӢұкёҖн„ҙ нҢЁн„ҙ. лё”лЈЁ кі„м—ҙ primaryColorмҷҖ л°қмқҖ л°°кІҪмғү мӮ¬мҡ©\r\n\r\n---\r\n\r\n## мӢұкёҖн„ҙ\r\n\r\n```dart\r\nclass LightAppColors extends AppColors {\r\n  static final LightAppColors _instance = LightAppColors._internal();\r\n  factory LightAppColors() => _instance;\r\n  LightAppColors._internal();\r\n}\r\n```\r\n\r\n`AppColors._light`м—җм„ң `LightAppColors()`лЎң м ‘к·ј\r\n\r\n---\r\n\r\n## мғүмғҒ м •мқҳ\r\n\r\n| н”„лЎңнҚјнӢ° | мғүмғҒк°’ | мҡ©лҸ„ |\r\n|----------|--------|------|\r\n| `black` | `Colors.black` | кё°ліё н…ҚмҠӨнҠё мғүмғҒ |\r\n| `white` | `Colors.white` | кё°ліё л°°кІҪ мғүмғҒ |\r\n| `primaryColor` | `0xFF3F72AF` | мЈј мғүмғҒ вҖ” м°Ёл¶„н•ң лё”лЈЁ |\r\n| `secondaryColor` | `0xFF198A43` | ліҙмЎ° мғүмғҒ вҖ” м§„н•ң мҙҲлЎқ |\r\n| `tertiaryColor` | `0xFF4D99F4` | 3м°Ё мғүмғҒ вҖ” л°қмқҖ нҢҢлһ‘ |\r\n| `lighterColor` | `rgba(63,114,175, 0.6)` | л°ҳнҲ¬лӘ… мЈј мғүмғҒ |\r\n| `lightGreyColor` | `Colors.grey[200]` | л°қмқҖ нҡҢмғү (м№ҙл“ң л°°кІҪ, кө¬л¶„м„ ) |\r\n| `darkGreyColor` | `Colors.grey[600]` | м–ҙл‘җмҡҙ нҡҢмғү (ліҙмЎ° н…ҚмҠӨнҠё) |\r\n| `textFiledFillColor` | `Colors.grey[300]` | н…ҚмҠӨнҠён•„л“ң л°°кІҪ |\r\n| `settingScreenBackgroundColor` | `0xFFF8F6F6` | м„Өм • нҷ”л©ҙ л°°кІҪ (м•Ҫк°„ л”°лң»н•ң нҡҢмғү) |\r\n| `mealCardBackgroundColor` | `0xFFDBE2EF` | кёүмӢқ м№ҙл“ң л°°кІҪ (м—°н•ң нҢҢлһҖ нҡҢмғү) |\r\n| `mealTypeTextColor` | `0xFF848484` | кёүмӢқ мң нҳ• лқјлІЁ мғүмғҒ |\r\n| `mealHeaderIconColor` | `0xFFDBE2EF` | кёүмӢқ н—ӨлҚ” м•„мқҙмҪҳ л°°кІҪ |\r\n\r\n---\r\n\r\n## л””мһҗмқё нҠ№м§•\r\n\r\n- **лё”лЈЁ нҶӨ**: `primaryColor`(`0xFF3F72AF`)к°Җ м•ұ м „мІҙмқҳ кё°мЎ° вҖ” AppBar, лІ„нҠј, л§ҒнҒ¬, м„ нғқ мқёл””мјҖмқҙн„°\r\n- **кёүмӢқ м№ҙл“ң**: `mealCardBackgroundColor`(`0xFFDBE2EF`)лҠ” primaryColorмқҳ м—°н•ң ліҖнҳ•мңјлЎң мӢңк°Ғм Ғ нҶөмқјк°җ\r\n- `lightGreyColor` / `darkGreyColor`лҠ” Flutter кё°ліё `Colors.grey` нҢ”л ҲнҠё мӮ¬мҡ© вҖ” н”Ңлһ«нҸј м№ңнҷ”м Ғ\r\n- `settingScreenBackgroundColor`(`0xFFF8F6F6`)лҠ” мҲңмҲҳ нқ°мғүліҙлӢӨ м•Ҫк°„ л”°лң»н•ң нҶӨмңјлЎң м„Өм • нҷ”л©ҙ кө¬л¶„\r\n","styles/light_app_colors_en.md":"# LightAppColors\r\n\r\n> н•ңкөӯм–ҙ: [light_app_colors.md](./light_app_colors.md)\r\n\r\n> `lib/styles/light_app_colors.dart` вҖ” Light theme color implementation\r\n\r\nImplements the [`AppColors`](app_colors.md) abstract class. Singleton pattern. Uses a blue-family primaryColor with bright background colors.\r\n\r\n---\r\n\r\n## Singleton\r\n\r\n```dart\r\nclass LightAppColors extends AppColors {\r\n  static final LightAppColors _instance = LightAppColors._internal();\r\n  factory LightAppColors() => _instance;\r\n  LightAppColors._internal();\r\n}\r\n```\r\n\r\nAccessed via `LightAppColors()` inside `AppColors._light`.\r\n\r\n---\r\n\r\n## Color definitions\r\n\r\n| Property | Color value | Usage |\r\n|----------|-------------|-------|\r\n| `black` | `Colors.black` | Default text color |\r\n| `white` | `Colors.white` | Default background color |\r\n| `primaryColor` | `0xFF3F72AF` | Primary color вҖ” calm blue |\r\n| `secondaryColor` | `0xFF198A43` | Secondary color вҖ” deep green |\r\n| `tertiaryColor` | `0xFF4D99F4` | Tertiary color вҖ” bright blue |\r\n| `lighterColor` | `rgba(63,114,175, 0.6)` | Translucent primary color |\r\n| `lightGreyColor` | `Colors.grey[200]` | Light grey (card background, dividers) |\r\n| `darkGreyColor` | `Colors.grey[600]` | Dark grey (secondary text) |\r\n| `textFiledFillColor` | `Colors.grey[300]` | Text-field background |\r\n| `settingScreenBackgroundColor` | `0xFFF8F6F6` | Settings screen background (slightly warm grey) |\r\n| `mealCardBackgroundColor` | `0xFFDBE2EF` | Meal card background (pale blue-grey) |\r\n| `mealTypeTextColor` | `0xFF848484` | Meal type label color |\r\n| `mealHeaderIconColor` | `0xFFDBE2EF` | Meal header icon background |\r\n\r\n---\r\n\r\n## Design traits\r\n\r\n- **Blue tone**: `primaryColor` (`0xFF3F72AF`) is the app's overall keynote вҖ” AppBar, buttons, links, selection indicators.\r\n- **Meal card**: `mealCardBackgroundColor` (`0xFFDBE2EF`) is a pale variant of primaryColor for visual cohesion.\r\n- `lightGreyColor` / `darkGreyColor` use Flutter's stock `Colors.grey` palette вҖ” platform-friendly.\r\n- `settingScreenBackgroundColor` (`0xFFF8F6F6`) is a slightly warmer tone than pure white to visually distinguish the settings screen.\r\n","USER_GUIDE.md":"# мӮ¬мҡ©мһҗ к°Җмқҙл“ң\r\n\r\n> English: [USER_GUIDE_en.md](./USER_GUIDE_en.md)\r\n\r\nн•ңмҶ”кі  м•ұ мӮ¬мҡ©лІ•мқ„ мһ¬н•ҷмғқВ·көҗмӮ¬В·мЎём—…мғқВ·н•ҷл¶ҖлӘЁ к°Ғ м—ӯн• лі„лЎң м •лҰ¬н•©лӢҲлӢӨ. мІҳмқҢ м„Өм№ҳн•ң л¶„мқҖ \"мӢңмһ‘н•ҳкё°\"л¶Җн„° ліҙмӢңкі , к°ңлі„ кё°лҠҘл§Ң к¶ҒкёҲн•ҳл©ҙ \"мЈјмҡ” кё°лҠҘ\" м„№м…ҳмңјлЎң л°”лЎң к°Җм…”лҸ„ лҗ©лӢҲлӢӨ.\r\n\r\n## мӢңмһ‘н•ҳкё°\r\n\r\n### 1. м•ұ м„Өм№ҳ\r\n- Android: Play Storeм—җм„ң \"н•ңмҶ”кі л“ұн•ҷкөҗ\" кІҖмғү\r\n- iOS: App Storeм—җм„ң \"н•ңмҶ”кі л“ұн•ҷкөҗ\" кІҖмғү\r\n- мөңмҶҢ лІ„м „ лҜёл§ҢмқҖ мӢӨн–ү мӢң м—…лҚ°мқҙнҠё лӢӨмқҙм–јлЎңк·ёк°Җ лң№лӢҲлӢӨ\r\n\r\n### 2. лЎңк·ёмқё\r\n4к°Җм§Җ мӨ‘ нҺён•ң л°©лІ•мңјлЎң:\r\n- Google\r\n- Apple (iOS)\r\n- Kakao\r\n- GitHub\r\n\r\nл№„л°ҖлІҲнҳёлҘј л§Ңл“Өм§Җ м•ҠмҠөлӢҲлӢӨ. мҶҢм…ң кі„м •л§Ң мһҲмңјл©ҙ лҗ©лӢҲлӢӨ.\r\n\r\n### 3. мӢ л¶„ м„ нғқ л°Ҹ н”„лЎңн•„ мһ…л Ҙ\r\n- мһ¬н•ҷмғқ / мЎём—…мғқ / көҗмӮ¬ / н•ҷл¶ҖлӘЁ мӨ‘ м„ нғқ\r\n- мһ¬н•ҷмғқ/көҗмӮ¬лҠ” н•ҷл…„/л°ҳ/лІҲнҳё мһ…л Ҙ\r\n- мқҙлҰ„мқҖ мӢӨлӘ… к¶ҢмһҘ (н•ҷкөҗ л§ҘлқҪмғҒ)\r\n\r\n### 4. мҠ№мқё лҢҖкё°\r\nкҙҖлҰ¬мһҗ мҠ№мқё м „к№Ңм§Җ лҢҖл¶Җл¶„ кё°лҠҘмқҙ мһ к№ҒлӢҲлӢӨ. ліҙнҶө 1мқј мқҙлӮҙ мІҳлҰ¬лҗ©лӢҲлӢӨ.\r\n\r\n## м—ӯн• лі„ к°ҖлҠҘ кё°лҠҘ\r\n\r\n| кё°лҠҘ | мһ¬н•ҷмғқ | көҗмӮ¬ | мЎём—…мғқ | н•ҷл¶ҖлӘЁ |\r\n|---|:---:|:---:|:---:|:---:|\r\n| кёүмӢқ/н•ҷмӮ¬мқјм • | вң… | вң… | вң… | вң… |\r\n| мӢңк°„н‘ң (лӮҙ л°ҳ) | вң… | вң… (көҗмӮ¬мҡ©) | вқҢ | вқҢ |\r\n| кІҢмӢңнҢҗ/мұ„нҢ… | вң… | вң… | вң… | л¶Җл¶„ |\r\n| м„ұм Ғ кҙҖлҰ¬ (лЎңм»¬) | вң… | вқҢ | вң… | вқҢ |\r\n| к°ңмқёмқјм •/D-day | вң… | вң… | вң… | вң… |\r\n| кіөм§Җ мһ‘м„ұ | вқҢ | вң… | вқҢ | вқҢ |\r\n| нҷҲ нҷ”л©ҙ мң„м Ҝ | вң… | вң… | л¶Җл¶„ | л¶Җл¶„ |\r\n\r\n## мЈјмҡ” кё°лҠҘ\r\n\r\n### нҷҲ\r\n- мҳӨлҠҳмқҳ кёүмӢқ, мӢңк°„н‘ң, мәҳлҰ°лҚ”лҘј н•ң нҷ”л©ҙм—җ\r\n- мң„лЎң мҠӨнҒ¬лЎӨн•ҳм—¬ D-day / к°ңмқёмқјм • нҷ•мқё\r\n- мҳӨлҘёмӘҪ мң„ м•ҢлҰј м•„мқҙмҪҳм—җм„ң мқём•ұ м•ҢлҰј ліҙкё°\r\n\r\n### кёүмӢқ\r\n- мЎ°мӢқ / мӨ‘мӢқ / м„қмӢқ к°ңлі„ нғӯ\r\n- л©”лүҙ нғӯ вҶ’ мҳҒм–‘ м„ұл¶„ + м•Ңл ҲлҘҙкё° н‘ңмӢң\r\n- мқҙлҜём§ҖлЎң м ҖмһҘн•ҳкұ°лӮҳ м№ҙм№ҙмҳӨнҶЎ л“ұ мҷёл¶Җ кіөмң \r\n\r\n### мӢңк°„н‘ң\r\n- лӮҙ л°ҳ лҳҗлҠ” м„ нғқкіјлӘ© кё°л°ҳ\r\n- нҳ„мһ¬ көҗмӢңк°Җ мһҗлҸҷ н•ҳмқҙлқјмқҙнҠё\r\n- кіјлӘ©лі„ мғүмғҒмқҖ мһҘкё° нғӯн•ҳм—¬ м»ӨмҠӨн„°л§Ҳмқҙм§•\r\n\r\n### мқјм •\r\n- мӣ”к°„ мәҳлҰ°лҚ” мўҢмҡ° мҠӨмҷҖмқҙн”„лЎң мқҙлҸҷ\r\n- л№Ҳ лӮ м§ң нғӯ вҶ’ к°ңмқё мқјм • м¶”к°Җ\r\n- м—°мҶҚ мқјм •мқҖ н•ҳлӮҳмқҳ м»¬лҹ¬ л°”лЎң н‘ңмӢң\r\n\r\n### кІҢмӢңнҢҗ\r\n- 6к°ң м№ҙн…Ңкі лҰ¬ + мқёкё°кёҖ нғӯ\r\n- кёҖм“°кё° мӢң мқҙлҜём§Җ/нҲ¬н‘ң/мқјм • мІЁл¶Җ к°ҖлҠҘ\r\n- мқөлӘ… кёҖ: мқөлӘ… лІҲнҳёк°Җ кёҖл§ҲлӢӨ л¶Җм—¬лҗЁ\r\n- кІҖмғүм°Ҫм—җм„ң мөңк·ј кІҖмғүм–ҙ + n-gram кІҖмғү\r\n\r\n### мұ„нҢ…\r\n- мҡ°мёЎ мғҒлӢЁ \"мғҲ мұ„нҢ…\" вҶ’ мң м Җ кІҖмғү\r\n- л©”мӢңм§Җ кёёкІҢ лҲ„лҘҙл©ҙ мӮӯм ң л©”лүҙ\r\n- м•Ҳ мқҪмқҖ л©”мӢңм§ҖлҠ” лұғм§ҖлЎң н‘ңмӢң\r\n\r\n### м„ұм Ғ кҙҖлҰ¬\r\n- мҲҳмӢң/м •мӢң нғӯ\r\n- кіјлӘ©лі„ м җмҲҳ мһ…л Ҙ вҶ’ мһҗлҸҷ л“ұкёү / л°ұл¶„мң„ ліҖнҷҳ\r\n- м¶”мқҙ к·ёлһҳн”„лҠ” л“ұкёү/мӣҗм җмҲҳ/л°ұл¶„мң„/н‘ңмӨҖм җмҲҳ мӨ‘ м„ нғқ\r\n- **м„ұм ҒмқҖ мқҙ кё°кё°м—җл§Ң м ҖмһҘлҗ©лӢҲлӢӨ.** кё°кё° ліҖкІҪ мӢң мқҙкҙҖ м•Ҳ лҗЁ\r\n\r\n### к°ңмқёмқјм • & D-day\r\n- 6к°Җм§Җ кё°ліё мғү + мӣҗнҳ• м»¬лҹ¬н”јм»ӨлЎң мһҗмң  м„ нғқ\r\n- D-dayлҠ” нҷҲ нҷ”л©ҙм—җ н•Җ кі м • к°ҖлҠҘ\r\n\r\n### м•ҢлҰј м„Өм •\r\n5к°Җм§Җ м№ҙн…Ңкі лҰ¬ к°ңлі„ on/off:\r\n- лҢ“кёҖ / лӢөкёҖ\r\n- мұ„нҢ…\r\n- мғҲ кёҖ (кҙҖмӢ¬ м№ҙн…Ңкі лҰ¬)\r\n- кі„м • (мҠ№мқё/м •м§Җ/м—ӯн•  ліҖкІҪ)\r\n- кёүмӢқ (лЎңм»¬ м•ҢлҰј, мӢңк°„ м„Өм •)\r\n\r\n### нҷҲ нҷ”л©ҙ мң„м Ҝ\r\n- **Android**: 4Г—2 кёүмӢқ / 3Г—2 мӢңк°„н‘ң / 5Г—2 нҶөн•©\r\n- **iOS**: Medium кёүмӢқ / Medium мӢңк°„н‘ң / Large нҶөн•©\r\n- мһҗм •м—җ мһҗлҸҷ к°ұмӢ , м•ұ мӢӨн–ү мӢңм—җлҸ„ к°ұмӢ \r\n\r\n## кҙҖлҰ¬мһҗмҡ©\r\n\r\nк¶Ңн•ңмқҙ л¶Җм—¬лҗң м—ӯн• мқҖ лӢӨмқҢ кё°лҠҘмқ„ м¶”к°ҖлЎң мӮ¬мҡ© к°ҖлҠҘ:\r\n- **moderator** вҖ” мӢ кі  мІҳлҰ¬, кІҢмӢңкёҖ/лҢ“кёҖ мҲЁк№Җ (м •м§Җ к¶Ңн•ң м—ҶмқҢ)\r\n- **auditor** вҖ” лӘЁл“  мӢ кі /лЎңк·ё/нҶөкі„ мқҪкё° м „мҡ© (көҗмӮ¬ к°җмӮ¬мҡ©)\r\n- **manager** вҖ” м •м§Җ, кіөм§Җ кі м •, мӮ¬мҡ©мһҗ мҠ№мқё\r\n- **admin** вҖ” лӘЁл“  к¶Ңн•ң + лӢӨлҘё мӮ¬мҡ©мһҗмқҳ к¶Ңн•ң ліҖкІҪ\r\n\r\nлҸ„кө¬:\r\n- **Flutter Admin нҷ”л©ҙ**: м„Өм • вҶ’ кҙҖлҰ¬мһҗ\r\n- **Admin Web**: лі„лҸ„ мӣ№ лҢҖмӢңліҙл“ң мЈјмҶҢ (кҙҖлҰ¬мһҗм—җкІҢ м•ҲлӮҙ) вҖ” мӮ¬мқҙл“ңл°” л©”лүҙлҠ” к¶Ңн•ңлі„лЎң мһҗлҸҷ н•„н„°л§ҒлҗЁ\r\n\r\nмғҒм„ёлҠ” [docs/features/admin-features.md](https://monkshark.github.io/hansol_hs_flutter_app/#features/admin-features.md) м°ёмЎ°.\r\n\r\n## кі„м • кҙҖлҰ¬\r\n\r\n### м •м§Җ мқҙл Ҙ нҷ•мқё\r\n- м •м§Җ мӨ‘: кёҖ/лҢ“кёҖ/мұ„нҢ… мһ‘м„ұ л¶Ҳк°Җ, мЎ°нҡҢлҠ” к°ҖлҠҘ\r\n- л§ҢлЈҢ мһҗлҸҷ н•ҙм ң (л§ӨмӢңк°„ мІҙнҒ¬)\r\n- н•ҙм ңлҗҳл©ҙ н‘ёмӢң м•ҢлҰј мҲҳмӢ \r\n\r\n### м—ӯн•  ліҖкІҪ\r\n- н•ҷмғқнҡҢ / л°©мҶЎл¶Җ л“ұ к¶Ңн•ңмқҙ н•„мҡ”н•ҳл©ҙ кҙҖлҰ¬мһҗм—җкІҢ мҡ”мІӯ\r\n- мҠ№кёү мӢң adminмқҙ `moderator` / `auditor` / `manager` / `admin` мӨ‘ н•ҳлӮҳлЎң ліҖкІҪ\r\n- ліҖкІҪ м§Ғнӣ„м—җлҠ” м•ұмқҙ мһҗлҸҷмңјлЎң ID нҶ нҒ°мқ„ к°ұмӢ н•ҙ мғҲ к¶Ңн•ңмқҙ мҰүмӢң л°ҳмҳҒлҗЁ\r\n\r\n### мғҲ н•ҷл…„ м—…лҚ°мқҙнҠё\r\n- мһ¬н•ҷмғқ/көҗмӮ¬лҠ” 3мӣ”м—җ нҢқм—…мңјлЎң мғҲ н•ҷл…„/л°ҳ/лІҲнҳё мһ…л Ҙ мң лҸ„\r\n- мӢ л¶„(мһ¬н•ҷмғқ/көҗмӮ¬ л“ұ)мқҖ ліёмқёмқҙ ліҖкІҪ л¶Ҳк°Җ (кҙҖлҰ¬мһҗл§Ң)\r\n\r\n### нғҲнҮҙ\r\n- м„Өм • вҶ’ кі„м • вҶ’ нҡҢмӣҗ нғҲнҮҙ\r\n- мқҙмӨ‘ нҷ•мқё нӣ„ лӘЁл“  лҚ°мқҙн„° мҰүмӢң нҢҢкё°:\r\n  - н”„лЎңн•„ / кёҖ / лҢ“кёҖ / мұ„нҢ… / лЎңм»¬ м„ұм Ғ / н”„лЎңн•„ мӮ¬м§„\r\n- нғҲнҮҙ нӣ„ к°ҷмқҖ мҶҢм…ң кі„м •мңјлЎң мһ¬к°Җмһ… мӢң мғҲ мӮ¬мҡ©мһҗлЎң мІҳлҰ¬лҗЁ\r\n\r\n## мһҗмЈј л¬»лҠ” м§Ҳл¬ё (FAQ)\r\n\r\n**Q. м„ұм Ғмқҙ лӢӨлҘё кё°кё°м—җм„ңлҸ„ ліҙмқҙлӮҳмҡ”?**\r\nA. м•„лӢҷлӢҲлӢӨ. м„ұм ҒмқҖ мқҙ кё°кё°мқҳ OS м•”нҳёнҷ” м ҖмһҘмҶҢм—җл§Ң м ҖмһҘлҗҳм–ҙ м„ңлІ„лЎң мҳ¬лқјк°Җм§Җ м•ҠмҠөлӢҲлӢӨ. кё°кё° ліҖкІҪ мӢң лӢӨмӢң мһ…л Ҙн•ҙм•ј н•©лӢҲлӢӨ.\r\n\r\n**Q. м№ҙм№ҙмҳӨлЎң лЎңк·ёмқён–ҲлҠ”лҚ° н”„лЎңн•„ мӮ¬м§„мқҙ лӢ¬лқјмҡ”.**\r\nA. м№ҙм№ҙмҳӨ н”„лЎңн•„ мӮ¬м§„мқ„ к·ёлҢҖлЎң к°Җм ёмҳөлӢҲлӢӨ. л°”кҫёл Өл©ҙ м„Өм • вҶ’ лӮҙ кі„м • вҶ’ н”„лЎңн•„ мӮ¬м§„м—җм„ң көҗмІҙн•ҳм„ёмҡ”.\r\n\r\n**Q. м•ҢлҰјмқҙ м•Ҳ мҷҖмҡ”.**\r\nA. м„Өм • вҶ’ м•ҢлҰјм—җм„ң мӣҗн•ҳлҠ” м№ҙн…Ңкі лҰ¬к°Җ мјңм ё мһҲлҠ”м§Җ, мӢңмҠӨн…ң м•ұ м•ҢлҰј к¶Ңн•ңмқҙ н—Ҳмҡ©лҗҳм–ҙ мһҲлҠ”м§Җ нҷ•мқён•ҳм„ёмҡ”. м •м§Җ кё°к°„ мӨ‘м—җлҠ” мқјл¶Җ м•ҢлҰјмқҙ м ңн•ңлҗ©лӢҲлӢӨ.\r\n\r\n**Q. мҳӨн”„лқјмқёмқёлҚ° кёүмӢқ/мӢңк°„н‘ңк°Җ ліҙмқҙлӮҳмҡ”?**\r\nA. мқҙм „м—җ мЎ°нҡҢн•ң лҚ°мқҙн„°лҠ” мәҗмӢңлЎң лӮЁм•„ мһҲм–ҙ мҳӨн”„лқјмқём—җм„ңлҸ„ ліҙмһ…лӢҲлӢӨ. мҳӨн”„лқјмқё мӨ‘м—җлҠ” мғҒлӢЁм—җ л№Ёк°„ л°°л„Ҳк°Җ н‘ңмӢңлҗ©лӢҲлӢӨ.\r\n\r\n**Q. мң„м Ҝмқҙ м—…лҚ°мқҙнҠёк°Җ м•Ҳ лҸјмҡ”.**\r\nA. м•ұмқ„ н•ң лІҲ мӢӨн–үн•ҙліҙм„ёмҡ”. мһҗлҸҷ к°ұмӢ мқҖ мһҗм • + 1мӢңк°„(iOS) / AlarmManager(Android) мЈјкё°мһ…лӢҲлӢӨ.\r\n\r\n**Q. кІҢмӢңкёҖмқ„ мҳ¬л ёлҠ”лҚ° кіөм§ҖлЎң кі м •н•  мҲҳ мһҲлӮҳмҡ”?**\r\nA. кіөм§Җ кі м •мқҖ manager/admin к¶Ңн•ңл§Ң к°ҖлҠҘн•©лӢҲлӢӨ. moderatorлҠ” мӢ кі  мІҳлҰ¬/мҲЁк№Җк№Ңм§Җл§Ң, auditorлҠ” мқҪкё° м „мҡ©мһ…лӢҲлӢӨ.\r\n\r\n**Q. м •м§Җ к°ҷмқҖ мІҳлҰ¬м—җ мқҙмқҳлҘј м ңкё°н•ҳкі  мӢ¶м–ҙмҡ”.**\r\nA. м„Өм • вҶ’ мқҙмқҳмӢ мІӯм—җм„ң 90мқј мқҙлӮҙм—җ мӮ¬мң лҘј м Ғм–ҙ м ңм¶ңн•  мҲҳ мһҲмҠөлӢҲлӢӨ (PIPA к¶ҢлҰ¬). кҙҖлҰ¬мһҗк°Җ кІҖнҶ н•ҳл©ҙ кІ°кіјк°Җ н‘ёмӢң м•ҢлҰјмңјлЎң мҳөлӢҲлӢӨ.\r\n\r\n**Q. лӮҙ лҚ°мқҙн„°лҘј н•ң лІҲм—җ л°ӣм•„ліј мҲҳ мһҲлӮҳмҡ”?**\r\nA. м„Өм • вҶ’ лҚ°мқҙн„° мҡ”мІӯм—җм„ң мӢ мІӯн•ҳл©ҙ кІҢмӢңкёҖ/лҢ“кёҖ/мӢ кі  мқҙл Ҙ/мұ„нҢ…мқҙ JSONмңјлЎң л¬¶м—¬ лӢӨмҡҙлЎңл“ң л§ҒнҒ¬к°Җ мқҙл©”мқјлЎң мҳөлӢҲлӢӨ. л§ҒнҒ¬лҠ” 30мқј нӣ„ мһҗлҸҷ л§ҢлЈҢлҗ©лӢҲлӢӨ.\r\n\r\n**Q. мқөлӘ… кІҢмӢңкёҖм—җм„ң лҲ„к°Җ мҚјлҠ”м§Җ м•Ң мҲҳ мһҲлӮҳмҡ”?**\r\nA. мқјл°ҳ мӮ¬мҡ©мһҗлҠ” мқөлӘ… лІҲнҳёл§Ң ліҙмһ…лӢҲлӢӨ. adminмқҖ к°җмӮ¬ лЎңк·ёлЎң мӢӨлӘ…мқ„ нҷ•мқён•  мҲҳ мһҲмңјлӮҳ, лӘЁл“  мЎ°нҡҢк°Җ `admin_logs`м—җ кё°лЎқлҗ©лӢҲлӢӨ.\r\n\r\n## л¬ёмқҳ\r\n\r\nм•ұ лӮҙ \"кұҙмқҳмӮ¬н•ӯ / лІ„к·ё м ңліҙ\" л©”лүҙлҘј мқҙмҡ©н•ҳмӢңл©ҙ кҙҖлҰ¬мһҗк°Җ нҷ•мқён•©лӢҲлӢӨ. кёҙкёүн•ң кІҪмҡ° н•ҷкөҗ кіөмӢқ мұ„л„җлЎң м—°лқҪн•ҳм„ёмҡ”.\r\n\r\n## кҙҖл Ё л¬ём„ң\r\n- [кіөк°ң кё°лҠҘ мғҒм„ё](https://monkshark.github.io/hansol_hs_flutter_app/#features/public-features.md)\r\n- [м»Өл®ӨлӢҲнӢ° кё°лҠҘ мғҒм„ё](https://monkshark.github.io/hansol_hs_flutter_app/#features/community-features.md)\r\n- [к°ңмқё кё°лҠҘ мғҒм„ё](https://monkshark.github.io/hansol_hs_flutter_app/#features/personal-features.md)\r\n- [мқёмҰқ & м ‘к·ј](https://monkshark.github.io/hansol_hs_flutter_app/#guides/account-and-access.md)\r\n","USER_GUIDE_en.md":"# User Guide\r\n\r\n> н•ңкөӯм–ҙ: [USER_GUIDE.md](./USER_GUIDE.md)\r\n\r\nHow to use the Hansol HS app, organized by role (student, teacher, alumni, parent). New users should start with \"Getting Started\"; jump to \"Main Features\" if you already know the basics.\r\n\r\n## Getting Started\r\n\r\n### 1. Install\r\n- Android: Play Store вҶ’ search \"н•ңмҶ”кі л“ұн•ҷкөҗ\"\r\n- iOS: App Store вҶ’ search \"н•ңмҶ”кі л“ұн•ҷкөҗ\"\r\n- Versions below the minimum prompt a mandatory update on launch.\r\n\r\n### 2. Sign In\r\nPick any of the four providers:\r\n- Google\r\n- Apple (iOS)\r\n- Kakao\r\n- GitHub\r\n\r\nNo passwords вҖ” social login only.\r\n\r\n### 3. Pick an Identity & Fill Your Profile\r\n- Choose student / alumni / teacher / parent\r\n- Students/teachers also enter year/class/number\r\n- Real names preferred (school context)\r\n\r\n### 4. Wait for Approval\r\nMost features unlock only after admin approval. Usually within a day.\r\n\r\n## Features by Role\r\n\r\n| Feature | Student | Teacher | Alumni | Parent |\r\n|---|:---:|:---:|:---:|:---:|\r\n| Meals / academic calendar | вң… | вң… | вң… | вң… |\r\n| Timetable (your class) | вң… | вң… (teacher view) | вқҢ | вқҢ |\r\n| Board / chat | вң… | вң… | вң… | partial |\r\n| Grades (local) | вң… | вқҢ | вң… | вқҢ |\r\n| Personal schedule / D-day | вң… | вң… | вң… | вң… |\r\n| Create announcements | вқҢ | вң… | вқҢ | вқҢ |\r\n| Home widgets | вң… | вң… | partial | partial |\r\n\r\n## Main Features\r\n\r\n### Home\r\n- Today's meal, timetable, and calendar in one screen\r\n- Scroll up for D-day and personal schedules\r\n- Tap the bell (top-right) for in-app notifications\r\n\r\n### Meals\r\n- Breakfast / lunch / dinner tabs\r\n- Tap a menu вҶ’ nutrition + allergen info\r\n- Save as image or share externally (KakaoTalk, etc.)\r\n\r\n### Timetable\r\n- Based on your class or your selected electives\r\n- Current period is highlighted automatically\r\n- Long-press a subject to customize its color\r\n\r\n### Schedule\r\n- Swipe left/right on the month calendar\r\n- Tap an empty date вҶ’ add a personal event\r\n- Multi-day events render as a continuous colored bar\r\n\r\n### Board\r\n- 6 categories + Popular tab\r\n- Attach images / polls / schedules when writing\r\n- Anonymous posts get a post-scoped anonymous number\r\n- Search supports recent keywords + n-gram matching\r\n\r\n### Chat\r\n- Top-right \"New chat\" вҶ’ search for a user\r\n- Long-press a message for the delete menu\r\n- Unread messages show a badge\r\n\r\n### Grades\r\n- Susi / Jeongsi tabs\r\n- Enter scores per subject вҶ’ auto-convert to grade / percentile\r\n- Trend chart modes: grade / raw / percentile / standard score\r\n- **Grades live on this device only.** They don't transfer when you change devices.\r\n\r\n### Personal Schedule & D-day\r\n- 6 default colors + a circular color picker\r\n- D-day items can be pinned to the home screen\r\n\r\n### Notifications\r\nFive independent toggles:\r\n- Comments / replies\r\n- Chat\r\n- New posts (subscribed categories)\r\n- Account (approval / suspension / role change)\r\n- Meals (local notification, schedulable time)\r\n\r\n### Home Widgets\r\n- **Android**: 4Г—2 meal / 3Г—2 timetable / 5Г—2 combined\r\n- **iOS**: Medium meal / Medium timetable / Large combined\r\n- Auto-refresh at midnight and on app launch\r\n\r\n## For Admins\r\n\r\nPrivileged roles get extra functionality:\r\n- **moderator** вҖ” handle reports, hide posts/comments (no suspension)\r\n- **auditor** вҖ” read-only access to all reports / logs / stats (teacher audit role)\r\n- **manager** вҖ” suspend, pin notices, approve users\r\n- **admin** вҖ” everything + change other users' roles\r\n\r\nTools:\r\n- **Flutter Admin screen**: Settings вҶ’ Admin\r\n- **Admin Web**: separate web dashboard (URL provided by ops) вҖ” sidebar items auto-filter by role\r\n\r\nDetails вҶ’ [docs/features/admin-features_en.md](https://monkshark.github.io/hansol_hs_flutter_app/#features/admin-features_en.md).\r\n\r\n## Account Management\r\n\r\n### Suspension\r\n- While suspended: read-only (no posts/comments/chats)\r\n- Expiry auto-cleared every hour\r\n- Release triggers a push notification\r\n\r\n### Role Changes\r\n- Request from an admin if you need student-council / broadcasting privileges\r\n- Admin changes `role` to `moderator` / `auditor` / `manager` / `admin`\r\n- The app refreshes the ID token automatically right after the change, so the new role takes effect immediately\r\n\r\n### New School Year Update\r\n- Students/teachers see a popup in March to update year/class/number\r\n- Identity (student/teacher/etc.) can only be changed by an admin\r\n\r\n### Deletion\r\n- Settings вҶ’ Account вҶ’ Delete account\r\n- Double-confirm, then immediate wipe:\r\n  - profile / posts / comments / chats / local grades / profile picture\r\n- Re-signing in with the same social account later counts as a new user\r\n\r\n## FAQ\r\n\r\n**Q. Can I see my grades on another device?**\r\nA. No. Grades live only in this device's OS-secured storage вҖ” they don't upload. You'll re-enter them on a new device.\r\n\r\n**Q. My Kakao login shows a different profile picture.**\r\nA. We pull the Kakao picture as-is. Replace it in Settings вҶ’ My account вҶ’ profile picture.\r\n\r\n**Q. I'm not getting notifications.**\r\nA. Check Settings вҶ’ Notifications for the category, and system-level notification permission. Some notifications are suppressed during suspension.\r\n\r\n**Q. Do meals / timetable work offline?**\r\nA. Previously fetched data is cached and visible offline. A red offline banner shows at the top.\r\n\r\n**Q. My widget isn't updating.**\r\nA. Open the app once. Automatic refresh runs at midnight + hourly (iOS) / via AlarmManager (Android).\r\n\r\n**Q. Can I pin my own post as an announcement?**\r\nA. Only managers/admins can pin. Moderators can handle reports / hide content; auditors are read-only.\r\n\r\n**Q. Can I appeal a moderation decision (e.g., a suspension)?**\r\nA. Settings вҶ’ Appeals. You have 90 days to submit a reason (PIPA right). You'll get a push notification once an admin reviews it.\r\n\r\n**Q. Can I download a copy of all my data?**\r\nA. Settings вҶ’ Data Request. Your posts / comments / report history / chats are bundled into a JSON file with a download link sent to your email. The link expires after 30 days.\r\n\r\n**Q. Can anyone see who wrote an anonymous post?**\r\nA. Regular users see only the anonymous number. Admins can reveal identity for moderation вҖ” every lookup is logged in `admin_logs`.\r\n\r\n## Contact\r\n\r\nUse the in-app Feedback / Bug report menu вҖ” admins will see it. For anything urgent, go through the school's official channel.\r\n\r\n## Related Docs\r\n- [Public Features](https://monkshark.github.io/hansol_hs_flutter_app/#features/public-features_en.md)\r\n- [Community Features](https://monkshark.github.io/hansol_hs_flutter_app/#features/community-features_en.md)\r\n- [Personal Features](https://monkshark.github.io/hansol_hs_flutter_app/#features/personal-features_en.md)\r\n- [Account & Access](https://monkshark.github.io/hansol_hs_flutter_app/#guides/account-and-access_en.md)\r\n"};

    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="' + backLabel + '">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="' + fwdLabel + '">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'' + rootPath + '\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong></div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    // Add id to headings so same-page #anchor links work (marked v12+ omits ids).
    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6').forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
    });

    // Rewrite .md links to in-viewer navigation.
    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || href.indexOf('http') === 0) return;
      var hashOnly = href.charAt(0) === '#';
      if(hashOnly){
        a.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          var id = decodeURIComponent(href.substring(1));
          var target = document.getElementById(id);
          if(target){ target.scrollIntoView({behavior:'smooth',block:'start'}); }
        });
        return;
      }
      // Strip any query/hash for resolution but keep for re-attach (rare).
      var hashPart = '';
      var hashIdx = href.indexOf('#');
      if(hashIdx !== -1){ hashPart = href.substring(hashIdx); href = href.substring(0, hashIdx); }
      if(!href.endsWith('.md')) return;

      // Normalize ./ prefix before joining
      if(href.indexOf('./') === 0) href = href.substring(2);

      var resolved;
      if(href.indexOf('../') === 0){
        var parts = dir ? dir.split('/') : [];
        var h = href;
        while(h.indexOf('../') === 0){ parts.pop(); h = h.substring(3); }
        resolved = (parts.length ? parts.join('/') + '/' : '') + h;
      } else if(href.indexOf('/') === 0){
        resolved = href.substring(1);
      } else {
        resolved = dir ? dir + '/' + href : href;
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved); };
      } else {
        // Intercept anyway to avoid the browser navigating to a 404 relative URL
        a.onclick = function(e){ e.preventDefault(); console.warn('Doc not found in viewer:', resolved); };
      }
    });

    // Render mermaid diagrams in the newly inserted content.
    // Cache original source so we can re-render on theme switch (mermaid replaces innerHTML with SVG).
    try {
      if(globalThis.mermaid){
        var nodes = inner.querySelectorAll('pre.mermaid');
        nodes.forEach(function(n){ if(!n.dataset.mermaidSrc) n.dataset.mermaidSrc = n.textContent; });
        if(nodes.length) mermaid.run({nodes:nodes});
      }
    } catch(e){ console.warn('Mermaid run failed:', e); }

    // Rewrite <img> src so repo-relative paths (e.g. "../../screenshots/x.png")
    // resolve correctly inside the viewer. Inside docs/ вҶ’ Pages-relative;
    // outside docs/ вҶ’ raw.githubusercontent.com URL.
    inner.querySelectorAll('.md img[src]').forEach(function(img){
      var src = img.getAttribute('src');
      if(!src) return;
      if(/^(https?:)?\/\//.test(src) || src.indexOf('data:') === 0) return;
      if(src.indexOf('./') === 0) src = src.substring(2);
      var baseParts = ['docs'];
      if(dir) baseParts = baseParts.concat(dir.split('/'));
      var s = src;
      if(s.indexOf('/') === 0){
        baseParts = ['docs'];
        s = s.substring(1);
      } else {
        while(s.indexOf('../') === 0){ baseParts.pop(); s = s.substring(3); }
      }
      var resolved = baseParts.concat(s ? [s] : []).join('/');
      if(resolved.indexOf('docs/') === 0){
        img.setAttribute('src', resolved.substring(5));
      } else {
        img.setAttribute('src', 'https://raw.githubusercontent.com/Monkshark/hansol_hs_flutter_app/master/' + resolved);
      }
    });

    // Decorate code blocks: language badge + copy button
    inner.querySelectorAll('.md pre').forEach(function(pre){
      if(pre.classList.contains('mermaid')) return;
      var code = pre.querySelector('code');
      if(!code) return;
      var lang = '';
      (code.className || '').split(/\s+/).forEach(function(c){
        if(c.indexOf('language-') === 0) lang = c.substring(9);
      });
      if(lang){
        var badge = document.createElement('span');
        badge.className = 'code-lang';
        badge.textContent = lang;
        pre.appendChild(badge);
      }
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.onclick = function(){
        var text = code.textContent || '';
        var done = function(){
          btn.textContent = 'Copied';
          btn.classList.add('ok');
          setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1200);
        };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(done).catch(function(){});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch(e){}
          document.body.removeChild(ta);
        }
      };
      pre.appendChild(btn);
    });

    document.getElementById('content').scrollTop = 0;
    closeSidebar();
    if(!opts.fromPopState){
      window.history.pushState({path:p}, '', '#' + p);
    }
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._loadFile = function(p){ loadFile(p); };

  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var p = (e.state && e.state.path) || location.hash.slice(1) || initialDefaultPath();
    if(MD_DATA[p]){
      navigating = true;
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, {fromPopState:true});
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  // ---- Language button wiring ----
  document.getElementById('langKo').addEventListener('click', function(){ if(getLang()!=='ko') applyLang('ko'); });
  document.getElementById('langEn').addEventListener('click', function(){ if(getLang()!=='en') applyLang('en'); });

  // ---- Theme toggle ----
  var THEME_KEY = 'docsViewerTheme';
  function getTheme(){ return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
  function setThemeStored(t){ localStorage.setItem(THEME_KEY, t === 'light' ? 'light' : 'dark'); }
  function swapHljsStylesheet(theme){
    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (theme === 'light' ? 'light' : 'dark') + '.min.css';
  }
  function reInitMermaidAndRerender(theme){
    if(!globalThis.mermaid) return;
    try {
      mermaid.initialize({startOnLoad:false, theme: theme === 'light' ? 'default' : 'dark', securityLevel:'loose'});
    } catch(e){ console.warn('Mermaid re-init failed:', e); }
    var inner = document.getElementById('contentInner');
    if(!inner) return;
    var nodes = inner.querySelectorAll('pre.mermaid');
    nodes.forEach(function(n){
      if(n.dataset.mermaidSrc){
        n.removeAttribute('data-processed');
        n.innerHTML = n.dataset.mermaidSrc;
      }
    });
    try {
      if(nodes.length) mermaid.run({nodes: nodes});
    } catch(e){ console.warn('Mermaid re-run failed:', e); }
  }
  function applyTheme(theme, opts){
    opts = opts || {};
    theme = (theme === 'light') ? 'light' : 'dark';
    setThemeStored(theme);
    document.documentElement.setAttribute('data-theme', theme);
    swapHljsStylesheet(theme);
    if(!opts.skipMermaid) reInitMermaidAndRerender(theme);
  }
  document.getElementById('themeToggle').addEventListener('click', function(){
    applyTheme(getTheme() === 'light' ? 'dark' : 'light');
  });

  function initialDefaultPath(){
    return (getLang() === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README.md';
  }

  // ---- Bootstrap ----
  var initialLang = getLang();
  applyLang(initialLang, {skipContentSwap:true});

  var hash = location.hash.slice(1);
  if(hash && MD_DATA[hash]){
    // If URL hash points to a language different from the preference, honor the URL.
    var info = PATH_INDEX[hash];
    if(info && info.lang !== initialLang){
      // Adjust lang to match URL without re-navigating.
      setLang(info.lang);
      document.getElementById('langKo').classList.toggle('active', info.lang === 'ko');
      document.getElementById('langEn').classList.toggle('active', info.lang === 'en');
      document.getElementById('search').placeholder = (info.lang === 'en') ? 'Search... (Ctrl+K)' : 'кІҖмғү... (Ctrl+K)';
      document.getElementById('sidebarTitle').textContent = (info.lang === 'en') ? 'Hansol HS App Docs' : 'н•ңмҶ”кі  м•ұ Docs';
      renderNav(info.lang);
    }
    loadFile(hash);
  } else {
    loadFile(initialDefaultPath());
  }
})();
</script>
</body>
