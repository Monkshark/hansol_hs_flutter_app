<script>
const MD_DATA = {"api/meal_data_api.md":"# MealDataApi\r\n\r\n> `lib/api/meal_data_api.dart` — NEIS 급식 API 연동\r\n\r\n모든 메서드가 `static`. NEIS 교육정보 API에서 급식 데이터를 조회하고, SharedPreferences에 캐싱함.\r\nHTTP 클라이언트는 `@visibleForTesting` setter로 교체 가능하여 MockClient 기반 단위 테스트를 지원함\r\n\r\n---\r\n\r\n## 상수\r\n\r\n| 상수 | 값 | 설명 |\r\n|------|----|------|\r\n| `BREAKFAST` | 1 | 조식 코드 |\r\n| `LUNCH` | 2 | 중식 코드 |\r\n| `DINNER` | 3 | 석식 코드 |\r\n\r\n---\r\n\r\n## `getMeal`\r\n\r\n```dart\r\nstatic Future<Meal?> getMeal({\r\n  required DateTime date,\r\n  required int mealType,\r\n  required String type,\r\n})\r\n```\r\n\r\n**설명**: 특정 날짜·식사 유형의 급식 데이터를 반환함\r\n\r\n**흐름**:\r\n\r\n1. 캐시 키를 생성함:\r\n   ```dart\r\n   final cacheKey = _cacheKey(date, mealType);\r\n   // → \"meal_20260410_2\" 형태\r\n   ```\r\n\r\n2. SharedPreferences에서 캐시를 조회. 유효한 데이터면 즉시 반환:\r\n   ```dart\r\n   final cached = _getFromCache(prefs, cacheKey);\r\n   if (cached != null && cached.meal != null && cached.meal != '급식 정보가 없습니다.') {\r\n     return cached;\r\n   }\r\n   ```\r\n\r\n3. 오프라인이면 캐시 데이터 또는 안내 메시지 반환:\r\n   ```dart\r\n   if (await NetworkStatus.isUnconnected()) {\r\n     if (cached != null) return cached;\r\n     return Meal(meal: \"식단 정보를 확인하려면 인터넷에 연결하세요\", ...);\r\n   }\r\n   ```\r\n\r\n4. 월간 프리페치를 시도해 해당 월 전체 급식을 한 번에 캐싱:\r\n   ```dart\r\n   await _prefetchMonth(date);\r\n   ```\r\n\r\n5. 프리페치 후 캐시 재확인. 있으면 반환, 없으면 개별 요청:\r\n   ```dart\r\n   final afterPrefetch = _getFromCache(prefs, cacheKey);\r\n   if (afterPrefetch != null) return afterPrefetch;\r\n   return _fetchSingleMeal(date, mealType, prefs, cacheKey);\r\n   ```\r\n\r\n**반환값**: `Meal?` — 급식 데이터. 없으면 `meal: '급식 정보가 없습니다.'`\r\n\r\n---\r\n\r\n## `_fetchSingleMeal`\r\n\r\n```dart\r\nstatic Future<Meal> _fetchSingleMeal(\r\n  DateTime date, int mealType, SharedPreferences prefs, String cacheKey)\r\n```\r\n\r\n**설명**: 단일 날짜·식사의 급식을 NEIS API로 직접 요청함\r\n\r\n1. NEIS API URL을 구성:\r\n   ```dart\r\n   final requestURL = 'https://open.neis.go.kr/hub/mealServiceDietInfo?...'\r\n       '&MMEAL_SC_CODE=$mealType'\r\n       '&MLSV_YMD=$formattedDate';\r\n   ```\r\n\r\n2. `_fetchData`로 HTTP GET 요청:\r\n   ```dart\r\n   final data = await _fetchData(requestURL);\r\n   ```\r\n\r\n3. 응답의 `mealServiceDietInfo > row`를 파싱:\r\n   ```dart\r\n   meal: (row['DDISH_NM'] as String).replaceAll('<br/>', '\\n'),\r\n   kcal: row['CAL_INFO'] as String,\r\n   ntrInfo: (row['NTR_INFO'] as String?)?.replaceAll('<br/>', '\\n') ?? '',\r\n   ```\r\n   `<br/>` 태그를 줄바꿈으로 치환\r\n\r\n4. 결과를 캐시에 저장 후 반환. 데이터 없으면 '급식 정보가 없습니다.' 반환\r\n\r\n---\r\n\r\n## `_prefetchMonth`\r\n\r\n```dart\r\nstatic Future<void> _prefetchMonth(DateTime date)\r\n```\r\n\r\n**설명**: 해당 월의 전체 급식을 한 번의 API 호출로 프리페치함\r\n\r\n1. 같은 월이 이미 프리페치 중이면 그 Future를 대기:\r\n   ```dart\r\n   if (_prefetchingMonths.containsKey(monthKey)) {\r\n     await _prefetchingMonths[monthKey];\r\n     return;\r\n   }\r\n   ```\r\n   `Completer`로 중복 요청 방지\r\n\r\n2. 월의 첫날~마지막날 범위로 API 호출:\r\n   ```dart\r\n   '&MLSV_FROM_YMD=$fromDate'\r\n   '&MLSV_TO_YMD=$toDate'\r\n   '&pSize=100'\r\n   ```\r\n\r\n3. 응답의 모든 row를 개별 캐시 키로 저장:\r\n   ```dart\r\n   final key = _cacheKey(mealDate, mealCode);\r\n   _saveToCache(prefs, key, meal);\r\n   ```\r\n\r\n4. `finally`에서 `_prefetchingMonths` 맵에서 제거\r\n\r\n---\r\n\r\n## `prefetchWeek`\r\n\r\n```dart\r\nstatic Future<void> prefetchWeek(DateTime baseDate)\r\n```\r\n\r\n**설명**: 주간 뷰 진입 시 해당 주의 급식을 프리페치함\r\n\r\n- 월~금이 같은 달이면 `_prefetchMonth` 1회\r\n- 달이 걸치면 2개월 병렬 프리페치:\r\n  ```dart\r\n  await Future.wait([_prefetchMonth(monday), _prefetchMonth(friday)]);\r\n  ```\r\n\r\n---\r\n\r\n## `_getFromCache`\r\n\r\n```dart\r\nstatic Meal? _getFromCache(SharedPreferences prefs, String key)\r\n```\r\n\r\n**설명**: 캐시에서 급식 데이터를 읽되, 만료된 데이터는 null 반환함\r\n\r\n**캐시 전략 (차등 TTL)**:\r\n- 정상 급식 데이터 → **24시간** 캐시\r\n- '급식 정보가 없습니다.' → **5분** 캐시 (곧 등록될 수 있으므로)\r\n\r\n```dart\r\nif (meal.meal == '급식 정보가 없습니다.') {\r\n  if (age > 5 * 60 * 1000) return null;   // 5분 후 만료\r\n} else {\r\n  if (age > 24 * 60 * 60 * 1000) return null;  // 24시간 후 만료\r\n}\r\n```\r\n\r\n---\r\n\r\n## `_saveToCache`\r\n\r\n```dart\r\nstatic void _saveToCache(SharedPreferences prefs, String key, Meal meal)\r\n```\r\n\r\n[Meal](../data/meal.md) JSON + 타임스탬프를 SharedPreferences에 저장\r\n\r\n---\r\n\r\n## `clearCacheForDate`\r\n\r\n```dart\r\nstatic Future<void> clearCacheForDate(DateTime date)\r\n```\r\n\r\n특정 날짜의 조식/중식/석식 캐시를 모두 삭제함\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\n**설명**: `_client`를 통해 HTTP GET 요청을 수행함\r\n\r\n- **타임아웃**: 10초\r\n- NEIS `INFO-200` (데이터 없음) 응답은 정상 반환 (빈 데이터)\r\n- 에러/타임아웃 시 `NetworkException` throw (호출측에서 캐시 fallback 처리)\r\n\r\n---\r\n\r\n## 테스트 지원\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n\r\n@visibleForTesting\r\nstatic Future<void> resetCache() async { ... }\r\n```\r\n\r\n- `client` setter로 `MockClient` 주입 → 네트워크 없이 파싱·캐시·SWR 로직 테스트\r\n- `resetCache()`로 `_prefetchingMonths` + SharedPreferences 초기화\r\n\r\n---\r\n\r\n## `isAllMealEmpty`\r\n\r\n```dart\r\nstatic Future<bool> isAllMealEmpty(DateTime date)\r\n```\r\n\r\n**설명**: 특정 날짜에 급식이 하나도 없는지 확인함\r\nNEIS `INFO-200` 응답이면 `true` (급식 없음)\r\n홈 위젯에서 \"급식 없음\" 표시 여부 판단에 사용\r\n","api/meal_data_api_en.md":"# MealDataApi\n\n> 한국어: [meal_data_api.md](./meal_data_api.md)\n>\n> `lib/api/meal_data_api.dart` — NEIS meal API integration\n\nAll methods are `static`. Queries meal data from the NEIS education information API and caches it in SharedPreferences.\nThe HTTP client can be replaced through a `@visibleForTesting` setter, enabling MockClient-based unit tests.\n\n---\n\n## Constants\n\n| Constant | Value | Description |\n|------|----|------|\n| `BREAKFAST` | 1 | Breakfast code |\n| `LUNCH` | 2 | Lunch code |\n| `DINNER` | 3 | Dinner code |\n\n---\n\n## `getMeal`\n\n```dart\nstatic Future<Meal?> getMeal({\n  required DateTime date,\n  required int mealType,\n  required String type,\n})\n```\n\n**Description**: Returns the meal data for a specific date and meal type.\n\n**Flow**:\n\n1. Build the cache key:\n   ```dart\n   final cacheKey = _cacheKey(date, mealType);\n   // → \"meal_20260410_2\" 형태\n   ```\n\n2. Look up SharedPreferences. Return immediately if valid:\n   ```dart\n   final cached = _getFromCache(prefs, cacheKey);\n   if (cached != null && cached.meal != null && cached.meal != '급식 정보가 없습니다.') {\n     return cached;\n   }\n   ```\n\n3. If offline, return cached data or a guidance message:\n   ```dart\n   if (await NetworkStatus.isUnconnected()) {\n     if (cached != null) return cached;\n     return Meal(meal: \"식단 정보를 확인하려면 인터넷에 연결하세요\", ...);\n   }\n   ```\n\n4. Attempt a monthly prefetch to cache the entire month's meals in one go:\n   ```dart\n   await _prefetchMonth(date);\n   ```\n\n5. Re-check the cache after prefetching. Return it if present; otherwise, fetch individually:\n   ```dart\n   final afterPrefetch = _getFromCache(prefs, cacheKey);\n   if (afterPrefetch != null) return afterPrefetch;\n   return _fetchSingleMeal(date, mealType, prefs, cacheKey);\n   ```\n\n**Return value**: `Meal?` — meal data. When absent, `meal: '급식 정보가 없습니다.'`\n\n---\n\n## `_fetchSingleMeal`\n\n```dart\nstatic Future<Meal> _fetchSingleMeal(\n  DateTime date, int mealType, SharedPreferences prefs, String cacheKey)\n```\n\n**Description**: Directly requests a single day's meal via the NEIS API.\n\n1. Build the NEIS API URL:\n   ```dart\n   final requestURL = 'https://open.neis.go.kr/hub/mealServiceDietInfo?...'\n       '&MMEAL_SC_CODE=$mealType'\n       '&MLSV_YMD=$formattedDate';\n   ```\n\n2. HTTP GET request via `_fetchData`:\n   ```dart\n   final data = await _fetchData(requestURL);\n   ```\n\n3. Parse `mealServiceDietInfo > row` from the response:\n   ```dart\n   meal: (row['DDISH_NM'] as String).replaceAll('<br/>', '\\n'),\n   kcal: row['CAL_INFO'] as String,\n   ntrInfo: (row['NTR_INFO'] as String?)?.replaceAll('<br/>', '\\n') ?? '',\n   ```\n   `<br/>` tags are replaced with newlines.\n\n4. Save the result to cache and return. If no data is found, returns '급식 정보가 없습니다.'\n\n---\n\n## `_prefetchMonth`\n\n```dart\nstatic Future<void> _prefetchMonth(DateTime date)\n```\n\n**Description**: Prefetches the entire month's meals in a single API call.\n\n1. If the same month is already being prefetched, await that Future:\n   ```dart\n   if (_prefetchingMonths.containsKey(monthKey)) {\n     await _prefetchingMonths[monthKey];\n     return;\n   }\n   ```\n   Uses a `Completer` to prevent duplicate requests.\n\n2. Call the API with the first to last day of the month:\n   ```dart\n   '&MLSV_FROM_YMD=$fromDate'\n   '&MLSV_TO_YMD=$toDate'\n   '&pSize=100'\n   ```\n\n3. Save every row in the response under its individual cache key:\n   ```dart\n   final key = _cacheKey(mealDate, mealCode);\n   _saveToCache(prefs, key, meal);\n   ```\n\n4. Remove from the `_prefetchingMonths` map in `finally`.\n\n---\n\n## `prefetchWeek`\n\n```dart\nstatic Future<void> prefetchWeek(DateTime baseDate)\n```\n\n**Description**: Prefetches the meals for the current week when the weekly view is opened.\n\n- One `_prefetchMonth` call if Monday–Friday share the same month\n- Two parallel prefetches if the week crosses months:\n  ```dart\n  await Future.wait([_prefetchMonth(monday), _prefetchMonth(friday)]);\n  ```\n\n---\n\n## `_getFromCache`\n\n```dart\nstatic Meal? _getFromCache(SharedPreferences prefs, String key)\n```\n\n**Description**: Reads meal data from the cache, returning null if expired.\n\n**Caching strategy (tiered TTL)**:\n- Normal meal data → **24 hours** cached\n- '급식 정보가 없습니다.' → cached for **5 minutes** (since data may be registered shortly)\n\n```dart\nif (meal.meal == '급식 정보가 없습니다.') {\n  if (age > 5 * 60 * 1000) return null;   // 5분 후 만료\n} else {\n  if (age > 24 * 60 * 60 * 1000) return null;  // 24시간 후 만료\n}\n```\n\n---\n\n## `_saveToCache`\n\n```dart\nstatic void _saveToCache(SharedPreferences prefs, String key, Meal meal)\n```\n\nSaves [Meal](../data/meal.md) JSON + timestamp into SharedPreferences.\n\n---\n\n## `clearCacheForDate`\n\n```dart\nstatic Future<void> clearCacheForDate(DateTime date)\n```\n\nClears breakfast/lunch/dinner caches for a specific date.\n\n---\n\n## `_fetchData`\n\n```dart\nstatic Future<Map<String, dynamic>?> _fetchData(String url)\n```\n\n**Description**: Performs an HTTP GET request through `_client`.\n\n- **Timeout**: 10 seconds\n- NEIS `INFO-200` (no data) responses are returned normally (empty data)\n- Throws `NetworkException` on error/timeout (caller handles cache fallback)\n\n---\n\n## Testing Support\n\n```dart\nstatic http.Client _client = http.Client();\n\n@visibleForTesting\nstatic set client(http.Client c) => _client = c;\n\n@visibleForTesting\nstatic Future<void> resetCache() async { ... }\n```\n\n- Inject `MockClient` via the `client` setter → test parsing/cache/SWR logic without the network\n- `resetCache()` resets `_prefetchingMonths` + SharedPreferences\n\n---\n\n## `isAllMealEmpty`\n\n```dart\nstatic Future<bool> isAllMealEmpty(DateTime date)\n```\n\n**Description**: Checks whether any meal exists for a given date.\nReturns `true` on a NEIS `INFO-200` response (no meals).\nUsed by the home widget to decide whether to display \"No meals\".\n","api/notice_data_api.md":"# NoticeDataApi\r\n\r\n> `lib/api/notice_data_api.dart` — NEIS 학사일정 API 연동\r\n\r\n인스턴스 메서드 (singleton이 아님). NEIS 학사일정 API에서 학교 일정을 조회함.\r\nHTTP 클라이언트는 `@visibleForTesting` static setter로 교체 가능하여 MockClient 기반 단위 테스트를 지원함\r\n\r\n---\r\n\r\n## `getNotice`\r\n\r\n```dart\r\nFuture<String?> getNotice({required DateTime date})\r\n```\r\n\r\n**설명**: 특정 날짜의 학사일정 이름을 반환함\r\n\r\n1. 캐시 확인 (12시간 TTL):\r\n   ```dart\r\n   final cacheKey = 'notice_$formattedDate';\r\n   // 12시간 이내면 캐시 반환\r\n   ```\r\n\r\n2. 오프라인이면 안내 메시지 반환\r\n\r\n3. NEIS `SchoolSchedule` 엔드포인트 호출 (`AA_YMD` 파라미터)\r\n\r\n4. `_processSchoolSchedule`로 일정명 추출:\r\n   ```dart\r\n   if (row['EVENT_NM'] == '토요휴업일') return null;\r\n   return row['EVENT_NM'];\r\n   ```\r\n   '토요휴업일'은 의미 없으므로 null 반환\r\n\r\n**반환값**: 일정명 문자열 또는 '학사일정이 없습니다'\r\n\r\n---\r\n\r\n## `getUpcomingEvent`\r\n\r\n```dart\r\nFuture<UpcomingEvent?> getUpcomingEvent()\r\n```\r\n\r\n**설명**: 가장 가까운 미래 학사 이벤트를 반환함\r\n\r\n1. 캐시 확인 (6시간 TTL). D-day가 0 이상인지 재계산:\r\n   ```dart\r\n   final dDay = eventDate.difference(DateTime(now.year, now.month, now.day)).inDays;\r\n   if (dDay >= 0) return cached;\r\n   ```\r\n\r\n2. 내일부터 90일 범위로 NEIS API 호출:\r\n   ```dart\r\n   final tomorrow = now.add(const Duration(days: 1));\r\n   final endDate = now.add(const Duration(days: 90));\r\n   ```\r\n\r\n3. '토요휴업일' 제외, D-day > 0인 이벤트만 수집\r\n\r\n4. D-day 기준 정렬 → 가장 가까운 이벤트 반환 + 캐시 저장\r\n\r\n**반환값**: `UpcomingEvent?` — `name`, `date`, `dDay` 포함\r\n\r\n---\r\n\r\n## `getEventsInRange`\r\n\r\n```dart\r\nFuture<List<UpcomingEvent>> getEventsInRange({int days = 30})\r\n```\r\n\r\n**설명**: 오늘부터 `days`일 범위 내 모든 학사 이벤트를 반환함\r\n\r\n캐시 없이 매번 API 호출. D-day 기준 정렬된 리스트 반환\r\nD-day 화면에서 \"일정에서 D-day 추가\" 기능에 사용\r\n\r\n---\r\n\r\n## `getMonthEvents`\r\n\r\n```dart\r\nFuture<Map<DateTime, String>> getMonthEvents(DateTime month)\r\n```\r\n\r\n**설명**: 월별 학사일정 맵을 반환함 (캘린더 마커용)\r\n\r\n1. 캐시 확인 (12시간 TTL, `month_events_v2_` 키):\r\n   ```dart\r\n   final cacheKey = 'month_events_v2_$monthKey';\r\n   ```\r\n\r\n2. 월의 첫날~마지막날 범위로 API 호출\r\n\r\n3. `{ DateTime: \"일정명\" }` 맵 구성, '토요휴업일' 제외\r\n\r\n4. 캐시 저장 (DateTime을 ISO string 키로 변환)\r\n\r\n**반환값**: `Map<DateTime, String>` — 날짜별 일정명\r\n\r\n---\r\n\r\n## `_processSchoolSchedule`\r\n\r\n```dart\r\nString? _processSchoolSchedule(List<dynamic> schoolScheduleArray)\r\n```\r\n\r\nNEIS 응답의 `SchoolSchedule` 배열에서 첫 번째 `EVENT_NM`을 추출. '토요휴업일'이면 null\r\n\r\n---\r\n\r\n## `_fetchData`\r\n\r\n```dart\r\nFuture<Map<String, dynamic>?> _fetchData(String url)\r\n```\r\n\r\n`_client`를 통해 HTTP GET 요청. 10초 타임아웃, 에러 시 `NetworkException` throw\r\n\r\n---\r\n\r\n## 테스트 지원\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n```\r\n\r\n`client` setter로 `MockClient` 주입 → 네트워크 없이 파싱·캐시·이벤트 정렬 로직 테스트\r\n\r\n---\r\n\r\n## UpcomingEvent (데이터 클래스)\r\n\r\n```dart\r\nclass UpcomingEvent {\r\n  final String name;\r\n  final DateTime date;\r\n  final int dDay;\r\n}\r\n```\r\n\r\n다가오는 학사 이벤트를 나타내는 모델\r\n","api/notice_data_api_en.md":"# NoticeDataApi\n\n> 한국어: [notice_data_api.md](./notice_data_api.md)\n>\n> `lib/api/notice_data_api.dart` — NEIS school schedule API integration\n\nInstance methods (not a singleton). Queries school schedules from the NEIS school schedule API.\nThe HTTP client can be replaced through a `@visibleForTesting` static setter, enabling MockClient-based unit tests.\n\n---\n\n## `getNotice`\n\n```dart\nFuture<String?> getNotice({required DateTime date})\n```\n\n**Description**: Returns the school schedule event name for a specific date.\n\n1. Cache check (12-hour TTL):\n   ```dart\n   final cacheKey = 'notice_$formattedDate';\n   // 12시간 이내면 캐시 반환\n   ```\n\n2. If offline, returns a guidance message\n\n3. Calls the NEIS `SchoolSchedule` endpoint (`AA_YMD` parameter)\n\n4. Extracts the event name via `_processSchoolSchedule`:\n   ```dart\n   if (row['EVENT_NM'] == '토요휴업일') return null;\n   return row['EVENT_NM'];\n   ```\n   '토요휴업일' (Saturday holiday) is meaningless, so null is returned.\n\n**Return value**: The event name string, or '학사일정이 없습니다'\n\n---\n\n## `getUpcomingEvent`\n\n```dart\nFuture<UpcomingEvent?> getUpcomingEvent()\n```\n\n**Description**: Returns the nearest future school event.\n\n1. Cache check (6-hour TTL). Recomputes whether D-day is ≥ 0:\n   ```dart\n   final dDay = eventDate.difference(DateTime(now.year, now.month, now.day)).inDays;\n   if (dDay >= 0) return cached;\n   ```\n\n2. Calls the NEIS API for a 90-day range starting tomorrow:\n   ```dart\n   final tomorrow = now.add(const Duration(days: 1));\n   final endDate = now.add(const Duration(days: 90));\n   ```\n\n3. Excludes '토요휴업일' and collects only events with D-day > 0.\n\n4. Sorts by D-day → returns the closest event and caches it.\n\n**Return value**: `UpcomingEvent?` — includes `name`, `date`, and `dDay`.\n\n---\n\n## `getEventsInRange`\n\n```dart\nFuture<List<UpcomingEvent>> getEventsInRange({int days = 30})\n```\n\n**Description**: Returns all school events within `days` days from today.\n\nCalls the API every time without caching. Returns a list sorted by D-day.\nUsed by the \"Add D-day from schedule\" feature on the D-day screen.\n\n---\n\n## `getMonthEvents`\n\n```dart\nFuture<Map<DateTime, String>> getMonthEvents(DateTime month)\n```\n\n**Description**: Returns a monthly school-event map (for calendar markers).\n\n1. Cache check (12-hour TTL, `month_events_v2_` key):\n   ```dart\n   final cacheKey = 'month_events_v2_$monthKey';\n   ```\n\n2. Calls the API from the first to the last day of the month.\n\n3. Builds a `{ DateTime: \"일정명\" }` map, excluding '토요휴업일'.\n\n4. Stores to cache (DateTime converted to an ISO string key).\n\n**Return value**: `Map<DateTime, String>` — event name keyed by date.\n\n---\n\n## `_processSchoolSchedule`\n\n```dart\nString? _processSchoolSchedule(List<dynamic> schoolScheduleArray)\n```\n\nExtracts the first `EVENT_NM` from the `SchoolSchedule` array in the NEIS response. Returns null if it is '토요휴업일'.\n\n---\n\n## `_fetchData`\n\n```dart\nFuture<Map<String, dynamic>?> _fetchData(String url)\n```\n\nPerforms an HTTP GET request through `_client`. 10-second timeout; throws `NetworkException` on error.\n\n---\n\n## Testing Support\n\n```dart\nstatic http.Client _client = http.Client();\n\n@visibleForTesting\nstatic set client(http.Client c) => _client = c;\n```\n\nInject `MockClient` via the `client` setter → test parsing / caching / event-sort logic without the network.\n\n---\n\n## UpcomingEvent (data class)\n\n```dart\nclass UpcomingEvent {\n  final String name;\n  final DateTime date;\n  final int dDay;\n}\n```\n\nA model representing an upcoming school event.\n","api/timetable_data_api.md":"# TimetableDataApi\r\n\r\n> `lib/api/timetable_data_api.dart` — NEIS 시간표 API 연동\r\n\r\n모든 메서드가 `static`. 시간표 데이터 조회, 과목 조합 추출, 캐싱을 담당함.\r\nHTTP 클라이언트는 `@visibleForTesting` setter로 교체 가능하여 MockClient 기반 단위 테스트를 지원함\r\n\r\n---\r\n\r\n## `getTimeTable`\r\n\r\n```dart\r\nstatic Future<Map<String, Map<String, List<String>>>> getTimeTable({\r\n  required DateTime startDate,\r\n  required DateTime endDate,\r\n  required String grade,\r\n  String? classNum,\r\n})\r\n```\r\n\r\n**설명**: 학년/반별 시간표를 날짜 범위로 조회함\r\n\r\n**반환 구조**: `{ \"20260410\": { \"3\": [\"국어\",\"수학\",\"영어\",...] } }` — 날짜 → 반 → 교시별 과목 리스트\r\n\r\n1. 캐시 확인 (12시간 TTL):\r\n   ```dart\r\n   final cacheKey = '$formattedStartDate-$formattedEndDate-$grade${classNum != null ? '-$classNum' : ''}';\r\n   ```\r\n\r\n2. 오프라인이면 에러 맵 반환:\r\n   ```dart\r\n   return {\"error\": {\"error\": [\"시간표를 확인하려면 인터넷에 연결하세요\"]}};\r\n   ```\r\n\r\n3. NEIS `hisTimetable` 엔드포인트 호출 (`pSize=1000`):\r\n   ```dart\r\n   '&GRADE=$grade'\r\n   '${classNum != null ? '&CLASS_NM=$classNum' : ''}'\r\n   ```\r\n\r\n4. `_processTimetable`로 응답 파싱 후 캐시에 저장\r\n\r\n---\r\n\r\n## `_processTimetable`\r\n\r\n```dart\r\nstatic Map<String, Map<String, List<String>>> _processTimetable(\r\n    List<dynamic> timetableArray)\r\n```\r\n\r\n**설명**: NEIS API 응답을 `{ 날짜 → 반 → 과목리스트 }` 구조로 변환함\r\n\r\n핵심 로직 — **PERIO 기반 교시 배치**:\r\n```dart\r\nfinal perio = int.tryParse(item['PERIO']?.toString() ?? '');\r\nwhile (classList.length < perio) {\r\n  classList.add('');  // 빈 교시 채우기\r\n}\r\nclassList[perio - 1] = content;  // 1-based → 0-based\r\n```\r\n\r\n반 번호가 없는 경우 `'special'`로 처리 (특별실 과목)\r\n\r\n---\r\n\r\n## `_getWeekTimetableWithFallback`\r\n\r\n```dart\r\nstatic Future<Map<String, Map<String, List<String>>>> _getWeekTimetableWithFallback(\r\n    String grade)\r\n```\r\n\r\n**설명**: 이번 주 → 다음 주 → 지난 주 순으로 시간표를 시도함\r\n\r\n방학 등 데이터가 없는 주를 대비한 폴백:\r\n```dart\r\nvar timetable = await getTimeTable(startDate: thisMonday, ...);\r\nif (_hasData(timetable)) return timetable;\r\n\r\n// 이번 주 없으면 다음 주 시도\r\nfinal nextMonday = thisMonday.add(const Duration(days: 7));\r\ntimetable = await getTimeTable(startDate: nextMonday, ...);\r\nif (_hasData(timetable)) return timetable;\r\n\r\n// 다음 주도 없으면 지난 주 시도\r\nfinal prevMonday = thisMonday.subtract(const Duration(days: 7));\r\nreturn await getTimeTable(startDate: prevMonday, ...);\r\n```\r\n\r\n---\r\n\r\n## `getSubjects`\r\n\r\n```dart\r\nstatic Future<List<String>?> getSubjects({required int grade})\r\n```\r\n\r\n**설명**: 학년별 과목명 리스트를 추출함\r\n\r\n`_getWeekTimetableWithFallback`로 시간표를 가져온 뒤, 모든 과목명을 `Set`으로 수집\r\n`[보강]`, `토요휴업일` 제외. 1주일 캐시\r\n\r\n---\r\n\r\n## `getAllSubjectCombinations`\r\n\r\n```dart\r\nstatic Future<List<Subject>> getAllSubjectCombinations({\r\n  required int grade,\r\n  int maxRetries = 3,\r\n})\r\n```\r\n\r\n**설명**: 학년의 모든 반에서 가르치는 과목 + 반 번호 조합을 추출함\r\n\r\n시간표 선택 화면에서 \"어떤 반에서 어떤 과목을 가르치는지\" 파악에 사용\r\n\r\n1. 로컬 캐시 확인 (1주일 TTL):\r\n   ```dart\r\n   final cachedSubjects = await _loadCachedSubjects(grade);\r\n   if (cachedSubjects != null && cachedSubjects.isNotEmpty) return cachedSubjects;\r\n   ```\r\n\r\n2. 최대 3회 재시도로 `_getWeekTimetableWithFallback` 호출:\r\n   ```dart\r\n   for (int attempt = 1; attempt <= maxRetries; attempt++) { ... }\r\n   ```\r\n\r\n3. `Subject(subjectName, subjectClass)` 쌍을 Set으로 수집:\r\n   ```dart\r\n   subjectSet.add(Subject(\r\n     subjectName: subjectName,\r\n     subjectClass: classInt,  // -1이면 특별실\r\n   ));\r\n   ```\r\n\r\n4. 이름순 정렬 후 캐시 저장\r\n\r\n**재시도**: 실패 시 `2 * attempt`초 대기 후 재시도\r\n\r\n---\r\n\r\n## `getCustomTimeTable`\r\n\r\n```dart\r\nstatic Future<List<List<String?>>> getCustomTimeTable({\r\n  required List<Subject> userSubjects,\r\n  required String grade,\r\n})\r\n```\r\n\r\n**설명**: 사용자가 선택한 과목으로 커스텀 시간표를 생성함\r\n\r\n**반환**: `List<List<String?>>` — 인덱스 1~5가 월~금, 각 리스트의 인덱스 1~7이 1~7교시\r\n\r\n1. 전체 학년 시간표를 조회 (반 지정 없이):\r\n   ```dart\r\n   final timetable = await getTimeTable(..., classNum: null);\r\n   ```\r\n\r\n2. 사용자 선택 과목을 반 번호로 그룹화:\r\n   ```dart\r\n   final classToSubjects = <int, List<Subject>>{};\r\n   ```\r\n\r\n3. 각 반의 시간표에서 선택 과목이 매칭되는 교시를 추출:\r\n   ```dart\r\n   if (subjectsList[i] == subject.subjectName) {\r\n     customTimeTable[weekday][i + 1] = subject.subjectName;\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `getClassCount`\r\n\r\n```dart\r\nstatic Future<int> getClassCount(int grade)\r\n```\r\n\r\nNEIS `classInfo` API로 학년의 반 수를 조회함. 1주일 캐시\r\n\r\n---\r\n\r\n## `getSubjectsFromAdminFirestore`\r\n\r\n```dart\r\nstatic Future<List<Subject>> getSubjectsFromAdminFirestore(int grade)\r\n```\r\n\r\nFirestore `grade/{grade}/subject/` 컬렉션에서 관리자가 등록한 과목 목록을 조회함\r\n`category`와 `isOriginal` 필드 포함\r\n\r\n---\r\n\r\n## 내부 유틸리티\r\n\r\n| 함수 | 설명 |\r\n|------|------|\r\n| `_fetchData(url)` | `_client`를 통해 HTTP GET 요청, 에러 시 `NetworkException` throw |\r\n| `_hasData(timetable)` | 에러가 아니고 과목 데이터가 있는지 |\r\n| `_loadCachedSubjects(grade)` | 과목 조합 캐시 로드 (1주일 TTL) |\r\n| `_saveSubjectsToCache(grade, subjects)` | 과목 조합 캐시 저장 |\r\n\r\n---\r\n\r\n## 테스트 지원\r\n\r\n```dart\r\nstatic http.Client _client = http.Client();\r\n\r\n@visibleForTesting\r\nstatic set client(http.Client c) => _client = c;\r\n```\r\n\r\n`client` setter로 `MockClient` 주입 → 네트워크 없이 파싱·캐시·SWR·과목 추출 로직 테스트\r\n","api/timetable_data_api_en.md":"# TimetableDataApi\n\n> 한국어: [timetable_data_api.md](./timetable_data_api.md)\n>\n> `lib/api/timetable_data_api.dart` — NEIS timetable API integration\n\nAll methods are `static`. Responsible for querying timetable data, extracting subject combinations, and caching.\nThe HTTP client can be replaced through a `@visibleForTesting` setter, enabling MockClient-based unit tests.\n\n---\n\n## `getTimeTable`\n\n```dart\nstatic Future<Map<String, Map<String, List<String>>>> getTimeTable({\n  required DateTime startDate,\n  required DateTime endDate,\n  required String grade,\n  String? classNum,\n})\n```\n\n**Description**: Queries a timetable for a grade/class over a date range.\n\n**Return structure**: `{ \"20260410\": { \"3\": [\"국어\",\"수학\",\"영어\",...] } }` — date → class → per-period subject list.\n\n1. Cache check (12-hour TTL):\n   ```dart\n   final cacheKey = '$formattedStartDate-$formattedEndDate-$grade${classNum != null ? '-$classNum' : ''}';\n   ```\n\n2. When offline, returns an error map:\n   ```dart\n   return {\"error\": {\"error\": [\"시간표를 확인하려면 인터넷에 연결하세요\"]}};\n   ```\n\n3. Calls the NEIS `hisTimetable` endpoint (`pSize=1000`):\n   ```dart\n   '&GRADE=$grade'\n   '${classNum != null ? '&CLASS_NM=$classNum' : ''}'\n   ```\n\n4. Parses the response via `_processTimetable` and stores it in the cache.\n\n---\n\n## `_processTimetable`\n\n```dart\nstatic Map<String, Map<String, List<String>>> _processTimetable(\n    List<dynamic> timetableArray)\n```\n\n**Description**: Converts the NEIS API response into a `{ date → class → subject list }` structure.\n\nCore logic — **period placement based on PERIO**:\n```dart\nfinal perio = int.tryParse(item['PERIO']?.toString() ?? '');\nwhile (classList.length < perio) {\n  classList.add('');  // 빈 교시 채우기\n}\nclassList[perio - 1] = content;  // 1-based → 0-based\n```\n\nEntries without a class number are treated as `'special'` (special-room subjects).\n\n---\n\n## `_getWeekTimetableWithFallback`\n\n```dart\nstatic Future<Map<String, Map<String, List<String>>>> _getWeekTimetableWithFallback(\n    String grade)\n```\n\n**Description**: Tries this week → next week → last week in order.\n\nA fallback for weeks with no data (e.g., vacations):\n```dart\nvar timetable = await getTimeTable(startDate: thisMonday, ...);\nif (_hasData(timetable)) return timetable;\n\n// 이번 주 없으면 다음 주 시도\nfinal nextMonday = thisMonday.add(const Duration(days: 7));\ntimetable = await getTimeTable(startDate: nextMonday, ...);\nif (_hasData(timetable)) return timetable;\n\n// 다음 주도 없으면 지난 주 시도\nfinal prevMonday = thisMonday.subtract(const Duration(days: 7));\nreturn await getTimeTable(startDate: prevMonday, ...);\n```\n\n---\n\n## `getSubjects`\n\n```dart\nstatic Future<List<String>?> getSubjects({required int grade})\n```\n\n**Description**: Extracts the list of subject names for a given grade.\n\nFetches the timetable via `_getWeekTimetableWithFallback`, then collects every subject name into a `Set`.\nExcludes `[보강]` and `토요휴업일`. Cached for 1 week.\n\n---\n\n## `getAllSubjectCombinations`\n\n```dart\nstatic Future<List<Subject>> getAllSubjectCombinations({\n  required int grade,\n  int maxRetries = 3,\n})\n```\n\n**Description**: Extracts combinations of subjects + class numbers taught across every class of a grade.\n\nUsed on the timetable selection screen to determine \"which subjects are taught in which classes\".\n\n1. Local cache check (1-week TTL):\n   ```dart\n   final cachedSubjects = await _loadCachedSubjects(grade);\n   if (cachedSubjects != null && cachedSubjects.isNotEmpty) return cachedSubjects;\n   ```\n\n2. Calls `_getWeekTimetableWithFallback` with up to 3 retries:\n   ```dart\n   for (int attempt = 1; attempt <= maxRetries; attempt++) { ... }\n   ```\n\n3. Collects `Subject(subjectName, subjectClass)` pairs into a Set:\n   ```dart\n   subjectSet.add(Subject(\n     subjectName: subjectName,\n     subjectClass: classInt,  // -1이면 특별실\n   ));\n   ```\n\n4. Sorts by name and saves to cache.\n\n**Retry**: On failure, waits `2 * attempt` seconds before retrying.\n\n---\n\n## `getCustomTimeTable`\n\n```dart\nstatic Future<List<List<String?>>> getCustomTimeTable({\n  required List<Subject> userSubjects,\n  required String grade,\n})\n```\n\n**Description**: Builds a custom timetable from the user's selected subjects.\n\n**Return**: `List<List<String?>>` — indices 1–5 are Monday–Friday, and within each list indices 1–7 are periods 1–7.\n\n1. Queries the full-grade timetable (without specifying a class):\n   ```dart\n   final timetable = await getTimeTable(..., classNum: null);\n   ```\n\n2. Groups the user's selected subjects by class number:\n   ```dart\n   final classToSubjects = <int, List<Subject>>{};\n   ```\n\n3. Extracts the periods from each class's timetable where a selected subject matches:\n   ```dart\n   if (subjectsList[i] == subject.subjectName) {\n     customTimeTable[weekday][i + 1] = subject.subjectName;\n   }\n   ```\n\n---\n\n## `getClassCount`\n\n```dart\nstatic Future<int> getClassCount(int grade)\n```\n\nQueries the number of classes in a grade via the NEIS `classInfo` API. Cached for 1 week.\n\n---\n\n## `getSubjectsFromAdminFirestore`\n\n```dart\nstatic Future<List<Subject>> getSubjectsFromAdminFirestore(int grade)\n```\n\nQueries the admin-registered subject list from the Firestore `grade/{grade}/subject/` collection.\nIncludes the `category` and `isOriginal` fields.\n\n---\n\n## Internal Utilities\n\n| Function | Description |\n|------|------|\n| `_fetchData(url)` | Performs an HTTP GET through `_client`; throws `NetworkException` on error |\n| `_hasData(timetable)` | Whether it is not an error and contains subject data |\n| `_loadCachedSubjects(grade)` | Loads the subject-combination cache (1-week TTL) |\n| `_saveSubjectsToCache(grade, subjects)` | Saves the subject-combination cache |\n\n---\n\n## Testing Support\n\n```dart\nstatic http.Client _client = http.Client();\n\n@visibleForTesting\nstatic set client(http.Client c) => _client = c;\n```\n\nInject `MockClient` via the `client` setter → test parsing / caching / SWR / subject-extraction logic without the network.\n","data/analytics_service.md":"# AnalyticsService\r\n\r\n> `lib/data/analytics_service.dart` — Firebase Analytics 이벤트 래퍼\r\n\r\n모든 메서드가 `static`. 이벤트 이름 오타/중복 방지를 위해 모든 로깅을 이 클래스로 집중. 내부에서 silent fail 처리 (호출부에서 try/catch 불필요)\r\n\r\n---\r\n\r\n## `observer`\r\n\r\n```dart\r\nstatic FirebaseAnalyticsObserver get observer\r\n```\r\n\r\n`MaterialApp.navigatorObservers`에 등록하면 화면 전환(`screen_view`) 자동 추적\r\n\r\n---\r\n\r\n## `setUserId`\r\n\r\n```dart\r\nstatic Future<void> setUserId(String? uid)\r\n```\r\n\r\n로그인 시 uid 설정, 로그아웃 시 null 전달\r\n\r\n---\r\n\r\n## `setUserProperty`\r\n\r\n```dart\r\nstatic Future<void> setUserProperty(String name, String? value)\r\n```\r\n\r\n사용자 속성 설정 (grade, userType 등)\r\n\r\n---\r\n\r\n## 인증 이벤트\r\n\r\n| 메서드 | 이벤트명 | 파라미터 |\r\n|--------|----------|----------|\r\n| `logLogin(method)` | `login` | `{method: 'google'\\|'apple'\\|'kakao'\\|'github'}` |\r\n| `logSignUp(method)` | `sign_up` | `{method}` |\r\n| `logLogout()` | `logout` | — |\r\n\r\n---\r\n\r\n## 게시판 이벤트\r\n\r\n| 메서드 | 이벤트명 | 파라미터 |\r\n|--------|----------|----------|\r\n| `logPostCreate(boardType, isAnonymous)` | `post_create` | `{board_type, is_anonymous}` |\r\n| `logPostView(postId)` | `post_view` | `{post_id}` |\r\n| `logCommentCreate(postId, isReply)` | `comment_create` | `{post_id, is_reply}` |\r\n| `logPostShare(postId)` | `post_share` | `{post_id}` |\r\n| `logPostReport(postId)` | `post_report` | `{post_id}` |\r\n\r\n---\r\n\r\n## 성적/일정/검색 이벤트\r\n\r\n| 메서드 | 이벤트명 | 파라미터 |\r\n|--------|----------|----------|\r\n| `logGradeAdd(examType, subject)` | `grade_add` | `{exam_type, subject}` |\r\n| `logGradeGoalSet(subject)` | `grade_goal_set` | `{subject}` |\r\n| `logScheduleAdd()` | `schedule_add` | — |\r\n| `logDdayAdd()` | `dday_add` | — |\r\n| `logNotificationToggle(category, enabled)` | `notification_toggle` | `{category, enabled}` |\r\n| `logSearch(term)` | `search` | `{search_term}` |\r\n\r\n---\r\n\r\n## 내부 구조\r\n\r\n```dart\r\nstatic Future<void> _log(String name, [Map<String, Object>? params]) async {\r\n  try {\r\n    await _instance.logEvent(name: name, parameters: params);\r\n  } catch (e) {\r\n    if (kDebugMode) debugPrint('[Analytics] $name failed: $e');\r\n  }\r\n}\r\n```\r\n\r\n모든 public 메서드가 `_log`를 통해 이벤트를 발행. 릴리스 빌드에서 실패해도 앱에 영향 없음\r\n","data/analytics_service_en.md":"# AnalyticsService\n\n> 한국어: [analytics_service.md](./analytics_service.md)\n\n> `lib/data/analytics_service.dart` — Firebase Analytics event wrapper\n\nAll methods are `static`. All logging is centralized in this class to prevent event name typos and duplicates. Failures are handled silently inside (no try/catch needed at the call site).\n\n---\n\n## `observer`\n\n```dart\nstatic FirebaseAnalyticsObserver get observer\n```\n\nRegister on `MaterialApp.navigatorObservers` to automatically track screen transitions (`screen_view`).\n\n---\n\n## `setUserId`\n\n```dart\nstatic Future<void> setUserId(String? uid)\n```\n\nSet the uid on login, pass null on logout.\n\n---\n\n## `setUserProperty`\n\n```dart\nstatic Future<void> setUserProperty(String name, String? value)\n```\n\nSet user properties (grade, userType, etc.).\n\n---\n\n## Auth events\n\n| Method | Event name | Parameters |\n|--------|----------|----------|\n| `logLogin(method)` | `login` | `{method: 'google'\\|'apple'\\|'kakao'\\|'github'}` |\n| `logSignUp(method)` | `sign_up` | `{method}` |\n| `logLogout()` | `logout` | — |\n\n---\n\n## Board events\n\n| Method | Event name | Parameters |\n|--------|----------|----------|\n| `logPostCreate(boardType, isAnonymous)` | `post_create` | `{board_type, is_anonymous}` |\n| `logPostView(postId)` | `post_view` | `{post_id}` |\n| `logCommentCreate(postId, isReply)` | `comment_create` | `{post_id, is_reply}` |\n| `logPostShare(postId)` | `post_share` | `{post_id}` |\n| `logPostReport(postId)` | `post_report` | `{post_id}` |\n\n---\n\n## Grade/Schedule/Search events\n\n| Method | Event name | Parameters |\n|--------|----------|----------|\n| `logGradeAdd(examType, subject)` | `grade_add` | `{exam_type, subject}` |\n| `logGradeGoalSet(subject)` | `grade_goal_set` | `{subject}` |\n| `logScheduleAdd()` | `schedule_add` | — |\n| `logDdayAdd()` | `dday_add` | — |\n| `logNotificationToggle(category, enabled)` | `notification_toggle` | `{category, enabled}` |\n| `logSearch(term)` | `search` | `{search_term}` |\n\n---\n\n## Internal structure\n\n```dart\nstatic Future<void> _log(String name, [Map<String, Object>? params]) async {\n  try {\n    await _instance.logEvent(name: name, parameters: params);\n  } catch (e) {\n    if (kDebugMode) debugPrint('[Analytics] $name failed: $e');\n  }\n}\n```\n\nAll public methods publish events through `_log`. Failures in release builds do not affect the app.\n","data/api_strings.md":"# ApiStrings\n\n> `lib/data/api_strings.dart` — API 계층 센티널 문자열 상수\n\nAPI 응답에서 데이터 유무를 판별하는 한국어 문자열을 상수로 관리. UI 표시용이 아닌 `==` 비교에 사용되므로 l10n 대상이 아님\n\n---\n\n## 용도\n\nAPI에서 \"데이터 없음\" 또는 \"인터넷 없음\" 상태를 반환할 때 하드코딩된 한국어 문자열 대신 상수를 사용하여 오타·불일치를 방지\n\n```dart\n// Before\nif (result == '급식 정보가 없습니다.') { ... }\n\n// After\nif (result == ApiStrings.mealNoData) { ... }\n```\n\n---\n\n## 상수 목록\n\n### 급식 (Meal)\n\n| 상수 | 값 | 사용 위치 |\n|------|------|----------|\n| `mealNoData` | `'급식 정보가 없습니다.'` | [meal_data_api](../api/meal_data_api.md), meal_card, meal_screen |\n| `mealNoDataLegacy` | `'급식 정보가 없습니다'` | meal_screen (마침표 없는 구버전 호환) |\n| `mealNoInternet` | `'식단 정보를 확인하려면 인터넷에 연결하세요'` | [meal_data_api](../api/meal_data_api.md) |\n\n### 시간표 (Timetable)\n\n| 상수 | 값 | 사용 위치 |\n|------|------|----------|\n| `timetableNoInternet` | `'시간표를 확인하려면 인터넷에 연결하세요'` | [timetable_data_api](../api/timetable_data_api.md) |\n| `timetableNoData` | `'정보 없음'` | [timetable_data_api](../api/timetable_data_api.md) |\n\n### 학사일정 (Notice)\n\n| 상수 | 값 | 사용 위치 |\n|------|------|----------|\n| `noticeNoInternet` | `'학사일정을 확인하려면 인터넷에 연결하세요'` | [notice_data_api](../api/notice_data_api.md) |\n| `noticeNoData` | `'학사일정이 없습니다'` | [notice_data_api](../api/notice_data_api.md), notice_screen |\n\n---\n\n## 설계 참고\n\n- **l10n과 별개**: 이 문자열은 API 반환값과의 `==` 비교용이므로 번역하면 안 됨. UI에 노출되는 문자열은 `AppLocalizations`에서 별도 관리\n- `mealNoDataLegacy`: 마침표 유무 차이로 인한 하위 호환. 신규 코드는 `mealNoData` 사용\n","data/api_strings_en.md":"# ApiStrings\n\n> 한국어: [api_strings.md](./api_strings.md)\n\n> `lib/data/api_strings.dart` — Sentinel string constants for the API layer\n\nManages Korean strings used to determine data presence in API responses as constants. Not subject to l10n since they are used for `==` comparison, not UI display.\n\n---\n\n## Purpose\n\nPrevent typos and mismatches by using constants instead of hardcoded Korean strings when an API returns a \"no data\" or \"no internet\" state.\n\n```dart\n// Before\nif (result == '급식 정보가 없습니다.') { ... }\n\n// After\nif (result == ApiStrings.mealNoData) { ... }\n```\n\n---\n\n## Constant list\n\n### Meal\n\n| Constant | Value | Usage |\n|------|------|----------|\n| `mealNoData` | `'급식 정보가 없습니다.'` | [meal_data_api](../api/meal_data_api.md), meal_card, meal_screen |\n| `mealNoDataLegacy` | `'급식 정보가 없습니다'` | meal_screen (legacy compatibility without trailing period) |\n| `mealNoInternet` | `'식단 정보를 확인하려면 인터넷에 연결하세요'` | [meal_data_api](../api/meal_data_api.md) |\n\n### Timetable\n\n| Constant | Value | Usage |\n|------|------|----------|\n| `timetableNoInternet` | `'시간표를 확인하려면 인터넷에 연결하세요'` | [timetable_data_api](../api/timetable_data_api.md) |\n| `timetableNoData` | `'정보 없음'` | [timetable_data_api](../api/timetable_data_api.md) |\n\n### Notice (academic calendar)\n\n| Constant | Value | Usage |\n|------|------|----------|\n| `noticeNoInternet` | `'학사일정을 확인하려면 인터넷에 연결하세요'` | [notice_data_api](../api/notice_data_api.md) |\n| `noticeNoData` | `'학사일정이 없습니다'` | [notice_data_api](../api/notice_data_api.md), notice_screen |\n\n---\n\n## Design notes\n\n- **Separate from l10n**: These strings are used for `==` comparison against API return values and must not be translated. Strings exposed in the UI are managed separately in `AppLocalizations`.\n- `mealNoDataLegacy`: Backward compatibility due to the difference in trailing period. New code should use `mealNoData`.\n","data/auth_repository.md":"# AuthRepository\r\n\r\n> `lib/data/auth_repository.dart` — 인증/프로필 Repository 인터페이스\r\n\r\n[`AuthService`](auth_service.md)의 정적 메서드를 인스턴스 메서드로 감싸 GetIt DI에 등록. 테스트에서 mock 주입 가능\r\n\r\n---\r\n\r\n## 설계 배경\r\n\r\n```\r\nAuthService (정적 메서드, 25개 파일에서 직접 호출)\r\n    ↑\r\nAuthRepository (인스턴스 인터페이스)\r\n    ↑\r\nFirebaseAuthRepository (AuthService에 위임)\r\n```\r\n\r\n> 📎 [`AuthService`](auth_service.md)\r\n\r\n정적 메서드를 한 번에 제거하면 25개 파일을 동시에 수정해야 하므로, 두 인터페이스를 **병행**:\r\n- **신규 코드 / Riverpod Provider** → `AuthRepository` 사용\r\n- **기존 호출처** → [`AuthService`](auth_service.md) 직접 호출 (점진적 마이그레이션)\r\n\r\n---\r\n\r\n## `AuthRepository` (추상 클래스)\r\n\r\n```dart\r\nabstract class AuthRepository {\r\n  User? get currentUser;\r\n  bool get isLoggedIn;\r\n\r\n  Future<UserProfile?> getUserProfile();\r\n  Future<UserProfile?> getCachedProfile();\r\n  Future<void> saveUserProfile(UserProfile profile);\r\n  Future<bool> hasProfile();\r\n  Future<bool> isApproved();\r\n  Future<bool> isManager();\r\n  Future<void> signOut();\r\n  void clearProfileCache();\r\n}\r\n```\r\n\r\n[`AuthService`](auth_service.md)의 핵심 메서드만 인터페이스로 추출. 로그인 메서드(signInWithGoogle 등)는 UI에서만 직접 호출하므로 제외\r\n\r\n---\r\n\r\n## `FirebaseAuthRepository` (기본 구현)\r\n\r\n```dart\r\nclass FirebaseAuthRepository implements AuthRepository {\r\n  const FirebaseAuthRepository();\r\n\r\n  @override\r\n  User? get currentUser => AuthService.currentUser;\r\n\r\n  @override\r\n  Future<UserProfile?> getUserProfile() => AuthService.getUserProfile();\r\n\r\n  @override\r\n  Future<UserProfile?> getCachedProfile() => AuthService.getCachedProfile();\r\n\r\n  // ... 나머지 모두 AuthService 정적 메서드에 위임\r\n}\r\n```\r\n\r\n모든 메서드가 [`AuthService`](auth_service.md)의 정적 메서드를 그대로 호출. `const` 생성자로 인스턴스 생성 비용 없음\r\n\r\n---\r\n\r\n## GetIt 접근자\r\n\r\n```dart\r\nAuthRepository get authRepository => GetIt.I<AuthRepository>();\r\n```\r\n\r\n전역 getter. `service_locator.dart`에서 `FirebaseAuthRepository`로 등록됨:\r\n```dart\r\ngetIt.registerLazySingleton<AuthRepository>(\r\n  () => const FirebaseAuthRepository(),\r\n);\r\n```\r\n\r\n---\r\n\r\n## 테스트 활용\r\n\r\n```dart\r\n// test setUp\r\nawait resetServiceLocator();\r\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\r\n\r\n// 또는 Riverpod overrides\r\nProviderScope(\r\n  overrides: [authRepositoryProvider.overrideWithValue(mockRepo)],\r\n  child: ...,\r\n);\r\n```\r\n\r\n`MockAuthRepository`를 주입해 Firestore/Firebase Auth 의존 없이 단위 테스트 가능\r\n","data/auth_repository_en.md":"# AuthRepository\n\n> 한국어: [auth_repository.md](./auth_repository.md)\n\n> `lib/data/auth_repository.dart` — Auth/profile Repository interface\n\nWraps the static methods of [`AuthService`](auth_service_en.md) as instance methods and registers them with GetIt DI. Allows mock injection in tests.\n\n---\n\n## Design background\n\n```\nAuthService (static methods, called directly from 25 files)\n    ↑\nAuthRepository (instance interface)\n    ↑\nFirebaseAuthRepository (delegates to AuthService)\n```\n\n> 📎 [`AuthService`](auth_service_en.md)\n\nRemoving the static methods all at once would require modifying 25 files simultaneously, so the two interfaces run **in parallel**:\n- **New code / Riverpod Providers** → use `AuthRepository`\n- **Existing call sites** → call [`AuthService`](auth_service_en.md) directly (gradual migration)\n\n---\n\n## `AuthRepository` (abstract class)\n\n```dart\nabstract class AuthRepository {\n  User? get currentUser;\n  bool get isLoggedIn;\n\n  Future<UserProfile?> getUserProfile();\n  Future<UserProfile?> getCachedProfile();\n  Future<void> saveUserProfile(UserProfile profile);\n  Future<bool> hasProfile();\n  Future<bool> isApproved();\n  Future<bool> isManager();\n  Future<void> signOut();\n  void clearProfileCache();\n}\n```\n\nOnly the core methods of [`AuthService`](auth_service_en.md) are extracted into the interface. Login methods (signInWithGoogle, etc.) are called directly only from the UI and are excluded.\n\n---\n\n## `FirebaseAuthRepository` (default implementation)\n\n```dart\nclass FirebaseAuthRepository implements AuthRepository {\n  const FirebaseAuthRepository();\n\n  @override\n  User? get currentUser => AuthService.currentUser;\n\n  @override\n  Future<UserProfile?> getUserProfile() => AuthService.getUserProfile();\n\n  @override\n  Future<UserProfile?> getCachedProfile() => AuthService.getCachedProfile();\n\n  // ... all remaining methods delegate to AuthService static methods\n}\n```\n\nEvery method calls an [`AuthService`](auth_service_en.md) static method directly. `const` constructor means no instance creation cost.\n\n---\n\n## GetIt accessor\n\n```dart\nAuthRepository get authRepository => GetIt.I<AuthRepository>();\n```\n\nGlobal getter. Registered as `FirebaseAuthRepository` in `service_locator.dart`:\n```dart\ngetIt.registerLazySingleton<AuthRepository>(\n  () => const FirebaseAuthRepository(),\n);\n```\n\n---\n\n## Test usage\n\n```dart\n// test setUp\nawait resetServiceLocator();\nGetIt.I.registerSingleton<AuthRepository>(MockAuthRepository());\n\n// or Riverpod overrides\nProviderScope(\n  overrides: [authRepositoryProvider.overrideWithValue(mockRepo)],\n  child: ...,\n);\n```\n\nInjecting `MockAuthRepository` enables unit testing without Firestore/Firebase Auth dependencies.\n","data/auth_service.md":"# AuthService\r\n\r\n> `lib/data/auth_service.dart` — Firebase 인증 + 프로필 CRUD\r\n\r\n`UserProfile` 모델과 `AuthService` 클래스를 포함. 모든 메서드가 `static`\r\n\r\n---\r\n\r\n## UserProfile (데이터 모델)\r\n\r\n```dart\r\nclass UserProfile {\r\n  final String uid;\r\n  final String name;\r\n  final String studentId;\r\n  final int grade;\r\n  final int classNum;\r\n  final String email;\r\n  final bool approved;\r\n  final String role;           // 'user' | 'manager' | 'admin'\r\n  final String userType;       // 'student' | 'graduate' | 'teacher' | 'parent'\r\n  final String lastProfileUpdate;\r\n  final int? graduationYear;\r\n  final String? teacherSubject;\r\n  final DateTime? suspendedUntil;\r\n  final List<String> blockedUsers;\r\n  final String loginProvider;\r\n  final String? profilePhotoUrl;\r\n}\r\n```\r\n\r\n### 계산 프로퍼티\r\n\r\n| 프로퍼티 | 로직 |\r\n|----------|------|\r\n| `isManager` | `role == 'manager' \\|\\| role == 'admin'` |\r\n| `isAdmin` | `role == 'admin'` |\r\n| `isSuspended` | `suspendedUntil != null && DateTime.now().isBefore(suspendedUntil!)` |\r\n| `displayName` | userType별 분기: 졸업생/교사/학부모 접두어, 학생은 `studentId + name` |\r\n| `needsProfileUpdate` | 학생/교사만 해당, 3월 이후 `lastProfileUpdate`가 올해가 아니면 true |\r\n\r\n---\r\n\r\n## `signInWithGoogle`\r\n\r\n```dart\r\nstatic Future<User?> signInWithGoogle()\r\n```\r\n\r\n**설명**: Google 소셜 로그인으로 Firebase 인증을 수행함\r\n\r\n1. `GoogleSignIn().signIn()`으로 Google 계정 선택 팝업:\r\n   ```dart\r\n   final googleUser = await _googleSignIn.signIn();\r\n   if (googleUser == null) return null;  // 사용자 취소\r\n   ```\r\n\r\n2. Google OAuth 토큰으로 Firebase credential 생성:\r\n   ```dart\r\n   final googleAuth = await googleUser.authentication;\r\n   final credential = GoogleAuthProvider.credential(\r\n     accessToken: googleAuth.accessToken,\r\n     idToken: googleAuth.idToken,\r\n   );\r\n   ```\r\n\r\n3. Firebase에 로그인 후 Analytics 이벤트 발행:\r\n   ```dart\r\n   final result = await _auth.signInWithCredential(credential);\r\n   unawaited(AnalyticsService.logLogin('google'));\r\n   unawaited(AnalyticsService.setUserId(result.user!.uid));\r\n   ```\r\n\r\n**반환값**: `User?` — 성공 시 Firebase User, 취소/에러 시 null\r\n\r\n---\r\n\r\n## `signInWithApple`\r\n\r\n```dart\r\nstatic Future<User?> signInWithApple()\r\n```\r\n\r\n**설명**: Apple 로그인을 수행함. nonce 기반 보안 처리 포함\r\n\r\n1. 보안용 랜덤 nonce 생성 및 SHA-256 해싱:\r\n   ```dart\r\n   final rawNonce = _generateNonce();\r\n   final nonce = _sha256ofString(rawNonce);\r\n   ```\r\n\r\n2. Apple ID credential 요청 (email, fullName 스코프):\r\n   ```dart\r\n   final appleCredential = await SignInWithApple.getAppleIDCredential(\r\n     scopes: [AppleIDAuthorizationScopes.email, AppleIDAuthorizationScopes.fullName],\r\n     nonce: nonce,\r\n   );\r\n   ```\r\n\r\n3. OAuthProvider로 Firebase credential 변환 후 로그인:\r\n   ```dart\r\n   final oauthCredential = OAuthProvider('apple.com').credential(\r\n     idToken: appleCredential.identityToken,\r\n     rawNonce: rawNonce,\r\n   );\r\n   ```\r\n\r\n4. 최초 로그인 시 Apple에서 제공한 이름을 displayName에 설정:\r\n   ```dart\r\n   if (appleCredential.givenName != null) {\r\n     await result.user?.updateDisplayName(...);\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `signInWithKakao`\r\n\r\n```dart\r\nstatic Future<User?> signInWithKakao(String kakaoAccessToken)\r\n```\r\n\r\n**설명**: 카카오 로그인. Cloud Function을 거쳐 Firebase Custom Token으로 변환함\r\n\r\n1. 카카오 SDK에서 받은 accessToken을 Cloud Function에 POST:\r\n   ```dart\r\n   final response = await http.post(\r\n     Uri.parse('https://.../kakaoCustomAuth'),\r\n     body: jsonEncode({'token': kakaoAccessToken}),\r\n   );\r\n   ```\r\n\r\n2. Cloud Function이 반환한 Firebase Custom Token으로 로그인:\r\n   ```dart\r\n   final customToken = jsonDecode(response.body)['firebaseToken'] as String;\r\n   final result = await _auth.signInWithCustomToken(customToken);\r\n   ```\r\n\r\n**파라미터**: `kakaoAccessToken` — 카카오 SDK `LoginResult`에서 얻은 액세스 토큰\r\n\r\n---\r\n\r\n## `signInWithGitHub`\r\n\r\n```dart\r\nstatic Future<User?> signInWithGitHub()\r\n```\r\n\r\n**설명**: GitHub 로그인. Firebase 내장 `signInWithProvider`를 사용함\r\n\r\n```dart\r\nfinal githubProvider = GithubAuthProvider();\r\nfinal result = await _auth.signInWithProvider(githubProvider);\r\n```\r\n\r\n별도 서버 없이 Firebase가 OAuth 플로우를 직접 처리\r\n\r\n---\r\n\r\n## `signOut`\r\n\r\n```dart\r\nstatic Future<void> signOut()\r\n```\r\n\r\nGoogle과 Firebase 모두 로그아웃. Analytics에 로그아웃 이벤트 발행\r\n\r\n```dart\r\nunawaited(AnalyticsService.logLogout());\r\nawait _googleSignIn.signOut();\r\nawait _auth.signOut();\r\n```\r\n\r\n---\r\n\r\n## `getUserProfile`\r\n\r\n```dart\r\nstatic Future<UserProfile?> getUserProfile()\r\n```\r\n\r\nFirestore `users/{uid}` 문서에서 프로필을 조회함. 캐시 없이 매번 직접 조회\r\n\r\n---\r\n\r\n## `saveUserProfile`\r\n\r\n```dart\r\nstatic Future<void> saveUserProfile(UserProfile profile)\r\n```\r\n\r\nFirestore `users/{uid}`에 프로필을 저장함. `SetOptions(merge: true)`로 기존 필드 보존\r\n\r\n---\r\n\r\n## `hasProfile`\r\n\r\n```dart\r\nstatic Future<bool> hasProfile()\r\n```\r\n\r\n프로필 문서가 존재하고 `name` 필드가 있는지 확인. 로그인 직후 프로필 설정 화면 분기에 사용\r\n\r\n---\r\n\r\n## `isApproved`\r\n\r\n```dart\r\nstatic Future<bool> isApproved()\r\n```\r\n\r\n**설명**: 사용자가 승인 상태인지 확인함\r\n\r\n```dart\r\nif (profile.isSuspended) return false;\r\nreturn profile.approved || profile.isManager;\r\n```\r\n\r\n정지 상태면 `false`, 매니저/관리자는 승인 불필요\r\n\r\n---\r\n\r\n## `getSuspendedMessage`\r\n\r\n```dart\r\nstatic Future<String?> getSuspendedMessage()\r\n```\r\n\r\n**설명**: 정지 잔여 시간을 한국어 문자열로 반환함\r\n\r\n```dart\r\nfinal diff = profile.suspendedUntil!.difference(DateTime.now());\r\n// → \"2일 3시간 15분\" 형태\r\n```\r\n\r\n정지 상태가 아니면 null\r\n\r\n---\r\n\r\n## `getCachedProfile`\r\n\r\n```dart\r\nstatic Future<UserProfile?> getCachedProfile()\r\n```\r\n\r\n**설명**: 5분 TTL 메모리 캐시로 프로필을 조회함\r\n\r\n```dart\r\nif (_cachedProfile != null && _cacheTime != null &&\r\n    DateTime.now().difference(_cacheTime!).inMinutes < 5) {\r\n  return _cachedProfile;\r\n}\r\n_cachedProfile = await getUserProfile();\r\n_cacheTime = DateTime.now();\r\n```\r\n\r\n게시판 작성, 댓글 등 빈번한 프로필 참조 시 Firestore 호출을 줄임\r\n\r\n---\r\n\r\n## `clearProfileCache`\r\n\r\n```dart\r\nstatic void clearProfileCache()\r\n```\r\n\r\n프로필 수정 후 호출. `_cachedProfile`과 `_cacheTime`을 null로 초기화\r\n\r\n---\r\n\r\n## `refreshCustomClaims`\r\n\r\n```dart\r\nstatic Future<Map<String, dynamic>?> refreshCustomClaims()\r\n```\r\n\r\n**설명**: ID 토큰을 강제 갱신해 최신 Custom Claims를 가져옴\r\n\r\n```dart\r\nfinal result = await user.getIdTokenResult(true);  // forceRefresh\r\nreturn result.claims;\r\n```\r\n\r\nCloud Function `onUserUpdated`가 `setCustomUserClaims`를 호출한 뒤, 클라이언트에서 이 메서드를 호출해야 변경된 role/approved가 즉시 반영됨\r\n\r\n---\r\n\r\n## 내부 유틸리티\r\n\r\n| 함수 | 설명 |\r\n|------|------|\r\n| `_generateNonce([length])` | 보안용 랜덤 문자열 생성 (Apple 로그인용) |\r\n| `_sha256ofString(input)` | SHA-256 해시 (nonce 해싱) |\r\n| `setCachedProfileForTest(profile)` | `@visibleForTesting` — 테스트용 캐시 주입 |\r\n","data/auth_service_en.md":"# AuthService\n\n> 한국어: [auth_service.md](./auth_service.md)\n\n> `lib/data/auth_service.dart` — Firebase auth + profile CRUD\n\nContains the `UserProfile` model and the `AuthService` class. All methods are `static`.\n\n---\n\n## UserProfile (data model)\n\n```dart\nclass UserProfile {\n  final String uid;\n  final String name;\n  final String studentId;\n  final int grade;\n  final int classNum;\n  final String email;\n  final bool approved;\n  final String role;           // 'user' | 'manager' | 'admin'\n  final String userType;       // 'student' | 'graduate' | 'teacher' | 'parent'\n  final String lastProfileUpdate;\n  final int? graduationYear;\n  final String? teacherSubject;\n  final DateTime? suspendedUntil;\n  final List<String> blockedUsers;\n  final String loginProvider;\n  final String? profilePhotoUrl;\n}\n```\n\n### Computed properties\n\n| Property | Logic |\n|----------|------|\n| `isManager` | `role == 'manager' \\|\\| role == 'admin'` |\n| `isAdmin` | `role == 'admin'` |\n| `isSuspended` | `suspendedUntil != null && DateTime.now().isBefore(suspendedUntil!)` |\n| `displayName` | Branches by userType: prefix for graduate/teacher/parent, student uses `studentId + name` |\n| `needsProfileUpdate` | Only for students/teachers; true if after March and `lastProfileUpdate` is not in the current year |\n\n---\n\n## `signInWithGoogle`\n\n```dart\nstatic Future<User?> signInWithGoogle()\n```\n\n**Description**: Performs Firebase authentication via Google social login.\n\n1. Show the Google account selection popup with `GoogleSignIn().signIn()`:\n   ```dart\n   final googleUser = await _googleSignIn.signIn();\n   if (googleUser == null) return null;  // user cancelled\n   ```\n\n2. Create a Firebase credential with the Google OAuth tokens:\n   ```dart\n   final googleAuth = await googleUser.authentication;\n   final credential = GoogleAuthProvider.credential(\n     accessToken: googleAuth.accessToken,\n     idToken: googleAuth.idToken,\n   );\n   ```\n\n3. Sign in to Firebase and publish an Analytics event:\n   ```dart\n   final result = await _auth.signInWithCredential(credential);\n   unawaited(AnalyticsService.logLogin('google'));\n   unawaited(AnalyticsService.setUserId(result.user!.uid));\n   ```\n\n**Returns**: `User?` — Firebase User on success, null on cancel/error.\n\n---\n\n## `signInWithApple`\n\n```dart\nstatic Future<User?> signInWithApple()\n```\n\n**Description**: Performs Apple Sign In. Includes nonce-based security handling.\n\n1. Generate a random security nonce and hash it with SHA-256:\n   ```dart\n   final rawNonce = _generateNonce();\n   final nonce = _sha256ofString(rawNonce);\n   ```\n\n2. Request the Apple ID credential (email, fullName scopes):\n   ```dart\n   final appleCredential = await SignInWithApple.getAppleIDCredential(\n     scopes: [AppleIDAuthorizationScopes.email, AppleIDAuthorizationScopes.fullName],\n     nonce: nonce,\n   );\n   ```\n\n3. Convert to a Firebase credential via OAuthProvider and sign in:\n   ```dart\n   final oauthCredential = OAuthProvider('apple.com').credential(\n     idToken: appleCredential.identityToken,\n     rawNonce: rawNonce,\n   );\n   ```\n\n4. On first login, set the name provided by Apple as the displayName:\n   ```dart\n   if (appleCredential.givenName != null) {\n     await result.user?.updateDisplayName(...);\n   }\n   ```\n\n---\n\n## `signInWithKakao`\n\n```dart\nstatic Future<User?> signInWithKakao(String kakaoAccessToken)\n```\n\n**Description**: Kakao login. Converts to a Firebase Custom Token via a Cloud Function.\n\n1. POST the accessToken received from the Kakao SDK to the Cloud Function:\n   ```dart\n   final response = await http.post(\n     Uri.parse('https://.../kakaoCustomAuth'),\n     body: jsonEncode({'token': kakaoAccessToken}),\n   );\n   ```\n\n2. Sign in with the Firebase Custom Token returned by the Cloud Function:\n   ```dart\n   final customToken = jsonDecode(response.body)['firebaseToken'] as String;\n   final result = await _auth.signInWithCustomToken(customToken);\n   ```\n\n**Parameters**: `kakaoAccessToken` — access token obtained from the Kakao SDK `LoginResult`.\n\n---\n\n## `signInWithGitHub`\n\n```dart\nstatic Future<User?> signInWithGitHub()\n```\n\n**Description**: GitHub login. Uses Firebase's built-in `signInWithProvider`.\n\n```dart\nfinal githubProvider = GithubAuthProvider();\nfinal result = await _auth.signInWithProvider(githubProvider);\n```\n\nFirebase handles the OAuth flow directly without a separate server.\n\n---\n\n## `signOut`\n\n```dart\nstatic Future<void> signOut()\n```\n\nSign out of both Google and Firebase. Publishes a logout event to Analytics.\n\n```dart\nunawaited(AnalyticsService.logLogout());\nawait _googleSignIn.signOut();\nawait _auth.signOut();\n```\n\n---\n\n## `getUserProfile`\n\n```dart\nstatic Future<UserProfile?> getUserProfile()\n```\n\nFetches the profile from the Firestore `users/{uid}` document. Queries directly every time without caching.\n\n---\n\n## `saveUserProfile`\n\n```dart\nstatic Future<void> saveUserProfile(UserProfile profile)\n```\n\nSaves the profile to Firestore `users/{uid}`. Preserves existing fields with `SetOptions(merge: true)`.\n\n---\n\n## `hasProfile`\n\n```dart\nstatic Future<bool> hasProfile()\n```\n\nChecks whether the profile document exists and has a `name` field. Used to branch to the profile setup screen immediately after login.\n\n---\n\n## `isApproved`\n\n```dart\nstatic Future<bool> isApproved()\n```\n\n**Description**: Checks whether the user is in approved status.\n\n```dart\nif (profile.isSuspended) return false;\nreturn profile.approved || profile.isManager;\n```\n\nReturns `false` if suspended; managers/admins do not require approval.\n\n---\n\n## `getSuspendedMessage`\n\n```dart\nstatic Future<String?> getSuspendedMessage()\n```\n\n**Description**: Returns the remaining suspension time as a Korean string.\n\n```dart\nfinal diff = profile.suspendedUntil!.difference(DateTime.now());\n// → \"2일 3시간 15분\" format\n```\n\nReturns null if not suspended.\n\n---\n\n## `getCachedProfile`\n\n```dart\nstatic Future<UserProfile?> getCachedProfile()\n```\n\n**Description**: Fetches the profile from a 5-minute TTL in-memory cache.\n\n```dart\nif (_cachedProfile != null && _cacheTime != null &&\n    DateTime.now().difference(_cacheTime!).inMinutes < 5) {\n  return _cachedProfile;\n}\n_cachedProfile = await getUserProfile();\n_cacheTime = DateTime.now();\n```\n\nReduces Firestore calls for frequent profile references in posting, commenting, etc.\n\n---\n\n## `clearProfileCache`\n\n```dart\nstatic void clearProfileCache()\n```\n\nCall after editing the profile. Resets `_cachedProfile` and `_cacheTime` to null.\n\n---\n\n## `refreshCustomClaims`\n\n```dart\nstatic Future<Map<String, dynamic>?> refreshCustomClaims()\n```\n\n**Description**: Force-refreshes the ID token to get the latest Custom Claims.\n\n```dart\nfinal result = await user.getIdTokenResult(true);  // forceRefresh\nreturn result.claims;\n```\n\nAfter the Cloud Function `onUserUpdated` calls `setCustomUserClaims`, the client must call this method for the updated role/approved to take effect immediately.\n\n---\n\n## Internal utilities\n\n| Function | Description |\n|------|------|\n| `_generateNonce([length])` | Generates a random security string (for Apple login) |\n| `_sha256ofString(input)` | SHA-256 hash (for nonce hashing) |\n| `setCachedProfileForTest(profile)` | `@visibleForTesting` — cache injection for testing |\n","data/board_categories.md":"# BoardCategories\n\n> `lib/data/board_categories.dart` — 게시판 카테고리 상수 + 헬퍼\n\nFirestore에 저장되는 카테고리 값은 한국어(`'자유'`, `'질문'` 등)이므로, 영문 상수명으로 참조하여 오타·불일치를 방지. l10n 이름, 색상, FCM 토픽 키를 한 곳에서 관리\n\n---\n\n## 상수\n\n| 상수 | Firestore 값 | 설명 |\n|------|-------------|------|\n| `all` | `'전체'` | 전체 탭 (필터 없음) |\n| `popular` | `'인기글'` | 인기글 탭 (likeCount 정렬) |\n| `free` | `'자유'` | 자유 게시판 |\n| `question` | `'질문'` | 질문 게시판 |\n| `info` | `'정보공유'` | 정보공유 게시판 |\n| `lostFound` | `'분실물'` | 분실물 게시판 |\n| `council` | `'학생회'` | 학생회 게시판 |\n| `club` | `'동아리'` | 동아리 게시판 |\n\n---\n\n## 리스트\n\n| 리스트 | 내용 | 용도 |\n|--------|------|------|\n| `boardKeys` | 전체 8개 (all ~ club) | 게시판 탭 바 |\n| `writeKeys` | 6개 (all·popular 제외) | 글 작성 시 카테고리 선택 |\n\n---\n\n## `topicKey`\n\n```dart\nstatic const topicKey = <String, String>{\n  free: 'free',\n  question: 'question',\n  info: 'info',\n  lostFound: 'lost',      // 'lostfound'가 아님 — 기존 FCM 구독자 호환\n  council: 'council',\n  club: 'club',\n};\n```\n\nFCM 토픽 이름 생성에 사용: `board_${topicKey[category]}`\n\n> `lostFound`의 토픽 키가 `'lost'`인 이유: 기존에 `board_lost`로 구독된 사용자가 있어 변경 불가\n\n---\n\n## `localizedName`\n\n```dart\nstatic String localizedName(AppLocalizations l, String key)\n```\n\n카테고리 키 → l10n 이름 변환. `AppLocalizations`의 `board_categoryXxx` 키에 매핑\n\n```dart\nBoardCategories.localizedName(l, BoardCategories.free)  // → \"자유\" (ko) / \"Free\" (en)\n```\n\n---\n\n## `color`\n\n```dart\nstatic Color color(String category)\n```\n\n카테고리 → 색상 매핑. 게시판 카드, 카테고리 뱃지, 홈 화면 최신글에서 사용\n\n| 카테고리 | 색상 |\n|----------|------|\n| free | `AppColors.theme.primaryColor` |\n| question | `AppColors.theme.secondaryColor` |\n| info | `AppColors.theme.tertiaryColor` |\n| lostFound | `#FF5722` (Deep Orange) |\n| council | `#4CAF50` (Green) |\n| club | `#9C27B0` (Purple) |\n| 기타 | `AppColors.theme.darkGreyColor` |\n\n---\n\n## 사용 위치\n\n- **board_screen.dart**: 탭 바, 카테고리 필터, PostCard 뱃지\n- **write_post_screen.dart**: 카테고리 선택 드롭다운\n- **post_detail_screen.dart**: 카테고리 색상 표시\n- **home_screen.dart**: 최신글 카테고리 색상\n- **[fcm_service](../notification/fcm_service.md)**: 토픽 구독/해제\n","data/board_categories_en.md":"# BoardCategories\n\n> 한국어: [board_categories.md](./board_categories.md)\n\n> `lib/data/board_categories.dart` — Board category constants + helpers\n\nCategory values stored in Firestore are Korean (`'자유'`, `'질문'`, etc.). Referencing them by English constant names prevents typos and mismatches. Centralizes l10n names, colors, and FCM topic keys in one place.\n\n---\n\n## Constants\n\n| Constant | Firestore value | Description |\n|------|-------------|------|\n| `all` | `'전체'` | All tab (no filter) |\n| `popular` | `'인기글'` | Popular tab (sorted by likeCount) |\n| `free` | `'자유'` | Free board |\n| `question` | `'질문'` | Question board |\n| `info` | `'정보공유'` | Info sharing board |\n| `lostFound` | `'분실물'` | Lost & found board |\n| `council` | `'학생회'` | Student council board |\n| `club` | `'동아리'` | Club board |\n\n---\n\n## Lists\n\n| List | Contents | Usage |\n|--------|------|------|\n| `boardKeys` | All 8 (all ~ club) | Board tab bar |\n| `writeKeys` | 6 (excluding all·popular) | Category selection when writing a post |\n\n---\n\n## `topicKey`\n\n```dart\nstatic const topicKey = <String, String>{\n  free: 'free',\n  question: 'question',\n  info: 'info',\n  lostFound: 'lost',      // not 'lostfound' — for compatibility with existing FCM subscribers\n  council: 'council',\n  club: 'club',\n};\n```\n\nUsed for FCM topic name generation: `board_${topicKey[category]}`\n\n> Reason `lostFound`'s topic key is `'lost'`: existing users subscribed to `board_lost`, so it cannot be changed.\n\n---\n\n## `localizedName`\n\n```dart\nstatic String localizedName(AppLocalizations l, String key)\n```\n\nConverts a category key to the l10n name. Maps to the `board_categoryXxx` keys in `AppLocalizations`.\n\n```dart\nBoardCategories.localizedName(l, BoardCategories.free)  // → \"자유\" (ko) / \"Free\" (en)\n```\n\n---\n\n## `color`\n\n```dart\nstatic Color color(String category)\n```\n\nMaps category to color. Used in board cards, category badges, and recent posts on the home screen.\n\n| Category | Color |\n|----------|------|\n| free | `AppColors.theme.primaryColor` |\n| question | `AppColors.theme.secondaryColor` |\n| info | `AppColors.theme.tertiaryColor` |\n| lostFound | `#FF5722` (Deep Orange) |\n| council | `#4CAF50` (Green) |\n| club | `#9C27B0` (Purple) |\n| other | `AppColors.theme.darkGreyColor` |\n\n---\n\n## Usage locations\n\n- **board_screen.dart**: tab bar, category filter, PostCard badge\n- **write_post_screen.dart**: category selection dropdown\n- **post_detail_screen.dart**: category color display\n- **home_screen.dart**: recent post category color\n- **[fcm_service](../notification/fcm_service.md)**: topic subscribe/unsubscribe\n","data/dday_manager.md":"# DDayManager\r\n\r\n> `lib/data/dday_manager.dart` — D-day CRUD, Firestore 동기화\r\n\r\n`DDay` 모델과 `DDayManager` 클래스를 포함. 모든 메서드가 `static`. 데이터는 [`SecureStorageService`](secure_storage_service.md)에 저장\r\n\r\n---\r\n\r\n## DDay (데이터 모델)\r\n\r\n```dart\r\nclass DDay {\r\n  final String title;\r\n  final DateTime date;\r\n  final bool isPinned;\r\n}\r\n```\r\n\r\n### `dDay` (계산 프로퍼티)\r\n\r\n```dart\r\nint get dDay {\r\n  final now = DateTime(DateTime.now().year, DateTime.now().month, DateTime.now().day);\r\n  final target = DateTime(date.year, date.month, date.day);\r\n  return target.difference(now).inDays;\r\n}\r\n```\r\n\r\n시간 부분을 제거하고 날짜 차이만 계산. 양수면 미래, 0이면 당일, 음수면 과거\r\n\r\n---\r\n\r\n## `loadAll`\r\n\r\n```dart\r\nstatic Future<List<DDay>> loadAll()\r\n```\r\n\r\n**설명**: 전체 D-day 목록을 로드함\r\n\r\n1. SharedPreferences → SecureStorage 일회성 마이그레이션:\r\n   ```dart\r\n   await SecureStorageService.migrateFromPlain(\r\n     key: SecureStorageService.keyDdays,\r\n     oldValue: prefs.getString(_key),\r\n     onMigrated: () async => prefs.remove(_key),\r\n   );\r\n   ```\r\n\r\n2. SecureStorage에서 JSON 읽기:\r\n   ```dart\r\n   final json = await SecureStorageService.read(SecureStorageService.keyDdays);\r\n   ```\r\n\r\n3. 로컬 데이터가 없고 로그인 상태면 Firestore에서 복원:\r\n   ```dart\r\n   if (json == null || json.isEmpty) {\r\n     if (AuthService.isLoggedIn) {\r\n       return _loadFromFirestore();\r\n     }\r\n     return [];\r\n   }\r\n   ```\r\n\r\n---\r\n\r\n## `saveAll`\r\n\r\n```dart\r\nstatic Future<void> saveAll(List<DDay> list)\r\n```\r\n\r\n**설명**: D-day 목록 전체를 저장하고 Firestore에 동기화함\r\n\r\n```dart\r\nawait SecureStorageService.write(\r\n  SecureStorageService.keyDdays,\r\n  jsonEncode(list.map((e) => e.toJson()).toList()),\r\n);\r\n_syncToFirestore(list);  // fire-and-forget\r\n```\r\n\r\nFirestore 동기화는 비동기로 실행 (실패해도 로컬은 저장됨)\r\n\r\n---\r\n\r\n## `getPinned`\r\n\r\n```dart\r\nstatic Future<DDay?> getPinned()\r\n```\r\n\r\n**설명**: 핀 된 D-day 중 가장 가까운 미래 항목을 반환함\r\n\r\n```dart\r\nfinal pinned = list.where((d) => d.isPinned && d.dDay >= 0).toList();\r\npinned.sort((a, b) => a.dDay.compareTo(b.dDay));\r\nreturn pinned.first;\r\n```\r\n\r\n홈 화면 상단 D-day 위젯에 표시되는 항목\r\n\r\n---\r\n\r\n## `_loadFromFirestore`\r\n\r\n```dart\r\nstatic Future<List<DDay>> _loadFromFirestore()\r\n```\r\n\r\n**설명**: Firestore `users/{uid}/sync/ddays` 문서에서 D-day 목록을 복원함\r\n\r\n```dart\r\nfinal doc = await FirebaseFirestore.instance\r\n    .collection('users').doc(uid)\r\n    .collection('sync').doc('ddays')\r\n    .get();\r\n```\r\n\r\n복원 후 SecureStorage에도 저장하여 다음 로드 시 로컬에서 읽히도록 함\r\n\r\n---\r\n\r\n## `_syncToFirestore`\r\n\r\n```dart\r\nstatic Future<void> _syncToFirestore(List<DDay> list)\r\n```\r\n\r\n**설명**: D-day 목록을 Firestore에 동기화함\r\n\r\n```dart\r\nawait FirebaseFirestore.instance\r\n    .collection('users').doc(uid)\r\n    .collection('sync').doc('ddays')\r\n    .set({\r\n  'items': list.map((e) => e.toJson()).toList(),\r\n  'updatedAt': FieldValue.serverTimestamp(),\r\n});\r\n```\r\n\r\n비로그인 상태면 즉시 return. 에러는 로깅만 (silent fail)\r\n","data/dday_manager_en.md":"# DDayManager\n\n> 한국어: [dday_manager.md](./dday_manager.md)\n\n> `lib/data/dday_manager.dart` — D-day CRUD, Firestore sync\n\nContains the `DDay` model and the `DDayManager` class. All methods are `static`. Data is stored in [`SecureStorageService`](secure_storage_service.md).\n\n---\n\n## DDay (data model)\n\n```dart\nclass DDay {\n  final String title;\n  final DateTime date;\n  final bool isPinned;\n}\n```\n\n### `dDay` (computed property)\n\n```dart\nint get dDay {\n  final now = DateTime(DateTime.now().year, DateTime.now().month, DateTime.now().day);\n  final target = DateTime(date.year, date.month, date.day);\n  return target.difference(now).inDays;\n}\n```\n\nStrips the time component and calculates only the date difference. Positive is future, 0 is today, negative is past.\n\n---\n\n## `loadAll`\n\n```dart\nstatic Future<List<DDay>> loadAll()\n```\n\n**Description**: Loads the full list of D-days.\n\n1. One-time migration from SharedPreferences to SecureStorage:\n   ```dart\n   await SecureStorageService.migrateFromPlain(\n     key: SecureStorageService.keyDdays,\n     oldValue: prefs.getString(_key),\n     onMigrated: () async => prefs.remove(_key),\n   );\n   ```\n\n2. Read JSON from SecureStorage:\n   ```dart\n   final json = await SecureStorageService.read(SecureStorageService.keyDdays);\n   ```\n\n3. Restore from Firestore if no local data exists and the user is logged in:\n   ```dart\n   if (json == null || json.isEmpty) {\n     if (AuthService.isLoggedIn) {\n       return _loadFromFirestore();\n     }\n     return [];\n   }\n   ```\n\n---\n\n## `saveAll`\n\n```dart\nstatic Future<void> saveAll(List<DDay> list)\n```\n\n**Description**: Saves the entire D-day list and syncs to Firestore.\n\n```dart\nawait SecureStorageService.write(\n  SecureStorageService.keyDdays,\n  jsonEncode(list.map((e) => e.toJson()).toList()),\n);\n_syncToFirestore(list);  // fire-and-forget\n```\n\nFirestore sync runs asynchronously (local is saved even if sync fails).\n\n---\n\n## `getPinned`\n\n```dart\nstatic Future<DDay?> getPinned()\n```\n\n**Description**: Returns the closest upcoming item among pinned D-days.\n\n```dart\nfinal pinned = list.where((d) => d.isPinned && d.dDay >= 0).toList();\npinned.sort((a, b) => a.dDay.compareTo(b.dDay));\nreturn pinned.first;\n```\n\nItem displayed in the D-day widget at the top of the home screen.\n\n---\n\n## `_loadFromFirestore`\n\n```dart\nstatic Future<List<DDay>> _loadFromFirestore()\n```\n\n**Description**: Restores the D-day list from the Firestore `users/{uid}/sync/ddays` document.\n\n```dart\nfinal doc = await FirebaseFirestore.instance\n    .collection('users').doc(uid)\n    .collection('sync').doc('ddays')\n    .get();\n```\n\nAfter restoring, also stores to SecureStorage so the next load reads from local.\n\n---\n\n## `_syncToFirestore`\n\n```dart\nstatic Future<void> _syncToFirestore(List<DDay> list)\n```\n\n**Description**: Syncs the D-day list to Firestore.\n\n```dart\nawait FirebaseFirestore.instance\n    .collection('users').doc(uid)\n    .collection('sync').doc('ddays')\n    .set({\n  'items': list.map((e) => e.toJson()).toList(),\n  'updatedAt': FieldValue.serverTimestamp(),\n});\n```\n\nReturns immediately if not logged in. Errors are only logged (silent fail).\n","data/device.md":"# Device\r\n\r\n> `lib/data/device.dart` — 디바이스 크기 계산 유틸리티\r\n\r\n모든 메서드가 `static`. 화면 크기를 퍼센트 기반으로 계산하는 반응형 레이아웃 헬퍼\r\n\r\n---\r\n\r\n## `init`\r\n\r\n```dart\r\nstatic void init(BuildContext context) {\r\n  final size = MediaQuery.of(context).size;\r\n  width = size.width;\r\n  height = size.height;\r\n  isTablet = width > 500;\r\n}\r\n```\r\n\r\n**설명**: 디바이스 크기를 초기화함\r\n\r\n`MainScreen.build`에서 매 빌드마다 호출:\r\n```dart\r\nDevice.init(context);\r\n```\r\n\r\n- `width`/`height`: `MediaQuery.of(context).size`에서 추출\r\n- `isTablet`: 너비 500px 초과 시 태블릿으로 판정\r\n\r\n---\r\n\r\n## `getWidth`\r\n\r\n```dart\r\nstatic double getWidth(double percent) {\r\n  return width / 100 * percent;\r\n}\r\n```\r\n\r\n**설명**: 화면 너비의 퍼센트를 픽셀로 변환함\r\n\r\n```dart\r\n// 예: 화면 너비가 400px일 때\r\nDevice.getWidth(50)  // → 200.0\r\nDevice.getWidth(90)  // → 360.0\r\n```\r\n\r\n---\r\n\r\n## `getHeight`\r\n\r\n```dart\r\nstatic double getHeight(double percent) {\r\n  return height / 100 * percent;\r\n}\r\n```\r\n\r\n화면 높이의 퍼센트를 픽셀로 변환. `getWidth`와 동일한 계산 방식\r\n\r\n---\r\n\r\n## 정적 필드\r\n\r\n| 필드 | 타입 | 설명 |\r\n|------|------|------|\r\n| `width` | `double` | 화면 너비 (px) |\r\n| `height` | `double` | 화면 높이 (px) |\r\n| `isTablet` | `bool` | 태블릿 여부 (`width > 500`) |\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n위젯 크기/패딩을 화면 비율로 지정할 때 사용:\r\n```dart\r\nContainer(\r\n  width: Device.getWidth(90),   // 화면 너비의 90%\r\n  height: Device.getHeight(5),  // 화면 높이의 5%\r\n)\r\n```\r\n","data/device_en.md":"# Device\n\n> 한국어: [device.md](./device.md)\n\n> `lib/data/device.dart` — Device size calculation utility\n\nAll methods are `static`. Responsive layout helper that calculates screen sizes based on percentages.\n\n---\n\n## `init`\n\n```dart\nstatic void init(BuildContext context) {\n  final size = MediaQuery.of(context).size;\n  width = size.width;\n  height = size.height;\n  isTablet = width > 500;\n}\n```\n\n**Description**: Initializes the device size.\n\nCalled on every build in `MainScreen.build`:\n```dart\nDevice.init(context);\n```\n\n- `width`/`height`: extracted from `MediaQuery.of(context).size`\n- `isTablet`: treated as tablet when width exceeds 500px\n\n---\n\n## `getWidth`\n\n```dart\nstatic double getWidth(double percent) {\n  return width / 100 * percent;\n}\n```\n\n**Description**: Converts a percentage of the screen width to pixels.\n\n```dart\n// e.g. when screen width is 400px\nDevice.getWidth(50)  // → 200.0\nDevice.getWidth(90)  // → 360.0\n```\n\n---\n\n## `getHeight`\n\n```dart\nstatic double getHeight(double percent) {\n  return height / 100 * percent;\n}\n```\n\nConverts a percentage of the screen height to pixels. Same calculation as `getWidth`.\n\n---\n\n## Static fields\n\n| Field | Type | Description |\n|------|------|------|\n| `width` | `double` | Screen width (px) |\n| `height` | `double` | Screen height (px) |\n| `isTablet` | `bool` | Whether it is a tablet (`width > 500`) |\n\n---\n\n## Usage\n\nUsed to specify widget sizes/paddings as a proportion of the screen:\n```dart\nContainer(\n  width: Device.getWidth(90),   // 90% of screen width\n  height: Device.getHeight(5),  // 5% of screen height\n)\n```\n","data/exceptions.md":"# Exceptions\n\n> `lib/data/exceptions.dart` — 커스텀 예외 클래스 계층\n\n---\n\n## 클래스 계층\n\n```\nException\n└── AppException (base)\n    ├── NetworkException — HTTP 타임아웃, 연결 실패\n    ├── ApiException — API 응답 파싱 실패, 비정상 응답\n    └── AuthException — 인증/권한 관련 에러\n```\n\n모든 예외 클래스는 `message` (설명)와 `cause` (원본 에러, 선택)를 가짐\n\n---\n\n## 사용 패턴\n\n### API 레이어 (`_fetchData`)\n\n```dart\n// 최하위 HTTP 호출 — 실패 시 NetworkException throw\nstatic Future<Map<String, dynamic>> _fetchData(String url) async {\n  try {\n    final response = await _client.get(Uri.parse(url)).timeout(...);\n    // 파싱 후 반환\n  } catch (e) {\n    throw NetworkException('API 요청 실패', e);\n  }\n}\n```\n\n### 호출측 (캐시 fallback이 있는 경우)\n\n```dart\ntry {\n  final data = await _fetchData(url);\n  // 정상 처리\n} on NetworkException {\n  // 캐시가 있으면 캐시 반환, 없으면 기본값\n  return cached ?? Meal(meal: ApiStrings.mealNoData, ...);\n}\n```\n\n---\n\n## 적용 범위\n\n| 파일 | 사용하는 예외 | 설명 |\n|------|-------------|------|\n| `meal_data_api.dart` | `NetworkException` | `_fetchData` throw, 상위 메서드에서 캐시 fallback |\n| `timetable_data_api.dart` | `NetworkException` | 동일 패턴, 에러 맵 또는 빈 리스트 반환 |\n| `notice_data_api.dart` | `NetworkException` | 동일 패턴, 기본 문자열 또는 null 반환 |\n","data/exceptions_en.md":"# Exceptions\n\n> 한국어: [exceptions.md](./exceptions.md)\n\n> `lib/data/exceptions.dart` — Custom exception class hierarchy\n\n---\n\n## Class hierarchy\n\n```\nException\n└── AppException (base)\n    ├── NetworkException — HTTP timeout, connection failure\n    ├── ApiException — API response parsing failure, abnormal response\n    └── AuthException — Auth/permission related errors\n```\n\nAll exception classes carry a `message` (description) and a `cause` (original error, optional).\n\n---\n\n## Usage patterns\n\n### API layer (`_fetchData`)\n\n```dart\n// Lowest-level HTTP call — throws NetworkException on failure\nstatic Future<Map<String, dynamic>> _fetchData(String url) async {\n  try {\n    final response = await _client.get(Uri.parse(url)).timeout(...);\n    // parse and return\n  } catch (e) {\n    throw NetworkException('API 요청 실패', e);\n  }\n}\n```\n\n### Caller (when a cache fallback exists)\n\n```dart\ntry {\n  final data = await _fetchData(url);\n  // normal handling\n} on NetworkException {\n  // return cache if available, otherwise default value\n  return cached ?? Meal(meal: ApiStrings.mealNoData, ...);\n}\n```\n\n---\n\n## Scope\n\n| File | Exception used | Description |\n|------|-------------|------|\n| `meal_data_api.dart` | `NetworkException` | `_fetchData` throws; upper method falls back to cache |\n| `timetable_data_api.dart` | `NetworkException` | Same pattern; returns error map or empty list |\n| `notice_data_api.dart` | `NetworkException` | Same pattern; returns default string or null |\n","data/grade_manager.md":"# GradeManager\r\n\r\n> `lib/data/grade_manager.dart` — 성적 CRUD, 목표 관리, 등급 변환\r\n\r\n`SubjectScore`, `Exam` 모델과 `GradeManager` 클래스를 포함. 모든 메서드가 `static`. 데이터는 [`SecureStorageService`](secure_storage_service.md)에 JSON으로 암호화 저장 (서버 저장 안 함)\r\n\r\n---\r\n\r\n## SubjectScore (데이터 모델)\r\n\r\n```dart\r\nclass SubjectScore {\r\n  final String subject;\r\n  final int? rawScore;        // 원점수\r\n  final int? rank;            // 등급 (1~9)\r\n  final double? percentile;   // 백분위\r\n  final double? standardScore; // 표준점수\r\n  final double? average;       // 평균\r\n  final String? achievement;   // 성취도 A~E\r\n}\r\n```\r\n\r\n내신(rawScore/average/rank/achievement)과 모의고사(percentile/standardScore/rank)를 하나의 구조체로 통합\r\n\r\n### 상수\r\n\r\n| 상수 | 값 |\r\n|------|----|\r\n| `rankCutoffs` | `{1: '상위 10%', 2: '상위 34%', ...}` — 내신 5등급 비율 |\r\n| `achievements` | `['A', 'B', 'C', 'D', 'E']` |\r\n\r\n---\r\n\r\n## Exam (데이터 모델)\r\n\r\n```dart\r\nclass Exam {\r\n  final String id;\r\n  final String type;        // 'midterm' | 'final' | 'mock' | 'private_mock'\r\n  final int year;\r\n  final int semester;       // 1 or 2\r\n  final int grade;          // 1, 2, 3\r\n  final String? mockLabel;  // 모의: '3월', '6월' / 사설: 직접 입력\r\n  final List<SubjectScore> scores;\r\n  final DateTime createdAt;\r\n}\r\n```\r\n\r\n`displayName` 프로퍼티: type별 한국어 표시명 생성\r\n```dart\r\n'midterm' → '$year ${semester}학기 중간고사'\r\n'mock'    → '$year $mockLabel 모의고사'\r\n```\r\n\r\n---\r\n\r\n## `percentileToRank`\r\n\r\n```dart\r\nstatic int percentileToRank(double percentile)\r\n```\r\n\r\n**설명**: 수능 백분위를 등급으로 변환함 (9등급제)\r\n\r\n```dart\r\nif (percentile >= 96) return 1;\r\nif (percentile >= 89) return 2;\r\nif (percentile >= 77) return 3;\r\n// ... 4~8등급\r\nreturn 9;\r\n```\r\n\r\n---\r\n\r\n## `loadExams`\r\n\r\n```dart\r\nstatic Future<List<Exam>> loadExams()\r\n```\r\n\r\n**설명**: 저장된 시험 목록을 로드함\r\n\r\n1. SharedPreferences → SecureStorage 일회성 마이그레이션:\r\n   ```dart\r\n   await SecureStorageService.migrateFromPlain(\r\n     key: SecureStorageService.keyGradeExams,\r\n     oldValue: prefs.getString(_examsKey),\r\n     onMigrated: () async => prefs.remove(_examsKey),\r\n   );\r\n   ```\r\n\r\n2. SecureStorage에서 JSON 읽기 후 `Exam.fromJson`으로 디코딩:\r\n   ```dart\r\n   final json = await SecureStorageService.read(SecureStorageService.keyGradeExams);\r\n   final list = jsonDecode(json) as List<dynamic>;\r\n   return list.map((e) => Exam.fromJson(e)).toList()\r\n     ..sort((a, b) => a.createdAt.compareTo(b.createdAt));\r\n   ```\r\n\r\n**마이그레이션**: 기존 SharedPreferences(평문)에서 SecureStorage(암호화)로 자동 이전. 한 번 옮기면 이전 데이터 삭제\r\n\r\n---\r\n\r\n## `saveExams`\r\n\r\n```dart\r\nstatic Future<void> saveExams(List<Exam> exams)\r\n```\r\n\r\n시험 목록 전체를 SecureStorage에 JSON으로 저장\r\n\r\n---\r\n\r\n## `addExam` / `updateExam` / `deleteExam`\r\n\r\n```dart\r\nstatic Future<void> addExam(Exam exam)\r\nstatic Future<void> updateExam(Exam exam)\r\nstatic Future<void> deleteExam(String id)\r\n```\r\n\r\n각각 `loadExams()` → 수정 → `saveExams()` 패턴. `updateExam`은 id 매칭, `deleteExam`은 `removeWhere`\r\n\r\n---\r\n\r\n## `loadGoals`\r\n\r\n```dart\r\nstatic Future<Map<String, double>> loadGoals()\r\n```\r\n\r\n**설명**: 수시 목표 등급(과목명 → 등급)을 로드함\r\n\r\n`loadExams`와 동일한 마이그레이션 + SecureStorage 패턴. 키: `SecureStorageService.keyGradeGoals`\r\n\r\n---\r\n\r\n## `saveGoals`\r\n\r\n```dart\r\nstatic Future<void> saveGoals(Map<String, double> goals)\r\n```\r\n\r\n수시 목표를 SecureStorage에 JSON 저장\r\n\r\n---\r\n\r\n## `loadJeongsiGoals` / `saveJeongsiGoals`\r\n\r\n```dart\r\nstatic
